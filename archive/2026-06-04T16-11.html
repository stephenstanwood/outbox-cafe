<script>
/* ------- state + persistence ------- */
const KEY = 'wiggles_v1_2_state';
const PETTED_KEY = 'wiggles_petted_worldwide';
const VISIT_DAYS_KEY = 'wiggles_visit_days';

const defaultState = {
  name: 'WIGGLES',
  affection: 5,
  hunger: 80,
  hydration: 80,
  carrotsEaten: 0,
  lastVisit: Date.now(),
  firstVisit: Date.now(),
  petStrokes: 0
};

let S;
try {
  const raw = localStorage.getItem(KEY);
  S = raw ? Object.assign({}, defaultState, JSON.parse(raw)) : Object.assign({}, defaultState);
} catch(e) { S = Object.assign({}, defaultState); }

let pettedWorldwide;
try {
  pettedWorldwide = parseInt(localStorage.getItem(PETTED_KEY) || '47118', 10);
  if (!Number.isFinite(pettedWorldwide)) pettedWorldwide = 47118;
} catch(e) { pettedWorldwide = 47118; }

function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){}
  try { localStorage.setItem(PETTED_KEY, String(pettedWorldwide)); } catch(e){}
}

/* visit-day tracker */
function trackVisitDay() {
  const today = new Date();
  const dayKey = today.getFullYear() + '-' + (today.getMonth()+1) + '-' + today.getDate();
  let days = [];
  try {
    const raw = localStorage.getItem(VISIT_DAYS_KEY);
    days = raw ? JSON.parse(raw) : [];
  } catch(e) { days = []; }
  if (!days.includes(dayKey)) {
    days.push(dayKey);
    try { localStorage.setItem(VISIT_DAYS_KEY, JSON.stringify(days)); } catch(e){}
  }
  return days.length;
}
const distinctVisitDays = trackVisitDay();

/* time-away hunger decay */
const now = Date.now();
const hoursAway = (now - (S.lastVisit||now)) / (1000*60*60);
S.hunger = Math.max(0, S.hunger - hoursAway * 4);
S.hydration = Math.max(0, S.hydration - hoursAway * 3);
S.lastVisit = now;

const heMissedYou = hoursAway > 6;

/* ------- canvas + scaling ------- */
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const VW = 320, VH = 200;
let scale = 1, offsetX = 0, offsetY = 0;

function fitCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width);
  canvas.height = Math.floor(rect.height);
  const sx = canvas.width / VW;
  const sy = canvas.height / VH;
  scale = Math.min(sx, sy);
  offsetX = Math.floor((canvas.width - VW*scale) / 2);
  offsetY = Math.floor((canvas.height - VH*scale) / 2);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

/* ------- coordinate mapping ------- */
function clientToVirtual(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  const px = (cx - rect.left) * (canvas.width / rect.width);
  const py = (cy - rect.top) * (canvas.height / rect.height);
  return {
    x: (px - offsetX) / scale,
    y: (py - offsetY) / scale
  };
}

/* ------- Wiggles verlet body ------- */
const SEG_COUNT = 14;
const SEG_DIST = 5;
const TERR = { x: 16, y: 28, w: 288, h: 158 }; // terrarium bounds in virtual coords

class Segment {
  constructor(x,y) {
    this.x = x; this.y = y;
    this.px = x; this.py = y;
  }
}
const segs = [];
for (let i=0;i<SEG_COUNT;i++) {
  segs.push(new Segment(160 - i*SEG_DIST, 130));
}

let head = { x: 160, y: 130, vx: 0, vy: 0, target: null, holding: false };

/* ceramic dish + carrots */
const dish = { x: 256, y: 158, r: 14, fill: 0.7 };
let carrots = []; // {x, y, eaten:false}

/* mood + state */
const MOODS = ['CONTENT','WIGGLY','SHY','SLEEPY','HUNGRY','CURIOUS'];
let mood = 'CONTENT';
let moodTimer = 0;
let shyUntil = 0;
let sleepyTimer = 0;
let lastInteract = Date.now();

/* thought bubble */
let bubble = null; // {icon, until}
function showBubble(icon, ms=2200) {
  bubble = { icon, until: Date.now() + ms };
}

/* cursor finger */
const finger = { x: 160, y: 100, lastX: 160, lastY: 100, vis: false, down: false, downAt:0, holdStart:0, dragging:false };
let stillTime = 0; // ms cursor still over wiggles
let onFinger = false; // wiggles climbed onto finger
let lastMoveTime = Date.now();
let strokeCooldown = 0;

/* audio */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  }
  return audioCtx;
}
function beep(freq, dur, type='triangle', vol=0.06) {
  const ac = getAudio();
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur);
}
function coo() {
  beep(440, 0.12, 'sine', 0.04);
  setTimeout(()=>beep(580, 0.08, 'sine', 0.03), 80);
}
function chomp() {
  beep(180, 0.06, 'square', 0.05);
  setTimeout(()=>beep(140, 0.06, 'square', 0.04), 70);
}
function glassTap() {
  beep(1800, 0.05, 'square', 0.06);
  setTimeout(()=>beep(1400, 0.04, 'square', 0.04), 40);
}
function flinch() { beep(220, 0.18, 'sawtooth', 0.05); }
function drip() { beep(900, 0.05, 'sine', 0.04); setTimeout(()=>beep(600,0.07,'sine',0.03), 60); }

/* ------- input ------- */
function setFingerFromClient(cx, cy) {
  const v = clientToVirtual(cx, cy);
  finger.lastX = finger.x; finger.lastY = finger.y;
  finger.x = v.x; finger.y = v.y;
  finger.vis = true;
  lastMoveTime = Date.now();
}

canvas.addEventListener('mousemove', e => {
  setFingerFromClient(e.clientX, e.clientY);
});
canvas.addEventListener('mouseleave', () => { finger.vis = false; });
canvas.addEventListener('mouseenter', e => { setFingerFromClient(e.clientX, e.clientY); });

canvas.addEventListener('mousedown', e => {
  setFingerFromClient(e.clientX, e.clientY);
  finger.down = true;
  finger.downAt = Date.now();
  finger.holdStart = Date.now();
  handlePress();
});
window.addEventListener('mouseup', e => {
  if (finger.down) {
    handleRelease();
  }
  finger.down = false;
  finger.dragging = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  setFingerFromClient(t.clientX, t.clientY);
  finger.down = true;
  finger.downAt = Date.now();
  handlePress();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  setFingerFromClient(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchend', e => {
  if (finger.down) handleRelease();
  finger.down = false;
  finger.dragging = false;
}, {passive:false});

function distToHead() {
  const dx = finger.x - segs[0].x;
  const dy = finger.y - segs[0].y;
  return Math.hypot(dx, dy);
}

function handlePress() {
  const onWormDist = nearestSegDist();
  // dish click
  const dd = Math.hypot(finger.x - dish.x, finger.y - dish.y);
  if (dd < dish.r) {
    dish.fill = 1.0;
    drip();
    return;
  }
  if (onWormDist < 12) {
    // poke / start drag
    finger.dragging = false; // will become true if movement happens
  } else {
    // tapping glass
    glassTap();
    mood = 'SHY';
    shyUntil = Date.now() + 4000;
    showBubble('!');
    // push wiggles toward center
    for (let s of segs) {
      const dx = s.x - finger.x, dy = s.y - finger.y;
      const d = Math.hypot(dx,dy) || 1;
      s.x += dx/d * 6;
      s.y += dy/d * 6;
    }
  }
}

function handleRelease() {
  const heldMs = Date.now() - finger.downAt;
  const moveDist = Math.hypot(finger.x - segs[0].x, finger.y - segs[0].y);
  if (finger.dragging) {
    // dropped from drag
    finger.dragging = false;
    // shy if dropped from height
    if (segs[0].y < 80) {
      mood = 'SHY';
      shyUntil = Date.now() + 8000;
      showBubble('!');
    }
  } else if (heldMs < 250) {
    // quick poke
    if (nearestSegDist() < 14) {
      S.affection = Math.max(0, S.affection - 1);
      mood = 'SHY';
      shyUntil = Date.now() + 3000;
      flinch();
      showBubble('?');
      // flinch coil
      for (let i=0;i<segs.length;i++) {
        const ang = i * 0.6;
        segs[i].x = segs[0].x + Math.cos(ang)*3;
        segs[i].y = segs[0].y + Math.sin(ang)*3;
      }
    }
  }
}

function nearestSegDist() {
  let m = Infinity;
  for (let s of segs) {
    const d = Math.hypot(s.x - finger.x, s.y - finger.y);
    if (d < m) m = d;
  }
  return m;
}

/* ------- update ------- */
let lastUpdate = performance.now();
let bgTickAccum = 0;

function update(dt) {
  const t = Date.now();

  // mood logic
  if (t < shyUntil) {
    mood = 'SHY';
  } else {
    const idleMs = t - lastInteract;
    if (S.hunger < 25) {
      mood = 'HUNGRY';
      if (Math.random() < 0.005 && !bubble) showBubble('carrot');
    } else if (idleMs > 25000 && !finger.vis) {
      sleepyTimer += dt;
      if (sleepyTimer > 8000) {
        mood = 'SLEEPY';
        if (Math.random() < 0.003 && !bubble) showBubble('zzz');
      }
    } else {
      sleepyTimer = 0;
      if (finger.vis && nearestSegDist() < 26 && distToHead() < 40) {
        const vel = Math.hypot(finger.x-finger.lastX, finger.y-finger.lastY);
        if (vel < 1.2 && nearestSegDist() < 14) {
          mood = 'CONTENT';
          // gentle petting
          stillTime += dt;
        } else if (vel > 0.4 && vel < 3 && nearestSegDist() < 14) {
          mood = 'WIGGLY';
          strokeCooldown -= dt;
          if (strokeCooldown <= 0) {
            S.affection = Math.min(100, S.affection + 0.5);
            S.petStrokes += 1;
            pettedWorldwide += 1;
            strokeCooldown = 400;
            if (Math.random() < 0.3) coo();
            if (S.affection > 10 && Math.random() < 0.4 && !bubble) showBubble('heart', 1500);
          }
        } else {
          mood = 'CURIOUS';
        }
      } else if (finger.vis && Math.random() < 0.001) {
        mood = 'CURIOUS';
        showBubble('?', 1500);
      } else {
        if (mood !== 'HUNGRY' && mood !== 'SLEEPY') {
          mood = 'CONTENT';
        }
      }
    }
  }

  // climb onto finger after holding still
  if (finger.vis && nearestSegDist() < 18) {
    const vel = Math.hypot(finger.x-finger.lastX, finger.y-finger.lastY);
    if (vel < 0.5) stillTime += dt; else stillTime = 0;
    if (stillTime > 4000) onFinger = true;
  } else {
    stillTime = 0;
  }
  if (finger.vis && onFinger) {
    const vel = Math.hypot(finger.x-finger.lastX, finger.y-finger.lastY);
    if (vel > 2) onFinger = false;
  }
  if (!finger.vis) onFinger = false;

  // detect dragging
  if (finger.down && nearestSegDist() < 16) {
    const heldMs = t - finger.downAt;
    if (heldMs > 180) {
      finger.dragging = true;
    }
  }

  // target for head
  let targetX = head.x, targetY = head.y;
  let strength = 0;

  if (finger.dragging && finger.vis) {
    targetX = finger.x; targetY = finger.y; strength = 1.0;
  } else if (onFinger && finger.vis) {
    targetX = finger.x; targetY = finger.y - 4; strength = 0.8;
  } else if (mood === 'SHY') {
    targetX = 160; targetY = 140; strength = 0.04;
  } else if (mood === 'CURIOUS' && finger.vis) {
    targetX = finger.x; targetY = finger.y + 3; strength = 0.05;
  } else if (mood === 'SLEEPY') {
    // coil in place - spiral
    const a = (t/2000) % (Math.PI*2);
    targetX = segs[0].x + Math.cos(a)*0.3;
    targetY = segs[0].y + Math.sin(a)*0.3;
    strength = 0.02;
  } else {
    // autonomous wandering — sometimes toward dish if thirsty, toward carrots, else wander
    const closestCarrot = nearestCarrot();
    if (S.hunger < 60 && closestCarrot) {
      targetX = closestCarrot.x; targetY = closestCarrot.y; strength = 0.08;
    } else if (S.hydration < 40) {
      targetX = dish.x; targetY = dish.y; strength = 0.05;
    } else {
      // gentle wander
      head.wanderT = (head.wanderT||0) + dt*0.001;
      targetX = 160 + Math.cos(head.wanderT*0.7)*80;
      targetY = 130 + Math.sin(head.wanderT*1.1)*30;
      strength = 0.025;
      if (mood === 'WIGGLY') {
        targetY += Math.sin(t*0.02)*4;
      }
    }
  }

  // move head toward target
  head.vx = (head.vx||0) * 0.85 + (targetX - segs[0].x) * strength * 0.4;
  head.vy = (head.vy||0) * 0.85 + (targetY - segs[0].y) * strength * 0.4;
  // gentle wiggle
  if (mood !== 'SHY' && mood !== 'SLEEPY' && !finger.dragging && !onFinger) {
    head.vx += Math.sin(t*0.005 + segs[0].y*0.1) * 0.15;
  }
  segs[0].x += head.vx;
  segs[0].y += head.vy;

  // gravity for body when dragged
  if (finger.dragging) {
    // body falls below head
    for (let i=1;i<segs.length;i++) {
      const s = segs[i];
      s.py = s.y;
      s.px = s.x;
      s.y += 0.6; // gravity
    }
  }

  // verlet-ish: each segment follows previous at fixed distance with damping
  for (let i=1;i<segs.length;i++) {
    const prev = segs[i-1];
    const s = segs[i];
    const dx = s.x - prev.x;
    const dy = s.y - prev.y;
    const d = Math.hypot(dx,dy) || 0.001;
    const diff = (d - SEG_DIST) / d;
    s.x -= dx * diff * 0.9;
    s.y -= dy * diff * 0.9;
    // soft inertia
    s.x += Math.sin(t*0.004 + i*0.5) * 0.1;
  }

  // bounds — keep in terrarium
  for (let s of segs) {
    if (s.x < TERR.x+2) s.x = TERR.x+2;
    if (s.x > TERR.x+TERR.w-2) s.x = TERR.x+TERR.w-2;
    if (s.y < TERR.y+4) s.y = TERR.y+4;
    if (s.y > TERR.y+TERR.h-3) s.y = TERR.y+TERR.h-3;
  }

  // eat carrots
  for (let c of carrots) {
    if (c.eaten) continue;
    if (Math.hypot(segs[0].x - c.x, segs[0].y - c.y) < 5) {
      c.eaten = true;
      S.hunger = Math.min(100, S.hunger + 25);
      S.carrotsEaten += 1;
      chomp();
      showBubble('heart', 1500);
    }
  }
  carrots = carrots.filter(c => !c.eaten);

  // drink from dish
  if (Math.hypot(segs[0].x - dish.x, segs[0].y - dish.y) < dish.r-4 && dish.fill > 0.05) {
    S.hydration = Math.min(100, S.hydration + dt*0.02);
    dish.fill = Math.max(0, dish.fill - dt*0.00005);
  }

  // background decay
  bgTickAccum += dt;
  if (bgTickAccum > 1000) {
    S.hunger = Math.max(0, S.hunger - 0.05);
    S.hydration = Math.max(0, S.hydration - 0.04);
    dish.fill = Math.max(0, dish.fill - 0.001);
    bgTickAccum = 0;
  }

  // interaction tracking
  if (finger.vis) {
    const vel = Math.hypot(finger.x-finger.lastX, finger.y-finger.lastY);
    if (vel > 0.3) lastInteract = Date.now();
  }

  // bubble timing
  if (bubble && Date.now() > bubble.until) bubble = null;
  if (!bubble) {
    if (S.hunger < 20 && Math.random() < 0.001) showBubble('carrot');
    else if (S.hydration < 30 && Math.random() < 0.001) showBubble('drop');
    else if (mood === 'SLEEPY' && Math.random() < 0.001) showBubble('zzz', 2500);
  }
}

function nearestCarrot() {
  let best = null, bd = Infinity;
  for (let c of carrots) {
    const d = Math.hypot(segs[0].x-c.x, segs[0].y-c.y);
    if (d < bd) { bd = d; best = c; }
  }
  return best;
}

/* ------- draw ------- */
function draw() {
  ctx.save();
  ctx.fillStyle = '#5a3a1e';
  ctx.fillRect(0,0,canvas.width, canvas.height);

  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // terrarium back (CRT teal)
  ctx.fillStyle = '#1c4a5e';
  ctx.fillRect(0,0,VW,VH);

  // titlebar gradient strip at top of stage
  const grad = ctx.createLinearGradient(0,0,VW,0);
  grad.addColorStop(0, '#0a3a8a');
  grad.addColorStop(1, '#5a8aca');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,VW,8);
  // titlebar text (chunky pixel-ish)
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 6px "Courier New", monospace';
  ctx.textBaseline = 'top';
  ctx.fillText(S.name + ".EXE — terrarium", 4, 1);
  ctx.textAlign = 'right';
  ctx.fillText('CD-R 04-' + String(S.carrotsEaten).padStart(2,'0'), VW-4, 1);
  ctx.textAlign = 'left';

  // terrarium glass area
  ctx.save();
  ctx.beginPath();
  ctx.rect(TERR.x, TERR.y, TERR.w, TERR.h);
  ctx.clip();

  // teal back
  ctx.fillStyle = '#1c4a5e';
  ctx.fillRect(TERR.x, TERR.y, TERR.w, TERR.h);

  // scanlines
  ctx.fillStyle = 'rgba(14, 53, 72, 0.4)';
  for (let y = TERR.y; y < TERR.y+TERR.h; y += 2) {
    ctx.fillRect(TERR.x, y, TERR.w, 1);
  }

  // sawdust floor
  const floorY = TERR.y + TERR.h - 36;
  ctx.fillStyle = '#d4a868';
  ctx.fillRect(TERR.x, floorY, TERR.w, TERR.h - (floorY - TERR.y));
  // sawdust grain
  for (let i=0;i<160;i++) {
    const x = TERR.x + ((i*37+7) % TERR.w);
    const y = floorY + ((i*53+3) % (TERR.h-(floorY-TERR.y)));
    ctx.fillStyle = (i%5===0) ? '#7a5634' : (i%2===0 ? '#b8895a' : '#c89b6a');
    ctx.fillRect(x, y, 1, 1);
  }

  // ceramic water dish (in floor corner)
  // dish shadow
  ctx.fillStyle = '#a87838';
  ctx.fillRect(dish.x - dish.r, dish.y - 4, dish.r*2, 12);
  // dish body
  ctx.fillStyle = '#e8e0c8';
  ctx.fillRect(dish.x - dish.r, dish.y - 6, dish.r*2, 10);
  ctx.fillStyle = '#c8c0a0';
  ctx.fillRect(dish.x - dish.r, dish.y + 2, dish.r*2, 2);
  // water
  if (dish.fill > 0) {
    ctx.fillStyle = '#5a8eb4';
    ctx.fillRect(dish.x - dish.r + 2, dish.y - 4, (dish.r*2-4) * dish.fill, 6);
    // ripple highlight
    ctx.fillStyle = '#a4c8e4';
    ctx.fillRect(dish.x - dish.r + 3, dish.y - 4, 2, 1);
  }
  // dish rim shadow
  ctx.fillStyle = '#a89878';
  ctx.fillRect(dish.x - dish.r, dish.y - 6, dish.r*2, 1);

  // carrots on floor
  for (let c of carrots) {
    drawCarrot(c.x, c.y);
  }

  // wiggles!
  drawWiggles();

  // thought bubble
  if (bubble) {
    drawBubble(segs[0].x, segs[0].y - 12, bubble.icon);
  }

  ctx.restore(); // end terrarium clip

  // terrarium glass frame (chunky)
  ctx.strokeStyle = '#0a2030';
  ctx.lineWidth = 2;
  ctx.strokeRect(TERR.x+1, TERR.y+1, TERR.w-2, TERR.h-2);
  ctx.strokeStyle = '#3a8eb4';
  ctx.lineWidth = 1;
  ctx.strokeRect(TERR.x, TERR.y, TERR.w, TERR.h);

  // CRT phosphor glow corners
  ctx.fillStyle = 'rgba(58, 142, 180, 0.15)';
  ctx.fillRect(TERR.x, TERR.y, TERR.w, 3);

  // wood paneling visible edges (handled by overall body bg too, but draw a side strip)
  // already drawn outside terrarium area as #5a3a1e fill

  // HE MISSED YOU message
  if (heMissedYou && Date.now() - now < 8000) {
    const alpha = Math.max(0, 1 - (Date.now()-now)/8000);
    ctx.fillStyle = `rgba(244, 236, 208, ${alpha})`;
    ctx.font = 'bold 7px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HE MISSED YOU', VW/2, TERR.y + 18);
    ctx.textAlign = 'left';
  }

  // cursor finger (only if visible inside terrarium area)
  if (finger.vis && finger.x > TERR.x && finger.x < TERR.x+TERR.w && finger.y > TERR.y && finger.y < TERR.y+TERR.h) {
    drawFinger(finger.x, finger.y);
  }

  ctx.restore();

  // update DOM status
  document.getElementById('moodPanel').textContent = 'Mood: ' + mood;
  document.getElementById('namePanel').textContent = 'Name: ' + S.name;
  document.getElementById('counterPanel').textContent = 'WORMS PETTED WORLDWIDE: ' + pettedWorldwide.toLocaleString('en-US');
}

function drawWiggles() {
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  for (let i=0;i<segs.length;i++) {
    const s = segs[i];
    ctx.fillRect(Math.floor(s.x)-3, Math.floor(s.y)+3, 6, 2);
  }
  // body — segmented circles
  for (let i=segs.length-1;i>=0;i--) {
    const s = segs[i];
    const r = (i===0) ? 5 : (i === segs.length-1 ? 2 : 4);
    // outline
    ctx.fillStyle = '#c87890';
    drawPixelCircle(s.x, s.y, r+0.5);
    // body
    ctx.fillStyle = '#f4a8b4';
    drawPixelCircle(s.x, s.y, r-0.3);
    // highlight
    ctx.fillStyle = '#fee8ec';
    ctx.fillRect(Math.floor(s.x)-1, Math.floor(s.y)-r+1, 2, 1);
  }
  // eyes on head
  const h = segs[0];
  ctx.fillStyle = '#000';
  // direction based on velocity
  const dx = (segs[0].x - segs[1].x);
  const dy = (segs[0].y - segs[1].y);
  const ang = Math.atan2(dy, dx);
  const eye1x = h.x + Math.cos(ang-0.6)*2;
  const eye1y = h.y + Math.sin(ang-0.6)*2;
  const eye2x = h.x + Math.cos(ang+0.6)*2;
  const eye2y = h.y + Math.sin(ang+0.6)*2;
  if (mood === 'SLEEPY') {
    ctx.fillRect(Math.floor(eye1x)-1, Math.floor(eye1y), 2, 1);
    ctx.fillRect(Math.floor(eye2x)-1, Math.floor(eye2y), 2, 1);
  } else if (mood === 'SHY') {
    ctx.fillRect(Math.floor(eye1x), Math.floor(eye1y), 1, 1);
    ctx.fillRect(Math.floor(eye2x), Math.floor(eye2y), 1, 1);
  } else {
    ctx.fillRect(Math.floor(eye1x), Math.floor(eye1y), 1, 2);
    ctx.fillRect(Math.floor(eye2x), Math.floor(eye2y), 1, 2);
  }
}

function drawPixelCircle(cx, cy, r) {
  cx = Math.floor(cx); cy = Math.floor(cy);
  r = Math.max(1, r);
  for (let y=-r;y<=r;y++) {
    for (let x=-r;x<=r;x++) {
      if (x*x + y*y <= r*r) {
        ctx.fillRect(cx+x, cy+y, 1, 1);
      }
    }
  }
}

function drawCarrot(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  ctx.fillStyle = '#e87838';
  ctx.fillRect(x-2, y-1, 4, 2);
  ctx.fillRect(x-1, y+1, 2, 1);
  ctx.fillStyle = '#c85818';
  ctx.fillRect(x-2, y, 1, 1);
  ctx.fillStyle = '#5e8e3a';
  ctx.fillRect(x+2, y-2, 1, 2);
  ctx.fillRect(x+3, y-1, 1, 1);
}

function drawFinger(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(x, y+10, 6, 2);
  // arm/finger pointing up-left
  ctx.fillStyle = '#e8b89a';
  // fingertip
  ctx.fillRect(x, y, 4, 4);
  ctx.fillRect(x+1, y-2, 3, 2);
  // finger length
  ctx.fillRect(x, y+4, 5, 6);
  // hand body
  ctx.fillStyle = '#d8a888';
  ctx.fillRect(x-1, y+10, 9, 6);
  // outline
  ctx.fillStyle = '#000';
  ctx.fillRect(x-1, y-2, 1, 12); // left
  ctx.fillRect(x+4, y-2, 1, 12); // right
  ctx.fillRect(x+1, y-3, 3, 1); // top
  ctx.fillRect(x-2, y+10, 1, 6);
  ctx.fillRect(x+8, y+10, 1, 6);
  ctx.fillRect(x-1, y+16, 10, 1);
  // nail
  ctx.fillStyle = '#fee8d8';
  ctx.fillRect(x+1, y-1, 2, 1);
}

function drawBubble(x, y, icon) {
  x = Math.floor(x); y = Math.floor(y);
  // bubble body
  ctx.fillStyle = '#000';
  ctx.fillRect(x-7, y-9, 14, 11);
  ctx.fillRect(x-1, y+2, 2, 2);
  ctx.fillStyle = '#f4ecd0';
  ctx.fillRect(x-6, y-8, 12, 9);
  ctx.fillRect(x-1, y+1, 1, 1);
  // icon
  ctx.fillStyle = '#000';
  const cx = x, cy = y-3;
  if (icon === 'carrot') {
    ctx.fillStyle = '#e87838';
    ctx.fillRect(cx-2, cy-1, 4, 2);
    ctx.fillRect(cx-1, cy+1, 2, 1);
    ctx.fillStyle = '#5e8e3a';
    ctx.fillRect(cx+2, cy-2, 1, 2);
  } else if (icon === 'drop') {
    ctx.fillStyle = '#5a8eb4';
    ctx.fillRect(cx-1, cy-2, 2, 1);
    ctx.fillRect(cx-2, cy-1, 4, 3);
    ctx.fillRect(cx-1, cy+2, 2, 1);
  } else if (icon === '?') {
    ctx.fillRect(cx-1, cy-3, 3, 1);
    ctx.fillRect(cx+1, cy-2, 1, 2);
    ctx.fillRect(cx, cy, 1, 1);
    ctx.fillRect(cx, cy+2, 1, 1);
  } else if (icon === '!') {
    ctx.fillRect(cx, cy-3, 1, 4);
    ctx.fillRect(cx, cy+2, 1, 1);
  } else if (icon === 'heart') {
    ctx.fillStyle = '#e84858';
    ctx.fillRect(cx-2, cy-2, 2, 1);
    ctx.fillRect(cx+1, cy-2, 2, 1);
    ctx.fillRect(cx-3, cy-1, 7, 2);
    ctx.fillRect(cx-2, cy+1, 5, 1);
    ctx.fillRect(cx-1, cy+2, 3, 1);
    ctx.fillRect(cx, cy+3, 1, 1);
  } else if (icon === 'zzz') {
    ctx.fillStyle = '#000';
    ctx.fillRect(cx-3, cy-2, 3, 1);
    ctx.fillRect(cx-1, cy-1, 1, 1);
    ctx.fillRect(cx-3, cy, 3, 1);
    ctx.fillRect(cx+1, cy-3, 2, 1);
    ctx.fillRect(cx+2, cy-2, 1, 1);
    ctx.fillRect(cx+1, cy-1, 2, 1);
  }
}

/* ------- loop ------- */
function loop(now) {
  const dt = Math.min(60, now - lastUpdate);
  lastUpdate = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* draggable readme */
(function dragReadme(){
  const t = document.getElementById('readmeTitle');
  let dragging = false, sx=0, sy=0, ox=0, oy=0;
  t.addEventListener('mousedown', e => {
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    const r = readme.getBoundingClientRect();
    const par = readme.parentElement.getBoundingClientRect();
    ox = r.left - par.left; oy = r.top - par.top;
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const nx = ox + (e.clientX - sx);
    const ny = oy + (e.clientY - sy);
    readme.style.left = Math.max(0, nx) + 'px';
    readme.style.top = Math.max(0, ny) + 'px';
  });
  window.addEventListener('mouseup', () => { dragging = false; });
})();

little long, and a little chatty. There is no nag screen,
no time-limited demo. He is a complete, free worm. If you

--------------------------------------------------------------
SECTION 1.    WHAT IS HE
--------------------------------------------------------------

He is a soft-bodied rubber worm in a small glass terrarium
with a sawdust floor. He has a water dish. He has moods.
He does not have a goal. There is no score. The terrarium
is the whole game.

You move the mouse cursor and he can see it (he sees it as
a finger, because he is small and his world is small). If
you move slowly over him, you are petting him, and his
affection for you goes up. If you click on him sharply,
you are poking him, and he does not like that — he flinches
and his affection drops. If you click and hold and drag,
you are picking him up. Drop him from too high and he gets
shy for a bit.

If you hold the cursor very still over him for four full
seconds, he will climb onto your finger and balance there.
That is the nicest thing he does. It will only happen if
he trusts you a little.

He gets hungry, slowly. There is a FEED button. There is
a water dish that slowly evaporates; you can refill it by
clicking on it. You can rename him, if you don't like the
name WIGGLES. (I named him WIGGLES because that's what he
does. You can do better than me.)

That is the whole program. The rest of this README is for
people who want to know HOW it works inside, which is most
of the fun of shareware, I think.


--------------------------------------------------------------
SECTION 2.    HOW HE MOVES  (verlet physics, in plain words)
--------------------------------------------------------------

His body is a chain of 14 small soft circles. Only the head
(circle #1) has a target. The other 13 just try to stay a
fixed distance from the segment in front of them, and that
gives the whole worm a floppy, lifelike feeling.

The constraint between segments looks like this:

       (i-1)o-------o(i)        before constraint:  d  =/= 5
                                after constraint:  d  ==  5

       force on i toward i-1 if d > 5
       force on i away from i-1 if d < 5
       in both cases scaled by 0.9 so we don't snap

That is the whole trick. It is called a distance constraint
and it is the simplest building block in soft-body physics.
The damping (0.9 instead of 1.0) is what makes him feel
rubbery instead of springy. I tuned the damping by hand,
sitting here listening to the snow.

The head itself is steered by a target point — usually a
wandering point that drifts gently in a Lissajous curve,
sometimes a carrot, sometimes the water dish, sometimes
the cursor (if he is curious or hungry or being held).

There are no rotations. No matrices. Just positions, and
the constraint, and a small target. He has 14 segments
because that was the number where he stopped looking
twitchy and started looking like a creature. 12 felt
short. 16 felt slow. 14 is right.


--------------------------------------------------------------
SECTION 3.    THE MOODS  (what is going on inside him)
--------------------------------------------------------------

He has six moods. Each one changes what his head's target
point is, and what little things he does on his own:

     +-----------+         +-----------+
     |  CONTENT  |<------->|  WIGGLY   |
     +-----------+         +-----------+
           ^                     ^
           |                     |
           v                     |
     +-----------+         +-----------+
     |  SLEEPY   |         |  CURIOUS  |
     +-----------+         +-----------+
           ^                     ^
           |                     |
     +-----------+         +-----------+
     |  HUNGRY   |         |    SHY    |
     +-----------+         +-----------+

CONTENT  — default. He wanders slowly in a soft figure.
WIGGLY   — when you are gently petting him; he undulates.
SHY      — after a poke, a tap on the glass, or a hard drop.
           He retreats toward the middle and won't approach.
SLEEPY   — if nobody has touched him for a while. He coils.
HUNGRY   — when his hunger meter falls under 25.
CURIOUS  — when the cursor is near but he hasn't been touched.
           He approaches it on his own. This one is my
           favorite to watch.

Transitions happen on a timer and on events. SHY has a
hard cooldown — even if you stop poking him, he stays SHY
for a few seconds, because trust comes back slowly.


--------------------------------------------------------------
SECTION 4.    THE HUNGER METER  (how it is calibrated)
--------------------------------------------------------------

He loses about 4 hunger points per hour of real time.
A carrot shaving refills 25 points. That means he eats
roughly one carrot every six hours of real time, which
is the rhythm I wanted — you check on him in the
morning before school, and again after dinner.

When you close the program, the clock keeps running. If
you come back the next day without feeding him, he will
be hungry, but he will still be alive and he will still
remember you. If you come back after a long time and he
is HUNGRY a thought-bubble will appear over his head
with a tiny carrot in it. You will know.

I thought about making him die if you never came back.
I decided against it. Whatever your reason for being
away, he forgives you. Just feed him when you get back.


--------------------------------------------------------------
SECTION 5.    THE TERRARIUM  (coordinate grid)
--------------------------------------------------------------

The whole stage is 320x200 pixels (VGA). The terrarium
itself is the inner rectangle:

      (16,28) +----------------------+ (304,28)
              |                      |
              |       (open air)     |
              |                      |
              |  o    .    o   .  .  |   <-- sawdust line
              | . o  .  o    .       |       at y = 162
              |   .    o   .   o     |
      (16,186)+----------------------+ (304,186)

The sawdust starts at y=162. Above that is the open air
where he can be lifted, swung, dangled. Below that is
the floor where he wanders, drinks, and eats.

The water dish lives at the right side near the floor.
The carrot shavings drop into random positions on the
sawdust line when you press FEED.


--------------------------------------------------------------
SECTION 6.    CARROT PATHFINDING
--------------------------------------------------------------

When a carrot is on the floor and his hunger is below 60,
his head's target becomes the nearest carrot. No A*, no
grids. He just steers toward it. If two carrots exist
he goes for the closer one.

His path looks like this:

       o WORM
        \
         \
          \ ... drift, drift, drift ...
           \
            o CARROT  <-- target

He doesn't avoid the dish; he just slides past it. He is
a worm; he doesn't have great navigation.


--------------------------------------------------------------
SECTION 7.    WHY TURBO PASCAL 7.0
--------------------------------------------------------------

I wrote him in Turbo Pascal 7.0. I know — Borland C is
faster, and a lot of people on the comp.sys.ibm.pc.games
newsgroup say Pascal is dying. Maybe it is. I don't care.

Pascal is what my hands know. I learned on it when I was
fifteen. I can write a working linked list in Pascal at
3am with the flu. I think a tool you know that well is
worth more than a tool that compiles 8% faster but that
you have to think about. Wiggles needs to be fun, not
fast. He runs at 70 frames a second on my Pentium 75
with room to spare. That is plenty for a worm.

Also: the Turbo Pascal IDE has the prettiest blue color
in the world. I like working inside it. When I leave
University I will probably have to write COBOL for an
insurance company in Vantaa, so I want to enjoy this
while I can.
