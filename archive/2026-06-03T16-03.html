<!--
  Bay No. 2, Pawpaw Junction Volunteer Fire Co. No. 2.
  11:47 p.m., Friday, October 12, 1923.
  Chief Wirtanen is out at the Krenzler place.
  The hook by the bay door holds the Sentinel.
  The wick is trimmed. The reservoir is two-thirds full.
  One mote in this room came in on Theodore Krenzler's coat last Saturday.
  It is still here.
-->
<svg id="stage" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>
<div id="footer"><a href="/archive">other lights still burning</a></div>

<script>
(function () {
  "use strict";

  const svg = document.getElementById("stage");
  const SVGNS = "http://www.w3.org/2000/svg";

  function sizeViewBox() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    svg.setAttribute("viewBox", "0 0 " + w + " " + h);
    svg.setAttribute("width", w);
    svg.setAttribute("height", h);
    return { w: w, h: h };
  }

  // Deterministic PRNG so the wall is the same wall every visit.
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = a;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  const SEED = 19231012;

  const brickPalette = [
    [0x5e, 0x2a, 0x1c],
    [0x6a, 0x34, 0x24],
    [0x4e, 0x24, 0x18],
    [0x7a, 0x3a, 0x26],
    [0x55, 0x26, 0x18],
    [0x68, 0x30, 0x20]
  ];

  function rgb(r, g, b) {
    return "rgb(" + (r | 0) + "," + (g | 0) + "," + (b | 0) + ")";
  }

  function jitter(c, amt, rand) {
    const j = (rand() - 0.5) * 2 * amt;
    return Math.max(0, Math.min(255, c + j));
  }

  let dims = sizeViewBox();
  let wallGroup, lightGroup, moteGroup, vignetteGroup;
  let pools = [];
  let motes = [];

  function buildScene() {
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    const defs = document.createElementNS(SVGNS, "defs");
    svg.appendChild(defs);

    // Radial gradient for each light pool.
    const grad = document.createElementNS(SVGNS, "radialGradient");
    grad.setAttribute("id", "poolGrad");
    grad.setAttribute("cx", "50%");
    grad.setAttribute("cy", "50%");
    grad.setAttribute("r", "50%");
    [
      ["0%",   "rgba(250, 216, 138, 0.92)"],
      ["18%",  "rgba(250, 216, 138, 0.72)"],
      ["38%",  "rgba(245, 179, 71, 0.55)"],
      ["62%",  "rgba(212, 146, 58, 0.30)"],
      ["82%",  "rgba(180, 110, 40, 0.12)"],
      ["100%", "rgba(120, 70, 30, 0)"]
    ].forEach(s => {
      const stop = document.createElementNS(SVGNS, "stop");
      stop.setAttribute("offset", s[0]);
      stop.setAttribute("stop-color", s[1]);
      grad.appendChild(stop);
    });
    defs.appendChild(grad);

    // Secondary smaller bright center for pebble-glass concentric feel.
    const gradInner = document.createElementNS(SVGNS, "radialGradient");
    gradInner.setAttribute("id", "poolInner");
    gradInner.setAttribute("cx", "50%");
    gradInner.setAttribute("cy", "50%");
    gradInner.setAttribute("r", "50%");
    [
      ["0%",  "rgba(255, 232, 168, 0.55)"],
      ["35%", "rgba(255, 220, 140, 0.22)"],
      ["70%", "rgba(255, 200, 100, 0.05)"],
      ["100%","rgba(255, 200, 100, 0)"]
    ].forEach(s => {
      const stop = document.createElementNS(SVGNS, "stop");
      stop.setAttribute("offset", s[0]);
      stop.setAttribute("stop-color", s[1]);
      gradInner.appendChild(stop);
    });
    defs.appendChild(gradInner);

    // Edge vignette to hold the corners dark.
    const vGrad = document.createElementNS(SVGNS, "radialGradient");
    vGrad.setAttribute("id", "vignette");
    vGrad.setAttribute("cx", "50%");
    vGrad.setAttribute("cy", "50%");
    vGrad.setAttribute("r", "75%");
    [
      ["0%",   "rgba(10, 6, 4, 0)"],
      ["55%",  "rgba(10, 6, 4, 0)"],
      ["80%",  "rgba(10, 6, 4, 0.55)"],
      ["100%", "rgba(10, 6, 4, 0.92)"]
    ].forEach(s => {
      const stop = document.createElementNS(SVGNS, "stop");
      stop.setAttribute("offset", s[0]);
      stop.setAttribute("stop-color", s[1]);
      vGrad.appendChild(stop);
    });
    defs.appendChild(vGrad);

    // ---- Brick wall (deterministic) ----
    const rand = mulberry32(SEED);
    wallGroup = document.createElementNS(SVGNS, "g");
    svg.appendChild(wallGroup);

    const W = dims.w, H = dims.h;
    // Brick size scales mildly with viewport for mobile readability.
    const baseBrickH = Math.max(22, Math.min(38, Math.round(H / 22)));
    const brickH = baseBrickH;
    const brickW = Math.round(brickH * 2.35);
    const mortar = Math.max(2, Math.round(brickH * 0.13));

    const courseCount = Math.ceil(H / (brickH + mortar)) + 2;
    const colCount = Math.ceil(W / (brickW + mortar)) + 2;

    // Mortar base background.
    const bg = document.createElementNS(SVGNS, "rect");
    bg.setAttribute("x", 0);
    bg.setAttribute("y", 0);
    bg.setAttribute("width", W);
    bg.setAttribute("height", H);
    bg.setAttribute("fill", "#8a7e6c");
    wallGroup.appendChild(bg);

    for (let row = 0; row < courseCount; row++) {
      const y = row * (brickH + mortar) - mortar;
      const offset = (row % 2 === 0) ? 0 : -Math.round(brickW / 2);
      for (let col = -1; col < colCount; col++) {
        const x = col * (brickW + mortar) + offset;
        // Per-brick width jitter (subtle).
        const wJ = Math.round((rand() - 0.5) * (brickW * 0.05));
        const hJ = Math.round((rand() - 0.5) * (brickH * 0.08));
        const bw = brickW + wJ;
        const bh = brickH + hJ;

        // Color pick + jitter.
        const base = brickPalette[Math.floor(rand() * brickPalette.length)];
        const r = jitter(base[0], 14, rand);
        const g = jitter(base[1], 10, rand);
        const b = jitter(base[2], 9, rand);

        const brick = document.createElementNS(SVGNS, "rect");
        brick.setAttribute("x", x);
        brick.setAttribute("y", y);
        brick.setAttribute("width", bw);
        brick.setAttribute("height", bh);
        brick.setAttribute("fill", rgb(r, g, b));
        wallGroup.appendChild(brick);

        // Top highlight (thin, faint warm edge — kiln-fired face).
        const topHi = document.createElementNS(SVGNS, "rect");
        topHi.setAttribute("x", x);
        topHi.setAttribute("y", y);
        topHi.setAttribute("width", bw);
        topHi.setAttribute("height", 1);
        topHi.setAttribute("fill", "rgba(255, 210, 150, 0.06)");
        wallGroup.appendChild(topHi);

        // Bottom recess shadow.
        const botSh = document.createElementNS(SVGNS, "rect");
        botSh.setAttribute("x", x);
        botSh.setAttribute("y", y + bh - 1);
        botSh.setAttribute("width", bw);
        botSh.setAttribute("height", 1);
        botSh.setAttribute("fill", "rgba(58, 36, 24, 0.55)");
        wallGroup.appendChild(botSh);

        // Occasional pock — a darker speck on the brick face.
        if (rand() < 0.18) {
          const pock = document.createElementNS(SVGNS, "circle");
          pock.setAttribute("cx", x + rand() * bw);
          pock.setAttribute("cy", y + rand() * bh);
          pock.setAttribute("r", 0.7 + rand() * 1.1);
          pock.setAttribute("fill", "rgba(30, 16, 10, 0.42)");
          wallGroup.appendChild(pock);
        }
      }
    }

    // ---- Light projection layer ----
    lightGroup = document.createElementNS(SVGNS, "g");
    lightGroup.setAttribute("style", "mix-blend-mode: screen;");
    svg.appendChild(lightGroup);

    pools = [];
    // Four pebble-glass panels of the Sentinel.
    // Each pool has: base angle around lantern hook, base distance, ellipse radii, wobble phase.
    const baseRadius = Math.hypot(W, H) * 0.52;
    const panelAngles = [22, 58, 96, 134]; // degrees, measured from the lantern.
    for (let i = 0; i < 4; i++) {
      const poolOuter = document.createElementNS(SVGNS, "ellipse");
      const rx = Math.max(W, H) * (0.28 + (i * 0.012));
      const ry = Math.max(W, H) * (0.22 + (i * 0.009));
      poolOuter.setAttribute("rx", rx);
      poolOuter.setAttribute("ry", ry);
      poolOuter.setAttribute("fill", "url(#poolGrad)");
      lightGroup.appendChild(poolOuter);

      const poolInner = document.createElementNS(SVGNS, "ellipse");
      poolInner.setAttribute("rx", rx * 0.55);
      poolInner.setAttribute("ry", ry * 0.5);
      poolInner.setAttribute("fill", "url(#poolInner)");
      lightGroup.appendChild(poolInner);

      pools.push({
        outer: poolOuter,
        inner: poolInner,
        rx: rx,
        ry: ry,
        baseAngle: panelAngles[i],
        baseDistance: baseRadius * (0.78 + i * 0.04),
        wobblePhase: i * 1.31 + 0.4,
        driftPhase: i * 0.77
      });
    }

    // ---- Dust motes ----
    moteGroup = document.createElementNS(SVGNS, "g");
    svg.appendChild(moteGroup);

    motes = [];
    const moteCount = 16;
    const moteRand = mulberry32(SEED ^ 0x4f8a);
    for (let i = 0; i < moteCount; i++) {
      const c = document.createElementNS(SVGNS, "circle");
      const r = 0.9 + moteRand() * 1.1;
      c.setAttribute("r", r);
      c.setAttribute("fill", "#fff4c8");
      c.setAttribute("opacity", 0.2);
      moteGroup.appendChild(c);
      motes.push({
        el: c,
        x: moteRand() * W,
        y: moteRand() * H,
        vx: (moteRand() - 0.5) * 0.6,
        vy: (moteRand() - 0.5) * 0.4 + 0.08,
        baseR: r,
        isStraw: (i === 7) // the Krenzler-coat mote
      });
    }

    // ---- Vignette on top ----
    vignetteGroup = document.createElementNS(SVGNS, "g");
    const vrect = document.createElementNS(SVGNS, "rect");
    vrect.setAttribute("x", 0);
    vrect.setAttribute("y", 0);
    vrect.setAttribute("width", W);
    vrect.setAttribute("height", H);
    vrect.setAttribute("fill", "url(#vignette)");
    vignetteGroup.appendChild(vrect);
    svg.appendChild(vignetteGroup);
  }

  buildScene();

  // ---- Animation state ----
  // The lantern hangs just outside the upper-left of the viewport.
  function lanternPos() {
    return { x: -dims.w * 0.05, y: -dims.h * 0.06 };
  }

  let rotation = 0;            // degrees, accumulating
  let baseRate = 2.4;          // degrees / second
  let currentRate = baseRate;
  let lastTs = null;
  let elapsed = 0;             // seconds since load
  let cursor = { x: 0, y: 0, active: false };

  window.addEventListener("mousemove", function (e) {
    cursor.x = e.clientX;
    cursor.y = e.clientY;
    cursor.active = true;
  }, { passive: true });

  window.addEventListener("mouseleave", function () {
    cursor.active = false;
  });

  window.addEventListener("touchmove", function (e) {
    if (e.touches && e.touches[0]) {
      cursor.x = e.touches[0].clientX;
      cursor.y = e.touches[0].clientY;
      cursor.active = true;
    }
  }, { passive: true });

  function targetRateFromCursor() {
    if (!cursor.active) return baseRate;
    const lp = lanternPos();
    const dx = cursor.x - lp.x;
    const dy = cursor.y - lp.y;
    const dist = Math.hypot(dx, dy);
    const diag = Math.hypot(dims.w, dims.h);
    // Normalize: 0 at lantern, 1 at far diagonal.
    const t = Math.min(1, dist / diag);
    // Upper-left → slightly faster (baseRate at exact lantern,
    // but as you move slightly inside the viewport away from corner,
    // it speeds up). Lower-right → slows down.
    // Range: 1.8 to 3.0
    const minRate = 1.8;
    const maxRate = 3.0;
    // Smooth curve: ease.
    const eased = 1 - t;
    const candidate = minRate + (maxRate - minRate) * eased;
    // Pin to exactly baseRate when essentially at the lantern.
    if (dist < 18) return baseRate;
    return candidate;
  }

  function tick(ts) {
    if (lastTs == null) lastTs = ts;
    const dt = Math.min(0.08, (ts - lastTs) / 1000); // clamp on tab-resume
    lastTs = ts;
    elapsed += dt;

    // Smoothly interpolate the rotation rate toward the cursor target.
    const target = targetRateFromCursor();
    currentRate += (target - currentRate) * Math.min(1, dt * 1.4);

    rotation += currentRate * dt;

    // Flame flicker: 1.2 Hz, 4-6% amplitude.
    const flickerAmp = 0.04 + 0.01 * Math.sin(elapsed * 0.7);
    const flicker = 1 - flickerAmp * (0.5 + 0.5 * Math.sin(elapsed * 2 * Math.PI * 1.2));

    // Long slow reservoir dim across each 150s cycle (≤1.5%).
    const cyclePhase = (rotation % 360) / 360; // 0..1 per revolution
    const reservoirDim = 1 - 0.015 * cyclePhase;

    // Very slow lantern sway on its hook — full drift every ~8 min.
    const swayT = elapsed / 480; // 8 minutes
    const swayAngle = Math.sin(swayT * 2 * Math.PI) * 0.9; // degrees
    const swayRadius = Math.cos(swayT * 2 * Math.PI * 0.7) * 6;

    const lp = lanternPos();

    // Place each pool.
    for (let i = 0; i < pools.length; i++) {
      const p = pools[i];
      // Per-pool independent wobble (±0.4 deg secondary drift, slow).
      const wobble = Math.sin(elapsed * 0.31 + p.wobblePhase) * 0.4 +
                     Math.sin(elapsed * 0.13 + p.driftPhase) * 0.25;
      const angleDeg = p.baseAngle + rotation + swayAngle + wobble;
      const angleRad = angleDeg * Math.PI / 180;
      const dist = p.baseDistance + swayRadius +
                   Math.sin(elapsed * 0.09 + p.driftPhase) * 6;

      const cx = lp.x + Math.cos(angleRad) * dist;
      const cy = lp.y + Math.sin(angleRad) * dist;

      p.outer.setAttribute("cx", cx);
      p.outer.setAttribute("cy", cy);
      p.inner.setAttribute("cx", cx);
      p.inner.setAttribute("cy", cy);

      // Rotate each ellipse so its long axis points away from the lantern,
      // giving the projection an honest panel-shape.
      const rotAngle = angleDeg;
      p.outer.setAttribute("transform",
        "rotate(" + rotAngle + " " + cx + " " + cy + ")");
      p.inner.setAttribute("transform",
        "rotate(" + rotAngle + " " + cx + " " + cy + ")");
    }

    // Global brightness via opacity on the light layer.
    const lightOpacity = Math.max(0.6, Math.min(1, flicker * reservoirDim));
    lightGroup.setAttribute("opacity", lightOpacity);

    // ---- Motes ----
    // Wildcard: exactly once every 17 minutes (1020s) the straw-chaff mote
    // brightens for ~3s as it crosses the brightest pool.
    const wildPeriod = 17 * 60;
    const wildPhase = elapsed % wildPeriod;
    const strawGleam = (wildPhase < 3) ? (1 - wildPhase / 3) : 0;

    for (let i = 0; i < motes.length; i++) {
      const m = motes[i];
      m.x += m.vx;
      m.y += m.vy;
      // Re-spawn off-edge motes on the opposite side.
      if (m.x < -4) m.x = dims.w + 2;
      if (m.x > dims.w + 4) m.x = -2;
      if (m.y < -4) m.y = dims.h + 2;
      if (m.y > dims.h + 4) m.y = -2;

      // Sample brightness at mote: distance to nearest pool center,
      // compared to pool radii.
      let brightest = 0;
      for (let j = 0; j < pools.length; j++) {
        const p = pools[j];
        const pcx = parseFloat(p.outer.getAttribute("cx"));
        const pcy = parseFloat(p.outer.getAttribute("cy"));
        const dx = (m.x - pcx) / p.rx;
        const dy = (m.y - pcy) / p.ry;
        const d = Math.sqrt(dx * dx + dy * dy);
        const b = Math.max(0, 1 - d); // 1 at center, 0 at rim
        if (b > brightest) brightest = b;
      }
      // Map brightness to opacity: 0.15 in shadow → 0.7 in bright pool.
      let op = 0.15 + brightest * 0.55;
      let r = m.baseR;

      if (m.isStraw && strawGleam > 0 && brightest > 0.35) {
        op = Math.max(op, 0.55 + strawGleam * 0.4);
        r = m.baseR * (1 + strawGleam * 0.9);
      }

      m.el.setAttribute("cx", m.x);
      m.el.setAttribute("cy", m.y);
      m.el.setAttribute("opacity", op);
      m.el.setAttribute("r", r);
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  // Rebuild scene on resize, preserving the deterministic wall.
  let resizeTimer = null;
  window.addEventListener("resize", function () {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      dims = sizeViewBox();
      buildScene();
    }, 160);
  });

  // A quiet note in the console, for anyone who looks.
  // (Not visible on the page.)
  try {
    console.log("%c the engine is out. the wick is lit. the wall is being lit.",
      "color:#f5b347;font-family:Georgia,serif;font-style:italic");
  } catch (e) {}
})();
</script>
