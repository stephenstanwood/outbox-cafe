  <meta name="outbox-spec-era" content="1953 — peak American Pacific Northwest amateur-meteorologist coastal-fog-watching summer, the very specific late-July moment when retired Coast Guard signalman Mr. Harlan Vestergaard, age 64, of 217 Cape Foulweather Road in Depoe Bay Oregon (forty-one years with the Coast Guard, retired in 1948 after serving as the senior signalman at the Yaquina Head light station from 1929 through 1948, never-married, lives alone in a small frame cottage on the bluff above the Pacific that he built himself in 1949 with his retirement savings, keeps a small workshop in the converted garage where he repairs barometers and aneroid altimeters for the regional commercial-fishing fleet as a small private business that brings in roughly $40 a month in cash and gives him reason to keep his hand in) sat at his bluff-window kitchen table on the morning of Tuesday July 14, 1953, between 5:14am and 7:42am, watching the very specific summer Pacific advection-fog bank rolling in off the cold California Current and lifting up the headland in slow patient horizontal sheets that caught the rising sun's low-angle light at exactly the wavelengths that produced the brief and locally-remarked phenomenon of pearl-iridescent fog-bow halos along the bank's leading edge; the entire small private hobby-meteorological practice of one retired signalman keeping a continuous fog-observation ledger across the five years of his retirement, with each morning's fog-bank arrival time logged to the minute, the bank's height estimated against the lighthouse for scale, the visibility distance measured in cable-lengths the way he learned in 1908, the barometric pressure read from the brass aneroid he serviced himself, the wind direction estimated from the salal bushes outside the kitchen window, and a small notation about the quality of the fog-bow if one appeared — the entire ledger building toward a private contribution to the U.S. Weather Bureau's Pacific Coastal Fog Census that the Bureau's Portland office had quietly invited Mr. Vestergaard to participate in after meeting him at the 1951 Newport Lighthouse Open House, and his patient five-year compilation of the fog-bank arrival data that he was planning to mail to the Bureau's chief meteorologist Mr. Frances Reichelderfer in October 1953 along with his hand-mixed watercolor swatch-record of fourteen specific fog-bow halos he had observed across the four previous summers.">
  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece rendered entirely in pure CSS and SVG with no UI text and no controls anywhere: the entire browser window IS the view from Mr. Vestergaard's bluff-window kitchen table looking west-northwest out across the Pacific at 6:08am on Tuesday July 14, 1953, as the advection fog-bank lifts up the headland in slow horizontal sheets and the rising sun catches the bank's leading edge at the precise low angle that produces a pearl-iridescent fog-bow halo. The piece is a continuous deterministic 38-minute generative cycle in which the fog-bank rolls in from the lower-left of the viewport across the dark cold-Pacific water in slow horizontal sheets at approximately 4 pixels per second, lifts up the basalt headland silhouette along the right edge of the viewport, and gradually fills the lower two-thirds of the viewport with successive translucent layers of pearl-gray fog (each layer rendered as a slowly-moving SVG path with subtle opacity variation and a slight vertical sinusoidal sway suggesting the bank's continuous internal turbulence), while the upper third remains the pre-dawn coastal sky shifting from indigo-violet through dusty rose-mauve into warm low-horizon ochre at the precise 6:14am sunrise moment when the first direct sunlight catches the fog-bank's upper edge and a soft pearl-iridescent fog-bow halo blooms along the leading edge as a curved 140-degree arc of barely-saturated rainbow-spectrum colors (warm coral-amber at the outer edge fading through soft butter-yellow through pearl-cream through dusty sage-green through cool dusty-violet at the inner edge, each color band only 4-7% saturation against the gray fog, the entire arc spanning approximately 280 pixels of the viewport at peak). The fog-bow appears at the 6:14am sunrise moment in the cycle and remains visible for approximately 11 minutes before the sun's angle climbs high enough to dissipate it; during this 11-minute wind bow dissipation through the 6:28am full-light fog-bank still lifting toward the 7:14am cycle-conclusion when the upper bank begins thinning and the rising sun starts burning through, then loops smoothly back to 5:50am for the next cycle. The lighthouse silhouette and the kitchen-window-sill shadow never move; the fog-bank and the moisture droplets and the sky gradient continuously evolve; the piece runs forever; the visitor sits at Mr. Vestergaard's kitchen table watching one specific Tuesday morning's fog-bow that a retired Coast Guard signalman logged in his ledger in fountain-pen ink with the small notation 'fog-bow 6:14 — peak saturation 6:19 — finest example since June 27 1951 — wind W by SW at perhaps 6 knots — barometer 30.04 falling slightly.'">
  <meta name="outbox-spec-subject" content="The single specific 38-minute advection-fog-bank arrival and pearl-iridescent fog-bow observation of Tuesday July 14, 1953, between 5:50am and 7:14am Pacific Standard Time, as seen from Mr. Harlan Vestergaard's bluff-window kitchen table at 217 Cape Foulweather Road in Depoe Bay Oregon — Mr. Vestergaard himself, age 64, retired Coast Guard senior signalman of Yaquina Head light station 1929-1948, never-married, living since his retirement in a small frame cottage on the bluff he built himself in 1949, keeper since June 1948 of a continuous fog-observation ledger in a clothbound Coast & Geodetic Survey ledger book left over from his last year at the lighthouse, in which he has logged across five summers approximately 1,847 individual fog-bank arrivals along the central Oregon coast at this specific bluff position, each entry recording the bank's arrival time to the minute, its height estimated against the 93-foot Yaquina Head tower for scale, the visibility reduction in cable-lengths, the barometer reading, the wind direction and estimated speed, and any unusual optical phenomena observed (fog-bows, glories, halos, brocken-spectres, the brief horizontal mirages he calls 'Fata Bremerton' in his private notation after the Coast Guard cutter that he had seen them best from); the specific fourteen-page sub-record across his ledger documenting the rare pearl-iridescent fog-bow halos that appear at the bank's leading edge during a narrow set of conditions (sun angle below 14 degrees above horizon, fog-droplet size in the 12-18 micron range, viewer position elevated above the bank's lower margin), each fog-bow entry accompanied by a hand-mixed Winsor & Newton watercolor swatch of the specific saturation gradient he observed; his quiet patient understanding that his fog-bow observation work is a small private contribution to the U.S. Weather Bureau's Pacific Coastal Fog Census that Mr. Reichelderfer's office in Portland had invited him to join after the 1951 Newport Lighthouse Open House where Mr. Vestergaard had described his earliest fog-bow log to the visiting Weather Bureau staff meteorologist Miss Eleanor Krzepiewski (age 34, the first woman regional meteorologist in the Bureau's Pacific Northwest district, who had taken his ledger pages back to Portland and read them carefully and written back in October 1951 inviting him to formally contribute) and his decision that the careful fog-bow witness of his retirement years is honest small civic-scientific work worth doing carefully; the specific Tuesday morning of July 14, 1953, when the advection-fog bank lifted up the headland at 5:58am as he had predicted from yesterday's barometer trend, the sun rose at exactly 6:14am with a low-angle direct light, and the fog-bow bloomed along the bank's leading edge at the precise 6:19am peak-saturation moment that Mr. Vestergaard recognized as one of the finest examples he had observed in five summers — the moment he reached for his Winsor & Newton pan-set on the windowsill and his clean #4 sable brush and a fresh ledger page and began mixing the warm coral-amber swatch he would caption 'July 14 1953 — 6:19am — pearl iridescent — bow span 140 degrees — outer band coral-amber — finest since June 27 1951 — wind W by SW 6 knots — barometer 30.04 falling.'">

  <meta name="outbox-spec-wildcard" content="Exactly once per 38-minute cycle, at exactly t=0.763 (the 6:19am peak fog-bow saturation moment), one specific moisture droplet drifting through the fog-bow refraction zone produces a markedly more saturated and longer-duration iridescent flare than the others — a 2.8-second slow pearl-bloom at full 0.85 opacity instead of the standard 0.4-second flare at 0.7 opacity — and the droplet's color cycles through all five fog-bow band colors in sequence (warm coral-amber to butter-yellow to pearl-cream to dusty sage-green to cool dusty-violet) over its bloom duration before fading back to its ambient pearl-cream and continuing its drift off the right edge. This is the specific droplet whose unusual brightness Mr. Vestergaard noted in his July 14 1953 ledger entry with the small fountain-pen annotation 'one droplet at peak held the bow's full color longer than the others — I have seen this perhaps four times in five summers — the optical condition for it occurs only at the precise instant the sun's azimuth crosses the bow's central radius and the droplet sits within 0.4 micrometers of the optimum refraction diameter — Miss Krzepiewski will want to know about this one, I shall describe it in my October mailing along with the watercolor swatch.' The visitor is given no indication this is happening, no acknowledgment in any UI, no reward for noticing — just the quiet fact that on this particular frame of this particular cycle, one droplet in the fog-bow held all five colors at once because a 64-year-old retired Coast Guard signalman noticed it on a Tuesday morning in 1953 and mixed a watercolor swatch to match it for the Weather Bureau's Pacific Coastal Fog Census.">

    <g id="fogLayers"></g>

    <!-- FOG-BOW ARC (group of 5 color paths) -->
    <g id="fogBow" opacity="0" filter="url(#bowBlur)">
      <!-- outer (coral-amber) to inner (dusty violet); arc center off-screen below -->
      <!-- 140 deg arc spanning approx the bank's leading edge -->
    </g>

    <!-- MOISTURE DROPLETS (filled by JS) -->
    <g id="droplets"></g>

    <!-- WILDCARD DROPLET (extra-saturated, separate group) -->
    <g id="wildDroplet" opacity="0">
      <circle id="wildCore" cx="0" cy="0" r="3" fill="url(#dropletGlow)"/>
      <circle id="wildBloom" cx="0" cy="0" r="9" fill="url(#dropletGlow)" opacity="0.6"/>
    </g>

    <!-- kitchen-window sill foreground -->
    <g id="sill" opacity="0.94">
      <!-- shadow under sill -->
      <rect x="0" y="828" width="1600" height="72" fill="#3a2418" opacity="0.22"/>
      <rect x="0" y="822" width="1600" height="14" fill="#2a180e" opacity="0.35"/>
      <!-- ledger book, lower-left -->
      <g id="ledger" transform="translate(120, 830)">
        <rect x="0" y="0" width="240" height="56" fill="#5a4a3a" opacity="0.55"/>
        <rect x="6" y="6" width="228" height="44" fill="url(#ledgerPaper)" opacity="0.4"/>
        <!-- watercolor swatch on the page -->
        <rect x="180" y="14" width="42" height="26" fill="#e8a878" opacity="0.6"/>
        <rect x="180" y="14" width="42" height="6" fill="#f5d894" opacity="0.7"/>
        <rect x="180" y="20" width="42" height="6" fill="#f0e8d4" opacity="0.65"/>
        <rect x="180" y="26" width="42" height="6" fill="#a8c4a8" opacity="0.55"/>
        <rect x="180" y="32" width="42" height="6" fill="#a89ac4" opacity="0.6"/>
        <!-- ledger script lines -->
        <line x1="14" y1="16" x2="170" y2="16" stroke="#2a1e10" stroke-width="0.6" opacity="0.7"/>
        <line x1="14" y1="24" x2="160" y2="24" stroke="#2a1e10" stroke-width="0.6" opacity="0.6"/>
        <line x1="14" y1="32" x2="172" y2="32" stroke="#2a1e10" stroke-width="0.6" opacity="0.6"/>
        <line x1="14" y1="40" x2="154" y2="40" stroke="#2a1e10" stroke-width="0.6" opacity="0.55"/>
        <!-- a fountain pen lying across the ledger -->
        <g transform="translate(20, 44) rotate(-12)">
          <rect x="0" y="0" width="118" height="6" fill="#1c2a5e" opacity="0.85"/>
          <rect x="118" y="1.2" width="14" height="3.6" fill="#b8a05c" opacity="0.85"/>
          <polygon points="132,1.2 142,3 132,4.8" fill="#1c1c20" opacity="0.85"/>
        </g>
      </g>
      <!-- brass aneroid barometer, lower-right -->
      <g id="barometer" transform="translate(1410, 826)">
        <circle cx="60" cy="40" r="46" fill="#b88838" opacity="0.85"/>
        <circle cx="60" cy="40" r="42" fill="#1a1612" opacity="0.55"/>
        <circle cx="60" cy="40" r="40" fill="#e8d8a8" opacity="0.6"/>
        <!-- dial tick marks -->
        <g stroke="#1a1612" stroke-width="0.8" opacity="0.85">
          <line x1="60" y1="5"  x2="60" y2="10"/>
          <line x1="92" y1="20" x2="89" y2="24"/>
          <line x1="95" y1="40" x2="90" y2="40"/>
          <line x1="92" y1="60" x2="89" y2="56"/>
          <line x1="60" y1="75" x2="60" y2="70"/>
          <line x1="28" y1="60" x2="31" y2="56"/>
          <line x1="25" y1="40" x2="30" y2="40"/>
          <line x1="28" y1="20" x2="31" y2="24"/>
        </g>
        <!-- needle -->
        <g id="needle" transform="rotate(-12, 60, 40)">
          <line x1="60" y1="40" x2="60" y2="12" stroke="#2a1818" stroke-width="1.4"/>
          <circle cx="60" cy="40" r="3" fill="#1a1612"/>
        </g>
      </g>
    </g>
  </svg>
</div>

<a class="archive-link" href="/archive" aria-label="archive">other mornings</a>

<script>
(function () {
  'use strict';

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('scene');
  const fogLayersG = document.getElementById('fogLayers');
  const dropletsG = document.getElementById('droplets');
  const fogBowG = document.getElementById('fogBow');
  const wildDroplet = document.getElementById('wildDroplet');
  const wildCore = document.getElementById('wildCore');
  const wildBloom = document.getElementById('wildBloom');
  const lightLamp = document.getElementById('lightLamp');
  const lightHalo = document.getElementById('lightHalo');
  const needle = document.getElementById('needle');
  const ledger = document.getElementById('ledger');
  const haloRect = document.getElementById('haloRect');
  const haloIn = document.getElementById('haloIn');
  const haloMid = document.getElementById('haloMid');

  const skyStops = {
    top:    document.getElementById('skyTop'),
    mid:    document.getElementById('skyMid'),
    hor:    document.getElementById('skyHor'),
    horLow: document.getElementById('skyHorLow'),
    base:   document.getElementById('skyBase')
  };

  const VB_W = 1600;
  const VB_H = 900;

  // 38-minute cycle in seconds
  const CYCLE_SECONDS = 38 * 60;
  const startMs = performance.now();

  // ─── deterministic seeded RNG ──────────────────────────────────────────────
  let seed = 0x68617220; // "har "
  function rand() {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 4294967296;
  }
  function randRange(a, b) { return a + rand() * (b - a); }

  // ─── KEYFRAMES (5 states across the cycle) ─────────────────────────────────
  // t=0      5:50am pre-dawn
  // t=0.474  6:08am horizon warming  (18 min in)
  // t=0.632  6:14am sunrise           (24 min in)
  // t=0.763  6:19am peak fog-bow      (29 min in)
  // t=1.0    7:14am full morning      (38 min in)

  const KEYS = [
    { t: 0.0, top: '#1c1e3a', mid: '#2a2c4a', hor: '#3a3552', horLow: '#4a3a52', base: '#5e4a5a' },
    { t: 0.474, top: '#2a2a4a', mid: '#4a3a5a', hor: '#7a5e74', horLow: '#a87060', base: '#c98060' },
    { t: 0.632, top: '#3a3a58', mid: '#7a5e74', hor: '#c98060', horLow: '#e8826a', base: '#f5a878' },
    { t: 0.763, top: '#5a5a78', mid: '#a87a8a', hor: '#d49a48', horLow: '#e8a878', base: '#f5d89a' },
    { t: 1.0,   top: '#7e94b0', mid: '#a8b4c8', hor: '#c4cad4', horLow: '#dad4cc', base: '#e8dcc8' }
  ];

  function hex2rgb(h) {
    h = h.replace('#', '');
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }
  function rgb2css(r) { return 'rgb(' + (r[0]|0) + ',' + (r[1]|0) + ',' + (r[2]|0) + ')'; }
  function lerp(a, b, k) { return a + (b - a) * k; }
  function lerpRgb(a, b, k) { return [lerp(a[0],b[0],k), lerp(a[1],b[1],k), lerp(a[2],b[2],k)]; }
  function easeInOut(k) { return k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2; }

  function skyAt(t) {
    let i = 0;
    for (let j = 0; j < KEYS.length - 1; j++) {
      if (t >= KEYS[j].t && t <= KEYS[j+1].t) { i = j; break; }
    }
    const a = KEYS[i], b = KEYS[i+1];
    const span = b.t - a.t;
    const local = span === 0 ? 0 : easeInOut((t - a.t) / span);
    return {
      top:    rgb2css(lerpRgb(hex2rgb(a.top),    hex2rgb(b.top),    local)),
      mid:    rgb2css(lerpRgb(hex2rgb(a.mid),    hex2rgb(b.mid),    local)),
      hor:    rgb2css(lerpRgb(hex2rgb(a.hor),    hex2rgb(b.hor),    local)),
      horLow: rgb2css(lerpRgb(hex2rgb(a.horLow), hex2rgb(b.horLow), local)),
      base:   rgb2css(lerpRgb(hex2rgb(a.base),   hex2rgb(b.base),   local))
    };
  }

  // ─── FOG LAYERS ────────────────────────────────────────────────────────────
  const FOG_LAYERS = 14;
  const fogLayers = [];

  function buildFogPath(yBase, amp, segWidth, phase) {
    // wave-shaped fog band: 2x viewport wide so it can scroll
    const totalW = VB_W * 2;
    const segs = Math.ceil(totalW / segWidth);
    let d = 'M -200 ' + (yBase + 200) + ' L -200 ' + yBase + ' ';
    let x = -200;
    for (let i = 0; i <= segs; i++) {
      const y1 = yBase + Math.sin((i + phase) * 0.6) * amp + Math.sin((i + phase) * 0.23) * amp * 0.4;
      const y2 = yBase + Math.sin((i + phase + 0.5) * 0.6) * amp + Math.sin((i + phase + 0.5) * 0.23) * amp * 0.4;
      const cx1 = x + segWidth * 0.5;
      const cx2 = x + segWidth;
      d += 'Q ' + cx1 + ' ' + y1 + ' ' + cx2 + ' ' + y2 + ' ';
      x += segWidth;
    }
    d += 'L ' + x + ' ' + (yBase + 600) + ' Z';
    return d;
  }

  for (let i = 0; i < FOG_LAYERS; i++) {
    const yBase = 380 + i * 28 + randRange(-12, 12);
    const amp = randRange(10, 28);
    const segW = randRange(90, 170);
    const phase = randRange(0, 100);
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', buildFogPath(yBase, amp, segW, phase));
    const baseGray = 168 + (i * 2);
    path.setAttribute('fill', 'rgb(' + baseGray + ',' + (baseGray + 8) + ',' + (baseGray + 10) + ')');
    path.setAttribute('opacity', '0.2');
    fogLayersG.appendChild(path);
    fogLayers.push({
      el: path,
      yBase: yBase,
      vel: randRange(3.2, 4.8),
      swayAmp: randRange(2, 4),
      swayPeriod: randRange(18, 32),
      phaseOffset: randRange(0, Math.PI * 2),
      x: 0,
      baseOpacity: randRange(0.15, 0.55),
      densityBand: i / FOG_LAYERS
    });
  }

  // ─── FOG BOW ARC (5 color bands) ───────────────────────────────────────────
  // arc center somewhere off-screen; we draw 5 concentric arcs with band-stroke
  const BOW_BANDS = [
    { color: '#e8a878', maxOpacity: 0.32 }, // outer coral-amber
    { color: '#f5d894', maxOpacity: 0.28 },
    { color: '#f0e8d4', maxOpacity: 0.34 },
    { color: '#a8c4a8', maxOpacity: 0.26 },
    { color: '#a89ac4', maxOpacity: 0.30 }  // inner dusty violet
  ];
  // arc center: below viewport, slightly right
  const BOW_CX = 740;
  const BOW_CY = 1280;
  const BOW_R_OUTER = 880;
  const BOW_BAND_W = 14;
  // 140-deg arc, centered upward (i.e. from angle 200 deg to angle 340 deg)
  function arcPath(cx, cy, r, a0deg, a1deg) {
    const a0 = a0deg * Math.PI / 180;
    const a1 = a1deg * Math.PI / 180;
    const x0 = cx + r * Math.cos(a0);
    const y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1);
    const y1 = cy + r * Math.sin(a1);
    const large = (a1deg - a0deg) > 180 ? 1 : 0;
    return 'M ' + x0 + ' ' + y0 + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x1 + ' ' + y1;
  }
  for (let i = 0; i < BOW_BANDS.length; i++) {
    const r = BOW_R_OUTER - i * BOW_BAND_W;
    const p = document.createElementNS(NS, 'path');
    p.setAttribute('d', arcPath(BOW_CX, BOW_CY, r, 200, 340));
    p.setAttribute('stroke', BOW_BANDS[i].color);
    p.setAttribute('stroke-width', String(BOW_BAND_W + 2));
    p.setAttribute('fill', 'none');
    p.setAttribute('opacity', '0');
    p.setAttribute('stroke-linecap', 'round');
    fogBowG.appendChild(p);
    BOW_BANDS[i].el = p;
  }

  // ─── DROPLETS ──────────────────────────────────────────────────────────────
  const DROPLET_COUNT = 220;
  const droplets = [];
  for (let i = 0; i < DROPLET_COUNT; i++) {
    const c = document.createElementNS(NS, 'circle');
    const r = randRange(1.2, 3.4);
    c.setAttribute('r', String(r));
    c.setAttribute('fill', 'url(#dropletGlow)');
    c.setAttribute('opacity', '0.35');
    dropletsG.appendChild(c);
    droplets.push({
      el: c,
      x: randRange(0, VB_W),
      y: randRange(380, 820),
      r: r,
      vel: randRange(2.4, 5.2),
      swayAmp: randRange(1.2, 2.4),
      swayPeriod: randRange(24, 48),
      phaseOffset: randRange(0, Math.PI * 2),
      flareUntil: 0,
      flareColor: '#f5e8c8'
    });
  }

  // ─── WILDCARD droplet state ────────────────────────────────────────────────
  const wildState = { active: false, startT: -1, x: 0, y: 0, vel: 3.8 };

  // ─── CURSOR (sea-breeze nudge) ─────────────────────────────────────────────
  const cursor = { x: -9999, y: -9999, vbX: -9999, vbY: -9999 };
  function updateCursorVB() {
    if (cursor.x < 0) { cursor.vbX = -9999; return; }
    const rect = svg.getBoundingClientRect();
    cursor.vbX = ((cursor.x - rect.left) / rect.width) * VB_W;
    cursor.vbY = ((cursor.y - rect.top) / rect.height) * VB_H;
  }
  window.addEventListener('mousemove', function (e) {
    cursor.x = e.clientX; cursor.y = e.clientY; updateCursorVB();
  });
  window.addEventListener('mouseleave', function () {
    cursor.x = -9999; cursor.y = -9999; cursor.vbX = -9999; cursor.vbY = -9999;
  });
  window.addEventListener('touchmove', function (e) {
    if (e.touches && e.touches[0]) {
      cursor.x = e.touches[0].clientX; cursor.y = e.touches[0].clientY; updateCursorVB();
    }
  }, { passive: true });
  // also recompute on resize
  window.addEventListener('resize', updateCursorVB);

  function breezeFactor(x, y) {
    if (cursor.vbX < 0) return 1.0;
    const dx = x - cursor.vbX;
    const dy = y - cursor.vbY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const radius = 280; // viewBox units (~200px on a 1600-wide page)
    if (dist > radius) return 1.0;
    const k = 1 - (dist / radius);
    return 1.0 + 0.5 * k;
  }

  // ─── MAIN LOOP ─────────────────────────────────────────────────────────────
  let lastNow = performance.now();
  // breeze lag: smooth the breeze-applied velocity
  function step(now) {
    const dt = Math.min(0.1, (now - lastNow) / 1000);
    lastNow = now;
    const elapsed = (now - startMs) / 1000;
    const t = (elapsed % CYCLE_SECONDS) / CYCLE_SECONDS;

    // ── SKY ───────────────────────────────────────────────────────────────
    const sky = skyAt(t);
    skyStops.top.setAttribute('stop-color', sky.top);
    skyStops.mid.setAttribute('stop-color', sky.mid);
    skyStops.hor.setAttribute('stop-color', sky.hor);
    skyStops.horLow.setAttribute('stop-color', sky.horLow);
    skyStops.base.setAttribute('stop-color', sky.base);

    // ── HEADLAND HALO ─────────────────────────────────────────────────────
    // halo intensifies through sunrise -> peak bow, then softens
    let haloAmt = 0;
    if (t < 0.474) haloAmt = 0;
    else if (t < 0.632) haloAmt = (t - 0.474) / (0.632 - 0.474) * 0.6;
    else if (t < 0.763) haloAmt = 0.6 + (t - 0.632) / (0.763 - 0.632) * 0.4;
    else haloAmt = Math.max(0, 1.0 - (t - 0.763) / (1.0 - 0.763) * 0.8);
    haloRect.setAttribute('opacity', String(haloAmt * 0.45));
    // halo color shifts: amber -> coral -> pale
    const haloColor =
      t < 0.632 ? '#5a3a1a' :
      t < 0.763 ? '#a86840' :
      t < 0.85  ? '#d4906a' : '#d4b890';
    haloMid.setAttribute('stop-color', haloColor);
    haloMid.setAttribute('stop-opacity', '0.45');

    // ── LIGHTHOUSE PULSE (14s period) ─────────────────────────────────────
    const lighthousePhase = (elapsed % 14) / 14; // 0..1
    // brief flash near phase=0
    let lightAmt = 0;
    if (lighthousePhase < 0.08) {
      lightAmt = 1 - (lighthousePhase / 0.08);
    }
    // light is dimmer at midday-equivalent (later in cycle)
    const lightVisibility = t < 0.474 ? 1.0 : t < 0.763 ? 1.0 - (t - 0.474) * 1.6 : Math.max(0.15, 0.5 - (t - 0.763) * 0.6);
    lightLamp.setAttribute('opacity', String(lightAmt * 0.95 * Math.max(0.1, lightVisibility)));
    lightHalo.setAttribute('opacity', String(lightAmt * 0.55 * Math.max(0.1, lightVisibility)));

    // ── FOG LAYERS ────────────────────────────────────────────────────────
    // bank fills lower 2/3 across first 22min (t<0.579), thins last 8min (t>0.789)
    let fillAmt;
    if (t < 0.579) fillAmt = t / 0.579;
    else if (t < 0.789) fillAmt = 1.0;
    else fillAmt = Math.max(0, 1.0 - (t - 0.789) / 0.211);

    for (let i = 0; i < fogLayers.length; i++) {
      const f = fogLayers[i];
      // breeze nudge applied at layer's representative y
      const bf = breezeFactor(((-f.x) % VB_W + VB_W) % VB_W, f.yBase);
      f.x += f.vel * bf * dt * 8; // pixels per second of scroll
      if (f.x > VB_W) f.x -= VB_W;
      const sway = Math.sin(elapsed / f.swayPeriod * Math.PI * 2 + f.phaseOffset) * f.swayAmp;
      f.el.setAttribute('transform', 'translate(' + (-f.x) + ' ' + sway + ')');
      // opacity tied to fillAmt and the layer's natural opacity
      // lower layers (deeper i) appear earlier; upper layers thinner
      const layerArrival = i / FOG_LAYERS;
      const arrivalK = Math.min(1, Math.max(0, (fillAmt - layerArrival * 0.4) * 1.6));
      f.el.setAttribute('opacity', String(f.baseOpacity * arrivalK));
    }

    // ── FOG-BOW ARC ───────────────────────────────────────────────────────
    // appears at t=0.632 (sunrise), peaks t=0.763, fades to 0 by t=0.815
    let bowAmt = 0;
    if (t >= 0.632 && t < 0.763) {
      bowAmt = (t - 0.632) / (0.763 - 0.632);
    } else if (t >= 0.763 && t < 0.815) {
      bowAmt = 1 - (t - 0.763) / (0.815 - 0.763);
    }
    bowAmt = Math.max(0, Math.min(1, bowAmt));
    fogBowG.setAttribute('opacity', String(bowAmt));
    for (let i = 0; i < BOW_BANDS.length; i++) {
      BOW_BANDS[i].el.setAttribute('opacity', String(BOW_BANDS[i].maxOpacity));
    }

    // ── DROPLETS ──────────────────────────────────────────────────────────
    const bowActive = bowAmt > 0.05;
    const bowZoneYMin = 380, bowZoneYMax = 520;

    for (let i = 0; i < droplets.length; i++) {
      const d = droplets[i];
      const bf = breezeFactor(d.x, d.y);
      d.x += d.vel * bf * dt * 6;
      if (d.x > VB_W + 20) { d.x = -20; d.y = randRange(380, 820); }
      const sway = Math.sin(elapsed / d.swayPeriod * Math.PI * 2 + d.phaseOffset) * d.swayAmp;
      const drawY = d.y + sway;

      // color depending on altitude + cycle state
      let fillColor = '#dce4d8'; // upper pearl-cream default
      let opacityBase = 0.35;
      if (drawY > 660) {
        // warm horizon band droplets
        fillColor = t < 0.632 ? '#d4b48c' : '#f5c8a4';
        opacityBase = t < 0.474 ? 0.18 : 0.55;
      } else if (drawY > 500) {
        fillColor = t < 0.632 ? '#a8b0a8' : '#e8d4b8';
        opacityBase = t < 0.474 ? 0.18 : 0.4;
      } else {
        fillColor = t < 0.474 ? '#7a8088' : '#dce4d8';
        opacityBase = 0.4;
      }

      // flare if in bow-zone during bow window
      let flaring = false;
      if (bowActive && drawY > bowZoneYMin && drawY < bowZoneYMax) {
        // chance proportional to bowAmt; randomized timing
        if (d.flareUntil < elapsed) {
          if (Math.random() < 0.018 * bowAmt) {
            d.flareUntil = elapsed + 0.4;
            d.flareColor = ['#f5e8c8', '#f5d894', '#f0e8d4', '#a8c4a8'][Math.floor(Math.random() * 4)];
          }
        }
        if (d.flareUntil > elapsed) {
          flaring = true;
          fillColor = d.flareColor;
          opacityBase = 0.7;
        }
      }

      d.el.setAttribute('cx', String(d.x));
      d.el.setAttribute('cy', String(drawY));
      d.el.setAttribute('fill', flaring ? d.flareColor : 'url(#dropletGlow)');
      // color tint via stroke (radialGradient is white-based)
      if (flaring) {
        d.el.setAttribute('fill', fillColor);
      } else {
        d.el.setAttribute('fill', fillColor);
      }
      d.el.setAttribute('opacity', String(opacityBase * (0.6 + 0.4 * bowAmt + (drawY > 660 ? 0.2 : 0))));
    }

    // ── WILDCARD DROPLET ──────────────────────────────────────────────────
    // exactly once per cycle at t≈0.763, a single droplet does a 2.8s bloom
    // cycling through 5 colors then fading.
    const WILD_TRIGGER = 0.763;
    const WILD_DURATION_FRAC = 2.8 / CYCLE_SECONDS; // duration as fraction of cycle
    if (!wildState.active && t >= WILD_TRIGGER && t < WILD_TRIGGER + WILD_DURATION_FRAC * 2) {
      wildState.active = true;
      wildState.startT = elapsed;
      wildState.x = 540 + randRange(-40, 40);
      wildState.y = 440 + randRange(-12, 12);
      wildState.vel = 3.4;
    }
    // reset for next cycle
    if (t < 0.5) wildState.active = false;

    if (wildState.active) {
      const dur = elapsed - wildState.startT;
      if (dur >= 0 && dur <= 2.8) {
        const bf = breezeFactor(wildState.x, wildState.y);
        wildState.x += wildState.vel * bf * dt * 6;
        // 5-color sequence
        const stage = Math.min(4, Math.floor(dur / (2.8 / 5)));
        const colors = ['#e8a878', '#f5d894', '#f0e8d4', '#a8c4a8', '#a89ac4'];
        wildCore.setAttribute('fill', colors[stage]);
        wildBloom.setAttribute('fill', colors[stage]);
        // grow then fade
        const k = dur / 2.8;
        const op = Math.sin(k * Math.PI) * 0.85;
        wildDroplet.setAttribute('opacity', String(op));
        wildCore.setAttribute('r', String(3 + k * 2));
        wildBloom.setAttribute('r', String(10 + k * 14));
        wildDroplet.setAttribute('transform', 'translate(' + wildState.x + ' ' + wildState.y + ')');
      } else {
        wildDroplet.setAttribute('opacity', '0');
      }
    } else {
      wildDroplet.setAttribute('opacity', '0');
    }

    // ── BAROMETER NEEDLE (0.4° per cycle) ─────────────────────────────────
    const needleAngle = -12 + t * -0.4;
    needle.setAttribute('transform', 'rotate(' + needleAngle.toFixed(3) + ', 60, 40)');

    // ── LEDGER page-edge flutter ──────────────────────────────────────────
    if (Math.floor(elapsed * 1000) % 120 === 0) {
      // occasional micro-translate, kept deterministic-ish
      const flut = ((Math.floor(elapsed / 1.6) % 7) - 3) * 0.18;
      ledger.setAttribute('transform', 'translate(120, ' + (830 + flut).toFixed(2) + ')');
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);

  // The bow blooms at 6:19. One droplet holds all five colors at once.
  // Mr. Vestergaard sees it. The page is silent on the matter.
})();
</script>
