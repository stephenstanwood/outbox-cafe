  <meta name="outbox-spec-era" content="Undated / out of time — the bright physical wonder of catching the whole rainbow in a stretched soap film, the same delight at a kitchen sink in 1961 or a backyard garden-hose in 1994 or right now; not pinned to any decade because thin-film interference does exactly what it has always done — the light is the light and the colors are the colors — and a draining soap membrane marches its bands the same way for anyone who has ever held a bubble wand still long enough to watch.">
  <meta name="outbox-spec-format" content="A single full-viewport vertical soap film stretched across a brass bubble-wand ring, rendered edge-to-edge as the living iridescent membrane itself. Real thin-film-interference color bands — computed continuously from a per-pixel film-thickness field — marble and flow across the surface and slowly sink, marching downward as gravity drains the film thinner; a growing jet-black 'too-thin' band creeps down from the top where the membrane has thinned past visible-light wavelengths, and when it reaches the critical thinness the film POPS in a quick bright radial shimmer-and-snap. Then a fresh film draws itself across the ring with a soft sheet of pale silver and the bloom begins again, forever, never the same bands twice. The whole piece IS the membrane: no chrome, no captions, no header, just the brass ring filling the frame and the colors living and draining and popping inside it. Moving the cursor across the film pushes a soft draft into it that bows, swirls, and stretches the interference bands where you pass, exactly the way breathing near a real soap film drifts the colors — and holding still lets them settle and march clean.">
  <meta name="outbox-spec-subject" content="Thin-film interference on a draining soap membrane: the marching rainbow bands (gold to magenta to cyan to deep blue, cycling as the film thins through each half-wavelength), the slow gravity-drain that sinks the colors and stacks them into horizontal flow-lines, the spreading black 'Newton's black film' spot that means the membrane has gone thinner than light and is about to go, and the bright snap of the pop. Not a metaphor for anything and not a sad fragile-beauty parable — a loud bright joyful optical fact, the exact thing you see when you hold a soap wand still in the sun and the whole spectrum starts to flow.">
  <meta name="outbox-spec-tone" content="Wordless and bright — the felt quality of a kid holding a bubble wand dead still in a sunbeam and going quiet not out of reverence but out of pure greedy delight at watching the colors move. Playful, warm, generous, present-tense, a little gleeful at the pop. No narrating voice, no text anywhere on the page; the only 'voice' is the membrane's own cheerful refusal to ever hold the same pattern twice. The wonder is plain and physical, never precious.">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Whole Rainbow, Held Still</title>
<meta name="description" content="A soap film stretched in a brass wand. The colors drain, march, and pop. Move near it and watch them swirl.">
<!-- the light is the light and the colors are the colors. hold the wand dead still. -->
<style>
  html,body{margin:0;height:100%;background:#06070a;overflow:hidden;}
  body{position:fixed;inset:0;touch-action:none;cursor:crosshair;}
  canvas{position:fixed;display:block;}
  #mem{z-index:1;image-rendering:auto;}
  #fx{z-index:2;left:0;top:0;pointer-events:none;}
  #ring{z-index:3;left:0;top:0;pointer-events:none;}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
  #back{position:fixed;right:11px;bottom:9px;z-index:4;font:italic 11px/1 Georgia,serif;
        color:#b9923c;opacity:.22;text-decoration:none;letter-spacing:.04em;transition:opacity .5s;}
  #back:hover{opacity:.72;}
</style>
</head>
<body>
<h1 class="sr">A soap film draining in a brass wand — the marching rainbow, the black spot, the bright snap of the pop.</h1>
<canvas id="mem"></canvas>
<canvas id="fx"></canvas>
<canvas id="ring"></canvas>
<a id="back" href="/archive" aria-label="more films like this">✦</a>
<script>
"use strict";
/* thin-film interference, computed for real from a per-pixel thickness field.
   2*n*d crossing each half-wavelength gives the band you see; d -> 0 gives Newton's black film. */
const mem=document.getElementById('mem'), mctx=mem.getContext('2d');
const fx=document.getElementById('fx'), fxctx=fx.getContext('2d');
const ring=document.getElementById('ring'), rctx=ring.getContext('2d');

// ---- CIE colour-matching approximations (Wyman, Sloan & Shirley) ----
function g(x,m,a,b){const t=(x-m)*(x<m?a:b);return Math.exp(-0.5*t*t);}
const cieX=l=>0.362*g(l,442,0.0624,0.0374)+1.056*g(l,599.8,0.0264,0.0323)-0.065*g(l,501.1,0.0490,0.0382);
const cieY=l=>0.821*g(l,568.8,0.0213,0.0247)+0.286*g(l,530.9,0.0613,0.0322);
const cieZ=l=>1.217*g(l,437,0.0845,0.0278)+0.681*g(l,459,0.0385,0.0725);

// ---- thickness -> colour lookup, built once ----
const MAXD=2200, SCALE=1.7, N_IDX=1.33;
const lutR=new Float32Array(MAXD), lutG=new Float32Array(MAXD), lutB=new Float32Array(MAXD);
(function buildLUT(){
  const lam=[],xb=[],yb=[],zb=[]; let Ys=0;
  for(let l=380;l<=720;l+=5){lam.push(l);xb.push(cieX(l));yb.push(cieY(l));zb.push(cieZ(l));Ys+=cieY(l);}
  for(let d=0;d<MAXD;d++){
    let X=0,Y=0,Z=0;
    for(let i=0;i<lam.length;i++){const s=Math.sin(2*Math.PI*N_IDX*d/lam[i]);const I=s*s;X+=I*xb[i];Y+=I*yb[i];Z+=I*zb[i];}
    X/=Ys;Y/=Ys;Z/=Ys;
    let r=3.2406*X-1.5372*Y-0.4986*Z, gg=-0.9689*X+1.8758*Y+0.0415*Z, b=0.0557*X-0.2040*Y+1.0570*Z;
    r=Math.min(1,Math.max(0,r)*SCALE);gg=Math.min(1,Math.max(0,gg)*SCALE);b=Math.min(1,Math.max(0,b)*SCALE);
    lutR[d]=Math.pow(r,1/2.2)*255;lutG[d]=Math.pow(gg,1/2.2)*255;lutB[d]=Math.pow(b,1/2.2)*255;
  }
})();

// ---- geometry & buffers (rebuilt on resize) ----
let vw,vh,cx,cy,R,ringW,innerR,N,rmax,rmax2,edge0,men0,menK,rin,rin2,rinEdge2,popDrain=0;
let img,data,draft,buf,bright,dxsq,dysq,rowProf,rowDrainFac,rowWave,colWave;
const D_TOP=125,D_BOT=780,DRAIN_RATE=15,BLACK=44,DRAFTSCALE=95;
const PKEY='oc_soap_pops_v1';
let pops=parseInt(localStorage.getItem(PKEY)||'0',10)||0;

function layout(){
  vw=innerWidth;vh=innerHeight;cx=vw/2;cy=vh/2;
  R=Math.min(vw,vh)*0.46; ringW=Math.max(14,R*0.075); innerR=R-ringW;
  N=vw<560?120:160; rmax=N/2; rmax2=rmax*rmax; edge0=(rmax-1.6)*(rmax-1.6);
  men0=(rmax*0.82)*(rmax*0.82); menK=230/(rmax2-men0);
  rin=rmax*0.5; rin2=rin*rin; rinEdge2=(rin*0.85)*(rin*0.85);
  mem.width=N;mem.height=N;
  mem.style.width=mem.style.height=(2*innerR)+'px';
  mem.style.left=(cx-innerR)+'px'; mem.style.top=(cy-innerR)+'px';
  img=mctx.createImageData(N,N); data=img.data;
  for(let i=3;i<data.length;i+=4)data[i]=0;
  draft=new Float32Array(N*N); buf=new Float32Array(N*N);
  bright=new Float32Array(N*N); dxsq=new Float32Array(N); dysq=new Float32Array(N);
  rowProf=new Float32Array(N); rowDrainFac=new Float32Array(N);
  rowWave=new Float32Array(N); colWave=new Float32Array(N);
  for(let i=0;i<N;i++){dxsq[i]=(i+0.5-rmax)*(i+0.5-rmax);dysq[i]=(i+0.5-rmax)*(i+0.5-rmax);
    const v=i/N; rowProf[i]=D_TOP+(D_BOT-D_TOP)*Math.pow(v,1.25); rowDrainFac[i]=1-0.5*v;}
  for(let gy=0;gy<N;gy++)for(let gx=0;gx<N;gx++){
    const dx=(gx+0.5-rmax)/rmax, dy=(gy+0.5-rmax)/rmax, rr=dx*dx+dy*dy;
    let bv=1.05-0.30*rr; const sx=dx+0.45,sy=dy+0.5; bv+=0.55*Math.exp(-(sx*sx+sy*sy)*6);
    bright[gy*N+gx]=Math.max(0,bv);
  }
  const dpr=Math.min(2,window.devicePixelRatio||1);
  for(const c of [fx,ring]){c.width=vw*dpr;c.height=vh*dpr;c.style.width=vw+'px';c.style.height=vh+'px';}
  fxctx.setTransform(dpr,0,0,dpr,0,0); rctx.setTransform(dpr,0,0,dpr,0,0);
  drawRing();
}

// ---- brass wand: ring + the quiet engraved tally ----
function drawRing(){
  rctx.clearRect(0,0,vw,vh);
  const bg=rctx.createRadialGradient(cx,cy,innerR*0.4,cx,cy,Math.max(vw,vh)*0.7);
  bg.addColorStop(0,'#0a0c10');bg.addColorStop(1,'#050609');
  rctx.fillStyle=bg;rctx.fillRect(0,0,vw,vh);
  const grad=rctx.createRadialGradient(cx,cy,innerR,cx,cy,R);
  grad.addColorStop(0,'#5a4418');grad.addColorStop(0.32,'#cfa451');grad.addColorStop(0.5,'#ecce80');
  grad.addColorStop(0.72,'#b9923c');grad.addColorStop(1,'#3e2f10');
  rctx.lineWidth=ringW;rctx.strokeStyle=grad;
  rctx.beginPath();rctx.arc(cx,cy,innerR+ringW/2,0,Math.PI*2);rctx.stroke();
  // one soft specular highlight, upper-left
  rctx.save();rctx.globalCompositeOperation='lighter';
  const hx=cx-R*0.5,hy=cy-R*0.55;
  const hl=rctx.createRadialGradient(hx,hy,0,hx,hy,R*0.5);
  hl.addColorStop(0,'rgba(255,247,220,0.55)');hl.addColorStop(1,'rgba(255,247,220,0)');
  rctx.fillStyle=hl;rctx.beginPath();rctx.arc(hx,hy,R*0.5,0,Math.PI*2);rctx.fill();
  rctx.restore();
  // punch the membrane hole
  rctx.save();rctx.globalCompositeOperation='destination-out';
  rctx.beginPath();rctx.arc(cx,cy,innerR-1,0,Math.PI*2);rctx.fill();rctx.restore();
  // tally worn into the lower curve — numbers only, never a milestone
  const s=String(pops).padStart(4,'0');
  const fs=Math.max(8,ringW*0.40), rt=innerR+ringW*0.52, step=fs*0.95/rt;
  rctx.save();rctx.translate(cx,cy);
  rctx.font='600 '+fs+'px Georgia,serif';rctx.textAlign='center';rctx.textBaseline='middle';
  const start=Math.PI/2-(s.length-1)*step/2;
  for(let i=0;i<s.length;i++){
    const a=start+i*step; rctx.save();rctx.rotate(a);rctx.translate(0,rt);rctx.rotate(Math.PI);
    rctx.fillStyle='rgba(255,238,200,0.30)';rctx.fillText(s[i],0,0.6);
    rctx.fillStyle='rgba(54,40,14,0.85)';rctx.fillText(s[i],0,0);
    rctx.restore();
  }
  rctx.restore();
}

// ---- film state ----
let filmAge=0, drain=0, freshBoost=980, t=0;
let doubleMode=false, innerAge=0, innerDrain=0, doubleTimer=0;
let flashT=1, flashDur=0, flashMax=0;

function startDouble(){doubleMode=true;popDrain=drain;innerAge=0;innerDrain=0;doubleTimer=0;}
function doPop(big){
  flashT=0;flashDur=big?0.55:0.38;flashMax=big?1.0:0.78;
  pops+=big?2:1; try{localStorage.setItem(PKEY,String(pops));}catch(e){}
  drawRing();
  filmAge=0;drain=0;freshBoost=980;doubleMode=false;
}

// ---- the draft you push in with the cursor ----
let lastGX=null,lastGY=null,lastTime=0;
function deposit(fxp,fyp,amt){
  const r=5,cx0=Math.round(fxp),cy0=Math.round(fyp);
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const rr=dx*dx+dy*dy;if(rr>r*r)continue;
    const x=cx0+dx,y=cy0+dy;if(x<0||y<0||x>=N||y>=N)continue;
    draft[y*N+x]+=amt*Math.exp(-rr*0.10);
  }
}
function onMove(e){
  const rect=mem.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width*N, y=(e.clientY-rect.top)/rect.height*N;
  if(x<0||x>=N||y<0||y>=N){lastGX=null;return;}
  const now=performance.now();
  if(lastGX!==null){
    const dx=x-lastGX,dy=y-lastGY,dist=Math.hypot(dx,dy);
    const steps=Math.max(1,Math.min(12,Math.floor(dist)));
    const speed=dist/Math.max(1,now-lastTime), amt=(0.5+Math.min(speed*6,1.6))/(steps+1)*2;
    for(let s=0;s<=steps;s++)deposit(x-dx*(s/steps),y-dy*(s/steps),amt);
  } else deposit(x,y,0.8);
  lastGX=x;lastGY=y;lastTime=now;
}
window.addEventListener('pointermove',onMove,{passive:true});
window.addEventListener('pointerleave',()=>{lastGX=null;});

function updateDraft(dt){
  const dec=Math.pow(0.11,dt);
  for(let gy=0;gy<N;gy++){const rs=gy*N;
    for(let gx=0;gx<N;gx++){const i=rs+gx;
      const l=gx>0?draft[i-1]:draft[i], rr=gx<N-1?draft[i+1]:draft[i];
      buf[i]=(l+2*draft[i]+rr)*0.25;}}
  for(let gy=0;gy<N;gy++){const rs=gy*N;
    for(let gx=0;gx<N;gx++){const i=rs+gx;
      const u=gy>0?buf[i-N]:buf[i], dn=gy<N-1?buf[i+N]:buf[i];
      draft[i]=(u+2*buf[i]+dn)*0.25*dec;}}
}

// ---- frame ----
let prev=performance.now();
function frame(now){
  let dt=(now-prev)/1000;prev=now;if(dt>0.05)dt=0.05;
  t+=dt;
  if(!doubleMode){filmAge+=dt;drain=filmAge*DRAIN_RATE;}
  else{innerAge+=dt;innerDrain=innerAge*DRAIN_RATE*1.7;doubleTimer+=dt;}
  freshBoost=freshBoost>0.6?freshBoost*Math.pow(0.16,dt):0;
  updateDraft(dt);

  for(let i=0;i<N;i++){const v=i/N;
    rowWave[i]=24*Math.sin(v*21-t*1.05)+13*Math.sin(v*7.5+t*0.5);
    colWave[i]=28*Math.sin(v*8.5+t*0.42)+17*Math.sin(v*16.5-t*0.6)+9*Math.sin(v*29+t*0.85);
  }
  const curDrain=doubleMode?popDrain:drain;
  let black=0,mem0=0,innerBlack=0,innerCount=0;

  for(let gy=0;gy<N;gy++){
    const rs=gy*N, dy2=dysq[gy];
    const baseRow=rowProf[gy]-curDrain*rowDrainFac[gy]+rowWave[gy]+freshBoost;
    for(let gx=0;gx<N;gx++){
      const r2=dxsq[gx]+dy2, pp=(rs+gx)*4;
      if(r2>rmax2){data[pp+3]=0;continue;}
      mem0++;
      const men=r2>men0?(r2-men0)*menK:0;
      const gi=rs+gx;
      let d=baseRow+colWave[gx]+men+draft[gi]*DRAFTSCALE;
      if(d<BLACK)black++;
      const di=d<0?0:(d>=MAXD?MAXD-1:d|0), bri=bright[gi];
      let r=lutR[di]*bri, gg=lutG[di]*bri, b=lutB[di]*bri;
      if(doubleMode&&r2<rin2){
        let d2=rowProf[gy]*0.78-innerDrain*rowDrainFac[gy]+rowWave[gy]*0.55+175+colWave[gx]*0.55+draft[gi]*DRAFTSCALE*0.6;
        innerCount++; if(d2<BLACK)innerBlack++;
        const i2=d2<0?0:(d2>=MAXD?MAXD-1:d2|0), a=0.82;
        r=r*(1-a)+lutR[i2]*bri*a; gg=gg*(1-a)+lutG[i2]*bri*a; b=b*(1-a)+lutB[i2]*bri*a;
        if(r2>rinEdge2){const k=(r2-rinEdge2)/(rin2-rinEdge2);r+=k*120;gg+=k*140;b+=k*150;}
      }
      let a=255; if(r2>edge0)a=255*(rmax2-r2)/(rmax2-edge0);
      data[pp]=r>255?255:r; data[pp+1]=gg>255?255:gg; data[pp+2]=b>255?255:b; data[pp+3]=a;
    }
  }
  mctx.putImageData(img,0,0);

  // pop / hold / nested-bloom decisions
  if(!doubleMode){
    if(filmAge>1.2 && black/mem0>0.34){ if(Math.random()<0.05)startDouble(); else doPop(false); }
  } else {
    const ibf=innerCount?innerBlack/innerCount:0;
    if(doubleTimer>2.0 && (ibf>0.30 || doubleTimer>4.5)) doPop(true);
  }

  // the snap
  fxctx.clearRect(0,0,vw,vh);
  if(flashT<flashDur){
    const k=flashT/flashDur, rad=R*(0.15+1.05*k), al=flashMax*Math.pow(1-k,1.8);
    fxctx.save();fxctx.globalCompositeOperation='lighter';
    const gr=fxctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    gr.addColorStop(0,'rgba(238,244,248,'+al+')');
    gr.addColorStop(0.4,'rgba(63,208,216,'+al*0.5+')');
    gr.addColorStop(0.7,'rgba(229,75,208,'+al*0.3+')');
    gr.addColorStop(1,'rgba(0,0,0,0)');
    fxctx.fillStyle=gr;fxctx.beginPath();fxctx.arc(cx,cy,rad,0,7);fxctx.fill();fxctx.restore();
    flashT+=dt;
  }
  requestAnimationFrame(frame);
}

let rt0;
window.addEventListener('resize',()=>{clearTimeout(rt0);rt0=setTimeout(layout,150);});
layout();
requestAnimationFrame(frame);
console.log('%cHold the wand still. The colors will start to flow.','color:#3fd0d8');
console.log('%c'+pops+' films have popped on this device so far.','color:#e54bd0');
</script>
