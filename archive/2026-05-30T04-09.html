<style>

<body>

<div class="ballroom">
  <p class="room-note">Mid-Atlantic Figure-Makers' Convention &middot; <b>Holiday Inn Ballroom</b> &middot; Hagerstown, MD &middot; April 7, 1979</p>

  <article class="flipbook" id="book">
    <header class="spiral" id="spiral"></header>
    <div class="pages" id="pages"></div>
    <div class="page-meta">
      <span id="metaLeft">cover</span>
      <span class="pg" id="metaRight">— ◯ —</span>
    </div>
  </article>

  <footer class="site-footer">
    a transcript that holds only one voice &nbsp;·&nbsp; <a href="/archive">step back through the cabinet</a>
  </footer>
</div>

<script>
/* === ACT DATA ===
   Closing set, 14 pages. Each line carries c = jaw-clack count
   (the wooden beats Mr. Tatum fills with his missing reply). */
const ACT = [
  { lines:[
      {t:"Well — look at all of you.", c:2},
      {t:"Thirty-one years on this circuit and I still get butterflies when I see this many figures in one room.", c:3},
      {t:"Mr. Tatum, say good evening to the convention.", c:2},
      {t:"Don't be rude, honey — these are colleagues.", c:3},
      {t:"There he is.", c:1}
    ], note:null },

  { lines:[
      {t:"Tatum — you remember Hagerstown, don't you?", c:2},
      {t:"1962, the Elks lodge upstairs, you got the hiccups for forty minutes.", c:3},
      {t:"He did — he absolutely did.", c:2},
      {t:"Pop carved you out of one piece of maple, sweetheart, you don't get hiccups, that's me.", c:4},
      {t:"Yes I know — I'm working on it.", c:2}
    ], note:"wait three full beats — let him land it" },

  { lines:[
      {t:"Folks — he tells me my M's are sloppy tonight.", c:3},
      {t:"Forty years of M's and apparently they are sloppy.", c:2},
      {t:"What about your jaw, then — what about that little squeak on the long A?", c:3},
      {t:"Oh — now we're even.", c:2},
      {t:"All right, all right. Truce.", c:2}
    ], note:"slow the M sound here — breath becomes wood becomes breath — thirty-one years now" },

  { lines:[
      {t:"So I was driving down here yesterday — six and a half hours from Albany —", c:3},
      {t:"I was not asleep at the wheel, Mr. Tatum, the road was straight.", c:3},
      {t:"It was. It was the most boring road in Pennsylvania.", c:2},
      {t:"You sleep in a case lined with red velvet, baby — you don't know boredom.", c:3},
      {t:"All right, all right.", c:1}
    ], note:null },

  { lines:[
      {t:"So I pull into the Holiday Inn last night and the desk clerk looks at the figure case and he says, 'ma'am — is that a fishing rod?'", c:3},
      {t:"And Tatum here pipes up from inside the foam —", c:4},
      {t:"Yes you did, I heard you, the bellhop heard you too.", c:2},
      {t:"He says — 'no, sir — that is my mother.'", c:5},
      {t:"Don't call me that on stage, sweetheart, half these people knew my father.", c:3}
    ], note:"the fishing rod line — don't rush it, hold for the laugh" },

  { lines:[
      {t:"Pop carved him in 1939.", c:2},
      {t:"Forty years next month, that's right.", c:2},
      {t:"Three pieces of curly maple for the head — basswood for the body — a hand-carved jaw on a brass hinge Pop turned himself on the lathe in our garage on Brunswick Street.", c:4},
      {t:"Glass eyes from the Sears, Roebuck catalogue. Six dollars a pair.", c:3},
      {t:"Don't be modest, baby, you cost six dollars and you have outlasted four of my marriages.", c:4}
    ], note:null },

  { lines:[
      {t:"Tatum — did I ever tell you what Pop said the day he gave you to me?", c:3},
      {t:"I was twelve.", c:2},
      {t:"He sat me down at the kitchen table and he said, 'Doris — this is not a toy.'", c:3},
      {t:"He said, 'this is a partner. You learn his weight, you learn his breath, you learn his timing, and you treat him the way you would want to be treated on stage.'", c:4},
      {t:"Then he handed you to me and he went back out to the garage and he did not come in for supper.", c:3}
    ], note:"softer here — you always get loud when you remember Pop" },

  { lines:[
      {t:"All right, all right — enough sentiment.", c:2},
      {t:"We are going to do the routine. You all know the routine.", c:3},
      {t:"Tatum — are you ready?", c:2},
      {t:"Tatum.", c:3},
      {t:"He's pretending to sleep. He does this every show, friends, every single show.", c:2}
    ], note:null },

  { lines:[
      {t:"Wake up, you old softwood.", c:3},
      {t:"There we go.", c:2},
      {t:"All right. The grocery store bit. From the top.", c:2},
      {t:"So I walk into the A&amp;P and I say to the clerk, I say —", c:3},
      {t:"Yes — that's your line, honey, go ahead.", c:4}
    ], note:"don't laugh at his own joke — you ALWAYS laugh" },

  { lines:[
      {t:"Beautiful.", c:2},
      {t:"Folks — did you catch that? That's a four-beat hold. He timed that four-beat hold himself tonight, I did not cue him.", c:3},
      {t:"Don't blush — I'm bragging about you.", c:2},
      {t:"Look at him. The maple is blushing.", c:3},
      {t:"So anyway — the clerk says to me —", c:2}
    ], note:null },

  { lines:[
      {t:"And I say, 'well — that is a peach of a price.'", c:3},
      {t:"And then Tatum here — Tatum here — he says —", c:5},
      {t:"Oh — that is filthy, Tatum.", c:2},
      {t:"These people are professionals, you cannot say that in mixed company.", c:3},
      {t:"He says it every single time. Every time for thirty-one years he gets that line and every time I act surprised.", c:4}
    ], note:"the peach line — keep your face still, he does the work" },

  { lines:[
      {t:"All right. We're coming up on the close.", c:2},
      {t:"Tatum — do the song.", c:3},
      {t:"Do the song, honey, the people came out for it.", c:3},
      {t:"Just the chorus, then.", c:4},
      {t:"There he goes. Listen to that — listen to that.", c:8}
    ], note:null },

  { lines:[
      {t:"Beautiful, baby.", c:2},
      {t:"Folks, I want to thank you. Genuinely.", c:3},
      {t:"It is a strange and specific thing we do for a living. Most of the world thinks we are either children's entertainers or we are a horror movie, and neither of those is the truth.", c:4},
      {t:"The truth is in this room. You all already know what the truth is.", c:3},
      {t:"Tatum — anything to add?", c:5}
    ], note:"look at them. look at all of them. breathe." },

  { lines:[
      {t:"He says good night. He says drive safe. He says he hopes your figures are well-oiled and your jaws hold true.", c:3},
      {t:"And he says —", c:3},
      {t:"Oh — stop it.", c:2},
      {t:"He says I'm the best partner he's ever had.", c:3},
      {t:"Good night, everybody. Good night.", c:2}
    ], note:null }
];

/* === STORAGE === */
const LS_PAGE = "outbox.doris.page";
const LS_NOTES = "outbox.doris.notes";
const LS_PLAYS = "outbox.doris.plays";

function getPlays(){ return parseInt(localStorage.getItem(LS_PLAYS)||"0", 10); }
function setPlays(n){ localStorage.setItem(LS_PLAYS, String(n)); }
function getNotes(){
  try{ return JSON.parse(localStorage.getItem(LS_NOTES)||"[]"); }
  catch(e){ return []; }
}
function addNote(idx){
  const n = getNotes();
  if(!n.includes(idx)){ n.push(idx); localStorage.setItem(LS_NOTES, JSON.stringify(n)); }
}

/* === AUDIO === */
let actx = null;
function audio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ actx = null; }
  }
  if(actx && actx.state === "suspended") actx.resume();
  return actx;
}
function playClack(when, vol=1){
  const ctx = audio(); if(!ctx) return;
  const t = (when==null) ? ctx.currentTime : when;

  // Sharp wooden tack — short filtered noise burst
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.07), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    d[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.009));
  }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bp = ctx.createBiquadFilter();
  bp.type="bandpass"; bp.frequency.value=1400; bp.Q.value=3.5;
  const g1 = ctx.createGain(); g1.gain.value = 0.32*vol;
  src.connect(bp).connect(g1).connect(ctx.destination);
  src.start(t);

  // Wood body resonance — quick low sine
  const osc = ctx.createOscillator();
  osc.type="sine"; osc.frequency.setValueAtTime(195, t);
  osc.frequency.exponentialRampToValueAtTime(120, t+0.05);
  const g2 = ctx.createGain();
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.18*vol, t+0.003);
  g2.gain.exponentialRampToValueAtTime(0.001, t+0.07);
  osc.connect(g2).connect(ctx.destination);
  osc.start(t); osc.stop(t+0.09);
}

/* === RENDER === */
const pagesEl = document.getElementById("pages");
const totalAct = ACT.length;
const TOTAL_PAGES = 1 + totalAct + 1; // cover + 14 + back cover
let current = parseInt(localStorage.getItem(LS_PAGE)||"0", 10);
if(isNaN(current) || current<0) current = 0;
if(current >= TOTAL_PAGES + (getPlays()>=3?1:0)) current = 0;

function makePage(idx){
  const div = document.createElement("section");
  div.className = "page";
  div.dataset.idx = idx;
  if(idx === 0){
    div.classList.add("cover");
    div.innerHTML = `
      <h1>Closing Set, Saturday Evening</h1>
      <div class="subtitle">Transcribed from cassette · Reel B · ~22 min</div>
      <div class="figure-illust">
        <img src="https://v3b.fal.media/files/b/0a9c46bd/XUyvagDnIx-o_MaPfSlWS.jpg"
             alt="Mr. Tatum — curly maple head and brass-hinged jaw, carved 1939"
             loading="lazy" style="max-width:100%;height:auto">
      </div>
      <div class="by">
        Doris Vellner
        <b>&amp; Mr. Tatum</b>
      </div>
      <div class="tape-label">Property of D. Vellner · do not erase</div>
    `;
  } else if(idx <= totalAct){
    const page = ACT[idx-1];
    let html = "";
    page.lines.forEach((ln, li) => {
      const dots = "•".repeat(ln.c);
      html += `<p class="line" data-clacks="${ln.c}"><span class="line-text">${ln.t}</span><span class="dots">${dots}</span></p>`;
    });
    if(page.note){
      // place note in lower-right margin area
      html += `<div class="margin-note" data-note-idx="${idx}">${page.note}</div>`;
    }
    div.innerHTML = html;
    if(page.note){
      const note = div.querySelector(".margin-note");
      // randomize position a bit per page
      const top = 55 + ((idx*37)%28);
      note.style.bottom = (12 + ((idx*13)%18)) + "%";
      note.style.right = (4 + ((idx*7)%12)) + "%";
      note.style.transform = `rotate(${-5 + ((idx*11)%9)}deg)`;
    }
  } else if(idx === totalAct + 1){
    div.classList.add("back-cover");
    div.innerHTML = `
      <div class="small">
        end of side B<br>
        the act, as performed by him<br>
        — alone in a room with no partner —
      </div>
      <button class="listen-btn" id="listenBtn">Listen Straight Through</button>
      <div class="clack-meter"><div id="clackBar"></div></div>
      <div class="play-count" id="playCount"></div>
    `;
  } else {
    // hidden final page
    div.classList.add("hidden-page");
    div.innerHTML = `<p>he carved him with his eyes open so he could watch me work</p>`;
  }
  return div;
}

function rebuild(){
  pagesEl.innerHTML = "";
  const max = TOTAL_PAGES + (getPlays()>=3 ? 1 : 0);
  for(let i=0;i<max;i++){
    pagesEl.appendChild(makePage(i));
  }
  updatePlayCount();
}

/* === NAVIGATION === */
let noteTimer = null;
let pendingClacks = [];

function clearReading(){
  pendingClacks.forEach(id => clearTimeout(id));
  pendingClacks = [];
  if(noteTimer){ clearTimeout(noteTimer); noteTimer = null; }
}

function activatePage(idx){
  const max = TOTAL_PAGES + (getPlays()>=3 ? 1 : 0);
  if(idx < 0) idx = 0;
  if(idx >= max) idx = max - 1;
  current = idx;
  localStorage.setItem(LS_PAGE, String(current));

  Array.from(pagesEl.children).forEach((p,i) => {
    p.classList.toggle("active", i === current);
  });
  updateMeta();
  clearReading();

  const pageEl = pagesEl.children[current];
  if(!pageEl) return;

  // Schedule jaw-clacks for transcript pages
  if(current >= 1 && current <= totalAct){
    const lines = pageEl.querySelectorAll(".line");
    let cursor = 700;
    lines.forEach(line => {
      const text = line.querySelector(".line-text").textContent;
      const wordCount = text.split(/\s+/).length;
      const readMs = Math.max(1500, wordCount * 250);
      cursor += readMs;
      const clackCount = parseInt(line.dataset.clacks, 10);
      for(let i=0;i<clackCount;i++){
        const at = cursor;
        const id = setTimeout(() => {
          if(parseInt(pageEl.dataset.idx,10) === current) playClack();
        }, at);
        pendingClacks.push(id);
        cursor += 520;
      }
      cursor += 280;
    });
    // Schedule pencil note fade after 6s linger
    const note = pageEl.querySelector(".margin-note");
    if(note){
      noteTimer = setTimeout(() => {
        note.classList.add("shown");
        addNote(current);
      }, 6200);
    }
  }

  // Back cover: refresh play count display
  if(current === totalAct + 1){
    updatePlayCount();
  }
}

function updateMeta(){
  const meta = document.getElementById("metaLeft");
  const right = document.getElementById("metaRight");
  if(current === 0){ meta.textContent = "front cover"; right.textContent = "— ◯ —"; }
  else if(current <= totalAct){
    meta.textContent = "transcript";
    right.textContent = `page ${current} of ${totalAct}`;
  }
  else if(current === totalAct + 1){ meta.textContent = "end of side B"; right.textContent = "back cover"; }
  else { meta.textContent = "—"; right.textContent = "—"; }
}

function updatePlayCount(){
  const el = document.getElementById("playCount");
  if(!el) return;
  const p = getPlays();
  const marks = "✗".repeat(Math.min(p,3));
  const blanks = " ◯".repeat(Math.max(0, 3-Math.min(p,3)));
  if(p === 0){
    el.innerHTML = `<span class="marks">◯ ◯ ◯</span><br>(side B has not been played end-to-end yet)`;
  } else if(p < 3){
    el.innerHTML = `<span class="marks">${"✗".repeat(p)}${blanks}</span><br>played through ${p===1?"once":"twice"} — keep listening`;
  } else {
    el.innerHTML = `<span class="marks">✗ ✗ ✗</span><br>played through ${p} time${p===1?"":"s"} — a page has been added to the back`;
  }
}

/* === SPIRAL BINDING === */
const spiral = document.getElementById("spiral");
function buildSpiral(){
  spiral.innerHTML = "";
  for(let i=0;i<9;i++){
    const r = document.createElement(i===0 || i===8 ? "button" : "span");
    r.className = "ring";
    if(i===0){
      r.classList.add("active");
      r.dataset.label = "back ◀";
      r.title = "previous page";
      r.addEventListener("click", () => activatePage(current - 1));
    } else if(i===8){
      r.classList.add("active");
      r.dataset.label = "forward ▶";
      r.title = "next page";
      r.addEventListener("click", () => activatePage(current + 1));
    }
    spiral.appendChild(r);
  }
}

/* === LISTEN STRAIGHT THROUGH === */
let listenInFlight = false;
let listenTimeouts = [];

function listenStraightThrough(){
  if(listenInFlight) return;
  const ctx = audio(); if(!ctx) return;
  listenInFlight = true;
  const btn = document.getElementById("listenBtn");
  const bar = document.getElementById("clackBar");
  if(btn){ btn.disabled = true; btn.textContent = "playing…"; }

  // collect all clacks across the act with rest structure
  const events = []; // {at: seconds, type: 'clack'|'pageBreak'}
  let t = 0.5; // initial silence
  const clackGap = 0.34;       // beat between clacks within a line
  const lineGap = 0.42;        // pause between lines
  const pageGap = 0.95;        // pause between pages

  ACT.forEach((page, pi) => {
    page.lines.forEach((ln, li) => {
      for(let i=0;i<ln.c;i++){
        events.push(t);
        t += clackGap;
      }
      t += lineGap;
    });
    t += pageGap;
  });
  const total = t + 0.4;

  const startCtxTime = ctx.currentTime + 0.05;
  events.forEach(e => {
    playClack(startCtxTime + e, 0.95);
  });

  // visual progress
  const startMs = performance.now();
  const totalMs = total * 1000;
  function tick(){
    const elapsed = performance.now() - startMs;
    const pct = Math.min(100, (elapsed/totalMs)*100);
    if(bar) bar.style.width = pct + "%";
    if(elapsed < totalMs){
      listenTimeouts.push(setTimeout(tick, 80));
    }
  }
  tick();

  // completion
  const done = setTimeout(() => {
    setPlays(getPlays() + 1);
    if(btn){ btn.disabled = false; btn.textContent = "Listen Straight Through"; }
    if(bar) bar.style.width = "0%";
    listenInFlight = false;
    // if just crossed threshold, rebuild to add hidden page
    const plays = getPlays();
    if(plays === 3){
      rebuild();
      // refresh page references
      activatePage(current);
    } else {
      updatePlayCount();
    }
  }, totalMs + 200);
  listenTimeouts.push(done);
}

/* === KEYBOARD === */
document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight" || e.key === "PageDown"){ activatePage(current + 1); }
  else if(e.key === "ArrowLeft" || e.key === "PageUp"){ activatePage(current - 1); }
});

/* === DELEGATED CLICKS === */
document.addEventListener("click", e => {
  if(e.target && e.target.id === "listenBtn"){
    audio(); listenStraightThrough();
  }
});

/* === BOOT === */
buildSpiral();
rebuild();
activatePage(current);

// gentle nudge so audio is unlocked on first interaction
let unlocked = false;
function unlock(){
  if(unlocked) return;
  unlocked = true;
  audio();
}
document.addEventListener("click", unlock, {once:true});
document.addEventListener("touchstart", unlock, {once:true});

/* a small console hello for the careful */
console.log("%cMr. Tatum's half lives in the silences. listen for the wood.", "color:#c4a657;font-style:italic;font-family:Georgia");
</script>
