<body>
  <div class="flip"><svg id="scene" viewBox="0 0 260 260" aria-label="A frog leaping off a lily pad to catch a fly, drawn in pencil. A small ladybug sits on the left edge of the pad and never moves."></svg></div>

<script>
"use strict";
// ----- the eleven frames: one small complete comedy, looping forever -----
// frog body outline, local coords (origin = body center, sitting upright)
const BODY=[[-30,1],[-27,-9],[-19,-15],[-7,-17],[7,-17],[19,-15],[27,-9],[30,1],
            [27,12],[16,19],[0,21],[-16,19],[-27,12]];

const poses=[
 // 0  sits, a fly drifts in from the right edge
 {fx:130,fy:178,sx:1.00,sy:1.00,legs:0.15,eye:1.00,mouth:'smile',tongue:0,fly:[236,92],ripple:0},
 // 1  notices it — eyes up
 {fx:130,fy:178,sx:1.00,sy:1.00,legs:0.15,eye:1.28,mouth:'smile',tongue:0,fly:[188,80],ripple:0,look:1},
 // 2  gathers into a crouch
 {fx:130,fy:187,sx:1.22,sy:0.80,legs:0.00,eye:1.10,mouth:'flat',tongue:0,fly:[166,72],ripple:0,look:1},
 // 3  springs — stretches up
 {fx:128,fy:152,sx:0.85,sy:1.24,legs:0.70,eye:1.00,mouth:'open',tongue:0,fly:[159,66],ripple:0},
 // 4  rising in a fat hopeful arc
 {fx:133,fy:114,sx:0.83,sy:1.20,legs:1.00,eye:1.00,mouth:'open',tongue:0,fly:[157,60],ripple:0},
 // 5  top of the leap — fires the tongue
 {fx:141,fy:84,sx:0.92,sy:1.10,legs:0.90,eye:1.10,mouth:'open',tongue:0.70,fly:[160,52],ripple:0},
 // 6  catches the fly mid-air
 {fx:143,fy:80,sx:0.96,sy:1.02,legs:0.80,eye:1.10,mouth:'open',tongue:1.00,fly:[161,51],ripple:0},
 // 7  sails back down, tongue reeling in, cheek a little full
 {fx:138,fy:120,sx:0.90,sy:1.10,legs:0.50,eye:1.00,mouth:'closing',tongue:0.25,fly:null,ripple:0,cheek:1},
 // 8  almost home
 {fx:132,fy:158,sx:1.00,sy:1.00,legs:0.20,eye:1.00,mouth:'smile',tongue:0,fly:null,ripple:0,cheek:1},
 // 9  splat — landing, water shoves out
 {fx:130,fy:182,sx:1.30,sy:0.74,legs:0.30,eye:0.82,mouth:'flat',tongue:0,fly:null,ripple:3,cheek:1},
 // 10 gulp, one slow blink, content
 {fx:130,fy:178,sx:1.00,sy:1.00,legs:0.15,eye:0.00,mouth:'smile',tongue:0,fly:null,ripple:1,cheek:0}
];

const lerp=(a,b,t)=>a+(b-a)*t;
function ellipsePts(cx,cy,rx,ry,n){const a=[];for(let i=0;i<n;i++){const t=i/n*Math.PI*2;a.push([cx+Math.cos(t)*rx,cy+Math.sin(t)*ry]);}return a;}

function buildStrokes(p){
  const T=(lx,ly)=>[p.fx+lx*p.sx,p.fy+ly*p.sy];
  const ellipseT=(lx,ly,rx,ry,n)=>ellipsePts(lx,ly,rx,ry,n).map(q=>T(q[0],q[1]));
  const S=[];

  // the eraser-smudge ghost where an earlier wobble was rubbed out
  S.push({pts:ellipsePts(96,176,11,7,10),closed:true,fill:'#d4d6c4',col:'#d4d6c4',w:0.5,op:0.5,nojit:true});
  // a faint waterline
  S.push({pts:[[40,225],[228,225]],closed:false,col:'#5a564a',w:1,op:0.32});
  // lily pad
  S.push({pts:ellipsePts(130,212,78,20,20),closed:true,w:2.0,sketch:true});
  S.push({pts:[[208,212],[176,206],[183,219]],closed:false,col:'#5a564a',w:1.4,op:0.8}); // notch wedge
  S.push({pts:[[130,196],[130,212]],closed:false,col:'#5a564a',w:1,op:0.5});
  S.push({pts:[[100,200],[120,212]],closed:false,col:'#5a564a',w:1,op:0.42});
  S.push({pts:[[160,200],[140,212]],closed:false,col:'#5a564a',w:1,op:0.42});
  // landing ripples
  for(let i=0;i<(p.ripple||0);i++){
    S.push({pts:ellipsePts(130,217,16+i*13,6+i*4,16),closed:true,col:'#5a564a',w:1.2,op:0.55-i*0.08});
  }

  // ---- the ladybug: a still point. she alone does not jitter. ----
  const lx=62, ly=205;
  S.push({pts:ellipsePts(lx,ly,8,6,12),closed:true,w:1.6,nojit:true});
  S.push({pts:[[lx,ly-6],[lx,ly+6]],closed:false,w:1.2,nojit:true});
  S.push({pts:ellipsePts(lx,ly-7,3.4,3,8),closed:true,fill:'#3e3e38',col:'#3e3e38',w:1,nojit:true});
  [[-3,-1],[3,-1],[-3,3],[3,3]].forEach(d=>S.push({pts:ellipsePts(lx+d[0],ly+d[1],1.3,1.3,6),closed:true,fill:'#3e3e38',col:'#3e3e38',w:0.5,nojit:true}));
  [[-9,-3],[-10,1],[-9,5],[9,-3],[10,1],[9,5]].forEach(l=>S.push({pts:[[lx+(l[0]>0?6:-6),ly+l[1]],[lx+l[0],ly+l[1]]],closed:false,w:0.9,nojit:true}));

  // back legs (extend on the leap)
  function leg(side){
    return {pts:[T(side*22,4),
                 T(side*lerp(30,35,p.legs),lerp(10,24,p.legs)),
                 T(side*lerp(20,31,p.legs),lerp(16,42,p.legs))],closed:false,w:2.1,sketch:true};
  }
  S.push(leg(-1)); S.push(leg(1));

  // body
  S.push({pts:BODY.map(q=>T(q[0],q[1])),closed:true,w:2.2,sketch:true});
  // front toes
  S.push({pts:[T(-20,18),T(-24,21)],closed:false,w:1.6});
  S.push({pts:[T(-16,19),T(-18,22)],closed:false,w:1.6});
  S.push({pts:[T(20,18),T(24,21)],closed:false,w:1.6});
  S.push({pts:[T(16,19),T(18,22)],closed:false,w:1.6});
  // a puffed cheek while the fly goes down
  if(p.cheek) S.push({pts:ellipseT(-9,10,7,6,9),closed:true,w:1.3,op:0.8});

  // eyes
  function eye(side){
    const c=T(side*12,-15);
    if((p.eye||0)<=0.08){
      return [{pts:[[c[0]-6,c[1]],[c[0],c[1]+3.5],[c[0]+6,c[1]]],closed:false,w:1.8}];
    }
    const ring=ellipsePts(c[0],c[1],8,8*Math.min(p.eye,1.45),12);
    const py=c[1]-2-(p.look?3.5:0);
    return [{pts:ring,closed:true,w:1.7,sketch:true},
            {pts:ellipsePts(c[0],py,2.8,2.8,8),closed:true,fill:'#3e3e38',col:'#3e3e38',w:1}];
  }
  eye(-1).forEach(s=>S.push(s)); eye(1).forEach(s=>S.push(s));

  // mouth
  if(p.mouth==='smile') S.push({pts:[T(-13,4),T(0,9),T(13,4)],closed:false,w:1.7});
  else if(p.mouth==='flat') S.push({pts:[T(-12,6),T(0,6),T(12,6)],closed:false,w:1.7});
  else if(p.mouth==='open') S.push({pts:ellipseT(0,8,10,7,12),closed:true,fill:'#3e3e38',col:'#3e3e38',w:1.7,op:0.85});
  else if(p.mouth==='closing') S.push({pts:ellipseT(0,7,7,4,10),closed:true,fill:'#3e3e38',col:'#3e3e38',w:1.7,op:0.7});

  // tongue
  if(p.tongue>0){
    const mo=T(0,8);
    const tgt=p.fly?p.fly:[p.fx+20,p.fy-46];
    const tip=[lerp(mo[0],tgt[0],p.tongue),lerp(mo[1],tgt[1],p.tongue)];
    const mid=[lerp(mo[0],tip[0],0.5)+4,lerp(mo[1],tip[1],0.5)];
    S.push({pts:[mo,mid,tip],closed:false,w:2.4,col:'#3e3e38'});
    S.push({pts:ellipsePts(tip[0],tip[1],3.2,3.2,8),closed:true,fill:'#3e3e38',col:'#3e3e38',w:1});
  }

  // the doomed fly
  if(p.fly){
    const fx=p.fly[0],fy=p.fly[1];
    S.push({pts:ellipsePts(fx,fy,3,2,8),closed:true,fill:'#3e3e38',col:'#3e3e38',w:1});
    S.push({pts:ellipsePts(fx-4,fy-3,3.2,1.8,8),closed:true,w:1.1,col:'#5a564a'});
    S.push({pts:ellipsePts(fx+4,fy-3,3.2,1.8,8),closed:true,w:1.1,col:'#5a564a'});
    S.push({pts:[[fx-10,fy-7],[fx-6,fy-4]],closed:false,w:0.9,col:'#5a564a',op:0.7});
    S.push({pts:[[fx+6,fy-8],[fx+10,fy-6]],closed:false,w:0.9,col:'#5a564a',op:0.7});
  }
  return S;
}

// ----- render with per-draw graphite jitter so the held line stays alive -----
function pathFromPts(pts,closed,nojit){
  const J=v=> nojit? v : v+(Math.random()*2-1)*0.6;
  const P=pts.map(p=>[J(p[0]),J(p[1])]);
  const n=P.length;
  if(!n) return '';
  if(n===1) return `M${P[0][0].toFixed(1)} ${P[0][1].toFixed(1)}`;
  if(n===2) return `M${P[0][0].toFixed(1)} ${P[0][1].toFixed(1)} L${P[1][0].toFixed(1)} ${P[1][1].toFixed(1)}`;
  let d=`M${P[0][0].toFixed(1)} ${P[0][1].toFixed(1)}`;
  const get=i=> closed? P[((i%n)+n)%n] : P[Math.max(0,Math.min(n-1,i))];
  const end= closed? n : n-1;
  for(let i=0;i<end;i++){
    const p0=get(i-1),p1=get(i),p2=get(i+1),p3=get(i+2);
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=`C${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  if(closed) d+='Z';
  return d;
}

const scene=document.getElementById('scene');
let frame=0;
function render(){
  const S=buildStrokes(poses[frame]);
  let out='';
  for(const st of S){
    const passes= st.sketch?2:1;
    for(let k=0;k<passes;k++){
      const d=pathFromPts(st.pts,st.closed,st.nojit);
      const op=(st.op==null?1:st.op)*(passes>1?0.6:1);
      out+=`<path d="${d}" fill="${st.fill||'none'}" stroke="${st.col||'#3e3e38'}" stroke-width="${st.w||1.6}" stroke-linecap="round" stroke-linejoin="round" opacity="${op.toFixed(2)}"/>`;
    }
  }
  scene.innerHTML=out;
}

// ----- riffle whisper: a tiny filtered noise burst per frame -----
let actx=null;
function audio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
function whisper(){
  if(!actx) return;
  const dur=0.045, sr=actx.sampleRate, buf=actx.createBuffer(1,Math.floor(sr*dur),sr), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.8); }
  const src=actx.createBufferSource(); src.buffer=buf;
  const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2000+Math.random()*600; f.Q.value=0.8;
  const g=actx.createGain(); g.gain.value=0.16;
  src.connect(f); f.connect(g); g.connect(actx.destination); src.start();
}

function adv(n){ frame=((frame+n)%11+11)%11; whisper(); render(); }

// ----- interaction: click anywhere, hold to riffle, grab the dog-ear -----
let holding=false, dragging=false, dragStartX=0, dragStartFrame=0, lastDragFrame=0, holdTimer=null;
const dogear=document.querySelector('.dogear');

document.addEventListener('pointerdown',e=>{
  if(e.target.closest('a')) return;
  audio();
  if(e.target.closest('.dogear')){
    dragging=true; dragStartX=e.clientX; dragStartFrame=frame; lastDragFrame=frame;
    dogear.classList.add('pinched'); e.preventDefault(); return;
  }
  adv(1);
  holdTimer=setTimeout(()=>{holding=true;},230);
  e.preventDefault();
});
document.addEventListener('pointermove',e=>{
  if(!dragging) return;
  const delta=dragStartX-e.clientX;           // drag toward the spine = forward
  const nf=((dragStartFrame+Math.round(delta/15))%11+11)%11;
  if(nf!==lastDragFrame){ lastDragFrame=nf; frame=nf; whisper(); render(); }
});
function release(){
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
  holding=false;
  if(dragging){dragging=false; dogear.classList.remove('pinched');}
}
document.addEventListener('pointerup',release);
document.addEventListener('pointercancel',release);

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){ e.preventDefault(); audio();
    if(!e.repeat){ adv(1); holdTimer=setTimeout(()=>{holding=true;},230); } else { holding=true; } }
  else if(e.code==='ArrowRight'){ e.preventDefault(); audio(); adv(1); }
  else if(e.code==='ArrowLeft'){ e.preventDefault(); audio(); adv(-1); }
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space'){ if(holdTimer){clearTimeout(holdTimer);holdTimer=null;} holding=false; }
});

// ----- the loop: shimmer always, flip while held (~8fps) -----
let lastShim=0, lastFlip=0;
function loop(t){
  if(t-lastShim>70){ render(); lastShim=t; }
  if(holding && t-lastFlip>120){ frame=(frame+1)%11; whisper(); lastFlip=t; }
  requestAnimationFrame(loop);
}
render();
requestAnimationFrame(loop);

console.log('%celeven frames, one thumb. and the ladybug on the left edge of the pad never moves.','color:#5a564a;font-style:italic');
</script>
