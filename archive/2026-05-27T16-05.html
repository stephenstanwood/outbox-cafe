<title>The Sky Is Doing It Again Tonight</title>
<!-- if you came out tonight, thank you. the curtains know. -->
<style>
  html, body {
    margin: 0; padding: 0;
    background: #070d1c;
    overflow: hidden;
    height: 100%;
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    cursor: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
  }
  canvas {
    display: block;
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  #pointer {
    position: fixed;
    width: 8px; height: 8px;
    background: rgba(195, 255, 225, 0.7);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    box-shadow:
      0 0 10px rgba(0, 221, 153, 0.55),
      0 0 26px rgba(0, 221, 153, 0.22),
      0 0 56px rgba(107, 0, 255, 0.12);
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 10;
  }
  #pointer.on { opacity: 1; }
  .vigil-link {
    position: fixed;
    bottom: 16px;
    right: 18px;
    z-index: 5;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: lowercase;
    opacity: 0;
    animation: ease-in 3.5s 4s forwards;
  }
  @keyframes ease-in { to { opacity: 0.62; } }
  .vigil-link a {
    color: rgba(0, 221, 153, 0.7);
    text-decoration: none;
    border-bottom: 1px dotted rgba(0, 221, 153, 0.32);
    padding-bottom: 1px;
    transition: color 0.4s, border-color 0.4s;
  }
  .vigil-link a:hover {
    color: rgba(180, 255, 220, 0.98);
    border-bottom-color: rgba(180, 255, 220, 0.7);
  }
  @media (max-width: 600px) {
    .vigil-link { font-size: 9px; bottom: 12px; right: 12px; letter-spacing: 0.18em; }
  }
</style>

<body>
<canvas id="sky"></canvas>
<div id="pointer"></div>
<nav class="vigil-link"><a href="/archive">other nights &rarr;</a></nav>
<script>
(function () {
  const canvas = document.getElementById("sky");
  const ctx = canvas.getContext("2d");
  const pointer = document.getElementById("pointer");

  let W = 0, H = 0, DPR = 1;
  let stars = [];
  let bands = [];
  let intensity = 1;
  let paletteIdx = 0;

  let mx = -99999, my = -99999;
  let tmx = mx, tmy = my;
  let active = false;

  const palettes = [
    [
      [0, 221, 153],
      [255, 20, 147],
      [107, 0, 255],
      [60, 210, 230],
      [180, 255, 200],
      [220, 90, 210]
    ],
    [
      [120, 255, 195],
      [255, 105, 205],
      [165, 95, 255],
      [0, 240, 215],
      [255, 195, 230],
      [85, 205, 255]
    ]
  ];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.width = Math.floor(window.innerWidth * DPR);
    H = canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    seedStars();
    seedBands();
  }
  window.addEventListener("resize", resize);

  function seedStars() {
    stars = [];
    const density = window.innerWidth < 600 ? 13000 : 8500;
    const n = Math.floor((W * H) / (density * DPR * DPR));
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.92,
        r: (Math.random() * 1.2 + 0.3) * DPR,
        tw: Math.random() * Math.PI * 2,
        tws: 0.35 + Math.random() * 1.6,
        a: 0.22 + Math.random() * 0.6,
        warm: Math.random() < 0.18
      });
    }
  }

  function seedBands() {
    const pal = palettes[paletteIdx % palettes.length];
    bands = [];
    const n = 6;
    for (let i = 0; i < n; i++) {
      bands.push({
        color: pal[i % pal.length],
        baseY: (0.16 + (i / n) * 0.46 + (Math.random() - 0.5) * 0.07) * H,
        amp1: (42 + Math.random() * 75) * DPR,
        amp2: (14 + Math.random() * 38) * DPR,
        f1: (0.0013 + Math.random() * 0.0024) / DPR,
        f2: (0.0034 + Math.random() * 0.003) / DPR,
        s1: (0.00006 + Math.random() * 0.00013) * (Math.random() < 0.5 ? -1 : 1),
        s2: (0.00012 + Math.random() * 0.00020) * (Math.random() < 0.5 ? -1 : 1),
        phase: Math.random() * Math.PI * 2,
        height: (135 + Math.random() * 130) * DPR,
        alpha: 0.055 + Math.random() * 0.06,
        bp: Math.random() * Math.PI * 2,
        bs: 0.00024 + Math.random() * 0.00040,
        rayFreq: 0.018 + Math.random() * 0.02,
        rayPhase: Math.random() * Math.PI * 2
      });
    }
  }

  function setPointer(x, y) {
    tmx = x * DPR; tmy = y * DPR;
    if (!active) { mx = tmx; my = tmy; }
    active = true;
    pointer.style.left = x + "px";
    pointer.style.top = y + "px";
    pointer.classList.add("on");
  }

  window.addEventListener("mousemove", (e) => setPointer(e.clientX, e.clientY));
  window.addEventListener("mouseleave", () => { active = false; pointer.classList.remove("on"); });
  window.addEventListener("touchstart", (e) => { if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  window.addEventListener("touchmove", (e) => { if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  window.addEventListener("touchend", () => { active = false; pointer.classList.remove("on"); });

  const STILL_AT = 70000;
  const STILL_FOR = 3000;
  let startT = 0, stillT = 0;
  let stillTriggered = false, boosted = false;

  function frame(t) {
    if (!startT) startT = t;
    const elapsed = t - startT;

    if (!stillTriggered && elapsed > STILL_AT) {
      stillTriggered = true;
      stillT = t;
    }

    let auroraAlpha = 1;
    if (stillTriggered) {
      const dt = t - stillT;
      if (dt < STILL_FOR) {
        auroraAlpha = 0;
      } else if (!boosted) {
        intensity = 2;
        paletteIdx = 1;
        seedBands();
        boosted = true;
      }
    }

    mx += (tmx - mx) * 0.09;
    my += (tmy - my) * 0.09;

    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#050917");
    bg.addColorStop(0.55, "#0a1428");
    bg.addColorStop(1, "#10183a");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    for (const s of stars) {
      s.tw += 0.013 * s.tws;
      const a = s.a * (0.55 + 0.45 * Math.sin(s.tw));
      ctx.fillStyle = s.warm
        ? "rgba(255, 220, 200, " + a.toFixed(3) + ")"
        : "rgba(220, 232, 255, " + a.toFixed(3) + ")";
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }

    if (auroraAlpha > 0.01) {
      ctx.globalCompositeOperation = "lighter";
      const step = Math.max(6 * DPR, 6);
      const xrange = 300 * DPR;
      const heatRange = 260 * DPR;

      for (const b of bands) {
        b.bp += b.bs * 16;
        const breathe = 0.72 + 0.28 * Math.sin(b.bp);
        const r = b.color[0], g = b.color[1], bl = b.color[2];

        for (let x = -step; x < W + step; x += step) {
          let y = b.baseY
            + Math.sin(x * b.f1 + t * b.s1 * 1000 + b.phase) * b.amp1
            + Math.sin(x * b.f2 + t * b.s2 * 1000 + b.phase * 1.7) * b.amp2;

          let heatBoost = 1;
          if (active) {
            const dx = x - mx;
            const adx = Math.abs(dx);
            if (adx < xrange) {
              const xpull = 1 - adx / xrange;
              y += (my - y) * xpull * xpull * 0.5;
            }
            const dy = y - my;
            const distSq = dx * dx + dy * dy;
            if (distSq < heatRange * heatRange) {
              const d = Math.sqrt(distSq);
              heatBoost = 1 + (1 - d / heatRange) * 1.6;
            }
          }

          const ray = 0.78 + 0.22 * Math.cos(x * b.rayFreq / DPR + b.rayPhase + t * 0.0009);
          const a = b.alpha * breathe * ray * intensity * auroraAlpha * heatBoost;
          const h = b.height * (1 + (heatBoost - 1) * 0.28);

          const grad = ctx.createLinearGradient(x, y - h, x, y + h * 0.72);
          grad.addColorStop(0, "rgba(" + r + "," + g + "," + bl + ",0)");
          grad.addColorStop(0.45, "rgba(" + r + "," + g + "," + bl + "," + a.toFixed(4) + ")");
          grad.addColorStop(1, "rgba(" + r + "," + g + "," + bl + ",0)");
          ctx.fillStyle = grad;
          ctx.fillRect(x - step / 2, y - h, step + 1, h * 1.72);
        }
      }

      if (active) {
        const r2 = 220 * DPR;
        const cg = ctx.createRadialGradient(mx, my, 0, mx, my, r2);
        cg.addColorStop(0, "rgba(190, 255, 225, " + (0.10 * auroraAlpha).toFixed(3) + ")");
        cg.addColorStop(0.45, "rgba(0, 221, 153, " + (0.035 * auroraAlpha).toFixed(3) + ")");
        cg.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = cg;
        ctx.fillRect(mx - r2, my - r2, r2 * 2, r2 * 2);
      }

      ctx.globalCompositeOperation = "source-over";
    }

    const haze = ctx.createLinearGradient(0, H * 0.74, 0, H);
    haze.addColorStop(0, "rgba(20, 5, 50, 0)");
    haze.addColorStop(1, "rgba(50, 12, 95, 0.28)");
    ctx.fillStyle = haze;
    ctx.fillRect(0, H * 0.74, W, H * 0.26);

    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);

  console.log("%c the sky is moving tonight. somebody saw it. ", "background:#0a1428;color:#00dd99;padding:6px 12px;font-style:italic;letter-spacing:0.1em;");
})();
</script>

<script src="/nav.js" defer></script>
</body>
