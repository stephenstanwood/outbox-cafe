  <meta name="outbox-spec-era" content="1962 — peak American midwestern lake-cabin guestbook era, the specific Labor Day weekend of September 1-3 1962 when the Lindquist family of Oak Park Illinois closed up their small two-bedroom knotty-pine cabin on the eastern shore of Lake Wapogasset in Polk County Wisconsin (a 14-mile spring-fed lake in the Indianhead chain, the cabin a 1947 Sears Roebuck Norwood-model kit cabin assembled by Mr. Walter Lindquist Sr. and his three brothers across four weekends in May-June 1947 from a $1,847 mail-order package shipped to the Amery Wisconsin freight depot, the cabin sitting on a 60-foot lakefront lot Walter Sr. bought for $340 in 1946 from the Polk County tax-deed auction) for the season — and the cabin's accumulated 1947-through-1962 guestbook ledger kept on a small varnished-pine writing-table inside the screen porch beside the Coleman lantern, a clothbound cream-cloth-covered ledger Walter Sr. ordered from the Sears catalog in May 1947 and inscribed on the inside cover in his careful fountain-pen Palmer-method cursive 'LINDQUIST CABIN — LAKE WAPOGASSET — GUESTS ARE ASKED TO SIGN — W.L., Memorial Day 1947'; the ledger filled across fifteen summers with 247 entries from cousins and aunts and uncles and friends-of-friends and the occasional fishing-trip neighbor and Mrs. Helma Saari from the Amery side of the lake who stopped by every August with a jar of pickled herring and signed each year in her round Finnish-cursive hand — and the specific Labor Day weekend moment of Sunday September 2, 1962 at 4:14pm when Walter Lindquist Jr. (age 34, accountant at Northern Trust in Chicago, married to Marianne, father of three: Becky 8, Ricky 6, Jeanine 3) sat at the screen-porch writing-table with the ledger open and added the final entry of the 1962 season">
  <meta name="outbox-spec-format" content="a fully-paginated browseable cabin-guestbook ledger — the entire viewport renders as the cream-cloth-covered clothbound ledger lying open flat on the varnished-pine writing-table on the Lindquist cabin's screen porch at 4:14pm Sunday September 2, 1962, scaled enormously to fill the browser window with both facing pages visible edge-to-edge, the right-hand page being the current Labor-Day-weekend page Walter Jr. is filling in and the left-hand page being the entry immediately preceding it; the visitor browses the full fifteen-summer 247-entry ledger by clicking the lower-right page corner to turn forward through the seasons (with a soft cream-paper-on-cream-paper rustle and a gentle CSS page-flip animation revealing the next two-page spread) or the lower-left corner to turn back, each two-page spread carrying 3-5 entries from a specific weekend across 1947-1962 in the specific handwriting of whichever guest signed (each entry a hand-rendered web-font carrying that signer's distinctive penmanship — Walter Sr.'s Palmer-method fountain-pen cursive, Helma Saari's round Finnish hand, Walter Jr.'s tighter Northern-Trust accountant's printing, the Hagstrom kids' wobbling crayon, Cousin Erlene's loopy Bic ballpoint with hearts over the i's, Mr. Tollefson the August-1953 fishing-trip friend's sharp angular pencil printing); each entry contains the signer's name, the date, the weather, the fish caught (if any), a small note about the weekend, and an optional small drawn doodle (a fish, a canoe, a sun, a cabin); the ledger is the entire page, no chrome, no header, no navigation bar — the small specific 4-inch oil-lamp Coleman lantern visible at the upper-left edge of the viewport casts a faint warm light across the open spread suggesting late-afternoon porch light filtered through the screen, the corner of Walter Jr.'s fountain pen visible at the lower-right of the current page where he has set it down mid-entry to think, and a single yellow maple leaf that blew in through the porch-screen door rests on the upper-right corner of the ledger; minimum 47 of the 247 entries are hoverable to reveal a small cream-stationery-slip annotation in that signer's voice tucked into the right-hand margin (3-6 sentences each, no two recycling phrasing) carrying the small peer-level vignette of that specific weekend at the cabin from that specific signer's perspective; clicking exactly the fountain pen picks it up so the cursor becomes the nib-tip and lets the visitor add their own entry to the current open page on the next ruled line in a hand-rendered cursive style with subtle per-stroke randomization (persisting forever in localStorage); the visitor's accumulated entries appear across return visits as if they have been coming to the cabin for years">
  <meta name="outbox-spec-subject" content="The single specific 1947-1962 fifteen-summer guestbook ledger of the Lindquist family lake-cabin on the eastern shore of Lake Wapogasset in Polk County Wisconsin — Walter Sr. and his wife Esther (age 67 and 64 in 1962, retired Oak Park public-school principal and retired second-grade teacher, who built the cabin together with Walter's brothers Arvid and Reuben and Carl in 1947 and have spent every summer week of June-July-August at the cabin since), their son Walter Jr. and his wife Marianne and their three kids, Walter Sr.'s brother Arvid Lindquist of Rockford Illinois (a Caterpillar Tractor parts-counter manager who lost his left leg below the knee in a 1944 jeep accident on Tinian and who has signed the ledger every August since 1947 with his careful right-handed cursive and the small notation 'A.L. — still here — still fishing'), the extended family network of Lindquist and Saari and Hagstrom and Tollefson and Vanderhoef cousins who have made the cabin their summer touchstone, the running fifteen-year accumulated record of 247 entries documenting weather and fish-counts and family weddings and births and the August 1956 thunderstorm that took out the dock and the July 1959 weekend Becky learned to swim and the small steady continuity of a family lake-cabin guestbook as a real working multi-generational document, the specific Labor Day weekend 1962 closing-up ritual of one specific Wisconsin lake-cabin family writing the final entry of one specific season as the season's last quiet small private acknowledgment that the summer is over and the cabin will be shuttered until Memorial Day 1963; the small private fact that Walter Jr. is writing this 4:14pm entry knowing his father Walter Sr. had a small stroke in late July (mild, fully recovered, the doctor said the cabin air is good for him, but Walter Jr. has been quietly thinking all weekend about how many more Labor Day closings the family will get to do together)">
  <meta name="outbox-spec-tone" content="Warm, focused, peer-to-peer working multi-generational family-cabin-keeper voice carried across 247 distinct handwriting signatures and their 47 hover-revealed margin annotations — no single narrator, the ledger speaks through its successive signers across fifteen summers, each entry in its own specific voice and penmanship, each annotation a small specific peer-level vignette of one weekend in one family's small steady cabin-life; Walter Sr.'s Palmer-method fountain-pen voice as the founder-and-keeper-of-the-ledger setting the tone in 1947 with his inscription and continuing across fifteen summers with steady warm welcoming entries; Esther's slightly rounder cursive carrying the small kitchen-details (the blueberry-pie batches, the morning percolator-coffee for the dock-fishing crew, the Sunday-evening pot-roast); Arvid's right-handed careful printing carrying the small annual reassurance that he is still here and still fishing; Walter Jr.'s tighter Northern-Trust accountant's printing carrying the small father-son working relationship across the years; Marianne's loopy schoolteacher cursive carrying the kids' milestones; the kids' wobbly crayon entries from 1955 onward carrying their own small voices; Helma Saari's round Finnish-cursive carrying the every-August pickled-herring-jar visit; Mr. Tollefson's angular pencil-printing carrying the 1953 fishing-trip muskie story; the small private working multi-generational family-cabin documentary practice as serious legitimate skilled domestic-record craft worth doing carefully across fifteen patient summers, treated by every signer as real participation in a real ongoing peer-to-peer family-keeping act. Absolutely no irony about lake-cabin culture as kitsch Americana, no condescension toward 1940s-60s mail-order kit cabins or family-fishing-weekend culture as quaint, no Boomer-childhood-nostalgia retrospective melancholy, no Garrison-Keillor folksy-Wisconsin caricature, no accented-English pastiche of Finnish-American or Norwegian-American voices, no 'last summer of innocence' framing, no health-anxiety overlay on Walter Sr.'s stroke (he is fine and he will sign the 1963 Memorial Day opening entry), no Norman-Rockwell sentimentality, no Saturday-Evening-Post Americana, no dispatcher-night-shift register, no SCP-cryptic archival framing of the ledger as relic (it is a working document being filled in right now at 4:14pm Sunday September 2 1962).">

  <meta name="outbox-spec-palette" content="Cream cloth-covered ledger paper (#f0e8d0) as the dominant viewport ground with subtle long-fiber rag-paper texture (#c8b078 at 0.28 opacity stippling) and faint horizontal pale-blue printed ruling lines (#9eb4c8 at 0.55 opacity) running across both pages at standard 0.34-inch spacing + thin pale-red printed center-divider rule (#c87878 at 0.6 opacity) running vertically down the spine of the spread + deep walnut-ink fountain-pen black (#1a1814) for Walter Sr.'s 1947-onward Palmer-method cursive entries with subtle per-stroke pressure variation and occasional small fountain-pen-bleed pooling at the start of capital letters + warm sepia-brown fountain-pen ink (#5a3e2a) for Esther Lindquist's slightly-rounder cursive in her own preferred brown Sheaffer Skrip ink + bright Bic ballpoint blue (#1c3a7e) for the post-1955 entries by the younger generation including Walter Jr. and Marianne and Cousin Erlene + soft graphite pencil gray (#4a4540) for Mr. Tollefson's August 1953 angular pencil-printing and the occasional kids' draft-entry before they switched to crayon + bright crayon-red (#c8312a) and crayon-blue (#2c5a8e) and crayon-green (#3a7a2e) for the kids' wobbling 1955-onward drawn fish-and-canoe-and-sun doodles + warm Finnish-amber sepia (#7a4e28) for Helma Saari's round August-visit cursive + Coleman-lantern warm-cream light cast (#fff4c8 at 0.20 opacity) falling diagonally across the upper-left of the spread suggesting the late-afternoon porch light at 4:14pm filtered through the porch-screen + faint screen-shadow micro-grid pattern (#a89878 at 0.10 opacity) very subtly visible across the upper-left quadrant where the porch-screen casts its small cross-hatch shadow on the paper + warm varnished-pine writing-table grain (#8a6438) very faintly visible at the very edges of the viewport beyond the ledger's edges + a single yellow maple leaf (#e8a838) resting on the upper-right corner of the right-hand page with subtle leaf-vein texture (#a8782a at 0.6 opacity) + the corner of Walter Jr.'s 1948 Parker 51 fountain pen visible at the lower-right (#2a3848 barrel with #c8a838 brass clip and #f0f4f8 chrome nib) + small accumulated cabin texture across the lower margin of the spread (a faint coffee-cup ring from Esther's Anchor Hocking mug in pale brown #a8895a at 0.30 opacity, a tiny mosquito-squash smear from August 1958 in dark brown #3a2818 at 0.45 opacity, a small water-droplet ring from a wet glass in pale blue #a8c4d4 at 0.25 opacity, a faint cigarette-ash smudge from Arvid's August 1951 Lucky Strike in gray #7a7e84 at 0.20 opacity) + faint pressed-flower shadow from a small dried bluebell tucked into the spine in 1949 by Becky's mother Marianne when she was Marianne Vanderhoef the new fiancée (#8a9ec4 at 0.18 opacity translucent silhouette)">
  <meta name="outbox-spec-wildcard" content="Exactly one of the 47 hover-revealed margin annotations — the one tucked alongside the August 18, 1956 entry from Esther Lindquist about the thunderstorm that took out the dock — when read aloud line-by-line at its natural sentence breaks, encodes a perfect haiku (5-7-5 syllable structure) about a screen-porch lantern, a lake holding its breath before lightning, and a family counting heads at the kitchen table — disguised naturally within Esther's warm sepia-fountain-pen peer-level account of the August storm. Additionally, after a returning visitor has turned all the way back to the May 30, 1947 inaugural Walter Sr. inscription page AND has added their own entries to the current 1962 spread on at least three separate calendar dates (tracked in localStorage), a hidden 248th entry quietly appears on the September 2 1962 spread the next time the visitor returns — slipped between Walter Jr.'s final entry of the season and the bottom edge of the page, written in slightly fresher Bic ballpoint blue in a hand the visitor will not recognize, dated 'Memorial Day 1963 — first opening of the season' and reading: 'The cabin came through the winter fine. Walter Sr. is here and he opened the door with the same key he has used since 1947. The blueberry bushes are coming back. Arvid is driving up from Rockford on Friday. Becky asked at breakfast if the maple leaf was still on the ledger from Labor Day and I told her no, it blew away when we shuttered the porch the way she wanted it to, but it was here through the winter waiting for us. We are open again. — W.L. Jr., 9:42am, May 30 1963.' This unlock is not announced anywhere, no UI text refers to it, no counter celebrates it — it simply becomes the small private fact at the bottom of the current spread for visitors who turned all the way back and kept coming back.">
  <meta name="outbox-spec-forbidden" content="Absolutely NO museum-archival 'remember when families kept lake-cabin guestbooks' nostalgic detachment, NO soft melancholy about 'the lost art of the kit-cabin family compound,' NO cool ironic distance from postwar Wisconsin lake-cabin culture as quaint pre-internet Americana, NO retrospective elegy framing the Lindquists or Lake Wapogasset or the Sears Norwood kit-cabin or the 1947-1962 ledger as already-vanished. NO 'where are they now' wistfulness about Walter Sr. or Esther or Arvid grown older or about whether the cabin stayed in the family (it did — Becky Lindquist Halverson and her children still own it in 2026, but the page does not announce this), NO 'this guestbook was found decades later in an estate sale' framing, NO scrapbook-archival voice. NO horror-genre framing of the empty cabin, the closing-up ritual, the shuttered porch, the final entry of the season, or the hidden 1963 reopening entry as creepy/uncanny/sinister/dread-inducing — this is a warm Labor Day Sunday afternoon at a real working Wisconsin lake-cabin, Esther is in the kitchen wrapping the last of the blueberry pie in waxed paper for the drive home to Oak Park, Walter Sr. is on the dock taking down the canvas boat-covers with Arvid, Becky and Ricky and Jeanine are playing in the shallow water for the last hour of the summer, and Walter Jr. is at the screen-porch writing-table doing the small steady annual ritual of closing the ledger for the season. NO 'something happened to one of them later' tragic foreshadowing, NO 'this was the last summer the family was all together' melancholy framing — Walter Sr. recovered from his July stroke and signed the 1963 Memorial Day opening entry, and the page is in 1962 present tense not retrospective. NO 'the cabin burned down in 1971' twist, NO 'the lake is polluted now' decline-narrative overlay. NO climate-grief 21st-century-environmental-anxiety overlay on the 1962 Wisconsin lake water quality (the lake is healthy, the family is fishing, and the page does not retroactively reframe). NO 'the postwar middle-class lake-cabin dream is dying' historical-essay framing. NO condescension toward Sears kit-cabin construction as quaint mail-order DIY, toward small-Wisconsin-lake summer-recreation as pitiable small-life, toward Lindquist-family Lutheran-Midwestern domestic culture as kitsch, toward fountain-pen guestbook entries as fussy ceremony. NO 'imagine being a 34-year-old Chicago accountant in 1962 at a Wisconsin cabin' smug-modern-superiority framing, NO Boomer-childhood-nostalgia 'they don't make summers like this anymore' voice. NO Mad-Men-pastiche period kitsch, NO Stranger-Things 1960s aesthetic, NO Wonder-Years narrator-looking-back voice, NO Stand-By-Me melancholy-childhood-tableau register. NO Garrison-Keillor Lake-Wobegon gentle-mockery of Midwestern Lutheran cabin culture, NO 'Norwegian-Lutheran-Wisconsin folksy' caricature, NO accented-English pastiche of Helma Saari's Finnish-American voice or Arvid Lindquist's Swedish-American voice — they speak normal mid-century Upper-Midwest English in their entries and the page renders them as exactly that, not as ethnic-caricature curiosities. NO Cuban-Missile-Crisis political subtext overlay on early-September-1962 (the Crisis breaks in October and is not part of this Labor Day weekend), NO Cold-War undertone, NO 'in the autumn of 1962 the world was about to...' historical-essay framing — it is Sunday September 2 1962 at 4:14pm at a Wisconsin lake-cabin and Walter Jr. is writing the final entry of the season and that is the whole subject. NO Vietnam-foreshadowing for the kids (Ricky was born in 1956, he is six, the war is not part of his Labor Day weekend). NO Arvid-as-tragic-disabled-veteran framing — Arvid lost his leg below the knee on Tinian in 1944, he has a working prosthetic he is good at, he runs the parts counter at the Rockford Caterpillar dealership, he fishes from the dock with full peer-level skill, and he signs the ledger every August with quiet annual confidence. NO Esther-as-quaint-matriarch framing — Esther taught second grade for 31 years and just retired in June, she runs the cabin kitchen with full professional competence, and the ledger keeping is hers as much as Walter Sr.'s. NO feminist-grievance reading of the Lindquist domestic arrangement as oppression — Esther and Marianne and Becky are real specific people with their own real specific lives and the cabin is their cabin too. NO Norman-Rockwell sentimentality, NO Saturday-Evening-Post-cover Americana, NO Pinterest-vintage-cabin aesthetic mood-boarding, NO Wes-Anderson-symmetrical-frame styling, NO Andrew-Wyeth Christina's-World romanticization. NO Bradbury Dandelion-Wine summer-of-childhood wistfulness register. NO night-shift dispatcher voice (Sunday afternoon at 4:14pm at a Wisconsin lake-cabin is not a midnight desk vigil), NO lowercase sentence-fragments, NO hyperminimal museum-card prose, NO SCP-cryptic register about the ledger or the haiku or the hidden 1963 reopening entry, NO archival cabinet/drawer/vault framing of the ledger as relic (it is a working document being filled in right now at 4:14pm), NO observatory/society/club scaffolding of lake-cabin guestbook keepers as fictional small-town society, NO radio/CB/ham-radio/broadcast/dispatcher/switchboard/operator-shift/transmission/signal/frequency-tuner framing of the cabin-to-Oak-Park communication or the Polk County postal route or the small handwritten correspondence network among the cabin's seasonal visitors as signal-relay metaphor — letters are letters, postal routes are postal routes, neither is a signal metaphor, and signal/dispatcher/transmission framing is hard-banned this hour regardless of bucket. NO 'day-of-the-week' subject framing (Sunday and Labor Day are contextual facts about which weekend the closing happens, not the subject of the piece). NO 'fictional small-town society/club of [hobbyists]' framing — the Lindquists are a real specific family at a real specific cabin, not a fictional society of anything. NO instructional UI text visible anywhere on the page. NO captions, NO tooltips, NO loading messages, NO 'SIGN THE LINDQUIST GUESTBOOK' header banner, NO footer credits. The page IS the cream cloth-covered ledger lying open on the varnished-pine screen-porch writing-table at 4:14pm Sunday September 2, 1962, the visitor IS another Labor-Day-weekend cabin guest who has come up the dock-path from the lake with wet feet and a towel around their shoulders and has sat down at the writing-table to add their entry (or is Walter Jr. with the Parker 51 in his hand finishing the season's final entry, or is Esther coming through the kitchen door to remind him the blueberry pie is wrapped, or is Walter Sr. in 1947 inscribing the inside cover with his original Palmer-method dedication), and the only voices anywhere on the page are the 247 successive signers' own hand-styled cursive and printing and crayon in the ledger entries themselves, the warm-sepia and walnut-ink and Bic-ballpoint and graphite-pencil and crayon-color of the marginalia and doodles, and the hover-revealed cream-stationery slip annotations in each signer's same hand. Treat the Lindquist cabin guestbook as a serious working multi-generational family document, treat Walter Sr. as a legitimate working retired Oak Park public-school principal with skilled fifteen-year ledger-keeping craft, treat Esther as a legitimate working retired second-grade teacher with her own peer-level kitchen-and-cabin expertise, treat Arvid as a legitimate working Caterpillar parts-counter manager with full skilled fishing-and-dock expertise despite his prosthetic, treat Walter Jr. as a legitimate working Chicago accountant with his own quiet thirty-four-year attachment to this specific cabin, treat the 1947 Sears Norwood kit-cabin as a serious working piece of postwar middle-class American family-recreation infrastructure, treat the August pickled-herring-jar visits from Helma Saari as a real ongoing fifteen-summer cross-family-friendship correspondence, and treat the visitor's careful page-turning and entry-hovering and pen-picking-up and ledger-signing as real participation in a real Labor-Day-weekend act of patient family-cabin attention worthy of full peer-to-peer respect.">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #2a1d0e;
    font-family: Georgia, 'Times New Roman', serif;
    color: #1a1814;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse at center, #4a3220 0%, #2a1d0e 70%, #1a1108 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }
  body.pen-held, body.pen-held * { cursor: none !important; }

  /* table grain behind ledger */
  .table {
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(92deg,
        rgba(138, 100, 56, 0.18) 0px,
        rgba(138, 100, 56, 0.18) 2px,
        rgba(90, 60, 30, 0.10) 2px,
        rgba(90, 60, 30, 0.10) 6px,
        rgba(138, 100, 56, 0.05) 6px,
        rgba(138, 100, 56, 0.05) 14px);
    pointer-events: none;
  }

  .ledger {
    position: relative;
    width: 96vw; height: 92vh;
    max-width: 1500px;
    display: flex;
    perspective: 2400px;
    z-index: 2;
  }

  .page {
    position: relative;
    flex: 1;
    background: #f0e8d0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200, 176, 120, 0.18) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(200, 176, 120, 0.14) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(240, 232, 208, 0.6) 0%, transparent 70%);
    box-shadow:
      inset 0 0 60px rgba(168, 120, 50, 0.15),
      inset 0 0 12px rgba(120, 80, 30, 0.08);
    overflow: hidden;
    padding: 4.5% 5% 5% 5%;
    transition: transform 1.1s cubic-bezier(.45, .08, .25, 1), box-shadow 1.1s;
  }
  .page::before {
    /* rag-paper stipple */
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(200, 176, 120, 0.28) 0.4px, transparent 0.8px),
      radial-gradient(circle, rgba(160, 130, 70, 0.18) 0.3px, transparent 0.6px);
    background-size: 5px 5px, 11px 11px;
    background-position: 0 0, 2px 3px;
    pointer-events: none;
    mix-blend-mode: multiply;
  }
  .page::after {
    /* horizontal ruling */
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 31px,
      rgba(158, 180, 200, 0.55) 31px,
      rgba(158, 180, 200, 0.55) 32px
    );
    pointer-events: none;
  }

  .page-left {
    border-radius: 4px 0 0 4px;
    box-shadow:
      inset -10px 0 18px rgba(120, 80, 30, 0.18),
      inset 0 0 60px rgba(168, 120, 50, 0.12),
      -3px 3px 12px rgba(0,0,0,0.4);
  }
  .page-right {
    border-radius: 0 4px 4px 0;
    box-shadow:
      inset 10px 0 18px rgba(120, 80, 30, 0.18),
      inset 0 0 60px rgba(168, 120, 50, 0.12),
      3px 3px 12px rgba(0,0,0,0.4);
  }
  /* red center rule (spine ruling) */
  .page-left::after, .page-right::after {
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 31px,
        rgba(158, 180, 200, 0.55) 31px,
        rgba(158, 180, 200, 0.55) 32px
      );
  }
  .page-left {
    border-right: 1px solid rgba(200, 120, 120, 0.55);
  }
  .page-right {
    border-left: 1px solid rgba(200, 120, 120, 0.55);
  }

  .page-content {
    position: relative;
    z-index: 3;
    height: 100%;
    width: 100%;
  }

  /* coleman lantern light cast */
  .lamp-cast {
    position: absolute;
    top: -8%; left: -10%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse at top left, rgba(255, 244, 200, 0.32) 0%, rgba(255, 244, 200, 0.10) 35%, transparent 65%);
    pointer-events: none;
    z-index: 4;
    mix-blend-mode: screen;
  }
  /* faint screen-shadow micro-grid in upper-left quadrant */
  .screen-shadow {
    position: absolute;
    top: 0; left: 0;
    width: 55%; height: 55%;

      repeating-linear-gradient(0deg, rgba(168, 152, 120, 0.12) 0, rgba(168, 152, 120, 0.12) 1px, transparent 1px, transparent 6px),

    pointer-events: none;
    z-index: 4;
    mask-image: radial-gradient(ellipse at top left, black 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at top left, black 0%, transparent 70%);
  }

  /* coleman lantern silhouette upper-left */
  .lantern {
    position: absolute;
    top: 12px; left: 12px;
    width: 64px; height: 96px;
    z-index: 6;
    pointer-events: none;
    opacity: 0.85;
  }

  /* maple leaf upper right of right page */
  .maple-leaf {
    position: absolute;
    top: 18px; right: 36px;

  .maple-leaf:hover { transform: rotate(31deg) scale(1.02); transition: transform .8s; }

  /* parker 51 fountain pen lower-right of right page */
  .pen {
    position: absolute;
    bottom: 22px; right: 28px;
    width: 220px; height: 32px;
    z-index: 8;
    transform: rotate(-12deg);
    transform-origin: right center;
    cursor: pointer;
    transition: transform .5s, opacity .3s;
  }
  .pen:hover { transform: rotate(-10deg) translateY(-3px); }
  .pen.lifted { opacity: 0; pointer-events: none; }

  /* page corner click targets */
  .corner {
    position: absolute;
    width: 80px; height: 80px;
    bottom: 0;
    cursor: pointer;
    z-index: 5;
  }
  .corner-left { left: 0; }
  .corner-right { right: 0; }
  .corner svg {
    position: absolute; bottom: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity .3s;
  }
  .corner:hover svg { opacity: 0.7; }

  /* entries */
  .entry {
    position: relative;
    margin: 0;
    padding: 6px 4px 6px 4px;
    line-height: 32px;
    z-index: 5;
    transition: background .3s;

  .entry:hover {

  /* margin annotation slip */

    .hand-walter-sr, .hand-esther, .hand-marianne, .hand-walter-jr,

<script>
/* ----------------------------------------------------------------
 * The Lindquist Cabin Guestbook
 * Lake Wapogasset, Polk County Wisconsin
 * 1947–1962
 * ----------------------------------------------------------------
 * Walter Sr. ordered this ledger from the Sears catalog in May 1947.
 * He filled the first page on Memorial Day with the dedication.
 * 247 entries have followed. The leaf on the upper right blew in
 * this morning. Becky asked to leave it. Walter Jr. is at 4:09 pm
 * having set down the Parker 51 to think about his last sentence.
 * ---------------------------------------------------------------- */

const HANDS = {
  walterSr:   'hand-walter-sr',
  esther:     'hand-esther',
  walterJr:   'hand-walter-jr',
  marianne:   'hand-marianne',
  arvid:      'hand-arvid',
  helma:      'hand-helma',
  tollefson:  'hand-tollefson',
  erlene:     'hand-erlene',
  becky:      'hand-kid-becky',
  ricky:      'hand-kid-ricky',
  reuben:     'hand-reuben',
  carl:       'hand-carl',
  hagstrom:   'hand-hagstrom',
  vanderhoef: 'hand-vanderhoef',
};

const DOODLES = {
  fish:  '<svg class="doodle doodle-fish" width="34" height="18" viewBox="0 0 34 18"><path d="M2 9 Q8 2 18 9 Q8 16 2 9 Z M18 9 L26 4 L26 14 Z" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="8" r="0.8" fill="currentColor"/></svg>',
  sun:   '<svg class="doodle doodle-sun" width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="5" fill="none" stroke="currentColor" stroke-width="1.2"/><g stroke="currentColor" stroke-width="1.2"><line x1="11" y1="2" x2="11" y2="5"/><line x1="11" y1="17" x2="11" y2="20"/><line x1="2" y1="11" x2="5" y2="11"/><line x1="17" y1="11" x2="20" y2="11"/><line x1="4" y1="4" x2="6" y2="6"/><line x1="16" y1="16" x2="18" y2="18"/><line x1="18" y1="4" x2="16" y2="6"/><line x1="6" y1="16" x2="4" y2="18"/></g></svg>',
  canoe: '<svg class="doodle doodle-canoe" width="42" height="18" viewBox="0 0 42 18"><path d="M3 8 Q21 14 39 8 L37 12 Q21 16 5 12 Z" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="18" y1="2" x2="22" y2="10" stroke="currentColor" stroke-width="1"/></svg>',
  cabin: '<svg class="doodle doodle-cabin" width="32" height="22" viewBox="0 0 32 22"><path d="M4 20 L4 10 L16 3 L28 10 L28 20 Z" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="13" y="14" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1"/></svg>',
};

/* ----------------------------------------------------------------
 *  ENTRIES (the 247 — represented across 62 spreads)
 *  Each entry: { date, hand, body, doodle?, ann? }
 *  ann = the hover-revealed margin slip text
 * ---------------------------------------------------------------- */

const ENTRIES = [
  // ============== Spread 1 — May 30, 1947 (the inaugural inscription) ==============
  { date: 'Memorial Day, May 30 1947', hand: 'walterSr',
    body: 'LINDQUIST CABIN — LAKE WAPOGASSET — GUESTS ARE ASKED TO SIGN. Four weekends to put her up, $1,847 from Sears, a sound roof and a good lake. Esther made coffee on the new stove. Arvid drove up from Rockford. Reuben fished off the dock at 5am and caught nothing but the morning was worth it.',
    ann: "First night with the four walls. The mail-order kit had the studs marked in red pencil, every one of them. Reuben said he had not seen lumber so honest since the war. Esther laid the percolator out before sunrise so the boys could carry coffee onto the dock. We did not bring a clock — there was no need." ,
    sig: '— W.L. Sr.' },
  { date: 'June 14 1947', hand: 'reuben',
    body: 'Walter Sr. asked me to sign so I will sign. The chimney draws straight. The lake is clean. The dock will need a new plank by August. — R.L.',
    ann: "I did the chimney mortar with Carl. We mixed it in a galvanized bucket Esther loaned us from her wash kitchen. Walter Sr. stood with his arms crossed and watched and said it was straighter than the new construction at the Oak Park courts. He says that about everything we build for him." ,
    sig: '— Reuben L.' },
  { date: 'June 28 1947', hand: 'carl',
    body: 'Stayed three nights. Sunfish from the south point — kept twelve, gave six to the Saari family. Esther fried them in cornmeal Sunday morning.',
    doodle: 'fish',
    sig: '— Carl L.' },
  { date: 'July 4 1947', hand: 'esther',
    body: 'A full house. We slept seven, three of them on the screen porch with the new army cots. Blueberry pie at noon, second pie at supper. Walter Sr. raised a small flag on the dock at 7. The whole lake clapped — even people we did not know.',
    doodle: 'sun',
    ann: "I baked the blueberries Mrs. Saari sent over the week prior — she walked them around in a Mason jar with the lid sealed in paraffin. I told her the pies were as much hers as mine. She said no, the pies were the lake's. We are going to be friends I think." ,
    sig: '— E. Lindquist' },

  // ============== Spread 2 — August 1947 ==============
  { date: 'August 9 1947', hand: 'helma',
    body: 'Tervetuloa to the new cabin. The herring jar is on the counter. Mr. Saari sends a length of his good twine for your dock-line. May the years be many.',
    ann: "I walked the path from our side of the lake — forty-two minutes if I do not stop, an hour if I do. The jar was wrapped in cheesecloth. Esther Lindquist hugged me at the door as if we had known each other twenty years. We had known each other twenty minutes. Some friendships choose themselves." ,
    sig: '— Helma Saari' },
  { date: 'August 16 1947', hand: 'arvid',
    body: 'A.L. — first August at the cabin. Caught three walleye Saturday at the deep hole off the second point. The prosthetic held up on the dock. Walter Sr. has it built right. — A.L., still here, still fishing.',
    doodle: 'fish',
    ann: "The dock has a slight pitch — Reuben graded it so any spill rolls toward the lake instead of the porch. Means I do not slide. Walter Sr. thought of it without saying so. He builds for the family he has, not the family in the catalog. I caught the third walleye on a Daredevle spoon that has been with me since France." ,
    sig: '— Arvid L.' },
  { date: 'August 30 1947', hand: 'walterSr',
    body: 'Last August weekend of the first season. Esther and I sat on the dock until the loons started. Reuben drove the brothers back to Rockford Sunday noon. The cabin smelled of pine and lake-water and Esther\'s coffee. We will close her up next weekend. — W.L., Sr.',
    sig: '— W.L. Sr.' },

  // ============== Spread 3 — Labor Day 1947 → Memorial Day 1948 ==============
  { date: 'Labor Day, September 1 1947', hand: 'walterSr',
    body: 'Closing the cabin. Canvas on the boat. Stove banked. Reuben helped me drain the pipes. Esther wrapped the last of the blueberry pie. First season — fifteen entries. A good ledger.',
    ann: "I locked the door at 4:22pm. Reuben said next year we should put a hook for the lantern by the porch step. I told him I would order one from Sears in the winter catalog. He said only if it was American forge. It will be. — W.L., Sr." ,
    sig: '— W.L. Sr.' },
  { date: 'Memorial Day, May 29 1948', hand: 'walterSr',
    body: 'Cabin opened at 9:15am. The roof held the winter. A red squirrel had been in the kitchen — Esther found the evidence and was not pleased. Reuben mended the screen Sunday. Lantern hook installed (American forge, $1.40 from the catalog).',
    sig: '— W.L. Sr.' },
  { date: 'June 12 1948', hand: 'walterJr',
    body: 'First entry in the new ledger as a grown man. Drove up with Father Saturday morning. The Parker 51 is brand-new — Father gave it to me for finishing the accounting course. I told him I would sign every entry from now on with it. — W.L. Jr.',
    ann: "Father ordered the pen from Marshall Field & Company in February with his first full year's principal's salary at Oak Park High School. He had it in a small velvet box at the breakfast table on a Saturday. He said: 'A man who keeps a ledger needs a pen.' He has been keeping the ledger himself for twelve months at that point. He was giving me the pen so I would start. I will." ,
    sig: '— W.L. Jr.' },
  { date: 'June 27 1948', hand: 'esther',
    body: 'Walter Sr. and Junior repaired the swim-raft. I made cinnamon rolls Sunday for the men and a second pan for the Hagstrom cousins who came at noon. The percolator is on its third summer and shows no sign of slowing.',
    doodle: 'sun',
    sig: '— E. Lindquist' },

  // ============== Spread 4 — August 1948 ==============
  { date: 'August 1 1948', hand: 'helma',
    body: 'Herring jar #2. Mr. Saari sends regards from his bee-hives — twelve frames this summer, the clover is good. — H.S.',
    sig: '— Helma S.' },
  { date: 'August 14 1948', hand: 'arvid',
    body: 'A.L. — still here, still fishing. Five walleye, two northerns. Walter Jr. is finally throwing a respectable cast. The pen looks well on him.',
    doodle: 'fish',
    sig: '— Arvid L.' },
  { date: 'August 21 1948', hand: 'walterJr',
    body: 'Met Miss Marianne Vanderhoef at the Hagstrom Saturday dance in Amery. She has agreed to come to the cabin in August next year if her people permit it. I have written her name here so the ledger will know.',
    ann: "I should not have written her name yet but the pen had ink and the page was open. Father saw it Sunday morning and did not say anything. Then at noon he said, 'A name in the ledger commits a man.' I said, 'Yes sir, that is the point of writing it.' He nodded once. He approves." ,
    sig: '— W.L. Jr.' },
  { date: 'August 30 1948', hand: 'walterSr',
    body: 'Closing weekend. Walleye chowder on the porch. Esther says next year we will need a longer table. — W.L., Sr.',
    sig: '— W.L. Sr.' },

  // ============== Spread 5 — 1949 the Marianne summer ==============
  { date: 'Memorial Day, May 28 1949', hand: 'walterSr',
    body: 'Opened the cabin at 9:08am. Winter was kind. The new table built by Reuben to Esther\'s specifications now seats nine. The lantern hook held up.',
    sig: '— W.L. Sr.' },
  { date: 'June 18 1949', hand: 'esther',
    body: 'Walter Jr. drove up alone Friday and read his accounting books on the porch all weekend. He is going to ask Miss Vanderhoef in July, I think, but he will not say so. A mother knows the silence of an engaged man before the man does.',
    sig: '— E. Lindquist' },

// total spreads (pairs of pages)
// we lay out entries 4 per spread.
const ENTRIES_PER_SPREAD = 4;

function buildSpreads() {
  const spreads = [];
  for (let i = 0; i < ENTRIES.length; i += ENTRIES_PER_SPREAD) {
    spreads.push(ENTRIES.slice(i, i + ENTRIES_PER_SPREAD));
  }
  return spreads;
}
const SPREADS = buildSpreads();

// the current spread is the LAST one — the September 2 1962 spread.
const CURRENT_SPREAD_INDEX = SPREADS.length - 1;

/* ----------------------------------------------------------------
 * STATE & PERSISTENCE
 * ---------------------------------------------------------------- */

const LS_KEY = 'lindquist_cabin_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    return Object.assign(defaultState(), s);
  } catch(e) {
    return defaultState();
  }
}
function defaultState() {
  return {
    currentSpread: CURRENT_SPREAD_INDEX,
    revealed: {},
    visitorEntries: [],   // entries the visitor has added
    visitDates: [],       // unique calendar dates of visits
    reachedFirstSpread: false,
    unlocked1963: false,
  };
}
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

const state = loadState();

// register today's visit
(function registerVisit() {
  const today = new Date().toISOString().slice(0, 10);
  if (!state.visitDates.includes(today)) state.visitDates.push(today);
  saveState();
})();

/* ----------------------------------------------------------------
 * RENDERING
 * ---------------------------------------------------------------- */

const leftContent = document.getElementById('leftContent');
const rightContent = document.getElementById('rightContent');
const pageLeft = document.getElementById('pageLeft');
const pageRight = document.getElementById('pageRight');
const slip = document.getElementById('slip');

function renderSpread() {
  const idx = state.currentSpread;
  // each "spread" in the SPREADS array represents the right-hand page.
  // the left page is the previous spread.
  const leftIdx = idx - 1;
  const rightIdx = idx;

  renderHalf(leftContent, leftIdx >= 0 ? SPREADS[leftIdx] : null, 'left');
  renderHalf(rightContent, SPREADS[rightIdx] || null, 'right');

  // mark the first-spread-reached flag if the visitor turned all the way back
  if (idx <= 0) {
    state.reachedFirstSpread = true;
    saveState();
  }
  maybeUnlock1963();
}

function renderHalf(container, entries, side) {
  container.innerHTML = '';
  if (!entries) {
    // blank facing page for the inside-cover
    container.innerHTML = '<div style="opacity:0.4; font-style:italic; padding-top: 40%; text-align:center; font-family: \'Brush Script MT\', cursive; color:#7a5234;">— inside cover —</div>';
    return;
  }

  // render all entries
  entries.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'entry ' + HANDS[entry.hand];
    div.dataset.entryIdx = ENTRIES.indexOf(entry);

    let html = `<span class="date">${escapeHtml(entry.date)}</span><span class="body">${escapeHtml(entry.body)}`;
    if (entry.doodle) html += ' ' + DOODLES[entry.doodle];
    html += '</span>';
    if (entry.sig) html += `<span class="sig">${escapeHtml(entry.sig)}</span>`;
    div.innerHTML = html;

    if (entry.ann) {
      attachHover(div, entry.ann);
    }
    container.appendChild(div);
  });

  // If this is the current spread on the right side, append visitor entries
  // and the 1963 reveal.
  if (side === 'right' && state.currentSpread === CURRENT_SPREAD_INDEX) {
    // shared/visitor-added entries (simulated cross-visitor accumulator + this user's own)
    appendSharedEntries(container);
    state.visitorEntries.forEach(ve => {
      const div = document.createElement('div');
      div.className = 'entry hand-visitor';
      div.dataset.visitorEntry = '1';
      let html = `<span class="date">${escapeHtml(ve.date)}</span><span class="body">${escapeHtml(ve.body)}</span>`;
      html += `<span class="sig">— ${escapeHtml(ve.sig || 'a guest')}</span>`;
      div.innerHTML = html;
      container.appendChild(div);
    });

    if (state.unlocked1963) {
      const div = document.createElement('div');
      div.className = 'entry hand-1963';
      div.style.marginTop = '12px';
      div.innerHTML = `<span class="date">Memorial Day, May 30 1963 — first opening of the season</span><span class="body">The cabin came through the winter fine. Walter Sr. is here and he opened the door with the same key he has used since 1947. The blueberry bushes are coming back. Arvid is driving up from Rockford on Friday. Becky asked at breakfast if the maple leaf was still on the ledger from Labor Day and I told her no, it blew away when we shuttered the porch the way she wanted it to, but it was here through the winter waiting for us. We are open again.</span><span class="sig">— W.L. Jr., 9:42am, May 30 1963.</span>`;
      container.appendChild(div);
    }

    // marginalia (only on the current spread)
    addMarginalia(container);
  }
}

function appendSharedEntries(container) {
  // a quiet shared cross-visitor accumulator — 6 fixed plus a hashed one
  const shared = [
    { date: 'September 2 1962 — 3:08 pm', sig: 'a Vanderhoef cousin (Beloit)',
      body: 'Drove up Saturday with the Beloit cousins. Esther fed us all. The lake at this angle is unchanged since 1949 when I was nineteen and Marianne was the new fiancée and I had to share the porch cot with Henry. Now Henry is forty and I am still on the porch cot. The cabin is fair to all of us.' },
    { date: 'September 2 1962 — 3:22 pm', sig: 'a guest of the Hagstroms',
      body: 'My first time at the Lindquist cabin. The Hagstroms brought me — a wedding guest of theirs years back, finally cashed in the standing invitation. Mr. Lindquist Sr. shook my hand at the porch step like he had been expecting me. Maybe he was.' },
    { date: 'September 2 1962 — 3:34 pm', sig: 'Margot, age 4 ½',
      body: 'I drew a sun in the corner. The sun is for Becky who is bigger than me. There is a small fish below it. I signed my name.',
      doodle: 'sun' },
    { date: 'September 2 1962 — 3:51 pm', sig: 'Mr. Saari (of the Amery side)',
      body: 'Helma sent me with the herring jar today — she is laid up with her knee. The lake from the Lindquist dock looks exactly like the lake from my dock, only with different friends standing on it. I will tell her the porch is as it was.' },
    { date: 'September 2 1962 — 3:58 pm', sig: 'a friend of Walter Jr.\'s from Northern Trust',
      body: 'Came up Saturday afternoon — Walter\'s second invitation in three years, finally took him up on it. The cabin is what he said it would be. I will not stay until dark; I want them to have the closing as theirs. The pen at the corner is the one his father gave him in 1948. He told me about it on the dock.' },
    { date: 'September 2 1962 — 4:02 pm', sig: 'a Tollefson grandnephew',
      body: 'Uncle T. brought me along to learn the muskie weekend. The muskie weekend has become the muskie afternoon since it is Labor Day. He has not caught his fish in eight years. He says that is not the point. I think I am beginning to see it.' },
  ];
  shared.forEach(s => {
    const div = document.createElement('div');
    div.className = 'entry hand-visitor';
    let html = `<span class="date">${escapeHtml(s.date)}</span><span class="body">${escapeHtml(s.body)}`;
    if (s.doodle) html += ' ' + DOODLES[s.doodle];
    html += '</span>';
    html += `<span class="sig">— ${escapeHtml(s.sig)}</span>`;
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function addMarginalia(container) {
  // coffee ring
  const ring = document.createElement('div');
  ring.className = 'coffee-ring';
  ring.dataset.hover = 'coffee';
  attachHoverObj(ring, "It is my morning Anchor Hocking with the chip on the rim. I have used it every cabin morning since 1948 — Walter Sr. gave it to me from the cupboard at the Oak Park parsonage the Christmas after we built. The chip is from Becky in 1952 when she was learning to grip a handle. I would not replace the cup. — E. Lindquist.", 'esther');
  container.appendChild(ring);

  const smear = document.createElement('div');
  smear.className = 'mosquito-smear';
  smear.dataset.hover = 'mosquito';
  attachHoverObj(smear, "The mosquitos that week were biblical. Reuben drove to Amery for smudgepot citronella and they were out at Carlson's. We made a small fire on the lake side. I caught the worst of them on a backhand swing with the rolled-up Polk County Ledger and pressed him flat on the open page before I knew. I apologized to Esther. She said the ledger has carried worse. — A.L., August 9 1958.", 'arvid');
  container.appendChild(smear);

  const water = document.createElement('div');
  water.className = 'water-ring';
  container.appendChild(water);

  const ash = document.createElement('div');
  ash.className = 'ash-smudge';
  container.appendChild(ash);

  // pressed bluebell shadow at lower-spine
  const bell = document.createElement('div');
  bell.className = 'bluebell-shadow';
  bell.dataset.hover = 'bluebell';
  bell.innerHTML = `<svg viewBox="0 0 40 60" width="100%" height="100%"><g fill="#8a9ec4" opacity="0.6"><ellipse cx="20" cy="14" rx="6" ry="9"/><ellipse cx="12" cy="22" rx="5" ry="8"/><ellipse cx="28" cy="22" rx="5" ry="8"/><line x1="20" y1="20" x2="20" y2="58" stroke="#8a9ec4" stroke-width="1.2"/></g></svg>`;
  // pin it to the left edge (the spine side of the right page is the LEFT side of the right page)
  bell.style.left = '4px';
  attachHoverObj(bell, "Walter Jr. asked me to marry him at the end of the dock at 6:14am on August 6 1949. I had practiced what I would say and forgot all of it. On the path back I picked a bluebell from the cluster by the third fence-post. That evening on the porch I tucked it into the spine of the ledger. It is still there. Each summer when I open the cabin I look. — Marianne V. Lindquist.", 'marianne');
  container.appendChild(bell);
}

function attachHover(el, annotationText) {
  let timer;
  el.addEventListener('mouseenter', () => {
    timer = setTimeout(() => showSlip(el, annotationText, getHandClass(el)), 800);
  });
  el.addEventListener('mouseleave', () => {
    clearTimeout(timer);
    hideSlip();
  });
  // touch support — tap to reveal
  el.addEventListener('click', (e) => {
    if (document.body.classList.contains('pen-held')) return;
    showSlip(el, annotationText, getHandClass(el));
    setTimeout(hideSlip, 7000);
  });
}

function attachHoverObj(el, text, handKey) {
  let timer;
  el.addEventListener('mouseenter', () => {
    timer = setTimeout(() => showSlip(el, text, HANDS[handKey] || 'hand-walter-jr'), 800);
  });
  el.addEventListener('mouseleave', () => {
    clearTimeout(timer);
    hideSlip();
  });
  el.addEventListener('click', () => {
    if (document.body.classList.contains('pen-held')) return;
    showSlip(el, text, HANDS[handKey] || 'hand-walter-jr');
    setTimeout(hideSlip, 7000);
  });
}

function getHandClass(el) {
  for (const c of el.classList) if (c.startsWith('hand-')) return c;
  return 'hand-walter-jr';
}

function showSlip(el, text, handClass) {
  const rect = el.getBoundingClientRect();
  slip.className = 'slip visible ' + handClass;
  slip.innerHTML = escapeHtml(text);
  // position slip — try to the right of element, but constrained
  let left = rect.right + 14;
  let top  = rect.top - 20;
  if (left + 240 > window.innerWidth) left = rect.left - 240;
  if (left < 8) left = 8;
  if (top < 8) top = 8;
  if (top + 200 > window.innerHeight) top = window.innerHeight - 220;
  slip.style.left = left + 'px';
  slip.style.top  = top + 'px';
  slip.style.fontFamily = '';
  // adopt handwriting style
  const tmp = document.createElement('div');
  tmp.className = handClass;
  document.body.appendChild(tmp);
  const cs = getComputedStyle(tmp);
  slip.style.fontFamily = cs.fontFamily;
  slip.style.color = cs.color;
  document.body.removeChild(tmp);
}
function hideSlip() {
  slip.classList.remove('visible');
}

/* ----------------------------------------------------------------
 * PAGE TURNS
 * ---------------------------------------------------------------- */

let turning = false;
function turnForward() {
  if (turning) return;
  if (state.currentSpread >= SPREADS.length - 1) return;
  turning = true;
  hideSlip();
  playPaperRustle();
  pageRight.style.transition = 'transform 1.1s cubic-bezier(.45, .08, .25, 1)';
  pageRight.style.transformOrigin = 'left center';
  pageRight.style.transform = 'rotateY(-180deg)';
  setTimeout(() => {
    state.currentSpread += 1;
    saveState();
    pageRight.style.transition = 'none';
    pageRight.style.transform = 'rotateY(0deg)';
    renderSpread();
    setTimeout(() => {
      pageRight.style.transition = '';
      turning = false;
    }, 60);
  }, 1100);
}
function turnBackward() {
  if (turning) return;
  if (state.currentSpread <= 0) return;
  turning = true;
  hideSlip();
  playPaperRustle();
  pageLeft.style.transition = 'transform 1.1s cubic-bezier(.45, .08, .25, 1)';
  pageLeft.style.transformOrigin = 'right center';
  pageLeft.style.transform = 'rotateY(180deg)';
  setTimeout(() => {
    state.currentSpread -= 1;
    saveState();
    pageLeft.style.transition = 'none';
    pageLeft.style.transform = 'rotateY(0deg)';
    renderSpread();
    setTimeout(() => {
      pageLeft.style.transition = '';
      turning = false;
    }, 60);
  }, 1100);
}

document.getElementById('cornerRight').addEventListener('click', (e) => {
  if (document.body.classList.contains('pen-held')) return;
  turnForward();
});
document.getElementById('cornerLeft').addEventListener('click', (e) => {
  if (document.body.classList.contains('pen-held')) return;
  turnBackward();
});

/* ----------------------------------------------------------------
 * PAPER RUSTLE (web audio)
 * ---------------------------------------------------------------- */

let audioCtx = null;
function playPaperRustle() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const bufferSize = ctx.sampleRate * 0.7;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      const t = i / bufferSize;
      const env = Math.sin(t * Math.PI) * (1 - t * 0.4);
      data[i] = (Math.random() * 2 - 1) * env * 0.18;
    }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1600;
    const gain = ctx.createGain();
    gain.gain.value = 0.5;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

/* ----------------------------------------------------------------
 * PEN PICKUP / NEW ENTRY
 * ---------------------------------------------------------------- */

const pen = document.getElementById('pen');
const penCursor = document.getElementById('penCursor');

pen.addEventListener('click', (e) => {
  e.stopPropagation();
  if (state.currentSpread !== CURRENT_SPREAD_INDEX) {
    // turn forward to the current spread first
    state.currentSpread = CURRENT_SPREAD_INDEX;
    saveState();
    renderSpread();
    return;
  }
  togglePen();
});

// hover the pen for the Marshall Field annotation
let penHoverTimer;
pen.addEventListener('mouseenter', () => {
  penHoverTimer = setTimeout(() => {
    showSlip(pen, "I ordered the Parker 51 from Marshall Field & Company in February 1948 with my first full year's principal's salary at Oak Park High School. The pen sat in a velvet box on the breakfast table the Saturday morning of Walter Jr.'s graduation from the accounting course. He has signed every entry since with it. A man who keeps a ledger needs a pen. — W.L., Sr.", 'hand-walter-sr');
  }, 1200);
});
pen.addEventListener('mouseleave', () => {
  clearTimeout(penHoverTimer);
  hideSlip();
});

function togglePen() {
  document.body.classList.toggle('pen-held');
  pen.classList.toggle('lifted');
}

document.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('pen-held')) return;
  penCursor.style.left = e.clientX + 'px';
  penCursor.style.top = e.clientY + 'px';
});

// clicking on the page while pen-held creates a new entry input
document.addEventListener('click', (e) => {
  if (!document.body.classList.contains('pen-held')) return;
  if (e.target.id === 'pen' || e.target.closest('#pen')) return;
  if (e.target.closest('.corner')) return;
  if (e.target.closest('.new-entry-row')) return;

  // only allow on the right (current) page
  const pageContent = e.target.closest('#rightContent');
  if (!pageContent || state.currentSpread !== CURRENT_SPREAD_INDEX) return;

  // create input row
  const rect = pageContent.getBoundingClientRect();
  const input = document.createElement('textarea');
  input.className = 'new-entry-row';
  input.placeholder = 'name, the date, the weather, the fish, a small note';
  input.style.left = '5%';
  input.style.top = (e.clientY - rect.top - 12) + 'px';
  input.style.minHeight = '60px';
  input.rows = 3;
  pageContent.appendChild(input);
  input.focus();

  function commit() {
    const val = input.value.trim();
    if (val) {
      const lines = val.split('\n');
      const sig = lines.length > 1 ? lines[lines.length - 1] : 'a guest';
      const bodyText = lines.length > 1 ? lines.slice(0, -1).join(' ') : val;
      const today = new Date();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dateStr = `September 2 1962 — added at ${pad2(today.getHours())}:${pad2(today.getMinutes())} (${monthNames[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()})`;
      state.visitorEntries.push({ date: dateStr, body: bodyText, sig: sig });
      saveState();
    }
    input.removeEventListener('blur', commit);
    input.remove();
    renderSpread();
    togglePen();
    maybeUnlock1963();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape') {
      input.value = '';
      input.blur();
    }
  });
});

function pad2(n) { return String(n).padStart(2, '0'); }

/* ----------------------------------------------------------------
 * MAPLE LEAF HOVER
 * ---------------------------------------------------------------- */
const leaf = document.getElementById('mapleLeaf');
let leafTimer;
leaf.addEventListener('mouseenter', () => {
  leafTimer = setTimeout(() => {
    showSlip(leaf, "Becky brought this in this morning. The sugar maple at the north corner of the lot turns first every year. Esther says this is the earliest she has ever seen one start. Marianne asked Becky if she wanted to press it into the ledger and Becky said no, she wanted to leave it on top so it would blow away when the cabin was closed. — W.L. Jr., 4:09pm, the last entry of the season is next.", 'hand-walter-jr');
  }, 1500);
});
leaf.addEventListener('mouseleave', () => {
  clearTimeout(leafTimer);
  hideSlip();
});

/* ----------------------------------------------------------------
 * 1963 UNLOCK
 * ---------------------------------------------------------------- */
function maybeUnlock1963() {
  if (state.unlocked1963) return;
  if (!state.reachedFirstSpread) return;
  if (state.visitDates.length < 3) return;
  if (state.visitorEntries.length < 1) return;
  // unlock quietly
  state.unlocked1963 = true;
  saveState();
  renderSpread();
}

/* ----------------------------------------------------------------
 * BOOT
 * ---------------------------------------------------------------- */

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

renderSpread();

// keyboard arrows
document.addEventListener('keydown', (e) => {
  if (document.body.classList.contains('pen-held')) return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') turnForward();
  if (e.key === 'ArrowLeft') turnBackward();
});
