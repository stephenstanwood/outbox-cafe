<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vellum Recursion — Folio VII of the Concentric Marginalia</title>
<meta name="description" content="Press inward through seven nested borders of an illuminated manuscript and find what waits at the center.">
<style>
:root{--gold:#D4AF37;--indigo:#2a1a4a;--indigo-deep:#14092a;--cream:#f5e6d3;--ink:#1a1a1a}
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden}
body{background:radial-gradient(ellipse at 50% 30%,rgba(212,175,55,.06) 0%,transparent 60%),radial-gradient(ellipse at 50% 50%,var(--indigo) 0%,var(--indigo-deep) 100%);color:var(--cream);font-family:'Iowan Old Style','Hoefler Text',Palatino,Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;line-height:1.55}
header{text-align:center;margin-bottom:.5rem;max-width:640px}
header h1{font-size:clamp(1.3rem,4.5vw,1.85rem);font-weight:400;letter-spacing:.16em;color:var(--gold);font-variant:small-caps;margin:0}
header p{font-size:.88rem;opacity:.78;font-style:italic;margin:.6rem auto 0;max-width:42ch}
#stage{width:min(560px,92vw);aspect-ratio:1/1;position:relative;margin:1.6rem 0 .5rem;perspective:1400px}
.frame{position:absolute;inset:0;transition:transform 720ms cubic-bezier(.5,.05,.25,1),opacity 520ms ease}
.frame.descend-out{transform:scale(5.5);opacity:0}
.frame.descend-in{transform:scale(.3);opacity:0}
.frame.ascend-out{transform:scale(.2);opacity:0}
.frame.ascend-in{transform:scale(3);opacity:0}
.border{position:absolute;inset:0;border:2px solid;box-shadow:inset 0 0 0 1px rgba(245,230,211,.15),0 6px 40px rgba(0,0,0,.55),0 0 60px rgba(212,175,55,.08);cursor:zoom-out}
.border.at-zero{cursor:default}
.ornament{position:absolute;inset:6px;pointer-events:none}
.ornament svg{width:100%;height:100%;display:block}
.inner{position:absolute;inset:13%;background:rgba(0,0,0,.18);cursor:zoom-in;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1rem;border:1px solid currentColor;transition:background 280ms}
.inner:hover{background:rgba(212,175,55,.1)}
.depth-num{font-size:.65rem;letter-spacing:.32em;text-transform:uppercase;opacity:.72;margin-bottom:.6rem}
.caption{font-size:clamp(.86rem,2.3vw,1.05rem);font-style:italic;max-width:88%}
.hint{margin-top:.85rem;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;opacity:.55}
.center-art{position:absolute;inset:8%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:.5rem}
.center-art img{max-width:70%;max-height:50%;object-fit:contain;border:3px double var(--gold);box-shadow:0 0 28px rgba(212,175,55,.35),0 0 60px rgba(212,175,55,.15);filter:sepia(.25) contrast(1.04)}
.center-art .reveal{margin-top:1rem;font-style:italic;font-size:.95rem;max-width:30ch}
.center-art .reveal-small{margin-top:.5rem;font-size:.78rem;opacity:.65;max-width:32ch}
.controls{display:flex;gap:.75rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center}
button{background:transparent;color:var(--gold);border:1px solid var(--gold);padding:.45rem .9rem;font-family:inherit;cursor:pointer;letter-spacing:.14em;text-transform:uppercase;font-size:.66rem}
button:hover{background:rgba(212,175,55,.14)}
button:disabled{opacity:.28;cursor:not-allowed}
.ascent-note{margin-top:1rem;font-size:.85rem;color:var(--gold);opacity:0;transition:opacity 700ms;font-style:italic;text-align:center;max-width:42ch;min-height:1.3em;padding:0 1rem}
.ascent-note.show{opacity:.95}
footer{margin-top:2rem;padding-top:1.5rem;font-size:.72rem;opacity:.6;text-align:center;border-top:1px solid rgba(212,175,55,.18);width:min(560px,92vw)}
footer a{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold)}
.credits{font-size:.58rem;font-style:italic;opacity:.45;margin-top:.6rem}
.credits a{color:inherit;border:none;text-decoration:underline}
@media (max-width:480px){.inner{inset:16%}}

<body>
<!-- the painter knelt for thirty-seven days on this single border -->
<header>
  <h1>Vellum Recursion</h1>
  <p>folio seven nests seven borders inside itself. press inward and find what is waiting at the center.</p>
</header>

<div id="stage" role="region" aria-label="nested illuminated borders"></div>

<div class="controls">
  <button id="back" disabled>↶ ascend one border</button>
  <button id="reset">begin again at the outermost</button>
</div>

<div class="ascent-note" id="ascent-note" aria-live="polite"></div>

<footer>
  <a href="/archive">other illuminations</a>
  <div class="credits">
    Photo by <a href="https://unsplash.com/photos/a-very-old-book-with-some-writing-on-it-JdxsCHWRSXQ">Boudewijn Huysmans</a> on Unsplash.
  </div>
</footer>

<script>
const MAX_DEPTH = 6;
const STORAGE_KEY = 'vellum-recursion-order-v1';

const ORNAMENTS = [
  { bg:'#2a1a4a', frame:'#D4AF37', inner:'#f5e6d3', pattern:'trefoils' },
  { bg:'#1f1138', frame:'#D4AF37', inner:'#f5e6d3', pattern:'vine' },
  { bg:'#3a2455', frame:'#D4AF37', inner:'#f5e6d3', pattern:'knots' },
  { bg:'#f5e6d3', frame:'#2a1a4a', inner:'#1a1a1a', pattern:'leaf' },
  { bg:'#14092a', frame:'#D4AF37', inner:'#f5e6d3', pattern:'beasts' },
  { bg:'#5a3a8a', frame:'#f5e6d3', inner:'#D4AF37', pattern:'spirals' },
];

const PATTERN_UNITS = {
  trefoils: '<circle cx="10" cy="10" r="2.6"/><circle cx="10" cy="3.2" r="1.4"/><circle cx="3.2" cy="14" r="1.4"/><circle cx="16.8" cy="14" r="1.4"/>',
  vine:     '<path d="M0,10 Q5,3 10,10 T20,10" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="10" r=".9"/>',
  knots:    '<rect x="3" y="3" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.1"/><path d="M3,3 L17,17 M17,3 L3,17" fill="none" stroke="currentColor" stroke-width="1.1"/><circle cx="10" cy="10" r="1.2"/>',
  leaf:     '<path d="M10,3 Q15,10 10,17 Q5,10 10,3 Z"/><circle cx="10" cy="10" r=".7" fill="#1a1a1a"/>',
  beasts:   '<polyline points="0,10 5,4 10,10 15,4 20,10" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="14" r="1.1"/>',
  spirals:  '<path d="M10,6 a4,4 0 1,1 -4,4 a2.5,2.5 0 1,1 2.5,-2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="10" r=".6"/>',
};

const CAPTIONS = [
  'press inward. the first border opens for you.',
  'the margin gives way. closer now.',
  'another fold. the gilding catches your eye.',
  'finer now. someone held her breath to paint this.',
  'the rectangle inside the rectangle inside the—',
  'almost there. one last border. you can feel it humming.',
];

const ASCENT_NOTES = [
  'something is different. was that border there a moment ago?',
  'the gilding sits differently. you are certain it does.',
  'this margin was painted in another hand. it was not, a moment ago.',
  'the pattern has rearranged itself in your absence.',
  'the ornament shifted while you were not looking. the room is still.',
  'the trefoils have moved. you remember them on the inside.',
  'the vine curls the other way now. it did not. it must have.',
];

let order = loadOrder();
let depth = 0;

function loadOrder() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(s) && s.length === ORNAMENTS.length) return s;
  } catch (e) {}
  return [0,1,2,3,4,5];
}
function saveOrder() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(order)); } catch (e) {}
}
function shuffleOnePair() {
  const i = Math.floor(Math.random() * order.length);
  let j = Math.floor(Math.random() * order.length);
  while (j === i) j = Math.floor(Math.random() * order.length);
  [order[i], order[j]] = [order[j], order[i]];
  saveOrder();
}

function ornamentMarkup(patternKey, color) {
  const id = 'pat-' + patternKey + '-' + Math.floor(Math.random() * 1e7);
  return `<svg viewBox="0 0 200 200" preserveAspectRatio="none" style="color:${color};fill:${color};">
    <defs><pattern id="${id}" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">${PATTERN_UNITS[patternKey]}</pattern></defs>
    <rect x="0" y="0" width="200" height="18" fill="url(#${id})"/>
    <rect x="0" y="182" width="200" height="18" fill="url(#${id})"/>
    <rect x="0" y="0" width="18" height="200" fill="url(#${id})"/>
    <rect x="182" y="0" width="18" height="200" fill="url(#${id})"/>
  </svg>`;
}

function renderFrame(initialClass) {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  const isCenter = depth >= MAX_DEPTH;
  const frame = document.createElement('div');
  frame.className = 'frame';
  if (initialClass) frame.classList.add(initialClass);

  if (isCenter) {
    frame.innerHTML = `
      <div class="border" style="background:#14092a;border-color:var(--gold);"></div>
      <div class="ornament">${ornamentMarkup('trefoils', '#D4AF37')}</div>
      <div class="center-art">
        <img src="https://images.unsplash.com/photo-1602660187275-7275b639d7ea?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5MTk0MTN8MHwxfHNlYXJjaHwxfHxzb2xpdGFyeSUyMGJvb2slMjBjb2xsZWN0b3IlMjdzJTIwb2JzZXNzaW9uJTIwd2l0aCUyMGZyYW1lcy13aXRoaW4tZnJhbWVzJTIwaW4lMjBtZWRpZXZhbCUyMG1hbnVzY3xlbnwxfHx8fDE3Nzk3MzU2NTJ8MA&ixlib=rb-4.1.0&q=80&w=1080"
             alt="the true image at the center — an open page, the writing too small to read but unmistakably present"
             loading="lazy">
        <div class="reveal">here it is. the true image. the thing all the borders were holding.</div>
        <div class="reveal-small">getting here was the whole thing. you knew that walking in.</div>
      </div>
    `;
    frame.addEventListener('click', (e) => {
      if (!e.target.closest('.center-art')) ascend();
    });
  } else {
    const orn = ORNAMENTS[order[depth]];
    const atZero = depth === 0 ? 'at-zero' : '';
    frame.innerHTML = `
      <div class="border ${atZero}" style="background:${orn.bg};border-color:${orn.frame};"></div>
      <div class="ornament">${ornamentMarkup(orn.pattern, orn.frame)}</div>
      <div class="inner" style="color:${orn.inner};border-color:${orn.frame};">
        <div class="depth-num" style="color:${orn.frame};">border ${depth + 1} of ${MAX_DEPTH}</div>
        <div class="caption">${CAPTIONS[depth]}</div>
        <div class="hint" style="color:${orn.frame};">↳ press the inner pane</div>
      </div>
    `;
    frame.addEventListener('click', (e) => {
      if (e.target.closest('.inner')) descend();
      else if (depth > 0) ascend();
    });
  }

  stage.appendChild(frame);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      frame.classList.remove('descend-in', 'ascend-in');
    });
  });
  document.getElementById('back').disabled = depth === 0;
}

function descend() {
  if (depth >= MAX_DEPTH) return;
  const current = document.querySelector('.frame');
  if (!current) return;
  current.style.pointerEvents = 'none';
  current.classList.add('descend-out');
  hideAscentNote();
  setTimeout(() => { depth++; renderFrame('descend-in'); }, 520);
}

function ascend() {
  if (depth === 0) return;
  const current = document.querySelector('.frame');
  if (!current) return;
  current.style.pointerEvents = 'none';
  current.classList.add('ascend-out');
  setTimeout(() => {
    shuffleOnePair();
    depth--;
    renderFrame('ascend-in');
    showAscentNote();
  }, 520);
}

function showAscentNote() {
  const note = document.getElementById('ascent-note');
  note.textContent = ASCENT_NOTES[Math.floor(Math.random() * ASCENT_NOTES.length)];
  note.classList.add('show');
}
function hideAscentNote() {
  document.getElementById('ascent-note').classList.remove('show');
}

document.getElementById('back').addEventListener('click', ascend);
document.getElementById('reset').addEventListener('click', () => {
  depth = 0;
  hideAscentNote();
  renderFrame('descend-in');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if (depth > 0) { e.preventDefault(); ascend(); }
  } else if (e.key === 'Enter' || e.key === ' ') {
    if (depth < MAX_DEPTH) { e.preventDefault(); descend(); }
  }
});

renderFrame();

console.log('%c the painter knelt for thirty-seven days on this single border. ', 'color:#D4AF37;background:#2a1a4a;padding:8px 14px;font-style:italic;font-family:serif;');
console.log('%c the frame you came through is not the frame you return through. ', 'color:#f5e6d3;background:#1a1a1a;padding:6px 12px;font-style:italic;font-family:serif;');
</script>

<script src="/nav.js" defer></script>
</body>
</html>
