<title>Granny Vinette's One-Chair Shop — A Quilt That's Also a Floor Plan</title>
<style>
:root{--ink:#ff44cc;--cream:#fff8e8}
*{box-sizing:border-box}
html,body{margin:0;background:var(--cream);color:var(--ink);font-family:Georgia,'Times New Roman',serif}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.8rem;text-align:center}
h1{font-size:clamp(1rem,4.4vw,1.45rem);font-weight:400;font-style:italic;margin:0 0 .1rem;letter-spacing:.02em}
.sub{font-size:.74rem;margin:0 0 .85rem;opacity:.78}
.quilt{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;width:min(88vw,360px);aspect-ratio:1;background:var(--ink);padding:5px;border:3px double var(--ink);outline:1px dashed var(--ink);outline-offset:4px}
.patch{background:var(--cream);cursor:pointer;aspect-ratio:1;transition:transform .12s}
.patch:hover{transform:scale(.93)}
.patch:active{transform:scale(.86)}
.patch svg{width:100%;height:100%;display:block}
.note{min-height:3em;max-width:min(88vw,360px);font-size:.88rem;line-height:1.38;font-style:italic;margin:.85rem 0 0}
.note .lbl{font-style:normal;font-variant:small-caps;letter-spacing:.06em;display:block;font-size:.72rem;margin-bottom:.18em;opacity:.78}
footer{margin-top:.9rem;font-size:.7rem;opacity:.72}
footer a{color:var(--ink);text-decoration:underline wavy}
/* the chair patch is the one with the eight-point star — you'll know it when you see it */
</style>

<body>
<h1>Granny Vinette's One-Chair Shop</h1>
<p class="sub">— pieced in cotton, stitched by hand, the whole place to scale —</p>
<div class="quilt" id="q" aria-label="quilted floor plan of a one-chair barbershop"></div>
<p class="note" id="n"><span class="lbl">touch a square</span>granny'll tell you what it is, sugar.</p>
<footer>more squares pinned out back on <a href="/archive">the clothesline</a></footer>
<script>
const M='#ff44cc',C='#fff8e8';
const P=[
[`<rect x="2" y="2" width="36" height="36" fill="${C}" stroke="${M}" stroke-width="1.5"/><rect x="12" y="11" width="16" height="25" fill="none" stroke="${M}" stroke-width="1.5"/><circle cx="20" cy="6" r="2.4" fill="${M}"/><circle cx="25" cy="23" r="1" fill="${M}"/>`,"the front door","that little bell up top been ringin' since fifty-two. sounds the same now as it did then, near as i can tell.",523.25],
[`<rect width="40" height="40" fill="${C}"/><rect x="3" y="8" width="34" height="5" fill="${M}"/><rect x="3" y="19" width="34" height="5" fill="${M}"/><rect x="6" y="30" width="6" height="6" fill="none" stroke="${M}" stroke-width="1"/><rect x="28" y="30" width="6" height="6" fill="none" stroke="${M}" stroke-width="1"/>`,"the waiting bench","henry takes the left, always has. ask me why and i couldn't tell ya — it's just where henry takes.",587.33],
[`<rect width="40" height="40" fill="${C}"/><rect x="4" y="4" width="32" height="32" fill="none" stroke="${M}" stroke-width="2"/><line x1="20" y1="4" x2="20" y2="36" stroke="${M}" stroke-width="2"/><line x1="4" y1="20" x2="36" y2="20" stroke="${M}" stroke-width="2"/>`,"the front window","pa used to wave at every car that passed. now i just wave at the ones i recognize. less wavin', same arm.",659.25],
[`<rect width="40" height="40" fill="${C}"/><rect x="15" y="2" width="10" height="36" fill="${C}" stroke="${M}" stroke-width="1"/><path d="M15 5 L25 13 M15 13 L25 21 M15 21 L25 29 M15 29 L25 37" stroke="${M}" stroke-width="3" fill="none"/>`,"the spinning pole","spins on its own, mostly. motor went out in sixty-three — you figure it out, sugar, i can't.",783.99],
[`<rect width="40" height="40" fill="${C}"/><line x1="4" y1="14" x2="36" y2="14" stroke="${M}" stroke-width="1.5"/><circle cx="10" cy="14" r="2" fill="${M}"/><circle cx="20" cy="14" r="2" fill="${M}"/><circle cx="30" cy="14" r="2" fill="${M}"/><path d="M10 16 L8 32 M20 16 L20 32 M30 16 L32 32" stroke="${M}" stroke-width="1"/>`,"the coat-hook rail","three pegs. one for hats, one for coats, one for whatever you forgot to leave at home.",880.00],
[`<rect width="40" height="40" fill="${C}"/><g stroke="${M}" stroke-width="1" fill="none"><rect x="6" y="5" width="22" height="6"/><rect x="9" y="13" width="22" height="6"/><rect x="6" y="21" width="22" height="6"/><rect x="10" y="29" width="22" height="6"/></g>`,"the magazine stack","field & stream from august. read it twice already. you can read it three times, won't hurt nothin'.",1046.50],
[`<rect width="40" height="40" fill="${C}"/><rect x="5" y="11" width="30" height="20" rx="2" fill="none" stroke="${M}" stroke-width="1.5"/><circle cx="13" cy="21" r="4" fill="none" stroke="${M}" stroke-width="1.2"/><circle cx="13" cy="21" r="1" fill="${M}"/><line x1="22" y1="17" x2="31" y2="17" stroke="${M}" stroke-width="1"/><line x1="22" y1="21" x2="31" y2="21" stroke="${M}" stroke-width="1"/><line x1="22" y1="25" x2="31" y2="25" stroke="${M}" stroke-width="1"/>`,"the philco radio","tunes to one station and that station went off the air in eighty-one. still hums, though. company's company.",523.25],
[`<rect width="40" height="40" fill="${C}"/><g stroke="${M}" stroke-width="1.3" fill="none"><rect x="5" y="6" width="6" height="28"/><rect x="13" y="10" width="6" height="24"/><rect x="21" y="4" width="6" height="30"/><rect x="29" y="12" width="6" height="22"/></g><circle cx="24" cy="10" r="1.5" fill="${M}"/>`,"the bottle shelf","the blue one on top, don't ask what's in it. don't open it. that one's been there longer than me.",659.25],
[`<rect width="40" height="40" fill="${C}"/><g fill="none" stroke="${M}" stroke-width="1.2"><rect x="4" y="4" width="32" height="32"/><rect x="8" y="8" width="24" height="24"/><rect x="12" y="12" width="16" height="16"/><rect x="16" y="16" width="8" height="8"/></g><circle cx="20" cy="20" r="1.6" fill="${M}"/>`,"granny lou's braided rug","she put a penny in the middle for luck — wheatback, nineteen-eighteen. still there, last i looked.",783.99],
[`<rect width="40" height="40" fill="${C}"/><polygon points="20,2 24,16 38,20 24,24 20,38 16,24 2,20 16,16" fill="${M}"/><circle cx="20" cy="20" r="3.2" fill="${C}" stroke="${M}" stroke-width="1"/>`,"the chair","one chair. always been one chair. pa said two'd just confuse a man, and pa was right about most things.",880.00],
[`<rect width="40" height="40" fill="${C}"/><circle cx="20" cy="20" r="15" fill="none" stroke="${M}" stroke-width="1.5"/><circle cx="20" cy="20" r="10" fill="none" stroke="${M}" stroke-width="1"/><polygon points="20,8 22,18 32,20 22,22 20,32 18,22 8,20 18,18" fill="${M}" opacity=".75"/>`,"the looking-glass","you sit, you see yourself a little older. that's the whole trick of barberin', between you and me.",1046.50],
[`<rect width="40" height="40" fill="${M}"/><rect x="0" y="0" width="10" height="10" fill="${C}"/><rect x="20" y="0" width="10" height="10" fill="${C}"/><rect x="10" y="10" width="10" height="10" fill="${C}"/><rect x="30" y="10" width="10" height="10" fill="${C}"/><rect x="0" y="20" width="10" height="10" fill="${C}"/><rect x="20" y="20" width="10" height="10" fill="${C}"/><rect x="10" y="30" width="10" height="10" fill="${C}"/><rect x="30" y="30" width="10" height="10" fill="${C}"/>`,"the checker tile","lose a button down here and it's gone forever. lost my pa's collar stud in nineteen-eighty. forever's a while.",587.33],
[`<rect width="40" height="40" fill="${C}"/><rect x="6" y="14" width="28" height="5" fill="${M}"/><line x1="10" y1="19" x2="10" y2="34" stroke="${M}" stroke-width="2"/><line x1="30" y1="19" x2="30" y2="34" stroke="${M}" stroke-width="2"/><line x1="6" y1="34" x2="34" y2="34" stroke="${M}" stroke-width="1.5"/>`,"the iron footrest","cast iron. weighs as much as a small dog. older than one, too. been kicked at by every boot in town.",659.25],
[`<rect width="40" height="40" fill="${C}"/><path d="M6 14 L14 14 L14 26 L6 26 Z" fill="none" stroke="${M}" stroke-width="1.5"/><path d="M14 26 L20 36 L34 36 L34 20 L26 20" fill="none" stroke="${M}" stroke-width="1.5"/><path d="M8 7 Q10 10 8 13 M14 7 Q16 10 14 13 M20 7 Q22 10 20 13" stroke="${M}" stroke-width="1" fill="none"/>`,"the porcelain sink","runs hot if you ask nice. cold if you don't. mostly i ask nice.",783.99],
[`<rect width="40" height="40" fill="${C}"/><g stroke="${M}" stroke-width="1.4" fill="none"><path d="M4 3 Q8 9 4 15 Q8 21 4 27 Q8 33 4 38"/><path d="M12 3 Q16 9 12 15 Q16 21 12 27 Q16 33 12 38"/><path d="M20 3 Q24 9 20 15 Q24 21 20 27 Q24 33 20 38"/><path d="M28 3 Q32 9 28 15 Q32 21 28 27 Q32 33 28 38"/><path d="M36 3 Q40 9 36 15 Q40 21 36 27"/></g>`,"the back-room curtain","nobody goes back there but me and the cat. cat's name's biscuit. biscuit don't talk about it neither.",880.00],
[`<rect width="40" height="40" fill="${C}"/><line x1="22" y1="6" x2="14" y2="34" stroke="${M}" stroke-width="1.5"/><path d="M10 32 L20 28 L26 32 L28 36 L10 36 Z" fill="${M}"/><line x1="13" y1="20" x2="21" y2="14" stroke="${M}" stroke-width=".8"/>`,"the leaning broom","ain't never moved that i know of. sweeps the same patch of nothin' just by standin' there.",523.25]];
let ctx;
function chime(f){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();const t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain(),o2=ctx.createOscillator(),g2=ctx.createGain();o.type='triangle';o.frequency.value=f;o2.type='sine';o2.frequency.value=f*2.01;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.19,t+.012);g.gain.exponentialRampToValueAtTime(.0001,t+1.2);g2.gain.setValueAtTime(.0001,t);g2.gain.exponentialRampToValueAtTime(.06,t+.012);g2.gain.exponentialRampToValueAtTime(.0001,t+.75);o.connect(g).connect(ctx.destination);o2.connect(g2).connect(ctx.destination);o.start();o2.start();o.stop(t+1.25);o2.stop(t+.8);}
const q=document.getElementById('q'),n=document.getElementById('n');
P.forEach(p=>{const d=document.createElement('div');d.className='patch';d.innerHTML=`<svg viewBox="0 0 40 40">${p[0]}</svg>`;d.setAttribute('aria-label',p[1]);d.title=p[1];d.onclick=()=>{chime(p[3]);n.innerHTML=`<span class="lbl">${p[1]}</span>${p[2]}`};q.appendChild(d);});
console.log('%c granny says: hum along if you know it, sugar. ','background:#ff44cc;color:#fff8e8;padding:3px 8px;font-style:italic;border-radius:2px');
</script>

<script src="/nav.js" defer></script>
</body>
