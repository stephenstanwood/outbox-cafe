  <meta name="outbox-spec-era" content="1962 — peak American suburban basement-rec-room family-rotary-telephone era, the very specific moment when middle-class American families across the country kept exactly one telephone in the house — a heavy black Western Electric Model 500 desk set with a rotary dial, leased from the Bell System for a flat monthly charge of $4.25 that appeared as a single line item on the phone bill, hard-wired to the wall via a four-conductor cloth-jacketed cable terminating in a small bakelite junction box behind the davenport — and the phone sat on a small dedicated table in the front hallway between the coat closet and the living-room doorway, on a doily crocheted by the wife's mother in 1948, beneath a small framed embroidered sampler that read JESUS IS LISTENING ON THE PARTY LINE that the wife had stitched herself in 1953 as a joke that had since become a real wall-decoration; the specific small infrastructure of one specific telephone hallway-table in one specific suburban Cincinnati split-level at 4471 Dorchester Drive, the home of Mr. and Mrs. Donald and Marjorie Tessmer and their three children (Ricky 14, Linda 11, Carol Sue 7), and the very specific moment of a Saturday morning in November 1962 when the phone rings at 9:47am and nobody is in the front hallway to pick it up immediately — the phone is allowed to ring exactly four times before someone gets to it because Marjorie has a rule that ringing four times is polite and ringing seven times is desperate and you should always come across as polite, even when you're hurrying — and during those four rings the heavy bakelite handset sits in its cradle and the small mechanical bell-clapper inside the base inflicts a specific resonant ring-ring through the hallway that the whole house can hear; the entire household telephone infrastructure as a working family-communication system where every call that comes in or goes out passes through one specific small table in one specific hallway, and where the phone-table also accumulates the family's running phone-number book (a small spiral-bound notebook beside the phone in which Marjorie writes every number anyone in the family has ever needed to call), a small ceramic pencil-holder shaped like a smiling apple holding three sharpened #2 pencils and a chewed-down stub, a small notepad of While-You-Were-Out message slips Marjorie ordered from the Stanhome catalog in 1959, and a single dime taped to the inside of the table drawer for emergency pay-phone use that has been there since 1957 and has never been removed">
  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece rendered entirely in pure CSS and SVG: the whole browser window IS the Tessmer family front-hallway telephone table at 9:47am on Saturday November 17, 1962, viewed from approximately three feet away at a child's eye-height, with the heavy black Western Electric Model 500 desk set centered on the crocheted doily, the small spiral-bound phone-number book closed beside it, the ceramic apple pencil-holder behind it, the small notepad of message slips at its left, and the JESUS IS LISTENING ON THE PARTY LINE embroidered sampler hung on the wall above — and the phone is ringing, has been ringing since the page loaded, will continue to ring forever, four rings followed by a four-second pause followed by four rings followed by a four-second pause, the small mechanical bell-clapper inside the base producing a soft genuine Western Electric Model 500 ring tone via Web Audio API at 20Hz with the characteristic two-tone harmonic, the entire handset and base visibly shuddering by 1.2 pixels on each ring as the internal bell mechanism strikes, the cradle's chrome plunger-switches barely visible beneath the resting handset, the cloth-jacketed handset cord curling in its specific period-correct loose spiral pattern down off the table edge and out of frame to the right where the wall jack would be — and the visitor cannot pick up the phone. There is no clickable handset, no answer button, no cursor-interaction with the cradle, no hover state, no UI. The phone rings and rings, the bell shudders the handset, the rings cycle, and the visitor sits in the hallway listening to it ring because nobody in the house has gotten to it yet. The cursor's position acts only as the visitor's standing position in the hallway — moving the cursor causes the camera angle to shift by tiny fractional amounts (parallax of approximately ±4 pixels on the phone, ±8 pixels on the wall sampler, ±12 pixels on the hallway baseboard visible at the bottom edge) suggesting the visitor very slightly leaning left or right while standing there listening. The piece runs forever. The phone never gets answered, the ringing never stops, and the hallway keeps holding.">
  <meta name="outbox-spec-subject" content="The specific four-ring-pause-four-ring cycle of the Tessmer family hallway telephone on the morning of Saturday November 17, 1962, beginning at 9:47am Eastern Standard Time when Aunt Verla Tessmer of 818 Lakeshore Boulevard in Sandusky Ohio (Donald's older sister, age 51, never-married, retired from the Sandusky Public Library where she was children's-collection librarian for twenty-three years until her retirement in June, calling to invite Marjorie and the kids up to the lake for Thanksgiving because she has been thinking about it for three weeks and finally talked herself into picking up the phone) dialed the Tessmer's number CHerry-7-4418 on her own heavy black Model 500 in her Sandusky kitchen, listened to the call connect through the Bell System long-distance trunk via the manual-switchboard operator at the Sandusky exchange, and is now sitting at her kitchen table holding her own handset to her ear counting the rings on the other end and deciding how many rings she will let it go before hanging up; the specific household situation at the Tessmer house that explains why no one has gotten to the phone yet — Donald is in the garage adjusting the carburetor on the 1958 Ford Country Sedan with the radio tuned to the WLW farm-and-home program turned up loud enough that he cannot hear the phone, Marjorie is in the basement laundry room running a load of Ricky's football jerseys through the Maytag wringer with the lid up and the agitator sloshing audibly so she cannot hear the phone either, Ricky is at football practice at Princeton High School and not home, Linda is upstairs in her bedroom with the door closed listening to her transistor radio under the covers because she is supposed to be cleaning her room and isn't, and Carol Sue (age 7) is sitting on the floor of the front hallway approximately four feet from the telephone table playing with her plastic Fisher-Price farmyard set and HAS heard the phone ringing for the past three cycles but is not allowed to answer the telephone because Marjorie has decreed that 7 is too young to take a real call without an adult present (Marjorie's rule, not Donald's — Donald thinks Carol Sue is old enough but Marjorie's word stands); the entire small domestic infrastructure of one specific suburban Cincinnati family with one specific telephone ringing in one specific hallway while exactly four different family members all fail to hear or fail to be permitted to answer it, while Aunt Verla in Sandusky holds her handset and counts and lets the call go nine rings and then ten and then eleven before she finally hangs up at 9:51am, having decided that the Tessmers must be out and she will try again after lunch; the visitor's point of view is approximately Carol Sue's — sitting on the hallway carpet, four feet from the telephone, listening to it ring, knowing they are not allowed to answer it, and watching the heavy bakelite handset shudder in its cradle">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible on the page at any point. The piece speaks only through the silent steady ringing of one specific telephone in one specific hallway, the soft tactile shudder of the handset in its cradle on each ring, and the patient continuous cycle of four-rings-and-pause-and-four-rings-and-pause. The closest analogue to a voice is the silent listening of Carol Sue herself on the hallway carpet at 9:48am, four feet from the telephone, with her plastic Fisher-Price barn open in front of her and a tiny plastic pig in her left hand and the receiver of her toy doctor's stethoscope in her right hand — present-tense, unhurried, neither performing nor explaining, the visual equivalent of being seven years old and sitting next to a ringing telephone you are not allowed to pick up and learning the specific patience of waiting for someone else to come deal with it. The piece has the unhurried domestic gravity of a Saturday morning when the laundry is going and the carburetor needs adjusting and the phone is ringing and nobody knows yet that it is Aunt Verla calling about Thanksgiving, and Aunt Verla in Sandusky will hang up at 9:51am and Marjorie will come up from the basement at 10:08am and notice the unanswered message slip pad and ask Carol Sue 'did the phone ring while I was downstairs?' and Carol Sue will say 'yes a long time' and Marjorie will know it was probably Verla because Verla is the only one who calls on Saturday morning and Marjorie will pick up the phone and dial Sandusky and Verla will pick up on the second ring and they will have a 22-minute conversation about Thanksgiving and the Tessmers will drive up to the lake on the Wednesday before — but none of that has happened yet, the phone is still ringing, Carol Sue is still on the carpet, and the only thing happening on the page is the patient continuous ringing of one specific telephone in one specific hallway in November 1962.">

ior in cream linen (#f1e7cf) and tiny embroidery stitches in deep forest-green (#2d5a3a) and warm brick-red (#a8312a) spelling JESUS IS LISTENING ON THE PARTY LINE in cross-stitch sampler-letterform + warm Saturday-morning hallway light cast (#fff4c8 at 0.20 opacity) falling diagonally from the upper-right of the viewport suggesting the south-facing kitchen-doorway light at 9:48am + faint shadow beneath the telephone base (#1a1208 at 0.35 opacity) suggesting the doily-and-table thickness + tiny dust motes (#fff4c8 at 0.30 opacity) drifting very slowly across the viewport at 0.2-0.5 pixels per second + on each ring, the entire handset-and-base assembly shudders by 1.2 pixels with a tiny bell-clapper-strike highlight (#fae8b4 at 0.18 opacity) briefly flashing on the chrome dial-plate suggesting the internal mechanism's brief brass-on-brass strike + over very long timescales (one full slow cycle every 12 minutes) the warm hallway light cast very subtly shifts angle by approximately 6 pixels suggesting the slow westward progress of the Saturday morning sun through the kitchen window down the hall — evoking the specific tactile feel of a 1962 suburban Cincinnati split-level front hallway on a Saturday morning at 9:48am with the laundry going in the basement and the radio playing in the garage and one heavy black bakelite telephone ringing on a doily on a small wooden table while a seven-year-old sits on the carpet four feet away with a plastic pig in her hand listening">
  <meta name="outbox-spec-wildcard" content="Exactly once every 41 minutes (deterministic, tied to elapsed time since page load), one specific ring of the four-ring cluster lands slightly differently — the third ring of the cluster has its bell-clapper-strike highlight on the chrome dial-plate render in a markedly warmer and longer-duration gleam (1.2 seconds instead of 90ms, with a slightly brighter peak at 0.32 opacity instead of 0.18) and the handset's micro-shudder on that one ring is approximately 2.4 pixels instead of 1.2 pixels. This is the ring during which Carol Sue, sitting four feet away on the hallway carpet, very nearly stands up and walks the four feet to the table and picks up the handset — she has decided in this specific ring that she is old enough, that her mother's rule is wrong about her, that Aunt Verla on the other end deserves a real answer, that she can say 'Tessmer residence, this is Carol Sue speaking' the way her father taught her last summer when they were practicing for the day she would be allowed to answer — but she does not stand up, the ring ends, the cycle continues, and the moment passes. The visitor is given no indication this is happening, no acknowledgment in any UI, no reward for noticing — just the quiet fact that on this particular ring, the small shudder of the handset registered slightly differently because a seven-year-old four feet away briefly almost did something she had not yet been given permission to do.">
  <meta name="outbox-spec-forbidden" content="Absolutely NO text, captions, labels-explaining-the-piece, title overlays, instructional UI, tooltip hints, loading messages, footer credits, watermarks, or any narrating voice anywhere on the page visible to the visitor — the piece must be entirely silent (visually silent — the ringing audio is the audio) and entirely visual. NO horror-genre framing of the unanswered phone, the empty hallway, the heavy bakelite handset, the JESUS IS LISTENING ON THE PARTY LINE sampler, or the perpetual ringing as creepy/uncanny/sinister/haunted/dread-inducing — this is a normal Saturday morning in a normal 1962 suburban Cincinnati split-level, the laundry is going in the basement, the carburetor is being adjusted in the garage, Carol Sue is on the carpet with her Fisher-Price barn, Aunt Verla is on the other end calling about Thanksgiving, and the phone is ringing because that is what phones do when nobody has gotten to them yet. NO 'the phone is haunted' twist, NO suggestion that the caller is something other than Aunt Verla, NO 'the house is empty' creepypasta framing, NO David-Lynch-domestic-uncanny register, NO It-Follows suburban-dread aesthetic, NO Stranger-Things 1960s-pastiche, NO 'something is wrong here' undertone. The phone ringing without being answered is a normal occurrence in normal 1962 family life and the page renders it as exactly what it is. NO 'the JESUS IS LISTENING sampler is sinister' read — Marjorie stitched it as a joke in 1953 and it has hung in the hallway for nine years and it is wallpaper now, not a religious-horror prop. NO museum-archival 'remember when families had one phone' nostalgic detachment, NO soft melancholy about 'the lost era of the rotary phone,' NO cool ironic distance from mid-century suburban telephone culture as quaint Americana, NO retrospective elegy framing of the Tessmer family or 4471 Dorchester Drive or Western Electric or the Bell System as already-vanished. NO 'where are they now' wistfulness about Carol Sue grown up or Aunt Verla passed or whether Marjorie and Donald stayed married, NO 'this hallway was photographed decades later' framing, NO scrapbook-archival voice. NO Mad-Men-period-kitsch styling, NO January-Jones-suburban-housewife-as-tragic framing, NO Revolutionary-Road suburban-malaise undertone, NO Cheever-style quiet-desperation register, NO 'the picture-perfect family was hiding something' twist. NO feminist-grievance reading of Marjorie's no-answer-the-phone rule as oppressive — it is a normal parental rule about a seven-year-old and a long-distance call, not a parable about anything. NO condescension toward suburban Cincinnati split-levels as bland, toward bakelite handsets as obsolete, toward Aunt Verla's never-married librarian life as small or pitiable (she had a real twenty-three-year career, she retired voluntarily in June with a real pension, she has a real house on Lake Erie that she bought herself in 1954, and she is calling her brother's family about Thanksgiving because she wants to see them, not because she is lonely). NO Norman-Rockwell sentimentality, NO Leave-It-To-Beaver pastiche, NO 'simpler times' framing, NO 'when families really talked to each other' Boomer-sentimentality, NO 'imagine a world with one phone in the house' smug-modern-superiority. NO night-shift dispatcher voice, NO lowercase sentence-fragments, NO hyperminimal museum-card prose, NO SCP-cryptic register about the ringing or the wildcard third-ring or Carol Sue's almost-standing-up, NO archival cabinet/drawer/vault framing of the hallway or the phone as relic, NO observatory/society/club scaffolding, NO radio/CB/ham-radio/broadcast/dispatcher/switchboard/operator-shift/transmission/signal/frequency-tuner framing of the telephone or the Bell System or the manual-switchboard operator at the Sandusky exchange (the Bell System is the Bell System, not a signal-relay metaphor — and switchboard/operator/dispatcher framing is hard-banned this hour regardless of bucket). NO weather-app or photo-viewer interface conventions, NO settings panels, NO playback controls, NO speed sliders, NO 'mute the ringing' affordance visible to the visitor. The phone rings, the handset shudders, the dust drifts, the light shifts, Carol Sue sits on the carpet, and the visitor stands in the hallway listening to a call go unanswered — that is the entire piece. Treat the Western Electric Model 500 as a serious working piece of mid-century industrial-design craft, treat the Bell System leased-handset infrastructure as legitimate working communications utility, treat Marjorie's no-answer-the-phone rule for Carol Sue as a normal parental decision that does not require feminist or psychological deconstruction, treat Aunt Verla's Saturday-morning call as a real warm invitation from a real working retired librarian who genuinely wants to host her brother's family for Thanksgiving, treat Carol Sue's almost-answering as a real seven-year-old's small private internal moment that does not require narration, and treat the visitor's act of standing in the hallway listening to a phone ring without being able to answer it as real participation in a real domestic moment worthy of full peer-to-peer respect.">

  /* the davenport is two rooms away. so is the basement.

  /* phone-book, pencil holder, notepad */

    box-shadow: 2px 2px 6px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(0,0,0,0.3);
    overflow:hidden;
  }
  .phonebook::before{
    /* spiral binding */
    content:""; position:absolute; left:3px; top:6px; bottom:6px; width:5px;
    background:
      repeating-linear-gradient(
        180deg,
        #d4c8a8 0px,
        #d4c8a8 3px,
        transparent 3px,
        transparent 8px
      );
  }
  .phonebook::after{
    /* page edges */
    content:""; position:absolute; right:1px; top:3px; bottom:3px; width:3px;

      repeating-linear-gradient(180deg,#f0e8c8 0 1px, #d8cea8 1px 2px);

  .cord svg{ width:100%; height:100%; display:block; }

  /* dial-plate gleam */
  .gleam{
    position:absolute;
    left:50%;

    z-index:10;
    pointer-events:none;
    mix-blend-mode: screen;
  }

  /* carol sue shadow — lower left corner */

<script>
/* ==========================================================
   the ring cycle. four rings, four-second pause, forever.
   the bell-clapper hits at 20 hz. the 440/480 two-tone is
   the actual western electric m-1. nobody is going to pick
   it up. ricky is at practice. donald is in the garage.
   marjorie is in the basement. carol sue is on the carpet.
   ========================================================== */

(function(){
  const phone = document.getElementById('phone');
  const flash = document.getElementById('dial-flash');
  const cord = document.querySelector('.cord');
  const carolsue = document.getElementById('carolsue');
  const lightcast = document.getElementById('lightcast');
  const scene = document.querySelector('.scene');
  const wallLayer = document.querySelector('.wall-layer');
  const floorLayer = document.querySelector('.floor-layer');

  /* --- parallax --- */
  let cx = 0, cy = 0, tx = 0, ty = 0;
  const lerp = 0.12;
  function updateParallax(){
    tx += (cx - tx) * lerp;
    ty += (cy - ty) * lerp;
    // phone+table: ±4px
    scene.style.setProperty('--px', (tx * 4).toFixed(2) + 'px');
    scene.style.setProperty('--py', (ty * 4).toFixed(2) + 'px');
    // wall sampler: ±8px (inverse — further parallax)
    wallLayer.style.setProperty('--wx', (-tx * 8).toFixed(2) + 'px');
    wallLayer.style.setProperty('--wy', (-ty * 8).toFixed(2) + 'px');
    // floor baseboard: ±12px
    floorLayer.style.setProperty('--fx', (tx * 12).toFixed(2) + 'px');
    floorLayer.style.setProperty('--fy', (ty * 12).toFixed(2) + 'px');
    requestAnimationFrame(updateParallax);
  }
  updateParallax();

  window.addEventListener('mousemove', (e)=>{
    const w = window.innerWidth, h = window.innerHeight;
    cx = (e.clientX / w) * 2 - 1;
    cy = (e.clientY / h) * 2 - 1;
    if(!audioReady){ tryStartAudio(); }
  }, {passive:true});
  window.addEventListener('touchmove', (e)=>{
    if(e.touches.length){
      const t = e.touches[0];
      const w = window.innerWidth, h = window.innerHeight;
      cx = (t.clientX / w) * 2 - 1;
      cy = (t.clientY / h) * 2 - 1;
      if(!audioReady){ tryStartAudio(); }
    }
  }, {passive:true});
  window.addEventListener('touchstart', ()=>{ if(!audioReady) tryStartAudio(); }, {passive:true});

  /* --- audio --- */
  let actx = null;
  let audioReady = false;
  let audioSilentFirstCycle = true;
  function tryStartAudio(){
    if(audioReady) return;
    try{
      actx = new (window.AudioContext || window.webkitAudioContext)();
      audioReady = true;
    } catch(e){ audioReady = false; }
  }

  function playRing(duration, peakBoost){
    if(!audioReady || !actx) return;
    if(audioSilentFirstCycle) return;
    const now = actx.currentTime;
    const dur = duration || 1.8;
    // two oscillators: 440 + 480
    const osc1 = actx.createOscillator();
    const osc2 = actx.createOscillator();
    osc1.type = 'sine'; osc2.type = 'sine';
    osc1.frequency.value = 440;
    osc2.frequency.value = 480;

    // 20 hz interrupter — square wave shaped
    const lfo = actx.createOscillator();
    lfo.type = 'square';
    lfo.frequency.value = 20;
    const lfoGain = actx.createGain();
    lfoGain.gain.value = 0.5;

    const ringGain = actx.createGain();
    ringGain.gain.value = 0;

    const lfoOffset = actx.createConstantSource();
    lfoOffset.offset.value = 0.5;

    // chain: lfo -> lfoGain -> ringGain.gain (with offset)
    lfo.connect(lfoGain);
    lfoOffset.connect(lfoGain);

    // ringGain modulated by lfoGain
    const modGain = actx.createGain();
    modGain.gain.value = 0;
    lfoGain.connect(modGain.gain);

    const lp = actx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1800;
    lp.Q.value = 0.7;

    const outGain = actx.createGain();
    outGain.gain.setValueAtTime(0, now);
    const peak = 0.16 * (peakBoost || 1);
    outGain.gain.linearRampToValueAtTime(peak, now + 0.04);
    outGain.gain.linearRampToValueAtTime(peak * 0.95, now + dur - 0.1);
    outGain.gain.linearRampToValueAtTime(0, now + dur);

    osc1.connect(modGain);
    osc2.connect(modGain);
    modGain.connect(lp);
    lp.connect(outGain);
    outGain.connect(actx.destination);

    osc1.start(now); osc2.start(now);
    lfo.start(now); lfoOffset.start(now);
    osc1.stop(now + dur + 0.05);
    osc2.stop(now + dur + 0.05);
    lfo.stop(now + dur + 0.05);
    lfoOffset.stop(now + dur + 0.05);
  }

  /* --- ring cycle + shudder --- */
  let pageStart = performance.now();
  let ringCount = 0;        // total rings since load
  let clusterRing = 0;      // 0..3 inside the current cluster

  function shudderHandset(amount){
    const a = amount || 1.2;
    // sequence: +a (60ms) -> 0 (80ms) -> -0.67a (60ms) -> 0
    phone.style.setProperty('--shx', a + 'px');
    cord.style.setProperty('--cordy', (a * 0.5) + 'px');
    setTimeout(()=>{
      phone.style.setProperty('--shx', '0px');
      cord.style.setProperty('--cordy', '0px');
    }, 60);
    setTimeout(()=>{
      phone.style.setProperty('--shx', (-a * 0.67) + 'px');
      cord.style.setProperty('--cordy', (-a * 0.3) + 'px');
    }, 140);
    setTimeout(()=>{
      phone.style.setProperty('--shx', '0px');
      cord.style.setProperty('--cordy', '0px');
    }, 200);
  }

  function flashDial(opacity, duration){
    const op = opacity || 0.18;
    const dur = duration || 90;
    flash.style.transition = 'opacity 20ms ease-in';
    flash.style.opacity = op;
    setTimeout(()=>{
      flash.style.transition = 'opacity ' + (dur - 30) + 'ms ease-out';
      flash.style.opacity = 0;
    }, 30);
  }

  function doRing(){
    // is this the wildcard ring?
    // every 41 minutes, the third ring of the current cluster is special.
    const elapsedMin = (performance.now() - pageStart) / 60000;
    const wildcardWindow = Math.floor(elapsedMin / 41);
    const isWildcardCluster = (elapsedMin - wildcardWindow * 41) < (12 / 60); // within first 12s after the 41-min mark
    const isWildcard = isWildcardCluster && clusterRing === 2; // third ring

    if(isWildcard){
      // carol sue almost stands up
      shudderHandset(2.4);
      flashDial(0.32, 1200);
      playRing(1.8, 1.0);
      // small shadow shift — she leaned forward
      carolsue.style.setProperty('--csx', '8px');
      carolsue.style.setProperty('--csy', '-4px');
      setTimeout(()=>{
        carolsue.style.setProperty('--csx', '0px');
        carolsue.style.setProperty('--csy', '0px');
      }, 1600);
    } else {
      shudderHandset(1.2);
      flashDial(0.18, 90);
      playRing(1.8, 1.0);
    }

    ringCount++;
    clusterRing++;
  }

  function scheduleCluster(){
    // four rings, each ring = 1.8s ring + 0.4s gap (except last)
    clusterRing = 0;
    let t = 0;
    for(let i=0; i<4; i++){
      setTimeout(doRing, t);
      t += 1800 + 400;
    }
    // after the cluster: 4.0s silent pause, then next cluster
    setTimeout(()=>{
      if(audioSilentFirstCycle){ audioSilentFirstCycle = false; }
      scheduleCluster();
    }, t + 4000 - 400);
  }

  // start the first cluster immediately
  scheduleCluster();

  /* --- carol sue idle shifts --- */
  function scheduleCarolSueShift(){
    const wait = 30000 + Math.random() * 60000;
    setTimeout(()=>{
      const dx = (Math.random() - 0.5) * 14;
      const dy = (Math.random() - 0.5) * 8;
      carolsue.style.setProperty('--csx', dx.toFixed(1) + 'px');
      carolsue.style.setProperty('--csy', dy.toFixed(1) + 'px');
      scheduleCarolSueShift();
    }, wait);
  }
  scheduleCarolSueShift();

  /* --- slow light cast drift over 12 minutes --- */
  function updateLightCast(){
    const elapsed = (performance.now() - pageStart) / 1000;
    const cyclePos = (elapsed % 720) / 720; // 0..1 over 12 min
    // angle: 212 -> 218 deg (32 -> 38 off vertical)
    const angle = 212 + cyclePos * 6;
    const intensity = 0.20 + Math.sin(cyclePos * Math.PI * 2) * 0.006;
    lightcast.style.setProperty('--lightangle', angle.toFixed(2) + 'deg');
    lightcast.style.setProperty('--lightint', intensity.toFixed(3));
    requestAnimationFrame(updateLightCast);
  }
  updateLightCast();

  /* --- dust motes --- */
  const dustContainer = document.getElementById('dust');
  const motes = [];
  const MOTE_COUNT = 16;
  for(let i=0; i<MOTE_COUNT; i++){
    const m = document.createElement('div');
    m.className = 'mote';
    const startX = Math.random() * window.innerWidth;
    const startY = Math.random() * window.innerHeight;
    m.style.left = startX + 'px';
    m.style.top = startY + 'px';
    dustContainer.appendChild(m);
    motes.push({
      el: m,
      x: startX,
      y: startY,
      vx: (Math.random() - 0.5) * 0.4 + 0.05,
      vy: (Math.random() - 0.3) * 0.3 - 0.04,
    });
  }
  function updateMotes(){
    const w = window.innerWidth, h = window.innerHeight;
    for(const m of motes){
      m.x += m.vx;
      m.y += m.vy;
      if(m.x < -8) m.x = w + 4;
      if(m.x > w + 8) m.x = -4;
      if(m.y < -8) m.y = h + 4;
      if(m.y > h + 8) m.y = -4;
      // brighter in upper-right region
      const inLight = (m.x / w) > 0.55 && (m.y / h) < 0.5;
      m.el.style.opacity = inLight ? '0.55' : '0.22';
      m.el.style.transform = 'translate(' + (m.x - parseFloat(m.el.style.left)) + 'px, ' + (m.y - parseFloat(m.el.style.top)) + 'px)';
    }
    requestAnimationFrame(updateMotes);
  }
  updateMotes();

  /* visible only here, in the console, only if you're looking:
     verla is in sandusky. her kitchen is east-facing. she is
     holding the handset to her ear and counting. she will let
     it go eleven rings. she will hang up at 9:51. she will try
     again after lunch. marjorie will come up at 10:08. */
})();
</script>
