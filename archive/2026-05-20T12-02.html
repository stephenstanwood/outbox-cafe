<!--
  some warmths persist longer than others.
  if you sit still, the field remembers your shape.
  there is one warmth here that did not come from you.
  it has been here the whole time.
-->

<script>
(() => {
  const thermalCanvas = document.getElementById('thermal');
  const bloomCanvas = document.getElementById('bloom');
  const tCtx = thermalCanvas.getContext('2d');
  const bCtx = bloomCanvas.getContext('2d');
  const readout = document.getElementById('readout');

  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    W = w; H = h;
    [thermalCanvas, bloomCanvas].forEach(c => {
      c.width = Math.floor(w * DPR);
      c.height = Math.floor(h * DPR);
      c.style.width = w + 'px';
      c.style.height = h + 'px';
      c.getContext('2d').setTransform(DPR, 0, 0, DPR, 0, 0);
    });
    drawBaseLandscape();
  }

  // thermal color ramp: cold → hot
  // input t in [0,1]
  function thermalColor(t, alpha = 1) {
    t = Math.max(0, Math.min(1, t));
    // stops: 0 black, 0.12 deep blue, 0.28 cyan, 0.45 yellow-green, 0.62 yellow, 0.78 orange, 0.90 red, 1.0 white
    const stops = [
      [0.00, [ 10,  10,  10]],
      [0.10, [  0,  20,  90]],
      [0.22, [  0, 100, 200]],
      [0.34, [  0, 217, 255]],
      [0.48, [154, 205,  50]],
      [0.62, [255, 235,  90]],
      [0.76, [255,  90,   0]],
      [0.88, [255,  50,  50]],
      [1.00, [255, 255, 255]]
    ];
    let a = stops[0], b = stops[stops.length - 1];
    for (let i = 0; i < stops.length - 1; i++) {
      if (t >= stops[i][0] && t <= stops[i+1][0]) { a = stops[i]; b = stops[i+1]; break; }
    }
    const span = b[0] - a[0] || 1;
    const k = (t - a[0]) / span;
    const r = Math.round(a[1][0] + (b[1][0] - a[1][0]) * k);
    const g = Math.round(a[1][1] + (b[1][1] - a[1][1]) * k);
    const bl = Math.round(a[1][2] + (b[1][2] - a[1][2]) * k);
    return `rgba(${r},${g},${bl},${alpha})`;
  }

  // --- LANDSCAPE GEOMETRY (drawn once into a buffer) ---
  // We bake a "thermal landscape" base into the thermal canvas with slow modulation.
  let landscapeBuffer = null;

  function drawBaseLandscape() {
    // build a layered thermal scene
    const off = document.createElement('canvas');
    off.width = thermalCanvas.width;
    off.height = thermalCanvas.height;
    const ctx = off.getContext('2d');
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // SKY — coldest at the top, slightly warmer near horizon (storm front building)
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.62);
    sky.addColorStop(0, thermalColor(0.05, 1));
    sky.addColorStop(0.45, thermalColor(0.09, 1));
    sky.addColorStop(0.85, thermalColor(0.18, 1));
    sky.addColorStop(1, thermalColor(0.26, 1));
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H * 0.62);

    // distant storm cell — warmer mass approaching low on horizon
    const storm = ctx.createRadialGradient(W * 0.72, H * 0.58, 10, W * 0.72, H * 0.58, W * 0.5);
    storm.addColorStop(0, 'rgba(255, 90, 30, 0.35)');
    storm.addColorStop(0.4, 'rgba(255, 50, 20, 0.18)');
    storm.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = storm;
    ctx.fillRect(0, 0, W, H);

    // far mountain ridge — cold rock, slightly warmer south face
    ctx.beginPath();
    ctx.moveTo(0, H * 0.58);
    const ridgeSeed = 17.3;
    for (let x = 0; x <= W; x += 6) {
      const n =
        Math.sin((x + ridgeSeed) * 0.012) * 24 +
        Math.sin((x + 90) * 0.031) * 10 +
        Math.sin(x * 0.07) * 4;
      ctx.lineTo(x, H * 0.58 + n);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    const ridgeFill = ctx.createLinearGradient(0, H * 0.55, 0, H * 0.72);
    ridgeFill.addColorStop(0, thermalColor(0.32, 1));
    ridgeFill.addColorStop(0.5, thermalColor(0.20, 1));
    ridgeFill.addColorStop(1, thermalColor(0.14, 1));
    ctx.fillStyle = ridgeFill;
    ctx.fill();

    // mid hills — warmer
    ctx.beginPath();
    ctx.moveTo(0, H * 0.72);
    for (let x = 0; x <= W; x += 4) {
      const n =
        Math.sin(x * 0.018 + 3.1) * 18 +
        Math.sin(x * 0.05 + 1.7) * 7;
      ctx.lineTo(x, H * 0.72 + n);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    const midFill = ctx.createLinearGradient(0, H * 0.68, 0, H * 0.86);
    midFill.addColorStop(0, thermalColor(0.42, 1));
    midFill.addColorStop(1, thermalColor(0.30, 1));
    ctx.fillStyle = midFill;
    ctx.fill();

    // valley floor — warmest geological mass, sun-soaked stone
    ctx.beginPath();
    ctx.moveTo(0, H * 0.86);
    for (let x = 0; x <= W; x += 4) {
      const n = Math.sin(x * 0.025 + 5.1) * 8;
      ctx.lineTo(x, H * 0.86 + n);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    const floor = ctx.createLinearGradient(0, H * 0.84, 0, H);
    floor.addColorStop(0, thermalColor(0.55, 1));
    floor.addColorStop(1, thermalColor(0.46, 1));
    ctx.fillStyle = floor;
    ctx.fill();

    // cold river snaking through valley — sharp blue
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-10, H * 0.92);
    for (let x = -10; x <= W + 10; x += 12) {
      const y = H * 0.92 + Math.sin(x * 0.012) * 14 + Math.sin(x * 0.04) * 4;
      ctx.lineTo(x, y);
    }
    ctx.lineWidth = 14;
    ctx.strokeStyle = thermalColor(0.10, 0.85);
    ctx.lineCap = 'round';
    ctx.shadowColor = thermalColor(0.18, 0.6);
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.lineWidth = 6;
    ctx.strokeStyle = thermalColor(0.05, 0.9);
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.restore();

    // a small warm spring or geological vent — persistent hot pixel
    const ventX = W * 0.18, ventY = H * 0.83;
    const vent = ctx.createRadialGradient(ventX, ventY, 1, ventX, ventY, 70);
    vent.addColorStop(0, 'rgba(255,255,255,0.95)');
    vent.addColorStop(0.15, 'rgba(255,140,40,0.85)');
    vent.addColorStop(0.45, 'rgba(255,60,20,0.45)');
    vent.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = vent;
    ctx.fillRect(ventX - 80, ventY - 80, 160, 160);

    landscapeBuffer = off;
  }

  // --- WIND / THERMAL CURRENTS particle layer ---
  const winds = [];
  function spawnWind() {
    winds.push({
      x: -20,
      y: H * (0.35 + Math.random() * 0.45),
      vx: 0.4 + Math.random() * 0.7,
      vy: (Math.random() - 0.5) * 0.18,
      r: 60 + Math.random() * 90,
      heat: 0.35 + Math.random() * 0.35,
      life: 0,
      maxLife: 600 + Math.random() * 500,
    });
  }
  for (let i = 0; i < 6; i++) spawnWind();

  // --- USER BLOOMS ---
  const blooms = [];
  function addBloom(x, y, intensity, radius) {
    blooms.push({
      x, y,
      r: radius,
      maxR: radius * 5,
      heat: intensity,
      life: 0,
      maxLife: intensity > 0.85 ? 280 : 180,
    });
    if (blooms.length > 60) blooms.shift();
  }

  // --- PERSISTENT WATCHER (the wildcard) ---
  // After ~50s, a warm shape begins to emerge — a deer-like silhouette
  // standing on the mid ridge, watching.
  const START = performance.now();
  const WATCHER_BEGIN = 50000; // ms
  const WATCHER_FULL = 70000;
  let watcherX = 0, watcherY = 0;
  let watcherBaseX = 0;

  function getWatcherPos(t) {
    watcherBaseX = W * 0.36;
    const drift = Math.sin(t * 0.00012) * 18;
    return { x: watcherBaseX + drift, y: H * 0.665 };
  }

  // Draw a deer-like warm silhouette using soft heat blobs
  function drawWatcher(ctx, cx, cy, alpha) {
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = alpha;

    const parts = [
      // body
      { x: 0,    y: 0,    rx: 32, ry: 14, h: 0.78 },
      // chest
      { x: -22,  y: 2,    rx: 14, ry: 12, h: 0.82 },
      // hindquarters
      { x: 24,   y: 0,    rx: 16, ry: 14, h: 0.80 },
      // neck
      { x: -32,  y: -16,  rx: 7,  ry: 16, h: 0.84 },
      // head
      { x: -38,  y: -30,  rx: 11, ry: 8,  h: 0.88 },
      // muzzle (hottest — breath)
      { x: -48,  y: -28,  rx: 5,  ry: 4,  h: 0.95 },
      // ears
      { x: -34,  y: -38,  rx: 3,  ry: 6,  h: 0.70 },
      { x: -40,  y: -39,  rx: 3,  ry: 6,  h: 0.70 },
      // front leg
      { x: -18,  y: 18,   rx: 4,  ry: 14, h: 0.65 },
      // back leg
      { x: 22,   y: 18,   rx: 4,  ry: 14, h: 0.65 },
      // tail
      { x: 38,   y: -6,   rx: 4,  ry: 5,  h: 0.72 },
    ];

    for (const p of parts) {
      const g = ctx.createRadialGradient(cx + p.x, cy + p.y, 1, cx + p.x, cy + p.y, Math.max(p.rx, p.ry) * 1.8);
      g.addColorStop(0, thermalColor(p.h, 1));
      g.addColorStop(0.4, thermalColor(p.h * 0.7, 0.7));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(cx + p.x, cy + p.y, p.rx * 1.4, p.ry * 1.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // slow heart-pulse breath at the muzzle
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0035);
    const breath = ctx.createRadialGradient(cx - 50, cy - 28, 1, cx - 50, cy - 28, 14 + pulse * 6);
    breath.addColorStop(0, `rgba(255,255,255,${0.55 * pulse})`);
    breath.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = breath;
    ctx.beginPath();
    ctx.arc(cx - 50, cy - 28, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // --- ANIMAL TRACKS (very faint, sometimes) ---
  // small wandering warm dots moving across the mid ground
  const critters = [];
  function spawnCritter() {
    critters.push({
      x: Math.random() < 0.5 ? -10 : W + 10,
      y: H * (0.78 + Math.random() * 0.10),
      vx: (Math.random() < 0.5 ? 1 : -1) * (0.15 + Math.random() * 0.25),
      heat: 0.65 + Math.random() * 0.2,
      life: 0,
      maxLife: 1600 + Math.random() * 1000,
    });
  }
  setInterval(() => { if (Math.random() < 0.35) spawnCritter(); }, 7000);

  // --- ANIMATION ---
  let last = performance.now();

  function frame(now) {
    const dt = Math.min(40, now - last);
    last = now;
    const tms = now - START;

    // === THERMAL LAYER (landscape + slow drift + winds) ===
    tCtx.globalCompositeOperation = 'source-over';
    tCtx.clearRect(0, 0, W, H);

    // base landscape
    if (landscapeBuffer) {
      tCtx.save();
      tCtx.setTransform(1, 0, 0, 1, 0, 0);
      tCtx.drawImage(landscapeBuffer, 0, 0);
      tCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
      tCtx.restore();
    }

    // breathing modulation — slow overall warm/cool oscillation
    const breathe = 0.5 + 0.5 * Math.sin(now * 0.00025);
    tCtx.globalCompositeOperation = 'lighter';
    tCtx.fillStyle = `rgba(${Math.floor(50 + breathe*20)}, ${Math.floor(20 + breathe*10)}, 0, 0.04)`;
    tCtx.fillRect(0, 0, W, H);

    // wind currents — warmth being carried left-to-right across the valley
    for (let i = winds.length - 1; i >= 0; i--) {
      const w = winds[i];
      w.x += w.vx * dt * 0.08;
      w.y += w.vy * dt * 0.08 + Math.sin(now * 0.001 + i) * 0.08;
      w.life += dt;
      const lifeT = w.life / w.maxLife;
      const alpha = Math.sin(lifeT * Math.PI) * 0.18;

      const g = tCtx.createRadialGradient(w.x, w.y, 1, w.x, w.y, w.r);
      g.addColorStop(0, thermalColor(w.heat + 0.05, alpha));
      g.addColorStop(0.4, thermalColor(w.heat * 0.7, alpha * 0.5));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      tCtx.fillStyle = g;
      tCtx.beginPath();
      tCtx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      tCtx.fill();

      if (w.x > W + w.r || w.life > w.maxLife) {
        winds.splice(i, 1);
        spawnWind();
      }
    }

    // critters wandering through
    for (let i = critters.length - 1; i >= 0; i--) {
      const c = critters[i];
      c.x += c.vx * dt * 0.06;
      c.y += Math.sin(now * 0.002 + i) * 0.12;
      c.life += dt;
      if (c.life > c.maxLife || c.x < -30 || c.x > W + 30) {
        critters.splice(i, 1);
        continue;
      }
      const fade = Math.sin((c.life / c.maxLife) * Math.PI);
      const g = tCtx.createRadialGradient(c.x, c.y, 0.5, c.x, c.y, 14);
      g.addColorStop(0, thermalColor(c.heat, 0.55 * fade));
      g.addColorStop(0.5, thermalColor(c.heat * 0.6, 0.25 * fade));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      tCtx.fillStyle = g;
      tCtx.beginPath();
      tCtx.arc(c.x, c.y, 14, 0, Math.PI * 2);
      tCtx.fill();
    }

    // === WATCHER (wildcard) ===
    let watcherAlpha = 0;
    if (tms > WATCHER_BEGIN) {
      watcherAlpha = Math.min(1, (tms - WATCHER_BEGIN) / (WATCHER_FULL - WATCHER_BEGIN));
      // gentle pulsing presence after fully appeared
      if (tms > WATCHER_FULL) {
        watcherAlpha = 0.78 + 0.18 * (0.5 + 0.5 * Math.sin(now * 0.0009));
      }
      const pos = getWatcherPos(now);
      watcherX = pos.x; watcherY = pos.y;
      drawWatcher(tCtx, watcherX, watcherY, watcherAlpha);
    }

    // subtle scan-line shimmer to feel like sensor noise
    if ((Math.floor(now / 80) & 1) === 0) {
      tCtx.fillStyle = 'rgba(255, 220, 180, 0.012)';
      tCtx.fillRect(0, 0, W, H);
    }

    // === BLOOM LAYER (interactive thermal disturbances) ===
    // we DON'T clear fully — we fade for persistence trails
    bCtx.globalCompositeOperation = 'destination-out';
    bCtx.fillStyle = `rgba(0,0,0,${0.04 + 0.01 * Math.sin(now * 0.001)})`;
    bCtx.fillRect(0, 0, W, H);

    bCtx.globalCompositeOperation = 'lighter';
    for (let i = blooms.length - 1; i >= 0; i--) {
      const b = blooms[i];
      b.life += dt;
      const t = b.life / b.maxLife;
      if (t >= 1) { blooms.splice(i, 1); continue; }

      // grow then cool
      const grow = 1 - Math.pow(1 - t, 2.2);
      const radius = b.r + (b.maxR - b.r) * grow;
      // heat falls off over life
      const heat = b.heat * (1 - t * 0.85);
      const alpha = (1 - t) * 0.9;

      const g = bCtx.createRadialGradient(b.x, b.y, 0.5, b.x, b.y, radius);
      g.addColorStop(0, thermalColor(Math.min(1, heat + 0.15), alpha));
      g.addColorStop(0.25, thermalColor(heat, alpha * 0.85));
      g.addColorStop(0.55, thermalColor(heat * 0.55, alpha * 0.45));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      bCtx.fillStyle = g;
      bCtx.beginPath();
      bCtx.arc(b.x, b.y, radius, 0, Math.PI * 2);
      bCtx.fill();
    }

    requestAnimationFrame(frame);
  }

  // --- INPUT ---
  let lastMove = 0;
  let lastBloomX = -999, lastBloomY = -999;

  function pointerMove(x, y) {
    const now = performance.now();
    if (now - lastMove < 22) return; // throttle
    lastMove = now;

    // only add a bloom if we've moved enough
    const dx = x - lastBloomX, dy = y - lastBloomY;
    if (dx*dx + dy*dy > 18) {
      addBloom(x, y, 0.65 + Math.random() * 0.15, 14 + Math.random() * 8);
      lastBloomX = x; lastBloomY = y;
    }

    // readout — derive "temp" from y position and active blooms nearby
    const skyness = 1 - (y / H); // 0 ground, 1 sky
    let base = (1 - skyness) * 30 - 6; // -6 to +24
    base += (0.5 - Math.random()) * 0.3;
    readout.textContent = (base >= 0 ? '+' : '') + base.toFixed(1) + '°';
  }

  function pointerClick(x, y) {
    addBloom(x, y, 0.95, 32);
    // ripple a couple of follow-on blooms
    setTimeout(() => addBloom(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*30, 0.7, 22), 120);
    setTimeout(() => addBloom(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*60, 0.5, 18), 280);
  }

  window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('click', e => pointerClick(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => {
    if (e.touches[0]) pointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  window.addEventListener('touchstart', e => {
    if (e.touches[0]) pointerClick(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  // ambient blooms occasionally so it never feels dead
  setInterval(() => {
    if (document.hidden) return;
    const x = Math.random() * W;
    const y = H * (0.55 + Math.random() * 0.4);
    addBloom(x, y, 0.4 + Math.random() * 0.2, 10 + Math.random() * 14);
  }, 1800);

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(frame);

  // a small whisper, for the curious
  console.log('%c the field is listening. ', 'background:#0a0a0a;color:#ff9966;padding:4px 8px;font-style:italic;');
  console.log('%c something warm has been here longer than you. ', 'color:#00d9ff;font-size:11px;');
})();
</script>
