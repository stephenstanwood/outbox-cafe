<title>1490 KHRS — Steeldust Tonight with Brian Halloran</title>
<style>
:root{--bg:#ff006e;--fg:#00f0ff}
body.night{--bg:#00f0ff;--fg:#ff006e}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--fg);font-family:ui-monospace,"Courier New",monospace;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:1.1rem;text-shadow:0 0 8px var(--fg);transition:background .4s,color .4s;gap:.9rem}
.station{text-align:center;letter-spacing:.15em;width:100%}
.station h1{font-size:clamp(1rem,4.2vw,1.5rem);margin:0;font-weight:900}
.dial{font-size:.7rem;opacity:.9;margin-top:.35rem;letter-spacing:.2em}
.tog{position:fixed;top:.8rem;right:.8rem;background:none;border:2px solid var(--fg);color:var(--fg);padding:.3rem .55rem;font:inherit;cursor:pointer;border-radius:999px;font-size:.65rem;letter-spacing:.15em;text-shadow:none}
.caller{max-width:38rem;width:100%;border:2px solid var(--fg);padding:1rem;box-shadow:0 0 14px var(--fg),inset 0 0 8px var(--fg);border-radius:4px;flex:1;display:flex;flex-direction:column;justify-content:center;min-height:9rem}
.who{font-size:.68rem;letter-spacing:.22em;border-bottom:1px dashed var(--fg);padding-bottom:.45rem;margin-bottom:.7rem;opacity:.9}
.take{font-size:clamp(.92rem,2.6vw,1.05rem);line-height:1.45;font-style:italic}
.idle .take{opacity:.55;font-style:normal}
.btn{background:var(--fg);color:var(--bg);border:none;padding:.9rem 1.7rem;font:inherit;font-weight:900;letter-spacing:.28em;font-size:1rem;cursor:pointer;border-radius:999px;box-shadow:0 0 22px var(--fg);text-shadow:none}
.btn:active{transform:scale(.97)}
footer{font-size:.62rem;letter-spacing:.18em;opacity:.85;text-align:center}
footer a{color:var(--fg)}
@keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-1px)}60%{transform:translate(-3px,2px)}80%{transform:translate(3px,-2px)}}
.shake{animation:shake .45s}
/* the on-hold music is two Wurlitzers and a triangle */
</style>
</head>
<body>
<button class="tog" id="tog">◐ AFTER DARK</button>
<div class="station">
  <h1>1490 KHRS &middot; STEELDUST TONIGHT</h1>
  <div class="dial">with Brian Halloran &middot; the call line is open</div>
  <div class="dial">[ &laquo; 1480 &middot; &#9673; 1490 &middot; 1500 &raquo; ]</div>
</div>
<div class="caller idle" id="box">
  <div class="who" id="who">— LINE OPEN — STAND BY —</div>
  <div class="take" id="take">push the button. there is always somebody on hold in Steeldust.</div>
</div>
<button class="btn" id="btn">TAKE A CALLER</button>
<footer>previously on this frequency &rarr; <a href="/archive">the back issues</a></footer>
<!-- bumper music: "El Dorado Stomp" by the Steeldust Five, off the 1971 LP -->
<script>
const callers=[
["WENDELL · on the cordless","Yeah Brian longtime first time — listen, the WATER TOWER. The water tower. They painted the horse the wrong color. The WRONG color Brian. It's supposed to be dapple gray. They made it WHITE. White. What are we, animals?"],
["DARLENE · out past the silo","Hi Brian — the new traffic light at Stallion and 4th. Why. WHY. Fifty-three years we waited on a four-way stop and now suddenly we need a light? Suddenly? After fifty-three years?"],
["BIG TONY · Route 19","Brian I'll tell ya what — high school's gonna change the mascot to the COLTS. The COLTS. We are named after a HORSE and we picked the most GENERIC horse on the menu. I am hanging up I am hanging up."],
["MARV · back of the K-Mart lot","Yeah look — Donna at the post office is retiring in April. APRIL. You don't replace Donna. You just don't. You shutter the building. You hang a wreath."],
["KATHY · in the Bonneville","Brian. Steeldust beat Shiloh by a NECK in 1855. A NECK. And the festival's only gonna run THREE days this year. THREE. After a neck-win. I am beside myself in this Bonneville."],
["EARL · east of the truss bridge","Yeah hi — the diner took the open-faced hot beef off the menu. Open-faced. Brian the defining sandwich of this town. Off the menu. I'll wait. I'll wait right here."],
["DALE · Phillips 66 pay phone","Brian the streetlights on Mane Street are buzzing again. Buzzing. Like a hive. And the city says they 'don't hear it.' They don't HEAR it Brian. They don't HEAR it."],
["LINDA · on her lunch","Yeah — the cemetery. They moved the horse. They MOVED the horse from the center to the back row. After a hundred and sixty years. Where's the respect Brian. Where."],
["GARTH · Sonic drive-thru","Brian I am SCREAMING in my truck — the Founders Day pancake breakfast moved from the firehouse to the LIBRARY. The library. You cannot griddle in a library Brian. You cannot."],
["BRENDA · by the rodeo grounds","Yeah longtime first time. Listen to me. The hardware store has stopped. Carrying. Saddle. Soap. SADDLE SOAP. In a town called Steeldust. I'm done. I'm done."],
["PETE · from the glove compartment","Brian quick one — my kid asked me why we're named after a horse. I told him the whole story. He said 'so?' Brian he said SO. What do I do with that. What do I do."],
["SHERRY · on hold forty minutes","Hi Brian — the grain elevator. Painted PINK now. They said it's for the walk in October. Brian. It has been October for SEVEN MONTHS. SEVEN."],
["HAL · second cousin's recliner","Yeah Brian — they moved the Steeldust statue six inches. SIX INCHES. To the left. Nobody asked me. Nobody asked the committee. Brian I AM on the committee."],
["DEANNA · folding towels","Brian the bell on the elementary — that bell rang on V-E Day. THAT bell. They are replacing it with a bluetooth SPEAKER. A speaker. I'm going to lay down on the linoleum."],
["RAYMOND · idling at the carwash","Yeah Brian — the rodeo announcer pronounced it STEEL-dust not STEELdust. STEEL-dust. With the pause. The PAUSE Brian. In our own arena. In our OWN arena."],
["JUNE · the trailer behind the trailer","Hi Brian — the lights on the Steeldust Drive-In marquee. Half of them out. HALF. Says STEEL US T DRIVE IN. Says STEEL US T. We look like a Halloween. We look like a TRICK."]
];
const box=document.getElementById('box'),who=document.getElementById('who'),take=document.getElementById('take'),btn=document.getElementById('btn'),tog=document.getElementById('tog');
let last=-1;
btn.addEventListener('click',()=>{
  box.classList.remove('idle');
  let i;do{i=Math.floor(Math.random()*callers.length)}while(i===last);
  last=i;
  box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake');
  who.textContent='CALLER · '+callers[i][0];
  take.textContent='"'+callers[i][1]+'"';
});
const saved=localStorage.getItem('khrs-mode');
if(saved==='night')document.body.classList.add('night');
const updateTog=()=>tog.textContent=document.body.classList.contains('night')?'☀ DAYLIGHT':'◐ AFTER DARK';
updateTog();
tog.addEventListener('click',()=>{
  document.body.classList.toggle('night');
  localStorage.setItem('khrs-mode',document.body.classList.contains('night')?'night':'day');
  updateTog();
});
console.log('%c WE GOT BUMPERS — LET\u2019S GET TO BREAK ','background:#ff006e;color:#00f0ff;font-weight:900;padding:6px 10px;letter-spacing:.2em');
</script>
