  <meta name="outbox-spec-era" content="1953 hard-winter single-glazed farmhouse-bedroom window on a still, deeply cold January night — the ordinary pre-central-heating fact of frost ferns growing thick on the INSIDE of the glass overnight, lit only by the low warm glow of a bedside lamp and the moon on the snow outside; not a relic and not nostalgia, just a cold bright working windowpane doing exactly what cold glass does when the warm breath of the room meets it, drawing its ferns the same way it has every hard night for a hundred winters and will again tonight.">
  <meta name="outbox-spec-format" content="The entire viewport IS a single cold windowpane at night — dark glass edge to edge — and frost is drawing itself across it in real time: dendritic ice-ferns branching, re-branching, and thickening as they creep inward from the four corners and the cold sash-edges toward the center, a continuous generative crystallization where each frond sprouts side-fronds, fills its gaps with fine hoar-stipple, and slowly furs the pane toward opaque white, the low lamp-glow just catching the frozen ridges gold. No chrome, no captions, no header, no controls — just the pane and the living frost. Moving the cursor presses a warm fingertip flat against the glass that melts a soft clear circle down to the dark blue night and the moonlit snow behind; lift the finger away and the frost quietly re-ferns across the cleared patch over the next several seconds, seeding new dendrites from the healed edge inward. When a pane at last ferns fully closed it holds a beat, all white, then a fresh dark pane fades up behind it and the ferning begins again — never the same fern-pattern twice.">
  <meta name="outbox-spec-subject" content="Frost ferns — the dendritic ice crystals that grow across a single-glazed windowpane on a hard winter night: the way they branch and re-branch from a seed along the cold edge into feathery fronds, thicken along their spines, backfill the gaps between fronds with fine hoar-frost, and eventually fur the whole pane opaque-white; the plain bright physical fact of humid room-air freezing into fractal fern-shapes on cold glass, and the round clear melt-hole your warm thumb makes when you press it flat against the ice and hold it there.">
  <meta name="outbox-spec-tone" content="No narrator, no text anywhere on the page — the tone is purely the wordless bright delight of a kid at a frozen bedroom window on a cold morning, breathing on the glass and pressing a warm thumb to the ice to melt a peep-hole, then watching the ferns creep back and race to fill the whole pane. Playful, warm, curious, a little greedy to watch it fern all the way over — the wonder is plain and physical and cheerful, the crystallization treated as a loud lovely fact of cold glass, not a fragile precious thing. The closest thing to a voice is the frost's own busy refusal to ever draw the same fern twice.">
  <meta name="outbox-spec-length" content="medium">
  <meta name="outbox-spec-palette" content="Deep window-glass night-blue (#12203a) and moonlit-snow indigo (#1c3050) behind the clear melt-holes, with frost-silver white (#e8f0f5) for the ice-fern bodies, a cold ice-blue (#a8cadd) glinting in the dendrite ridges and spines, and one warm bedside-lamp gold (#e8c878) bleeding softly across the lower-left edge where the room's light catches the frozen glass — the exact look of thick frost ferns on the inside of a dark single-pane window at night, cold glass against a still blue winter dark.">
  <meta name="outbox-spec-wildcard" content="Rarely and unpredictably (roughly one pane in twenty, never announced, never the same trigger), instead of the usual edge-in feathery dendrites the frost seeds a single crystal in the dead center of the pane and grows outward into a near-perfect six-armed radial snowflake — real six-fold symmetry, each arm mirroring the others as it branches — before the ordinary corner-ferns arrive to fill the rest. It is never explained, never labeled, never rewarded; it simply happens to a visitor who watches long enough.">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Frost ferns drawing themselves across a cold windowpane at night. Press a warm thumb to the glass.">
<title>The Ferns That Grow on Cold Glass</title>
<!-- the ferns never draw the same twice; press a warm thumb and watch them race back -->
<style>
  html,body{margin:0;padding:0;height:100%;background:#0a1428;overflow:hidden;}
  #view{position:fixed;inset:0;display:block;touch-action:none;cursor:crosshair;}
  #tally{
    position:fixed;right:11px;bottom:9px;z-index:5;pointer-events:none;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:9.5px;letter-spacing:1.4px;
    color:rgba(200,222,235,.30);
    text-shadow:0 0 1px rgba(168,202,221,.35);
    user-select:none;
  }
  #cab{
    position:fixed;left:11px;bottom:9px;z-index:5;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:9.5px;letter-spacing:1.4px;text-decoration:none;
    color:rgba(200,222,235,.20);
    text-shadow:0 0 1px rgba(168,202,221,.30);
    transition:color .5s;
  }
  #cab:hover{color:rgba(216,232,240,.55);}
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="tally">PANES FROSTED FULLY OVER: 0</div>
<a id="cab" href="/archive">the cabinet</a>
<script>
(function(){
  "use strict";
  var view=document.getElementById('view');
  var vctx=view.getContext('2d');
  var bgCanvas=document.createElement('canvas'), bctx=bgCanvas.getContext('2d');
  var frostCanvas=document.createElement('canvas'), fctx=frostCanvas.getContext('2d');

  var W,H,dpr,cols,rows,cell,total,grid,count,coveredCells,tips;
  var CAP=650, CLOSE=0.9;
  var state, veil, phaseT, frameOfPane;
  var mActive=false, mX=0, mY=0, mR=0, mMax=50;
  var snowMode=false, snowSegs=[], snowI=0, growthR=0, snowMaxR=0, snowSpeed=1, ferniesStarted=false;
  var cx=0, cy=0;
  var paneCount=0;

  var tallyEl=document.getElementById('tally');
  try{ paneCount=parseInt(localStorage.getItem('outbox_frost_panes')||'0',10)||0; }catch(e){ paneCount=0; }
  tallyEl.textContent='PANES FROSTED FULLY OVER: '+paneCount;

  function bumpTally(){
    paneCount++;
    try{ localStorage.setItem('outbox_frost_panes',String(paneCount)); }catch(e){}
    tallyEl.textContent='PANES FROSTED FULLY OVER: '+paneCount;
  }

  // ---- frost drawing ----
  function drawSeg(x1,y1,x2,y2,w,gold){
    fctx.lineCap='round';
    fctx.strokeStyle= gold ? 'rgba(232,204,132,0.55)' : 'rgba(232,240,245,0.68)';
    fctx.lineWidth=w;
    fctx.beginPath(); fctx.moveTo(x1,y1); fctx.lineTo(x2,y2); fctx.stroke();
    if(w>1.15){
      fctx.strokeStyle='rgba(168,202,221,0.5)';
      fctx.lineWidth=w*0.42;
      fctx.beginPath(); fctx.moveTo(x1,y1); fctx.lineTo(x2,y2); fctx.stroke();
    }
  }
  function stipple(x,y,w){
    var n=1+((Math.random()*2)|0);
    fctx.fillStyle='rgba(232,240,245,0.32)';
    for(var i=0;i<n;i++){
      var a=Math.random()*6.283, r=w*(1.4+Math.random()*2.6);
      fctx.fillRect(x+Math.cos(a)*r, y+Math.sin(a)*r, 1, 1);
    }
  }
  function mark(x,y){
    if(x<0||y<0||x>=W||y>=H) return;
    var idx=(((y/cell)|0)*cols)+((x/cell)|0);
    if(grid[idx]===0){ grid[idx]=1; count++; coveredCells.push(idx); }
  }

  function spawnTip(x,y,a,w,gen,opt){
    if(tips.length>=CAP) return;
    opt=opt||{};
    tips.push({
      x:x,y:y,a:a,w:w,gen:gen,dead:false,
      life: opt.life || (40+Math.random()*30),
      sp:   opt.sp   || (0.9+Math.random()*0.5),
      branch: opt.branch || 0.05,
      wob:0.26
    });
  }

  function stepTip(t){
    if(t.dead) return;
    t.a += (Math.random()-0.5)*t.wob;
    var nx=t.x+Math.cos(t.a)*t.sp, ny=t.y+Math.sin(t.a)*t.sp;
    var gold=(nx<W*0.34 && ny>H*0.6);
    drawSeg(t.x,t.y,nx,ny,t.w,gold);
    mark(nx,ny);
    if(Math.random()<0.14) stipple(nx,ny,t.w);
    t.x=nx; t.y=ny; t.life--;
    if(t.gen<5 && t.w>0.7 && Math.random()<t.branch){
      var side=Math.random()<0.5?1:-1;
      spawnTip(t.x,t.y,t.a+side*(Math.PI/3+(Math.random()-0.5)*0.25),
               t.w*0.6, t.gen+1,
               {life:t.life*0.7, sp:t.sp*0.92, branch:t.branch});
    }
    if(t.life<=0||t.w<0.4||t.x<-30||t.x>W+30||t.y<-30||t.y>H+30) t.dead=true;
  }

  function seedEdges(){
    var N=14, i, x, y, side, f, ang;
    for(i=0;i<N;i++){
      side=i%4; f=Math.random();
      if(side===0){x=f*W;y=0;}
      else if(side===1){x=W;y=f*H;}
      else if(side===2){x=f*W;y=H;}
      else{x=0;y=f*H;}
      ang=Math.atan2(cy-y,cx-x)+(Math.random()-0.5)*1.0;
      spawnTip(x,y,ang,1.8+Math.random()*1.2,0,
               {life:120+Math.random()*140, sp:1.2+Math.random()*0.5, branch:0.055});
    }
    var corners=[[6,6],[W-6,6],[6,H-6],[W-6,H-6]], k, c;
    for(var ci=0;ci<corners.length;ci++){
      c=corners[ci];
      for(k=0;k<2;k++){
        ang=Math.atan2(cy-c[1],cx-c[0])+(Math.random()-0.5)*0.9;
        spawnTip(c[0],c[1],ang,2.0,0,{life:160,sp:1.3,branch:0.06});
      }
    }
  }

  function frontier(){
    if(coveredCells.length===0) return;
    var budget=4, attempts=0;
    var dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    while(budget>0 && attempts<40){
      attempts++;
      var ci=coveredCells[(Math.random()*coveredCells.length)|0];
      if(grid[ci]!==1) continue;
      var cxc=ci%cols, cyc=(ci/cols)|0;
      var d=dirs[(Math.random()*4)|0];
      var nxc=cxc+d[0], nyc=cyc+d[1];
      if(nxc<0||nyc<0||nxc>=cols||nyc>=rows) continue;
      if(grid[nyc*cols+nxc]===1) continue;
      var px=(cxc+0.5)*cell, py=(cyc+0.5)*cell;
      var ang=Math.atan2(d[1],d[0])+(Math.random()-0.5)*0.85;
      spawnTip(px,py,ang,1.0+Math.random()*0.5,2,
               {life:12+Math.random()*20, sp:0.85+Math.random()*0.4, branch:0.05});
      budget--;
    }
  }

  // ---- wildcard: six-fold snowflake ----
  function buildSnowflake(maxR){
    var segs=[];
    function arm(x,y,ang,len,depth,pd){
      if(len<5||depth<0) return;
      var x2=x+Math.cos(ang)*len, y2=y+Math.sin(ang)*len;
      segs.push({x1:x,y1:y,x2:x2,y2:y2,d:pd+len,w:0.7+depth*0.55});
      var nb=2, i, t, bx, by, bd;
      for(i=1;i<=nb;i++){
        t=i/(nb+1);
        bx=x+(x2-x)*t; by=y+(y2-y)*t; bd=pd+len*t;
        arm(bx,by,ang-Math.PI/3,len*0.42,depth-1,bd);
        arm(bx,by,ang+Math.PI/3,len*0.42,depth-1,bd);
      }
    }
    arm(0,0,0,maxR,4,0);
    segs.sort(function(a,b){return a.d-b.d;});
    return segs;
  }
  function drawSnowSeg(s){
    for(var k=0;k<6;k++){
      var ca=Math.cos(k*Math.PI/3), sa=Math.sin(k*Math.PI/3);
      var x1=cx+s.x1*ca-s.y1*sa, y1=cy+s.x1*sa+s.y1*ca;
      var x2=cx+s.x2*ca-s.y2*sa, y2=cy+s.x2*sa+s.y2*ca;
      drawSeg(x1,y1,x2,y2,s.w,false);
      mark(x2,y2); mark((x1+x2)/2,(y1+y2)/2);
    }
  }

  // ---- melt ----
  function melt(x,y,r){
    fctx.save();
    fctx.globalCompositeOperation='destination-out';
    var g=fctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(0,0,0,1)');
    g.addColorStop(0.68,'rgba(0,0,0,1)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    fctx.fillStyle=g;
    fctx.beginPath(); fctx.arc(x,y,r,0,6.2832); fctx.fill();
    fctx.restore();
    var c0=Math.max(0,((x-r)/cell)|0), c1=Math.min(cols-1,((x+r)/cell)|0);
    var r0=Math.max(0,((y-r)/cell)|0), r1=Math.min(rows-1,((y+r)/cell)|0);
    for(var yy=r0;yy<=r1;yy++){
      for(var xx=c0;xx<=c1;xx++){
        var dx=(xx+0.5)*cell-x, dy=(yy+0.5)*cell-y;
        if(dx*dx+dy*dy<=r*r){
          var idx=yy*cols+xx;
          if(grid[idx]===1){ grid[idx]=0; count--; }
        }
      }
    }
  }

  // ---- background pane ----
  function buildBg(){
    bctx.setTransform(dpr,0,0,dpr,0,0);
    var g=bctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0f1c33'); g.addColorStop(0.55,'#12203a'); g.addColorStop(1,'#1c3050');
    bctx.fillStyle=g; bctx.fillRect(0,0,W,H);
    var m=bctx.createRadialGradient(W*0.72,H*0.22,0,W*0.72,H*0.22,Math.max(W,H)*0.55);
    m.addColorStop(0,'rgba(150,182,212,0.28)');
    m.addColorStop(0.4,'rgba(120,150,190,0.10)');
    m.addColorStop(1,'rgba(0,0,0,0)');
    bctx.fillStyle=m; bctx.fillRect(0,0,W,H);
    var s=bctx.createLinearGradient(0,H*0.68,0,H);
    s.addColorStop(0,'rgba(160,182,212,0)');
    s.addColorStop(1,'rgba(150,176,206,0.22)');
    bctx.fillStyle=s; bctx.fillRect(0,H*0.68,W,H*0.32);
    var l=bctx.createRadialGradient(W*0.05,H*0.93,0,W*0.05,H*0.93,Math.max(W,H)*0.5);
    l.addColorStop(0,'rgba(232,200,120,0.32)');
    l.addColorStop(0.45,'rgba(232,200,120,0.10)');
    l.addColorStop(1,'rgba(0,0,0,0)');
    bctx.fillStyle=l; bctx.fillRect(0,0,W,H);
  }

  // ---- pane lifecycle ----
  function newPane(){
    fctx.clearRect(0,0,W,H);
    grid.fill(0); count=0; coveredCells.length=0; tips.length=0;
    frameOfPane=0;
    cx=W/2; cy=H/2;
    snowMode = Math.random()<0.05;
    if(snowMode){
      snowMaxR=Math.min(W,H)*0.44;
      snowSegs=buildSnowflake(snowMaxR);
      snowI=0; growthR=0; snowSpeed=snowMaxR/240; ferniesStarted=false;
    } else {
      seedEdges();
    }
  }

  function growSnow(){
    growthR+=snowSpeed;
    while(snowI<snowSegs.length && snowSegs[snowI].d<=growthR){
      drawSnowSeg(snowSegs[snowI]); snowI++;
    }
  }

  function frame(){
    frameOfPane++;
    if(state==='growing'){
      if(snowMode){
        growSnow();
        if(!ferniesStarted && growthR>snowMaxR*0.6){ seedEdges(); ferniesStarted=true; }
      }
      for(var i=0;i<tips.length;i++) stepTip(tips[i]);
      tips=tips.filter(function(t){return !t.dead;});
      if(frameOfPane>90 && (!snowMode||ferniesStarted)) frontier();
      if(mActive){ mR=Math.min(mMax, mR+mMax/24); melt(mX,mY,mR); }
      if(count/total>=CLOSE){ state='closing'; phaseT=0; bumpTally(); }
    } else if(state==='closing'){
      for(var j=0;j<tips.length;j++) stepTip(tips[j]);
      tips=tips.filter(function(t){return !t.dead;});
      frontier();
      phaseT++; veil=Math.min(1,phaseT/30);
      if(phaseT>=30){ state='held'; phaseT=0; }
    } else if(state==='held'){
      phaseT++; veil=1;
      if(phaseT>=40){ newPane(); state='reveal'; phaseT=0; }
    } else if(state==='reveal'){
      phaseT++; veil=1-Math.min(1,phaseT/45);
      if(snowMode) growSnow();
      for(var k=0;k<tips.length;k++) stepTip(tips[k]);
      tips=tips.filter(function(t){return !t.dead;});
      if(phaseT>=45){ state='growing'; }
    }
    render();
    requestAnimationFrame(frame);
  }

  function render(){
    vctx.setTransform(dpr,0,0,dpr,0,0);
    vctx.clearRect(0,0,W,H);
    vctx.drawImage(bgCanvas,0,0,W,H);
    vctx.drawImage(frostCanvas,0,0,W,H);
    if(veil>0){
      vctx.fillStyle='rgba(232,240,245,'+veil+')';
      vctx.fillRect(0,0,W,H);
    }
  }

  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    dpr=Math.min(window.devicePixelRatio||1,2);
    [view,bgCanvas,frostCanvas].forEach(function(c){
      c.width=Math.round(W*dpr); c.height=Math.round(H*dpr);
      c.style.width=W+'px'; c.style.height=H+'px';
    });
    cell=Math.max(7,Math.round(Math.min(W,H)/60));
    cols=Math.ceil(W/cell); rows=Math.ceil(H/cell); total=cols*rows;
    grid=new Uint8Array(total); count=0; coveredCells=[];
    mMax=Math.min(80,Math.max(34,Math.min(W,H)*0.09));
    fctx.setTransform(dpr,0,0,dpr,0,0);
    buildBg();
    state='growing'; veil=0; phaseT=0; mActive=false; mR=0;
    newPane();
  }

  // ---- warm fingertip ----
  view.addEventListener('pointermove',function(e){
    mX=e.clientX; mY=e.clientY;
    if(e.pointerType==='mouse'){ if(!mActive){ mActive=true; mR=4; } }
  });
  view.addEventListener('pointerdown',function(e){
    mX=e.clientX; mY=e.clientY; mActive=true; if(mR<4) mR=4;
  });
  view.addEventListener('pointerup',function(e){
    if(e.pointerType!=='mouse'){ mActive=false; mR=0; }
  });
  view.addEventListener('pointercancel',function(){ mActive=false; mR=0; });
  view.addEventListener('pointerleave',function(){ mActive=false; mR=0; });

  window.addEventListener('resize',resize);
  resize();
  console.log('%c  no two the same — not once, not tonight  ','color:#a8cadd;background:#12203a;padding:2px 6px;');
  requestAnimationFrame(frame);
})();
</script>

<script src="/nav.js" defer></script>
</body>
