  <meta name="outbox-spec-era" content="Undated / timeless craft — the moment of leaning your eye to the brass eyepiece of a hand-built three-mirror kaleidoscope in a quiet dim room, the kind of small optical-toy object that Sir David Brewster patented in Edinburgh in 1816 and that small craftspeople around the world have been turning out by hand in walnut-and-brass workshops in every decade since, this particular tube made by one specific contemporary lampworker who finishes the brass collars by hand and signs the inside of the eyepiece end with a tiny initialed punch-mark — but the piece is not pinned to that craftsperson or that decade because the visual experience of looking into a kaleidoscope is the same in 1820 as in 1893 as in 1957 as in 2026, the chamber is the chamber, the mirrors are the mirrors, the beads are the beads, and the geometry does what the geometry has always done.">
  <meta name="outbox-spec-format" content="A single full-viewport circular eyepiece view rendered in pure CSS and SVG, with the rest of the visible browser window filled edge-to-edge in deep matte black so the circular working area appears to float in the middle of the page as if the visitor has leaned their eye flush to the brass collar of a kaleidoscope held in their own hand. Inside the 5-inch-diameter circle, at full kaleidoscope-chamber scale, the visitor sees the interior of a three-mirror-chamber kaleidoscope viewed down the length of the tube — the three first-surface mirrors meeting at 60-degree angles creating perfect 6-fold radial mandala symmetry across the entire visual field, with the loose colored-glass beads inside the chamber visible at the far end refracting through the chamber's clear glass end-cap and back-lit by the soft diffuse light source beyond. Approximately 47 individual beads tumble in the chamber under gravity, and the 6-fold mirror geometry reflects each bead's position through five additional symmetric positions producing the characteristic continuously-reconfiguring mandala pattern that fills the entire circular field. The circular eyepiece edge feathers softly into the matte-black surround. Mouse-cursor circular motion rotates the outer tube — clockwise cursor circles rotate the chamber clockwise tumbling the beads through new configurations, counter-clockwise circles rotate the other way, cursor stillness lets the beads settle into stable arrangements under gravity over 2-3 seconds, click-and-hold shakes the chamber producing a more chaotic cascade. No UI text, no controls, no chrome, no titles, no captions, no headers, no footers — the entire web page is the 5-inch circular view through the eyepiece of one specific kaleidoscope, and looking into it is the entire piece.">
  <meta name="outbox-spec-subject" content="The continuous hand-tumbling motion of 47 specific loose colored-glass objects inside the three-mirror-chamber of a hand-built brass-and-walnut kaleidoscope — every bead a real specific specimen of skilled small-glass craft: 12 millefiori chips cut from canes pulled in a small workshop on the Venetian island of Murano (red-and-white star canes, blue-and-yellow flower canes, green-and-orange spiral canes, each chip 3-5mm across), 8 dichroic-glass shards in cool emerald-to-magenta interference coatings (cut from a sheet a contemporary American lampworker bought from CBS Dichroic in Burbank California), 7 small lampworked rondelles in saturated transparent jewel-tones (made by a glassworker in a small Asheville North Carolina studio across a single September afternoon at a Nortel Minor torch), 6 tiny pressed-glass tear-drops from a 1958 Czech bohemian-glass run, 5 small natural moonstone-like translucent quartz fragments tumbled smooth in a rock tumbler, 4 tiny faceted vintage Swarovski crystal navettes from a 1972 jewelry-supply lot, 2 small antiqued-brass charms (a tiny crescent moon and a tiny six-pointed star, hand-cut by the kaleidoscope's maker from sheet brass and patinated with liver-of-sulfur), and 3 small pieces of beach-tumbled cobalt blue glass from a Cape Cod tidepool — all loose in the chamber together, all tumbling continuously through gravity as the visitor rotates the tube, all reflecting through the three-mirror 60-degree geometry into the 6-fold radial mandala pattern that has been the same essential visual experience since Brewster's 1816 prototype, the beads producing infinite non-repeating symmetric configurations that no two visitors will see exactly the same of, the entire small private experience of leaning your eye to the brass collar and watching the gravity-and-geometry of one specific small chamber produce one continuous stream of new beautiful symmetric arrangements for as long as you keep looking.">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text anywhere on the page at any point. The piece speaks only through the silent continuous tumbling of glass beads in a three-mirror chamber, the silent 6-fold mandala reflections, the silent cascade of color through gravity, and the soft glass-on-glass tinkling that plays via Web Audio API as the beads tumble. The closest analogue to a voice is the silent attentive presence of someone holding a hand-built kaleidoscope to their eye in a quiet room with the curtains drawn against the afternoon — neither performing nor explaining, neither narrating nor moralizing — the quality of absorption requiring no audience and offering no commentary, only the patient continuous act of attention to one small chamber of glass and mirrors doing what glass and mirrors have done for two hundred and ten years.">
  <meta name="outbox-spec-length" content="medium">
  <meta name="outbox-spec-palette" content="Deep matte-black (#080606) filling the entire viewport surround outside the 5-inch circular eyepiece view, with subtle 0.04-opacity micro-texture suggesting the soft dust-and-fingerprint film on the brass eyepiece collar of a working kaleidoscope. Inside the circle: a deep cobalt-violet chamber-backdrop (#1a1838) gradient with subtle radial warming toward the slightly warmer center (#2a1e3a) where the distant chamber-end diffuser sits backlighting the beads. The 47 glass objects in saturated jewel-tones: emerald millefiori (#0a8c5a) with bright specular highlights (#5cf4a8), ruby (#c8243c) with warm pink highlights (#f06a7e), sapphire (#1c4a8e) with cool ice-blue highlights (#7ac4f4), citrine amber (#e89238) with warm gold highlights (#fad078), amethyst (#7a3a9c) with violet highlights (#c89af4), peridot (#7ac4a8) with cool mint highlights (#b8f4d4), aquamarine (#5cc4d4) with pearl-blue highlights (#a8e4f4), translucent moonstone-quartz (#e4e8f0 at 0.72 opacity) with subtle inner adularescence shimmer, dichroic shards cycling through interference-color gradients (cool emerald-to-violet-to-magenta-to-amber on each shard depending on its current rotation angle relative to the chamber's light), Swarovski navettes catching sharp specular star-flashes (#fef8e4 at 0.95 opacity) at peak refraction angle, antiqued-brass crescent and star (#a87838 with darker patina recesses #5a4220), cobalt beach-glass (#2c4e8a at 0.65 opacity with frosted-edge halos #c8d4e4 at 0.45 opacity). The three first-surface mirrors render as cool silver (#a8b4c8 at 0.88 opacity) with subtle warm-cream reflected-light bounces from adjacent beads tinting each mirror surface slightly toward the nearest bead's color. Soft pearl-cream specular highlights (#f4ecd4) on every bead's curved surface catching the chamber-end light. The 6-fold mandala symmetry produces continuously evolving symmetric reflected-color washes across the entire circular field, the dominant hue shifting as different beads tumble into prominence. The circular eyepiece edge feathered through a 14-pixel radial gradient from full opacity at 4.5 inches radius to 0 opacity at 5 inches radius, producing the soft physical feathering of looking through a real brass eyepiece collar.">

d-Brewster historical-figure tribute paragraph, NO 'in 1816 Edinburgh...' biographical-essay framing, NO Victorian-parlor-toy retrospective period-piece styling, NO steampunk Victorian-brass aesthetic mood-boarding. NO condescension toward kaleidoscope-craft as kitsch tourist-shop ephemera, toward 6-fold mandala symmetry as mystic-bookstore decoration, toward jewel-tone glass beads as craft-store filler. NO instructional UI text visible anywhere on the page — NO captions, NO tooltips, NO loading messages, NO 'LOOK INTO THE KALEIDOSCOPE' header banner, NO 'ROTATE THE TUBE' guidance, NO footer credits, NO settings panel, NO speed slider, NO color-picker, NO 'reset the chamber' button, NO 'about this piece' link, NO time-stamp, NO date, NO volume control, NO pause button. NO observatory/society/club scaffolding of kaleidoscope-craftspeople as fictional small-town society. NO radio/CB/ham-radio/broadcast/dispatcher/switchboard/operator-shift/transmission/signal/frequency-tuner framing of anything — the chamber is a chamber, the mirrors are mirrors, the beads are beads, NONE of these are signal-relay metaphors and signal/dispatcher/transmission framing is hard-banned this hour regardless of bucket. NO archival cabinet/drawer/vault framing of the kaleidoscope as relic — it is a working hand-built optical toy being looked into right now. NO night-shift dispatcher voice (there is no time of day in the piece). NO lowercase sentence-fragments (there is no text at all, but the prohibition stands). NO 'day-of-the-week' subject framing. NO 'fictional small-town society/club of [hobbyists]' framing. NO 'issue #' of a fictional periodical framing. NO second-person narration overlay (there is no narration at all). NO Mary-Oliver pause-and-notice-the-world quote-register, NO Wendell-Berry agrarian-philosophical handwringing, NO Annie-Dillard pilgrim-at-tinker-creek epiphany voice, NO Rilke 'you must change your life' moralizing. NO weather-app or photo-viewer interface conventions, NO Pinterest-aesthetic mood-boarding, NO Wes-Anderson-symmetrical-frame styling. NO 'this is generative art and you should feel sophisticated for looking at it' smug self-importance, NO crypto-NFT-generative-art-collection framing, NO Art Blocks branding aesthetic, NO 'each rotation is unique' bragging. The chamber tumbles, the beads cascade, the mirrors reflect, the 6-fold mandala continuously rearranges, and the visitor looks in silence — that is the entire piece. Treat the hand-built brass-and-walnut three-mirror kaleidoscope as a serious working piece of skilled small-optical-toy craft worthy of full peer-to-peer respect, treat the 47 specific loose glass beads as real specimens of skilled millefiori-and-lampwork-and-dichroic craft from working studios in Murano and Asheville and Burbank and elsewhere, treat the 6-fold mirror geometry as legitimate working optical engineering that has been the same essential design since 1816, and treat the visitor's quiet rotation of the tube and silent watching of the continuously-reconfiguring symmetric pattern as real participation in a real act of patient hand-held-optical-toy attention worthy of full peer-to-peer respect.">

<!-- The chamber is the chamber. The mirrors are the mirrors. The beads are the beads. -->
<!-- 47 specimens, 60-degree mirrors, gravity. Signed inside the eyepiece end with a tiny initialed punch-mark. -->

<script>
(() => {
  const sector = document.getElementById('sector0');
  const stage  = document.getElementById('stage');
  const scope  = document.getElementById('scope');

  const SECTOR_DEG = 30;
  const SECTOR_RAD = SECTOR_DEG * Math.PI / 180;
  const R_INNER = 60;
  const R_OUTER = 470;

  const BEAD_TYPES = [
    {kind:'millefiori',  base:'#0a8c5a', hi:'#5cf4a8', ring:'#e8c468', count:3, r:[14,20]},
    {kind:'millefiori',  base:'#1c4a8e', hi:'#7ac4f4', ring:'#fad078', count:3, r:[14,20]},
    {kind:'millefiori',  base:'#c8243c', hi:'#f06a7e', ring:'#f4ecd4', count:3, r:[14,20]},
    {kind:'millefiori',  base:'#7a3a9c', hi:'#c89af4', ring:'#7ac4a8', count:3, r:[14,20]},
    {kind:'dichroic',    base:'#0a8c5a', hi:'#c89af4', count:8, r:[10,16]},
    {kind:'rondelle',    base:'#e89238', hi:'#fad078', count:2, r:[12,17]},
    {kind:'rondelle',    base:'#7ac4a8', hi:'#b8f4d4', count:2, r:[12,17]},
    {kind:'rondelle',    base:'#5cc4d4', hi:'#a8e4f4', count:3, r:[12,17]},
    {kind:'czechtear',   base:'#c8243c', hi:'#f06a7e', count:3, r:[10,14]},
    {kind:'czechtear',   base:'#e89238', hi:'#fad078', count:3, r:[10,14]},
    {kind:'moonstone',   base:'#e4e8f0', hi:'#f4ecd4', count:5, r:[13,18]},
    {kind:'swarovski',   base:'#fef8e4', hi:'#ffffff', count:4, r:[9,13]},
    {kind:'brass',       base:'#a87838', hi:'#fad078', dark:'#5a4220', count:2, r:[14,18], shape:'star'},
    {kind:'cobalt',      base:'#2c4e8a', hi:'#c8d4e4', count:3, r:[12,17]},
  ];

  const beads = [];
  let id = 0;
  for (const t of BEAD_TYPES) {
    for (let i = 0; i < t.count; i++) {
      const r = t.r[0] + Math.random() * (t.r[1] - t.r[0]);
      beads.push({
        id: id++,
        type: t,
        r,
        x: 0, y: 0,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        rot: Math.random() * Math.PI * 2,
        dichroPhase: Math.random() * Math.PI * 2,
        seed: Math.random() * 1000,
      });
    }
  }

  function placeInitial() {
    for (const b of beads) {
      let placed = false;
      let attempts = 0;
      while (!placed && attempts < 50) {
        const ang = Math.random() * SECTOR_RAD;
        const rad = R_INNER + 20 + Math.random() * (R_OUTER - R_INNER - 60);
        b.x = Math.cos(ang) * rad;
        b.y = Math.sin(ang) * rad;
        placed = true;
        for (const o of beads) {
          if (o === b || o.x === 0 && o.y === 0) continue;
          const dx = b.x - o.x, dy = b.y - o.y;
          if (dx*dx + dy*dy < (b.r + o.r) * (b.r + o.r)) { placed = false; break; }
        }
        attempts++;
      }
    }
  }
  placeInitial();

  let chamberRotation = 0;
  let chamberAngVel = 0;
  let shaking = false;
  let cursorInside = false;
  let lastInteraction = performance.now();

  const cursorHistory = [];
  const HIST_LEN = 12;

  function detectCircularMotion() {
    if (cursorHistory.length < 4) return 0;
    let totalAngVel = 0;
    let count = 0;
    const rect = scope.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    for (let i = 1; i < cursorHistory.length; i++) {
      const a = cursorHistory[i-1], b = cursorHistory[i];
      const a1 = Math.atan2(a.y - cy, a.x - cx);
      const a2 = Math.atan2(b.y - cy, b.x - cx);
      let d = a2 - a1;
      if (d > Math.PI) d -= Math.PI * 2;
      if (d < -Math.PI) d += Math.PI * 2;
      const dt = Math.max(b.t - a.t, 1);
      totalAngVel += d / dt;
      count++;
    }
    return count ? totalAngVel / count : 0;
  }

  stage.addEventListener('mousemove', (e) => {
    cursorHistory.push({x: e.clientX, y: e.clientY, t: performance.now()});
    if (cursorHistory.length > HIST_LEN) cursorHistory.shift();
    const rect = scope.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    const r = Math.sqrt(dx*dx + dy*dy);
    cursorInside = r < rect.width * 0.48;
    if (cursorInside) {
      lastInteraction = performance.now();
      const angVel = detectCircularMotion();
      chamberAngVel += angVel * 80;
    }
  });
  stage.addEventListener('mouseleave', () => {
    cursorInside = false;
    cursorHistory.length = 0;
  });
  stage.addEventListener('mousedown', (e) => {
    if (e.button === 0) { shaking = true; ensureAudio(); }
  });
  window.addEventListener('mouseup', () => { shaking = false; });

  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length) {
      const t = e.touches[0];
      cursorHistory.push({x: t.clientX, y: t.clientY, t: performance.now()});
      shaking = true;
      ensureAudio();
    }
  }, {passive:true});
  stage.addEventListener('touchmove', (e) => {
    if (e.touches.length) {
      const t = e.touches[0];
      cursorHistory.push({x: t.clientX, y: t.clientY, t: performance.now()});
      if (cursorHistory.length > HIST_LEN) cursorHistory.shift();
      const angVel = detectCircularMotion();
      chamberAngVel += angVel * 80;
      lastInteraction = performance.now();
    }
  }, {passive:true});
  stage.addEventListener('touchend', () => { shaking = false; });

  let audioCtx = null;
  let voicesActive = 0;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tinkle(strength) {
    if (!audioCtx || voicesActive >= 3) return;
    voicesActive++;
    const freq = 1800 + Math.random() * 1400;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    const peak = Math.min(0.06, 0.02 + strength * 0.04);
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(peak, audioCtx.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.06);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.07);
    o.onended = () => { voicesActive--; };
  }

  function inSector(x, y) {
    const a = Math.atan2(y, x);
    return a >= -0.001 && a <= SECTOR_RAD + 0.001;
  }
  function reflectIntoSector(x, y) {
    const r = Math.sqrt(x*x + y*y);
    let a = Math.atan2(y, x);
    a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    const sec = Math.floor(a / SECTOR_RAD);
    let local = a - sec * SECTOR_RAD;
    if (sec % 2 === 1) local = SECTOR_RAD - local;
    return { x: Math.cos(local) * r, y: Math.sin(local) * r };
  }

  function physics(dt) {
    const gravityAng = -Math.PI / 2 + chamberRotation;
    const gx = Math.cos(gravityAng) * 0.0012 * dt;
    const gy = Math.sin(gravityAng) * 0.0012 * dt;

    for (const b of beads) {
      let ax = gx, ay = gy;
      if (shaking) {
        ax += (Math.random() - 0.5) * 0.08;
        ay += (Math.random() - 0.5) * 0.08;
      }
      b.vx += ax;
      b.vy += ay;

      const damp = shaking ? 0.985 : 0.94;
      b.vx *= damp;
      b.vy *= damp;

      b.x += b.vx * dt * 0.06;
      b.y += b.vy * dt * 0.06;
      b.rot += (b.vx * 0.003 + b.vy * 0.003) * dt;
      b.dichroPhase += dt * 0.0008;
    }

    for (const b of beads) {
      const r = Math.sqrt(b.x*b.x + b.y*b.y);
      if (r > R_OUTER - b.r) {
        const nx = b.x / r, ny = b.y / r;
        b.x = nx * (R_OUTER - b.r);
        b.y = ny * (R_OUTER - b.r);
        const dot = b.vx * nx + b.vy * ny;
        b.vx -= 1.6 * dot * nx;
        b.vy -= 1.6 * dot * ny;
        if (Math.abs(dot) > 0.5) tinkle(Math.min(1, Math.abs(dot) / 4));
      }
      if (r < R_INNER + b.r) {
        const nx = b.x / (r || 0.01), ny = b.y / (r || 0.01);
        b.x = nx * (R_INNER + b.r);
        b.y = ny * (R_INNER + b.r);
        const dot = b.vx * nx + b.vy * ny;
        b.vx -= 1.6 * dot * nx;
        b.vy -= 1.6 * dot * ny;
      }
      if (!inSector(b.x, b.y)) {
        const a = Math.atan2(b.y, b.x);
        let wallAng;
        if (a < 0) wallAng = 0;
        else wallAng = SECTOR_RAD;
        const nx = -Math.sin(wallAng), ny = Math.cos(wallAng);
        const pen = b.x * nx + b.y * ny;
        if ((a < 0 && pen < b.r) || (a > SECTOR_RAD && -pen < b.r)) {
          const flip = a < 0 ? -1 : 1;
          b.x -= flip * nx * b.r;
          b.y -= flip * ny * b.r;
        }
        const dot = b.vx * nx + b.vy * ny;
        b.vx -= 1.5 * dot * nx;
        b.vy -= 1.5 * dot * ny;
        if (Math.abs(dot) > 0.4) tinkle(Math.min(1, Math.abs(dot) / 4));
      }
    }

    for (let i = 0; i < beads.length; i++) {
      for (let j = i + 1; j < beads.length; j++) {
        const a = beads[i], c = beads[j];
        const dx = c.x - a.x, dy = c.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minD = a.r + c.r;
        if (dist > 0 && dist < minD) {
          const nx = dx / dist, ny = dy / dist;
          const overlap = (minD - dist) / 2;
          a.x -= nx * overlap; a.y -= ny * overlap;
          c.x += nx * overlap; c.y += ny * overlap;
          const dvx = c.vx - a.vx, dvy = c.vy - a.vy;
          const dot = dvx * nx + dvy * ny;
          if (dot < 0) {
            const imp = dot * 0.9;
            a.vx += imp * nx; a.vy += imp * ny;
            c.vx -= imp * nx; c.vy -= imp * ny;
            if (Math.abs(dot) > 0.3 && Math.random() < 0.4) {
              tinkle(Math.min(1, Math.abs(dot) / 3));
            }
          }
        }
      }
    }
  }

  function svgEl(name, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', name);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function renderBead(b) {
    const g = svgEl('g', {transform:`translate(${b.x.toFixed(2)} ${b.y.toFixed(2)}) rotate(${(b.rot*57.29).toFixed(1)})`});
    const t = b.type;
    const r = b.r;
    if (t.kind === 'millefiori') {
      g.appendChild(svgEl('circle', {cx:0,cy:0,r:r,fill:t.base,opacity:'0.92'}));
      g.appendChild(svgEl('circle', {cx:0,cy:0,r:r*0.7,fill:t.ring,opacity:'0.85'}));
      g.appendChild(svgEl('circle', {cx:0,cy:0,r:r*0.45,fill:t.base,opacity:'0.95'}));
      for (let k = 0; k < 6; k++) {
        const ang = k * Math.PI / 3;
        g.appendChild(svgEl('circle', {
          cx:(Math.cos(ang)*r*0.55).toFixed(1),
          cy:(Math.sin(ang)*r*0.55).toFixed(1),
          r:r*0.13, fill:t.hi, opacity:'0.9'
        }));
      }
      g.appendChild(svgEl('ellipse', {cx:-r*0.3, cy:-r*0.3, rx:r*0.25, ry:r*0.15, fill:'#f4ecd4', opacity:'0.55'}));
    } else if (t.kind === 'dichroic') {
      const phase = b.dichroPhase;
      const c1 = `hsl(${(160 + Math.sin(phase)*120).toFixed(0)}, 78%, 52%)`;
      const c2 = `hsl(${(300 + Math.cos(phase*1.3)*60).toFixed(0)}, 82%, 60%)`;
      const grad = svgEl('linearGradient', {id:`dich${b.id}`, x1:'0', y1:'0', x2:'1', y2:'1'});
      grad.appendChild(svgEl('stop', {offset:'0%','stop-color':c1,'stop-opacity':'0.92'}));
      grad.appendChild(svgEl('stop', {offset:'100%','stop-color':c2,'stop-opacity':'0.92'}));
      const defs = svgEl('defs'); defs.appendChild(grad); g.appendChild(defs);
      const poly = svgEl('polygon', {
        points:`${-r},${-r*0.6} ${r*0.8},${-r*0.9} ${r},${r*0.5} ${-r*0.5},${r*0.95}`,
        fill:`url(#dich${b.id})`
      });
      g.appendChild(poly);
      g.appendChild(svgEl('polyline', {
        points:`${-r*0.7},${-r*0.3} ${r*0.5},${-r*0.5} ${r*0.7},${r*0.2}`,
        stroke:'#fef8e4', 'stroke-width':'1.2', fill:'none', opacity:'0.7'
      }));
    } else if (t.kind === 'rondelle') {
      g.appendChild(svgEl('ellipse', {cx:0,cy:0,rx:r,ry:r*0.65,fill:t.base,opacity:'0.85'}));
      g.appendChild(svgEl('ellipse', {cx:0,cy:0,rx:r*0.7,ry:r*0.4,fill:t.hi,opacity:'0.55'}));
      g.appendChild(svgEl('ellipse', {cx:-r*0.25,cy:-r*0.18,rx:r*0.35,ry:r*0.12,fill:'#f4ecd4',opacity:'0.7'}));
    } else if (t.kind === 'czechtear') {
      const path = svgEl('path', {
        d:`M 0 ${-r} Q ${r*0.7} ${-r*0.3} ${r*0.5} ${r*0.7} Q 0 ${r} ${-r*0.5} ${r*0.7} Q ${-r*0.7} ${-r*0.3} 0 ${-r} Z`,
        fill:t.base, opacity:'0.88'
      });
      g.appendChild(path);
      g.appendChild(svgEl('ellipse', {cx:r*0.15,cy:-r*0.3,rx:r*0.18,ry:r*0.35,fill:t.hi,opacity:'0.6'}));
      g.appendChild(svgEl('ellipse', {cx:-r*0.15,cy:-r*0.45,rx:r*0.1,ry:r*0.18,fill:'#f4ecd4',opacity:'0.75'}));
    } else if (t.kind === 'moonstone') {
      g.appendChild(svgEl('circle', {cx:0,cy:0,r:r,fill:t.base,opacity:'0.72'}));
      g.appendChild(svgEl('circle', {cx:0,cy:0,r:r*0.85,fill:'#c8d4f0',opacity:'0.35'}));
      g.appendChild(svgEl('ellipse', {cx:-r*0.2,cy:-r*0.2,rx:r*0.5,ry:r*0.3,fill:'#ffffff',opacity:'0.45'}));
      g.appendChild(svgEl('ellipse', {cx:r*0.2,cy:r*0.25,rx:r*0.3,ry:r*0.18,fill:'#a8b8e8',opacity:'0.3'}));
    } else if (t.kind === 'swarovski') {
      const navette = svgEl('path', {
        d:`M 0 ${-r} L ${r*0.6} 0 L 0 ${r} L ${-r*0.6} 0 Z`,
        fill:'#fef8e4', opacity:'0.92'
      });
      g.appendChild(navette);
      g.appendChild(svgEl('path', {
        d:`M 0 ${-r} L ${r*0.6} 0 L 0 ${r}`,
        fill:'none', stroke:'#ffffff', 'stroke-width':'0.8', opacity:'0.95'
      }));
      const starAng = (b.seed % 6) * 60;
      const starG = svgEl('g', {transform:`rotate(${starAng})`});
      starG.appendChild(svgEl('line', {x1:-r*1.4,y1:0,x2:r*1.4,y2:0,stroke:'#fef8e4',
        'stroke-width':'0.6', opacity:'0.7'}));
      starG.appendChild(svgEl('line', {x1:0,y1:-r*1.4,x2:0,y2:r*1.4,stroke:'#fef8e4',
        'stroke-width':'0.6', opacity:'0.7'}));
      g.appendChild(starG);
    } else if (t.kind === 'brass') {
      if (b.id % 2 === 0) {
        const pts = [];
        for (let k = 0; k < 12; k++) {
          const ang = k * Math.PI / 6 - Math.PI/2;
          const rr = k % 2 === 0 ? r : r * 0.45;
          pts.push(`${(Math.cos(ang)*rr).toFixed(1)},${(Math.sin(ang)*rr).toFixed(1)}`);
        }
        g.appendChild(svgEl('polygon', {points:pts.join(' '),fill:t.base,opacity:'0.94'}));
        g.appendChild(svgEl('circle', {cx:0,cy:0,r:r*0.25,fill:t.dark,opacity:'0.7'}));
      } else {
        g.appendChild(svgEl('path', {
          d:`M ${-r*0.3} ${-r*0.9} A ${r} ${r} 0 1 0 ${-r*0.3} ${r*0.9} A ${r*0.6} ${r*0.6} 0 1 1 ${-r*0.3} ${-r*0.9} Z`,
          fill:t.base, opacity:'0.94'
        }));
        g.appendChild(svgEl('path', {
          d:`M ${-r*0.2} ${-r*0.6} A ${r*0.7} ${r*0.7} 0 1 0 ${-r*0.2} ${r*0.6}`,
          fill:'none', stroke:t.dark, 'stroke-width':'0.8', opacity:'0.7'
        }));
      }
      g.appendChild(svgEl('ellipse', {cx:r*0.2,cy:-r*0.3,rx:r*0.18,ry:r*0.1,fill:t.hi,opacity:'0.65'}));
    } else if (t.kind === 'cobalt') {
      g.appendChild(svgEl('circle', {cx:0,cy:0,r:r*1.05,fill:'#c8d4e4',opacity:'0.32'}));
      g.appendChild(svgEl('polygon', {
        points:`${-r*0.9},${-r*0.5} ${r*0.8},${-r*0.7} ${r},${r*0.4} ${-r*0.3},${r*0.9} ${-r*0.95},${r*0.2}`,
        fill:t.base, opacity:'0.7'
      }));
      g.appendChild(svgEl('ellipse', {cx:-r*0.25,cy:-r*0.25,rx:r*0.35,ry:r*0.2,fill:'#a8c4e8',opacity:'0.55'}));
    }
    return g;
  }

  let lastT = performance.now();
  let pendingRender = false;

  function frame(now) {
    let dt = now - lastT;
    if (dt > 50) dt = 50;
    lastT = now;

    const idleTime = now - lastInteraction;
    if (idleTime > 400 && !shaking) {
      chamberAngVel *= 0.92;
    }
    if (!cursorInside && idleTime > 200) {
      chamberRotation += (0 - chamberRotation) * 0.005 * dt / 16;
    }
    chamberRotation += chamberAngVel * dt * 0.001;
    chamberAngVel *= 0.96;

    physics(dt);

    while (sector.firstChild) sector.removeChild(sector.firstChild);
    for (const b of beads) {
      sector.appendChild(renderBead(b));
    }
    const wedge = document.getElementById('wedgeGroup');
    wedge.setAttribute('transform', `rotate(${(chamberRotation * 57.29).toFixed(2)})`);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  console.log('%c chamber × mirrors × beads ', 'background:#1a1838;color:#f4ecd4;padding:4px 8px;font-style:italic;');
  console.log('%c 47 specimens. 60-degree geometry. signed inside the eyepiece end.', 'color:#a87838;font-style:italic;');
})();
</script>

<script src="/nav.js" defer></script>
