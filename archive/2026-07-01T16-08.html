  <meta name="outbox-spec-era" content="Present-tense living folk woodcraft — a freshly carved Bogorodsk-tradition Russian pecking-hens toy of pale bare linden wood with a few dabs of folk-paint, the beeswaxed threads still faintly sticky; whittled this winter by a village carver who still makes them, set on a kitchen oilcloth to be played with THIS afternoon. Not an antique, not a museum piece, not a relic of a vanishing craft — a brand-new wooden toy doing exactly what a pecking-hens toy does.">
  <meta name="outbox-spec-format" content="The whole viewport is a round carved-wood paddle-board seen from a low three-quarter angle, six little painted hens spaced around its rim, each hen's carved head tied by a waxed thread that runs down through a hole in the board to a single heavy wooden pendulum-ball hanging beneath the paddle. The visitor swings the ball — by moving the cursor in slow circles under the board, or grabbing the ball and swinging it — and real pendulum physics tugs each thread in turn, so the hens dip and PECK the scattered grain in the center one after another in a traveling wave that chases the swinging weight around the ring. Faster circles, faster pecking; let it wind down and the pecks slow and stop. A working folk mechanism, fully driven by the swing, not an animation loop.">
  <meta name="outbox-spec-subject" content="The six carved hens on the board and the small barnyard soap-opera of them all going for the same scattered pile of millet: Marfa the fat greedy one who always pecks twice, thin nervous Zoya who pecks fast and often misses, Baba (the biggest, carved from the knot in the wood, dignified and slow), the two little speckled ones Pip and Poluska who nobody can tell apart, and Odette, the runt at the back who is a bit stuck-up and doesn't peck the grain like the others at all.">
  <meta name="outbox-spec-tone" content="The chatty, hopelessly over-sharing voice of the babushka whose toy it is — she carved these six hens' names herself and she will tell you EVERYTHING about them as they peck: which one's greedy, which one's been sulking since Tuesday, that Marfa would eat the whole board if you let her, that Odette thinks she's better than millet, that she keeps meaning to re-glue Zoya's beak. Warm, generous, can't stop talking, genuinely tickled you sat down to swing the ball — she reads the hens the way you'd read six actual chickens you've kept for years, and half of what she says is really about her neighbor Lidia.">

<!-- the wax on the threads is still a little sticky. mind your sleeves. -->
<style>
  :root{
    --linden:#e8d3a8; --walnut:#6b4a2a; --barn:#c0392b; --millet:#e0b040;
    --cloth:#efe4cf;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--cloth);overflow:hidden;
    font-family:"Georgia","Iowan Old Style",serif;color:#3d2b18;-webkit-tap-highlight-color:transparent;}
  #stage{position:fixed;inset:0;display:block;touch-action:none;cursor:grab;}
  #stage.grabbing{cursor:grabbing;}
  #speech{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);
    width:min(88vw,560px);pointer-events:none;text-align:center;z-index:5;}
  #say{display:inline-block;background:rgba(255,250,240,.86);
    border:1px solid rgba(107,74,42,.35);border-radius:14px 20px 16px 22px;
    padding:11px 18px;font-size:clamp(15px,2.6vw,19px);line-height:1.35;
    color:#5a3d20;font-style:italic;box-shadow:0 6px 22px rgba(80,50,20,.14);
    opacity:0;transition:opacity .5s ease;max-width:100%;}
  #say.on{opacity:1;}

<body>
<canvas id="stage"></canvas>
<button id="mute" aria-label="toggle wooden sounds" title="the little wooden knock">♪</button>
<div id="speech"><span id="say"></span>
  <div id="hint">circle your cursor under the board · grab the ball · press <b>space</b> for a good shove</div>
</div>
<div id="foot">Marfa, Zoya, Baba, Pip, Poluska &amp; Odette · <a href="/archive">the rest of the shelf</a></div>
<span id="lidias-cat" hidden>watching for hours, Lidia says. hours.</span>

<script>
(function(){
"use strict";
var cv=document.getElementById("stage"),ctx=cv.getContext("2d");
var sayEl=document.getElementById("say"),speechEl=document.getElementById("speech");
var muteBtn=document.getElementById("mute");
var dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));

// ---- persistent tally (only ever counts up) --------------------------------
var GKEY="outbox.peckingHens.grains";
var grains=parseInt(localStorage.getItem(GKEY)||"0",10);if(isNaN(grains))grains=0;
var saveT=null;
function saveGrains(){if(saveT)return;saveT=setTimeout(function(){
  try{localStorage.setItem(GKEY,String(grains));}catch(e){}saveT=null;},800);}

// ---- layout ----------------------------------------------------------------
var W,H,S,cx,cy,rx,ry,ballBaseY,ballR,u,peckReach;
var hens=[
  {name:"Odette",azd:-90,scale:.82,w:.90,kind:"odette",cool:.6,lerp:.14},
  {name:"Marfa", azd:-30,scale:1.12,w:1.38,kind:"marfa", cool:.52,lerp:.15},
  {name:"Zoya",  azd:30, scale:.98,w:.78,kind:"zoya",  cool:.26,lerp:.24},
  {name:"Baba",  azd:90, scale:1.32,w:1.14,kind:"baba", cool:.80,lerp:.06},
  {name:"Pip",   azd:150,scale:.95,w:1.0,kind:"pip",   cool:.50,lerp:.14},
  {name:"Poluska",azd:210,scale:.95,w:1.0,kind:"poluska",cool:.50,lerp:.14}
];
var pile=[]; // seeded millet scatter
function seedPile(){pile=[];for(var i=0;i<46;i++){var a=Math.random()*Math.PI*2,
  r=Math.pow(Math.random(),.6);pile.push({a:a,r:r,s:.6+Math.random()*.7,t:Math.random()*.5});}}
function resize(){
  W=cv.clientWidth=window.innerWidth;H=cv.clientHeight=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  S=Math.min(W,H);cx=W/2;cy=H*0.365;rx=S*0.40;ry=rx*0.60;
  ballR=S*0.052;u=S*0.055;peckReach=S*0.055;
  ballBaseY=Math.min(cy+ry+S*0.245, H-ballR-58);
  for(var i=0;i<hens.length;i++){var h=hens[i];
    var a=h.azd*Math.PI/180;var persp=1+0.17*Math.sin(a);
    h.az=a;h.x=cx+rx*0.80*Math.cos(a);h.y=cy+ry*0.80*Math.sin(a);
    h.sz=u*h.scale*persp;h.persp=persp;
    if(h.dip===undefined){h.dip=0;h.pt=0;h.cd=0;h.second=0;}}
}
window.addEventListener("resize",resize);
seedPile();resize();

// ---- pendulum physics ------------------------------------------------------
var bx=0.34,by=-0.10,bvx=0,bvy=0.9;      // ring-space displacement + velocity
var K=9.2,DAMP=0.62,DRIVE=13.5;
var driverActive=false,tx=0,ty=0;
var dragging=false;
var particles=[],eggs=[];

function screenBall(){return {x:cx+bx*rx*0.5, y:ballBaseY+by*ry*0.5};}
function ptToRing(px,py){return {x:(px-cx)/(rx*0.5), y:(py-ballBaseY)/(ry*0.5)};}

// ---- sound -----------------------------------------------------------------
var AC=null,muted=false;
function actx(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=false;}}
  if(AC&&AC.state==="suspended")AC.resume();return AC;}
function tok(base){if(muted)return;var c=actx();if(!c)return;var t=c.currentTime;
  var o=c.createOscillator(),g=c.createGain();o.type="triangle";
  o.frequency.setValueAtTime(base*(0.9+Math.random()*0.2),t);
  o.frequency.exponentialRampToValueAtTime(base*0.55,t+0.09);
  g.gain.setValueAtTime(0.001,t);g.gain.exponentialRampToValueAtTime(0.16,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.0008,t+0.11);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.13);}
function knock(){if(muted)return;var c=actx();if(!c)return;var t=c.currentTime;
  var o=c.createOscillator(),g=c.createGain();o.type="sine";
  o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(70,t+0.18);
  g.gain.setValueAtTime(0.001,t);g.gain.exponentialRampToValueAtTime(0.28,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.30);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.32);}
muteBtn.addEventListener("click",function(){muted=!muted;muteBtn.textContent=muted?"✕":"♪";
  muteBtn.style.opacity=muted?".55":"1";if(!muted)actx();});

// ---- babushka voice --------------------------------------------------------
var lines={
 marfa:["There she goes — Marfa, twice, always twice, the greedy thing.",
   "Marfa would eat the whole board if I let her, I swear it.",
   "Look at Marfa shoulder the little ones off. No manners on that one.",
   "Marfa's the fattest and she knows it, pecks like she's paid by the grain.",
   "If millet were gold Marfa'd have bought Lidia's house by now."],
 zoya:["Zoya — fast, fast, fast, and missed again, poor nervous thing.",
   "I keep meaning to re-glue Zoya's beak, it's come loose at the tip.",
   "Zoya pecks like she's late for something. Slow down, ptashka.",
   "Half of Zoya's pecks hit nothing but air. She never seems to mind."],
 baba:["Baba takes her time. Carved from the knot in the wood, that one — solid.",
   "Baba won't be hurried. The big ones never are.",
   "See how Baba waits her turn? Dignity. My mother had a hen just so."],
 pip:["That's Pip. Or Poluska. Nobody can tell them apart — not even me.",
   "The little speckled two, I painted them the same afternoon, same brush.",
   "Pip and Poluska, Poluska and Pip. I gave up telling them years ago."],
 poluska:["Poluska now — or is it Pip. Honestly. I painted them identical.",
   "The speckled pair peck together, always together, like they planned it.",
   "One of the little ones. Don't ask me which; I stopped guessing in '19."],
 odette:["Odette, at the back, won't touch the millet. Thinks she's above it.",
   "Odette's been sulking since Tuesday and won't say why. Runts hold grudges.",
   "She thinks she's better than millet, that one. Millet! Imagine the nerve.",
   "Odette turns her nose up — a runt with the airs of a swan."],
 general:["Keep it swinging, keep it swinging — they do love a good afternoon.",
   "Lidia says a wooden hen can't be greedy. Lidia has never met Marfa.",
   "My grandson swings it too hard and they all peck at once, terrible chaos.",
   "I carved these six last winter, by the stove — thumbs sore for a week.",
   "Lidia wanted me to carve her a rooster. A rooster! Who has the room.",
   "Round and round, that's it — you've got the wrist for it, you have.",
   "Lidia's cat sits and watches this go for hours. Hours, she swears."],
 egg:["Oh — Marfa's knocked an egg clean off! She does that showing off. There it goes...",
   "Did you see! Pecked so hard an egg's rolled right off the edge. Greedy AND clumsy.",
   "There now — an egg, off the board and gone. Only ever Marfa. Lidia won't believe me."]
};
var lastLine=0,lastText="";
function narrate(txt,force){var now=performance.now();
  if(!force&&now-lastLine<2600)return;
  if(txt===lastText&&!force)return;
  lastLine=now;lastText=txt;sayEl.textContent=txt;sayEl.classList.add("on");}
function pick(a){return a[(Math.random()*a.length)|0];}
function henLine(h){
  if(Math.random()<0.30)return pick(lines.general);
  return pick(lines[h.kind]||lines.general);}

// ---- pecking + effects -----------------------------------------------------
function spawnGrain(px,py,n){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,
  sp=S*(0.02+Math.random()*0.05);
  particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:-Math.abs(Math.sin(a))*sp-S*0.02,
    g:S*1.4,life:0,max:0.5+Math.random()*0.4,r:S*(0.004+Math.random()*0.004)});}}
function strike(h){grains++;saveGrains();spawnGrain(cx+(Math.random()-0.5)*rx*0.14,
  cy+ry*0.02+(Math.random()-0.5)*ry*0.14,3+((Math.random()*3)|0));tok(760);}
function spawnEgg(h){var out=Math.atan2(h.y-cy,h.x-cx);
  eggs.push({x:h.bx,y:h.by,vx:Math.cos(out)*S*0.30,vy:-S*0.12,g:S*1.35,
    rot:Math.random()*6,vr:(Math.random()-0.5)*7,r:S*0.022});knock();
  narrate(pick(lines.egg),true);}
function doPeck(h){
  if(h.kind==="odette"){if(Math.random()<0.5)narrate(henLine(h));return;}
  if(h.kind==="marfa"){strike(h);h.second=performance.now()+190;
    if(Math.random()<0.05)spawnEgg(h);}
  else if(h.kind==="zoya"){if(Math.random()<0.55)strike(h);else tok(430);}
  else strike(h);
  if(Math.random()<0.34)narrate(henLine(h));
}

// ---- update ----------------------------------------------------------------
var last=performance.now();
function update(dt){
  // physics
  var ax=-K*bx-DAMP*bvx, ay=-K*by-DAMP*bvy;
  if(driverActive&&!dragging){ax+=DRIVE*(tx-bx);ay+=DRIVE*(ty-by);}
  bvx+=ax*dt;bvy+=ay*dt;bx+=bvx*dt;by+=bvy*dt;
  var mag=Math.hypot(bx,by);if(mag>1.25){var f=1.25/mag;bx*=f;by*=f;bvx*=f;bvy*=f;}
  var b=screenBall();
  var amp=Math.hypot(bx,by),az=Math.atan2(by,bx);
  for(var i=0;i<hens.length;i++){var h=hens[i];
    var al=Math.cos(az-h.az);
    var target=amp>0.06?amp*Math.pow(Math.max(0,al),2.4):0;if(target>1)target=1;
    var rate=1-Math.pow(1-h.lerp,dt*60);h.dip+=(target-h.dip)*rate;
    h.cd-=dt;
    if(target>0.5&&h.pt<=0.5&&h.cd<=0){doPeck(h);h.cd=h.cool;}
    h.pt=target;
    if(h.second&&performance.now()>=h.second){h.second=0;strike(h);}
    // geometry for this frame (head + beak positions)
    var nx=(cx-h.x),ny=(cy-h.y),nl=Math.hypot(nx,ny)||1;nx/=nl;ny/=nl;
    h.nx=nx;h.ny=ny;var d=h.dip,pr=peckReach*h.persp;
    var neck=h.sz*1.0,beak=h.sz*0.55;
    if(h.kind==="odette"){
      h.hx=h.x+nx*neck*0.55-nx*d*pr*0.2; h.hy=h.y+ny*neck*0.55-d*pr*0.95;
      h.bx=h.hx+nx*beak*0.7; h.by=h.hy+ny*beak*0.4-d*pr*0.35;
    }else{
      h.hx=h.x+nx*(neck+d*pr); h.hy=h.y+ny*(neck+d*pr)+d*pr*0.55;
      h.bx=h.hx+nx*beak; h.by=h.hy+ny*beak+d*pr*0.30;
    }
  }
  // particles
  for(var p=particles.length-1;p>=0;p--){var q=particles[p];q.life+=dt;
    q.vy+=q.g*dt;q.x+=q.vx*dt;q.y+=q.vy*dt;if(q.life>q.max)particles.splice(p,1);}
  // eggs
  for(var e=eggs.length-1;e>=0;e--){var g=eggs[e];g.vy+=g.g*dt;g.x+=g.vx*dt;
    g.y+=g.vy*dt;g.rot+=g.vr*dt;if(g.y>H+80||g.x<-80||g.x>W+80)eggs.splice(e,1);}
}

// ---- draw ------------------------------------------------------------------
function drawCloth(){
  ctx.fillStyle="#efe4cf";ctx.fillRect(0,0,W,H);
  var g=Math.max(26,S*0.075);ctx.save();ctx.globalAlpha=0.09;ctx.fillStyle="#c0392b";
  for(var y=0;y<H+g;y+=g)for(var x=0;x<W+g;x+=g){
    if(((x/g)|0)%2===((y/g)|0)%2)ctx.fillRect(x,y,g,g);}
  ctx.globalAlpha=0.05;ctx.fillStyle="#c0392b";
  for(var yy=0;yy<H+g;yy+=g)ctx.fillRect(0,yy,W,g*0.5);
  ctx.restore();
}
function drawBoard(){
  ctx.save();
  ctx.beginPath();ctx.ellipse(cx,cy+ry*0.16,rx*1.02,ry*1.02,0,0,7);
  ctx.fillStyle="rgba(70,44,18,.20)";ctx.fill();      // table shadow
  // walnut rim
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,7);
  var rg=ctx.createLinearGradient(cx,cy-ry,cx,cy+ry);
  rg.addColorStop(0,"#7d5730");rg.addColorStop(0.5,"#6b4a2a");rg.addColorStop(1,"#4f3419");
  ctx.fillStyle=rg;ctx.fill();
  // linden inner
  ctx.beginPath();ctx.ellipse(cx,cy,rx*0.80,ry*0.80,0,0,7);
  var lg=ctx.createRadialGradient(cx-rx*0.2,cy-ry*0.3,ry*0.1,cx,cy,rx*0.8);
  lg.addColorStop(0,"#f0dcb4");lg.addColorStop(0.7,"#e8d3a8");lg.addColorStop(1,"#d8bd8a");
  ctx.fillStyle=lg;ctx.fill();
  // faint carved grain rings
  ctx.strokeStyle="rgba(150,110,60,.14)";ctx.lineWidth=1;
  for(var k=1;k<=3;k++){ctx.beginPath();
    ctx.ellipse(cx,cy,rx*0.80*(k/3.4),ry*0.80*(k/3.4),0,0,7);ctx.stroke();}
  // rim highlight
  ctx.beginPath();ctx.ellipse(cx,cy,rx*0.90,ry*0.90,0,Math.PI*0.15,Math.PI*0.85);
  ctx.strokeStyle="rgba(255,240,210,.10)";ctx.lineWidth=S*0.01;ctx.stroke();
  ctx.restore();
}
function drawTally(){
  var txt="GRAINS PECKED AT THIS TABLE:  "+grains;
  var fs=Math.max(9,S*0.026);ctx.save();
  ctx.font="italic 600 "+fs+"px Georgia, serif";
  var tw=ctx.measureText(txt).width;var maxw=rx*1.5;
  var sc=Math.min(1,maxw/tw);ctx.scale(sc,sc);
  var baseY=(cy+ry*0.90)/sc, half=(tw/2);
  ctx.textAlign="center";ctx.textBaseline="middle";
  var x0=cx/sc-half;
  for(var i=0;i<txt.length;i++){var ch=txt[i];
    var cw=ctx.measureText(txt.substring(0,i)).width+ctx.measureText(ch).width/2;
    var xx=x0+cw;var t=(cw-half)/half;var yy=baseY+t*t*(ry*0.10/sc)+ (Math.sin(i*1.7)*0.6);
    ctx.save();ctx.translate(xx,yy);ctx.rotate(t*0.14);
    ctx.fillStyle="rgba(58,36,14,.45)";ctx.fillText(ch,0.6,0.8);
    ctx.fillStyle="#f2e3c0";ctx.fillText(ch,0,0);ctx.restore();}
  ctx.restore();
}
function drawPile(){
  ctx.save();
  for(var i=0;i<pile.length;i++){var m=pile[i];
    var px=cx+Math.cos(m.a)*rx*0.16*m.r, py=cy+ry*0.02+Math.sin(m.a)*ry*0.16*m.r;
    ctx.beginPath();ctx.ellipse(px,py,S*0.006*m.s,S*0.004*m.s,m.a,0,7);
    ctx.fillStyle="#e0b040";ctx.fill();
    ctx.fillStyle="rgba(255,240,190,.5)";
    ctx.fillRect(px-S*0.002,py-S*0.003,S*0.002,S*0.002);}
  ctx.restore();
}
function drawThreads(){
  var b=screenBall();var amp=Math.hypot(bx,by),az=Math.atan2(by,bx);
  ctx.save();ctx.lineCap="round";
  for(var i=0;i<hens.length;i++){var h=hens[i];
    var al=Math.max(0,Math.cos(az-h.az));var taut=al*Math.min(1,amp);
    // thread dips through a hole near center then to the ball
    var holeX=cx+(h.x-cx)*0.28,holeY=cy+(h.y-cy)*0.28+ry*0.02;
    ctx.beginPath();ctx.moveTo(h.hx,h.hy);
    ctx.quadraticCurveTo(holeX,holeY+(1-taut)*S*0.02,b.x,b.y);
    ctx.strokeStyle="rgba(120,86,46,"+(0.22+taut*0.55)+")";
    ctx.lineWidth=1+taut*1.4;ctx.stroke();}
  ctx.restore();
}
function drawHen(h){
  var sz=h.sz;ctx.save();
  var fa=Math.atan2(h.ny,h.nx);
  // body
  ctx.beginPath();ctx.ellipse(h.x,h.y,sz*h.w*1.05,sz*0.82,fa,0,7);
  var bg=ctx.createLinearGradient(h.x-sz,h.y-sz,h.x+sz,h.y+sz);
  bg.addColorStop(0,"#f1ddb6");bg.addColorStop(1,"#d9bd87");
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle="rgba(110,78,42,.5)";ctx.lineWidth=Math.max(1,sz*0.05);ctx.stroke();
  // tail ridges (away from center)
  var tx=h.x-h.nx*sz*h.w*1.0, tyy=h.y-h.ny*sz*h.w*1.0;
  ctx.strokeStyle="rgba(110,78,42,.4)";ctx.lineWidth=Math.max(1,sz*0.05);
  for(var t=-1;t<=1;t++){ctx.beginPath();ctx.moveTo(tx,tyy);
    ctx.lineTo(tx-h.nx*sz*0.7+ -h.ny*t*sz*0.35, tyy-h.ny*sz*0.7+ h.nx*t*sz*0.35-sz*0.3);ctx.stroke();}
  // neck line
  ctx.strokeStyle="rgba(150,110,60,.35)";ctx.lineWidth=Math.max(1,sz*0.16);
  ctx.beginPath();ctx.moveTo(h.x+h.nx*sz*0.4,h.y+h.ny*sz*0.4);ctx.lineTo(h.hx,h.hy);ctx.stroke();
  // head
  ctx.beginPath();ctx.arc(h.hx,h.hy,sz*0.52,0,7);
  var hg=ctx.createRadialGradient(h.hx-sz*0.2,h.hy-sz*0.2,sz*0.1,h.hx,h.hy,sz*0.55);
  hg.addColorStop(0,"#f3e1bd");hg.addColorStop(1,"#ddc191");
  ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle="rgba(110,78,42,.5)";ctx.lineWidth=Math.max(1,sz*0.05);ctx.stroke();
  // comb (barn-red) on top of head
  var perp={x:-h.ny,y:h.nx};
  ctx.fillStyle="#c0392b";
  for(var c=0;c<3;c++){var off=(c-1)*sz*0.28;
    var mx=h.hx-perp.x*off-h.nx*sz*0.1, my=h.hy-perp.y*off-h.ny*sz*0.1-sz*0.5;
    ctx.beginPath();ctx.arc(mx,my,sz*0.20,0,7);ctx.fill();}
  // wattle
  ctx.beginPath();ctx.arc(h.hx+h.nx*sz*0.2,h.hy+h.ny*sz*0.2+sz*0.3,sz*0.14,0,7);
  ctx.fillStyle="#c0392b";ctx.fill();
  // beak (walnut)
  ctx.beginPath();ctx.moveTo(h.hx+perp.x*sz*0.16,h.hy+perp.y*sz*0.16);
  ctx.lineTo(h.hx-perp.x*sz*0.16,h.hy-perp.y*sz*0.16);
  ctx.lineTo(h.bx,h.by);ctx.closePath();
  ctx.fillStyle=(h.kind==="zoya")?"#8a5a2e":"#6b4a2a";ctx.fill();
  // eye
  ctx.beginPath();ctx.arc(h.hx+perp.x*sz*0.22-h.nx*sz*0.05,h.hy+perp.y*sz*0.22-h.ny*sz*0.05,sz*0.09,0,7);
  ctx.fillStyle="#2c1c0c";ctx.fill();
  ctx.beginPath();ctx.arc(h.hx+perp.x*sz*0.20-h.nx*sz*0.08,h.hy+perp.y*sz*0.20-h.ny*sz*0.08,sz*0.03,0,7);
  ctx.fillStyle="rgba(255,255,255,.8)";ctx.fill();
  // speckles for the little pair
  if(h.kind==="pip"||h.kind==="poluska"){ctx.fillStyle="rgba(120,80,40,.4)";
    for(var s=0;s<5;s++){ctx.beginPath();
      ctx.arc(h.x+Math.cos(s*1.7)*sz*0.5,h.y+Math.sin(s*2.1)*sz*0.4,sz*0.07,0,7);ctx.fill();}}
  ctx.restore();
}
function drawParticles(){ctx.save();for(var i=0;i<particles.length;i++){var q=particles[i];
  ctx.globalAlpha=Math.max(0,1-q.life/q.max);ctx.beginPath();
  ctx.arc(q.x,q.y,q.r,0,7);ctx.fillStyle="#e0b040";ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();}
function drawEggs(){ctx.save();for(var i=0;i<eggs.length;i++){var g=eggs[i];
  ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);
  ctx.beginPath();ctx.ellipse(0,0,g.r*0.78,g.r,0,0,7);
  var eg=ctx.createRadialGradient(-g.r*0.3,-g.r*0.3,g.r*0.1,0,0,g.r);
  eg.addColorStop(0,"#f2e2c0");eg.addColorStop(1,"#d3b784");ctx.fillStyle=eg;ctx.fill();
  ctx.strokeStyle="rgba(110,78,42,.4)";ctx.lineWidth=1;ctx.stroke();ctx.restore();}
  ctx.restore();}
function drawBall(){var b=screenBall();ctx.save();
  ctx.beginPath();ctx.ellipse(b.x,b.y+ballR*0.9,ballR*0.9,ballR*0.3,0,0,7);
  ctx.fillStyle="rgba(70,44,18,.22)";ctx.fill();      // ball shadow toward floor
  ctx.beginPath();ctx.arc(b.x,b.y,ballR,0,7);
  var g=ctx.createRadialGradient(b.x-ballR*0.35,b.y-ballR*0.4,ballR*0.1,b.x,b.y,ballR*1.1);
  g.addColorStop(0,"#9a6d3c");g.addColorStop(0.6,"#6b4a2a");g.addColorStop(1,"#432c14");
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle="rgba(40,26,10,.5)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(b.x,b.y,ballR*0.7,ballR,0,0,7);ctx.stroke();
  ctx.beginPath();ctx.ellipse(b.x,b.y,ballR,ballR*0.7,0,0,7);ctx.stroke();
  ctx.beginPath();ctx.arc(b.x-ballR*0.3,b.y-ballR*0.35,ballR*0.2,0,7);
  ctx.fillStyle="rgba(255,235,200,.25)";ctx.fill();
  ctx.restore();}
function frame(now){var dt=Math.min(0.033,(now-last)/1000);last=now;update(dt);
  drawCloth();drawBoard();drawTally();drawPile();drawParticles();
  drawThreads();for(var i=0;i<hens.length;i++)drawHen(hens[i]);
  drawEggs();drawBall();requestAnimationFrame(frame);}
requestAnimationFrame(frame);

// ---- input -----------------------------------------------------------------
var downT=0,downX=0,downY=0,lastPX=0,lastPY=0,lastPT=0,pvx=0,pvy=0;
function nearBall(px,py){var b=screenBall();return Math.hypot(px-b.x,py-b.y)<ballR*1.7;}
function shove(){var m=Math.hypot(bx,by);
  if(m<0.05){var a=Math.random()*Math.PI*2;bvx+=Math.cos(a)*2.3;bvy+=Math.sin(a)*2.3;}
  else{bvx+=(-by/m)*2.4;bvy+=(bx/m)*2.4;}   // tangential kick -> keeps it circling
  narrate(pick(lines.general));}
cv.addEventListener("pointerdown",function(e){cv.setPointerCapture(e.pointerId);actx();
  downT=performance.now();downX=e.clientX;downY=e.clientY;lastPX=e.clientX;lastPY=e.clientY;lastPT=downT;
  if(nearBall(e.clientX,e.clientY)){dragging=true;cv.classList.add("grabbing");}
  else if(e.clientY>cy){driverActive=true;var r=ptToRing(e.clientX,e.clientY);tx=r.x;ty=r.y;}});
cv.addEventListener("pointermove",function(e){
  var now=performance.now(),dtp=Math.max(0.001,(now-lastPT)/1000);
  pvx=(e.clientX-lastPX)/dtp;pvy=(e.clientY-lastPY)/dtp;
  lastPX=e.clientX;lastPY=e.clientY;lastPT=now;
  if(dragging){var r=ptToRing(e.clientX,e.clientY);
    var m=Math.hypot(r.x,r.y);if(m>1.2){r.x*=1.2/m;r.y*=1.2/m;}
    bx=r.x;by=r.y;bvx=pvx/(rx*0.5);bvy=pvy/(ry*0.5);}
  else if(driverActive){var q=ptToRing(e.clientX,e.clientY);tx=q.x;ty=q.y;}});
function endPointer(e){var dur=performance.now()-downT,
  moved=Math.hypot(e.clientX-downX,e.clientY-downY);
  if(dragging){dragging=false;cv.classList.remove("grabbing");}
  else if(driverActive){driverActive=false;
    if(dur<230&&moved<14)shove();}   // quick tap = a good shove (mobile spacebar)
  driverActive=false;}
cv.addEventListener("pointerup",endPointer);
cv.addEventListener("pointercancel",function(){dragging=false;driverActive=false;
  cv.classList.remove("grabbing");});
window.addEventListener("keydown",function(e){if(e.code==="Space"){e.preventDefault();actx();shove();}});

// gentle opening line + a little starting swing already set above
narrate("Sit, sit — swing the ball, they've been waiting all morning. Go on.",true);
console.log("%cLidia's cat sits and watches this for hours. Hours, she swears.","color:#6b4a2a;font-style:italic");
})();
</script>
