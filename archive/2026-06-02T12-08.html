  <meta name="outbox-spec-era" content="1936 — peak American Federal Art Project poster-printing era under the WPA, the specific moment when silkscreen workshops in the Federal Art Project's Poster Division on East 39th Street in Manhattan were producing two-color and three-color flat-ink posters for the National Park Service, the Department of Agriculture, and public-health campaigns at a rate of roughly 200 finished posters per day across 17 cities; the bold geometric flat-color aesthetic developed by working printmakers Anthony Velonis, Vera Bock, and Beatrice Wilcox who pulled hand-cut stencil screens over heavy poster stock with rubber-edged squeegees, registering each color pass by eye against pinhole alignment marks; the entire infrastructure of relief-era public visual communication built on flat geometric shapes, hand-cut typography, simplified iconic illustration, and limited ink palettes constrained by the cost of pigment — a visual language of bold silhouette and confident negative space">
  <meta name="outbox-spec-format" content="A full-viewport silent generative weaving piece — the browser window IS a continuously-building two-color flat-ink WPA-style poster that draws itself, layer by layer, in real-time and never quite finishes; pure SVG shapes assembling against the cream poster-stock ground in slow procedural choreography: a flat geometric silhouette of a fictional mountain range builds upward from the bottom edge one trapezoidal mass at a time over roughly 40 seconds, then a stylized sun-disc rises slowly behind the mountains as a solid amber circle, then a sweeping band of stylized cloud-shapes pushes across the upper third of the poster in flat brick-red ink, then a single geometric bird-silhouette flies across the composition from left to right in 6 seconds and disappears off the right edge, then the entire poster gently fades and the layering begins again with a new randomized composition (different mountain rhythm, different sun position, different cloud pattern, different bird timing); the cursor position acts as a virtual pinhole registration shift — moving the cursor causes the brick-red ink layer and the amber ink layer to drift very slightly out of register relative to the cream paper ground, simulating a hand-pulled silkscreen with imperfect registration, and the visitor can find the perfect alignment by holding the cursor at the exact center of the viewport; no text, no UI, no captions, no buttons, no controls, no instructions, no title — only the poster building itself forever in two flat inks against cream paper stock">
  <meta name="outbox-spec-subject" content="The continuous unfinished work of the Federal Art Project Poster Division silkscreen room at 235 East 39th Street in Manhattan in the fall of 1936 — specifically the kind of generic National Park Service promotional poster that working printmaker Beatrice Wilcox might pull off her screen at 2:40pm on a Thursday afternoon as part of the day's 47-poster run, a hand-cut two-color flat-ink composition of mountain-and-sky-and-bird that was never meant to depict any particular park but instead a generalized geometric American landscape readable from across a post office lobby — the poster itself as a working public-art object produced by named hands in a real workshop with real ink and real squeegees, the kind of bold flat-color visual communication that the WPA poster division produced by the millions across the eight years of the program; the strangeness is that the poster on the viewport is not a fixed object but a continuous making — the silkscreen pulls keep happening, the composition keeps re-registering, the bird keeps flying across, and the work never finishes because the work never finished">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible on the page at any point. The piece speaks only through the slow patient assembly of flat ink against cream paper. The closest analogue to a voice is the silent steady focus of Beatrice Wilcox at her screen, pulling pull after pull, registering each color pass by eye, the present-tense unhurried craft of a working printmaker at 2:40pm on a Thursday in autumn, indifferent to being observed, the visual equivalent of standing in a doorway watching skilled hands do skilled work without interrupting">

  <meta name="outbox-spec-wildcard" content="Exactly once every 23 full poster pulls (deterministic, tracked in localStorage across visits), the bird silhouette pauses mid-arc for approximately 2 seconds — hovering motionless against the brick-red cloud band — before resuming its transit at the same speed and exiting the right edge. The visitor is given no indication this is happening, no acknowledgment in any UI, no reward for noticing — just the quiet fact that on this particular pull, the bird stopped">

<title>235 East 39th — 2:40 P.M.</title>
<style>

        transparent 85%),
      radial-gradient(ellipse 35% 12% at 50% 30%,

<body>
<!-- 47 by 4:30 if the green dries by lunch. third bench from the skylight. -->

<div class="paper-ground"></div>
<div class="paper-fibers"></div>

<svg class="poster" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice">
  <g id="red-layer"></g>
  <g id="green-layer"></g>
</svg>

<div class="window-light"></div>
<div class="fingerprint"></div>

<div class="pinhole tl"></div>
<div class="pinhole tr"></div>
<div class="pinhole bl"></div>
<a class="pinhole br" href="/archive" aria-label="other pulls"></a>

<script>
(function(){
  const STATE_KEY = 'outbox.39th.wilcox.pulls';
  let pullCount = parseInt(localStorage.getItem(STATE_KEY) || '0', 10);

  const poster = document.querySelector('svg.poster');
  const redLayer = document.getElementById('red-layer');
  const greenLayer = document.getElementById('green-layer');

  let VB_W = 1000, VB_H = 700;

  function updateViewBox() {
    VB_W = Math.max(320, window.innerWidth);
    VB_H = Math.max(320, window.innerHeight);
    poster.setAttribute('viewBox', `0 0 ${VB_W} ${VB_H}`);
  }
  updateViewBox();
  window.addEventListener('resize', updateViewBox);

  let mouseX = 0.5, mouseY = 0.5;
  let regX = 0, regY = 0;

  function onPoint(x, y) {
    mouseX = x / window.innerWidth;
    mouseY = y / window.innerHeight;
  }
  window.addEventListener('mousemove', e => onPoint(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => {
    if (e.touches.length) onPoint(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  function regLoop() {
    const targetX = (mouseX - 0.5) * 6;
    const targetY = (mouseY - 0.5) * 6;
    regX += (targetX - regX) * 0.08;
    regY += (targetY - regY) * 0.08;
    redLayer.setAttribute('transform', `translate(${regX.toFixed(2)} ${regY.toFixed(2)})`);
    greenLayer.setAttribute('transform', `translate(${(-regX).toFixed(2)} ${(-regY).toFixed(2)})`);
    requestAnimationFrame(regLoop);
  }
  regLoop();

  function rand(a, b) { return a + Math.random() * (b - a); }
  function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

  function jitter() {
    const base = 2.6;
    const reduction = Math.min(1.7, pullCount * 0.0055);
    return Math.max(0.55, base - reduction);
  }
  function jp(x, y) {
    const j = jitter();
    return [x + rand(-j, j), y + rand(-j, j)];
  }
  function pointsToStr(pts) {
    return pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  }
  function el(tag, attrs) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function animate(duration, fn) {
    return new Promise((resolve) => {
      const start = performance.now();
      function frame(now) {
        const elapsed = now - start;
        const t = Math.min(1, elapsed / duration);
        fn(t);
        if (t < 1) requestAnimationFrame(frame);
        else resolve();
      }
      requestAnimationFrame(frame);
    });
  }
  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  }
  function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }

  function makeMountains() {
    const widthMin = Math.min(VB_W, VB_H) * 0.20;
    const widthMax = Math.min(VB_W, VB_H) * 0.50;
    const heightMin = VB_H * 0.35;
    const heightMax = VB_H * 0.72;
    const result = [];
    let x = -rand(20, 80);
    let safety = 0;
    while (x < VB_W + 60 && safety++ < 30) {
      const width = rand(widthMin, widthMax);
      const height = rand(heightMin, heightMax);
      const baseY = VB_H + 8;
      const topY = baseY - height;
      const leftSlope = rand(35, width * 0.45);
      const rightSlope = rand(35, width * 0.45);
      const topRandY = topY + rand(-14, 14);
      const points = [
        [x - rand(5, 18), baseY],
        [x + leftSlope, topY + rand(-6, 6)],
        [x + width - rightSlope, topRandY],
        [x + width + rand(5, 18), baseY],
      ];
      result.push(points.map(p => jp(p[0], p[1])));
      x += width * rand(0.42, 0.72);
    }
    while (result.length < 5) {
      const width = rand(widthMin, widthMax);
      const height = rand(heightMin, heightMax);
      const xx = rand(-40, VB_W - width + 40);
      const baseY = VB_H + 8;
      const topY = baseY - height;
      const points = [
        [xx, baseY],
        [xx + rand(40, width*0.4), topY],
        [xx + width - rand(40, width*0.4), topY + rand(-10,10)],
        [xx + width, baseY],
      ];
      result.push(points.map(p => jp(p[0], p[1])));
    }
    return result;
  }

  function makeSun() {
    const cx = rand(VB_W * 0.22, VB_W * 0.78);
    const r = Math.min(VB_W, VB_H) * rand(0.09, 0.17);
    const finalCy = VB_H * rand(0.20, 0.42);
    const startCy = finalCy + Math.max(280, VB_H * 0.55);
    return { cx, r, startCy, finalCy };
  }

  function makeCloudPath(cx, cy, w, h) {
    const bumps = randInt(3, 5);
    const bw = w / bumps;
    const j = jitter();
    const left = cx - w/2;
    const right = cx + w/2;
    let d = `M ${(left + rand(-j,j)).toFixed(1)} ${(cy + h/3 + rand(-j,j)).toFixed(1)}`;
    let x = left;
    for (let i = 0; i < bumps; i++) {
      const bh = h * rand(0.85, 1.30);
      const mx = x + bw/2 + rand(-j, j);
      const my = cy - bh/2 + rand(-j, j);
      const ex = x + bw + rand(-j, j);
      const ey = cy + h/3 + rand(-j, j);
      d += ` Q ${mx.toFixed(1)} ${my.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
      x += bw;
    }
    d += ` L ${(right + rand(-j,j)).toFixed(1)} ${(cy + h/2 + rand(-j,j)).toFixed(1)}`;
    d += ` L ${(left + rand(-j,j)).toFixed(1)} ${(cy + h/2 + rand(-j,j)).toFixed(1)} Z`;
    return d;
  }

  function makeClouds() {
    const count = randInt(3, 5);
    const baseY = VB_H * rand(0.10, 0.22);
    const clouds = [];
    for (let i = 0; i < count; i++) {
      const cy = baseY + rand(-VB_H * 0.04, VB_H * 0.04);
      const w = VB_W * rand(0.18, 0.30);
      const h = w * rand(0.14, 0.22);
      const slotW = VB_W / count;
      const finalCx = slotW * (i + 0.5) + rand(-slotW * 0.28, slotW * 0.28);
      clouds.push({ cy, w, h, finalCx, startCx: VB_W + w + i * 110 });
    }
    return clouds;
  }

  function birdSilhouette(scale, jamt) {
    const s = scale;
    const j = jamt;
    const pts = [
      [-30*s, 4*s],
      [-22*s + rand(-j,j), -10*s + rand(-j,j)],
      [-10*s + rand(-j,j), -1*s + rand(-j,j)],
      [-3*s, 5*s], [3*s, 5*s],
      [10*s + rand(-j,j), -1*s + rand(-j,j)],
      [22*s + rand(-j,j), -10*s + rand(-j,j)],
      [30*s, 4*s],
      [22*s, 6*s], [10*s, 3*s],
      [0, 8*s],
      [-10*s, 3*s], [-22*s, 6*s]
    ];
    return 'M ' + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L ') + ' Z';
  }

  function makeBird() {
    const startX = -90;
    const endX = VB_W + 90;
    const startY = VB_H * rand(0.18, 0.36);
    const endY = startY + rand(-50, 50);
    const arcAmount = rand(-90, -25);
    const duration = rand(5000, 7000);
    const scale = Math.min(VB_W, VB_H) / 700 * rand(1.0, 1.5);
    return { startX, endX, startY, endY, arcAmount, duration, scale };
  }

  async function fadeIn(node, ms) {
    node.style.opacity = '0';
    await new Promise(r => requestAnimationFrame(r));
    await animate(ms, t => { node.style.opacity = t.toString(); });
  }

  async function runPull() {
    pullCount++;
    try { localStorage.setItem(STATE_KEY, pullCount.toString()); } catch (e) {}
    const pauseBird = (pullCount % 23 === 0);

    redLayer.innerHTML = '';
    greenLayer.innerHTML = '';
    redLayer.style.opacity = '1';
    greenLayer.style.opacity = '1';

    const mountains = makeMountains();
    const sun = makeSun();
    const clouds = makeClouds();
    const bird = makeBird();

    for (let i = 0; i < mountains.length; i++) {
      const poly = el('polygon', {
        points: pointsToStr(mountains[i]),
        fill: '#2d5a3a'
      });
      greenLayer.appendChild(poly);
      fadeIn(poly, 650);
      await sleep(rand(750, 1500));
    }

    await sleep(600);

    const sunEl = el('circle', {
      cx: sun.cx.toFixed(1),
      cy: sun.startCy.toFixed(1),
      r: sun.r.toFixed(1),
      fill: '#a8352a'
    });
    redLayer.appendChild(sunEl);
    sunEl.style.opacity = '0';
    await new Promise(r => requestAnimationFrame(r));
    await animate(900, t => { sunEl.style.opacity = t.toString(); });
    await animate(6500, t => {
      const eased = easeInOutCubic(t);
      const cy = sun.startCy + (sun.finalCy - sun.startCy) * eased;
      sunEl.setAttribute('cy', cy.toFixed(1));
    });

    await sleep(500);

    const cloudEls = [];
    for (const c of clouds) {
      const path = el('path', {
        d: makeCloudPath(c.startCx, c.cy, c.w, c.h),
        fill: '#a8352a'
      });
      path.style.opacity = '0';
      redLayer.appendChild(path);
      cloudEls.push(path);
    }
    await new Promise(r => requestAnimationFrame(r));

    await animate(7800, t => {
      const eased = easeOutQuad(t);
      cloudEls.forEach((p, i) => {
        const c = clouds[i];
        const x = c.startCx + (c.finalCx - c.startCx) * eased;
        p.setAttribute('d', makeCloudPath(x, c.cy, c.w, c.h));
        p.style.opacity = Math.min(1, t * 1.8).toFixed(2);
      });
    });

    await sleep(700);

    const birdEl = el('path', {
      d: birdSilhouette(bird.scale, jitter()),
      fill: '#a8352a'
    });
    redLayer.appendChild(birdEl);
    await animateBird(birdEl, bird, pauseBird);
    birdEl.remove();

    await sleep(4000);

    await animate(3200, t => {
      const o = (1 - t).toFixed(2);
      redLayer.style.opacity = o;
      greenLayer.style.opacity = o;
    });

    redLayer.innerHTML = '';
    greenLayer.innerHTML = '';

    await sleep(700);
  }

  function animateBird(node, bird, withPause) {
    return new Promise((resolve) => {
      const startT = performance.now();
      const pausePoint = bird.duration * (0.45 + Math.random() * 0.15);
      const pauseDuration = 2000;

      function frame(now) {
        const elapsed = now - startT;
        let progress;
        if (withPause) {
          if (elapsed < pausePoint) progress = elapsed;
          else if (elapsed < pausePoint + pauseDuration) progress = pausePoint;
          else progress = elapsed - pauseDuration;
        } else {
          progress = elapsed;
        }

        const t = progress / bird.duration;
        if (t >= 1) { resolve(); return; }

        const x = bird.startX + (bird.endX - bird.startX) * t;
        const arcT = 4 * t * (1 - t);
        const y = bird.startY + (bird.endY - bird.startY) * t + bird.arcAmount * arcT;
        node.setAttribute('transform', `translate(${x.toFixed(1)} ${y.toFixed(1)})`);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    });
  }

  async function mainLoop() {
    while (true) {
      try { await runPull(); }
      catch (e) { await sleep(2000); }
    }
  }
  mainLoop();

  // beatrice — third bench from the skylight — pulls 47 by 4:30 if the green dries.
})();
</script>

<script src="/nav.js" defer></script>
</body>
