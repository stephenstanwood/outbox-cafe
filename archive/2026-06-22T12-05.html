<style>
  html,body{margin:0;padding:0;height:100%;background:#2c3a3a;overflow:hidden;font-family:Georgia,serif;-webkit-tap-highlight-color:transparent;}
  #board{display:block;width:100vw;height:100vh;cursor:crosshair;touch-action:none;}
  a.back{position:fixed;right:10px;top:8px;font-size:11px;color:#f3eddc;opacity:.32;text-decoration:none;font-style:italic;letter-spacing:.04em;}
  a.back:hover{opacity:.7;}

<body>
<canvas id="board"></canvas>
<a class="back" href="/archive">elsewhere</a>
<script>
/* ---- a marble. a piece of chalk. a wooden cup. ---- */

const cv = document.getElementById('board');
const ctx = cv.getContext('2d');
let W=0, H=0, DPR=Math.max(1, window.devicePixelRatio||1);

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildGrain();
}
window.addEventListener('resize', resize);

/* --- grain layer for chalkboard texture --- */
let grain;
function buildGrain(){
  const g = document.createElement('canvas');
  g.width = W; g.height = H;
  const gx = g.getContext('2d');
  // micro-stipple
  const img = gx.createImageData(W,H);
  for(let i=0;i<img.data.length;i+=4){
    const v = Math.random();
    if(v<0.18){
      img.data[i]=0x1a; img.data[i+1]=0x24; img.data[i+2]=0x24;
      img.data[i+3]=Math.floor(40+Math.random()*60);
    } else if (v>0.985){
      img.data[i]=0xf3; img.data[i+1]=0xed; img.data[i+2]=0xdc;
      img.data[i+3]=Math.floor(8+Math.random()*14);
    }
  }
  gx.putImageData(img,0,0);
  // faint ghost smears of erased lines
  for(let k=0;k<18;k++){
    const x = Math.random()*W, y = Math.random()*H;
    const r = 40+Math.random()*120;
    const grd = gx.createRadialGradient(x,y,2,x,y,r);
    grd.addColorStop(0,'rgba(243,237,220,0.05)');
    grd.addColorStop(1,'rgba(243,237,220,0)');
    gx.fillStyle = grd; gx.beginPath(); gx.arc(x,y,r,0,Math.PI*2); gx.fill();
  }
  grain = g;
}

/* --- segments persisted in localStorage --- */
const STORE_SEG = 'cc.segs.v1';
const STORE_TALLY = 'cc.tally.v1';
const STORE_CUP = 'cc.cup.v1';

let segments = [];
try{ segments = JSON.parse(localStorage.getItem(STORE_SEG)||'[]'); }catch(e){ segments=[]; }
let tally = parseInt(localStorage.getItem(STORE_TALLY)||'0',10)||0;

function saveSegs(){
  // keep file small; cap at 500 segs
  if(segments.length>500) segments = segments.slice(-500);
  localStorage.setItem(STORE_SEG, JSON.stringify(segments));
}
function saveTally(){ localStorage.setItem(STORE_TALLY, String(tally)); }

/* --- audio --- */
let actx = null;
function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  if(actx && actx.state==='suspended') actx.resume();
}
function tap(vel){
  if(!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  const f = actx.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=4200;
  const pitch = 1200 + Math.random()*2200 + Math.min(vel,600)*0.8;
  o.frequency.value = pitch;
  o.type='sine';
  const amp = Math.min(0.22, 0.04 + vel*0.0006);
  g.gain.setValueAtTime(amp,t);
  g.gain.exponentialRampToValueAtTime(0.0008, t+0.06);
  o.connect(g); g.connect(f); f.connect(actx.destination);
  o.start(t); o.stop(t+0.08);
}
function thunk(){
  if(!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  const o2 = actx.createOscillator();
  const g = actx.createGain();
  const f = actx.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=900;
  o.frequency.value = 220; o2.frequency.value = 330;
  o.type='sine'; o2.type='triangle';
  g.gain.setValueAtTime(0.28,t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  o.connect(g); o2.connect(g); g.connect(f); f.connect(actx.destination);
  o.start(t); o2.start(t); o.stop(t+0.24); o2.stop(t+0.24);
}
function shhh(){
  if(!actx) return;
  const t = actx.currentTime;
  const bufSize = Math.floor(actx.sampleRate*0.14);
  const buf = actx.createBuffer(1,bufSize,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){
    d[i] = (Math.random()*2-1) * (1 - i/bufSize);
  }
  const src = actx.createBufferSource();
  src.buffer = buf;
  const f = actx.createBiquadFilter();
  f.type='bandpass'; f.frequency.value=2200; f.Q.value=0.6;
  const g = actx.createGain();
  g.gain.value = 0.16;
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start(t);
}
function scrape(){
  if(!actx) return;
  const t = actx.currentTime;
  const bufSize = Math.floor(actx.sampleRate*0.6);
  const buf = actx.createBuffer(1,bufSize,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){
    const env = Math.sin(Math.PI * i/bufSize);
    d[i] = (Math.random()*2-1) * env * 0.6;
  }
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=700;
  const g = actx.createGain(); g.gain.value = 0.09;
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start(t);
}

/* --- the cup --- */
const CUP_W = 56, CUP_H = 44;
let cup, cupTargetX, cupAnim=null;
function initCup(){
  let saved = parseFloat(localStorage.getItem(STORE_CUP));
  if(isNaN(saved) || saved<60 || saved>W-60) saved = W*0.5;
  cup = { x: saved, y: H - CUP_H/2 - 14 };
  cupTargetX = cup.x;
}
function moveCup(){
  const margin = 80;
  const nx = margin + Math.random()*(W - margin*2);
  cupAnim = { from: cup.x, to: nx, t0: performance.now(), dur: 800 };
  scrape();
}

/* --- marbles --- */
const MR = 11; // marble radius
let marbles = [];

function releaseMarble(){
  ensureAudio();
  const m = {
    x: W/2 + (Math.random()*30-15),
    y: 24,
    px: 0, py: 0,
    angle: 0,
    angVel: 0,
    alive: true,
    settled: false,
    landedFrames: 0
  };
  m.px = m.x; m.py = m.y - 0.4;
  marbles.push(m);
  if(marbles.length>40) marbles.shift();
}

/* --- drawing input --- */
let drawing = false;
let erasing = false;
let curStroke = null;
let cursor = { x: -100, y: -100, eraser: false, puffs: [] };

function pos(e){
  const r = cv.getBoundingClientRect();
  let x,y;
  if(e.touches && e.touches[0]){ x = e.touches[0].clientX - r.left; y = e.touches[0].clientY - r.top; }
  else { x = e.clientX - r.left; y = e.clientY - r.top; }
  return {x,y};
}

cv.addEventListener('mousedown', startDraw);
cv.addEventListener('mousemove', moveDraw);
cv.addEventListener('mouseup', endDraw);
cv.addEventListener('mouseleave', endDraw);
cv.addEventListener('touchstart', (e)=>{ e.preventDefault(); startDraw(e); },{passive:false});
cv.addEventListener('touchmove', (e)=>{ e.preventDefault(); moveDraw(e); },{passive:false});
cv.addEventListener('touchend', (e)=>{ e.preventDefault(); endDraw(e); },{passive:false});

function isOnArrow(p){
  return p.x < 44 && p.y < 44;
}

function startDraw(e){
  ensureAudio();
  const p = pos(e);
  cursor.x = p.x; cursor.y = p.y;
  if(isOnArrow(p)){ releaseMarble(); return; }
  drawing = true;
  erasing = !!(e.shiftKey);
  cursor.eraser = erasing;
  if(!erasing){
    curStroke = { x0: p.x, y0: p.y, x1: p.x, y1: p.y };
  } else {
    eraseAt(p.x,p.y);
    shhh();
  }
}
function moveDraw(e){
  const p = pos(e);
  cursor.x = p.x; cursor.y = p.y;
  cursor.eraser = drawing ? erasing : !!(e.shiftKey);
  if(!drawing) return;
  if(erasing){
    eraseAt(p.x,p.y);
  } else {
    // commit short segments along the drag
    const dx = p.x - curStroke.x1, dy = p.y - curStroke.y1;
    const d = Math.hypot(dx,dy);
    if(d > 6){
      segments.push({ ax: curStroke.x1, ay: curStroke.y1, bx: p.x, by: p.y });
      curStroke.x1 = p.x; curStroke.y1 = p.y;
    }
  }
}
function endDraw(e){
  if(drawing){
    if(!erasing && curStroke){
      const dx = curStroke.x1 - curStroke.x0, dy = curStroke.y1 - curStroke.y0;
      if(Math.hypot(dx,dy) < 6){
        // very short dab: still add a tiny segment so visitor sees their mark
        segments.push({ ax: curStroke.x0, ay: curStroke.y0, bx: curStroke.x0+4, by: curStroke.y0+1 });
      }
    }
    saveSegs();
  }
  drawing = false;
  curStroke = null;
}

function eraseAt(x,y){
  const R = 26;
  let removed = 0;
  segments = segments.filter(s=>{
    const d = distPointSeg(x,y,s.ax,s.ay,s.bx,s.by);
    if(d < R){ removed++; return false; }
    return true;
  });
  if(removed){
    cursor.puffs.push({x:x,y:y,t:performance.now(),life:400});
    saveSegs();
  }
}

window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space' || e.key === ' '){
    e.preventDefault();
    releaseMarble();
  }
});

/* --- physics math --- */
function distPointSeg(px,py,ax,ay,bx,by){
  const abx = bx-ax, aby = by-ay;
  const apx = px-ax, apy = py-ay;
  const l2 = abx*abx + aby*aby;
  let t = l2>0 ? (apx*abx + apy*aby)/l2 : 0;
  t = Math.max(0,Math.min(1,t));
  const cx = ax + abx*t, cy = ay + aby*t;
  return Math.hypot(px-cx,py-cy);
}
function closestOnSeg(px,py,ax,ay,bx,by){
  const abx = bx-ax, aby = by-ay;
  const apx = px-ax, apy = py-ay;
  const l2 = abx*abx + aby*aby;
  let t = l2>0 ? (apx*abx + apy*aby)/l2 : 0;
  t = Math.max(0,Math.min(1,t));
  return { x: ax + abx*t, y: ay + aby*t, t: t };
}

/* --- main loop, Verlet integration --- */
let lastT = performance.now();
const GRAV = 980; // px/s^2
const FRICTION = 0.22;
const RESTITUTION = 0.34;

function step(now){
  const dt = Math.min(0.033, (now - lastT)/1000);
  lastT = now;

  /* cup animation */
  if(cupAnim){
    const k = (now - cupAnim.t0)/cupAnim.dur;
    if(k>=1){
      cup.x = cupAnim.to;
      cupAnim = null;
      localStorage.setItem(STORE_CUP, String(cup.x));
    } else {
      const e = k<0.5 ? 2*k*k : 1 - Math.pow(-2*k+2,2)/2;
      cup.x = cupAnim.from + (cupAnim.to - cupAnim.from)*e;
    }
  }

  /* marble physics, Verlet */
  for(let i=0;i<marbles.length;i++){
    const m = marbles[i];
    if(!m.alive) continue;

    if(m.settled){
      // gently rest on cup floor with tiny settle
      m.angVel *= 0.92;
      m.angle += m.angVel * dt;
      continue;
    }

    // verlet
    const vx = (m.x - m.px);
    const vy = (m.y - m.py);
    const nx = m.x + vx + 0 * dt * dt;
    const ny = m.y + vy + GRAV * dt * dt;
    m.px = m.x; m.py = m.y;
    m.x = nx; m.y = ny;

    // collide with chalk segments
    let contacts = 0;
    for(let s=0;s<segments.length;s++){
      const seg = segments[s];
      const c = closestOnSeg(m.x, m.y, seg.ax, seg.ay, seg.bx, seg.by);
      const dx = m.x - c.x, dy = m.y - c.y;
      const d = Math.hypot(dx,dy);
      if(d < MR){
        // resolve
        let ndx, ndy;
        if(d > 0.0001){ ndx = dx/d; ndy = dy/d; }
        else { ndx = 0; ndy = -1; }
        const overlap = MR - d;
        m.x += ndx * overlap;
        m.y += ndy * overlap;

        // current velocity
        const cvx = m.x - m.px, cvy = m.y - m.py;
        // reflect
        const dot = cvx*ndx + cvy*ndy;
        let rvx = cvx - (1+RESTITUTION)*dot*ndx;
        let rvy = cvy - (1+RESTITUTION)*dot*ndy;
        // tangential friction
        const tx = -ndy, ty = ndx;
        const tDot = rvx*tx + rvy*ty;
        rvx -= FRICTION * tDot * tx * 0.4;
        rvy -= FRICTION * tDot * ty * 0.4;

        m.px = m.x - rvx;
        m.py = m.y - rvy;

        // spin from tangential motion
        m.angVel = (rvx*tx + rvy*ty) / MR * 0.6;

        const speed = Math.hypot(cvx,cvy) / Math.max(dt,0.001);
        if(speed > 60){
          tap(speed);
          cursor.puffs.push({x: c.x, y: c.y, t: performance.now(), life: 380, small:true});
        }
        contacts++;
        if(contacts>3) break;
      }
    }

    m.angle += m.angVel * dt;

    // collide with other marbles
    for(let j=0;j<marbles.length;j++){
      if(j===i) continue;
      const n = marbles[j];
      if(!n.alive) continue;
      const dx = m.x - n.x, dy = m.y - n.y;
      const d = Math.hypot(dx,dy);
      const target = MR*2;
      if(d > 0 && d < target){
        const ox = (target - d) * 0.5 * (dx/d);
        const oy = (target - d) * 0.5 * (dy/d);
        m.x += ox; m.y += oy;
        n.x -= ox; n.y -= oy;
      }
    }

    // cup catch — region above the cup's open mouth
    const cupL = cup.x - CUP_W/2 + 6;
    const cupR = cup.x + CUP_W/2 - 6;
    const cupTop = cup.y - CUP_H/2 + 4;
    const cupFloor = cup.y + CUP_H/2 - 6;
    if(m.x > cupL && m.x < cupR && m.y > cupTop && m.y < cupFloor){
      // it's in. settle.
      m.settled = true;
      m.alive = true;
      // anchor it to floor
      m.y = cupFloor - MR;
      m.px = m.x; m.py = m.y;
      thunk();
      tally += 1;
      saveTally();
      // queue a cup move (small delay so player sees the catch)
      setTimeout(()=>{
        // remove all settled marbles before moving cup, so next attempt is fresh
        marbles = marbles.filter(mm => !mm.settled);
        moveCup();
      }, 600);
    }

    // fall off board
    if(m.y > H + 80 || m.x < -80 || m.x > W+80){
      m.alive = false;
    }
  }
  marbles = marbles.filter(m => m.alive);

  draw();
  requestAnimationFrame(step);
}

/* --- rendering --- */
function draw(){
  // base
  ctx.fillStyle = '#2c3a3a';
  ctx.fillRect(0,0,W,H);
  // grain overlay
  if(grain) ctx.drawImage(grain,0,0);

  // chalk segments
  ctx.strokeStyle = '#f3eddc';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // soft feathered halo first
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.lineWidth = 3.4;
  ctx.beginPath();
  for(let i=0;i<segments.length;i++){
    const s = segments[i];
    ctx.moveTo(s.ax, s.ay);
    ctx.lineTo(s.bx, s.by);
  }
  ctx.stroke();
  ctx.restore();
  // crisp core
  ctx.save();
  ctx.globalAlpha = 0.94;
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  for(let i=0;i<segments.length;i++){
    const s = segments[i];
    ctx.moveTo(s.ax, s.ay);
    ctx.lineTo(s.bx, s.by);
  }
  ctx.stroke();
  ctx.restore();
  // granular speckle along segments (cheap)
  ctx.save();
  ctx.fillStyle = '#f3eddc';
  for(let i=0;i<segments.length;i++){
    const s = segments[i];
    const dx = s.bx-s.ax, dy = s.by-s.ay;
    const len = Math.hypot(dx,dy);
    const steps = Math.min(20, Math.floor(len/4));
    for(let k=0;k<steps;k++){
      const t = k/steps;
      const x = s.ax + dx*t + (Math.random()-0.5)*2.2;
      const y = s.ay + dy*t + (Math.random()-0.5)*2.2;
      ctx.globalAlpha = 0.15 + Math.random()*0.35;
      ctx.fillRect(x,y, 0.8 + Math.random()*0.8, 0.8 + Math.random()*0.8);
    }
  }
  ctx.restore();

  // current in-progress stroke preview already pushed as segments — fine

  // arrow UI (chalk)
  drawArrow();

  // cup
  drawCup();

  // marbles
  for(const m of marbles){
    drawMarble(m);
  }

  // puffs
  const now = performance.now();
  cursor.puffs = cursor.puffs.filter(p => now - p.t < p.life);
  for(const p of cursor.puffs){
    const k = (now - p.t)/p.life;
    const a = (1-k)*0.6;
    const r = (p.small? 2 : 4) + k*4;
    const grd = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    grd.addColorStop(0,'rgba(243,237,220,'+a+')');
    grd.addColorStop(1,'rgba(243,237,220,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
  }

  // eraser cursor when shift held
  if(cursor.eraser){
    ctx.save();
    ctx.strokeStyle = 'rgba(243,237,220,0.55)';
    ctx.fillStyle = 'rgba(138,100,56,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.rect(cursor.x-14, cursor.y-9, 28, 18);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // tally in lower-right
  drawTally();
}

function drawArrow(){
  ctx.save();
  ctx.strokeStyle = '#f3eddc';
  ctx.lineWidth = 1.7;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.85;
  const ax = 20, ay = 16;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax, ay+18);
  ctx.moveTo(ax-6, ay+12);
  ctx.lineTo(ax, ay+19);
  ctx.lineTo(ax+6, ay+12);
  ctx.stroke();
  ctx.restore();
}

function drawCup(){
  const cx = cup.x, cy = cup.y;
  const w = CUP_W, h = CUP_H;
  ctx.save();
  // wooden body — slightly tapered cup
  const topL = cx - w/2;
  const topR = cx + w/2;
  const botL = cx - w/2 + 8;
  const botR = cx + w/2 - 8;
  const topY = cy - h/2;
  const botY = cy + h/2;

  ctx.fillStyle = '#8a6438';
  ctx.beginPath();
  ctx.moveTo(topL, topY+2);
  ctx.lineTo(topR, topY+2);
  ctx.lineTo(botR, botY);
  ctx.lineTo(botL, botY);
  ctx.closePath();
  ctx.fill();

  // grain striations
  ctx.strokeStyle = 'rgba(90,62,28,0.4)';
  ctx.lineWidth = 1;
  for(let i=0;i<6;i++){
    const fx = topL + (w/6)*i + 3;
    const bx = botL + ((w-16)/6)*i + 1;
    ctx.beginPath();
    ctx.moveTo(fx, topY+3);
    ctx.lineTo(bx, botY-1);
    ctx.stroke();
  }

  // interior shadow (mouth)
  ctx.fillStyle = 'rgba(90,62,28,0.7)';
  ctx.beginPath();
  ctx.ellipse(cx, topY+4, w/2 - 4, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // rim highlight
  ctx.strokeStyle = 'rgba(243,237,220,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, topY+4, w/2 - 4, 6, 0, Math.PI, 0);
  ctx.stroke();

  ctx.restore();
}

function drawMarble(m){
  ctx.save();
  // umbra below
  ctx.fillStyle = 'rgba(122,56,24,0.55)';
  ctx.beginPath();
  ctx.ellipse(m.x, m.y + MR - 1, MR*0.9, 3.4, 0, 0, Math.PI*2);
  ctx.fill();

  // clay body
  const grd = ctx.createRadialGradient(m.x - MR*0.35, m.y - MR*0.4, 1, m.x, m.y, MR);
  grd.addColorStop(0, '#f0a878');
  grd.addColorStop(0.35, '#d9764a');
  grd.addColorStop(1, '#c8623a');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(m.x, m.y, MR, 0, Math.PI*2);
  ctx.fill();

  // rotating specular highlight: tiny crescent that pivots with angle
  const hx = m.x + Math.cos(m.angle + Math.PI*1.25) * MR*0.45;
  const hy = m.y + Math.sin(m.angle + Math.PI*1.25) * MR*0.45;
  ctx.fillStyle = 'rgba(240,168,120,0.85)';
  ctx.beginPath();
  ctx.arc(hx, hy, MR*0.28, 0, Math.PI*2);
  ctx.fill();

  // tiny dark fleck on opposite side — sells the rotation
  const dx = m.x + Math.cos(m.angle + Math.PI*0.3) * MR*0.5;
  const dy = m.y + Math.sin(m.angle + Math.PI*0.3) * MR*0.5;
  ctx.fillStyle = 'rgba(122,56,24,0.55)';
  ctx.beginPath();
  ctx.arc(dx, dy, MR*0.14, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawTally(){
  // four verticals plus a slash for each group of five
  const groups = Math.floor(tally/5);
  const leftover = tally % 5;
  const totalMarks = groups + (leftover>0 ? 1 : 0);
  if(totalMarks === 0) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(243,237,220,0.55)';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';
  const baseY = H - 22;
  let x = W - 22;
  const groupW = 22; // four bars + slash space
  // iterate from right to left across rows
  let drawnGroups = 0;
  let row = 0;
  // We render groups right-justified; then leftover at far left of bottom row.
  // Simpler: render left-to-right starting at some left margin? But corner tally — render bottom-right inward.
  // Keep it readable: render bottom-up rows, each row holds up to ~6 groups.
  const perRow = 6;
  let g = groups;
  let l = leftover;

  const startX = W - 20;
  const startY = H - 20;
  const barH = 12;

  function drawGroup(gx, gy){
    // four vertical bars
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(gx + i*3, gy - barH);
      ctx.lineTo(gx + i*3 + (Math.random()-0.5)*0.4, gy);
      ctx.stroke();
    }
    // slash
    ctx.beginPath();
    ctx.moveTo(gx - 2, gy - 1);
    ctx.lineTo(gx + 11, gy - barH + 1);
    ctx.stroke();
  }
  function drawLeftover(gx, gy, n){
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(gx + i*3, gy - barH);
      ctx.lineTo(gx + i*3 + (Math.random()-0.5)*0.4, gy);
      ctx.stroke();
    }
  }

  let cx = startX;
  let cy = startY;
  let countInRow = 0;
  // place leftover first (rightmost), so groups stack to its left
  if(l>0){
    const w = l*3 + 4;
    cx -= w;
    drawLeftover(cx, cy, l);
    cx -= 6;
    countInRow++;
  }
  while(g>0){
    if(countInRow >= perRow){
      cx = startX;
      cy -= barH + 8;
      countInRow = 0;
      if(cy < H*0.55) break; // don't climb forever
    }
    cx -= 18;
    drawGroup(cx, cy);
    cx -= 4;
    countInRow++;
    g--;
  }
  ctx.restore();
}

/* --- boot --- */
resize();
initCup();
requestAnimationFrame((t)=>{ lastT = t; step(t); });

/* a quiet small thing in the console for whoever pokes around */
console.log('%cone marble. one piece of chalk. one cup.', 'color:#f3eddc;background:#2c3a3a;padding:6px 10px;font-style:italic;');
/* hold shift to erase. spacebar drops a marble. the cup moves when you make it. */
</script>
