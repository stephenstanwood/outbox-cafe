<title>Frostform — A Quiet Watching</title>
<meta name="description" content="A slow blooming of cold geometry. Stay near it; stay far. It notices either way.">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a4a; overflow: hidden; font-family: Georgia, "Times New Roman", serif; }
  canvas { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; cursor: crosshair; touch-action: none; }
  .notice {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #f0f0f0;
    font-size: 0.95rem;
    letter-spacing: 0.18em;
    opacity: 0;
    transition: opacity 2.4s ease;
    pointer-events: none;
    text-shadow: 0 0 14px #1a1a4a, 0 0 28px #1a1a4a, 0 0 42px #1a1a4a;
    font-style: italic;
    text-align: center;
    padding: 0 1em;
    z-index: 3;
  }
  .notice.show { opacity: 0.88; }
  footer {
    position: fixed; bottom: 14px; right: 18px;
    color: #a8e6f0; opacity: 0.32;
    font-size: 0.72rem;
    letter-spacing: 0.10em;
    font-family: Georgia, serif;
    z-index: 2;
    transition: opacity 0.5s ease;
  }
  footer:hover { opacity: 0.85; }
  footer a { color: inherit; text-decoration: none; border-bottom: 1px dotted rgba(168,230,240,0.6); padding-bottom: 1px; }
  @media (max-width: 480px) {
    footer { font-size: 0.68rem; bottom: 10px; right: 12px; }
    .notice { font-size: 0.82rem; letter-spacing: 0.14em; }
  }
</style>

<body>
<canvas id="c" aria-label="A slow geometric bloom unfolding from a center point against a deep blue field"></canvas>
<div class="notice" id="notice">Your crystals remember.</div>
<footer><a href="/archive">the other windows</a></footer>
<script>
(function () {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W, H, CX, CY, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    CX = W / 2; CY = H / 2;
    ctx.fillStyle = '#1a1a4a';
    ctx.fillRect(0, 0, W, H);
  }
  resize();
  window.addEventListener('resize', resize);

  const TAU = Math.PI * 2;
  const SEED_KEY = 'frostform.seed.v1';

  let stored = null;
  try { stored = JSON.parse(localStorage.getItem(SEED_KEY) || 'null'); } catch (e) {}
  const now = Date.now();
  let rootSeed;
  if (stored && (now - stored.t) < 86400000) {
    rootSeed = stored.seed;
  } else {
    rootSeed = Math.floor(Math.random() * 0x7fffffff);
    try { localStorage.setItem(SEED_KEY, JSON.stringify({ seed: rootSeed, t: now })); } catch (e) {}
  }

  function mkRng(s) {
    let a = (s >>> 0) || 1;
    return function () {
      a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function makeCrystal(opts) {
    const rng = mkRng(opts.seed);
    const arms = opts.arms || 6;
    const offset = rng() * TAU;
    const c = {
      seed: opts.seed,
      rng, arms,
      ox: opts.ox != null ? opts.ox : CX,
      oy: opts.oy != null ? opts.oy : CY,
      opacity: opts.opacity != null ? opts.opacity : 1,
      branches: [],
      segments: [],
      age: 0,
      complete: false,
      maxDepth: 5 + Math.floor(rng() * 3),
      lenBase: Math.min(W, H) * (0.075 + rng() * 0.05),
      lenRatio: 0.55 + rng() * 0.14,
      splitAngle: (20 + rng() * 24) * Math.PI / 180,
      childCount: rng() < 0.55 ? 2 : 3,
      colorJitter: rng()
    };
    for (let i = 0; i < arms; i++) {
      const a = offset + (i / arms) * TAU;
      c.branches.push({ x: c.ox, y: c.oy, angle: a, len: c.lenBase, prog: 0, depth: 0 });
    }
    return c;
  }

  function updateCrystal(cr, dt, mx, my, mouseInside) {
    if (cr.complete) return;
    const next = [];
    for (const b of cr.branches) {
      const tipX = b.x + Math.cos(b.angle) * b.len * b.prog;
      const tipY = b.y + Math.sin(b.angle) * b.len * b.prog;
      let boost = 1;
      if (mouseInside) {
        const dx = mx - tipX, dy = my - tipY;
        const d2 = dx * dx + dy * dy;
        const R = 200;
        if (d2 < R * R) boost = 1 + (1 - Math.sqrt(d2) / R) * 2.4;
      }
      const speed = 0.62 / (1 + b.depth * 0.22);
      b.prog += speed * boost * dt;
      if (b.prog >= 1) {
        const ex = b.x + Math.cos(b.angle) * b.len;
        const ey = b.y + Math.sin(b.angle) * b.len;
        cr.segments.push({ x1: b.x, y1: b.y, x2: ex, y2: ey, depth: b.depth });
        if (b.depth < cr.maxDepth) {
          const cl = b.len * cr.lenRatio;
          if (cr.childCount === 2) {
            next.push({ x: ex, y: ey, angle: b.angle - cr.splitAngle, len: cl, prog: 0, depth: b.depth + 1 });
            next.push({ x: ex, y: ey, angle: b.angle + cr.splitAngle, len: cl, prog: 0, depth: b.depth + 1 });
          } else {
            next.push({ x: ex, y: ey, angle: b.angle - cr.splitAngle, len: cl, prog: 0, depth: b.depth + 1 });
            next.push({ x: ex, y: ey, angle: b.angle, len: cl * 0.82, prog: 0, depth: b.depth + 1 });
            next.push({ x: ex, y: ey, angle: b.angle + cr.splitAngle, len: cl, prog: 0, depth: b.depth + 1 });
          }
        }
      } else {
        next.push(b);
      }
    }
    cr.branches = next;
    cr.age += dt;
    if (cr.branches.length === 0) cr.complete = true;
  }

  function drawCrystal(cr, fade) {
    for (const s of cr.segments) {
      const tDepth = s.depth / cr.maxDepth;
      ctx.strokeStyle = 'rgba(168,230,240,' + (0.20 * cr.opacity * fade).toFixed(3) + ')';
      ctx.lineWidth = Math.max(1, 3.6 - s.depth * 0.45);
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(240,240,240,' + ((0.88 - tDepth * 0.35) * cr.opacity * fade).toFixed(3) + ')';
      ctx.lineWidth = Math.max(0.5, 1.65 - s.depth * 0.15);
      ctx.stroke();
      if (s.depth >= cr.maxDepth - 1) {
        ctx.strokeStyle = 'rgba(255,149,0,' + (0.15 * cr.opacity * fade).toFixed(3) + ')';
        ctx.lineWidth = 0.85;
        ctx.stroke();
      }
    }
    for (const b of cr.branches) {
      const tx = b.x + Math.cos(b.angle) * b.len * b.prog;
      const ty = b.y + Math.sin(b.angle) * b.len * b.prog;
      ctx.strokeStyle = 'rgba(240,240,240,' + (0.7 * cr.opacity * fade).toFixed(3) + ')';
      ctx.lineWidth = Math.max(0.5, 1.4 - b.depth * 0.15);
      ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(tx, ty); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,' + (0.55 * cr.opacity * fade).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(tx, ty, 1.6, 0, TAU); ctx.fill();
    }
  }

  let primary = null, secondary = null;
  let cycleAge = 0, cycleFade = 1, restPressure = 0, cycleCount = 0;

  function startCycle() {
    cycleAge = 0; cycleFade = 1; restPressure = 0;
    const s = (rootSeed + cycleCount * 9973) >>> 0;
    primary = makeCrystal({ seed: s, ox: CX, oy: CY });
    secondary = null;
    cycleCount++;
  }
  startCycle();

  let mouseX = -9999, mouseY = -9999, mouseInside = false;
  function setMouse(x, y) { mouseX = x; mouseY = y; mouseInside = true; }
  window.addEventListener('mousemove', e => setMouse(e.clientX, e.clientY));
  window.addEventListener('mouseleave', () => { mouseInside = false; });
  window.addEventListener('touchstart', e => { if (e.touches[0]) setMouse(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  window.addEventListener('touchmove', e => { if (e.touches[0]) setMouse(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  window.addEventListener('touchend', () => { mouseInside = false; });

  function nearestTipDist() {
    if (!mouseInside) return Infinity;
    let best = Infinity;
    const scan = cr => {
      if (!cr) return;
      for (const b of cr.branches) {
        const tx = b.x + Math.cos(b.angle) * b.len * b.prog;
        const ty = b.y + Math.sin(b.angle) * b.len * b.prog;
        const d = Math.hypot(mouseX - tx, mouseY - ty);
        if (d < best) best = d;
      }
    };
    scan(primary); scan(secondary);
    return best;
  }

  const sessionStart = Date.now();
  let noticeShown = false;

  let last = performance.now();
  function frame(t) {
    const dt = Math.min(0.05, (t - last) / 1000);
    last = t;
    cycleAge += dt;

    ctx.fillStyle = 'rgba(26,26,74,0.055)';
    ctx.fillRect(0, 0, W, H);

    if (cycleAge > 60 && !secondary && primary) {
      const off = primary.rng() * TAU;
      const r = Math.min(W, H) * (0.09 + primary.rng() * 0.07);
      secondary = makeCrystal({
        seed: (rootSeed + cycleCount * 9973 + 17) >>> 0,
        ox: CX + Math.cos(off) * r,
        oy: CY + Math.sin(off) * r,
        opacity: 0.4
      });
    }

    updateCrystal(primary, dt, mouseX, mouseY, mouseInside);
    if (secondary) updateCrystal(secondary, dt, mouseX, mouseY, mouseInside);

    drawCrystal(primary, cycleFade);
    if (secondary) drawCrystal(secondary, cycleFade);

    const dist = nearestTipDist();
    if (!mouseInside || dist > 280) restPressure += dt * 0.85;
    else restPressure = Math.max(0, restPressure - dt * 0.55);

    const primaryDone = primary && primary.complete;
    const secondaryDone = !secondary || secondary.complete;
    const shouldFade =
      (primaryDone && secondaryDone && cycleAge > 9) ||
      (restPressure > 6 && cycleAge > 14) ||
      cycleAge > 105;
    if (shouldFade) {
      cycleFade -= dt * 0.32;
      if (cycleFade <= 0) {
        ctx.fillStyle = '#1a1a4a';
        ctx.fillRect(0, 0, W, H);
        startCycle();
      }
    }

    if (!noticeShown && (Date.now() - sessionStart) / 1000 >= 110) {
      noticeShown = true;
      const n = document.getElementById('notice');
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), 7800);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  console.log('%c  the lattice keeps its own counsel  ', 'color:#a8e6f0; font-style: italic; letter-spacing:0.2em;');
})();
</script>
<!--
  six arms, the way the cold likes to count.
  the second seed has been here all along — only quieter.
  breathe slowly against the cold glass.
-->

<script src="/nav.js" defer></script>
