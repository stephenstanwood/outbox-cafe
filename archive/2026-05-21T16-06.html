<title>Step Inside — A Visiting Room</title>
<meta name="description" content="A small generator of rooms. Press the button. You will be somewhere specific.">
<style>
  :root {
    --cream: #f5e6d3;
    --cream-deep: #ecd9bd;
    --charcoal: #2a2a2a;
    --charcoal-soft: #4a443d;
    --amber: #e8a855;
    --amber-deep: #c98a3a;
    --line: #d6c4a8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--charcoal);
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 36px 22px 70px; }
  header {
    text-align: center;
    border-bottom: 1px solid var(--line);
    padding-bottom: 22px;
    margin-bottom: 26px;
  }
  h1 {
    font-size: clamp(28px, 5.5vw, 40px);
    margin: 0 0 8px;
    font-weight: normal;
    font-style: italic;
    letter-spacing: 0.4px;
  }
  .lede {
    margin: 0 auto;
    color: var(--charcoal-soft);
    font-size: 15px;
    max-width: 460px;
  }
  .controls {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }
  .btn-generate {
    background: var(--amber);
    color: var(--charcoal);
    border: 2px solid var(--amber-deep);
    padding: 13px 28px;
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.6px;
    cursor: pointer;
    border-radius: 999px;
    transition: transform .1s ease, box-shadow .15s ease;
    box-shadow: 0 3px 0 var(--amber-deep);
  }
  .btn-generate:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--amber-deep); }
  .btn-generate:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--amber-deep); }
  .tabs { display: flex; justify-content: center; gap: 22px; margin-bottom: 14px; }
  .tab {
    background: none; border: none; cursor: pointer;
    padding: 6px 4px; font-family: inherit; font-size: 14px;
    color: var(--charcoal-soft);
    border-bottom: 2px solid transparent;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--charcoal); border-bottom-color: var(--amber); }
  .tab .count {
    color: var(--amber-deep);
    font-size: 11px;
    margin-left: 4px;
    font-style: italic;
  }
  .filters {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 6px; margin-bottom: 26px;
  }
  .filter {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--charcoal-soft);
    padding: 5px 12px;
    font-size: 11px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
  }
  .filter.active { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }
  .rooms { list-style: none; padding: 0; margin: 0; }
  .room {
    background: rgba(255,255,255,0.45);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 22px 14px;
    margin-bottom: 14px;
    position: relative;
    animation: fadein .35s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .room.secret {
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(232,168,85,0.22), transparent 60%),
      rgba(255,255,255,0.55);
    border-color: var(--amber);
    box-shadow: 0 0 0 1px rgba(232,168,85,0.25) inset;
  }
  .room-text { margin: 0 0 14px; font-size: 16px; color: var(--charcoal); }
  .room-meta {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px dashed var(--line);
    padding-top: 10px;
    font-size: 11px;
    color: var(--charcoal-soft);
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
  .tag { font-style: italic; text-transform: lowercase; letter-spacing: 0.3px; font-size: 12px; }
  .tag.secret { color: var(--amber-deep); }
  .actions { display: flex; align-items: center; gap: 14px; }
  .heart {
    background: none; border: none; cursor: pointer;
    padding: 4px 0; color: var(--amber-deep);
    display: flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 11px;
    letter-spacing: 0.6px; text-transform: uppercase;
  }
  .heart svg { width: 18px; height: 18px; display: block; transition: transform .15s ease; }
  .heart:hover svg { transform: scale(1.18); }
  .heart.active svg path { fill: var(--amber-deep); }
  .delete {
    background: none; border: none; cursor: pointer;
    color: var(--charcoal-soft);
    font-family: inherit; font-size: 11px;
    letter-spacing: 0.6px; text-transform: uppercase;
    padding: 4px 0;
  }
  .delete:hover { color: var(--charcoal); }
  .empty {
    text-align: center; color: var(--charcoal-soft);
    padding: 30px 20px; font-style: italic; font-size: 15px;
  }
  .banner {
    background: var(--amber);
    color: var(--charcoal);
    padding: 14px 18px;
    border-radius: 4px;
    margin-bottom: 18px;
    font-size: 14px;
    text-align: center;
    border: 1px solid var(--amber-deep);
    line-height: 1.45;
  }
  .banner .close {
    float: right;
    background: none; border: none;
    color: var(--charcoal);
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    line-height: 1;
    padding: 0 0 0 12px;
    margin-top: -2px;
  }
  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 12px;
    color: var(--charcoal-soft);
    border-top: 1px solid var(--line);
    padding-top: 22px;
    line-height: 1.7;
  }
  footer a {
    color: var(--amber-deep);
    text-decoration: none;
    border-bottom: 1px dotted var(--amber-deep);
  }
  footer a:hover { color: var(--charcoal); border-bottom-color: var(--charcoal); }
  @media (max-width: 480px) {
    .filter { font-size: 10.5px; padding: 5px 10px; }
    .room { padding: 16px 16px 12px; }
    .room-text { font-size: 15px; }
    .tabs { gap: 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Step Inside</h1>
  <p class="lede">A small generator of rooms. Press the button. You will be somewhere specific. Tap the heart on any room you'd like to keep.</p>
</header>

<main>
  <div class="controls">
    <button class="btn-generate" id="btnGenerate">Generate Room</button>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="session" role="tab">This visit <span class="count" id="cSession">0</span></button>
    <button class="tab" data-tab="favorites" role="tab">My rooms <span class="count" id="cFav">0</span></button>
  </div>

  <div class="filters" id="filters">
    <button class="filter active" data-cat="all">All</button>
    <button class="filter" data-cat="domestic">Domestic</button>
    <button class="filter" data-cat="industrial">Industrial</button>
    <button class="filter" data-cat="theatrical">Theatrical</button>
    <button class="filter" data-cat="forgotten">Forgotten</button>
    <button class="filter" data-cat="otherworldly">Otherworldly</button>
  </div>

  <div id="bannerSlot"></div>
  <ul class="rooms" id="rooms"></ul>
  <div class="empty" id="empty">Press <em>Generate Room</em>. The door is unlocked.</div>
</main>

<footer>
  <p>Stay as long as you like. Take your shoes off if it helps.<br>
  <a href="/archive">Other doors, other rooms</a></p>
</footer>
</div>

<!-- Every room here is fictional. They are also, in their way, real enough. -->
<script>
(function(){
  "use strict";

  const KEY_FAV = 'outboxcafe.rooms.favorites.v1';
  const KEY_COUNT = 'outboxcafe.rooms.generatedCount.v1';
  const KEY_SECRET = 'outboxcafe.rooms.secretUnlocked.v1';
  const KEY_BANNER = 'outboxcafe.rooms.secretBannerShown.v1';
  const UNLOCK = 6;

  const ROOMS = [
    // domestic (12)
    { cat:'domestic', opener:"A kitchen at four in the afternoon" },
    { cat:'domestic', opener:"The pantry behind a dining room" },
    { cat:'domestic', opener:"An attic above a stationer's shop" },
    { cat:'domestic', opener:"A breakfast nook with one chair pulled out and one pushed in" },
    { cat:'domestic', opener:"A sewing room in a second-floor corner" },
    { cat:'domestic', opener:"A bathroom with the door propped open by a folded towel" },
    { cat:'domestic', opener:"A bedroom belonging to someone away for the weekend" },
    { cat:'domestic', opener:"A mudroom with three coats and one leash on hooks by the door" },
    { cat:'domestic', opener:"A reading parlor with the curtains drawn fully back" },
    { cat:'domestic', opener:"A small greenhouse attached to the south side of a house" },
    { cat:'domestic', opener:"A study lined floor-to-ceiling with paperback books" },
    { cat:'domestic', opener:"A child's room on a Saturday morning" },
    // industrial (7)
    { cat:'industrial', opener:"A boiler room two stories below grade" },
    { cat:'industrial', opener:"A printing-press floor between morning runs" },
    { cat:'industrial', opener:"A switching station at the edge of a railyard" },
    { cat:'industrial', opener:"A foundry annex with the furnaces banked for the night" },
    { cat:'industrial', opener:"A clocktower's gear room halfway up the spire" },
    { cat:'industrial', opener:"A bottling-plant break room" },
    { cat:'industrial', opener:"A bakery kitchen at three in the morning" },

    { cat:'theatrical', opener:"A dressing room thirty minutes before curtain" },
    { cat:'theatrical', opener:"A prop loft above the fly tower" },
    { cat:'theatrical', opener:"An orchestra pit during intermission" },
    { cat:'theatrical', opener:"A lighting booth at the back of the house" },
    { cat:'theatrical', opener:"A costume cage in a regional opera basement" },
    { cat:'theatrical', opener:"A green room with the kettle still warm" },
    // forgotten (6)
    { cat:'forgotten', opener:"An abandoned vault in a defunct bank building" },
    { cat:'forgotten', opener:"A sealed annex behind an old hospital wing" },
    { cat:'forgotten', opener:"A root cellar under a farmhouse no one has visited in a long while" },
    { cat:'forgotten', opener:"A condemned ballroom with its chandeliers still up" },
    { cat:'forgotten', opener:"A locked passenger car on a depot siding" },
    { cat:'forgotten', opener:"The third-floor library of a closed boarding school" },
    // otherworldly (6)
    { cat:'otherworldly', opener:"A submarine galley at neutral buoyancy" },
    { cat:'otherworldly', opener:"A spacecraft sleeping quarters during the second watch" },
    { cat:'otherworldly', opener:"A glass conservatory on the roof of an observatory" },
    { cat:'otherworldly', opener:"A lighthouse keeper's quarters at the end of October" },
    { cat:'otherworldly', opener:"A bathysphere observation chamber at eight hundred meters" },
    { cat:'otherworldly', opener:"An airship cabin at three thousand feet" }
  ];

  const LIGHTING = [
    "Afternoon light slants in low and amber, catching every floating mote.",
    "A single bulb on a brown cloth cord throws a soft warm circle, and the corners take their time.",
    "Gray morning light fills the room evenly, like water settling.",
    "Late sun has pushed one long bar of gold across the floorboards.",
    "Two lamps are on, one near the chair and one on the desk; nothing else is needed.",
    "Light from the next room spills under the door in a thin warm slab.",
    "A row of clerestory windows pours noon down in clean white sheets.",
    "The reading lamp is on. Everything outside its circle is shadow and possibility.",
    "Snow-light, which is its own kind of light, comes in pale and very quiet.",
    "A fish tank on the far wall is casting a slow blue ripple across the ceiling.",
    "Candle flames lean in the same direction. Something gentle is moving through.",
    "A skylight overhead is the only window; the light comes straight down like a polite guest.",
    "Dust catches in the lamp's beam and turns into slow gold weather.",
    "The amber bulb on the desk has been burning for hours and does not seem tired.",
    "Stained glass at one high window scatters red and green coins across the floor.",
    "Pilot lights from the appliances glow blue at floor level.",
    "Moonlight comes only in the south window, and only this time of year.",
    "The overhead is off; the lamp on the workbench is doing all of the work.",
    "Light through the curtains has been filtered through cotton dyed lemon yellow.",
    "Headlights from outside sweep the ceiling once, take their information, and leave.",
    "The fireplace is going low and steady, more amber than orange.",
    "A flashlight balanced on a stack of books points at the ceiling, making a soft pool.",
    "Daylight — the diffuse kind that comes through a cloudy March sky — fills the room without insisting.",
    "A string of small bulbs runs the perimeter near the ceiling and has been on every evening for months.",
    "A single shop light hung from the rafters lights everything from above without ceremony."
  ];

  const OBJECTS = [
    "On the table: a glass of water with three fingerprints, a paperback face-down, and a small pile of pencil shavings nobody has swept yet.",
    "A blue ceramic bowl holds two apples, a ring of keys, and a coiled rubber band.",
    "Someone has arranged six river stones along the windowsill, largest to smallest.",
    "A coat is draped over the back of a chair, the sleeves still holding the shape of arms.",
    "Three pairs of shoes line up by the door. The leftmost pair is still wet.",
    "An open notebook on the desk shows a list, half of it crossed off in fresh ink.",
    "The bookshelf is two deep with paperbacks; a row of small pinecones tops the front layer.",
    "A bicycle is leaned against a radiator. Its back tire is flat. It has been like this for a while.",
    "A vase on the mantel holds dried lavender from probably last August.",
    "On the rug, a board game in the middle of being played, a pencil resting across the score pad.",
    "A small tape recorder, a stack of unlabeled cassettes, and a single AA battery on its side.",
    "An iron sits on a folded towel, the cord wound neatly. It is still warm.",
    "Postcards have been taped to the wall in a careful constellation, no two touching.",
    "A guitar leans in the corner with a capo on the fifth fret.",
    "A bowl of clementines, two of them already peeled, the peels left in a careful spiral.",
    "A dressmaker's form wears half a shirt, the right sleeve still unpinned.",
    "A blue thermos, lid off, holds tea that has gone exactly room temperature.",
    "A child's drawing of a horse is taped at eye-level on the wall next to the door.",
    "On the floor, a sleeping cat in a square of sun, breathing slowly enough to count.",
    "A typewriter sits open with a half-written page still curled around the platen.",
    "Three umbrellas rest in a tall ceramic crock by the door, two of them still damp.",
    "A bowl of sea-glass collected over many summers, sorted by color into rough quadrants.",
    "On the workbench: a small motor disassembled, parts laid out in the order they came apart.",
    "A pair of reading glasses on top of an open atlas, the page showing Newfoundland.",
    "A bouquet of yellow flowers in a coffee can painted by someone who was about ten."
  ];

  const SENSORY = [
    "The room smells faintly of cardamom and warm milk.",
    "Two rooms over, a radio is playing low — voices, not music.",
    "The floorboards underfoot are uneven and worn smooth in two specific paths.",
    "The air is cool but not cold; the cool of a window that has been open for an hour.",
    "A clock ticks in the next room. You only notice it when you stop to listen.",
    "The wallpaper, where you touch it, is soft and slightly papery, like old letters.",
    "It smells like cedar and graphite and something a little like cinnamon.",
    "Outside, one bird is making the same three-note phrase, patient and unhurried.",
    "The radiator clicks twice and then settles into a long hush.",
    "Warm air pools at ceiling height; the lower three feet of the room stay cool.",
    "Something nearby has been simmering for hours. The smell is brown and savory and entirely welcome.",
    "The refrigerator hums to itself in a kind one-note song.",
    "Tile underfoot is cool through thin socks.",
    "Rain on the glass makes a soft continuous rustling, not quite drumming.",
    "The whole room smells like wet wool and pencil eraser.",
    "Inside the wall, water moves in pipes. The wall does not seem to mind.",
    "Steam rises from a kettle in slow shy plumes that disappear before they reach the ceiling.",
    "The smell is dry — sun-warmed paper, dust, and a faint mineral coolness from stone.",
    "Floorboards offer the occasional gentle complaint where weight crosses them.",
    "A faint vibration comes up through the soles of the feet — something mechanical, far below, working away.",
    "The room is very, very quiet, in the way a room becomes quiet when snow is falling outside.",
    "The wood of the doorframe is warm where the late sun has been on it for an hour.",
    "Wet plant smell — chlorophyll, soil, the green-water smell of a watering can recently used.",
    "It smells like beeswax and old leather and a single match recently blown out.",
    "The clock on the wall ticks slightly out of phase with one in the hallway, and the small disagreement is somehow comforting.",
    "Outside, a screen door hushes shut and a second one farther away does the same a beat later.",
    "Linen curtains lift once in a slow draft, settle, lift again.",
    "It is the precise temperature of a room that has been lived in continuously, by humans, all afternoon.",
    "The faint chemical sweetness of camphor, of old wool blankets folded long.",
    "Somewhere down the hall, someone is humming. You cannot quite make out the tune."
  ];

  const CLOSINGS = [
    "Nothing here is in the wrong place; someone tends to it.",
    "Whoever was here a moment ago will be back. The chair is still warm.",
    "It has not been entered in a long time, but it has not been forgotten either.",
    "Everything has the patient air of being exactly where it has been for years.",
    "The room is in the middle of being used. It is not waiting for anything.",
    "Two cups on the table mean someone was here with someone else, not long ago.",
    "A door at the far end is propped open with a heavy book.",
    "The bed is made loosely, with the corners untucked and the pillow indented.",
    "This is a working room. A clean one, but a working one.",
    "It looks like the room has just exhaled.",
    "Whoever sleeps here sleeps well; the air has that particular settled quality.",
    "Someone has been gone perhaps an hour. The room has not noticed yet.",
    "The whole space holds the long quiet of a Sunday afternoon.",
    "Use is visible in every surface, gently, like bark grown around what was placed against it.",

    "Footprints in the rug indicate a recent slow circuit of the room and back.",

  const SECRET_ROOM = {
    id: 'secret-room-the-fifth-wall',
    cat: 'otherworldly',
    secret: true,
    text: "A room with five walls, none of which contain a door. The ceiling is a single pane of clear glass and the sky above it is always the soft pink of just-before-dawn. In the center: a chair pulled out from a small wooden table, as if you have only just stood up. On the table, a teapot still warm to the touch, two cups (one untouched), and an open book in a language you can almost read. The air smells faintly of beeswax and clean linen. Somewhere very far below the floor, a slow regular sound — not a clock, not a heartbeat, something gentler. There is no draft, but the curtains lift once, settle, and lift again. The room has been waiting for you, calmly, for a very long time. It is glad you are here.",
    ts: 0
  };

  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function uid(){ return 'r_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36); }

  function makeRoom(){
    const r = pick(ROOMS);
    const desc = r.opener + ". " + pick(LIGHTING) + " " + pick(OBJECTS) + " " + pick(SENSORY) + " " + pick(CLOSINGS);
    return { id: uid(), cat: r.cat, text: desc, ts: Date.now() };
  }

  function loadFavs(){
    try { const v = JSON.parse(localStorage.getItem(KEY_FAV) || '[]'); return Array.isArray(v) ? v : []; }
    catch(e){ return []; }
  }
  function saveFavs(){ try { localStorage.setItem(KEY_FAV, JSON.stringify(favorites)); } catch(e){} }

  let session = [];
  let favorites = loadFavs();
  let activeTab = 'session';
  let activeFilter = 'all';
  let count = parseInt(localStorage.getItem(KEY_COUNT) || '0', 10) || 0;
  let secretUnlocked = localStorage.getItem(KEY_SECRET) === '1';
  let bannerShown = localStorage.getItem(KEY_BANNER) === '1';

  if (secretUnlocked && !favorites.some(f => f.id === SECRET_ROOM.id)) {
    favorites.unshift(Object.assign({}, SECRET_ROOM));
    saveFavs();
  }

  const $ = (s) => document.querySelector(s);
  const roomsEl = $('#rooms');
  const emptyEl = $('#empty');
  const bannerSlot = $('#bannerSlot');
  const cSession = $('#cSession');
  const cFav = $('#cFav');

  const heartSVG = (filled) => `
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 21s-7.5-4.6-9.6-9.4C.9 7.7 3.6 4 7.2 4c2 0 3.6 1.1 4.8 2.7C13.2 5.1 14.8 4 16.8 4c3.6 0 6.3 3.7 4.8 7.6C19.5 16.4 12 21 12 21z"
        fill="${filled ? 'currentColor' : 'none'}"
        stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    </svg>`;

  function categoryLabel(c){
    return c.charAt(0).toUpperCase() + c.slice(1);
  }

  function isFavorited(id){ return favorites.some(f => f.id === id); }

  function renderRoom(room, opts){
    opts = opts || {};
    const fav = isFavorited(room.id);
    const li = document.createElement('li');
    li.className = 'room' + (room.secret ? ' secret' : '');
    li.dataset.cat = room.cat;
    li.dataset.id = room.id;

    const p = document.createElement('p');
    p.className = 'room-text';
    p.textContent = room.text;

    const meta = document.createElement('div');
    meta.className = 'room-meta';

    const tag = document.createElement('span');
    tag.className = 'tag' + (room.secret ? ' secret' : '');
    tag.textContent = room.secret ? '· the fifth wall ·' : categoryLabel(room.cat);

    const actions = document.createElement('div');
    actions.className = 'actions';

    if (!room.secret) {
      const heart = document.createElement('button');
      heart.className = 'heart' + (fav ? ' active' : '');
      heart.setAttribute('aria-pressed', fav ? 'true' : 'false');
      heart.setAttribute('aria-label', fav ? 'Remove from My rooms' : 'Save to My rooms');
      heart.innerHTML = heartSVG(fav) + '<span>' + (fav ? 'kept' : 'keep') + '</span>';
      heart.addEventListener('click', () => toggleFavorite(room));
      actions.appendChild(heart);
    }

    if (opts.allowDelete && !room.secret) {
      const del = document.createElement('button');
      del.className = 'delete';
      del.textContent = 'remove';
      del.addEventListener('click', () => {
        favorites = favorites.filter(f => f.id !== room.id);
        saveFavs();
        render();
      });
      actions.appendChild(del);
    }

    if (room.secret) {
      const hint = document.createElement('span');
      hint.className = 'heart active';
      hint.style.cursor = 'default';
      hint.innerHTML = heartSVG(true) + '<span>kept always</span>';
      actions.appendChild(hint);
    }

    meta.appendChild(tag);
    meta.appendChild(actions);
    li.appendChild(p);
    li.appendChild(meta);
    return li;
  }

  function toggleFavorite(room){
    if (isFavorited(room.id)) {
      favorites = favorites.filter(f => f.id !== room.id);
    } else {
      favorites.unshift({ id: room.id, cat: room.cat, text: room.text, ts: Date.now() });
    }
    saveFavs();
    render();
  }

  function visibleList(){
    const src = activeTab === 'session' ? session : favorites;
    return activeFilter === 'all' ? src : src.filter(r => r.cat === activeFilter);
  }

  function renderBanner(){
    bannerSlot.innerHTML = '';
    if (secretUnlocked && !bannerShown) {
      const b = document.createElement('div');
      b.className = 'banner';
      b.innerHTML = '<button class="close" aria-label="dismiss">×</button>' +
        'You have stepped into six rooms. A seventh has opened, quietly, in <em>My rooms</em>. It will be there whenever you want to visit.';
      b.querySelector('.close').addEventListener('click', () => {
        bannerShown = true;
        try { localStorage.setItem(KEY_BANNER, '1'); } catch(e){}
        renderBanner();
      });
      bannerSlot.appendChild(b);
    }
  }

  function render(){
    cSession.textContent = session.length;
    cFav.textContent = favorites.length;

    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === activeTab);
    });
    document.querySelectorAll('.filter').forEach(f => {
      f.classList.toggle('active', f.dataset.cat === activeFilter);
    });

    roomsEl.innerHTML = '';
    const list = visibleList();
    if (list.length === 0) {
      emptyEl.style.display = 'block';
      if (activeTab === 'session') {
        emptyEl.innerHTML = activeFilter === 'all'
          ? 'Press <em>Generate Room</em>. The door is unlocked.'
          : 'No rooms of this kind yet this visit. Press <em>Generate Room</em> a few more times.';
      } else {
        emptyEl.innerHTML = activeFilter === 'all'
          ? 'No saved rooms yet. Tap the heart on any room to keep it.'
          : 'No saved rooms of this kind yet.';
      }
    } else {
      emptyEl.style.display = 'none';
      list.forEach(r => roomsEl.appendChild(renderRoom(r, { allowDelete: activeTab === 'favorites' })));
    }

    renderBanner();
  }

  function onGenerate(){
    const r = makeRoom();
    session.unshift(r);
    count += 1;
    try { localStorage.setItem(KEY_COUNT, String(count)); } catch(e){}

    if (!secretUnlocked && count >= UNLOCK) {
      secretUnlocked = true;
      try { localStorage.setItem(KEY_SECRET, '1'); } catch(e){}
      if (!favorites.some(f => f.id === SECRET_ROOM.id)) {
        favorites.unshift(Object.assign({}, SECRET_ROOM));
        saveFavs();
      }
    }
    render();
  }

  document.getElementById('btnGenerate').addEventListener('click', onGenerate);

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => { activeTab = t.dataset.tab; render(); });
  });
  document.querySelectorAll('.filter').forEach(f => {
    f.addEventListener('click', () => { activeFilter = f.dataset.cat; render(); });
  });

  render();

  // For the curious. There is no eighth wall.
  console.log('%c✿ Step Inside','color:#c98a3a;font-size:14px;font-style:italic;', 'every room is willing to be seen. tap a heart if one stays with you.');
})();
</script>

<script src="/nav.js" defer></script>
</body>
