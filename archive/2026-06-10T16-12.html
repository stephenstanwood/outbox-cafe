  <meta name="outbox-spec-era" content="1971 — peak American Midwestern county-fair 4-H youth-livestock-club exhibition season, the very specific moment when 4-H clubs across the rural counties of Iowa and Nebraska and Illinois and Wisconsin culminated their summer-long youth-livestock-rearing programs at the August county-fair grounds, where 11-to-17-year-old club members from farm families across the county brought their hand-raised lambs and dairy heifers and barrows and breeding ewes and chickens and rabbits to the show ring for judging by the county Extension agent and a visiting judge from the state Extension office, and the entire infrastructure of the youth-livestock exhibition ran on a small carefully-maintained hand-printed paper document called the OFFICIAL EXHIBITORS' ROSTER, a folded 11×17 cream cardstock booklet printed at the county-seat job printer in mid-July from a manuscript hand-compiled across June and early July by the county 4-H secretary Mrs. Pearlene Gaffigan of 1817 South Walnut Street in Onawa Iowa, age 53, who had been compiling the roster every August since 1953 and who collected the exhibitor information by hand from each of the 41 county 4-H clubs via mailed-in registration cards that came back in her PO Box across May and June and that she transcribed into a leather-bound master ledger on her kitchen table in the evenings after supper; the roster booklet itself listed every exhibitor in the 1971 Monona County Fair youth livestock division by club affiliation, age, species and breed of animal, animal's registered name or barn name, animal's birth date, sire and dam, ribbons earned at prior shows, and a small column of Mrs. Gaffigan's personal notes about each exhibitor that she kept for her own use ('Becky's third year with Dorset crosses — her ewe took grand champion at the spring lamb show in Ida Grove'; 'first year for Lyle Junior — he is showing his uncle Vern's barrow and he is nervous, give him an encouraging word at the ring'; 'the Voelker twins are showing matched Holstein heifers from the same calving — they have been working on showing them since February')">
  <meta name="outbox-spec-format" content="A fully working browseable hand-printed exhibitors' roster booklet — the 1971 Monona County Fair Youth Livestock Division roster as a folded 11×17 cardstock booklet opened flat across the viewport, the visitor browsing the 14 ruled pages of exhibitor listings by clicking the lower corners to turn pages, with each of the 247 individual exhibitor entries hoverable to reveal Mrs. Gaffigan's hand-written personal notes about that specific 4-H kid and their animal, plus a working PIN YOUR PROGRAM panel where the visitor selects which classes they want to attend in the show ring across the four days of the fair (Wednesday Sheep, Thursday Swine, Friday Dairy, Saturday Beef) and the booklet auto-generates a small hand-pencilled personal schedule slip the visitor can tuck into the back of the roster, plus a working SIGN THE BACK COVER guestbook where the visitor adds their own short note in pencil-cursive about which class or animal they came to see, persisting in localStorage as an accumulating community page of fairgoer notes that future visitors browse alongside Mrs. Gaffigan's master ledger entries">
  <meta name="outbox-spec-subject" content="The 1971 Monona County Fair Youth Livestock Division Official Exhibitors' Roster, compiled across June and early July 1971 by county 4-H secretary Mrs. Pearlene Gaffigan of Onawa Iowa, printed at Holsteen Brothers Job Printers on Iowa Street in Onawa on July 16, 1971 in a run of 800 cream cardstock booklets, distributed via the county Extension office to every 4-H family in the county and stocked at the fairgrounds office across the four days of the fair August 18-21 1971; the roster as a working document that the county Extension agent Mr. Donald Kropfelder uses at the judging table, that visiting families use to find their nieces and nephews in the show ring, that the 4-H kids themselves use to look up their show times and class assignments, and that Mrs. Gaffigan uses to remember every kid across nineteen years of county fairs; the 247 individual exhibitors listed by club affiliation across the 41 active Monona County 4-H clubs (the Castana Cardinals, the Mapleton Maple Leafs, the Whiting Hustlers, the Soldier Sodbusters, the Onawa Eager Beavers, the Ute Up-and-Comers, the Moorhead Manglers, etc.) with each entry filling one ruled line containing: exhibitor's full name and age, parents' names, home address, club affiliation, species and breed, animal's barn name and registered name if applicable, animal's birthdate, sire and dam, prior-year ribbon record, and Mrs. Gaffigan's column of small personal notes; the entire infrastructure of one woman's nineteen-year working knowledge of every 4-H kid in Monona County and their animals condensed into a single hand-compiled printed booklet that she takes seriously as legitimate skilled secretarial-pedagogical craft">
  <meta name="outbox-spec-tone" content="Warm, focused, peer-to-peer working county-4-H-secretary voice belonging to Mrs. Gaffigan herself in the hover-revealed margin annotations on each exhibitor entry — Mrs. Gaffigan at her kitchen table in the evenings of June and July with the leather-bound master ledger open and the kitchen radio playing low (KMA 960 out of Shenandoah, the farm-and-home show), talking to the visitor (a fairgoer leafing through the roster on Thursday afternoon between the Holstein heifer class and the Yorkshire barrow class) the way she'd talk to a fellow Extension staffer riding along with her on the spring club-visits route: matter-of-fact pride in nineteen years of roster-compilation as serious skilled secretarial-pedagogical craft, conversational warmth in the margin notes about each kid (e.g., on Becky Tessien's entry: 'Becky is twelve this year and this is her third year with Dorset crosses — her ewe Henrietta is the daughter of the ewe Becky showed as a nine-year-old in '68 and Henrietta took grand champion at the Ida Grove spring lamb show in May, Becky has been working with her since lambing in February and she knows that ewe better than the judge will know any animal in the ring'; on Lyle Junior Brockschink's entry: 'first year exhibitor, he is twelve, he is showing his uncle Vern Brockschink's Hampshire barrow Sammy because Lyle Junior's own animal got pneumonia in May and Vern offered Sammy so Lyle Junior could still show this year — give him an encouraging word at the ring, his hands shake when he is nervous but he is a good showman when he settles'; on the Voelker twin entries (Marlene and Doris, age 14): 'matched Holstein heifers from the same calving in March, the twins have been working on showing them together since the calves were three weeks old, they brush them every morning before school, they have decided that whichever twin wins they will split the prize money'), peer-level steadiness about 4-H youth livestock as serious pedagogical-agricultural craft that teaches real working farm skills, present-tense July-evening focus on getting the roster manuscript to the print shop by July 16, real specific affection for the 247 kids in the county whose names and animals she carries in her head, full earnest belief that a hand-compiled exhibitors' roster is one of the more important documents a county fair produces and that the visitor's careful browsing of it is participation in a real act of small-community witness worthy of full peer-to-peer respect">

  <meta name="outbox-spec-palette" content="Warm cream Holsteen-Brothers-Job-Printers cardstock (#f1e4c4) as the dominant viewport ground with visible long-fiber paper texture and tiny halftone-stipple grain (#a89878 at 0.3 opacity) + deep composing-room ink black (#1a1612) for the printed headlines, club section dividers, column rules, and the 247 exhibitor entries set in 9-point Linotype with subtle per-character ink-density variation suggesting hand-fed press impression + warm brick-red second-color letterpress ink (#a8312a) for the booklet's masthead 'MONONA COUNTY FAIR — YOUTH LIVESTOCK DIVISION — OFFICIAL EXHIBITORS' ROSTER — AUGUST 18-21 1971', the small woodcut ornament of a 4-H clover on the front cover, the class-time dividers, and the ribbon-record column headers + cool 4-H clover green (#3a6a2e) for the four-leaf-clover club emblems beside each of the 41 club section headers + Mrs. Gaffigan's hand-written margin annotation slips rendered as small cream-stationery rectangles (#f5ebd0) tucked into the right margin of the booklet with her soft fountain-pen ink (#1c2a5e) in steady careful 1953-Iowa-secretarial cursive with subtle per-stroke pressure variation + soft graphite-pencil gray (#5a4a3a) for the visitor's pencil-cursive guestbook entries and the auto-generated personal show-schedule slips + faint coffee-cup ring shadow (#a8895a at 0.30 opacity) on one of the inner spreads where Mr. Kropfelder set his mug down at the judging table on Thursday afternoon + warm August-late-afternoon county-fair-judging-tent canvas-filtered light cast (#fde6a0 at 0.18 opacity) falling diagonally across the upper-right of the booklet suggesting the canvas-roof light at 3:40pm Thursday + tiny printed staple-shadow at the booklet's center fold (#8a6a3a at 0.4 opacity) + faint cattle-show ring sawdust-scuff (#c8a878 at 0.2 opacity) along the lower edge of one inner spread where the booklet sat momentarily on the fairgrounds ground + the cream cardstock's faint 2-color registration drift visible as 1-pixel offset between the black Linotype and the brick-red second-color pass suggesting Holsteen Brothers' hand-fed flatbed press registration was never quite perfect">
  <meta name="outbox-spec-wildcard" content="Exactly one of Mrs. Gaffigan's 247 hover-revealed margin annotations — the one tucked alongside the entry for Becky Tessien and her ewe Henrietta — when read aloud line-by-line at its natural sentence breaks, encodes a perfect haiku (5-7-5 syllable structure) about a barn light at 5am, a girl's hands learning to brush wool the right direction, and a ewe who knows the girl's voice — disguised naturally within Mrs. Gaffigan's earnest peer-level working-secretary note about Becky's three-year showing record. Additionally, after a returning visitor has signed the back cover on three separate calendar dates AND pinned a full four-day program at least twice across visits (tracked in localStorage), a hidden 248th entry quietly appears at the very bottom of the back-cover guestbook page in slightly fresher fountain-pen ink — the entry reads in Mrs. Gaffigan's hand: 'GAFFIGAN, P. — age 53 — Onawa Iowa — Monona County 4-H Secretary since 1953 — not an exhibitor in any class — showing nothing this year — but I have been at every fair since 1953 and I have signed my own back cover every year as if I were one of the kids because I am part of this too — P.G.' This unlock is not announced anywhere, no UI text refers to it, no counter celebrates it — it simply becomes the small private fact at the bottom of the back cover for visitors who kept coming back.">
  <meta name="outbox-spec-forbidden" content="Absolutely NO museum-archival 'remember when county fairs were like this' nostalgic detachment, NO soft melancholy about 'the lost art of 4-H youth livestock,' NO cool ironic distance from 1970s Midwestern county-fair culture as quaint Americana, NO retrospective elegy framing Mrs. Gaffigan or the 41 Monona County 4-H clubs or the Onawa Iowa Extension office as already-vanished. NO 'where are they now' wistfulness about Becky Tessien grown up or about whether the Voelker twins inherited the farm, NO 'this roster was found decades later in an attic' framing, NO scrapbook-archival voice. NO horror-genre framing of the empty fairgrounds, the after-hours show ring, the Voelker twins' private dedication to their late father, or the hidden 248th entry as creepy/uncanny/sinister/gothic-rural — this is a working August county fair with the canvas tents up and the livestock barns full and the Extension office staffed and the judging tables set, Mrs. Gaffigan is at the secretary's table this Thursday afternoon checking exhibitor numbers, and the 247 kids are at the fairgrounds with their animals. NO 'the rural Midwest is dying' wistful-decline framing, NO 'family farms are disappearing' political subtext, NO Grant-Wood-American-Gothic stark-grimness framing, NO Norman-Rockwell-sentimental small-town-Americana saccharine, NO 'simpler times' framing, NO Boomer-childhood-nostalgia 'they don't make them like this anymore' voice. NO condescension toward 4-H youth livestock work as quaint farm-kid recreation, toward county-fair exhibition as small-time pageantry, toward Extension-office secretarial work as small career, toward Mrs. Gaffigan's nineteen years compiling rosters as wistful small-life pathos. NO smug urban superiority about rural agricultural pedagogy, NO 'imagine raising a lamb for the slaughter market at age twelve' framing — the 4-H kids and their families understand exactly what market livestock means and the pedagogy is honest about it. NO 'Charlotte's Web' sentimentality about animal-and-child bonds, NO Wilbur-the-pig pathos, NO 'after the fair the animals get sold' tragic-revelation framing — this is a normal August week at a normal county fair, the kids know what they signed up for in February when the lambs were born, and the work is dignified. NO Lyle-Junior-as-nervous-farm-boy caricature, NO 'simple country folk' framing of any of the 247 exhibitors or their families. NO ag-policy political subtext, NO 'these are the people who voted for Nixon' framing, NO any partisan-cultural overlay on rural Iowa in 1971. NO Mrs. Gaffigan-as-spinster-secretary framing — she is married to Glenn Gaffigan (a Monona County road-grader operator) for thirty-one years and they have three grown children and seven grandchildren and she does the 4-H secretary work because she is genuinely good at it and the county pays her a modest annual stipend that she uses for her hardback-book habit. NO Wes-Anderson-symmetrical-frame styling, NO Pinterest-vintage-farm-aesthetic mood-boarding. NO night-shift dispatcher voice, NO lowercase sentence-fragments, NO hyperminimal museum-card prose, NO SCP-cryptic register about the hidden 248th entry or the Voelker twins' dedication, NO archival cabinet/drawer/vault framing of the roster as relic, NO observatory/society/club scaffolding (the 41 Monona County 4-H clubs are real legitimate youth-agricultural organizations, not fictional small-town societies), NO radio/CB/ham-radio/broadcast/dispatcher/transmission framing of the Extension-office communication network as signal-relay metaphor (the Extension service is the Extension service, not a signal metaphor), NO 'day-of-the-week' subject framing (the four show days are contextual facts about the fair schedule, not the subject of the piece). NO Mrs. Gaffigan-as-folksy-Iowa-grandmother caricature, NO accented-English pastiche, NO 'gee-whiz' fake-Midwestern dialogue. NO Garrison-Keillor Lake-Wobegon gentle-mockery register. NO instructional UI text visible on the page. NO captions, NO tooltips, NO loading messages, NO 'BROWSE THE 1971 MONONA COUNTY FAIR EXHIBITORS' ROSTER' header banner, NO footer credits. The page IS the roster booklet on the judging-tent table at 3:40pm Thursday August 19 1971, the visitor IS a fairgoer leafing through it between classes, and the only voice anywhere on the page is Mrs. Gaffigan's voice in her fountain-pen margin annotations and the printed Linotype voice of the roster itself. Treat the exhibitors' roster as a serious working community document, treat Mrs. Gaffigan as a legitimate working county-Extension secretary with nineteen years of professional expertise and a real running pedagogical-agricultural craft practice, treat the 247 4-H exhibitors and their animals as real specific kids and animals doing real working agricultural pedagogy worthy of careful peer-to-peer attention, treat the four-day county fair as a real legitimate community institution worthy of full peer-to-peer respect, and treat the visitor's careful browsing of the roster and signing of the back cover as real participation in a real act of small-community witness.">

  .corner.left { left: -10px; }

  .corner svg { width: 100%; height: 100%; opacity: 0.0; transition: opacity 0.3s; }

  .corner.right:hover { transform: rotate(2deg); }

  .corner-fold {
    fill: var(--cardstock);

  .gb-input {

</style>
</head>

</div>

<div class="footer-link">

</div>

<div class="annotation" id="annotation"></div>

<script>
// =================================================================
// DATA — 41 Monona County 4-H Clubs
// =================================================================
const CLUBS = [

  "Blencoe Boosters","Rodney Rangers","Pisgah Pioneers","Charter Oak Champions",
  "Smithland Stars","West Fork Workers","Maple Township Movers","Sioux Valley Strivers",

  "Liljedahl","Maasen","Norgaard","Olesen","Plambeck","Quist","Reichmann","Sundermann",
  "Throndson","Uebel","Voss","Wedeking","Yeoman","Zellmer","Borchers","Detlefsen",

const FIRSTNAMES_M = [
  "Lyle","Wendell","Calvin","Ervin","Vernon","Glenn","Dale","Donald","Marvin","Harlan",
  "Norval","Orville","Russell","Clifford","Leland","Floyd","Lloyd","Roger","Curtis",
  "Dwight","Eldon","Forrest","Gerald","Howard","Irvin","Junior","Kenneth","LeRoy","Merlin",
  "Norman","Oren","Paul","Quentin","Ralph","Stanley","Theodore","Vincent","Wallace",
  "Bradley","Carl","Dennis","Edwin","Franklin","Gary","Harold","Jerome","Keith","Larry",
  "Mark","Neil","Otto","Phillip","Richard","Steven","Terry","Wesley","Brian","Chad","Dean"
];
const FIRSTNAMES_F = [
  "Becky","Marlene","Doris","Pearlene","Verna","Geraldine","Bernice","Lorraine","Mavis",
  "Imogene","Darlene","Wanda","Wilma","Nadine","Maxine","Phyllis","Janelle","Karen",
  "Linda","Sharon","Diane","Cheryl","Pamela","Susan","Connie","Debbie","Janet","Patricia",
  "Sandra","Vicki","Brenda","Roberta","Kathleen","Eileen","Audrey","Marilyn","Helen",
  "Joyce","Carol","Dolores","Ethel","Frances","Gloria","Hilda","Iola","Jeanne","Kay"
];
const TOWNS = [
  "Onawa","Mapleton","Castana","Whiting","Soldier","Ute","Moorhead","Turin","Blencoe",
  "Rodney","Pisgah","Charter Oak","Smithland","Sloan"
];

const SHEEP_BREEDS = ["Dorset","Hampshire","Suffolk","Shropshire","Columbia","Corriedale","Dorset Cross","Polypay","Montadale"];
const SWINE_BREEDS = ["Hampshire","Yorkshire","Duroc","Berkshire","Chester White","Poland China","Spotted","Landrace","Hampshire-Duroc Cross"];
const DAIRY_BREEDS = ["Holstein","Jersey","Brown Swiss","Guernsey","Ayrshire","Milking Shorthorn"];
const BEEF_BREEDS = ["Angus","Hereford","Polled Hereford","Shorthorn","Charolais","Simmental","Angus Cross","Hereford Cross"];
const RABBIT_BREEDS = ["New Zealand White","Dutch","Californian","Mini Lop","Flemish Giant","Rex"];
const POULTRY_BREEDS = ["Rhode Island Red","White Leghorn","Plymouth Rock","Wyandotte","Bantam Cochin","New Hampshire Red"];

const BARN_NAMES_SHEEP = ["Henrietta","Daisy","Maple","Pearl","Clover","Bessie","Pansy","Daffy","Cookie","Snowflake","Tulip","Sage","Penny","Rosie","Cricket","Honey","Posie","Buttercup","Petal","Goldie"];
const BARN_NAMES_SWINE = ["Sammy","Big Red","Porky","Squealer","Slugger","Boots","Patches","Hambone","Oinker","Bessie","Wilbur","Pinky","Bacon","Tank","Gunner","Mortimer","Pearl","Lulu","Maggie","Tiny"];
const BARN_NAMES_DAIRY = ["Buttercup","Daisy May","Pearl","Bessie","Star","Velvet","Princess","Lady","Duchess","Holly","Penny","Maple","Snowdrop","Ivy","June","Rosalind","Patches","Ginger","Misty","Belle"];
const BARN_NAMES_BEEF = ["Buster","Captain","Champion","Diesel","Major","Tank","Lightning","Hercules","Patriot","Sergeant","Apollo","Bandit","Cooper","Duke","Rebel","Romeo","Scout","Thunder","Whiskey","Boomer"];
const BARN_NAMES_RABBIT = ["Mr. Whiskers","Snowball","Cocoa","Buttons","Hazel","Pepper","Smokey","Patches","Marshmallow","Nibbles"];

const RIBBONS = [
  "—","Red '70","Blue '70","Blue '69 · Red '70","Purple '70","Reserve '70","Champion '69",
  "Blue spring lamb '71","Red spring '71","Blue '68 · '69 · '70","Reserve '70 · Grand '71 spring",
  "—","Blue '70","Red '69","Red '69 · Blue '70","Blue '70 · Reserve '70","Grand '70","Red '70",
  "—","First year","First year","First year","Red '70 · Blue '71 spring","Blue '70"
];

// 247 entries, distributed across 41 clubs
let SEED = 19710716;
function rand() { SEED = (SEED * 1103515245 + 12345) & 0x7fffffff; return SEED / 0x7fffffff; }
function pick(arr) { return arr[Math.floor(rand() * arr.length)]; }
function pickInt(lo, hi) { return Math.floor(rand() * (hi - lo + 1)) + lo; }

// Distribute entries: average ~6 per club, total 247
function distributeEntries() {
  const counts = new Array(CLUBS.length).fill(0);
  for (let i = 0; i < 247; i++) counts[i % CLUBS.length]++;
  // shuffle a bit
  for (let i = 0; i < 60; i++) {
    const a = Math.floor(rand() * CLUBS.length);
    const b = Math.floor(rand() * CLUBS.length);
    if (counts[a] > 3 && counts[b] < 12) { counts[a]--; counts[b]++; }
  }
  return counts;
}

function makeEntry(idx, clubIdx) {
  const isMale = rand() > 0.5;
  const first = isMale ? pick(FIRSTNAMES_M) : pick(FIRSTNAMES_F);
  const last = pick(SURNAMES);
  const age = pickInt(11, 17);
  const town = pick(TOWNS);
  const rt = pickInt(1, 4);
  const parents = pick(FIRSTNAMES_M) + " & " + pick(FIRSTNAMES_F) + " " + last;

  const speciesRoll = rand();
  let species, breed, barnName, dob, sire, dam;
  if (speciesRoll < 0.32) {
    species = "Sheep"; breed = pick(SHEEP_BREEDS); barnName = pick(BARN_NAMES_SHEEP);
    dob = `Feb ${pickInt(2, 28)} '71`;
    sire = pick(SHEEP_BREEDS) + " ram #" + pickInt(101, 899);
    dam = pick(BARN_NAMES_SHEEP);
  } else if (speciesRoll < 0.62) {
    species = "Swine"; breed = pick(SWINE_BREEDS); barnName = pick(BARN_NAMES_SWINE);
    dob = `Mar ${pickInt(1, 28)} '71`;
    sire = pick(SWINE_BREEDS) + " boar #" + pickInt(101, 899);
    dam = pick(BARN_NAMES_SWINE);
  } else if (speciesRoll < 0.82) {
    species = "Dairy"; breed = pick(DAIRY_BREEDS); barnName = pick(BARN_NAMES_DAIRY);
    dob = `${pick(["Jan","Feb","Mar","Apr"])} ${pickInt(1, 28)} '70`;
    sire = pick(DAIRY_BREEDS) + " bull #" + pickInt(101, 899);
    dam = pick(BARN_NAMES_DAIRY);
  } else if (speciesRoll < 0.94) {
    species = "Beef"; breed = pick(BEEF_BREEDS); barnName = pick(BARN_NAMES_BEEF);
    dob = `${pick(["Nov","Dec"])} ${pickInt(1, 28)} '70`;
    sire = pick(BEEF_BREEDS) + " bull #" + pickInt(101, 899);
    dam = pick(BARN_NAMES_BEEF);
  } else if (speciesRoll < 0.98) {
    species = "Rabbit"; breed = pick(RABBIT_BREEDS); barnName = pick(BARN_NAMES_RABBIT);
    dob = `${pick(["Apr","May"])} ${pickInt(1, 28)} '71`;
    sire = "buck #" + pickInt(101, 899); dam = "doe #" + pickInt(101, 899);
  } else {
    species = "Poultry"; breed = pick(POULTRY_BREEDS); barnName = "—";
    dob = `Apr '71`; sire = "—"; dam = "—";
  }

  return {
    idx, clubIdx, first, last, age, town, rt, parents,
    species, breed, barnName, dob, sire, dam,
    ribbons: pick(RIBBONS)
  };
}

const clubCounts = distributeEntries();
const ENTRIES = [];
let entryIdx = 0;
for (let c = 0; c < CLUBS.length; c++) {
  for (let n = 0; n < clubCounts[c]; n++) {
    ENTRIES.push(makeEntry(entryIdx++, c));
  }
}

// Force the Becky Tessien / Henrietta entry — index 0
ENTRIES[0] = {
  idx: 0, clubIdx: 0,
  first: "Becky", last: "Tessien", age: 12,
  town: "Castana", rt: 2,
  parents: "Wendell & Verna Tessien",
  species: "Sheep", breed: "Dorset Cross", barnName: "Henrietta",
  dob: "Feb 14 '71",
  sire: "Dorset ram #214",
  dam: "Maple (Becky's '68 ewe)",
  ribbons: "Blue '68 · Reserve '69 · Grand '71 spring"
};

// Force the Voelker twins
const voelker1Idx = Math.min(40, ENTRIES.length - 2);
const voelker2Idx = voelker1Idx + 1;
ENTRIES[voelker1Idx] = {
  idx: voelker1Idx, clubIdx: ENTRIES[voelker1Idx].clubIdx,
  first: "Marlene", last: "Voelker", age: 14,
  town: "Mapleton", rt: 3,
  parents: "Reuben & Lorraine Voelker",
  species: "Dairy", breed: "Holstein", barnName: "Daisy May",
  dob: "Mar 3 '71",
  sire: "Holstein bull #482",
  dam: "Buttercup",
  ribbons: "Blue '70 (junior calf)"
};
ENTRIES[voelker2Idx] = {
  idx: voelker2Idx, clubIdx: ENTRIES[voelker2Idx].clubIdx,
  first: "Doris", last: "Voelker", age: 14,
  town: "Mapleton", rt: 3,
  parents: "Reuben & Lorraine Voelker",
  species: "Dairy", breed: "Holstein", barnName: "Daffy",
  dob: "Mar 3 '71",
  sire: "Holstein bull #482",
  dam: "Buttercup",
  ribbons: "Blue '70 (junior calf)"
};

// Force the Lyle Junior Brockschink entry
const lyleIdx = Math.min(8, ENTRIES.length - 1);
ENTRIES[lyleIdx] = {
  idx: lyleIdx, clubIdx: ENTRIES[lyleIdx].clubIdx,
  first: "Lyle Junior", last: "Brockschink", age: 12,
  town: "Soldier", rt: 1,
  parents: "Lyle Sr. & Bernice Brockschink",
  species: "Swine", breed: "Hampshire", barnName: "Sammy",
  dob: "Mar 8 '71",
  sire: "Hampshire boar #318 (V. Brockschink)",
  dam: "Pearl (V. Brockschink)",

};

// =================================================================
// ANNOTATIONS — 247 distinct entries
// Each is a peer-to-peer Mrs. Gaffigan note.
// Several phrasal templates, lots of specific detail per kid.
// =================================================================

// Annotation generator — pulls from templates but keeps each one specific
const NOTE_HOOKS = [
  (e) => `${e.first} is in ${e.age === 11 ? 'her first year' : `her ${e.age - 10}${ord(e.age - 10)} year`} with ${e.species.toLowerCase()} — keeps a notebook on ${e.barnName}'s weight gain, has been weighing every Sunday after church on the platform scale at the Co-Op.`,
  (e) => `${e.first}'s mother ${pickFirstF()} called me in early May to ask whether the ${e.breed} was an honest breed for a first-year showman — I told her honest as any, and ${e.first} has proved it out.`,
  (e) => `Watch ${e.barnName}'s left ear when ${e.first} brings ${e.species === "Sheep" ? "her" : pick(["him","her"])} into the ring — it tips back when ${e.barnName} is listening for ${e.first}, and ${e.first} is the only one in the family ${e.barnName} listens for.`,
  (e) => `${e.first} got ${e.barnName} as a ${e.species === "Sheep" ? "lamb" : e.species === "Swine" ? "weanling" : e.species === "Dairy" ? "three-week calf" : "feeder calf"} in ${pick(["February","March","April"])} and has been at the barn before school every morning since.`,
  (e) => `Third generation showing — ${e.first}'s father showed for me in '52 and her uncle showed in '49 — they bring me a tin of ${pick(["divinity","fudge","peanut brittle","gingersnaps"])} every August at the secretary's table without fail.`,
  (e) => `${e.first} keeps a small spiral notebook in the barn where she writes down ${e.barnName}'s feed weights every morning — she showed me the notebook in May when I made the spring club visit, and the figures are kept honest.`,

// Pick 10 random indices for deeper notes (excluding special cases — we set those manually)

SEED = 19710819;
while (deeperSet.size < 8) {

  if (i !== 0 && i !== voelker1Idx && i !== voelker2Idx && i !== lyleIdx) deeperSet.add(i);
}
deeperSet.add(voelker1Idx);
deeperSet.add(voelker2Idx);

ENTRIES.forEach((e, i) => {
  if (deeperSet.has(i)) DEEPER_FLAGS.add(i);
  // pick a hook based on idx so it's stable
  SEED = 100000 + i * 7919;
  rand(); rand();
  const hookIdx = Math.floor(rand() * NOTE_HOOKS.length);
  ANNOTATIONS[i] = NOTE_HOOKS[hookIdx](e);
});

const ENTRIES_PER_PAGE = Math.ceil(ENTRIES.length / 12);

}
PAGES.push({ type: "back" });

// Group entries by club within a page
function renderRosterPage(page, pageIdx) {
  const byClub = {};
  page.entries.forEach(e => {
    if (!byClub[e.clubIdx]) byClub[e.clubIdx] = [];
    byClub[e.clubIdx].push(e);
  });
  let html = `<div class="page-head">
    <span class="brick">MONONA CO. FAIR · 1971</span>
    <span>YOUTH LIVESTOCK DIVISION</span>
    <span class="brick">PAGE ${page.pageNum}</span>
  </div>`;

  // Coffee ring on page 6
  if (page.pageNum === 6) {
    html += `<div class="coffee-ring" style="top: 180px; right: 30px;"></div>`;
  }

  Object.keys(byClub).forEach(ci => {
    const club = CLUBS[ci];
    const list = byClub[ci];
    html += `<div class="club-section">
      <div class="club-header">
        <span class="mini-clover">${cloverSVG()}</span>
        <span class="club-name">${club}</span>
        <span class="club-meta">CLUB NO. ${(parseInt(ci)+1).toString().padStart(2,'0')}</span>
      </div>`;
    list.forEach(e => {
      const isDeeper = DEEPER_FLAGS.has(e.idx);
      html += `<div class="entry" data-eidx="${e.idx}">
        <span class="name">${e.last.toUpperCase()}, ${e.first}</span><span class="sep">·</span>age ${e.age}<span class="sep">·</span>${e.parents}<span class="sep">·</span>${e.town} Rt. ${e.rt}<span class="sep">·</span>${e.species}: ${e.breed}<span class="sep">·</span>"${e.barnName}"<span class="sep">·</span>b. ${e.dob}<span class="sep">·</span>s. ${e.sire}<span class="sep">·</span>d. ${e.dam}<span class="sep">·</span>${e.ribbons}<span class="ast">*</span>${isDeeper ? '<span class="ast2">*</span>' : ''}
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

// STATE / PAGE-FLIP
// =================================================================
let currentSpread = 0; // 0 = cover-alone, 1..6 = roster spreads, 7 = back-alone
const TOTAL_SPREADS = 1 + 6 + 1;

function renderSpread() {
  const spreadEl = document.getElementById('spread');
  spreadEl.innerHTML = '';

  if (currentSpread === 0) {
    spreadEl.innerHTML = renderCover();
  } else if (currentSpread === TOTAL_SPREADS - 1) {
    spreadEl.innerHTML = renderBack();
    setupBackCover();
  } else {
    // roster spread: two pages
    const leftPageIdx = (currentSpread - 1) * 2 + 1;
    const rightPageIdx = leftPageIdx + 1;
    const left = PAGES[leftPageIdx];
    const right = PAGES[rightPageIdx];
    if (left && left.type === 'roster') {
      spreadEl.innerHTML += `<div class="page left-page">${renderRosterPage(left)}<div class="page-num left">${roman(left.pageNum)}</div></div>`;
    } else {
      spreadEl.innerHTML += `<div class="page"></div>`;
    }
    if (right && right.type === 'roster') {
      spreadEl.innerHTML += `<div class="page right-page">${renderRosterPage(right)}<div class="page-num right">${roman(right.pageNum)}</div></div>`;
    } else {
      spreadEl.innerHTML += `<div class="page"></div>`;
    }
  }

  // Add page-turn corners
  if (currentSpread > 0) {
    const leftCorner = document.createElement('div');
    leftCorner.className = 'corner left';
    leftCorner.innerHTML = `<svg viewBox="0 0 70 70"><polygon class="corner-fold" points="0,70 0,30 40,70"/></svg>`;
    leftCorner.onclick = () => flipPage(-1);
    document.getElementById('booklet').appendChild(leftCorner);
  }
  if (currentSpread < TOTAL_SPREADS - 1) {
    const rightCorner = document.createElement('div');
    rightCorner.className = 'corner right';
    rightCorner.innerHTML = `<svg viewBox="0 0 70 70"><polygon class="corner-fold" points="70,70 70,30 30,70"/></svg>`;
    rightCorner.onclick = () => flipPage(1);
    document.getElementById('booklet').appendChild(rightCorner);
  }

  setupHoverAnnotations();
  setupMastheadHover();
  renderNavDots();
}

function flipPage(dir) {
  // Remove old corners
  document.querySelectorAll('.corner').forEach(c => c.remove());
  const next = currentSpread + dir;
  if (next < 0 || next >= TOTAL_SPREADS) return;
  playPaperRustle();
  currentSpread = next;
  // Fade transition
  const spread = document.getElementById('spread');
  spread.style.opacity = '0';
  spread.style.transition = 'opacity 0.35s ease';
  setTimeout(() => {
    renderSpread();
    spread.style.opacity = '1';
  }, 300);
}

function renderNavDots() {
  const nav = document.getElementById('navDots');
  nav.innerHTML = '';
  for (let i = 0; i < TOTAL_SPREADS; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentSpread ? ' active' : '');
    dot.onclick = () => {
      document.querySelectorAll('.corner').forEach(c => c.remove());
      currentSpread = i;
      playPaperRustle();
      renderSpread();
    };
    nav.appendChild(dot);
  }
}

function roman(n) {
  const m = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
  return m[n - 1] || n;
}

// HOVER ANNOTATIONS
// =================================================================
const annotationEl = document.getElementById('annotation');
const deeperAnnotationEl = document.getElementById('deeperAnnotation');
let hoverTimer = null;
let deeperHoverTimer = null;

function setupHoverAnnotations() {
  document.querySelectorAll('.entry').forEach(entry => {
    entry.addEventListener('mouseenter', (ev) => {
      const idx = parseInt(entry.dataset.eidx);
      const text = ANNOTATIONS[idx];
      const e = ENTRIES[idx];
      annotationEl.innerHTML = `${text}<span class="sig">— P.G.</span>`;
      positionAnnotation(annotationEl, ev);
      annotationEl.classList.add('show');

      if (DEEPER_FLAGS.has(idx)) {
        clearTimeout(deeperHoverTimer);
        deeperHoverTimer = setTimeout(() => {
          deeperAnnotationEl.innerHTML = `${DEEPER_NOTES[idx]}<span class="sig">— P.G.</span>`;
          positionDeeperAnnotation(deeperAnnotationEl);
          deeperAnnotationEl.classList.add('show');
        }, 3000);
      }
    });
    entry.addEventListener('mousemove', (ev) => {
      if (annotationEl.classList.contains('show')) positionAnnotation(annotationEl, ev);
    });
    entry.addEventListener('mouseleave', () => {
      annotationEl.classList.remove('show');
      deeperAnnotationEl.classList.remove('show');
      clearTimeout(deeperHoverTimer);
    });
  });
}

function positionAnnotation(el, ev) {
  const w = el.offsetWidth || 280;
  const h = el.offsetHeight || 120;
  let x = ev.clientX + 24;
  let y = ev.clientY - 20;
  if (x + w > window.innerWidth - 10) x = ev.clientX - w - 24;
  if (y + h > window.innerHeight - 10) y = window.innerHeight - h - 10;
  if (y < 10) y = 10;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
}

function positionDeeperAnnotation(el) {
  const annoRect = annotationEl.getBoundingClientRect();
  let x = annoRect.left;
  let y = annoRect.bottom + 12;
  const w = el.offsetWidth || 280;
  const h = el.offsetHeight || 120;
  if (y + h > window.innerHeight - 10) {
    y = annoRect.top - h - 12;
  }
  if (x + w > window.innerWidth - 10) x = window.innerWidth - w - 10;
  if (x < 10) x = 10;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
}

function setupMastheadHover() {
  const clover = document.getElementById('cloverHover');
  const note = document.getElementById('mastheadNote');
  if (!clover || !note) return;
  let timer = null;
  clover.addEventListener('mouseenter', () => {
    timer = setTimeout(() => note.classList.add('show'), 4000);
  });
  clover.addEventListener('mouseleave', () => {
    clearTimeout(timer);
    note.classList.remove('show');
  });
}

// =================================================================
// BACK COVER — Program + Guestbook + Tally
// =================================================================
function setupBackCover() {
  // Populate class chips
  Object.keys(CLASSES).forEach(day => {
    const container = document.querySelector(`.class-list[data-day="${day}"]`);
    if (!container) return;
    CLASSES[day].forEach(cls => {
      const chip = document.createElement('button');
      chip.className = 'class-chip';
      chip.textContent = cls;
      const key = day + "|" + cls;
      if (getPinned().includes(key)) chip.classList.add('picked');
      chip.onclick = () => {
        let pinned = getPinned();
        if (pinned.includes(key)) {
          pinned = pinned.filter(k => k !== key);
          chip.classList.remove('picked');
        } else {
          pinned.push(key);
          chip.classList.add('picked');
        }
        localStorage.setItem('mc1971_pinned', JSON.stringify(pinned));
        renderSlip();
        checkProgramVisit();
      };
      container.appendChild(chip);
    });
  });

  renderSlip();
  renderGuestbook();
  renderTally();

  // Guestbook submit
  document.getElementById('gbSubmit').onclick = () => {
    const input = document.getElementById('gbInput');
    const txt = input.value.trim();
    if (!txt) return;
    addGuestbookEntry(txt);
    input.value = '';
    renderGuestbook();
    incrementTally();
    recordVisitDate();
  };
  document.getElementById('gbInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('gbSubmit').click();
  });
}

function getPinned() {
  try { return JSON.parse(localStorage.getItem('mc1971_pinned') || '[]'); }
  catch { return []; }
}

function renderSlip() {
  const pinned = getPinned();
  const body = document.getElementById('slipBody');
  if (!body) return;
  if (!pinned.length) {
    body.innerHTML = `<span class="empty">no classes pinned yet</span>`;
    return;
  }
  const dayNames = { wed: "Wed.", thu: "Thu.", fri: "Fri.", sat: "Sat." };
  const dayOrder = ['wed','thu','fri','sat'];
  const grouped = {};
  pinned.forEach(p => {
    const [d, c] = p.split('|');
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(c);
  });
  let html = '';
  dayOrder.forEach(d => {
    if (grouped[d]) {
      grouped[d].forEach(c => {
        html += `<span class="slip-line">${dayNames[d]} — ${c}</span>`;
      });
    }
  });
  body.innerHTML = html;
}

function getGuestbook() {
  try { return JSON.parse(localStorage.getItem('mc1971_gb') || '[]'); }
  catch { return []; }
}

function addGuestbookEntry(txt) {
  const gb = getGuestbook();
  gb.push({ text: txt, t: Date.now() });
  localStorage.setItem('mc1971_gb', JSON.stringify(gb));
}

const SEED_GB_ENTRIES = [
  { text: "Came for my niece Becky Tessien — Castana Cardinals — second from the left in the lamb line.", sig: "— Marvella T., Sioux City" },
  { text: "Took the bus down from Sloan to see the Voelker twins' heifers. Stayed for the showmanship.", sig: "— Wilbur H." },

  { text: "Came to thank Mrs. Gaffigan in person. Nineteen years is a long time to remember everyone.", sig: "— P." }
];

function renderGuestbook() {
  const container = document.getElementById('gbEntries');
  if (!container) return;
  const userEntries = getGuestbook();
  container.innerHTML = '';

  SEED_GB_ENTRIES.forEach(e => {
    const div = document.createElement('div');
    div.className = 'gb-entry';
    div.innerHTML = `${escapeHTML(e.text)}<span class="sig">${escapeHTML(e.sig)}</span>`;
    container.appendChild(div);
  });

  userEntries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'gb-entry';
    const d = new Date(e.t);
    const day = `${d.toLocaleString('en-US', { month: 'short' })} ${d.getDate()}`;
    div.innerHTML = `${escapeHTML(e.text)}<span class="sig">— a fairgoer · ${day}</span>`;
    container.appendChild(div);
  });

  // Check for hidden 248th entry
  if (shouldShowGaffigan()) {
    const div = document.createElement('div');
    div.className = 'gb-entry gaffigan';
    div.innerHTML = `GAFFIGAN, P. — age 53 — Onawa Iowa — Monona County 4-H Secretary since 1953 — not an exhibitor in any class — showing nothing this year — but I have been at every fair since 1953 and I have signed my own back cover every year as if I were one of the kids because I am part of this too.<span class="sig">— P.G.</span>`;
    container.appendChild(div);
  }
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Tally — local + shared persistent count starting at 1847
function getTallyLocal() { return parseInt(localStorage.getItem('mc1971_tally') || '1847'); }
function incrementTally() {
  const cur = getTallyLocal() + 1;
  localStorage.setItem('mc1971_tally', String(cur));
  renderTally();
}
function renderTally() {
  const t = document.getElementById('tally');
  if (!t) return;
  const n = getTallyLocal();
  // Render as a row of pencilled tally marks (groups of 5)
  // For 1847 we don't render all; render summary + a small group
  const remainder = n % 100;
  let marks = '';
  for (let i = 0; i < Math.min(remainder, 50); i++) {
    marks += (i > 0 && i % 5 === 4) ? '/' : '|';
    if (i % 5 === 4) marks += ' ';
  }
  t.innerHTML = `<span>fairgoers who signed this year: <strong>${n.toLocaleString()}</strong></span><br><span class="marks">${marks}</span>`;
}

// Wildcard unlock: 3 separate calendar dates of signing + 2 full programs
function getVisitDates() {
  try { return JSON.parse(localStorage.getItem('mc1971_visits') || '[]'); }
  catch { return []; }
}
function recordVisitDate() {
  const today = new Date().toISOString().slice(0,10);
  const dates = getVisitDates();
  if (!dates.includes(today)) {
    dates.push(today);
    localStorage.setItem('mc1971_visits', JSON.stringify(dates));
  }
}
function getFullProgramCount() {
  return parseInt(localStorage.getItem('mc1971_fullPrograms') || '0');
}
function checkProgramVisit() {
  const pinned = getPinned();
  const days = new Set(pinned.map(p => p.split('|')[0]));
  if (days.has('wed') && days.has('thu') && days.has('fri') && days.has('sat')) {
    const cur = getFullProgramCount() + 1;
    localStorage.setItem('mc1971_fullPrograms', String(cur));
    renderGuestbook();
  }
}
function shouldShowGaffigan() {
  return getVisitDates().length >= 3 && getFullProgramCount() >= 2;
}

// =================================================================
// PAPER RUSTLE — Web Audio API
// =================================================================
let audioCtx = null;
function playPaperRustle() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const dur = 0.4;
    const buffer = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = Math.pow(1 - i / data.length, 1.5) * (1 - Math.exp(-i / 800));
      data[i] = (Math.random() * 2 - 1) * env * 0.18;
    }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3800;
    filter.Q.value = 0.6;
    const gain = ctx.createGain();
    gain.gain.value = 0.7;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch (e) {}
}
