  <meta name="outbox-spec-era" content="1908 — peak American small-town summer-evening porch firefly-watching era, the very specific moment in early-twentieth-century American childhood when the screened-in front porches of frame houses on tree-lined residential streets in places like Bloomington Indiana and Athens Ohio and Decatur Illinois became, during the brief three-week window of late June through mid-July, the staging ground for a quiet domestic ritual of watching the field across the street fill with Photinus pyralis (the common Eastern firefly) beginning at approximately 8:47pm Central Daylight Time as full dusk settled into true night and the fireflies rose from the tall June grass in slow ascending zigzags, the male beetles signaling with their species-specific J-shaped half-second flash pattern at six-second intervals while the females answered from the grass with a brief two-second response flash two seconds after the male's J, the entire courtship infrastructure of a small native beetle species coordinating its mating across an entire midwestern field while a family of five sat on the porch in wicker chairs with glass tumblers of lemonade and watched without speaking; the specific patient hobby-naturalist practice among amateur entomologists of the era — schoolteachers, country doctors, retired surveyors, the rare college-trained woman botanist — of keeping a small leather-bound flash-log notebook on the porch railing in which they recorded the evening's firefly activity in fine-tipped fountain-pen ink, noting the species observed (Photinus pyralis being most common, with occasional Photuris versicolor appearing later in the evening), the estimated flash frequency, the field temperature read from a small porch-mounted thermometer, the cloud cover, and any unusual behavioral observations, the entire practice carried on as a small private contribution to the slowly-accumulating national amateur knowledge of North American Lampyridae that was being collated by Professor Frank Alpheus McDermott of the U.S. Department of Agriculture's Bureau of Entomology in his ongoing 1907-1911 firefly census; the specific evening of Wednesday, July 8, 1908, at the porch of the Hollenbeck residence at 414 Linden Street in Bloomington Indiana, when retired surveyor Mr. Adelbert Hollenbeck (age 63, amateur naturalist since boyhood, contributor to the McDermott census since 1907) sat in his wicker chair with his flash-log notebook open and watched the field across the street fill with what he later recorded as 'an estimated 4,700 individuals in active display' — a typical evening's count for the second week of July at that latitude.">
  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece rendered in pure SVG and JavaScript: the entire browser window is the view from Mr. Hollenbeck's porch at 414 Linden Street looking out across Linden Street into the meadow at 9:14pm on Wednesday July 8, 1908, depicted as a deep blue-black field of summer dusk with the silhouettes of two tall elm trees at the far edge against a slightly lighter horizon-band and the faint suggestion of a wooden fence at the field's near edge — and rising from the meadow are approximately 340 individual fireflies, each one a precisely-programmed Photinus pyralis male executing his species-specific J-shaped half-second courtship flash on a six-second interval, with each beetle's flash-path animated as a small warm yellow-green luminous trail that draws itself in a brief rising J-curve over exactly 0.5 seconds (bright peak at the curve's hook, fading along the trail) before going dark for the remainder of its six-second cycle, all 340 individuals out of phase with one another so the meadow continuously twinkles with new J-flashes appearing every few hundredths of a second; mixed in among the Photinus pyralis are approximately 28 Photuris versicolor females (slightly higher in the field, different flash signature — a longer single 1.2-second steady glow on an irregular schedule) who occasionally answer with a predatory mimicry flash that draws a nearby Photinus toward her position, after which the Photinus disappears from the field permanently (Photuris females eat Photinus males — a real ecological fact rendered as a small quiet event roughly every 90 seconds); each firefly's vertical position in the meadow is tied to its mating-flight altitude (Photinus rise slowly across each cycle, drifting upward 1-2 pixels per flash), so over the course of the visit the meadow's overall flash-cloud gradually rises from grass-level toward elm-canopy level; the cursor's position influences nothing — the meadow does not care that the visitor is on the porch, and the fireflies will continue their patient courtship whether anyone is watching or not.">
  <meta name="outbox-spec-subject" content="The specific Photinus pyralis courtship activity in the meadow across from 414 Linden Street, Bloomington Indiana, on the evening of Wednesday, July 8, 1908, between approximately 8:47pm and 10:30pm Central Daylight Time — a field temperature of 78°F at dusk dropping to 71°F by 10pm, partly cloudy with a waxing gibbous moon rising in the east, the second week of peak Lampyridae display season at this latitude, with an estimated 4,700 active Photinus pyralis males signaling with their characteristic J-flash and an estimated 280 Photuris versicolor females also active in the field, several of the Photuris employing predatory mimicry flashes to lure and consume Photinus males (a behavior first formally documented in the entomological literature by J.E. Lloyd in 1965 but observed and quietly puzzled over by amateur naturalists like Mr. Hollenbeck decades earlier — Mr. Hollenbeck has noted in his flash-log seven evenings this season the specific anomaly of certain females whose answer-flash 'rings false in some way I cannot quite name' and whose nearby males 'do not return to the air after approaching them,' a passage from his July 3 entry that he has underlined twice in fountain pen and that he is planning to include in his September contribution to Professor McDermott's census); Mr. Hollenbeck himself, age 63, in his wicker chair on the porch with the leather-bound flash-log open on his knee, a stub of #2 pencil tucked behind his ear, the lemonade glass sweating onto the wicker side-table, his wife Cordelia in the next chair quietly reading a copy of the Atlantic Monthly by the light of a small kerosene porch lamp turned low so as not to interfere with the field's natural darkness, and the field itself — the entire small ecological-romantic infrastructure of approximately five thousand beetles coordinating a species-specific courtship across one specific meadow on one specific Wednesday evening in 1908, observed but not interfered with by one specific patient retired surveyor and his wife.">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible on the page at any point. The piece speaks only through the silent patient rising-and-fading of small luminous J-curves across a dark meadow. The closest analogue to a voice is the silent steady attentiveness of Mr. Hollenbeck himself in his wicker chair: present-tense, unhurried, neither performing nor explaining, the visual equivalent of sitting on a porch in July 1908 and watching a field do what it does every summer evening for the three weeks that this particular species pairs off and continues itself, with no expectation that the field perform for the observer and no interpretation imposed on what the field is doing — only the quiet patient act of watching small lights rise and fade in a dark place where small lights have risen and faded every summer for ten thousand years.">

  <meta name="outbox-spec-forbidden" content="Absolutely NO text, captions, labels-explaining-the-piece, title overlays, instructional UI, tooltip hints, loading messages, footer credits, watermarks, or any narrating voice anywhere on the page visible to the visitor — the piece must be entirely silent and entirely visual. NO museum-archival 'remember when fireflies were everywhere' nostalgic detachment, NO soft melancholy about 'the lost summer evenings of childhood' or 'the disappearance of Photinus pyralis from suburban America,' NO cool ironic distance from porch-sitting culture as quaint pre-television Americana, NO retrospective elegy framing Mr. Hollenbeck or Bloomington or 414 Linden Street as already-vanished. NO 'fireflies are disappearing due to light pollution' environmentalist messaging, NO climate-grief register, NO 'remember when summers were like this' wistfulness. NO horror-genre framing of the Photuris predatory mimicry as creepy/sinister/uncanny — it is a real ecological behavior happening in a real meadow, neither tragic nor monstrous, simply how Photuris females have evolved to feed. NO 'the fireflies are signaling something else' twist, NO suggestion that the anomalous 23-minute flash is supernatural or otherworldly. NO Studio-Ghibli fairyland-aesthetic prettification, NO Disney-magic-pixie-dust framing, NO Pinterest-quote 'and the fireflies danced for us' sentimentality. NO night-shift dispatcher voice, NO lowercase sentence-fragments, NO hyperminimal museum-card prose, NO SCP-cryptic register about the anomalous flash, NO archival cabinet/drawer/vault framing of the meadow as relic, NO observatory/society/club scaffolding of amateur entomologists as fictional small-town society, NO radio/CB/broadcast/transmission framing of the firefly courtship as signal-network metaphor (it is not a signal network metaphor — it is a real species-specific bioluminescent communication system and it should be rendered as exactly what it is). NO weather-app or photo-viewer interface conventions, NO settings panels, NO playback controls, NO speed sliders, NO color-pickers, NO 'pause the meadow' buttons, NO 'how many fireflies tonight' counters visible to the visitor. NO Walt-Whitman barbaric-yawp Americana, NO Mary-Oliver poem-quote register, NO Thoreau 'simplify simplify' philosophical handwringing. The meadow exists, the fireflies rise and fade, the Photuris occasionally consume a Photinus, the temperature slowly drops, the moon slowly rises, the field continues, and the visitor watches in silence — that is the entire piece.">

<body>
<svg id="stage" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2848"/>
      <stop offset="0.32" stop-color="#101a36"/>
      <stop offset="0.62" stop-color="#0a1428"/>
      <stop offset="1" stop-color="#070f1f"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="0.18" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#3a4868" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3a4868" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampbleed" cx="1" cy="1" r="0.45">
      <stop offset="0" stop-color="#e8a73a" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#e8a73a" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b1"/>
      <feMerge>

    </filter>
    <filter id="bigbloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b2"/>

        <feMergeNode in="SourceGraphic"/>

  </defs>

  <rect id="bg" width="100%" height="100%" fill="url(#sky)"/>
  <rect id="moon" width="100%" height="100%" fill="url(#moonglow)" opacity="1"/>
  <rect id="lamp" width="100%" height="100%" fill="url(#lampbleed)"/>

  <g id="stars"></g>
  <g id="scenery"></g>
  <g id="flashes"></g>
</svg>

<a id="archive-link" href="/archive">other evenings on the porch</a>

<script>
(function(){
  "use strict";
  const svg = document.getElementById('stage');
  const flashesG = document.getElementById('flashes');
  const starsG = document.getElementById('stars');
  const sceneryG = document.getElementById('scenery');
  const moonRect = document.getElementById('moon');

  let W = window.innerWidth;
  let H = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const SVGNS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs){
    const n = document.createElementNS(SVGNS, tag);
    if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }
  const rand = (a,b) => a + Math.random()*(b-a);
  const randi = (a,b) => Math.floor(rand(a,b));

  // ---- static scenery ----
  function buildScenery(){
    while (sceneryG.firstChild) sceneryG.removeChild(sceneryG.firstChild);
    while (starsG.firstChild) starsG.removeChild(starsG.firstChild);

    // Stars in upper band
    const starCount = Math.floor(W * H / 14000);
    for (let i=0; i<starCount; i++){
      const sx = Math.random()*W;
      const sy = Math.random()*H*0.32;
      const s = el('circle', {
        cx: sx, cy: sy, r: Math.random()*0.7 + 0.2,
        fill: '#dce4f0', opacity: rand(0.18, 0.45)
      });
      starsG.appendChild(s);
    }

    // Horizon haze band
    const haze = el('rect', {
      x: 0, y: H*0.38, width: W, height: H*0.06,
      fill: '#1c2848', opacity: 0.35
    });
    sceneryG.appendChild(haze);

    // Two elm silhouettes
    function elm(cx, scale){
      const trunkW = 6*scale;
      const trunkH = H*0.18*scale;
      const baseY = H*0.55;
      const trunk = el('rect', {
        x: cx - trunkW/2, y: baseY - trunkH*0.2,
        width: trunkW, height: trunkH*0.4,
        fill: '#050810'
      });
      sceneryG.appendChild(trunk);
      const crownR = 90*scale;
      const crownCy = baseY - trunkH*0.2 - crownR*0.55;
      // irregular blob
      let d = '';
      const pts = 18;
      for (let i=0; i<=pts; i++){
        const a = (i/pts)*Math.PI*2;
        const r = crownR * (0.78 + Math.random()*0.38) * (i===0?1:1);
        const x = cx + Math.cos(a)*r;
        const y = crownCy + Math.sin(a)*r*0.78;
        d += (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      }
      d += 'Z';
      const crown = el('path', { d: d, fill: '#050810' });
      sceneryG.appendChild(crown);
    }
    elm(W*0.18, 1.1);
    elm(W*0.82, 0.95);
    // small distant elm
    elm(W*0.55, 0.55);

    // Mid-field grass tint
    const mid = el('rect', {
      x: 0, y: H*0.55, width: W, height: H*0.35,
      fill: '#0e1830', opacity: 0.7
    });
    sceneryG.appendChild(mid);

    // Near fence — slats
    const fenceY = H*0.78;
    const fenceRail1 = el('rect', { x: 0, y: fenceY, width: W, height: 2.5, fill: '#1a1f2e' });
    sceneryG.appendChild(fenceRail1);
    const fenceRail2 = el('rect', { x: 0, y: fenceY + 16, width: W, height: 2.5, fill: '#1a1f2e' });
    sceneryG.appendChild(fenceRail2);
    const slatGap = 18;
    for (let x = 4; x < W; x += slatGap){
      const slat = el('rect', {
        x: x + (Math.random()*1.4 - 0.7), y: fenceY - 6,
        width: 1.8, height: 28,
        fill: '#1a1f2e'
      });
      sceneryG.appendChild(slat);
    }

    // Foreground darker (porch shadow)
    const fg = el('rect', {
      x: 0, y: H*0.86, width: W, height: H*0.14,
      fill: '#050810', opacity: 0.85
    });
    sceneryG.appendChild(fg);
  }

  // ---- fireflies ----
  const POPULATION = 340;
  const FEMALES = 28;
  const males = [];
  const photurises = [];

  function meadowBounds(){
    // The meadow occupies horizontal full width,
    // vertical from ~0.42H (sky/horizon line) down to ~0.78H (fence)
    return {
      x0: 0,
      x1: W,
      y0: H*0.42,
      y1: H*0.78
    };
  }

  function spawnMale(rising){
    const b = meadowBounds();
    const m = {
      x: rand(b.x0, b.x1),
      y: rising ? b.y1 - rand(-4, 8) : rand(b.y0 + (b.y1-b.y0)*0.35, b.y1),
      vx: rand(-0.3, 0.3),
      vy: -rand(0.15, 0.4),
      phase: Math.random() * 6,
      hookDir: Math.random() < 0.5 ? -1 : 1,
      jLen: rand(14, 22),
      jSide: rand(6, 10),
      hijacked: false,
      hijackTarget: null,
      hijackTime: 0,
      consumed: false,
      lastFlashTime: -Infinity,
      anomalous: false,
      anomalousUntil: 0,
      pathNode: null,
      _flashing: false
    };
    males.push(m);
    return m;
  }

  function spawnPhoturis(){
    const b = meadowBounds();
    const f = {
      x: rand(b.x0, b.x1),
      y: rand(b.y0 + (b.y1-b.y0)*0.15, b.y0 + (b.y1-b.y0)*0.55),
      nextFlash: rand(2, 14),
      flashUntil: 0,
      consuming: false,
      consumingFlare: 0,
      predatoryLureActive: false,
      predatoryLureUntil: 0,
      vx: rand(-0.04, 0.04)
    };
    photurises.push(f);
    return f;
  }

  function initPopulations(){
    males.length = 0;
    photurises.length = 0;
    for (let i=0; i<POPULATION; i++) spawnMale(false);
    for (let i=0; i<FEMALES; i++) spawnPhoturis();
  }

  // ---- flash rendering ----
  function drawJFlash(m, anomalous){
    // J path: start at (m.x, m.y), rise jLen vertically curving jSide horizontally on hookDir
    const sx = m.x, sy = m.y;
    const ex = sx + m.jSide * m.hookDir;
    const ey = sy - m.jLen;
    // Cubic bezier creating a J: long straight rise then hook
    const c1x = sx;
    const c1y = sy - m.jLen*0.55;
    const c2x = sx;
    const c2y = sy - m.jLen*0.92;
    const d = `M ${sx} ${sy} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${ex} ${ey}`;

    const color = anomalous ? '#f3f4b6' : '#dceb6e';
    const haloColor = anomalous ? '#c8c87e' : '#9eb45a';

    // Halo (under)
    const halo = el('path', {
      d: d,
      stroke: haloColor,
      'stroke-width': 5.5,
      'stroke-linecap': 'round',
      fill: 'none',
      filter: 'url(#bigbloom)',
      opacity: 0
    });
    // Main stroke
    const main = el('path', {
      d: d,
      stroke: color,
      'stroke-width': 1.6,
      'stroke-linecap': 'round',
      fill: 'none',
      filter: 'url(#bloom)',
      opacity: 0
    });
    // Bright head dot (where the J hooks — peak brightness)
    const head = el('circle', {
      cx: ex, cy: ey, r: 1.6,
      fill: '#ffffff',
      filter: 'url(#bloom)',
      opacity: 0
    });

    flashesG.appendChild(halo);
    flashesG.appendChild(main);
    flashesG.appendChild(head);

    // Use stroke-dashoffset for draw-in
    const length = approxPathLen(sx,sy,ex,ey,m.jLen);
    main.setAttribute('stroke-dasharray', length);
    main.setAttribute('stroke-dashoffset', length);
    halo.setAttribute('stroke-dasharray', length);
    halo.setAttribute('stroke-dashoffset', length);

    const startT = performance.now();
    const totalDur = anomalous ? 1100 : 500; // anomalous: 0.5s glow + 3x0.1s
    function step(now){
      const t = (now - startT) / 500;
      if (!anomalous){
        if (t < 1){
          const drawT = t;
          main.setAttribute('stroke-dashoffset', length * (1 - drawT));
          halo.setAttribute('stroke-dashoffset', length * (1 - drawT));
          // brightness: peak near the hook (drawT ~ 0.85)
          const bright = Math.sin(drawT * Math.PI);
          main.setAttribute('opacity', (0.9 * bright).toFixed(3));
          halo.setAttribute('opacity', (0.55 * bright).toFixed(3));
          head.setAttribute('opacity', drawT > 0.7 ? ((drawT - 0.7) / 0.3 * 0.95).toFixed(3) : '0');
          requestAnimationFrame(step);
        } else {
          // fade out remainder
          const fadeT = (now - startT - 500) / 300;
          if (fadeT < 1){
            const o = 1 - fadeT;
            main.setAttribute('opacity', (0.4 * o).toFixed(3));
            halo.setAttribute('opacity', (0.35 * o).toFixed(3));
            head.setAttribute('opacity', (0.6 * o).toFixed(3));
            requestAnimationFrame(step);
          } else {
            halo.remove(); main.remove(); head.remove();
            m._flashing = false;
          }
        }
      } else {
        // ANOMALOUS pattern:
        // 0–500ms: steady glow drawing J like normal but holding bright
        // 500–600ms: dark
        // 600–700ms: sub-flash 1
        // 700–800ms: dark
        // 800–900ms: sub-flash 2
        // 900–1000ms: dark
        // 1000–1100ms: sub-flash 3
        const elapsed = now - startT;
        if (elapsed < 500){
          const drawT = elapsed / 500;
          main.setAttribute('stroke-dashoffset', length * (1 - drawT));
          halo.setAttribute('stroke-dashoffset', length * (1 - drawT));
          main.setAttribute('opacity', '0.95');
          halo.setAttribute('opacity', '0.65');
          head.setAttribute('opacity', drawT > 0.7 ? '0.95' : '0');
          requestAnimationFrame(step);
        } else if (elapsed < 1100){
          const ph = elapsed - 500;
          // 100ms cycles: on/off
          // 0-100 off, 100-200 on, 200-300 off, 300-400 on, 400-500 off, 500-600 on
          const slot = Math.floor(ph / 100);
          const on = (slot === 1 || slot === 3 || slot === 5);
          const intra = (ph % 100) / 100;
          const bright = on ? Math.sin(intra * Math.PI) : 0;
          main.setAttribute('opacity', (0.95 * bright).toFixed(3));
          halo.setAttribute('opacity', (0.7 * bright).toFixed(3));
          head.setAttribute('opacity', (0.95 * bright).toFixed(3));
          requestAnimationFrame(step);
        } else {
          halo.remove(); main.remove(); head.remove();
          m._flashing = false;
        }
      }
    }
    m._flashing = true;
    requestAnimationFrame(step);
  }

  function approxPathLen(sx,sy,ex,ey,jLen){
    // rough approximation: vertical rise + hook curve
    return Math.abs(jLen) + Math.abs(ex - sx) + 4;
  }

  function drawPhoturisFlash(f, isLure, isConsumeFlare){
    const dur = isConsumeFlare ? 800 : 1200;
    const color = '#e8d878';
    const halo = el('circle', {
      cx: f.x, cy: f.y, r: 9,
      fill: color,
      filter: 'url(#bigbloom)',
      opacity: 0
    });
    const core = el('circle', {
      cx: f.x, cy: f.y, r: 1.8,
      fill: '#fff8c8',
      filter: 'url(#bloom)',
      opacity: 0
    });
    flashesG.appendChild(halo);
    flashesG.appendChild(core);
    const startT = performance.now();
    function step(now){
      const t = (now - startT) / dur;
      if (t < 1){
        // ease in and out, hold middle
        let env;
        if (t < 0.15) env = t / 0.15;
        else if (t > 0.7) env = (1 - t) / 0.3;
        else env = 1;
        const peak = isConsumeFlare ? 1.0 : (isLure ? 0.85 : 0.75);
        halo.setAttribute('opacity', (0.55 * env * peak).toFixed(3));
        core.setAttribute('opacity', (0.9 * env * peak).toFixed(3));
        requestAnimationFrame(step);
      } else {
        halo.remove(); core.remove();
      }
    }
    requestAnimationFrame(step);
  }

  // ---- simulation state ----
  const startTime = performance.now();
  let lastFrame = startTime;
  let nextPredatoryAttempt = 90 + rand(-20, 20);
  const ANOMALY_INTERVAL = 23 * 60; // seconds
  let nextAnomaly = ANOMALY_INTERVAL;
  let baseRiseOffset = 0; // tracks meadow rise across visit

  function currentFlashInterval(){
    // 78F -> 6.0s, 70F -> 7.2s, drop 0.3F/min toward 70 asymptote starting 78
    const elapsedMin = (performance.now() - startTime) / 60000;
    const targetTemp = 70;
    const startTemp = 78;
    // exponential approach: T = 70 + 8 * exp(-k*min); choose k so that drops 0.3 first minute -> 8 -> 7.7
    const k = 0.0375; // 8 * (1 - e^-0.0375) ~= 0.29
    const T = targetTemp + (startTemp - targetTemp) * Math.exp(-k * elapsedMin);
    // linear interp between 6.0 (78F) and 7.2 (70F)
    const frac = (startTemp - T) / (startTemp - targetTemp); // 0..1
    return 6.0 + 1.2 * Math.max(0, Math.min(1, frac));
  }

  function tick(now){
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    const elapsedS = (now - startTime) / 1000;

    const b = meadowBounds();
    const interval = currentFlashInterval();

    // Slow moon brighten over 15min, then "reset" at start (we approximate by resetting every visit)
    const moonCycle = (elapsedS % 900) / 900; // 0..1 across 15min
    const moonOp = 1 + 0.08 * moonCycle;
    moonRect.setAttribute('opacity', moonOp.toFixed(3));

    // Update males
    for (let i = males.length - 1; i >= 0; i--){
      const m = males[i];
      if (m.consumed) {
        males.splice(i,1);
        continue;
      }

      if (m.hijacked && m.hijackTarget){
        // move directly toward target over 4-6s remaining
        const tgt = m.hijackTarget;
        const dx = tgt.x - m.x;
        const dy = tgt.y - m.y;
        const dist = Math.hypot(dx, dy);
        const remaining = Math.max(0.5, m.hijackTime - elapsedS);
        const speed = dist / remaining;
        m.x += (dx/Math.max(0.01,dist)) * speed * dt;
        m.y += (dy/Math.max(0.01,dist)) * speed * dt;
        if (dist < 4 || elapsedS >= m.hijackTime){
          // consume
          drawPhoturisFlash(tgt, false, true);
          tgt.consuming = false;
          m.consumed = true;
          males.splice(i,1);
          // schedule replenishment
          setTimeout(() => spawnMale(true), rand(0, 30000));
          continue;
        }
      } else {
        m.x += m.vx * dt;
        m.y += m.vy * dt;
        // wrap horizontally
        if (m.x < b.x0 - 20) m.x = b.x1 + 10;
        if (m.x > b.x1 + 20) m.x = b.x0 - 10;
        // clamp vertical to meadow
        if (m.y < b.y0 + (b.y1 - b.y0)*0.05){
          // settle at top of meadow band — drift sideways
          m.y = b.y0 + (b.y1 - b.y0)*0.05;
          m.vy = 0;
        }
        if (m.y > b.y1) m.y = b.y1;
      }

      // Flash cycle
      if (!m._flashing){
        m.phase += dt;
        if (m.phase >= interval){
          m.phase = 0;
          let anomalousThis = false;
          if (m.anomalous && elapsedS < m.anomalousUntil){
            anomalousThis = true;
            m.anomalous = false;
          }
          drawJFlash(m, anomalousThis);
          m.lastFlashTime = elapsedS;
        }
      }
    }

    // Update photurises
    for (const f of photurises){
      f.x += f.vx * dt;
      if (f.x < b.x0) { f.x = b.x0; f.vx = -f.vx; }
      if (f.x > b.x1) { f.x = b.x1; f.vx = -f.vx; }
      f.nextFlash -= dt;
      if (f.nextFlash <= 0 && !f.predatoryLureActive){
        drawPhoturisFlash(f, false, false);
        f.nextFlash = rand(8, 14);
      }
    }

    // Predatory mimicry event
    if (elapsedS >= nextPredatoryAttempt){
      // pick a photuris and a nearby photinus male within 120px
      const f = photurises[randi(0, photurises.length)];
      if (f){
        let nearest = null;
        let nearestD = Infinity;
        for (const m of males){
          if (m.hijacked || m.consumed) continue;
          const d = Math.hypot(m.x - f.x, m.y - f.y);
          if (d < 120 && d < nearestD){
            nearest = m; nearestD = d;
          }
        }
        if (nearest){
          // emit mimicry flash
          drawPhoturisFlash(f, true, false);
          f.predatoryLureActive = true;
          f.predatoryLureUntil = elapsedS + 2;
          nearest.hijacked = true;
          nearest.hijackTarget = f;
          nearest.hijackTime = elapsedS + rand(4, 6);
        }
      }
      nextPredatoryAttempt = elapsedS + 90 + rand(-20, 20);
    }
    // clear lure flag after duration
    for (const f of photurises){
      if (f.predatoryLureActive && elapsedS >= f.predatoryLureUntil){
        f.predatoryLureActive = false;
      }
    }

    // Anomaly every 23 minutes
    if (elapsedS >= nextAnomaly){
      // pick a random male to flash anomalously on its next cycle
      if (males.length){
        const m = males[randi(0, males.length)];
        m.anomalous = true;
        m.anomalousUntil = elapsedS + interval + 2;
      }
      nextAnomaly += ANOMALY_INTERVAL;
    }

    requestAnimationFrame(tick);
  }

  // ---- resize ----
  function onResize(){
    W = window.innerWidth;
    H = window.innerHeight;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    buildScenery();
  }
  window.addEventListener('resize', () => {
    onResize();
  });

  // ---- init ----
  buildScenery();
  initPopulations();
  requestAnimationFrame(tick);

  // Hidden console note for the patient observer
  console.log('%c414 Linden Street, Bloomington — 9:14 P.M., July 8, 1908. The field will continue.', 'color:#9eb45a;font-style:italic');
})();
</script>
