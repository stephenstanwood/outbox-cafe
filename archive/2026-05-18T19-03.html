<body>

<div class="frame">

  <header class="head">
    <h1>Maple Street Community Center</h1>
    <div class="sub">Bulletin Board · Pin one up, take one down · Be kind to your neighbors</div>
  </header>

  <div class="toolbar">
    <span class="label">Show:</span>
    <div class="filters" id="filters">
      <button data-cat="all" class="active">All</button>
      <button data-cat="classes">Classes</button>
      <button data-cat="lost">Lost &amp; Found</button>
      <button data-cat="services">Services</button>
      <button data-cat="events">Community Events</button>
      <button data-cat="forsale">For Sale</button>
      <button data-cat="other">Other</button>
      <button class="pin-btn" id="open-form">+ Pin a Notice</button>
    </div>
  </div>

  <div class="form-panel" id="form-panel">
    <h2>Pin a New Notice</h2>
    <div class="hint">Print neatly. The board fills up fast on Saturdays.</div>
    <form id="new-notice">
      <label for="f-cat">Category</label>
      <select id="f-cat" required>
        <option value="classes">Classes</option>
        <option value="lost">Lost &amp; Found</option>
        <option value="services">Services</option>
        <option value="events">Community Events</option>
        <option value="forsale">For Sale</option>
        <option value="other">Other</option>
      </select>

      <label for="f-title">Title</label>
      <input id="f-title" maxlength="60" required placeholder="e.g. Free kittens — 8 weeks old">

      <label for="f-name">Your Name</label>
      <input id="f-name" maxlength="40" required placeholder="e.g. Margaret on Linden St.">

      <label for="f-contact">Contact</label>
      <input id="f-contact" maxlength="60" required placeholder="Phone, or how to reach you">

      <label for="f-msg">Message</label>
      <textarea id="f-msg" maxlength="600" required placeholder="The details neighbors will want to know."></textarea>

      <div class="row">
        <button type="submit" class="submit">Pin It Up</button>
        <button type="button" class="cancel" id="cancel-form">Cancel</button>
      </div>
    </form>
  </div>

  <div class="board">
    <div class="grid" id="grid"></div>
  </div>

</div>

<footer>
  <a href="/archive">other postings on the board →</a>
</footer>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="card">
    <button class="close" id="close-overlay" aria-label="Close">×</button>
    <div class="ocat" id="o-cat"></div>
    <h2 id="o-title"></h2>
    <div class="body" id="o-body"></div>
    <div class="who">
      Posted by <strong id="o-name"></strong><br>
      Contact: <strong id="o-contact"></strong><br>
      <span id="o-when"></span>
    </div>
  </div>
</div>

  const STORAGE_KEY = "maple-board-notices-v1";
  const FILTER_KEY = "maple-board-filter-v1";

  function loadNotices(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return SEED.slice();
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed) || parsed.length === 0) return SEED.slice();
      return parsed;
    } catch(e){
      return SEED.slice();
    }
  }

  function saveNotices(list){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch(e){}
  }

  function loadFilter(){
    try { return localStorage.getItem(FILTER_KEY) || "all"; } catch(e){ return "all"; }
  }
  function saveFilter(f){
    try { localStorage.setItem(FILTER_KEY, f); } catch(e){}
  }

  let notices = loadNotices();
  let activeFilter = loadFilter();

  const grid = document.getElementById("grid");
  const overlay = document.getElementById("overlay");
  const formPanel = document.getElementById("form-panel");

  function render(){
    grid.innerHTML = "";
    notices.forEach((n, idx) => {
      const el = document.createElement("div");
      const style = n.style || STYLES[idx % STYLES.length];
      el.className = "notice " + style;
      if (activeFilter !== "all" && n.cat !== activeFilter) el.classList.add("hidden");
      el.dataset.idx = idx;
      el.innerHTML =
        '<span class="pin"></span>' +
        '<div class="cat">' + (CAT_LABELS[n.cat] || "Other") + '</div>' +
        '<h3></h3>' +
        '<div class="preview"></div>' +
        '<div class="meta"></div>';
      el.querySelector("h3").textContent = n.title;
      const preview = (n.body || "").split("\n")[0];
      el.querySelector(".preview").textContent =
        preview.length > 120 ? preview.slice(0, 117) + "…" : preview;
      el.querySelector(".meta").textContent = "— " + n.name;
      el.addEventListener("click", () => openOverlay(idx));
      grid.appendChild(el);
    });
    document.querySelectorAll("#filters button[data-cat]").forEach(b => {
      b.classList.toggle("active", b.dataset.cat === activeFilter);
    });
  }

  function openOverlay(i){
    const n = notices[i];
    if (!n) return;
    document.getElementById("o-cat").textContent = CAT_LABELS[n.cat] || "Other";
    document.getElementById("o-title").textContent = n.title;
    document.getElementById("o-body").textContent = n.body;
    document.getElementById("o-name").textContent = n.name;
    document.getElementById("o-contact").textContent = n.contact;
    document.getElementById("o-when").textContent = n.when || "";
    overlay.classList.add("open");
  }

  function closeOverlay(){ overlay.classList.remove("open"); }

  document.getElementById("close-overlay").addEventListener("click", closeOverlay);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeOverlay(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape"){ closeOverlay(); formPanel.classList.remove("open"); }
  });

  document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-cat]");
    if (!btn) return;
    activeFilter = btn.dataset.cat;
    saveFilter(activeFilter);
    render();
  });

  const openFormBtn = document.getElementById("open-form");
  openFormBtn.addEventListener("click", () => {
    formPanel.classList.toggle("open");
    if (formPanel.classList.contains("open")) {
      formPanel.scrollIntoView({behavior: "smooth", block: "start"});
    }
  });
  document.getElementById("cancel-form").addEventListener("click", () => {
    formPanel.classList.remove("open");
    document.getElementById("new-notice").reset();
  });

  document.getElementById("new-notice").addEventListener("submit", (e) => {
    e.preventDefault();
    const cat = document.getElementById("f-cat").value;
    const title = document.getElementById("f-title").value.trim();
    const name = document.getElementById("f-name").value.trim();
    const contact = document.getElementById("f-contact").value.trim();
    const msg = document.getElementById("f-msg").value.trim();
    if (!title || !name || !contact || !msg) return;
    const styleIdx = Math.floor(Math.random() * STYLES.length);
    const today = new Date();
    const months = ["Jan.","Feb.","Mar.","Apr.","May","June","July","Aug.","Sept.","Oct.","Nov.","Dec."];
    const when = "Posted " + months[today.getMonth()] + " " + today.getDate();
    const newNotice = {
      cat: cat,
      style: STYLES[styleIdx],
      title: title,
      name: name,
      contact: contact,
      body: msg,
      when: when
    };
    notices.unshift(newNotice);
    saveNotices(notices);
    activeFilter = "all";
    saveFilter("all");
    render();
    document.getElementById("new-notice").reset();
    formPanel.classList.remove("open");
    setTimeout(() => openOverlay(0), 200);
  });

  // Whoever's reading the source: pin yours up too. Welcome to the block. — M.S.C.C.
  render();
})();
</script>
