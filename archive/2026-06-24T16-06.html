    transform: rotate(-8deg);
  }
  #napkin-folded {
    text-align: center;
    font-size: 10px;
    color: #1e3a8a;
    font-style: italic;
  }
  #napkin-unfolded {
    display: none;
    font-size: 10.5px;
    line-height: 1.55;
    max-height: 360px;
    overflow-y: auto;
  }
  #napkin.unfolded #napkin-folded { display: none; }
  #napkin.unfolded #napkin-unfolded { display: block; animation: unfold 1.4s ease; }
  #napkin.unfolded { width: 280px; max-width: 90vw; }
  @keyframes unfold {
    0% { max-height: 30px; opacity: 0.4; }
    40% { max-height: 100px; opacity: 0.7; }
    100% { max-height: 400px; opacity: 1; }
  }

  /* Footer */
  #footer {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-family: Georgia, serif;
    font-size: 10px;
    color: rgba(243,230,196,0.5);
    z-index: 30;
    font-style: italic;
  }
  #footer a { color: rgba(243,230,196,0.7); text-decoration: none; }
  #footer a:hover { color: #f3e6c4; text-decoration: underline; }

  /* Pin rack descend animation */
  @keyframes rackDescend {
    0% { transform: translate(-50%, -200%); opacity: 0; }
    40% { transform: translate(-50%, -80%); opacity: 0.4; }
    100% { transform: translate(-50%, -50%); opacity: 1; }
  }
  .pin.descending { animation: rackDescend 1.2s ease-out; }

  /* Mobile adjustments */
  @media (max-width: 720px) {
    #scoreboard { min-width: 160px; padding: 6px 8px; top: 8px; right: 8px; }
    #score-big { font-size: 20px; letter-spacing: 2px; }
    .frame-cell { font-size: 7px; min-height: 18px; }
    .frame-balls { font-size: 6px; }
    .frame-total { font-size: 8px; }
    #puzzle-slip { width: 150px; right: 8px; top: 150px; padding: 8px 8px 12px; }
    #slip-title { font-size: 8px; }
    #slip-subtitle, #slip-annotation { font-size: 7px; }
    #card-table { width: 80px; }
    #folgers { width: 28px; height: 34px; left: 20px; }
    #folgers::before { font-size: 16px; }
    #napkin { right: 12px; top: 280px; width: 180px; font-size: 9px; }
  }
</style>
</head>
<body>
<!--
  Lane 7. Wednesday, October 22, 1986. 6:47pm.
  Mountain View Lutheran Pee-Wee Bowling League — Holy Rollers, week 23 of 26.
  Petra Rzepka, age 9, third grade, Faith Lutheran Elementary.
  Mom is at the card table beside lane 8 with the Folgers can.
  Dad is home with the flu-stricken little brother.
  The puzzle on the slip tonight is the seventh she has drawn this fall.
  Bowl one game. The pins are thin. The ball hooks right.
-->
<div id="stage">
  <div id="lane">
    <div id="bloom"></div>
    <div class="gutter left"></div>
    <div class="gutter right"></div>
    <div id="lane-floor"></div>
    <div id="pin-deck-shadow"></div>
  </div>

  <div id="play">
    <svg id="aim" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- 5 candlepins added by JS -->

    <div id="ball"></div>
    <div id="power-wrap"><div id="power-bar"></div></div>

    <div id="foul-line"></div>
    <div id="foul-line-text"></div>

    <!-- Hover hotspots -->
    <div class="hot" id="hot-foul" data-ann="Mr. Volkenant runs lanes 5 through 12 on Wednesdays and he blew his whistle on Dylan last week for stepping over the line on his third ball. Dylan is seven so he cried a little. Mr. Volkenant said he was sorry and gave him a free game-token from the snack bar. The foul line is for after you let go of the ball not before, that is the whole rule." style="bottom: 80px; left: 30%; width: 40%; height: 24px;"></div>

    <div class="hot" id="hot-gutter" data-ann="The bumpers go up on lanes 5 through 12 for the 7-and-8-year-old kids. Dylan and Hannah get them. I had bumpers last fall when I was 8 but I turned 9 in August and the rule is if you want bumpers after 9 you have to bowl off the kids'-side ball-return which is the short rack with the duck-stickers and that is babyish. I bowl gutters-open now. A lot of mine still go in the gutter but my average went from 51 to 64 since September." style="bottom: 100px; left: 4%; width: 12%; height: 60%;"></div>

    <div class="hot" id="hot-pins" data-ann="These are candlepins not ten-pins. Thunderbowl is one of three houses in Nevada that runs both. The candlepins are skinnier and you get three balls per frame instead of two and the pins you knock down do NOT get cleared between balls — the dead-wood stays on the deck which can help you or hurt you. I like candlepin better because the skinny pins are harder to knock down which makes it more interesting to bowl. Brendan likes ten-pin better because he is bigger and can throw harder." style="top: 14%; left: 38%; width: 24%; height: 12%;"></div>

    <div class="hot" id="hot-light" data-ann="At 8:42pm after our league ends they turn off the regular lights and turn on the black-lights and the disco-ball over lane 4 and that is COSMIC BOWLING which goes till midnight on Wednesdays. The pins glow white-purple and the ball glows. I have never been allowed to stay for it but Brendan's older brother Kurt bowls in the Wednesday-late adult league and he says the music is a lot of Genesis and Huey Lewis. My mom says when I am 12 I can stay for one game of cosmic if my dad picks me up." style="top: -2px; left: 30%; width: 40%; height: 14%;"></div>

    <div class="hot" id="hot-ball" data-ann="My birthday ball. Pro-Shop Tony drilled it. Mom watched from a folding chair beside lane 8. Daughter holds a strike-grip now, two fingers." style="z-index: 8;"></div>

    <div class="hot" id="hot-scoreboard" data-ann="My league average right now is 64 and my personal-best game is 91 which I bowled on October 8 against the Strike Force Kids. Brendan's average is 78 and Hannah's is 53 and Dylan's is 38 (he is seven). Last Wednesday I got two strikes in the same game which is called a double in candlepin and there was a little chime sound from the Brunswick terminal which only happens for doubles and triples." style="top: 14px; right: 14px; width: 200px; height: 110px;"></div>
  </div>

  <!-- Mom's card table and Folgers can -->
  <div id="card-table"></div>
  <div id="folgers" class="hot" data-ann="Mom's Folgers can. She keeps it on the card table beside lane 8 from 6:00 to 8:45pm every Wednesday. It is full of nickels for the snack bar. After our third game I am allowed to walk over with a nickel and a dime and get a Charleston Chew from Mrs. Truscott. Brendan always gets a Slo-Poke. Hannah gets a Necco wafer roll. Dylan picks the orange Charms blow-pop every single Wednesday."></div>

  <!-- Puzzle slip -->
  <div id="puzzle-slip">
    <div id="slip-title">LANE 7 — WEEK 7</div>
    <div id="slip-subtitle">spot 7 differences — P.R.</div>
    <div id="puzzle-scenes">
      <div class="scene" id="scene-a"></div>
      <div class="scene" id="scene-b"></div>
    </div>
    <div id="slip-annotation">&nbsp;</div>
    <div id="slip-count" id="slip-found">found: 0 / 7</div>
  </div>

  <!-- The 1990 napkin note (hidden until unlock) -->
  <div id="napkin">
    <div id="napkin-folded">[ folded napkin · Sept 11 1990 ]</div>
    <div id="napkin-unfolded"></div>
  </div>

  <div id="balloon"></div>

  <div id="footer">
    lane 7 sits where it has always sat · <a href="/archive">the rest of the back lanes</a>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ===== CONSTANTS =====
  const stage = document.getElementById('stage');
  const play = document.getElementById('play');
  const ball = document.getElementById('ball');
  const aim = document.getElementById('aim');
  const powerWrap = document.getElementById('power-wrap');
  const powerBar = document.getElementById('power-bar');
  const balloon = document.getElementById('balloon');
  const foulLineText = document.getElementById('foul-line-text');
  const slipCount = document.getElementById('slip-count');
  const slipAnn = document.getElementById('slip-annotation');
  const napkin = document.getElementById('napkin');
  const napkinUnfolded = document.getElementById('napkin-unfolded');

  // ===== STATE =====
  let W = window.innerWidth, H = window.innerHeight;
  const pinPositions = []; // {x,y, down, el}
  let ballPos = { x: 0, y: 0 };
  let ballVel = { x: 0, y: 0 };
  let ballRadius = 22;
  let pinRadius = 11;
  let rolling = false;
  let aiming = false;
  let dragStart = null;
  let releasePoint = null;
  let frameIdx = 0;
  let ballInFrame = 0;
  let pinsDownThisBall = [];
  let frames = []; // [{balls:[n,n,n], total:0, cumulative:0}]
  for (let i = 0; i < 10; i++) frames.push({ balls: [], total: 0, cumulative: null, strikeChimed: false });
  let gameOver = false;
  let visitorCounter = 0;
  let highScore = 0;
  let gamesPlayed = 0;
  let annotationsSeen = new Set();
  let differencesFound = new Set();

  // Foul line / lane bounds (in screen space)
  function recompute(){
    W = window.innerWidth; H = window.innerHeight;
    ballRadius = Math.max(18, Math.min(26, W * 0.025));
    pinRadius = Math.max(8, Math.min(12, W * 0.012));
    ball.style.width = ball.style.height = (ballRadius * 2) + 'px';
  }
  recompute();

  function laneBounds() {
    // narrowing toward top (3/4 perspective). bottom-wide, top-narrow.
    const cx = W / 2;
    const bottomY = H - 100;
    const topY = H * 0.16;
    const bottomHalf = W * 0.28;
    const topHalf = W * 0.13;
    return { cx, bottomY, topY, bottomHalf, topHalf };
  }
  function laneHalfAt(y) {
    const b = laneBounds();
    const t = (b.bottomY - y) / (b.bottomY - b.topY);
    return b.bottomHalf + (b.topHalf - b.bottomHalf) * t;
  }

  // ===== LOAD STATE =====
  try {
    highScore = parseInt(localStorage.getItem('lane7_hi') || '0', 10);
    visitorCounter = parseInt(localStorage.getItem('lane7_visitors') || '4', 10);
    gamesPlayed = parseInt(localStorage.getItem('lane7_games') || '0', 10);
    const ann = localStorage.getItem('lane7_ann');
    if (ann) annotationsSeen = new Set(JSON.parse(ann));
    const diffs = localStorage.getItem('lane7_diffs');
    if (diffs) differencesFound = new Set(JSON.parse(diffs));
    if (!localStorage.getItem('lane7_visited')) {
      visitorCounter += 1;
      localStorage.setItem('lane7_visited', '1');
      localStorage.setItem('lane7_visitors', visitorCounter);
    }
  } catch(e) {}

  // ===== AUDIO =====
  let audioCtx = null;
  function getAudio(){
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    return audioCtx;
  }
  function playRumble(durationFn) {
    const ctx = getAudio(); if (!ctx) return null;
    const bufSize = ctx.sampleRate * 2;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 240;
    const gain = ctx.createGain();
    gain.gain.value = 0.0;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
    return { src, gain, filter, stop: function(){ try { gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3); src.stop(ctx.currentTime + 0.4); } catch(e){} } };
  }
  function playThunk(intensity) {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const freq = 200 + Math.random() * 200;
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.16);
    osc.type = 'triangle';
    gain.gain.setValueAtTime(Math.min(0.35, 0.15 + intensity * 0.2), now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.2);
  }
  function playClatter() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    for (let i = 0; i < 2 + Math.floor(Math.random() * 3); i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const f = 400 + Math.random() * 600;
      const t0 = now + i * 0.04;
      osc.frequency.setValueAtTime(f, t0);
      osc.type = 'square';
      gain.gain.setValueAtTime(0.08, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.07);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.08);
    }
  }
  function playHiss() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const bufSize = ctx.sampleRate * 0.6;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3500;
    filter.Q.value = 0.6;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.05);
    gain.gain.linearRampToValueAtTime(0, now + 0.45);
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start(now); src.stop(now + 0.6);
  }
  function playTick() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 1400;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.07);
  }
  function playChime() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    [880, 1320].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = f;
      osc.type = 'sine';
      const t0 = now + i * 0.08;
      gain.gain.setValueAtTime(0.18, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.42);
    });
  }

  // ===== PINS =====
  // candlepin V-formation: 1 front, 2 mid, 2 back
  function setupPins() {
    pinPositions.length = 0;
    document.querySelectorAll('.pin').forEach(el => el.remove());
    const b = laneBounds();
    const topAreaY = b.topY + (b.bottomY - b.topY) * 0.12;
    const halfAtTop = laneHalfAt(topAreaY);
    const cx = b.cx;
    // narrow V
    const spacing = Math.min(halfAtTop * 0.55, 32);
    const pinSet = [
      { x: cx, y: topAreaY },
      { x: cx - spacing * 0.9, y: topAreaY + spacing * 1.1 },
      { x: cx + spacing * 0.9, y: topAreaY + spacing * 1.1 },
      { x: cx - spacing * 1.7, y: topAreaY + spacing * 2.3 },
      { x: cx + spacing * 1.7, y: topAreaY + spacing * 2.3 },
    ];
    pinSet.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'pin descending';
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.innerHTML = `<svg viewBox="0 0 22 76" preserveAspectRatio="none">
        <ellipse cx="11" cy="71" rx="9" ry="3.5" fill="rgba(0,0,0,0.25)"/>
        <path d="M 11 4
                 C 7 4, 6 14, 7 22
                 C 8 32, 5 42, 6 56
                 C 6 66, 8 72, 11 73
                 C 14 72, 16 66, 16 56
                 C 17 42, 14 32, 15 22
                 C 16 14, 15 4, 11 4 Z"
              fill="#f4ecd4" stroke="#5a3818" stroke-width="0.8"/>
        <rect x="6" y="22" width="10" height="3.2" fill="#c8323a"/>
        <rect x="6" y="32" width="10" height="3.2" fill="#c8323a"/>
      </svg>`;
      play.appendChild(el);
      pinPositions.push({ x: p.x, y: p.y, ox: p.x, oy: p.y, down: false, el });
    });
    setTimeout(() => {
      pinPositions.forEach(p => p.el.classList.remove('descending'));
    }, 1300);
  }

  // ===== BALL POSITION =====
  function resetBall() {
    const b = laneBounds();
    ballPos.x = b.cx;
    ballPos.y = b.bottomY - 20;
    ballVel.x = 0; ballVel.y = 0;
    ball.style.left = ballPos.x + 'px';
    ball.style.top = ballPos.y + 'px';
    ball.style.display = 'block';
    rolling = false;
  }

  // ===== SCOREBOARD =====
  function buildScoreboard() {
    const sb = document.createElement('div');
    sb.id = 'scoreboard';
    sb.innerHTML = `
      <div id="score-frames"></div>
      <div id="score-big">000</div>
      <div id="score-hi">HI ${String(highScore).padStart(3,'0')}</div>
    `;
    stage.appendChild(sb);
    const sf = document.getElementById('score-frames');
    for (let i = 0; i < 10; i++) {
      const c = document.createElement('div');
      c.className = 'frame-cell';
      c.id = 'frame-' + i;
      c.innerHTML = `<div class="frame-balls"></div><div class="frame-total"></div>`;
      sf.appendChild(c);
    }
  }
  buildScoreboard();

  // Candlepin scoring:
  // - Three balls per frame.
  // - Strike (X) = all 5 down on ball 1 → 10 + next 2 balls bonus.
  // - Spare (/) = all 5 down on ball 2 → 10 + next 1 ball bonus.
  // - All down on ball 3 → 10, no bonus.
  // - Otherwise sum the three.
  // - Frame 10: same, with bonus balls for strike/spare per standard candlepin.
  function ballsFlat() {
    let arr = [];
    for (let i = 0; i < 10; i++) {
      arr = arr.concat(frames[i].balls);
    }
    return arr;
  }
  function recomputeScores() {
    let cum = 0;
    let bi = 0;
    const all = ballsFlat();
    for (let f = 0; f < 10; f++) {
      const fr = frames[f];
      if (fr.balls.length === 0) { fr.cumulative = null; continue; }
      let total = 0;
      const first = fr.balls[0];
      if (first === 5 && fr.balls.length >= 1 && f < 9) {
        // strike
        const b1 = all[bi + 1];
        const b2 = all[bi + 2];
        if (b1 === undefined || b2 === undefined) { fr.cumulative = null; bi += fr.balls.length; continue; }
        total = 10 + b1 + b2;
      } else if (fr.balls.length >= 2 && first + fr.balls[1] === 5 && f < 9) {
        // spare
        const b1 = all[bi + 2];
        if (b1 === undefined) { fr.cumulative = null; bi += fr.balls.length; continue; }
        total = 10 + b1;
      } else {
        total = fr.balls.reduce((a,b) => a+b, 0);
      }
      cum += total;
      fr.cumulative = cum;
      bi += fr.balls.length;
    }
    return cum;
  }
  function renderScoreboard() {
    for (let f = 0; f < 10; f++) {
      const cell = document.getElementById('frame-' + f);
      const fr = frames[f];
      const ballsDiv = cell.querySelector('.frame-balls');
      const totalDiv = cell.querySelector('.frame-total');
      let bs = '';
      fr.balls.forEach((b, i) => {
        if (i === 0 && b === 5) bs += 'X';
        else if (i === 1 && fr.balls[0] + b === 5 && fr.balls[0] !== 5) bs += '/';
        else if (i === 2 && fr.balls[0] + fr.balls[1] !== 5 && fr.balls[0] !== 5 && fr.balls.reduce((a,c)=>a+c,0) === 5) bs += '/';
        else bs += b === 0 ? '-' : b;
        if (i < fr.balls.length - 1) bs += ' ';
      });
      ballsDiv.textContent = bs;
      totalDiv.textContent = fr.cumulative !== null && fr.cumulative !== undefined ? fr.cumulative : '';
      cell.classList.toggle('active', f === frameIdx && !gameOver);
    }
    const big = document.getElementById('score-big');
    let lastCum = 0;
    for (let i = 0; i < 10; i++) {
      if (frames[i].cumulative !== null && frames[i].cumulative !== undefined) lastCum = frames[i].cumulative;
    }
    big.textContent = String(lastCum).padStart(3, '0');
    document.getElementById('score-hi').textContent = 'HI ' + String(highScore).padStart(3, '0');
  }
  recomputeScores();
  renderScoreboard();

  // ===== AIMING =====
  let rumbleHandle = null;

  function pointInBall(x, y) {
    const dx = x - ballPos.x, dy = y - ballPos.y;
    return dx*dx + dy*dy <= (ballRadius + 4) * (ballRadius + 4);
  }

  function getPoint(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    if (rolling || gameOver) return;
    const p = getPoint(e);
    if (!pointInBall(p.x, p.y)) return;
    aiming = true;
    dragStart = { x: p.x, y: p.y };
    ball.classList.add('aiming');
    powerWrap.classList.add('show');
    e.preventDefault();
  }
  function onMove(e) {
    if (!aiming) return;
    const p = getPoint(e);
    const dx = p.x - dragStart.x;
    const dy = p.y - dragStart.y;
    // For aim line, project from ball forward (opposite of drag, since drag is backward)
    const angle = Math.atan2(-dy, -dx);
    const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 240);
    const powerPct = distance / 240;
    powerBar.style.width = (powerPct * 100) + '%';
    // Position power bar above ball
    powerWrap.style.left = ballPos.x + 'px';
    powerWrap.style.top = (ballPos.y + ballRadius + 14) + 'px';

    // Draw chalk aim line: dashed line from ball going forward (in aim direction) up the lane
    const aimDx = -dx, aimDy = -dy;
    const len = Math.sqrt(aimDx*aimDx + aimDy*aimDy);
    if (len > 4) {
      const ux = aimDx / len, uy = aimDy / len;
      const reach = 280;
      const x1 = ballPos.x, y1 = ballPos.y;
      const x2 = ballPos.x + ux * reach;
      const y2 = ballPos.y + uy * reach;
      aim.innerHTML = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
        stroke="rgba(243,230,196,0.45)" stroke-width="1.5"
        stroke-dasharray="6 5" />`;
    }
    e.preventDefault();
  }
  function onUp(e) {
    if (!aiming) return;
    aiming = false;
    ball.classList.remove('aiming');
    powerWrap.classList.remove('show');
    const p = getPoint(e);
    const dx = p.x - dragStart.x;
    const dy = p.y - dragStart.y;
    const distance = Math.sqrt(dx*dx + dy*dy);
    if (distance < 12) {
      aim.innerHTML = '';
      return;
    }
    // velocity: opposite direction of drag, scaled by distance
    const power = Math.min(distance, 240) / 240; // 0..1
    const angle = Math.atan2(-dy, -dx);
    const speed = 4 + power * 11; // tune
    ballVel.x = Math.cos(angle) * speed;
    ballVel.y = Math.sin(angle) * speed;
    aim.innerHTML = '';
    startRoll();
    e.preventDefault();
  }

  function startRoll() {
    rolling = true;
    ball.classList.add('rolling');
    pinsDownThisBall = [];
    rumbleHandle = playRumble();
    requestAnimationFrame(step);
  }

  // ===== PHYSICS =====
  function step() {
    if (!rolling) return;
    // friction
    const friction = 0.988;
    ballVel.x *= friction;
    ballVel.y *= friction;
    // natural rightward hook
    ballVel.x += 0.018;
    // move
    ballPos.x += ballVel.x;
    ballPos.y += ballVel.y;

    // rumble volume
    if (rumbleHandle && rumbleHandle.gain) {
      const sp = Math.sqrt(ballVel.x*ballVel.x + ballVel.y*ballVel.y);
      const target = Math.min(0.12, sp * 0.015);
      try { rumbleHandle.gain.gain.value = target; } catch(e) {}
    }

    // bounds: lane walls (narrowing)
    const b = laneBounds();
    const half = laneHalfAt(ballPos.y);
    const leftEdge = b.cx - half;
    const rightEdge = b.cx + half;
    if (ballPos.x - ballRadius * 0.5 < leftEdge) {
      // gutter — kill speed, slide upward to pin deck
      ballPos.x = leftEdge + ballRadius * 0.5;
      ballVel.x = Math.max(0, ballVel.x);
      ballVel.x *= 0.7;
      ballVel.y *= 0.92;
    }
    if (ballPos.x + ballRadius * 0.5 > rightEdge) {
      ballPos.x = rightEdge - ballRadius * 0.5;
      ballVel.x = Math.min(0, ballVel.x);
      ballVel.x *= 0.7;
      ballVel.y *= 0.92;
    }

    // collision with pins
    for (let i = 0; i < pinPositions.length; i++) {
      const p = pinPositions[i];
      if (p.down) continue;
      const dx = ballPos.x - p.x, dy = ballPos.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minD = ballRadius * 0.7 + pinRadius;
      if (dist < minD) {
        // knock down
        p.down = true;
        p.el.classList.add('down');
        pinsDownThisBall.push(i);
        playThunk(Math.min(1, Math.sqrt(ballVel.x*ballVel.x + ballVel.y*ballVel.y) / 10));
        // chain reactions
        chainReact(i);
        // bounce ball slightly
        const nx = dx / dist, ny = dy / dist;
        ballVel.x -= nx * 1.5;
        ballVel.y -= ny * 1.5;
        ballVel.x *= 0.7;
        ballVel.y *= 0.7;
      }
    }

    // update visual
    ball.style.left = ballPos.x + 'px';
    ball.style.top = ballPos.y + 'px';
    // shrink ball as it goes up the lane (perspective)
    const t = (b.bottomY - ballPos.y) / (b.bottomY - b.topY);
    const scale = 1 - t * 0.45;
    ball.style.transform = `translate(-50%, -50%) scale(${scale.toFixed(2)})`;

    // stop condition: ball above pin deck OR too slow
    const speed = Math.sqrt(ballVel.x*ballVel.x + ballVel.y*ballVel.y);
    const pastDeck = ballPos.y < b.topY + 10;
    if (speed < 0.4 || pastDeck) {
      finishBall();
      return;
    }
    requestAnimationFrame(step);
  }

  function chainReact(idx) {
    const struck = pinPositions[idx];
    for (let j = 0; j < pinPositions.length; j++) {
      if (j === idx) continue;
      const q = pinPositions[j];
      if (q.down) continue;
      const dx = struck.x - q.x, dy = struck.y - q.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < pinRadius * 3.4 && Math.random() < 0.55) {
        q.down = true;
        q.el.classList.add('down');
        pinsDownThisBall.push(j);
        playTick();
      }
    }
    if (pinsDownThisBall.length > 1) playClatter();
  }

  function finishBall() {
    rolling = false;
    ball.classList.remove('rolling');
    if (rumbleHandle) { rumbleHandle.stop(); rumbleHandle = null; }
    const knocked = pinsDownThisBall.length;
    frames[frameIdx].balls.push(knocked);
    ballInFrame += 1;
    recomputeScores();
    renderScoreboard();

    // Chime for double/triple strike (candlepin)
    if (frameIdx > 0 && frames[frameIdx].balls[0] === 5 && ballInFrame === 1) {
      if (frames[frameIdx - 1].balls[0] === 5) {
        playChime();
      }
    }

    // Determine end of frame
    const allDown = pinPositions.every(p => p.down);
    const isStrikeBall1 = ballInFrame === 1 && knocked === 5;
    const endByThree = ballInFrame === 3;
    const finalFrame = frameIdx === 9;

    let endFrame = false;
    if (!finalFrame) {
      if (isStrikeBall1) endFrame = true;
      else if (ballInFrame === 2 && frames[frameIdx].balls[0] + frames[frameIdx].balls[1] === 5) endFrame = true;
      else if (endByThree) endFrame = true;
    } else {
      // 10th frame: allow up to 3 balls regardless
      if (allDown && ballInFrame < 3) {
        // re-rack after this ball
        setTimeout(reRack10th, 800);
      } else if (endByThree) {
        endFrame = true;
      }
    }

    setTimeout(() => {
      if (endFrame) {
        if (frameIdx === 9) {
          endGame();
        } else {
          frameIdx += 1;
          ballInFrame = 0;
          rackDescend();
        }
      } else {
        // Just remove downed pins visually (already done), keep dead-wood standing? In candlepin dead wood STAYS.
        // We render down pins as opacity:0 — they're effectively gone. For simplicity treat dead wood as cleared
        // (Petra would forgive us — the simulation has limits.)
        resetBall();
      }
    }, 1200);
  }

  function reRack10th() {
    pinPositions.forEach(p => {
      p.down = false;
      p.el.classList.remove('down');
      p.el.classList.add('descending');
    });
    playHiss();
    setTimeout(() => {
      pinPositions.forEach(p => p.el.classList.remove('descending'));
      resetBall();
    }, 1200);
  }

  function rackDescend() {
    playHiss();
    pinPositions.forEach(p => {
      p.down = false;
      p.el.classList.remove('down');
      p.el.classList.add('descending');
    });
    setTimeout(() => {
      pinPositions.forEach(p => p.el.classList.remove('descending'));
      resetBall();
    }, 1200);
  }

  function endGame() {
    gameOver = true;
    let final = 0;
    for (let i = 9; i >= 0; i--) {
      if (frames[i].cumulative !== null && frames[i].cumulative !== undefined) { final = frames[i].cumulative; break; }
    }
    if (final > highScore) {
      highScore = final;
      try { localStorage.setItem('lane7_hi', highScore); } catch(e) {}
    }
    gamesPlayed += 1;
    try { localStorage.setItem('lane7_games', gamesPlayed); } catch(e) {}
    renderScoreboard();
    checkUnlock();

    // Auto-restart after 4 seconds
    setTimeout(() => {
      frames = [];
      for (let i = 0; i < 10; i++) frames.push({ balls: [], total: 0, cumulative: null });
      frameIdx = 0;
      ballInFrame = 0;
      gameOver = false;
      recomputeScores();
      renderScoreboard();
      rackDescend();
    }, 4500);
  }

  // ===== UPDATE FOUL LINE TEXT =====
  function updateFoulLine() {
    foulLineText.textContent = 'KIDS WHO HAVE PLAYED THIS LANE: ' + visitorCounter;
  }
  updateFoulLine();

  // ===== EVENT HOOKUP =====
  play.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  play.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp, { passive: false });

  // ===== ANNOTATIONS =====
  function showAnnotation(el, text) {
    balloon.textContent = text;
    const rect = el.getBoundingClientRect();
    let left = rect.left + rect.width / 2;
    let top = rect.bottom + 8;
    balloon.style.left = '0px';
    balloon.style.top = top + 'px';
    balloon.classList.add('show');
    // Then measure and reposition
    requestAnimationFrame(() => {
      const bw = balloon.offsetWidth;
      const bh = balloon.offsetHeight;
      let x = left - bw / 2;
      if (x < 8) x = 8;
      if (x + bw > W - 8) x = W - bw - 8;
      let y = top;
      if (y + bh > H - 8) y = rect.top - bh - 8;
      if (y < 8) y = 8;
      balloon.style.left = x + 'px';
      balloon.style.top = y + 'px';
    });
  }
  function hideAnnotation() {
    balloon.classList.remove('show');
  }
  const hots = document.querySelectorAll('.hot[data-ann]');
  let hoverTimer = null;
  hots.forEach(el => {
    el.addEventListener('mouseenter', () => {
      hoverTimer = setTimeout(() => {
        showAnnotation(el, el.dataset.ann);
        annotationsSeen.add(el.id || el.dataset.ann.substr(0, 10));
        try { localStorage.setItem('lane7_ann', JSON.stringify([...annotationsSeen])); } catch(e) {}
        checkUnlock();
      }, 600);
    });
    el.addEventListener('mouseleave', () => {
      clearTimeout(hoverTimer);
      hideAnnotation();
    });
    el.addEventListener('click', () => {
      showAnnotation(el, el.dataset.ann);
      annotationsSeen.add(el.id || el.dataset.ann.substr(0, 10));
      try { localStorage.setItem('lane7_ann', JSON.stringify([...annotationsSeen])); } catch(e) {}
      checkUnlock();
      setTimeout(hideAnnotation, 6500);
    });
  });

  // Position the ball hotspot
  function updateBallHot() {
    const hb = document.getElementById('hot-ball');
    hb.style.left = (ballPos.x - 26) + 'px';
    hb.style.top = (ballPos.y - 26) + 'px';
    hb.style.width = '52px';
    hb.style.height = '52px';
  }

  // ===== PUZZLE SLIP — spot the difference =====
  function renderPuzzle() {
    // Two near-identical bowling-alley scenes with 7 differences.
    // We draw scene A as the baseline and scene B with the variants.
    const sceneA = document.getElementById('scene-a');
    const sceneB = document.getElementById('scene-b');

    const sharedSVG = (variant) => `
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <!-- floor -->
        <rect x="0" y="70" width="100" height="30" fill="#d8b878"/>
        <!-- lane stripes -->
        <line x1="20" y1="70" x2="34" y2="20" stroke="#a08040" stroke-width="0.4"/>
        <line x1="80" y1="70" x2="66" y2="20" stroke="#a08040" stroke-width="0.4"/>
        <!-- back wall -->
        <rect x="0" y="0" width="100" height="22" fill="#5a4030"/>
        <!-- light fixture -->
        <rect x="${variant.lightX}" y="6" width="20" height="3" fill="#f0e0a0"/>
        <!-- pin (single, simplified) -->
        <ellipse cx="50" cy="28" rx="2" ry="6" fill="#f4ecd4" stroke="#3e3530" stroke-width="0.3"/>
        ${variant.pinStripe ? '<line x1="48" y1="27" x2="52" y2="27" stroke="#c8323a" stroke-width="0.6"/>' : ''}
        <!-- scoring terminal -->
        <rect x="${variant.termX}" y="40" width="10" height="6" fill="#3a2820"/>
        <rect x="${variant.termX + 1}" y="41" width="8" height="1.5" fill="#e87838"/>
        <!-- girl figure (Petra) -->
        <circle cx="30" cy="60" r="3" fill="#f0c89c"/>
        <rect x="27" y="63" width="6" height="8" fill="${variant.shirtColor}"/>
        <rect x="27" y="71" width="2.5" height="5" fill="#3a3030"/>
        <rect x="30.5" y="71" width="2.5" height="5" fill="#3a3030"/>
        <!-- ponytail -->
        <path d="M 30 58 Q ${variant.ponyDir} 56 32 53" stroke="#5a3020" stroke-width="1.2" fill="none"/>
        <!-- bowling ball -->
        <circle cx="${variant.ballX}" cy="72" r="2.5" fill="#d83a8e"/>
        <circle cx="${variant.ballX - 0.7}" cy="71.3" r="0.6" fill="#fff" opacity="0.7"/>
        <!-- snack-bar sign on wall -->
        ${variant.signOn ? '<rect x="72" y="12" width="20" height="6" fill="#f0d090" stroke="#3e3530" stroke-width="0.3"/>' : ''}
        ${variant.signOn ? '<text x="82" y="16.5" text-anchor="middle" font-size="3" fill="#3e3530" font-family="serif">SNACK</text>' : ''}
        <!-- gutter ball off to the side -->
        <circle cx="${variant.gutterBallX}" cy="78" r="1.4" fill="#2ca8b4"/>
      </svg>
    `;

    const variantA = {
      lightX: 40, pinStripe: true, termX: 14, shirtColor: '#c8323a',
      ponyDir: '28', ballX: 38, signOn: true, gutterBallX: 88
    };
    const variantB = {
      lightX: 44,        // 1. light fixture shifted right
      pinStripe: false,  // 2. pin missing red stripe
      termX: 18,         // 3. terminal moved right
      shirtColor: '#2ca8b4', // 4. shirt is teal not cherry
      ponyDir: '34',     // 5. ponytail flipped to the other side
      ballX: 42,         // 6. ball slightly farther from girl
      signOn: true,
      gutterBallX: 76    // 7. gutter ball moved closer
    };

    sceneA.innerHTML = sharedSVG(variantA);
    sceneB.innerHTML = sharedSVG(variantB);

    // Differences: clickable targets layered on scene B
    const diffs = [
      { x: 54, y: 8,  label: 'light' },
      { x: 50, y: 28, label: 'stripe' },
      { x: 23, y: 43, label: 'terminal' },
      { x: 30, y: 67, label: 'shirt' },
      { x: 33, y: 55, label: 'pony' },
      { x: 42, y: 72, label: 'ball-pos' },
      { x: 76, y: 78, label: 'gutter-ball' },
    ];
    diffs.forEach(d => {
      const t = document.createElement('div');
      t.className = 'diff-target';
      t.style.left = d.x + '%';
      t.style.top = d.y + '%';
      t.dataset.label = d.label;
      if (differencesFound.has(d.label)) {
        const mark = document.createElement('div');
        mark.className = 'diff-mark';
        mark.style.left = d.x + '%';
        mark.style.top = d.y + '%';
        sceneB.appendChild(mark);
      } else {
        t.addEventListener('click', (e) => {
          e.stopPropagation();
          differencesFound.add(d.label);
          try { localStorage.setItem('lane7_diffs', JSON.stringify([...differencesFound])); } catch(e) {}
          const mark = document.createElement('div');
          mark.className = 'diff-mark';
          mark.style.left = d.x + '%';
          mark.style.top = d.y + '%';
          sceneB.appendChild(mark);
          t.remove();
          playTick();
          updateSlipCount();
          checkUnlock();
        });
      }
      sceneB.appendChild(t);
    });

    updateSlipCount();
  }

  function updateSlipCount() {
    slipCount.textContent = 'found: ' + differencesFound.size + ' / 7';
    if (differencesFound.size === 7) {
      slipAnn.textContent = 'good — H. found 5 last week — P.R.';
    }
  }
  renderPuzzle();

  // ===== UNLOCK CHECK =====
  function checkUnlock() {
    if (gamesPlayed >= 11 && annotationsSeen.size >= 7 && differencesFound.size === 7) {
      napkin.classList.add('visible');
      napkinUnfolded.innerHTML = `
        <div style="font-size:9px; text-align:center; margin-bottom:6px; letter-spacing:1px;">— Sept 11 1990 —</div>
        <div style="font-size:9px; text-align:center; margin-bottom:8px;">Bonanza High freshman year — for whoever played my lane</div>
        I aged out of the Pee-Wee league in September 1989 when I turned 12, my last Wednesday-night session was the league-end banquet at the Thunderbowl coffee shop on May 17 1989 where Mrs. Volkenant gave me the league high-average trophy (97 across the 26-week spring season) which is on the shelf above my desk in my bedroom right now.<br><br>
        Mom is still the Wednesday-night volunteer supervisor and my little sister Margaux who is 7 just joined the Holy Rollers this fall, she got my old swirled-magenta-and-teal ball as her starter ball because it is too light for me now and just right for her.<br><br>
        I am writing this from my homework desk at home in Henderson, I just turned 13 in August and I am on the Bonanza High freshman math team and I have decided I am going to keep designing one puzzle per week and mailing it to mom every Wednesday morning so she can bring it to the alley and tape it to lane 7 the way I used to. The first one I mailed was last week, Margaux solved it in 14 minutes which I think is the family record.<br><br>
        <div style="text-align:right; margin-top:6px;">— Petra Rzepka, age 13<br>freshman, Bonanza High School<br>Henderson Nevada</div>
      `;
    }
  }
  checkUnlock();
  napkin.addEventListener('click', () => {
    napkin.classList.toggle('unfolded');
    if (napkin.classList.contains('unfolded')) playHiss();
  });

  // ===== INIT =====
  setupPins();
  resetBall();
  updateBallHot();

  // Keep the ball hotspot moving with the ball
  setInterval(() => { if (!rolling && !gameOver) updateBallHot(); }, 200);

  // Handle resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      recompute();
      setupPins();
      resetBall();
      updateBallHot();
    }, 200);
  });

  // Small console hello — Petra to whoever inspects
  // i drew this one on tuesday. i hope you find them all. -P.R.
})();
</script>
