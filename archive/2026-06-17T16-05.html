  <meta name="outbox-spec-era" content="1958 — peak American summer-night drive-in movie-theater intermission era, the specific 11-minute concession-stand intermission gap between the first and second features at the Starlite Drive-In on the eastern outskirts of Bristol Tennessee on a humid Saturday evening in late July when the projection booth's carbon-arc lamp was being trimmed by chief projectionist Mr. Earl Pickering (age 47, came over from the Paramount downtown when the downtown house went stereo in 1953, has been running the Starlite's two RCA Brenkert BX-80 projectors since opening night August 14 1949) and the field of 247 parked cars on the gently-sloped gravel lot facing the 64-foot-wide painted-plywood screen flickered briefly between the orange amber glow of dashboard radios and the steady blue-violet wash of the screen going dark between reels, while above the lot and the screen and the small clapboard concession-stand-and-restrooms structure the sky held a specific late-twilight gradient that hovered for approximately eleven minutes between the deepening violet of full astronomical twilight and the slow appearance of the first stars rising over the Holston Mountain ridgeline to the east, with the specific small atmospheric quality of the humid Appalachian Saturday night when the asphalt of the day still radiated heat upward and the cooling mountain air sank down through the hollows and the two air masses met in a soft heat-shimmer haze that distorted the rising stars into trembling specular points — Venus already visible at 8:42pm Eastern Daylight Time at 14 degrees altitude in the western sky over the screen's back side, the waxing-gibbous moon at 23 degrees in the east-southeast, the first three stars of Cygnus just appearing in the zenith — and the entire 11-minute intermission unfolding under that specific sky with the soft mechanical click of the carbon-arc trimming overhead, the faint distant radio-static of two hundred and forty-seven dashboard speakers each tuned to the Starlite's 540 AM low-power station now playing the intermission organ-music reel that Mr. Pickering's wife Doris Pickering recorded at the Starlite's Wurlitzer console organ in March 1956 (specifically her favorite arrangement of 'Side By Side' played slowly), the soft hush of car-doors opening as families walked the gravel path to the concession stand for buttered popcorn and orange Nehi and root-beer floats, the small fireflies rising from the field grass at the edges of the lot in their species-specific Photinus pyralis flash pattern, and the slow continuous appearance of stars one-by-one above the screen as the sky completed its deepening through nautical twilight into the full astronomical dark that the second feature ('The Defiant Ones,' premiering September 24 1958, so this is a different feature — let's say it's actually 'Vertigo' which opened May 9 1958 at Bristol's downtown house and arrived at the Starlite three weeks later) would play its first reel against.">
  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece rendered entirely in pure CSS and SVG with no UI text, no controls, no chrome, no captions, no buttons, no instructions anywhere: the entire browser window IS the view from a specific blanket spread on the gravel beside a 1954 powder-blue Chevy Bel Air parked in row 14 space 8 at the Starlite Drive-In during the 11-minute intermission between features at approximately 9:48pm Eastern Daylight Time on Saturday July 26, 1958, looking up and slightly westward at the deepening twilight sky above the 64-foot painted-plywood screen which fills the lower 22% of the viewport as a near-black rectangle silhouette against the still-luminous sky, with the small clapboard concession stand visible as a warm-glowing yellow rectangle at the lower-left edge of the viewport (its single bare bulb above the screen door casting a soft 8-foot cone of warm light onto the gravel), the faint silhouettes of approximately 47 other parked cars visible across the lower viewport as soft black shapes barely-distinguishable against the deepening dusk, the screen's back-side (the wooden support truss) lit only by the warm spill of the concession-stand bulb, and above all of this the slow continuous appearance of stars one-by-one in deterministic astronomical positions for that specific date and time and latitude (36.5951°N, 82.1887°W — Bristol Tennessee) — the sky a slow-evolving gradient through the 11-minute cycle from the late-twilight rose-violet at minute 0 to the full-dark cobalt-indigo with Milky Way faintly visible at minute 11, then looping back. Stars appear in true positions: Venus already burning bright at upper-left over the screen, the waxing gibbous moon at right-center casting a soft cool moonlight across the lot, the Summer Triangle (Vega, Deneb, Altair) appearing in sequence at their correct azimuths as the sky darkens, the first three stars of Cygnus emerging at zenith, the Big Dipper just visible low in the northwest. Approximately 180 individual fireflies (Photinus pyralis) rise from the field-grass at the edges of the lot in their species-correct J-curve flash pattern (a half-second pause at the bottom of the rise, then a bright 0.4-second flash during the upward curve, then darkness for 5.5 seconds before the next rise), each firefly with its own randomized rise position and timing so the cumulative effect is a slow continuous shimmer of small warm-yellow flashes along the lot's perimeter. Inside the parked cars across the field, approximately 12 dashboard radios glow as small soft amber rectangles barely-perceptible at 0.18 opacity, with a soft synchronized intermission-organ-music shimmer (one dashboard radio briefly brightens by 0.06 opacity in a slow 1.4-second pulse synchronized across all 12 cars, suggesting the organ recording's swell phrases all playing simultaneously through 247 low-power-AM speakers). The concession-stand bulb at the lower-left flickers very slightly (0.05 opacity variation on a 0.18-second period) suggesting the mid-century filament's small AC ripple. Above the concession-stand a small mosquito-attracting bug zapper visible as a faint cool-violet rectangle with occasional small pop-flashes of warm-white. Cursor position acts as the angle of the viewer's tilted head — moving the cursor up shifts the entire star-field downward by small fractional amounts (parallax of ±6 pixels at zenith, ±14 pixels at horizon) suggesting the visitor very slightly tilting their head back against the open trunk of the Bel Air to look higher into the sky. The piece runs forever, the stars continue appearing in their correct astronomical order, the fireflies continue rising and flashing, the dashboard radios continue their synchronized organ-music pulse, the bug zapper continues its small pop-flashes, the concession-stand bulb continues its filament flicker, and the moon slowly climbs by approximately 4 pixels per minute across the cycle suggesting the actual lunar motion across 11 minutes of an Appalachian summer night.">
  <meta name="outbox-spec-subject" content="The single specific 11-minute intermission gap between the first and second features at the Starlite Drive-In Theater on Volunteer Parkway just east of Bristol Tennessee on the humid Saturday evening of July 26, 1958, from approximately 9:48pm to 9:59pm Eastern Daylight Time, as observed from a wool plaid picnic blanket spread on the gravel beside the 1954 powder-blue Chevy Bel Air parked in row 14 space 8 belonging to Mr. and Mrs. Russell and Joyce Whitsett of 814 Anderson Street in Bristol Tennessee (Russell age 32, second-shift quality-control inspector at the Beaunit Mills rayon plant in Elizabethton where he has worked since coming home from Korea in October 1953, Joyce age 29, homemaker and mother of three — Russell Jr. age 6, Patty age 4, and Sandra age 18 months who is asleep in the back seat of the Bel Air with a folded receiving blanket under her head), and the entire small infrastructure of one specific drive-in-theater Saturday-night ritual happening across that 11-minute gap: the carbon-arc lamps in the projection booth being trimmed by chief projectionist Mr. Earl Pickering between reels, the concession-stand at the back of the lot doing its peak business of the night with families walking the gravel path for buttered popcorn and orange Nehi and Mrs. Pickering's homemade root-beer floats served in waxed-paper cups for 15 cents, the 247 dashboard radios across the parked-car field all softly tuned to the Starlite's 540 AM low-power station now playing Doris Pickering's intermission-organ recording, the slow continuous deepening of the late-twilight sky from astronomical twilight into the full dark when the second reel will start, the rising of the first stars above the Holston Mountain ridgeline to the east, the appearance of Venus already burning at 14 degrees altitude in the western sky over the back of the screen, the waxing gibbous moon climbing into the east-southeast, and the patient summer-evening hum of Appalachian fireflies (Photinus pyralis) rising from the field-grass at the lot's perimeter in their species-specific courtship flash pattern; the specific small private fact that Russell Whitsett has spread the wool blanket on the gravel beside the Bel Air because Joyce said the Bel Air's back seat was getting hot with the windows up and Sandra needed cooler air to keep sleeping, and that Russell is lying on his back on the blanket with his head propped against the Bel Air's spare-tire well looking straight up at the deepening sky and counting how many stars he can identify before the second reel starts — Russell learned the constellations from his uncle Vernon Whitsett who was a Navy navigator in the Pacific from 1942 to 1946 and who taught Russell the Summer Triangle and the Big Dipper and Cassiopeia on visits to the Whitsett family farm in Sullivan County across the summers of 1946 to 1949 — and Russell has decided this intermission that he is going to teach Russell Jr. the Summer Triangle starting tomorrow night on the back porch.">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible on the page at any point. The piece speaks only through the slow continuous deepening of the late-twilight sky, the patient one-by-one appearance of stars in their true astronomical positions, the soft rise and J-curve flash of Appalachian summer fireflies along the field-grass perimeter, the synchronized soft glow-pulse of 12 dashboard radios across the lot playing Mrs. Pickering's organ recording, the small flicker of the concession-stand bulb, the occasional warm-white pop of the bug zapper, and the slow climb of the waxing gibbous moon by approximately 4 pixels per minute. The closest analogue to a voice is the silent careful attentiveness of Russell Whitsett himself on the wool blanket beside the Bel Air, head propped against the spare-tire well, watching the sky deepen and counting stars as they appear — present-tense, unhurried, neither performing nor explaining, the visual equivalent of lying on a picnic blanket on the gravel at a Tennessee drive-in on a humid Saturday night in July 1958 beside a 32-year-old quality-control inspector from the Beaunit Mills rayon plant who learned the constellations from his Navy-navigator uncle in 1947 and who is going to teach his six-year-old son the Summer Triangle tomorrow night on the back porch.">

  <meta name="outbox-spec-palette" content="Deep late-twilight rose-violet (#3a2a4e) along the upper viewport at cycle-start, smoothly interpolating across the 11-minute cycle through deepening cobalt (#1a1e3e) into the full astronomical dark indigo (#0a0e22) at minute 11 with the faint suggestion of the Milky Way visible as a soft pearl-amber band (#5a4e3a at 0.14 opacity) running diagonally from upper-left to lower-right + the screen silhouette in dead near-black (#040608) filling the lower 22% of the viewport with subtle painted-plywood horizontal seam visible as a thin warm-shadow line (#2a1e14 at 0.4 opacity) every 8 feet of scaled height + warm concession-stand bulb glow (#f5d894) at the lower-left as a soft 8-foot light cone (radial gradient from #f5d894 at 0.7 opacity at the bulb to #f5d894 at 0.02 opacity at the cone edge) with the small clapboard structure barely visible inside the cone as warm-cream weathered paint (#c8b478 at 0.5 opacity) and the screen door's mesh suggested as a faint cross-hatch (#7a5e3a at 0.3 opacity) + soft cool moonlight wash (#a8b4c8 at 0.18 opacity) falling across the gravel lot from the upper-right where the waxing gibbous moon (#f0ecdc at full bright with a soft #f5e8c4 halo at 0.4 opacity) sits at 23 degrees altitude + the deep silhouette field of 47 parked cars across the lower viewport in deep black-violet (#0e1018 at 0.85 opacity) with subtle warm spill on the windshield-glass surfaces (#c8b478 at 0.08 opacity from the concession bulb, #a8b4c8 at 0.12 opacity from the moon) + 12 dashboard radios glowing as small soft amber rectangles (#e8a838 at 0.18 opacity baseline, pulsing to 0.24 opacity on the synchronized 1.4-second organ-swell pulse) + 180 firefly Photinus pyralis flashes rendered as tiny soft-edged warm-yellow circles (#fae838 at 0.85 opacity at peak flash, fading to 0.0 across 0.4 seconds, J-curve rise pattern) at the field-grass perimeter along the lot edges + Venus at 14 degrees altitude as a bright steady warm-white point (#fef8e4 at 0.95 opacity with subtle 6-pointed diffraction-spike halo at 0.3 opacity) in the upper-left + the Summer Triangle stars appearing in sequence — Vega first (cool blue-white #c8d4f4 at 0.85 opacity), then Deneb (warm white-amber #f5ecd4 at 0.78 opacity), then Altair (slightly cooler #d8e4f8 at 0.82 opacity) — each with subtle specular twinkle achieved via 4-second sinusoidal opacity modulation of ±0.08 + approximately 47 additional fainter stars (#d8d4c8 at 0.4-0.7 opacity each, with subtle twinkle) appearing across the deepening sky in deterministic positions matching the actual Bristol TN latitude on July 26 1958 at 9:48-9:59pm EDT + the bug zapper at the concession-stand corner as a faint cool-violet rectangle (#7a6ec4 at 0.3 opacity) with occasional small pop-flashes of warm-white (#fef8e4 at 0.9 opacity for 80ms randomized every 8-22 seconds) + the heat-shimmer haze along the eastern horizon implemented as a subtle vertical-displacement warping of the lowest 8% of the star-field (sinusoidal x-offset of ±1.4 pixels on randomized 2-4 second periods) suggesting the cooling mountain air meeting the day's residual asphalt heat + Russell's wool plaid picnic blanket suggested at the very bottom edge of the viewport in deep cream and dark forest-green crossed plaid (#c8b478 and #2a3e2c at 0.65 opacity) with the spare-tire well of the Bel Air's open trunk barely visible at the lower-right (#7a8a98 polished-chrome trim at 0.45 opacity) — the entire scene transitions deterministically across the 11-minute cycle so the sky continuously deepens, the stars appear in their correct order at their correct elevations, the moon climbs by 4 pixels per minute, and the fireflies and dashboard radios and bug zapper continue their independent cycles autonomously.">
  <meta name="outbox-spec-wildcard" content="Exactly once per 11-minute cycle, at exactly t=0.642 (the 7-minute mark, approximately 9:55pm in the historical time), one specific firefly along the eastern edge of the lot produces a markedly slower and more saturated flash than the others — a 1.8-second slow warm-amber bloom at full 0.95 opacity instead of the standard 0.4-second flash at 0.85 — and the firefly's J-curve rise extends to 2.6 seconds with a brief 0.4-second hover at peak before descent. This is the specific firefly that 6-year-old Russell Jr. Whitsett, who is sitting up on the wool blanket beside his father at exactly that moment having woken from his post-popcorn doze, points to and says quietly 'Daddy look at that one' — and Russell follows his son's small index finger to the slow-blooming firefly and says quietly back 'that's a male calling for a mate, son, the females are in the grass and they answer back with their own light' — and Russell Jr. watches the firefly rise and bloom and descend and is quiet for the rest of the intermission thinking about it, and that small private exchange between a 32-year-old quality-control inspector and his 6-year-old son about the courtship behavior of Photinus pyralis becomes one of the small specific things Russell Jr. will remember from his childhood when he is 74 years old in 2026. The visitor is given no indication this is happening, no acknowledgment in any UI, no reward for noticing — just the quiet fact that on this particular frame of this particular cycle, one firefly along the eastern edge of the lot held its light a little longer because a small boy on a picnic blanket at a drive-in in 1958 pointed at it and his father told him what it was.">
  <meta name="outbox-spec-forbidden" content="Absolutely NO text, captions, labels-explaining-the-piece, title overlays, instructional UI, tooltip hints, loading messages, footer credits, watermarks, or any narrating voice anywhere on the page visible to the visitor — the piece must be entirely silent and entirely visual. NO horror-genre framing of the empty drive-in field, the silhouetted cars, the dark screen between reels, the silent intermission, or the slow appearance of stars as creepy/uncanny/sinister/dread-inducing — this is a warm humid Saturday evening at a working family drive-in theater on Volunteer Parkway, 247 families are at the concession stand or in their cars eating popcorn, Mr. Pickering is trimming the carbon-arc lamp, Mrs. Pickering's organ recording is playing softly through 247 dashboard speakers, and the sky is doing what summer skies do at the close of nautical twilight in Appalachia. NO 'the drive-in was a portal to somewhere else' twist, NO Twilight-Zone framing, NO 'something is wrong with the second reel' undertone, NO 'the cars are empty' creepypasta. NO Stranger-Things 1950s pastiche aesthetic, NO Happy-Days saccharine sock-hop sentimentality, NO Grease pastiche, NO American-Graffiti-as-pre-Vietnam-innocence retrospective framing, NO 'this was the last summer before everything changed' wistfulness. NO museum-archival 'remember when America had drive-ins' nostalgic detachment, NO soft melancholy about 'the lost art of the drive-in intermission,' NO cool ironic distance from 1950s southern small-city Saturday-night culture as quaint pre-mall Americana, NO retrospective elegy framing the Starlite or the Whitsetts or Mr. and Mrs. Pickering or Bristol Tennessee as already-vanished (the Starlite will close in 1987 and be paved over for a Walmart in 1994 but this Saturday night is July 26 1958 and the lot is full and the page is not retroactively informed by it). NO 'where are they now' wistfulness about Russell Jr. grown up or the Whitsetts retired, NO 'this drive-in is gone now' decline narrative, NO 'they don't make summer nights like this anymore' Boomer-sentimentality. NO Cold-War overlay on the 1958 sky, NO Sputnik-anxiety framing of the stars (Sputnik 1 launched October 1957 and the Whitsetts know about it from the radio but the page does not reference it), NO 'the country was on the brink of...' historical-essay framing. NO racial-politics overlay on Bristol Tennessee in 1958 (the Starlite was integrated under court order in 1962 — but this is 1958, the drive-in's seating practices are what they are, and the page does not litigate that history through Russell and Joyce Whitsett's specific Saturday night with their three children). NO Korean-War overlay on Russell's service (he came home in October 1953, he has a quality-control job he likes, and his Saturday night is not about the war). NO condescension toward drive-in movie culture as kitsch Americana, toward 1958 rayon-plant quality-control inspection as small-time labor, toward small-Appalachian-city family-Saturday-night-recreation as wistful small-life, toward dashboard-radio low-power-AM broadcasting as primitive. NO smug modern superiority about pre-streaming entertainment. NO Norman-Rockwell sentimentality, NO Saturday-Evening-Post-cover Americana, NO Pinterest-vintage-Americana mood-boarding, NO Wes-Anderson-symmetrical-frame styling. NO accented-English pastiche of southern speech, NO 'aw shucks' Appalachian dialogue, NO Larry-McMurtry-as-Last-Picture-Show-melancholy register. NO Bradbury Dandelion-Wine summer-of-childhood wistfulness register, NO Stand-By-Me melancholy-childhood-tableau register, NO 'this was the autumn that changed everything' Wonder-Years framing. NO night-shift dispatcher voice (9:48pm in a drive-in field on a Saturday is not a midnight desk vigil), NO lowercase sentence-fragments, NO hyperminimal museum-card prose, NO SCP-cryptic register about the wildcard firefly or the silent intermission or the small father-son exchange, NO archival cabinet/drawer/vault framing of the drive-in or the night sky as relic, NO observatory/society/club scaffolding (the Whitsetts are not a society of anything, they are a family at the drive-in), NO radio/CB/ham-radio/broadcast/dispatcher/switchboard/operator-shift/transmission/signal/frequency-tuner framing of the 540 AM low-power station or the 247 dashboard radios or Mrs. Pickering's organ recording or Mr. Pickering's projection-booth carbon-arc trimming as signal-network metaphor — the radio station is just the radio station, the projection booth is just the projection booth, neither is a signal-relay metaphor for anything, and radio/dispatcher/transmission framing is hard-banned this hour regardless of bucket. NO 'day-of-the-week' subject framing (Saturday is a contextual fact about which evening shift the drive-in is running, not the subject of the piece). NO 'fictional small-town society/club' framing. NO weather-app or photo-viewer interface conventions, NO settings panels, NO playback controls, NO speed sliders, NO 'pause the sky' affordance, NO 'identify the constellations' overlay tools. NO Mary-Oliver pause-and-notice-the-world quote-register, NO Wendell-Berry agrarian-philosophical handwringing, NO Annie-Dillard pilgrim-at-tinker-creek epiphany voice. The sky deepens, the fireflies rise, the moon climbs, the dashboard radios glow, the concession-stand bulb flickers, Russell Whitsett lies on the wool blanket counting stars, Russell Jr. wakes up and points at a firefly, and the visitor watches in silence — that is the entire piece. Treat the 11-minute intermission as a serious working piece of mid-century Saturday-night family-recreation infrastructure, treat the Starlite Drive-In as a legitimate working southern-Appalachian small-city entertainment institution, treat Mr. Pickering's carbon-arc-trimming and Mrs. Pickering's organ-recording as real skilled labor worth full peer-to-peer respect, treat Russell Whitsett's quiet star-counting and his small Saturday-night decision to teach his six-year-old son the Summer Triangle tomorrow night as a real working act of cross-generational attention worth full peer-to-peer respect, and treat the visitor's quiet act of watching one specific 11-minute summer-evening sky over a specific 1958 Tennessee drive-in as real participation in a real act of patient sky-attention worthy of full peer-to-peer respect.">

  :root{

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%; height:100%;

    cursor:default;
  }
  .stage{
    position:fixed; inset:0;
    overflow:hidden;
  }

  /* SKY — three stacked gradients we cross-fade with opacity */
  .sky{
    position:absolute; inset:0;
    will-change:opacity;
  }
  .sky-early{
    background:
      radial-gradient(120% 70% at 70% 110%, #4a3258 0%, transparent 55%),
      linear-gradient(to bottom,
        #3a2a4e 0%,
        #392a52 22%,
        #2e2552 45%,
        #1f2350 70%,
        #181f44 100%);
    opacity:1;
  }
  .sky-mid{
    background:
      radial-gradient(120% 70% at 70% 110%, #2e2554 0%, transparent 55%),
      linear-gradient(to bottom,
        #1f2350 0%,
        #1a1e44 30%,
        #131838 60%,
        #0e1430 100%);
    opacity:0;
  }
  .sky-late{
    background:
      radial-gradient(120% 70% at 70% 110%, #1a1e4a 0%, transparent 60%),
      linear-gradient(to bottom,
        #0a0e22 0%,
        #0a1028 35%,
        #08102a 70%,
        #060a22 100%);
    opacity:0;
  }

  /* MILKY WAY — faint diagonal */
  .milky{
    position:absolute;
    left:-10%; top:-15%;
    width:140%; height:80%;
    background:
      linear-gradient(115deg,
        transparent 35%,
        rgba(120,100,72,0.06) 44%,
        rgba(140,118,84,0.10) 50%,
        rgba(120,100,72,0.06) 56%,
        transparent 65%);
    filter:blur(8px);
    opacity:0;
    pointer-events:none;
  }

  /* HORIZON heat shimmer band — sits over lower sky, animates a sinewy displacement via translate */
  .shimmer-band{
    position:absolute;
    left:0; right:0;
    bottom:22%;
    height:7%;
    pointer-events:none;
    overflow:hidden;
  }
  .shimmer-band::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(60,55,80,0.18), transparent 70%);

  /* SCREEN — lower 22% silhouette, with painted-plywood seams */
  .screen-wrap{
    position:absolute;

    bottom:6%;
    height:18%;
    pointer-events:none;
  }

    position:absolute;
    left:0; right:0; bottom:0;

    top:14%; left:18%; right:18%; height:46%;

  .dash{

    50%   { opacity:1; box-shadow:0 0 9px rgba(232,168,56,0.32); }

  /* CONCESSION STAND — lower-left clapboard, glowing bulb cone */
  .concession{
    position:absolute;

  .stand-cone{

  .stand-body{
    position:absolute;

      rgba(30,22,14,0.30) 5px,

  .stand-body::after{
    /* screen door */
    content:"";
    position:absolute;
    left:38%; bottom:8%;
    width:24%; height:74%;
    background:
      repeating-linear-gradient(45deg,
        rgba(122,94,58,0.35) 0 2px, transparent 2px 4px),

  .stand-bulb{
    position:absolute;
    left:46%; bottom:62%;
    width:6px; height:6px;
    border-radius:50%;
    background:#fff5cc;
    box-shadow:
      0 0 8px 3px rgba(245,216,148,0.9),
      0 0 22px 8px rgba(245,216,148,0.45);
    animation:filamentFlicker 0.18s steps(2,end) infinite;
  }
  .zapper{
    position:absolute;
    left:78%; bottom:52%;
    width:10px; height:14px;
    background:rgba(122,110,196,0.30);
    box-shadow:inset 0 0 4px rgba(122,110,196,0.55);
  }
  .zap-pop{
    position:absolute;
    left:78%; bottom:52%;
    width:10px; height:14px;
    background:#fef8e4;
    opacity:0;
  }

  /* BLANKET corner at the very bottom */
  .blanket{
    position:absolute;
    left:0; right:0; bottom:0;
    height:7%;
    background:
      linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.55) 100%),
      repeating-linear-gradient(90deg,
        rgba(200,180,120,0.65) 0 24px,
        rgba(42,62,44,0.65) 24px 30px,
        rgba(200,180,120,0.65) 30px 56px,
        rgba(42,62,44,0.65) 56px 60px),
      repeating-linear-gradient(0deg,
        rgba(200,180,120,0.55) 0 24px,
        rgba(42,62,44,0.55) 24px 30px,
        rgba(200,180,120,0.55) 30px 56px,
        rgba(42,62,44,0.55) 56px 60px);
    background-blend-mode:multiply, multiply, normal;
    pointer-events:none;
  }
  /* spare-tire well + chrome trim at lower-right */
  .trunk{
    position:absolute;
    right:0; bottom:5%;
    width:30%; height:18%;
    pointer-events:none;
  }
  .trunk::before{
    content:"";
    position:absolute;
    right:0; bottom:0;
    width:100%; height:60%;
    background:
      radial-gradient(120% 80% at 100% 100%, rgba(122,138,152,0.45) 0%, rgba(40,46,56,0.55) 40%, transparent 70%);
    border-top-left-radius:30% 80%;
  }
  .trunk::after{
    /* chrome bumper sliver */
    content:"";
    position:absolute;
    right:0; bottom:38%;
    width:100%; height:4px;
    background:linear-gradient(to right, transparent, rgba(200,210,224,0.55) 60%, rgba(168,180,200,0.45));
    filter:blur(0.6px);
  }

  /* STAR PARALLAX LAYERS */
  .parallax{
    position:absolute; inset:0;
    pointer-events:none;
    transform:translate3d(0,0,0);
    will-change:transform;
  }

  /* SVG stars / moon / venus container */
  .skybody{
    position:absolute;
    left:0; top:0;
    width:100%; height:78%;
    pointer-events:none;
  }

  .star{
    position:absolute;
    border-radius:50%;
    background:#d8d4c8;
    box-shadow:0 0 3px rgba(216,212,200,0.4);
    opacity:0;
    transition:opacity 1s ease-out;
  }
  .star.named{
    box-shadow:0 0 5px currentColor;
  }
  .star.twinkle{
    animation:twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ filter:brightness(1); transform:scale(1); }
    50%   { filter:brightness(1.25); transform:scale(1.15); }
  }

  .venus{
    position:absolute;
    width:5px; height:5px;
    border-radius:50%;
    background:#fef8e4;
    box-shadow:
      0 0 6px 1px rgba(254,248,228,0.95),
      0 0 18px 4px rgba(254,248,228,0.45);
    opacity:0.95;
  }
  .venus::before, .venus::after{
    content:"";
    position:absolute;
    left:50%; top:50%;
    background:rgba(254,248,228,0.35);
    transform:translate(-50%,-50%);
  }
  .venus::before{ width:22px; height:1px; }
  .venus::after { width:1px; height:22px; }

  .moon{
    position:absolute;
    width:38px; height:38px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 40%, #fff8e8 0%, #f0ecdc 60%, #c8c0a8 100%);
    box-shadow:
      0 0 14px 4px rgba(245,232,196,0.45),
      0 0 36px 14px rgba(245,232,196,0.20);
  }
  .moon::after{
    /* gibbous terminator — soft dark crescent on the right side */
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:radial-gradient(circle at 22% 50%, transparent 52%, rgba(8,8,16,0.45) 70%, rgba(4,6,12,0.55) 100%);
  }

  /* FIREFLIES */
  .firefly{
    position:absolute;
    width:3px; height:3px;
    border-radius:50%;
    background:#fae838;
    box-shadow:0 0 6px 2px rgba(250,232,56,0.7);
    opacity:0;
    pointer-events:none;
  }

  /* FOOTER LINK — discreet, hidden in the gravel shadow at bottom-right */
  .way-out{
    position:fixed;
    right:14px; bottom:10px;
    font-family:Georgia, serif;
    font-size:10px;
    letter-spacing:0.06em;
    color:rgba(200,180,120,0.18);
    text-decoration:none;
    z-index:50;
    transition:color 0.6s ease;
    font-style:italic;
  }
  .way-out:hover{ color:rgba(245,216,148,0.55); }

  @media (max-width:600px){
    .moon{ width:28px; height:28px; }
    .concession{ width:26%; height:16%; }
  }
</style>

<body>
<!--
  row 14, space 8. blanket on the gravel. spare tire under his head.
  he's counting them as they come up. tomorrow night, on the porch,
  he's going to show the boy the triangle.
-->
<div class="stage" id="stage">

  <div class="sky sky-early" id="skyEarly"></div>
  <div class="sky sky-mid"   id="skyMid"></div>
  <div class="sky sky-late"  id="skyLate"></div>
  <div class="milky" id="milky"></div>

  <div class="parallax" id="parallax">
    <div class="skybody" id="skybody"></div>
  </div>

  <div class="shimmer-band"></div>

  <div class="cars" id="cars"></div>

  <div class="screen-wrap">
    <div class="screen"></div>
  </div>

  <div class="gravel"></div>

  <div class="concession">
    <div class="stand-cone"></div>
    <div class="stand-body"></div>
    <div class="stand-bulb"></div>
    <div class="zapper"></div>
    <div class="zap-pop" id="zapPop"></div>
  </div>

  <div class="trunk"></div>
  <div class="blanket"></div>

</div>

<a class="way-out" href="/archive" title="other quiet evenings">other evenings &rarr;</a>

<script>
(() => {
  const stage   = document.getElementById('stage');
  const skybody = document.getElementById('skybody');
  const carsEl  = document.getElementById('cars');
  const parallax= document.getElementById('parallax');
  const skyMid  = document.getElementById('skyMid');
  const skyLate = document.getElementById('skyLate');
  const milky   = document.getElementById('milky');
  const zapPop  = document.getElementById('zapPop');

  let W = window.innerWidth, H = window.innerHeight;
  const SKY_H_RATIO = 0.78; // matches .skybody height

  // ---- Named stars (alt/az approximated for 36.6°N, July 26 1958, ~9:53pm EDT) ----
  // azimuth: 0=N, 90=E, 180=S, 270=W. We map to x by azimuth, y by altitude.
  // Magnitudes inform opacity & size.
  const NAMED = [
    // Venus is special-cased
    { name:'Vega',     az:78,  alt:78, mag:0.03, color:'#c8d4f4' },
    { name:'Deneb',    az:55,  alt:62, mag:1.25, color:'#f5ecd4' },
    { name:'Altair',   az:118, alt:55, mag:0.77, color:'#d8e4f8' },
    { name:'Arcturus', az:262, alt:58, mag:-0.05,color:'#f5d8a8' },
    { name:'Antares',  az:188, alt:30, mag:1.06, color:'#f5b48a' },
    { name:'Spica',    az:248, alt:32, mag:1.04, color:'#d8e4f8' },
    { name:'Alphecca', az:268, alt:64, mag:2.22, color:'#e4ecf4' },
    { name:'Rasalhague',az:150,alt:62, mag:2.07, color:'#e8ecf0' },
    { name:'Eltanin',  az:48,  alt:72, mag:2.23, color:'#f0e0c4' },
    { name:'Kochab',   az:355, alt:50, mag:2.08, color:'#f0d8b8' },
    { name:'Polaris',  az:0,   alt:36.5,mag:1.98,color:'#f0ecdc' },
    { name:'Capella',  az:32,  alt:14, mag:0.08, color:'#f5e8c4' },
    // Cygnus other stars
    { name:'Sadr',     az:60,  alt:72, mag:2.20, color:'#f5ecd4' },
    { name:'Albireo',  az:90,  alt:64, mag:3.05, color:'#f0d8b8' },
    { name:'Gienah',   az:48,  alt:68, mag:2.46, color:'#f5ecd4' },
    // Big Dipper low NW
    { name:'Dubhe',    az:316, alt:30, mag:1.81, color:'#f0e4c8' },
    { name:'Merak',    az:312, alt:26, mag:2.37, color:'#e8e4d0' },
    { name:'Phecda',   az:306, alt:30, mag:2.44, color:'#e8e4d0' },
    { name:'Megrez',   az:308, alt:34, mag:3.31, color:'#e0dcc8' },
    { name:'Alioth',   az:302, alt:38, mag:1.77, color:'#e8e4d0' },
    { name:'Mizar',    az:298, alt:40, mag:2.04, color:'#e8e4d0' },
    { name:'Alkaid',   az:294, alt:42, mag:1.86, color:'#e8e4d0' },
    // Cassiopeia rising NE
    { name:'Schedar',  az:30,  alt:22, mag:2.24, color:'#f5d8b8' },
    { name:'Caph',     az:24,  alt:18, mag:2.27, color:'#f0ecdc' },
    { name:'Gamma Cas',az:36,  alt:25, mag:2.47, color:'#e8ecf4' },
    { name:'Ruchbah',  az:42,  alt:28, mag:2.66, color:'#e8ecf0' },
    { name:'Segin',    az:48,  alt:32, mag:3.35, color:'#e8ecf0' },
    // Scattered
    { name:'Sabik',    az:172, alt:42, mag:2.43, color:'#f0ecdc' },
    { name:'Shaula',   az:194, alt:18, mag:1.62, color:'#e8ecf0' },
    { name:'Sargas',   az:198, alt:14, mag:1.86, color:'#f0d8b8' },
    { name:'Nunki',    az:158, alt:30, mag:2.05, color:'#e8ecf4' },
    { name:'Kaus Aust',az:170, alt:28, mag:1.85, color:'#f0e4c8' },
    { name:'Atria',    az:178, alt:6,  mag:1.91, color:'#f5b48a' },
    { name:'Izar',     az:280, alt:60, mag:2.37, color:'#f5d8a8' },
    { name:'Cor Caroli',az:295,alt:50, mag:2.81, color:'#f0e4c8' },
    { name:'Vindemiatrix',az:258,alt:42,mag:2.85,color:'#f5e8c4' },
    { name:'Diadem',   az:260, alt:48, mag:4.32, color:'#e8e4d0' },
    { name:'Yed Prior',az:188, alt:46, mag:2.74, color:'#f5d8a8' },
    { name:'Tarazed',  az:120, alt:58, mag:2.72, color:'#f5d8a8' },
    { name:'Alshain',  az:117, alt:52, mag:3.71, color:'#f0ecdc' },
    { name:'Enif',     az:96,  alt:30, mag:2.40, color:'#f5d8a8' },
    { name:'Markab',   az:80,  alt:18, mag:2.49, color:'#e8ecf0' },
    { name:'Scheat',   az:78,  alt:24, mag:2.42, color:'#f5b48a' },
    { name:'Alphirk',  az:18,  alt:55, mag:3.23, color:'#e8ecf0' },
    { name:'Alderamin',az:30,  alt:48, mag:2.46, color:'#f0e4c8' },
    { name:'Errai',    az:10,  alt:52, mag:3.21, color:'#f0d8b8' },
    { name:'Thuban',   az:340, alt:55, mag:3.65, color:'#f0e4c8' },
  ];

  // ---- Anonymous fainter background stars (deterministic via seeded random) ----
  let seed = 19580726;
  function rand(){ seed = (seed * 1664525 + 1013904223) % 4294967296; return seed / 4294967296; }
  const FAINT = [];
  for (let i = 0; i < 110; i++){
    FAINT.push({
      az:  rand()*360,
      alt: 6 + rand()*80,
      mag: 3.5 + rand()*2.5,
    });
  }

  // azimuth/altitude -> screen position
  // We treat the visible field roughly as a panorama centered on south (180°).
  // The viewer is on a blanket looking up & slightly west.
  function azAltToXY(az, alt){
    // wrap az to [-180,180] around south
    let a = az - 200; // looking south-southwest
    while (a > 180) a -= 360;
    while (a < -180) a += 360;
    // x: spread across width
    const x = (0.5 + (a / 220)) * W;
    // y: altitude 0 at horizon (bottom of sky area), 90 at top
    const skyH = H * SKY_H_RATIO;
    const yNorm = 1 - (alt / 90);
    const y = yNorm * skyH;
    return { x, y, inView: x > -20 && x < W + 20 };
  }

  // Build named stars
  const namedNodes = [];
  function magToSize(m){
    if (m < 0) return 4.0;
    if (m < 1) return 3.4;
    if (m < 2) return 2.8;
    if (m < 3) return 2.2;
    if (m < 4) return 1.6;
    return 1.2;
  }
  function magToOpacity(m){
    if (m < 0) return 0.95;
    if (m < 1) return 0.88;
    if (m < 2) return 0.78;
    if (m < 3) return 0.62;
    if (m < 4) return 0.45;
    return 0.32;
  }

  NAMED.forEach((s) => {
    const pos = azAltToXY(s.az, s.alt);
    if (!pos.inView) return;
    const el = document.createElement('div');
    el.className = 'star named' + (s.mag < 2.5 ? ' twinkle' : '');
    const size = magToSize(s.mag);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    el.style.color = s.color;
    el.style.background = s.color;
    el.dataset.alt = s.alt;
    el.dataset.name = s.name;
    el.dataset.targetOp = magToOpacity(s.mag);
    el.dataset.appearAt = String(0.05 + (1 - s.mag/6) * 0.05 + (1 - s.alt/90) * 0.4 + (s.name === 'Vega' ? -0.4 : 0));
    skybody.appendChild(el);
    namedNodes.push(el);
  });

  // Faint stars
  FAINT.forEach((s) => {
    const pos = azAltToXY(s.az, s.alt);
    if (!pos.inView) return;
    const el = document.createElement('div');
    el.className = 'star' + (rand() > 0.5 ? ' twinkle' : '');
    const size = magToSize(s.mag);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    el.dataset.alt = s.alt;
    el.dataset.targetOp = magToOpacity(s.mag);
    // fainter stars appear later
    el.dataset.appearAt = String(0.25 + (s.mag - 3.5) * 0.18 + (1 - s.alt/90) * 0.25);
    skybody.appendChild(el);
    namedNodes.push(el);
  });

  // Venus — upper left, west, alt ~14°
  const venusPos = azAltToXY(282, 14);
  const venusEl = document.createElement('div');
  venusEl.className = 'venus';
  venusEl.style.left = venusPos.x + 'px';
  venusEl.style.top  = venusPos.y + 'px';
  skybody.appendChild(venusEl);

  // Moon — east-southeast, alt 23° (will climb)
  const moonEl = document.createElement('div');
  moonEl.className = 'moon';
  const moonStart = azAltToXY(118, 23);
  moonEl.style.left = (moonStart.x - 19) + 'px';
  moonEl.style.top  = (moonStart.y - 19) + 'px';
  skybody.appendChild(moonEl);

  // ---- CARS ----
  // 47 cars spread across the lower band (we'll vary heights & widths)
  // We avoid placing one car directly center-right where the screen sits.
  const NUM_CARS = 38;
  const carData = [];
  for (let i = 0; i < NUM_CARS; i++){
    const xFrac = (i + 0.4 + rand() * 0.5) / NUM_CARS;
    const yRow  = rand();
    const w = 28 + rand() * 36;
    const h = 14 + rand() * 10;
    carData.push({xFrac, yRow, w, h, hasDash: rand() < 0.34});
  }

  carData.forEach((c, i) => {
    const car = document.createElement('div');
    car.className = 'car';
    const x = c.xFrac * W;
    const yPx = c.yRow * (H * 0.085);
    car.style.left = (x - c.w/2) + 'px';
    car.style.bottom = yPx + 'px';
    car.style.width = c.w + 'px';
    car.style.height = c.h + 'px';
    if (c.hasDash){
      const d = document.createElement('div');
      d.className = 'dash';
      // slight phase offset so the 12 radios aren't perfectly identical but still synced
      d.style.animationDelay = ((i % 7) * -0.08) + 's';
      car.appendChild(d);
    }
    carsEl.appendChild(car);
  });

  // ---- FIREFLIES ----
  // 180 in spec — we'll do ~70 visible (perf-friendly) along lot perimeter
  const NUM_FF = 72;
  const fireflies = [];
  const baseY = H * 0.78; // around the cars / lot edge
  const flyArea = H * 0.12;

  // wildcard firefly — index chosen on east edge
  // pick one on the right-ish (east edge of lot)
  let wildcardIdx = -1;

  for (let i = 0; i < NUM_FF; i++){
    const ff = document.createElement('div');
    ff.className = 'firefly';
    // edges of the lot — bias to left third & right third
    let xFrac;
    const r = rand();
    if (r < 0.45) xFrac = rand() * 0.28;        // left edge
    else if (r < 0.92) xFrac = 0.72 + rand() * 0.28; // right edge
    else xFrac = 0.30 + rand() * 0.40;          // a few middle
    const baseX = xFrac * W;
    const yJitter = rand() * flyArea;
    const phaseOffset = rand() * 5.9;
    const cycleLen = 5.9 + rand() * 0.4; // ~6s species cycle
    stage.appendChild(ff);
    const data = {
      el: ff,
      baseX, baseY: baseY + yJitter,
      phase: phaseOffset,
      cycle: cycleLen,
      isWild: false,
      xFrac
    };
    fireflies.push(data);
    if (wildcardIdx === -1 && xFrac > 0.78 && i > 10) wildcardIdx = i;
  }
  if (wildcardIdx === -1) wildcardIdx = fireflies.length - 1;
  fireflies[wildcardIdx].isWild = true;

  // ---- CURSOR PARALLAX ----
  let cursorX = W / 2, cursorY = H / 2;
  let targetParaX = 0, targetParaY = 0;
  let curParaX = 0, curParaY = 0;

  function setCursor(x, y){
    cursorX = x; cursorY = y;
    // moving cursor up shifts star field down (head tilts back)
    // amplitude: ±6 at top of sky (zenith), ±14 at horizon
    // Map cursorY (0..H) to range
    const ny = 1 - (cursorY / H); // 1 at top, 0 at bottom
    // shift Y: cursor up => positive shift (stars drop)
    targetParaY = ny * 10 - 4;  // -4..+6 vertical
    // cursor horizontal also a touch
    const nx = (cursorX / W) - 0.5; // -0.5..0.5
    targetParaX = -nx * 8; // -4..+4 horizontal
  }
  window.addEventListener('mousemove', (e) => setCursor(e.clientX, e.clientY));
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) setCursor(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});

  // ---- MAIN LOOP ----
  const CYCLE_MS = 11 * 60 * 1000; // 11 minutes
  const startTime = performance.now();
  let lastZapTime = startTime;
  let nextZapDelay = 8000 + Math.random() * 14000;

  function frame(now){
    const elapsed = (now - startTime) % CYCLE_MS;
    const t = elapsed / CYCLE_MS; // 0..1

    // SKY CROSSFADE: early -> mid -> late
    // early dominates 0..0.35, mid dominates 0.35..0.75, late dominates 0.75..1
    let midOp, lateOp;
    if (t < 0.45){
      midOp = t / 0.45;
      lateOp = 0;
    } else if (t < 0.85){
      midOp = 1 - (t - 0.45) / 0.40;
      lateOp = (t - 0.45) / 0.40 * 0.85;
    } else {
      midOp = 0;
      lateOp = 0.85 + (t - 0.85) / 0.15 * 0.15;
    }
    skyMid.style.opacity  = Math.max(0, Math.min(1, midOp));
    skyLate.style.opacity = Math.max(0, Math.min(1, lateOp));
    milky.style.opacity   = Math.max(0, (t - 0.55) / 0.45) * 0.55;

    // STARS appear by appearAt threshold
    for (let i = 0; i < namedNodes.length; i++){
      const el = namedNodes[i];
      const appearAt = parseFloat(el.dataset.appearAt);
      const targetOp = parseFloat(el.dataset.targetOp);
      if (t >= appearAt){
        // fade in over 4% of cycle
        const fade = Math.min(1, (t - appearAt) / 0.04);
        el.style.opacity = (fade * targetOp).toFixed(3);
      } else {
        el.style.opacity = 0;
      }
    }

    // MOON climbs ~4px/min — across 11 min, total climb ~44 px
    const skyH = H * SKY_H_RATIO;
    const moonClimb = t * 44;
    moonEl.style.top = (moonStart.y - 19 - moonClimb) + 'px';

    // FIREFLIES — J-curve rise & flash
    const tSec = (now - startTime) / 1000;
    for (let i = 0; i < fireflies.length; i++){
      const f = fireflies[i];
      const localT = ((tSec + f.phase) % f.cycle) / f.cycle; // 0..1
      let opacity = 0;
      let dx = 0, dy = 0;

      if (!f.isWild){
        // Phase A 0..0.085: hover at base, opacity 0
        // Phase B 0.085..0.27: rise + flash (peak around 0.18)
        // Phase C 0.27..1: dark, returning down (invisible)
        if (localT < 0.085){
          opacity = 0;
        } else if (localT < 0.27){
          const r = (localT - 0.085) / 0.185;
          // J-curve: x small drift, y rise with curve
          dx = Math.sin(r * Math.PI) * 5;
          dy = -r * 22;
          // Flash bell-curve peaking mid-phase
          opacity = Math.sin(r * Math.PI) * 0.85;
        } else {
          opacity = 0;
        }
      } else {
        // WILDCARD — at t≈0.642, slower & more saturated
        // Sync wildcard's special bloom to the cycle's t=0.642 mark
        const cycleTime = t; // 0..1 of the 11-min cycle
        const target = 0.642;
        const windowHalf = 0.012; // ~8 seconds around 7-min mark
        const inWindow = Math.abs(cycleTime - target) < windowHalf;
        if (inWindow){
          // 1.8s slow bloom, J-curve rise 2.6s with hover at peak 0.4s
          const w = (cycleTime - (target - windowHalf)) / (windowHalf * 2); // 0..1
          // rise during w 0..0.55, hover 0.55..0.7, descend 0.7..1
          if (w < 0.55){
            const r = w / 0.55;
            dx = Math.sin(r * Math.PI * 0.7) * 7;
            dy = -r * 30;
            opacity = r * 0.95;
          } else if (w < 0.70){
            dx = Math.sin(0.7 * Math.PI * 0.7) * 7;
            dy = -30;
            opacity = 0.95;
          } else {
            const r = (w - 0.70) / 0.30;
            dx = Math.sin((0.7 + r*0.3) * Math.PI * 0.7) * 7;
            dy = -30 * (1 - r);
            opacity = 0.95 * (1 - r);
          }
        } else {
          // outside the special window, behave normally
          if (localT < 0.085){
            opacity = 0;
          } else if (localT < 0.27){
            const r = (localT - 0.085) / 0.185;
            dx = Math.sin(r * Math.PI) * 5;
            dy = -r * 22;
            opacity = Math.sin(r * Math.PI) * 0.80;
          } else {
            opacity = 0;
          }
        }
      }

      f.el.style.left = (f.baseX + dx) + 'px';
      f.el.style.top  = (f.baseY + dy) + 'px';
      f.el.style.opacity = opacity.toFixed(3);
    }

    // PARALLAX easing
    curParaX += (targetParaX - curParaX) * 0.06;
    curParaY += (targetParaY - curParaY) * 0.06;
    parallax.style.transform = `translate3d(${curParaX.toFixed(2)}px, ${curParaY.toFixed(2)}px, 0)`;

    // ZAPPER POPS
    if (now - lastZapTime > nextZapDelay){
      zapPop.style.opacity = '0.9';
      setTimeout(() => { zapPop.style.opacity = '0'; }, 80);
      lastZapTime = now;
      nextZapDelay = 8000 + Math.random() * 14000;
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  // ---- RESIZE handling — rebuild positions ----
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const newW = window.innerWidth, newH = window.innerHeight;
      const xScale = newW / W, yScale = newH / H;
      // Scale stars
      [...skybody.querySelectorAll('.star, .venus, .moon')].forEach(el => {
        const left = parseFloat(el.style.left);
        const top  = parseFloat(el.style.top);
        el.style.left = (left * xScale) + 'px';
        el.style.top  = (top * yScale) + 'px';
      });
      fireflies.forEach(f => {
        f.baseX *= xScale;
        f.baseY *= yScale;
      });
      W = newW; H = newH;
    }, 200);
  });

  // a small thing the page knows, written down for whoever opens the console:
  // 36.5951°N, 82.1887°W — Volunteer Parkway, just east of Bristol.
  // The bulb above the screen door at the concession stand was a 60-watt General Electric.
})();
</script>
