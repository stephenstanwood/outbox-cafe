  <meta name="outbox-spec-era" content="1968 — peak American suburban Saturday-morning kitchen-linoleum scuffed-wax era, the specific Saturday-morning moment when middle-class housewives across the upper Midwest mopped the kitchen linoleum with Johnson Wax's Glo-Coat liquid-floor-wax product applied with a rectangular cellulose-sponge mop from a yellow plastic bucket filled at the deep-set Kohler kitchen sink, the very specific 7:14am Saturday-morning moment when Mrs. Roberta 'Bobbie' Stiefelmeier (age 36, homemaker, married thirteen years to Don who is at the Allis-Chalmers Tractor Division plant in West Allis doing a Saturday overtime shift, mother of three: Kevin 11, Joanne 9, Mark 5) at 4118 Edgewood Drive in Greendale Wisconsin had just finished mopping the small kitchen linoleum (a cream-and-pale-mint speckled-pattern Armstrong Excelon vinyl-asbestos tile installed October 1962 by Don himself across three weekends with a borrowed Sears tile-cutter) and was watching the Glo-Coat wax dry across the floor in patient slow horizontal sweep-marks where the sponge mop had laid down the second coat, the wax catching the early east-window October light at a precise low angle that produced the very specific small rainbow-iridescent oil-slick sheen across the wet-wax surface, and Bobbie standing at the kitchen door with her second cup of Folger's percolator coffee in a cream-and-gold-band Anchor Hocking mug watching the iridescent sheen slowly settle and dull into the final hard satin finish across the 47 minutes it took the wax to fully cure">
  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece rendered entirely in pure CSS and SVG with no UI text and no controls anywhere: the entire browser window IS the cream-and-pale-mint speckled Armstrong Excelon vinyl-asbestos kitchen linoleum at 7:14am on Saturday October 19 1968, viewed from directly above as Bobbie sees it standing at the kitchen door with her coffee mug — the 9×11 foot floor scaled to fill the viewport with each individual 9-inch tile clearly visible in its grid pattern, every tile bearing its own slightly different cream-mint speckle pattern, the floor freshly mopped with Johnson Wax Glo-Coat in slow horizontal sponge-mop sweep-marks running left-to-right across the tiles, and the wet-wax surface catching the rising east-window October light at a precise low angle to produce continuously evolving rainbow-iridescent oil-slick sheens across the floor. The piece is a deterministic 47-minute generative cycle in which the wax very slowly cures across the floor — the iridescent sheen begins at peak saturation at minute 0 (representing 7:14am, the moment Bobbie set down the bucket and stepped back), evolves continuously across the cycle as the wax dries and the oil-slick colors slowly shift and dull into their final hard satin finish at minute 47 (representing 8:01am, when the floor is fully cured), then loops smoothly back to minute 0. The iridescent sheen is rendered as overlapping translucent CSS conic-gradient bands flowing across the linoleum in the patterns of real curing-floor-wax surface tension — broad warm-coral and butter-yellow and pearl-cream and dusty sage-green and cool dusty-violet bands at 0.18-0.32 opacity blending into each other with subtle internal swirl, each band slowly drifting at 0.4-0.8 pixels per second along the sweep-mark direction, and each band's saturation and edge-definition very slowly diminishing across the cycle as the wax cures. The sponge-mop sweep-marks themselves are visible as parallel slightly-darker stripes spaced 11 inches apart running floor-to-ceiling, each stripe carrying the faint ridged texture of where the cellulose sponge laid down its second coat with subtle pool-pattern variation along the seam between sweeps. Suspended within the wax surface are approximately 340 tiny procedurally-generated micro-bubbles (the small bubbles a cellulose mop leaves in wet wax) rendered as soft-edged 2-4 pixel SVG circles each catching the iridescent light at its own specific angle — bubbles in warm-band regions render warmer-coral, bubbles in cool-band regions render cooler-violet, each bubble drifting very slowly with the band it sits in, each bubble slowly contracting in radius across the cycle as the wax cures around it and the bubble shrinks toward eventual invisibility by minute 47. Cast across the floor from the upper-right edge of the viewport (the east kitchen window) is the warm October sunrise light at 0.22 opacity wash with subtle warm-cream undertone, the light catching the iridescent sheen at the specific 14-degree angle that produces the peak oil-slick refraction. Visible at the lower-right edge of the viewport is the very edge of Bobbie's yellow plastic bucket (#f0c838) with the cellulose-sponge mop-head resting in it (#c8b478 with darker damp interior) and the small handle of the wooden mop visible angling up out of frame. Visible at the upper-left edge of the viewport is the very edge of the Kohler kitchen sink's chrome leg (#a8acb0) with a small pool of clear water gathered at the floor seam where the bucket was filled. The cursor's position acts as a virtual reflected-light angle — moving the cursor across the floor causes the iridescent band positions within approximately 200 pixels of the cursor to gently shift their conic-gradient angle by ±8 degrees suggesting the visitor very slightly tilting their head to catch the sheen at a slightly different angle, but the cursor cannot stop the cycle, cannot reverse the curing, cannot summon back the wet-wax peak iridescence, and cannot interact with any UI because there is no UI. The sweep-marks never move, the bucket and sink-leg never move, the floor pattern never changes; the iridescent bands continuously evolve, the bubbles slowly contract, the saturation slowly dulls; the piece runs forever, the wax keeps curing across each 47-minute cycle, and the visitor stands at the kitchen door beside Bobbie Stiefelmeier with the coffee mug watching the rainbow leave the floor.">
  <meta name="outbox-spec-subject" content="The single specific 47-minute kitchen-linoleum Glo-Coat curing window from 7:14am to 8:01am on Saturday October 19, 1968, at 4118 Edgewood Drive in Greendale Wisconsin, as Mrs. Roberta 'Bobbie' Stiefelmeier (age 36, homemaker since Kevin was born in 1957, married thirteen years to Don Stiefelmeier the second-shift quality-engineer at the Allis-Chalmers Tractor Division plant in West Allis, mother of Kevin and Joanne and Mark, grew up the oldest of seven on a small Sheboygan County dairy farm and learned at age nine from her mother Helma how to wax a kitchen floor on Saturday mornings before the men came in from milking) watches the second coat of Johnson Wax Glo-Coat dry across the cream-and-pale-mint Armstrong Excelon speckled vinyl-asbestos linoleum Don installed in October 1962 — the very specific small Saturday-morning ritual Bobbie has done every Saturday morning at 6:30am since the linoleum went in six years ago, the slow careful mop-down with the cellulose sponge that produces the iridescent oil-slick sheen across the wet wax that catches the east-window October light at the precise low sunrise angle, and the patient 47-minute curing window during which Bobbie sits at the kitchen door with her second cup of Folger's percolator coffee in the cream-and-gold-band Anchor Hocking mug watching the rainbow slowly leave the floor as the wax hardens into its final hard satin finish; the entire continuous six-year ritual of one specific working-class Wisconsin homemaker keeping one specific kitchen floor in honest weekly Saturday-morning condition as a real form of skilled domestic-maintenance craft worth doing carefully, and Bobbie's quiet patient understanding across those six years that the rainbow-iridescent sheen at minute 0 of the curing cycle is the small private weekly reward she gives herself for doing the work — a small specific beautiful thing visible only to her, only on Saturday mornings, only for 47 minutes, that no one else in the family is awake to see and that she has decided across six years she does not need to share with anyone.">

<script>
(function () {
  // 7:14am, Saturday, October 19, 1968 — the bucket is on the floor.
  // She just stepped back. The wax is at peak iridescence.
  // It will cure in 47 minutes and the rainbow will go.

  // -----------------------------------------------------------------
  // deterministic RNG so the speckle, the sweep texture, and the 340
  // bubbles are the same every visit. same kitchen, same morning.
  // -----------------------------------------------------------------
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = a;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // -----------------------------------------------------------------
  // dimensions
  // -----------------------------------------------------------------
  var W = window.innerWidth;
  var H = window.innerHeight;

  // a 9-inch tile. floor is 9 ft x 11 ft = 12 tiles wide x ~14.6 tall.
  // we scale tiles so 12 fit across the viewport width.
  var TILES_X = 12;
  var TILE = W / TILES_X;
  var TILES_Y = Math.ceil(H / TILE) + 1;

  // -----------------------------------------------------------------
  // SPECKLE — each tile gets its own seeded speckle pattern
  // -----------------------------------------------------------------
  function paintSpeckle() {
    var svg = document.getElementById('speckle');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    var parts = [];
    for (var ty = 0; ty < TILES_Y; ty++) {
      for (var tx = 0; tx < TILES_X; tx++) {
        // unique seed per tile location — same kitchen every visit
        var seed = (tx * 73856093) ^ (ty * 19349663) ^ 0x1968;
        var rng = mulberry32(seed >>> 0);
        var n = 36 + Math.floor(rng() * 18);
        for (var i = 0; i < n; i++) {
          var x = (tx + rng()) * TILE;
          var y = (ty + rng()) * TILE;
          var r = 0.7 + rng() * 1.6;
          // mint speckle — two slightly different greens for warmth
          var greenish = rng() < 0.7 ? '#b8d4b8' : '#a8c0a8';
          var op = (0.32 + rng() * 0.22).toFixed(2);
          parts.push(
            '<circle cx="' + x.toFixed(1) +
            '" cy="' + y.toFixed(1) +
            '" r="' + r.toFixed(1) +
            '" fill="' + greenish +
            '" fill-opacity="' + op + '"/>'
          );
        }
        // a few darker mineral flecks
        for (var j = 0; j < 6; j++) {
          var fx = (tx + rng()) * TILE;
          var fy = (ty + rng()) * TILE;
          parts.push(
            '<circle cx="' + fx.toFixed(1) +
            '" cy="' + fy.toFixed(1) +
            '" r="0.5" fill="#8a8a70" fill-opacity="0.32"/>'
          );
        }
      }
    }
    svg.innerHTML = parts.join('');
  }

  // -----------------------------------------------------------------
  // GROUT — the faint pale-gray lines between tiles
  // -----------------------------------------------------------------
  function paintGrout() {
    var svg = document.getElementById('grout');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    var parts = [];
    for (var x = 0; x <= TILES_X; x++) {
      parts.push('<line x1="' + (x * TILE).toFixed(1) +
        '" y1="0" x2="' + (x * TILE).toFixed(1) +
        '" y2="' + H + '" stroke="#a8a8a0" stroke-width="0.7"/>');
    }
    for (var y = 0; y <= TILES_Y; y++) {
      parts.push('<line x1="0" y1="' + (y * TILE).toFixed(1) +
        '" x2="' + W +
        '" y2="' + (y * TILE).toFixed(1) +
        '" stroke="#a8a8a0" stroke-width="0.7"/>');
    }
    svg.innerHTML = parts.join('');
  }

  // -----------------------------------------------------------------
  // SWEEP MARKS — 12 parallel stripes floor-to-ceiling, where the
  // cellulose sponge laid down the second coat
  // -----------------------------------------------------------------
  function paintSweeps() {
    var svg = document.getElementById('sweeps');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    var parts = [];
    var SWEEPS = 12;
    var spacing = W / SWEEPS;
    var rng = mulberry32(0xBOBBIE | 0); // her seed
    for (var i = 0; i < SWEEPS; i++) {
      var cx = (i + 0.5) * spacing + (rng() - 0.5) * 4;
      // the seam between two sweeps — darker pool line
      parts.push('<rect x="' + (cx - 0.6).toFixed(1) +
        '" y="0" width="1.2" height="' + H +
        '" fill="#d8d8c4"/>');
      // the ridged inner-pool texture along the seam
      var ticks = Math.floor(H / 18);
      for (var t = 0; t < ticks; t++) {
        var ty = t * 18 + rng() * 12;
        var tw = 6 + rng() * 14;
        parts.push('<rect x="' + (cx - tw / 2).toFixed(1) +
          '" y="' + ty.toFixed(1) +
          '" width="' + tw.toFixed(1) +
          '" height="1" fill="#d4d4c0" fill-opacity="0.55"/>');
      }
    }
    svg.innerHTML = parts.join('');
  }

  // -----------------------------------------------------------------
  // BUBBLES — exactly 340 micro-bubbles in the wet wax
  // -----------------------------------------------------------------
  var BUBBLE_COUNT = 340;
  var bubbles = [];
  var bubbleEls = [];

  function buildBubbles() {
    var svg = document.getElementById('bubbles');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    var defs = '<defs>' +
      '<filter id="soft" x="-50%" y="-50%" width="200%" height="200%">' +
        '<feGaussianBlur stdDeviation="0.6"/>' +
      '</filter></defs>';

    var rng = mulberry32(0x19681019 >>> 0);
    var parts = [defs];

    // which bubble is the one Bobbie notices at 7:17am.
    // it must be in the warm-coral band region (we'll target the upper-left
    // centerish of the floor where band b1's coral core sits).
    var noticedIdx = -1;
    var noticedBest = 9e9;

    for (var i = 0; i < BUBBLE_COUNT; i++) {
      var x = rng() * W;
      var y = rng() * H;
      var r0 = 2 + rng() * 2;
      var drift = (0.3 + rng() * 0.5) * (rng() < 0.5 ? -1 : 1);
      var phase = rng() * Math.PI * 2;
      var gleamInterval = 18 + rng() * 12; // seconds
      var gleamOffset = rng() * gleamInterval;
      var gleamDur = 0.4;
      // pick the warm-coral candidate: closest to b1's center (30% W, 40% H)
      var cx0 = W * 0.30, cy0 = H * 0.40;
      var d = Math.hypot(x - cx0, y - cy0);
      if (d < noticedBest && rng() < 1) {
        // but we want a *specific* one. tie-break on a stable index.
        if (d < noticedBest - 0.001) {
          noticedBest = d;
          noticedIdx = i;
        }
      }
      bubbles.push({
        x: x, y: y, r0: r0, drift: drift, phase: phase,
        gleamInterval: gleamInterval, gleamOffset: gleamOffset, gleamDur: gleamDur
      });
      parts.push(
        '<circle data-i="' + i + '" cx="' + x.toFixed(1) +
        '" cy="' + y.toFixed(1) +
        '" r="' + r0.toFixed(1) +
        '" fill="#f4e8d4" fill-opacity="0.55" filter="url(#soft)"/>'
      );
    }
    svg.innerHTML = parts.join('');
    bubbleEls = svg.querySelectorAll('circle[data-i]');
    bubbles.noticedIdx = noticedIdx;
  }

  // -----------------------------------------------------------------
  // STATIC OBJECTS — bucket (lower right), sink-leg (upper left),
  // water pool, stocking-foot at the doorway (very bottom edge)
  // -----------------------------------------------------------------
  function paintObjects() {
    var svg = document.getElementById('objects');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

    var bucketW = Math.min(160, W * 0.22);
    var bucketH = bucketW * 0.95;
    var bx = W - bucketW * 0.55;
    var by = H - bucketH * 0.45;

    var sinkLegW = Math.min(40, W * 0.06);
    var sinkLegH = Math.min(90, H * 0.16);
    var sx = -sinkLegW * 0.35;
    var sy = -sinkLegH * 0.30;

    // foot — barely visible at very bottom center-ish
    var footW = Math.min(110, W * 0.18);
    var footH = footW * 0.55;
    var fx = W * 0.42;
    var fy = H - footH * 0.30;

    // small water pool at upper-left under sink-leg
    var pw = Math.min(70, W * 0.10);
    var ph = pw * 0.55;
    var px = sinkLegW * 0.6;
    var py = sinkLegH * 0.55;

    var parts = [];

    // water pool — pale blue with subtle ripple ring
    parts.push(
      '<ellipse cx="' + (px + pw / 2) + '" cy="' + (py + ph / 2) +
      '" rx="' + (pw / 2) + '" ry="' + (ph / 2) +
      '" fill="#c8d8e4" fill-opacity="0.42"/>' +
      '<ellipse cx="' + (px + pw / 2) + '" cy="' + (py + ph / 2) +
      '" rx="' + (pw / 3.2) + '" ry="' + (ph / 3.2) +
      '" fill="none" stroke="#b8c8d4" stroke-opacity="0.5" stroke-width="0.6"/>'
    );

    // sink chrome leg — at upper-left, just the corner of it
    parts.push(
      '<rect x="' + sx + '" y="' + sy +
      '" width="' + sinkLegW + '" height="' + sinkLegH +
      '" fill="#a8acb0" rx="3"/>' +
      '<rect x="' + (sx + sinkLegW * 0.35) + '" y="' + sy +
      '" width="' + (sinkLegW * 0.18) + '" height="' + sinkLegH +
      '" fill="#f0f4f8" opacity="0.7"/>' +
      '<rect x="' + (sx + sinkLegW * 0.10) + '" y="' + sy +
      '" width="' + (sinkLegW * 0.10) + '" height="' + sinkLegH +
      '" fill="#7a8084" opacity="0.4"/>'
    );

    // bucket — yellow plastic, slightly elliptical seen from above
    parts.push(
      // shadow under bucket
      '<ellipse cx="' + (bx + bucketW / 2) + '" cy="' + (by + bucketH * 0.55) +
      '" rx="' + (bucketW * 0.48) + '" ry="' + (bucketH * 0.18) +
      '" fill="#000" fill-opacity="0.16"/>' +
      // body
      '<ellipse cx="' + (bx + bucketW / 2) + '" cy="' + (by + bucketH * 0.45) +
      '" rx="' + (bucketW * 0.46) + '" ry="' + (bucketH * 0.32) +
      '" fill="#f0c838" stroke="#b89028" stroke-width="2"/>' +
      // dark interior (we see down into the bucket from above)
      '<ellipse cx="' + (bx + bucketW / 2) + '" cy="' + (by + bucketH * 0.42) +
      '" rx="' + (bucketW * 0.40) + '" ry="' + (bucketH * 0.27) +
      '" fill="#7a5e1c"/>' +
      // sponge head resting in bucket
      '<rect x="' + (bx + bucketW * 0.20) + '" y="' + (by + bucketH * 0.30) +
      '" width="' + (bucketW * 0.58) + '" height="' + (bucketH * 0.20) +
      '" rx="3" fill="#c8b478" stroke="#8a7848" stroke-width="0.8"/>' +
      // damp interior of sponge
      '<rect x="' + (bx + bucketW * 0.25) + '" y="' + (by + bucketH * 0.34) +
      '" width="' + (bucketW * 0.48) + '" height="' + (bucketH * 0.10) +
      '" rx="2" fill="#8a7848" opacity="0.85"/>' +
      // wooden mop handle angling up out of frame
      '<rect x="' + (bx + bucketW * 0.42) + '" y="' + (by - bucketH * 0.40) +
      '" width="6" height="' + (bucketH * 0.75) +
      '" fill="#8a6438" transform="rotate(18 ' +
      (bx + bucketW * 0.42 + 3) + ' ' + (by + bucketH * 0.10) + ')"/>'
    );

    // stocking foot at doorway — VERY faint
    parts.push(
      '<ellipse cx="' + (fx + footW / 2) + '" cy="' + (fy + footH / 2) +
      '" rx="' + (footW / 2) + '" ry="' + (footH / 2) +
      '" fill="#7a6a5a" fill-opacity="0.14"/>' +
      '<ellipse cx="' + (fx + footW * 0.62) + '" cy="' + (fy + footH * 0.40) +
      '" rx="' + (footW * 0.08) + '" ry="' + (footH * 0.06) +
      '" fill="#6a5a4a" fill-opacity="0.10"/>'
    );

    svg.innerHTML = parts.join('');
  }

  // -----------------------------------------------------------------
  // INITIAL PAINT
  // -----------------------------------------------------------------
  paintSpeckle();
  paintGrout();
  paintSweeps();
  buildBubbles();
  paintObjects();

  // -----------------------------------------------------------------
  // THE 47-MINUTE CYCLE
  // -----------------------------------------------------------------
  var CYCLE_MS = 47 * 60 * 1000; // 47 minutes
  var startTime = performance.now();
  var lastFrame = startTime;

  // cursor reflected-light offset
  var cursorX = -9999, cursorY = -9999;
  document.addEventListener('mousemove', function (e) {
    cursorX = e.clientX;
    cursorY = e.clientY;
  });
  document.addEventListener('mouseleave', function () {
    cursorX = -9999; cursorY = -9999;
  });
  document.addEventListener('touchmove', function (e) {
    if (e.touches && e.touches[0]) {
      cursorX = e.touches[0].clientX;
      cursorY = e.touches[0].clientY;
    }
  }, { passive: true });

  // band drift positions (very slow horizontal drift along sweep direction)
  var bandDrift = [0, 0, 0, 0, 0];
  var bandSpeeds = [0.45, 0.62, 0.38, 0.55, 0.70]; // px/sec
  var bandSwirl = [0, 0, 0, 0, 0];
  var bandEls = document.querySelectorAll('.band');
  var iri = document.getElementById('iri');
  var sunwash = document.getElementById('sunwash');

  // keyframe interpolation for iridescence opacity
  // t=0 (peak), t=0.30 early-shift, t=0.68 mid-dull, t=1.0 final-satin
  function curveOpacity(t) {
    // ease — non-linear, like real surface tension settling
    // peak ~1.0, decays toward ~0.55 (40% drop)
    var u = 1 - Math.pow(t, 0.85);
    return 0.55 + u * 0.45;
  }

  function curveSaturation(t) {
    return 0.55 + (1 - Math.pow(t, 0.7)) * 0.45;
  }

  function frame(now) {
    var elapsed = now - startTime;
    var t = (elapsed % CYCLE_MS) / CYCLE_MS;
    var dt = (now - lastFrame) / 1000; // seconds
    lastFrame = now;

    // ---------------------------------------------------------------
    // iridescent bands — drift + opacity + slow rotation
    // ---------------------------------------------------------------
    var op = curveOpacity(t);
    var sat = curveSaturation(t);

    for (var i = 0; i < bandEls.length; i++) {
      bandDrift[i] += bandSpeeds[i] * dt;
      bandSwirl[i] += dt * (4 + i * 0.8); // slow rotation deg/sec
      var dx = (bandDrift[i] % W) - W * 0.05;
      var dy = Math.sin(elapsed / 18000 + i) * 8;

      // cursor "tilt" — within 200px, nudge rotation slightly
      var tiltDeg = 0;
      if (cursorX > -9000) {
        // compute distance from band center (approximated as viewport center plus drift)
        var bcx = W * 0.5 + dx;
        var bcy = H * 0.5 + dy;
        var d = Math.hypot(cursorX - bcx, cursorY - bcy);
        if (d < 200) {
          var k = 1 - d / 200;
          tiltDeg = (i % 2 === 0 ? 1 : -1) * 8 * k;
        }
      }

      var rot = bandSwirl[i] + tiltDeg;
      bandEls[i].style.transform =
        'translate3d(' + dx.toFixed(1) + 'px,' + dy.toFixed(1) + 'px,0) ' +
        'rotate(' + rot.toFixed(1) + 'deg)';
      bandEls[i].style.opacity = (op * (0.6 + 0.4 * Math.sin(elapsed / 22000 + i * 1.7))).toFixed(3);
    }
    iri.style.filter = 'saturate(' + sat.toFixed(2) + ')';

    // ---------------------------------------------------------------
    // sunwash — opacity grows 0.18 → 0.26, position rotates slightly
    // ---------------------------------------------------------------
    var sunOp = 0.18 + 0.08 * t;
    sunwash.style.opacity = sunOp.toFixed(3);

    // ---------------------------------------------------------------
    // bubbles — slow drift, slow contraction, periodic specular gleam
    // ---------------------------------------------------------------
    var noticedIdx = bubbles.noticedIdx;
    var seconds = elapsed / 1000;

    for (var b = 0; b < BUBBLE_COUNT; b++) {
      var bub = bubbles[b];
      var el = bubbleEls[b];

      // drift along sweep direction (horizontal-ish with subtle vertical bob)
      var x = bub.x + Math.sin(seconds * 0.08 + bub.phase) * 6 + bub.drift * seconds * 0.15;
      // wrap so they don't escape
      x = ((x % W) + W) % W;
      var y = bub.y + Math.cos(seconds * 0.05 + bub.phase * 1.3) * 3;

      // contracting radius across the cycle
      var r = bub.r0 * (1 - Math.pow(t, 0.6));
      if (r < 0.15) r = 0.15;

      // tint based on which band region the bubble sits in.
      // we approximate band positions by their conic centers.
      var fill = pickBandColor(x, y);
      var fillOp = 0.45 + 0.20 * (1 - t);

      // periodic specular gleam
      var phaseT = (seconds + bub.gleamOffset) % bub.gleamInterval;
      var inGleam = phaseT < bub.gleamDur;
      if (inGleam) {
        fill = '#fff4d8';
        fillOp = 0.70;
      }

      // THE WILDCARD: at t ≈ 0.064 (3-min mark), one specific bubble
      // in the warm-coral band glows slowly for 2.4 seconds and
      // briefly expands by 1.4 px. This is the one Bobbie notices.
      if (b === noticedIdx) {
        var noticeStart = 0.064;
        var noticeDurFrac = (2.4 * 1000) / CYCLE_MS;
        if (t >= noticeStart && t <= noticeStart + noticeDurFrac) {
          var u = (t - noticeStart) / noticeDurFrac; // 0..1
          // bell curve so it blooms and settles
          var bell = Math.sin(u * Math.PI);
          r = bub.r0 + 1.4 * bell;
          fill = '#f4a878'; // warm coral
          fillOp = 0.55 + 0.40 * bell;
        }
      }

      el.setAttribute('cx', x.toFixed(1));
      el.setAttribute('cy', y.toFixed(1));
      el.setAttribute('r', r.toFixed(2));
      el.setAttribute('fill', fill);
      el.setAttribute('fill-opacity', fillOp.toFixed(2));
    }

    requestAnimationFrame(frame);
  }

  // approximation of "which band am I in" based on the 5 conic centers
  // in the CSS above. returns a hex color.
  var bandCenters = [
    { x: 0.30, y: 0.40, c: '#e8a878' }, // coral
    { x: 0.65, y: 0.55, c: '#f0d878' }, // butter
    { x: 0.50, y: 0.30, c: '#f4e8d4' }, // pearl
    { x: 0.40, y: 0.70, c: '#a8c4a8' }, // sage
    { x: 0.70, y: 0.75, c: '#a89ac4' }  // violet
  ];

  function pickBandColor(x, y) {
    var best = 9e9, bestC = '#f4e8d4';
    for (var i = 0; i < bandCenters.length; i++) {
      var bc = bandCenters[i];
      var d = Math.hypot(x / W - bc.x, y / H - bc.y);
      if (d < best) { best = d; bestC = bc.c; }
    }
    return bestC;
  }

  requestAnimationFrame(frame);

  // -----------------------------------------------------------------
  // RESIZE — repaint the static layers if the viewport changes
  // -----------------------------------------------------------------
  var resizeTimer = null;
  window.addEventListener('resize', function () {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      W = window.innerWidth;
      H = window.innerHeight;
      TILE = W / TILES_X;
      TILES_Y = Math.ceil(H / TILE) + 1;
      bubbles = [];
      paintSpeckle();
      paintGrout();
      paintSweeps();
      buildBubbles();
      paintObjects();
    }, 180);
  });

  // -----------------------------------------------------------------
  // a small private thing, in the console, for whoever opens it.
  // -----------------------------------------------------------------
  // The bubble at 7:17am is in the warm-coral band, near 30% from the
  // west wall, 40% down from the north wall. Bobbie has her coffee
  // in both hands. The percolator is still warm on the counter.
  // The kids are asleep upstairs. Don topped off the pot at 6:14am
  // before he left for the plant.
})();
</script>

<script src="/nav.js" defer></script>
</body>
</html>
