<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Halliday Bundle — Letters East and West, 1890–1910</title>
<meta name="description" content="Five letters across thirty years, between sisters and the family who came after.">
<style>
:root{
  --cream:#f5e6d3;--paper:#efe0c9;--paper-dim:#e3cfac;
  --sepia:#3e2723;--sepia-soft:#5d4037;
  --copper:#b87333;--copper-dim:#8b5a2b;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;color:var(--sepia);font-family:Georgia,'Times New Roman',serif}
body{
  background:radial-gradient(ellipse at top,#e8d4b6 0%,#b89b75 100%);
  min-height:100vh;padding:1.5rem 1rem 4rem
}
header.page-head{max-width:640px;margin:0 auto 1.5rem;text-align:center;border-bottom:1px solid var(--copper-dim);padding-bottom:.8rem}
header.page-head h1{font-size:.95rem;font-weight:400;font-style:italic;letter-spacing:.1em;margin:0 0 .45rem;color:var(--sepia-soft)}
.progress{font-size:.74rem;color:var(--copper-dim);letter-spacing:.2em;text-transform:uppercase}
main.stage{max-width:640px;margin:0 auto;min-height:50vh}
.fade{animation:fadeIn .55s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.envelope{
  background:var(--paper);border:1px solid var(--copper-dim);
  box-shadow:0 14px 32px rgba(62,39,35,.32),inset 0 0 70px rgba(184,115,51,.14);
  padding:3rem 2rem;border-radius:3px;cursor:pointer;position:relative;min-height:340px;
  transition:transform .25s,box-shadow .25s
}
.envelope:hover{transform:translateY(-3px) rotate(-.3deg);box-shadow:0 18px 42px rgba(62,39,35,.38)}
.envelope .stamp{
  position:absolute;top:1.1rem;right:1.1rem;width:68px;height:86px;
  border:1px dashed var(--copper-dim);
  background:repeating-linear-gradient(45deg,transparent 0 4px,rgba(184,115,51,.09) 4px 8px),var(--paper-dim);
  display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--copper-dim);
  text-align:center;line-height:1.25;transform:rotate(2deg);letter-spacing:.05em
}
.envelope .cancel{position:absolute;top:2rem;right:5.5rem;font-size:.55rem;color:rgba(62,39,35,.32);transform:rotate(-12deg);letter-spacing:.12em;line-height:1.3}
.envelope .address{margin:4.5rem 0 0;text-align:center;font-style:italic;line-height:1.9;font-size:1.05rem;color:var(--sepia)}
.envelope .address .name{font-size:1.3rem;letter-spacing:.04em}
.envelope .seal{
  position:absolute;bottom:1.1rem;right:1.4rem;width:54px;height:54px;
  background:radial-gradient(circle at 35% 30%,#d49255 0%,var(--copper) 45%,var(--copper-dim) 75%,#5e3a17 100%);
  border-radius:50%;box-shadow:0 3px 7px rgba(62,39,35,.45),inset 0 -2px 5px rgba(0,0,0,.25);
  color:var(--cream);display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-style:italic;font-size:1.15rem;transform:rotate(-8deg)
}
.envelope .hint{position:absolute;bottom:1.3rem;left:1.4rem;font-size:.72rem;color:var(--copper-dim);font-style:italic;opacity:.75}
.envelope.mini{padding:2.4rem 1.5rem;min-height:auto;text-align:center;border-style:dashed;border-color:rgba(184,115,51,.55)}
.envelope.mini .label{font-style:italic;color:var(--sepia-soft);line-height:1.7;font-size:.95rem;margin-top:.5rem;max-width:32ch;margin-left:auto;margin-right:auto}
.envelope.mini .small-seal{
  width:42px;height:42px;margin:0 auto .9rem;
  background:radial-gradient(circle at 35% 30%,#d49255,var(--copper-dim));
  border-radius:50%;box-shadow:0 2px 5px rgba(62,39,35,.4)
}
.envelope.mini .open-cta{display:block;margin-top:1.2rem;font-size:.72rem;color:var(--copper-dim);font-style:italic;letter-spacing:.08em}

.letter{
  background:var(--cream);border:1px solid rgba(184,115,51,.4);
  box-shadow:0 14px 32px rgba(62,39,35,.27),inset 0 0 80px rgba(184,115,51,.11);
  padding:2.25rem 2rem 2rem;border-radius:2px;position:relative;
  background-image:
    radial-gradient(circle at 14% 18%,rgba(184,115,51,.09) 0%,transparent 22%),
    radial-gradient(circle at 86% 78%,rgba(184,115,51,.07) 0%,transparent 26%),
    radial-gradient(circle at 50% 95%,rgba(94,58,23,.05) 0%,transparent 30%)
}
.letter .meta{text-align:right;font-style:italic;font-size:.92rem;color:var(--sepia-soft);margin-bottom:1.4rem;line-height:1.55}
.letter .sal{font-size:1.04rem;margin-bottom:.9rem}
.letter .body{line-height:1.78;font-size:1.02rem;text-align:justify;hyphens:auto}
.letter .body p{margin:0 0 1rem}
.letter .body p:first-of-type::first-letter{font-size:2.4rem;float:left;line-height:1;padding:.2rem .4rem 0 0;color:var(--copper-dim);font-style:italic}
.letter .signoff{margin-top:1.4rem;font-style:italic;text-align:right;line-height:1.6}
.letter .sig{font-size:1.45rem;font-style:italic;color:var(--sepia);letter-spacing:.04em;display:inline-block;margin-top:.3rem;border-bottom:1px solid rgba(184,115,51,.35);padding:0 .7rem .25rem}
.clickable{border-bottom:1px dotted rgba(184,115,51,.45);cursor:pointer;transition:border-color .2s,color .2s,background .2s;padding:0 .05rem}
.clickable:hover{border-bottom-color:var(--copper);color:var(--copper-dim);background:rgba(184,115,51,.07)}

.controls{max-width:640px;margin:1.4rem auto 0;display:flex;justify-content:space-between;align-items:center;gap:1rem;font-size:.88rem}
.controls button{background:transparent;border:1px solid var(--copper-dim);color:var(--sepia);padding:.5rem .95rem;font-family:inherit;font-style:italic;cursor:pointer;border-radius:2px;transition:background .2s,color .2s}
.controls button:hover{background:var(--copper);color:var(--cream)}
.controls button[disabled]{opacity:.25;cursor:not-allowed}
.controls button[disabled]:hover{background:transparent;color:var(--sepia)}
.controls .from{font-style:italic;color:var(--sepia-soft);font-size:.84rem;text-align:right;flex:1}

footer.foot{max-width:640px;margin:3rem auto 0;text-align:center;font-size:.78rem;color:var(--sepia-soft);font-style:italic;line-height:1.7}
footer.foot a{color:var(--copper-dim);text-decoration:none;border-bottom:1px dotted var(--copper-dim)}
footer.foot a:hover{color:var(--copper)}
footer.foot .note{opacity:.65;margin-top:.4rem;font-size:.72rem;letter-spacing:.04em}

@media (max-width:480px){
  body{padding:1rem .65rem 3rem}
  .envelope{padding:2rem 1.25rem;min-height:300px}
  .envelope .address{margin-top:4rem;font-size:.98rem}
  .envelope .stamp{width:54px;height:70px}
  .envelope .cancel{right:4.3rem;top:1.8rem}
  .letter{padding:1.75rem 1.25rem 1.5rem}
  .letter .body{font-size:.98rem}
  header.page-head h1{font-size:.88rem}
  .controls .from{font-size:.78rem}
}
</style>
</head>
<body>
<header class="page-head">
  <h1>The Halliday Bundle &middot; Letters East &amp; West &middot; 1890–1910</h1>
  <div class="progress" id="prog">an envelope, sealed</div>
</header>
<main class="stage" id="stage"></main>
<div class="controls" id="ctrls"></div>
<footer class="foot">
  <a href="/archive">other bundles, other hands</a>
  <div class="note">— five letters, kept together —</div>
</footer>
<script>
const KEY='outbox.halliday.v1';

const L=[
  {
    meta:'Crown Hollow, Pennsylvania<br>The fourteenth of March, 1890',
    sal:'My own dearest Margaret,',
    body:`<p>Forgive the trembling hand. I have spent the morning at the writing-desk and cannot seem to settle, though the post-rider comes at four. Adelaide's letter reached me on Tuesday, and with it the news I have feared for some seasons now. The doctor at Reading gives our aunt until the first thaw at the latest, and I find I cannot bear the thought of her going without my having told you what I should have told you many years ago.</p>
<p>You have a great-aunt living, Margaret, whose name has never crossed my lips in your hearing. I do not know whether she yet draws breath at this hour, but I send her a letter every quarter and have done so for thirty-one years. Her name is Sarah Elizabeth Halliday, and she is my elder sister by nine minutes. Her likeness sleeps in the small rosewood box beneath my bed, wrapped in the green silk you once admired.</p>
<p>When I am gone, you will find the letters. There are a great many. I am writing now to ask that you read them, and that you write to her — if she is living still — in my own place. She has been in San Bernardino, California since the spring of '59. We parted, my sister and I, for reasons that seemed noble at the time and have become only sad in the looking-back. She has never married. She has raised herself a small grove of apricot trees instead.</p>
<p>I have been frightened of <span class="clickable" data-next>the name you have never heard me speak</span> for so long that I no longer remember why I began. The fear, I suspect, has outlived the cause.</p>`,
    signoff:'Your loving mother, always,',
    sig:'Eleanor',
    from:'Eleanor Halliday Bryce &mdash; to her daughter'
  },
  {
    meta:'Wilmore, Pennsylvania<br>The seventh of November, 1895',
    sal:'Mother dearest,',
    body:`<p>You will be five years a-knowing of my mind on this matter when you read these lines, and yet I find I have only now arrived at the words. Thomas turned eight in October. He is reading everything that comes into the house and will not be kept from your writing-desk when we visit.</p>
<p>He found the photograph. I had hoped to spare you the telling, but he came to me with the small green-silk bundle in his hands and the most serious face a boy of eight can manage, and asked me who the lady was who had your face but not your eyes. I told him she was Aunt Sarah, who lives where the apricots grow. He has been writing her a letter every Sunday since. I post them when I am able. She has answered four times — small notes, sketches of birds, a pressed flower in one envelope that may have been a poppy.</p>
<p>Mother, I have read the letters now. All of them. I sat with them through the late winter when the croup kept Thomas to his bed and I could not be far from his side. I am not angry. I want you to know this above all else — I am not angry. I understand, in the way one understands a cathedral by walking very slowly through it, what you and she gave to each other and to me.</p>
<p>Father is gentle in his way and was not gentle in his time. <span class="clickable" data-next>The photograph my Thomas found</span> has been moved to my own keeping, with your blessing or without it. I will leave to him what you left to me — and I will tell him, when he is old enough, what was given and what was kept.</p>`,
    signoff:'Your devoted daughter,',
    sig:'Margaret',
    from:'Margaret Bryce &mdash; to her mother'
  },
  {
    meta:'Wilmore, Pennsylvania<br>The third of June, 1900',
    sal:'Dear Cousin Beatrice,',
    body:`<p>I hope you and Uncle Henry are well, and that the new colt is settling. Mama said you wrote of him standing on the porch as if he intended to come inside, which made her laugh for the first time since Grandmother's service. We are all the better for any small laughter we can find this season.</p>
<p>Grandmother left me her writing-desk, which I did not expect, being only thirteen and not yet trusted with the good ink. Inside the second drawer — Mama said I could keep what was inside it — I have found a great many letters from California. They span thirty years, Beatrice. Thirty. Some are from Aunt Sarah Elizabeth and some are in Grandmother's own hand, returned to her after Aunt could not answer them in a long stretch of '76 when she was ill. They are tied with a red ribbon that has gone the color of weak tea.</p>
<p>I am writing to ask if your mother ever spoke of her. Mama believes my Aunt Sarah Elizabeth is living still, though there has been no letter in fourteen months. I have written to the postmaster at San Bernardino and have had no reply. I should like to know if anyone in your half of the family has heard the name Halliday spoken — or knows the names of any of the people <span class="clickable" data-next>the letters from California</span> mention. A Mrs. Marsh, a Reverend Coombs, a girl called Lucy.</p>
<p>I am keeping the letters very carefully. I read one each Sunday after supper, which is the rate at which Grandmother received them, and so the years pass in my reading at the same pace they passed in her sitting-room.</p>`,
    signoff:'Your affectionate cousin,',
    sig:'Thomas',
    from:'Thomas Bryce, age thirteen &mdash; to his cousin'
  },
  {
    meta:'San Bernardino, California<br>The twenty-second of February, 1905',
    sal:'Dear Mr. Bryce,',
    body:`<p>Forgive a stranger's letter coming so unexpected, and forgive the long delay between your inquiry of June 1900 and this reply. Your letter sat for the longest time in the postmaster's office here, no one being certain to whom it should go, and then it was given to my mother — being your great-aunt's truest friend in this world — who set it inside the family Bible meaning to read it aloud when Miss Halliday's eyes were brighter, and then was herself taken ill, and so the letter waited. My mother passed in the autumn of '03. I have only this winter found your envelope behind the lining of the drawer.</p>
<p>My name is Lucy Marsh. My mother Hannah kept house for your great-aunt Miss Sarah Elizabeth Halliday from the year 1874 onward, and I have done the same since I was old enough to be of any real use. Miss Halliday taught me my letters at her kitchen table. She used to say I had your grandmother's chin, which I took as a great compliment once it was explained to me whose chin that was.</p>
<p>I am writing to tell you that your great-aunt is living. She is seventy-three this April. She is small now and walks with a cane and cannot see to read herself, but I read your grandmother's letters aloud to her in the evenings, one each Sunday after our supper. She has worn out three of them with her holding.</p>
<p>She does not know I am writing you. I should like her to know you, Mr. Bryce, while there is still time for the knowing. Will you write her? She would not ask it of you herself — <span class="clickable" data-next>the letter she would send you</span>, were she to find the courage, has been five years on her writing-desk and goes nowhere.</p>`,
    signoff:'With my whole heart,',
    sig:'Lucy Marsh',
    from:'Lucy Marsh, of the apricot grove &mdash; to a great-nephew she has not met'
  },
  {
    meta:'San Bernardino, California<br>The eleventh of April, 1910',
    sal:'My dear great-nephew Thomas,',
    body:`<p>You will think me a coward for taking so long. Lucy tells me you wrote to me five Christmases running, and each of your letters I read aloud to myself in my chair by the window — though Lucy was sitting plain across from me with the kettle on — because I could not bear to hear my own voice answer them. I am seventy-eight. There are not so many summers left to me as there are letters left in this drawer, and I should like to send at least one of those letters east while I am still the one writing them.</p>
<p>Your grandmother was the better half of a single person. We were born nine minutes apart in the front room of our father's house in Salem County, and we were not separate things for the first nineteen years of our lives. When our parents went, in the fever-year of '57, it fell to one of us to keep the house and to one of us to be kept. I was the elder. I made the choosing easy.</p>
<p>She married well, your grandmother, and her husband was a good man in the matters that good men are usually good in, and a careful man in the matters where caution serves no one. He did not approve of a woman alone in the West. He did not approve of a sister who would not return. I went away in the spring of '59 because the going-away protected her standing in his household, and I stayed away because letters travelled, and the letters were enough — they had to be enough, and so they were.</p>
<p>Thomas, dear boy, I want you to know this: we wrote each other every six weeks for thirty-six years. I have her side of it here in two cedar boxes. She has mine. There were no quarrels in all those pages. There were no apologies either, because none were needed. Letters bind us still; love endures across long years; family abides, even where the body cannot follow.</p>
<p>Come west if you can. The apricots are heavy this year and Lucy makes a preserve that would do credit to your great-grandmother. If you cannot come, write me, and I will sit by the window and Lucy will read your words aloud in her good clear voice, and that will be a great deal.</p>`,
    signoff:'With all the love I have held for your half of the family these long years,',
    sig:'Aunt Sarah Elizabeth',
    from:'Sarah Elizabeth Halliday &mdash; to the boy she has never met'
  }
];

const E=[
  {addr:['Mrs. Margaret Eleanor Bryce','No. 14 Linden Row','Wilmore, Pennsylvania'],cancel:'RECVD<br>MAR&middot;16<br>1890',stamp:'U.S.<br>POSTAGE<br>&middot;2¢&middot;',seal:'E',hint:'— click to open —'},
  {label:'A smaller envelope, slipped between the pages — addressed in a younger hand, the seal a plain brown.'},
  {label:'A folded square in a child\'s careful penmanship — directed across two counties to Cousin Beatrice.'},
  {label:'A stiff cream envelope, the western postmark only half-legible — Calif., Feb. 1905.'},
  {label:'A thin, much-handled envelope — the address written and rewritten in the same patient hand.'}
];

let s=parseInt(localStorage.getItem(KEY)||'0',10);
if(!Number.isFinite(s)||s<0||s>9)s=0;

function save(){try{localStorage.setItem(KEY,String(s));}catch(e){}}
function progressText(st){
  if(st===0)return 'an envelope, sealed';
  if(st%2===1)return 'Letter '+((st+1)/2)+' of 5';
  return '— a folded thing, still closed —';
}

function render(){
  const stage=document.getElementById('stage');
  const ctrls=document.getElementById('ctrls');
  document.getElementById('prog').textContent=progressText(s);

  if(s===0){
    const e=E[0];
    stage.innerHTML=`<div class="envelope fade" id="open">
      <div class="cancel">${e.cancel}</div>
      <div class="stamp">${e.stamp}</div>
      <div class="address"><div>${e.addr[0]}</div><div class="name">${e.addr[1]}</div><div>${e.addr[2]}</div></div>
      <div class="seal">${e.seal}</div>
      <div class="hint">${e.hint}</div>
    </div>`;
    document.getElementById('open').addEventListener('click',advance);
    ctrls.innerHTML='';
    return;
  }

  if(s%2===0){
    const e=E[s/2];
    stage.innerHTML=`<div class="envelope mini fade" id="open">
      <div class="small-seal"></div>
      <div class="label">${e.label}</div>
      <span class="open-cta">— click to unfold —</span>
    </div>`;
    document.getElementById('open').addEventListener('click',advance);
    ctrls.innerHTML=`<button onclick="back()">← previous letter</button><span class="from">tucked inside the previous letter</span>`;
    return;
  }

  const idx=(s-1)/2;
  const ltr=L[idx];
  stage.innerHTML=`<article class="letter fade">
    <div class="meta">${ltr.meta}</div>
    <div class="sal">${ltr.sal}</div>
    <div class="body">${ltr.body}</div>
    <div class="signoff">${ltr.signoff}<br><span class="sig">${ltr.sig}</span></div>
  </article>`;
  stage.querySelectorAll('[data-next]').forEach(el=>el.addEventListener('click',advance));
  const backLabel=s===1?'← back to the envelope':'← previous letter';
  ctrls.innerHTML=`<button onclick="back()">${backLabel}</button><span class="from">${ltr.from}</span>`;
}

function advance(){if(s<9){s++;save();render();window.scrollTo({top:0,behavior:'smooth'});}}
function back(){
  if(s===0)return;
  if(s>=3&&s%2===1)s-=2;
  else s--;
  save();render();window.scrollTo({top:0,behavior:'smooth'});
}
window.back=back;

render();

console.log('%cthe halliday bundle','color:#8b5a2b;font-style:italic;font-size:14px');
console.log('%cread aunt sarah elizabeth\'s closing paragraph aloud. count slowly.','color:#5d4037;font-style:italic');
</script>

<script src="/nav.js" defer></script>
</body>
</html>
