<!--
  CARNIVAL MIDWAY POCKET PINBALL · MODEL 88
  Wing Hing Toy Manufactory Ltd. · Kowloon · Spring 1973
  Pin pattern engineered Feb 1973, Northbrook IL, by W.N.
  88¢ retail · 28¢ wholesale via Acme Novelty Jobbers, Chicago
-->

<script>
(function(){
  'use strict';
  const SVG_W = 400, SVG_H = 600;
  const field = document.getElementById('field');
  const pinsLayer = document.getElementById('pinsLayer');
  const cupsLayer = document.getElementById('cupsLayer');
  const bbsLayer = document.getElementById('bbsLayer');
  const scoreText = document.getElementById('scoreText');
  const bestText = document.getElementById('bestText');
  const bestRect = document.getElementById('bestRect');
  const reserve = document.getElementById('reserve');
  const tensionBar = document.getElementById('tensionBar');
  const plungerShaft = document.getElementById('plungerShaft');
  const plungerKnob = document.getElementById('plungerKnob');
  const spring = document.getElementById('spring');
  const roundplate = document.getElementById('roundplate');
  const roundScore = document.getElementById('roundScore');
  const newballsBtn = document.getElementById('newballs');
  const signbox = document.getElementById('signbox');
  const signinput = document.getElementById('signinput');
  const signsubmit = document.getElementById('signsubmit');
  const leader = document.getElementById('leader');
  const leaderlist = document.getElementById('leaderlist');
  const leaderclose = document.getElementById('leaderclose');
  const cornerHook = document.getElementById('cornerHook');
  const pblog = document.getElementById('pbentries');
  const seerHead = document.getElementById('seerHead');
  const larkwing = document.getElementById('larkwing');

  // ===== state =====
  const STORE = {
    BEST:'modulo88_best',
    LOG:'modulo88_log',
    BOARD:'modulo88_board',
    INITIALS:'modulo88_init',
    WRAPPED:'modulo88_wrap'
  };
  let score = 0;
  let bbsLeft = 3;
  let bbs = [];
  let inFlight = false;
  let lastWrap = JSON.parse(localStorage.getItem(STORE.WRAPPED) || 'false');

  // ===== pins =====  (42+ pins, Wayne's deliberate pattern)
  // denser at alley entry (top), sparser mid-field, clustered around the 500 cup
  const pins = [
    // alley entry scatter
    {x:240,y:105},{x:220,y:115},{x:200,y:108},{x:180,y:118},{x:255,y:130},
    {x:215,y:140},{x:235,y:155},{x:195,y:148},
    // upper field cluster around 500 cup (200,180)
    {x:175,y:170},{x:225,y:170},{x:190,y:195},{x:210,y:195},
    {x:160,y:185},{x:240,y:185},
    // mid-field
    {x:90,y:200},{x:130,y:220},{x:265,y:215},{x:305,y:200},
    {x:60,y:240},{x:110,y:255},{x:160,y:260},{x:200,y:250},{x:240,y:260},{x:290,y:255},{x:340,y:240},
    {x:85,y:285},{x:135,y:300},{x:190,y:295},{x:250,y:300},{x:310,y:285},
    // lower-mid funnel pins
    {x:40,y:320},{x:115,y:340},{x:165,y:350},{x:215,y:345},{x:285,y:340},{x:340,y:330},
    {x:75,y:380},{x:145,y:395},{x:205,y:390},{x:265,y:395},{x:325,y:385},
    // funnel toward cups
    {x:40,y:430},{x:100,y:445},{x:180,y:440},{x:260,y:445},{x:330,y:430},
    {x:140,y:475},{x:230,y:475}
  ];
  const PIN_R = 3.5;

  // ===== cups =====
  const cups = [
    {x:200,y:180,r:11,v:500},   // the difficult upper one
    {x:60, y:225,r:11,v:200},
    {x:340,y:225,r:11,v:200},
    {x:120,y:380,r:12,v:100},
    {x:280,y:380,r:12,v:100},
    {x:200,y:420,r:12,v:100},
    {x:50, y:480,r:13,v:50},
    {x:350,y:480,r:13,v:50},
    {x:130,y:510,r:14,v:25},
    {x:270,y:510,r:14,v:25},
    {x:200,y:520,r:15,v:10}
  ];

  // draw pins
  pins.forEach((p, i) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
    c.setAttribute('r', PIN_R);
    c.setAttribute('fill', 'url(#brass)');
    c.setAttribute('stroke', '#6a4818');
    c.setAttribute('stroke-width', '.4');
    pinsLayer.appendChild(c);
    // tiny highlight
    const h = document.createElementNS('http://www.w3.org/2000/svg','circle');
    h.setAttribute('cx', p.x - 1);
    h.setAttribute('cy', p.y - 1.2);
    h.setAttribute('r', '.8');
    h.setAttribute('fill', '#fde8a8');
    pinsLayer.appendChild(h);
  });

  // draw cups
  cups.forEach((cup, i) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', cup.x); c.setAttribute('cy', cup.y);
    c.setAttribute('r', cup.r);
    c.setAttribute('fill','url(#cup)');
    c.setAttribute('stroke','#1a1208'); c.setAttribute('stroke-width','.7');
    c.dataset.idx = i;
    cup._el = c;
    cupsLayer.appendChild(c);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', cup.x); t.setAttribute('y', cup.y + 3.5);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','Georgia');
    t.setAttribute('font-weight','900');
    t.setAttribute('font-size', cup.v >= 500 ? '11' : cup.v >= 100 ? '10' : '9');
    t.setAttribute('fill','#fde8a8');
    t.textContent = cup.v;
    cupsLayer.appendChild(t);
  });

  // ===== audio =====
  let actx = null;
  function audio(){
    if(!actx){
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    return actx;
  }
  function tink(pitchVar){
    const a = audio(); if(!a) return;
    const t = a.currentTime;
    const o = a.createOscillator(); const g = a.createGain();
    o.type = 'triangle';
    o.frequency.value = 1800 + (Math.random()-0.5) * 540 * (pitchVar||1);
    g.gain.setValueAtTime(.001, t);
    g.gain.exponentialRampToValueAtTime(.16, t+.005);
    g.gain.exponentialRampToValueAtTime(.001, t+.08);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+.1);
  }
  function tonk(){
    const a = audio(); if(!a) return;
    const t = a.currentTime;
    const o = a.createOscillator(); const g = a.createGain();
    o.type='sine'; o.frequency.value = 320 + Math.random()*60;
    g.gain.setValueAtTime(.001,t);
    g.gain.exponentialRampToValueAtTime(.12,t+.008);
    g.gain.exponentialRampToValueAtTime(.001,t+.12);
    o.connect(g);g.connect(a.destination);
    o.start(t);o.stop(t+.14);
  }
  function kerplunk(){
    const a = audio(); if(!a) return;
    const t = a.currentTime;
    // plunk
    const o1 = a.createOscillator(); const g1 = a.createGain();
    o1.type='sine'; o1.frequency.value=180;
    g1.gain.setValueAtTime(.001,t); g1.gain.exponentialRampToValueAtTime(.2,t+.01); g1.gain.exponentialRampToValueAtTime(.001,t+.2);
    o1.connect(g1); g1.connect(a.destination); o1.start(t); o1.stop(t+.22);
    // ding
    const o2 = a.createOscillator(); const g2 = a.createGain();
    o2.type='triangle'; o2.frequency.value=1320;
    g2.gain.setValueAtTime(.001,t+.12); g2.gain.exponentialRampToValueAtTime(.18,t+.13); g2.gain.exponentialRampToValueAtTime(.001,t+.5);
    o2.connect(g2); g2.connect(a.destination); o2.start(t+.12); o2.stop(t+.55);
  }
  function rattle(){
    const a = audio(); if(!a) return;
    for(let i=0;i<5;i++){
      setTimeout(()=>tink(2),i*45);
    }
  }
  function chime(){
    const a = audio(); if(!a) return;
    const t = a.currentTime;
    [880, 1108, 1318, 1760].forEach((f,i)=>{
      const o = a.createOscillator(); const g = a.createGain();
      o.type='sine'; o.frequency.value = f;
      g.gain.setValueAtTime(.001,t+i*.08); g.gain.exponentialRampToValueAtTime(.1,t+i*.08+.02);
      g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.5);
      o.connect(g); g.connect(a.destination);
      o.start(t+i*.08); o.stop(t+i*.08+.55);
    });
  }

  // ===== plunger =====
  let plungerDragging = false;
  let plungerTension = 0; // 0..1
  let plungerStartY = 0;
  const PLUNGER_HOME_Y = 380;
  const PLUNGER_MAX_PULL = 80; // px

  function setPlungerVisual(t){
    plungerTension = Math.max(0, Math.min(1, t));
    const pull = plungerTension * PLUNGER_MAX_PULL;
    const newY = PLUNGER_HOME_Y + pull;
    plungerKnob.setAttribute('cy', newY);
    plungerShaft.setAttribute('y', newY);
    plungerShaft.setAttribute('height', 540 - newY);
    // compress spring coils above knob
    const top = 395;
    const bottom = newY - 5;
    const coilLines = spring.querySelectorAll('line');
    const coilCount = coilLines.length;
    const range = bottom - top;
    coilLines.forEach((ln, i)=>{
      const y = top + (range * i / (coilCount-1));
      ln.setAttribute('y1', y); ln.setAttribute('y2', y);
    });
    // tension bar
    const barH = plungerTension * 160;
    tensionBar.setAttribute('y', 540 - barH);
    tensionBar.setAttribute('height', barH);
  }
  setPlungerVisual(0);

  function svgPoint(e){
    const pt = field.createSVGPoint();
    const ev = e.touches ? e.touches[0] : e;
    pt.x = ev.clientX; pt.y = ev.clientY;
    const ctm = field.getScreenCTM().inverse();
    return pt.matrixTransform(ctm);
  }

  function plungerDown(e){
    if(bbsLeft <= 0 || inFlight) return;
    e.preventDefault();
    audio();
    plungerDragging = true;
    field.classList.add('dragging');
    const p = svgPoint(e);
    plungerStartY = p.y;
  }
  function plungerMove(e){
    if(!plungerDragging) return;
    e.preventDefault();
    const p = svgPoint(e);
    const dy = p.y - plungerStartY;
    setPlungerVisual(dy / PLUNGER_MAX_PULL);
  }
  function plungerUp(e){
    if(!plungerDragging) return;
    plungerDragging = false;
    field.classList.remove('dragging');
    if(plungerTension > 0.05){
      fireBB(plungerTension);
    }
    // spring back
    let t = plungerTension;
    const back = setInterval(()=>{
      t *= 0.55;
      setPlungerVisual(t);
      if(t < 0.005){ setPlungerVisual(0); clearInterval(back); }
    }, 16);
  }

  plungerKnob.addEventListener('mousedown', plungerDown);
  plungerKnob.addEventListener('touchstart', plungerDown, {passive:false});
  plungerShaft.addEventListener('mousedown', plungerDown);
  plungerShaft.addEventListener('touchstart', plungerDown, {passive:false});
  window.addEventListener('mousemove', plungerMove);
  window.addEventListener('touchmove', plungerMove, {passive:false});
  window.addEventListener('mouseup', plungerUp);
  window.addEventListener('touchend', plungerUp);

  // ===== physics =====
  function fireBB(tension){
    if(bbsLeft <= 0) return;
    bbsLeft--;
    updateReserve();
    inFlight = true;

    const bbEl = document.createElementNS('http://www.w3.org/2000/svg','circle');
    bbEl.setAttribute('r','4.2');
    bbEl.setAttribute('fill','url(#bb)');
    const shadow = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    shadow.setAttribute('rx','3.5'); shadow.setAttribute('ry','1.6');
    shadow.setAttribute('fill','#3a2818'); shadow.setAttribute('opacity','.45');
    bbsLayer.appendChild(shadow);
    bbsLayer.appendChild(bbEl);

    const bb = {
      x: 381, y: 535,
      vx: 0,
      vy: -(2.0 + tension * 6.6),  // launch up the alley
      el: bbEl,
      shadow,
      settling: 0,
      settlingCup: null,
      alive: true
    };
    bbs.push(bb);
  }

  function updateReserve(){
    const circles = reserve.querySelectorAll('circle');
    circles.forEach((c, i) => {
      c.setAttribute('opacity', i < bbsLeft ? 1 : 0.15);
    });
  }

  const GRAVITY = 0.075;
  const FRICTION = 0.992;
  const PIN_RESTITUTION = 0.72;
  const RAIL_RESTITUTION = 0.55;
  const SETTLE_VEL = 0.45;
  const SETTLE_TIME = 24; // frames @ 60fps ≈ .4s

  function step(){
    bbs.forEach(bb => {
      if(!bb.alive) return;

      // gravity
      bb.vy += GRAVITY;
      // friction
      bb.vx *= FRICTION;
      bb.vy *= FRICTION;

      // alley constraint while still in launch tube (right side, y > 110)
      if(bb.x > 358 && bb.y > 80){
        bb.x = Math.min(bb.x, 388);
        if(bb.x > 360) bb.x = 360;
      }

      bb.x += bb.vx;
      bb.y += bb.vy;

      // rails
      if(bb.x < 8){ bb.x = 8; bb.vx = -bb.vx * RAIL_RESTITUTION; tonk(); }
      if(bb.x > 360 && bb.y > 100){ bb.x = 360; bb.vx = -bb.vx * RAIL_RESTITUTION; tonk(); }
      else if(bb.x > 392){ bb.x = 392; bb.vx = -bb.vx * RAIL_RESTITUTION; }
      if(bb.y < 8){ bb.y = 8; bb.vy = -bb.vy * RAIL_RESTITUTION; tonk(); }
      // bottom rail (above apron)
      if(bb.y > 538){ bb.y = 538; bb.vy = -bb.vy * RAIL_RESTITUTION; bb.vx *= 0.85; tonk(); }

      // alley top curve — bounce BB into the playfield
      if(bb.x > 322 && bb.y < 85 && bb.y > 60){
        // arc-redirect leftward and downward
        if(bb.vy < 0){
          bb.vy = Math.abs(bb.vy) * 0.6;
          bb.vx = -1.5 - Math.random();
          tonk();
        }
      }

      // pin collisions
      for(let i=0;i<pins.length;i++){
        const p = pins[i];
        const dx = bb.x - p.x, dy = bb.y - p.y;
        const dist = Math.hypot(dx, dy);
        const minDist = PIN_R + 4.2;
        if(dist < minDist && dist > 0.01){
          const nx = dx / dist, ny = dy / dist;
          // separate
          const overlap = minDist - dist;
          bb.x += nx * overlap;
          bb.y += ny * overlap;
          // reflect
          const vn = bb.vx * nx + bb.vy * ny;
          if(vn < 0){
            bb.vx -= 2 * vn * nx;
            bb.vy -= 2 * vn * ny;
            bb.vx *= PIN_RESTITUTION;
            bb.vy *= PIN_RESTITUTION;
            // add a small randomization to avoid sticking in periodic orbits
            bb.vx += (Math.random()-0.5) * 0.3;
            tink();
          }
        }
      }

      // cup detection
      let inCup = null;
      for(let i=0;i<cups.length;i++){
        const c = cups[i];
        const d = Math.hypot(bb.x - c.x, bb.y - c.y);
        if(d < c.r - 1.5){ inCup = c; break; }
      }
      if(inCup && Math.hypot(bb.vx, bb.vy) < SETTLE_VEL){
        if(bb.settlingCup !== inCup){
          bb.settlingCup = inCup; bb.settling = 0;
        }
        bb.settling++;
        // pull toward cup center gently
        bb.vx += (inCup.x - bb.x) * 0.02;
        bb.vy += (inCup.y - bb.y) * 0.02;
        if(bb.settling >= SETTLE_TIME){
          settleInCup(bb, inCup);
        }
      } else {
        bb.settlingCup = null;
        bb.settling = 0;
      }

      // safety: if BB drifts into bottom-right scoring apron area without settling, remove
      if(bb.y > 540 && Math.abs(bb.vx) + Math.abs(bb.vy) < 0.2){
        bb.alive = false;
        if(bb.el) bb.el.remove();
        if(bb.shadow) bb.shadow.remove();
      }

      // render
      if(bb.alive){
        bb.el.setAttribute('cx', bb.x);
        bb.el.setAttribute('cy', bb.y);
        bb.shadow.setAttribute('cx', bb.x + 1.5);
        bb.shadow.setAttribute('cy', bb.y + 2.5);
      }
    });

    // clean dead
    bbs = bbs.filter(b => b.alive);

    // round end?
    if(bbsLeft === 0 && bbs.length === 0 && inFlight){
      inFlight = false;
      setTimeout(endRound, 600);
    } else if(bbs.length === 0 && !plungerDragging){
      inFlight = false;
    }

    requestAnimationFrame(step);
  }

  function settleInCup(bb, cup){
    bb.alive = false;
    bb.el.remove();
    bb.shadow.remove();
    // light cup
    const orig = cup._el.getAttribute('fill');
    cup._el.setAttribute('fill','url(#cuplit)');
    setTimeout(()=>cup._el.setAttribute('fill', orig), 480);
    kerplunk();
    addScore(cup.v);
  }

  function addScore(v){
    const before = score;
    score = (score + v);
    let wrapped = false;
    if(score > 999){
      score = score - 1000;
      wrapped = true;
      if(!lastWrap){
        lastWrap = true;
        localStorage.setItem(STORE.WRAPPED, 'true');
        triggerWildcard();
      }
    }
    // odometer flip animation
    scoreText.style.transition = 'transform .15s ease, opacity .15s ease';
    scoreText.style.transform = 'translateY(-8px)';
    scoreText.style.opacity = '0';
    setTimeout(()=>{
      scoreText.textContent = pad3(score);
      scoreText.style.transform = 'translateY(8px)';
      requestAnimationFrame(()=>{
        scoreText.style.transform = 'translateY(0)';
        scoreText.style.opacity = '1';
      });
    }, 130);
  }

  function pad3(n){
    return ('00' + Math.max(0, n|0)).slice(-3);
  }

  function endRound(){
    const finalScore = score;
    roundScore.textContent = pad3(finalScore);
    roundplate.classList.add('show');
    // best score
    let best = parseInt(localStorage.getItem(STORE.BEST) || '0', 10);
    if(finalScore > best){
      localStorage.setItem(STORE.BEST, finalScore.toString());
      bestText.textContent = pad3(finalScore);
      // glow
      bestRect.setAttribute('stroke','#fde8a8');
      bestRect.setAttribute('stroke-width','2');
      setTimeout(()=>{
        bestRect.setAttribute('stroke','none');
      }, 1500);
      // log entry
      const log = JSON.parse(localStorage.getItem(STORE.LOG) || '[]');
      const today = new Date();
      const m = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][today.getMonth()];
      const dateStr = `${m} ${today.getDate()}`;
      log.unshift(`beat it ${pad3(finalScore)} — ${dateStr}`);
      localStorage.setItem(STORE.LOG, JSON.stringify(log.slice(0,5)));
      renderPbLog();
      // sign box for leaderboard
      const board = JSON.parse(localStorage.getItem(STORE.BOARD) || '[]');
      const minTop = board.length < 10 ? 0 : board[board.length-1].score;
      if(finalScore > minTop){
        signbox.classList.add('show');
      }
    }
  }

  function newRound(){
    score = 0;
    bbsLeft = 3;
    scoreText.textContent = '000';
    updateReserve();
    roundplate.classList.remove('show');
    signbox.classList.remove('show');
    rattle();
  }
  newballsBtn.addEventListener('click', newRound);

  signsubmit.addEventListener('click', signHighScore);
  signinput.addEventListener('keydown', e => { if(e.key === 'Enter') signHighScore(); });

  function signHighScore(){
    const v = signinput.value.trim() || 'A.N. — Anywhere';
    localStorage.setItem(STORE.INITIALS, v);
    const board = JSON.parse(localStorage.getItem(STORE.BOARD) || '[]');
    board.push({ score: parseInt(localStorage.getItem(STORE.BEST) || '0', 10), name: v, t: Date.now() });
    board.sort((a,b)=>b.score-a.score);
    const top10 = board.slice(0,10);
    localStorage.setItem(STORE.BOARD, JSON.stringify(top10));
    signbox.classList.remove('show');
    chime();
    showLeader();
  }

  // ===== leaderboard =====
  function seedBoard(){
    const board = JSON.parse(localStorage.getItem(STORE.BOARD) || '[]');
    if(board.length === 0){
      const seed = [
        {name:'L.V. — Cicero', score:387},
        {name:'D.M. — Sandwich', score:312},
        {name:'R.S. — Aurora', score:278},
        {name:'B.K. — Lake Geneva', score:245},
        {name:'P.A. — Elgin', score:230},
        {name:'T.G. — Joliet', score:215},
        {name:'M.O. — Naperville', score:200},
        {name:'J.W. — Yorkville', score:185},
        {name:'C.R. — Plano', score:175},
        {name:'E.F. — Oswego', score:165}
      ];
      localStorage.setItem(STORE.BOARD, JSON.stringify(seed));
    }
  }
  seedBoard();

  function showLeader(){
    const board = JSON.parse(localStorage.getItem(STORE.BOARD) || '[]');
    leaderlist.innerHTML = '';
    board.forEach(entry => {
      const li = document.createElement('li');
      li.innerHTML = `<b>${pad3(entry.score)}</b> — ${escapeHtml(entry.name)}`;
      leaderlist.appendChild(li);
    });
    leader.classList.add('show');
  }
  cornerHook.addEventListener('click', showLeader);
  leaderclose.addEventListener('click', () => leader.classList.remove('show'));

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ===== personal best log =====
  function renderPbLog(){
    const log = JSON.parse(localStorage.getItem(STORE.LOG) || '[]');
    pblog.innerHTML = log.map(l => `<div>${escapeHtml(l)}</div>`).join('');
  }
  renderPbLog();

  // ===== init persisted best =====
  const startingBest = parseInt(localStorage.getItem(STORE.BEST) || '0', 10);
  bestText.textContent = pad3(startingBest);

  updateReserve();

  // ===== hover slips (Wayne's notes + Linda's secret) =====
  const slipPins = document.getElementById('slipPins');
  const slipPlunger = document.getElementById('slipPlunger');
  const slipMidway = document.getElementById('slipMidway');
  const slipLinda = document.getElementById('slipLinda');
  const slipWrap = document.getElementById('slipWrap');

  slipPins.innerHTML = `I clustered four pins above the 500-cup at 2.3&nbsp;inches between centers — close enough that a fast BB scatters off the cluster and skips the cup, but a BB slowed by upper-rail friction will thread through and drop straight in. The plunger tension that does it is about 62%. Try it.<span class="sig">— W.N., Feb 1973, Northbrook IL</span>`;
  slipPlunger.innerHTML = `Cold blue steel —<br>the relay's tiny click answers —<br>Route 6 tavern girl<br><br>I specced the spring at 4.2&nbsp;lb&#8209;in per turn because that gives a 12-year-old's thumb a satisfying push without bottoming out the coils. Anything over 5 and the kid bruises her thumb after 200 rounds. Mrs. Vacek's father wrote me a letter in October thanking me for getting it right.<span class="sig">— W.N.</span>`;
  slipMidway.innerHTML = `I asked the Wing&nbsp;Hing art director to put the calliope wagon at top center because that's where the eye lands after the plunger release — a kid wants to feel like the BB is going somewhere named, not just up a tube. The fortune-teller goes lower-left so the BB falls toward her, not away.<span class="sig">— W.N., Feb 1973</span>`;
  slipLinda.innerHTML = `i got 387 here on a thursday — gramps was reading the sentinel — he didnt look up but he heard the dings<span class="sig">— L.V.</span>`;
  slipWrap.innerHTML = `the meadowlark sang once when the score wrapped — i think she knew. <span class="sig">— L.V., friday morning</span>`;

  let fortuneTimer = null;
  function attachSlip(zoneEl, slipEl, delay){
    delay = delay || 0;
    let timer = null;
    function show(e){
      timer = setTimeout(()=>{
        positionSlip(slipEl, e);
        slipEl.classList.add('show');
      }, delay);
    }
    function hide(){
      if(timer) clearTimeout(timer);
      slipEl.classList.remove('show');
    }
    function move(e){
      if(slipEl.classList.contains('show')) positionSlip(slipEl, e);
    }
    zoneEl.addEventListener('mouseenter', show);
    zoneEl.addEventListener('mousemove', move);
    zoneEl.addEventListener('mouseleave', hide);
    zoneEl.addEventListener('touchstart', e => { positionSlip(slipEl, e); slipEl.classList.add('show'); setTimeout(()=>slipEl.classList.remove('show'), 5000); });
  }
  function positionSlip(slip, e){
    const ev = e.touches ? e.touches[0] : e;
    const x = ev.clientX, y = ev.clientY;
    const slipW = 340, slipH = 160;
    let nx = x + 18, ny = y - 30;
    if(nx + slipW > window.innerWidth - 10) nx = x - slipW - 18;
    if(ny + slipH > window.innerHeight - 10) ny = window.innerHeight - slipH - 10;
    if(ny < 10) ny = 10;
    if(nx < 10) nx = 10;
    slip.style.left = nx + 'px';
    slip.style.top = ny + 'px';
  }

  // Wayne's notes: hovering brass perimeter rail (top), plunger, midway illustration
  attachSlip(document.getElementById('topRail'), slipPins);
  attachSlip(document.getElementById('plunger'), slipPlunger);
  attachSlip(document.getElementById('calliope'), slipMidway);

  // Linda's secret: hovering fortune-teller for 4 full seconds
  attachSlip(document.getElementById('fortuneteller'), slipLinda, 4000);

  // ===== wildcard =====
  function triggerWildcard(){
    // turn the seer's head 4 degrees
    seerHead.style.transform = 'rotate(4deg) translateY(-1px)';
    // meadowlark wing flutter (600ms)
    larkwing.animate([
      { d: 'path("M -3 5 Q -5 2 -3 0")' },
      { d: 'path("M -3 5 Q -8 -4 -2 -2")' },
      { d: 'path("M -3 5 Q -5 2 -3 0")' }
    ], { duration: 600, easing: 'cubic-bezier(.4,1.8,.6,1)', fill: 'forwards' });
    // also a small bird "song" — soft chord
    setTimeout(chime, 200);
    // best-score plate reads new line in Wayne's hand
    const initials = (localStorage.getItem(STORE.INITIALS) || 'L.V.').split('—')[0].trim().toUpperCase();
    bestText.textContent = `${initials.slice(0,3)} 999`;
    bestText.setAttribute('font-family', "'Bradley Hand', cursive");
    bestText.setAttribute('font-size', '14');
    bestText.setAttribute('fill', '#fde8a8');
    // a small subtitle below the score
    const sub = document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('x','77'); sub.setAttribute('y','594');
    sub.setAttribute('font-family',"'Bradley Hand', cursive");
    sub.setAttribute('font-size','7');
    sub.setAttribute('fill','#c89548');
    sub.setAttribute('text-anchor','middle');
    sub.setAttribute('opacity','0');
    sub.textContent = '— bested at last —';
    document.querySelector('#apron').appendChild(sub);
    sub.animate([{opacity:0},{opacity:1}],{duration:1200, fill:'forwards'});

    // unlock the wrap-slip as a hover on the lark
    attachSlip(document.getElementById('lark'), slipWrap);
  }
  if(lastWrap){
    // re-apply visual state silently for return visitors
    seerHead.style.transform = 'rotate(4deg) translateY(-1px)';
    attachSlip(document.getElementById('lark'), slipWrap);
  }

  // Console love note
  console.log('%c— Carnival Midway Pocket Pinball, Model 88 —', 'color:#a8312a;font-weight:900');
  console.log('%cwing hing toy mfy. ltd. · kowloon · 1973', 'color:#2d5a3a');
  console.log('%cpin pattern by W.N. · 42 pins · spring 4.2 lb-in/turn', 'color:#7a6244;font-style:italic');

  // start loop
  requestAnimationFrame(step);
})();
</script>
