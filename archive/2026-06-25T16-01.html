<style>
  :root{ color-scheme: dark; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
        background:radial-gradient(circle at 50% 30%,#3a2a4f,#1a1226 70%); color:#e8dcff;
        font-family:Georgia,"Times New Roman",serif; padding:24px; gap:18px; }
  h1{ font-size:clamp(20px,5vw,30px); font-weight:400; letter-spacing:.04em; text-align:center; margin:0; text-shadow:0 0 18px rgba(255,200,120,.35); }
  p.sub{ margin:0; opacity:.6; font-size:13px; font-style:italic; text-align:center; }
  /* the body of a thing meant to be held close, in the dark, while everyone else sleeps */
  #board{ position:relative; width:min(94vw,420px); aspect-ratio:5/4;
          background:linear-gradient(160deg,#7a4a22,#4d2c12); border-radius:24px 24px 40px 40px;
          box-shadow:inset 0 6px 18px rgba(255,210,150,.25), inset 0 -10px 24px rgba(0,0,0,.6), 0 24px 50px rgba(0,0,0,.55);
          display:flex; align-items:flex-end; justify-content:center; padding:0 5% 8% 5%; overflow:hidden; }
  #board::before{ content:""; position:absolute; top:14%; left:50%; transform:translateX(-50%);
                  width:22%; aspect-ratio:1; border-radius:50%; background:radial-gradient(circle,#1a0e06,#3a200f 70%);
                  box-shadow:inset 0 4px 10px rgba(0,0,0,.8); }
  #bridge{ position:absolute; top:62%; left:6%; right:6%; height:10px; border-radius:6px;
           background:linear-gradient(#caa06a,#6b4422); box-shadow:0 3px 8px rgba(0,0,0,.5); }
  #tines{ position:relative; display:flex; align-items:flex-end; gap:2.4%; width:100%; height:100%; padding-bottom:4%; }
  .tine{ flex:1; border-radius:6px 6px 1px 1px; cursor:pointer; transform-origin:bottom center;
         background:linear-gradient(#fdfdff,#9aa0ad 45%,#cfd4dd); box-shadow:0 0 4px rgba(255,255,255,.4);
         transition:filter .1s; }
  .tine:hover{ filter:brightness(1.15); }
  .pluck{ animation:pluck .5s ease-out; }
  @keyframes pluck{ 0%{transform:scaleY(1.04) rotate(.4deg)} 30%{transform:scaleY(.97) rotate(-.5deg)} 100%{transform:none} }
  footer{ font-size:12px; opacity:.5; }
  footer a{ color:#ffd9a0; text-decoration:none; border-bottom:1px dotted; }
</style>

<body>
  <h1>The Singing Thumb-Piano</h1>
  <p class="sub">tuned so wrong notes are impossible — go on, make a small song</p>
  <div id="board"><div id="bridge"></div><div id="tines" aria-label="seventeen tines, lowest in the middle"></div></div>
  <footer>kept on the shelf at <a href="/archive">the back of the cabinet</a></footer>
<script>
const NAMES=["C","D","E","G","A"];
const freqs=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25,783.99,880.00,1046.50,1174.66,1318.51];
// arrange like a real kalimba: the deepest, longest tine sits in the centre
const order=new Array(freqs.length); let mid=freqs.length>>1, l=mid-1, r=mid+1, side=true;
order[mid]=freqs[0];
for(let k=1;k<freqs.length;k++){ if(side){order[r++]=freqs[k];} else {order[l--]=freqs[k];} side=!side; }
const lo=Math.log(freqs[0]), hi=Math.log(freqs[freqs.length-1]);
let AC; const wrap=document.getElementById("tines");
function play(f){
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const t=AC.currentTime, g=AC.createGain(), lp=AC.createBiquadFilter();
  lp.type="lowpass"; lp.frequency.value=f*6;
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(.5,t+.005);
  g.gain.exponentialRampToValueAtTime(.0001,t+1.6);
  [[ "sine",1,0],["triangle",.4,4]].forEach(([type,amp,det])=>{
    const o=AC.createOscillator(); o.type=type; o.frequency.value=f; o.detune.value=det;
    const gg=AC.createGain(); gg.gain.value=amp; o.connect(gg).connect(lp); o.start(t); o.stop(t+1.7);
  });
  lp.connect(g).connect(AC.destination);
}
order.forEach(f=>{
  const t=document.createElement("div"); t.className="tine";
  const norm=(Math.log(f)-lo)/(hi-lo); t.style.height=(95-norm*55)+"%";
  t.title=NAMES[freqs.indexOf(f)%5]; // a tiny secret name, for anyone who lingers
  const hit=e=>{e.preventDefault(); play(f); t.classList.remove("pluck"); void t.offsetWidth; t.classList.add("pluck");};
  t.addEventListener("pointerdown",hit);
  wrap.appendChild(t);
});
console.log("%cplay something only you will ever hear. that still counts as music.","color:#ffd9a0;font-style:italic");
</script>
