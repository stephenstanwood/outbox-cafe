  <meta name="outbox-spec-era" content="1958 — American mid-century kitchen-modernization showroom era, the bright optimistic peak of decorative-laminate countertop styling: chrome-edged dinettes, boomerang-and-amoeba surface patterns, the gleaming sales-floor confidence of a brand-new surfacing material being sold to a brand-new kind of kitchen; a sample line that came off the press LAST MONTH and is on the wall to SELL, not to remember">
  <meta name="outbox-spec-format" content="A browseable chip-sample swatch-deck: the whole viewport IS a fan of about 26 rigid decorative-laminate sample chips bound together on a chrome swivel-post the way they hang on a showroom wall, one chip filling the view at a time as an actual laminate surface (the pattern printed edge-to-edge, a little embossed foil name-tab in the corner, a stamped pattern number, the repeat size, the sheen rating). You flip chip-to-chip by clicking a chip's edge or pressing the arrow keys — the deck swivels on its post with a satisfying chrome flip — and you click the face of any chip to turn it over and read the namer's short typed note on the back. It is the entire current pattern line, browseable surface by surface; not a person's logbook, not a single document — a working sample deck you riffle through deciding what goes on your counters">
  <meta name="outbox-spec-subject" content="The complete 1958 pattern line of CONSTELLATION SURFACING CO. of Marion, Indiana — every named-and-numbered decorative laminate the company is currently selling: the atomic-spatter ones (STARDRIFT, METEOR SHOWER, COSMIC-RAY), the textured solids (BUTTERMILK, RADISH, OYSTER SHELL), the boomerang-and-amoeba moderns (BOOMERANG SKY, AMOEBA CORAL, JET-AGE GRAY), the wood-grain fakes the company is faintly embarrassed by but sells a lot of (KNOTTY-PINE-LOOK No. 311), and the new-for-'58 sparkle line with real aluminum flake pressed in — each chip carrying its name, number, repeat, sheen, and the gloriously specific reason the naming desk named it that">
  <meta name="outbox-spec-tone" content="The proud, chatty, faintly boastful voice of Miss Verla Tincher, who runs the Naming & Numbering desk at the Constellation plant and personally named every pattern in the 1958 line — she thinks naming a countertop is a real and serious small craft, she will tell you exactly why STARDRIFT is not the same as METEOR SHOWER, she has opinions about which patterns the wood-grain men in Sales don't appreciate, and she is GENUINELY delighted you are flipping through her deck. Warm, opinionated, self-mythologizing in the gentlest way, peer-to-peer, never wistful — these patterns are new, they are for sale, and Verla is at the top of her game">

<title>Constellation Surfacing Co. — The Complete 1958 Pattern Line, On The Post</title>
<meta name="description" content="The working sample deck of every decorative laminate Constellation Surfacing Co. of Marion, Indiana is selling this season — named and numbered by Miss Verla Tincher.">
<!-- The naming desk is on the second floor, north windows, best light in the plant. Verla says hello. -->
<style>
  :root{
    --turq:#43bdb0; --cream:#f4e3a6; --chrome:#c8ccce; --cherry:#d5453b; --spark:#e8eef0;
    --ink:#22312f; --post:#b6bcbe;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #f3efe3 0%, #d7dadb 55%, #b9bdbf 100%);
    color:var(--ink);
    min-height:100%;
    display:flex; flex-direction:column;
    overflow-x:hidden;
  }
  /* faint fluorescent tube banding over the whole showroom */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,.05) 0 2px, rgba(0,0,0,.015) 2px 60px);
    mix-blend-mode:overlay;
  }
  header{
    text-align:center; padding:14px 12px 4px;
  }
  header .co{
    font-weight:800; letter-spacing:.18em; font-size:15px; color:var(--turq);
    text-shadow:0 1px 0 #fff;
  }
  header .sub{
    font-size:10.5px; letter-spacing:.22em; color:#6a7270; margin-top:2px; text-transform:uppercase;
  }
  .deck{
    flex:1; display:flex; align-items:stretch; justify-content:center;
    gap:0; padding:8px 14px 14px; max-width:760px; width:100%; margin:0 auto;
  }

  /* ===== the chrome swivel-post ===== */
  .post{
    width:62px; flex:0 0 62px; position:relative; align-self:stretch;
    background:linear-gradient(90deg,#9aa0a2,#eef1f2 38%,#b9bfc1 58%,#83898b 100%);
    border-radius:14px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.5), 0 6px 14px rgba(0,0,0,.25);
    display:flex; flex-direction:column; align-items:center; padding:10px 0;
  }
  .screw{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fff,#aeb4b6 60%,#71777a);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.4);
    position:relative; flex:0 0 auto;
  }
  .screw::after{content:"";position:absolute;inset:9px 4px;background:#5d6366;transform:rotate(28deg);border-radius:1px;}
  .post .spine{flex:1;width:8px;margin:8px 0;border-radius:6px;
    background:linear-gradient(90deg,#7e8487,#dfe3e4 45%,#9a9fa1);}
  .plate{
    writing-mode:vertical-rl; transform:rotate(180deg);
    font-size:8.5px; letter-spacing:.18em; font-weight:700; color:#41484a;
    text-shadow:0 1px 0 rgba(255,255,255,.6); white-space:nowrap;
    padding:6px 0;
  }
  .plate b{color:var(--cherry);font-size:11px;}
  .endcap{
    flex:0 0 auto; width:44px; min-height:40px; margin-top:8px;
    border-radius:8px; background:linear-gradient(180deg,#cdd2d4,#8e9497);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:4px; position:relative; overflow:hidden;
  }
  .endcap .pressed{
    font-size:6.4px; line-height:1.35; letter-spacing:.04em; color:#7d8386;
    text-shadow:0 1px 0 rgba(255,255,255,.55); opacity:0; transition:opacity 1.2s ease;
  }
  .endcap.lit .pressed{opacity:1;}

  /* ===== the stage where one chip hangs ===== */
  .stage{
    flex:1; position:relative; perspective:1500px; margin-left:-8px;
    display:flex; align-items:center; justify-content:center;
    min-height:0;
  }
  .swivel{ width:100%; max-width:430px; transform-origin:left center; }
  @keyframes swingNext{0%{transform:rotateY(-26deg) translateX(10px);}55%{transform:rotateY(6deg);}100%{transform:none;}}
  @keyframes swingPrev{0%{transform:rotateY(26deg) translateX(-6px);}55%{transform:rotateY(-6deg);}100%{transform:none;}}

  .card{
    position:relative; width:100%; aspect-ratio:5/6; max-height:74vh;
    transform-style:preserve-3d; transition:transform .55s cubic-bezier(.6,.05,.25,1);
    cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:10px; overflow:hidden;
    box-shadow:0 10px 26px rgba(0,0,0,.32), inset 0 0 0 1px rgba(255,255,255,.25);
  }
  /* the punched corner that hangs on the post */
  .face::after{
    content:""; position:absolute; left:10px; top:-7px; width:14px; height:14px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#fff,#9aa0a2 70%,#6d7376);
    box-shadow:0 1px 2px rgba(0,0,0,.4); z-index:6;
  }

  /* FRONT — the laminate surface itself */
  .front{ background-size:cover; background-position:center; }
  .front .glaze{
    position:absolute; inset:0;
    background:linear-gradient(115deg,rgba(255,255,255,.32) 0%,rgba(255,255,255,0) 22%,rgba(255,255,255,0) 70%,rgba(255,255,255,.18) 100%);
    pointer-events:none;
  }
  .nametab{
    position:absolute; top:18px; right:16px; max-width:64%;
    background:linear-gradient(180deg,#fbf3cf,#e7d089);
    color:#5a4a1e; font-weight:800; letter-spacing:.04em; font-size:15px; line-height:1.05;
    padding:7px 11px; border-radius:3px; text-align:right;
    box-shadow:0 2px 4px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.8);
    text-shadow:0 1px 0 rgba(255,255,255,.55);
  }
  .nametab.foil-new{ background:linear-gradient(180deg,#ec6258,#bf372e); color:#fff; text-shadow:0 1px 1px rgba(0,0,0,.35);}
  .newrib{
    position:absolute; top:0; left:0; background:var(--cherry); color:#fff;
    font-size:9px; font-weight:800; letter-spacing:.14em; padding:4px 10px 4px 14px;
    border-bottom-right-radius:10px; box-shadow:0 2px 3px rgba(0,0,0,.3); z-index:6;
  }
  .stamp{
    position:absolute; left:14px; right:14px; bottom:14px;
    background:linear-gradient(180deg,rgba(232,236,237,.95),rgba(186,192,194,.95));
    border-radius:5px; padding:7px 9px; display:flex; flex-wrap:wrap; gap:2px 14px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.5), 0 2px 4px rgba(0,0,0,.2);
    font-size:9.5px; letter-spacing:.06em; color:#414a4b;
  }
  .stamp .k{font-weight:800;color:#26302f;}
  .turnhint{
    position:absolute; left:0; right:0; bottom:-1px; text-align:center;
    font-size:8px; letter-spacing:.22em; color:rgba(255,255,255,.85);
    text-shadow:0 1px 2px rgba(0,0,0,.5); padding-bottom:62px; pointer-events:none;
  }

  /* BACK — Verla's typed note */
  .back{
    transform:rotateY(180deg);
    background:
      linear-gradient(180deg,var(--turq),#2f9a8f);
    display:flex; flex-direction:column; padding:20px 18px 14px;
  }
  .back .label{
    background:#f8efce; border-radius:3px; padding:16px 16px 14px; flex:1;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.7), 0 3px 7px rgba(0,0,0,.25);
    background-image:repeating-linear-gradient(180deg,transparent 0 22px, rgba(120,90,30,.08) 22px 23px);
    position:relative; overflow:auto;
  }
  .back .label .pname{
    font-weight:800; letter-spacing:.05em; font-size:13px; color:#7a5a18;
    border-bottom:1.5px dashed #c9a64e; padding-bottom:5px; margin-bottom:9px;
  }
  .back .label .typed{
    font-family:"Courier New",Courier,monospace; font-size:13px; line-height:1.55; color:#3a2f14;
    white-space:pre-wrap;
  }
  .back .footline{
    font-size:8px; letter-spacing:.14em; color:#dff5f1; text-align:center;
    margin-top:9px; text-transform:uppercase;
  }

  /* nav edge zones */
  .edge{
    position:absolute; top:0; bottom:0; width:46px; z-index:8; cursor:pointer;
    display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s;
    color:#fff; font-size:24px; text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  .edge:hover{opacity:.9;}
  .edge.l{left:-6px;} .edge.r{right:-6px;}

  .belt{
    text-align:center; padding:4px 12px 16px; font-size:10px; letter-spacing:.16em;
    color:#5e6664; text-transform:uppercase;
  }
  .belt .nav{
    display:inline-flex; gap:8px; vertical-align:middle; margin:0 10px;
  }
  .belt button{
    font:inherit; font-size:13px; letter-spacing:.1em; cursor:pointer;
    background:linear-gradient(180deg,#eef1f2,#b9bfc1); border:0; color:#33403e;
    padding:5px 13px; border-radius:20px; box-shadow:0 2px 3px rgba(0,0,0,.25), inset 0 1px 0 #fff;
  }
  .belt button:active{transform:translateY(1px);}
  footer{
    text-align:center; padding:6px 12px 18px; font-size:11px; color:#727a78;
  }
  footer a{color:var(--turq); text-decoration:none; border-bottom:1px dotted var(--turq);}

  @media (max-width:560px){
    .deck{flex-direction:column-reverse; padding:6px 10px 10px; gap:8px;}
    .post{
      width:100%; flex:0 0 auto; flex-direction:row; padding:8px 10px; border-radius:12px;
    }
    .post .spine{width:auto;height:8px;margin:0 8px;flex:1;
      background:linear-gradient(180deg,#7e8487,#dfe3e4 45%,#9a9fa1);}
    .plate{writing-mode:horizontal-tb;transform:none;padding:0 6px;font-size:9px;}
    .endcap{margin-top:0;margin-left:8px;min-height:0;height:38px;width:auto;flex:1;}
    .endcap .pressed{font-size:7px;}
    .swivel{max-width:none;}
    .card{aspect-ratio:auto; height:58vh; max-height:none;}
  }
</style>
</head>
<body>
<header>
  <div class="co">CONSTELLATION SURFACING CO.</div>
  <div class="sub">Marion, Indiana &nbsp;·&nbsp; The Complete 1958 Pattern Line</div>
</header>

<div class="deck">
  <div class="post" aria-hidden="false">
    <div class="screw"></div>
    <div class="spine"></div>
    <div class="plate">CHIPS EXAMINED ON THIS DECK: <b id="count">0</b></div>
    <div class="spine"></div>
    <div class="endcap" id="endcap">
      <div class="pressed" id="pressed"></div>
    </div>
  </div>

  <div class="stage">
    <div class="edge l" id="prev" title="previous chip">‹</div>
    <div class="edge r" id="next" title="next chip">›</div>
    <div class="swivel" id="swivel">
      <div class="card" id="card">
        <div class="face front" id="front">
          <div class="glaze"></div>
        </div>
        <div class="face back" id="back"></div>
      </div>
    </div>
  </div>
</div>

<div class="belt">
  <span id="pos">No. 1 of 26 on the post</span>
  <span class="nav">
    <button id="bprev">◄ flip</button>
    <button id="bnext">flip ►</button>
  </span>
  <span>← / → arrow keys · click a chip to turn it over</span>
</div>

<footer>
  Run the rest of the wall through your fingers in <a href="/archive">the showroom binder</a>.
</footer>

<script>
(function(){
  "use strict";
  var T="#43bdb0", C="#f4e3a6", G="#c8ccce", R="#d5453b", S="#e8eef0";

  var chips = [
    {name:"STARDRIFT", num:"1958-100", rep:"12″ × 16″", sheen:"satin", kind:"spatter",
     base:"#f1e6b8", marks:[T,"#b8843a","#7d8488"],
     note:"Folks confuse this with METEOR SHOWER all day long and it makes me want to lie down. STARDRIFT is a SCATTER — the flecks drift, no two clumps the same, like sugar shook over a counter. I numbered them ten apart on purpose so nobody'd swap the order slips. — V.T."},
    {name:"METEOR SHOWER", num:"1958-110", rep:"18″ × 24″", sheen:"satin", kind:"streak",
     base:"#dfe7e6", marks:[T,R,"#7d8488"],
     note:"Now THIS one has direction. The flecks streak — they fall the same way across the whole sheet, like you caught the sky mid-shower. Lay it long-grain on a long counter and a customer will stand there and feel the motion. STARDRIFT can't do that. — V.T."},
    {name:"COSMIC-RAY", num:"1958-120", rep:"12″ × 12″", sheen:"low-sheen", kind:"spatter",
     base:"#293a44", marks:[S,T,C],
     note:"Our only dark spatter and the diner men can't get enough of it — bright fleck on a deep field, hides every coffee ring God ever made. I argued three weeks for the hyphen. COSMIC RAY is two words; COSMIC-RAY is a pattern."},
    {name:"BOOMERANG SKY", num:"1958-200", rep:"9″ × 9″", sheen:"high-gloss", kind:"boomerang",
     base:"#cfe9e6", marks:[T,C,R],
     note:"The boomerang is the shape of 1958 itself, I will fight a man on it. They tumble, they never line up in rows — a boomerang in a row is just a stripe and a stripe is a coward. Sky is the pale one for a bright modern kitchen. — V.T."},
    {name:"AMOEBA CORAL", num:"1958-210", rep:"14″ × 14″", sheen:"satin", kind:"amoeba",
     base:"#f4e3a6", marks:[R,T],
     note:"An amoeba is the shape of a good idea that hasn't decided what it is yet — soft on every edge. Coral's the warm colorway. I named the whole amoeba family before the boomerang men knew we were doing one. We were."},
    {name:"JET-AGE GRAY", num:"1958-220", rep:"9″ × 9″", sheen:"eggshell", kind:"boomerang",
     base:"#c8ccce", marks:["#7d8488",C],
     note:"This is the one Sales reaches for when a customer's afraid of color. Modern but it won't bite — boomerangs in chrome gray, very calm. Sells a ton. I don't love a thing for selling a ton, but I respect it."},
    {name:"BUTTERMILK", num:"1958-300", rep:"solid", sheen:"velvet", kind:"solid",
     base:"#f4e3a6", marks:["#e6cf78"],
     note:"A solid is HARDER to name than any spatter — you've got no pattern to lean on, just a color and the right word. This isn't 'cream,' it isn't 'tan.' It's the skim you pour off churned butter. Say it out loud. You can taste the kitchen."},
    {name:"RADISH", num:"1958-302", rep:"solid", sheen:"satin", kind:"solid",
     base:"#d96a72", marks:["#c14a55"],
     note:"Not RED. Radish. There's a blush of white worked down into it, same as the root has near the leaves. 'Red' is lazy and there are nine reds in this line already. I name the vegetable, not the crayon. — V.T."},
    {name:"OYSTER SHELL", num:"1958-304", rep:"solid pearl", sheen:"high-gloss", kind:"solid",
     base:"#e7e3d8", marks:[S],
     note:"Hold it under the tubes and tip it — there's a pearl that comes up and goes away. That's not an accident, the press boys earn their lunch on this one. A pale solid that does a quiet trick is worth three loud ones."},
    {name:"KNOTTY-PINE-LOOK No. 311", num:"1958-311", rep:"24″ × 96″", sheen:"satin", kind:"wood",
     base:"#d8b675", marks:["#9c7430"],
     note:"The wood-grain men love this and I sell it cheerfully, so don't repeat what I'm about to write. A countertop pretending to be a tree it is not, and a tree it could never survive being. Still — they move a mile of it a month, and a mile of anything keeps the naming desk lit. Pine it is."},
    {name:"STARLITE SPARKLE", num:"1958-400", rep:"12″ × 12″", sheen:"high-gloss", kind:"sparkle", isnew:true,
     base:"#43bdb0", marks:[S,C],
     note:"NEW this season and the reason I came to work humming. Real aluminum flake, pressed right down into the laminate — it catches the fluorescent and throws it back at you. Nobody in this state had a sparkle counter last spring. We do now. I named the whole flake line in one good afternoon."},
    {name:"SATELLITE SILVER", num:"1958-402", rep:"12″ × 12″", sheen:"high-gloss", kind:"sparkle", isnew:true,
     base:"#c8ccce", marks:[S],
     note:"Sister to STARLITE — same flake, silver field. Walk past it and the sparkle moves with you, on account of the angle. I wanted SPUTNIK and the front office turned a color, so SATELLITE it is, and honestly the softer word wears better. — V.T."},
    {name:"", num:"— — — —", rep:"—", sheen:"—", kind:"blank", blank:true,
     base:"#eae6da", marks:[],
     note:"That one's mine for now — ask me in the spring line.\n\nNo, I won't tell you what it's for. Yes, it has a name already. Yes, it's a good one.\n\nNo. — V.T."},
    {name:"CONFETTI COUNTER", num:"1958-130", rep:"10″ × 10″", sheen:"satin", kind:"spatter",
     base:"#f8f1d8", marks:[R,T,C,"#b8843a"],
     note:"Four colors of fleck on a near-white. I made it for a kitchen where somebody's having a birthday, which — if you do it right — is most kitchens. Sales calls it 'busy.' I call it glad."},
    {name:"PINK MIST", num:"1958-306", rep:"solid", sheen:"velvet", kind:"solid",
     base:"#eac4cc", marks:["#d99fb0"],
     note:"The softest solid in the line. Not a baby pink — there's gray fogged through it, so it reads grown. A velvet sheen so it won't glare. I put it next to OYSTER SHELL on the wall and customers reach for both."},
    {name:"SEAFOAM DRIFT", num:"1958-308", rep:"solid", sheen:"satin", kind:"solid",
     base:"#aedcd4", marks:[T],
     note:"This one's on my own counter at home, so I'll be honest: I named it for me. The faint drift in it keeps a pale green from going flat. When the morning light comes in over my sink it looks exactly like the word. — V.T."},
    {name:"ATOM CLUSTER", num:"1958-140", rep:"8″ × 8″", sheen:"low-sheen", kind:"cluster",
     base:"#efe9d6", marks:[T,R,"#3a3f42"],
     note:"A spatter scatters; a cluster gathers. The flecks bunch up like they're attracted to each other, little knots of them with bare field between. Tighter repeat, too. If STARDRIFT is the night sky, this is the molecule diagram they print in the new science books."},
    {name:"BOOMERANG CORAL", num:"1958-202", rep:"9″ × 9″", sheen:"high-gloss", kind:"boomerang",
     base:"#f4e3a6", marks:[R,T],
     note:"Boomerangs on buttercream with the coral and turquoise tumbling through. The warmest of the boomerang three. A high-gloss so the chrome dinette edge has something to talk to."},
    {name:"AMOEBA MINT", num:"1958-212", rep:"14″ × 14″", sheen:"satin", kind:"amoeba",
     base:"#d7ecda", marks:[T,"#6fae8a"],
     note:"Cool colorway of the amoeba family — greens loafing across a pale field. People say 'restful' and they're right, but don't tell the boomerang men a curve can rest, they think rest is their department."},
    {name:"CHARCOAL TWEED", num:"1958-310", rep:"texture", sheen:"eggshell", kind:"tweed",
     base:"#4a4f52", marks:["#8b9094",S],
     note:"A tweed has to read like cloth from across the room and like laminate up close, and getting both is a tightrope. Fine light fleck combed through a deep gray. The most sophisticated thing on the wall and the men keep walking right past it for the pine. Their loss."},
    {name:"GOLDEN FLECK", num:"1958-404", rep:"12″ × 12″", sheen:"high-gloss", kind:"sparkle", isnew:true,
     base:"#b8843a", marks:["#f4da8c",S],
     note:"NEW — and the luxury one. Gold flake in a warm bronze field; under the tubes it's nearly molten. For the kitchen that wants the neighbors to mention it. I won't pretend I didn't enjoy naming this one."},
    {name:"PEBBLE PATH", num:"1958-150", rep:"11″ × 11″", sheen:"low-sheen", kind:"spatter",
     base:"#e0dccb", marks:["#a89a7a",G,"#7d8488"],
     note:"The most useful pattern I ever named, and useful is no insult. Neutral pebble fleck on putty — it hides crumbs, rings, and a multitude of sins. The low sheen forgives the rest. Every busy family kitchen wants this and doesn't know it yet."},
    {name:"STARBURST GRAY", num:"1958-160", rep:"12″ × 12″", sheen:"satin", kind:"cluster",
     base:"#c8ccce", marks:["#3a3f42",S,T],
     note:"Bursts, not drifts — each cluster throws little points like a struck match. Charcoal and a touch of turquoise on chrome gray. Half the customers think it's wallpaper and ask where the matching paper is. There isn't any. There should be."},
    {name:"RIBBON CANDY", num:"1958-230", rep:"6″ × 18″", sheen:"high-gloss", kind:"boomerang",
     base:"#f4e3a6", marks:[R,T],
     note:"My one boomerang that's allowed to line up — because it's not boomerangs, it's ribbon, and ribbon's whole job is to run. Looped bands of cherry and turquoise. Long thin repeat. I almost called it BARBER but a counter is no place for a barber pole, that's a different feeling entirely."},
    {name:"MAPLE-LOOK No. 314", num:"1958-314", rep:"24″ × 96″", sheen:"satin", kind:"wood",
     base:"#e0c089", marks:["#b08a40"],
     note:"The second wood-look, lighter and finer-grained than the pine — and between us I'd take it over 311 every day. If we must pretend to be a tree, let's be a well-mannered one. The wood-grain men prefer the pine. We have agreed to disagree, loudly, on Tuesdays."},
    {name:"NIGHT SKY SPARKLE", num:"1958-406", rep:"12″ × 12″", sheen:"high-gloss", kind:"sparkle", isnew:true,
     base:"#1e2a3a", marks:[S,T,C],
     note:"NEW, and the last chip I hang on the post — the crown of the flake line. Deep midnight field, every color of flake we press, scattered like the real thing through a screen door in July. I saved it for the end on purpose. You riffle all the way down a deck of mine, you've earned the night sky. — V. Tincher, Naming & Numbering"}
  ];

  // ---------- pattern generator (pure SVG, no images) ----------
  function rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function P(n){return Math.round(n*10)/10;}
  function pick(a,r){return a[Math.floor(r()*a.length)]||"#888";}
  function blob(r,cx,cy,rad,pts,jit){var d="",i;for(i=0;i<pts;i++){var a=i/pts*Math.PI*2;var rr=rad*(1-jit+r()*jit*2);var x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;d+=(i?"L":"M")+P(x)+" "+P(y)+" ";}return d+"Z";}
  var BOOM="M-30 6 C-17 -19 17 -19 30 6 C19 1 13 -1 0 -1 C-13 -1 -19 1 -30 6 Z";

  function build(c, seed){
    var r=rng(seed*2654435761+9176), W=220,H=220, i, g="";
    g+='<rect width="'+W+'" height="'+H+'" fill="'+c.base+'"/>';
    var k=c.kind, m=c.marks;
    if(k==="solid"||k==="blank"){
      for(i=0;i<360;i++){var x=r()*W,y=r()*H,rr=0.5+r()*1.1;g+='<circle cx="'+P(x)+'" cy="'+P(y)+'" r="'+P(rr)+'" fill="'+pick(m.length?m:["#000"],r)+'" opacity="'+(k==="blank"?0.05:0.16+r()*0.14).toFixed(2)+'"/>';}
      if(k==="blank"){g+='<circle cx="110" cy="110" r="60" fill="none" stroke="#cdc7b6" stroke-width="1" opacity="0.5"/>';}
    } else if(k==="spatter"||k==="streak"){
      var n=k==="streak"?150:170;
      for(i=0;i<n;i++){
        var bx=r()*W, by=r()*H, sz=0.8+r()*4.2, col=pick(m,r), op=(0.5+r()*0.5).toFixed(2);
        if(k==="streak"){var len=sz*(2+r()*3);g+='<ellipse cx="'+P(bx)+'" cy="'+P(by)+'" rx="'+P(len)+'" ry="'+P(sz*0.7)+'" transform="rotate(-32 '+P(bx)+' '+P(by)+')" fill="'+col+'" opacity="'+op+'"/>';}
        else g+='<circle cx="'+P(bx)+'" cy="'+P(by)+'" r="'+P(sz)+'" fill="'+col+'" opacity="'+op+'"/>';
      }
    } else if(k==="cluster"){
      var centers=6+Math.floor(r()*3);
      for(var cI=0;cI<centers;cI++){var ccx=r()*W,ccy=r()*H;var cnt=12+Math.floor(r()*16);for(i=0;i<cnt;i++){var ang=r()*6.283,dist=r()*r()*26,px=ccx+Math.cos(ang)*dist,py=ccy+Math.sin(ang)*dist,ps=0.7+r()*2.4;g+='<circle cx="'+P(px)+'" cy="'+P(py)+'" r="'+P(ps)+'" fill="'+pick(m,r)+'" opacity="'+(0.55+r()*0.45).toFixed(2)+'"/>';}}
    } else if(k==="boomerang"){
      var bn=11+Math.floor(r()*5);
      for(i=0;i<bn;i++){var x2=r()*W,y2=r()*H,rot=Math.floor(r()*360),sc=(0.5+r()*0.9).toFixed(2);g+='<g transform="translate('+P(x2)+' '+P(y2)+') rotate('+rot+') scale('+sc+')" fill="'+pick(m,r)+'" opacity="'+(0.78+r()*0.22).toFixed(2)+'">'+(c.num.indexOf("230")>-1?'<rect x="-34" y="-3" width="68" height="6" rx="3"/>':'<path d="'+BOOM+'"/>')+'</g>';}
    } else if(k==="amoeba"){
      var an=6+Math.floor(r()*3);
      for(i=0;i<an;i++){var ax=r()*W,ay=r()*H,arad=16+r()*30;g+='<path d="'+blob(r,ax,ay,arad,10,0.34)+'" fill="'+pick(m,r)+'" opacity="'+(0.6+r()*0.32).toFixed(2)+'"/>';}
    } else if(k==="tweed"){
      for(i=0;i<900;i++){var tx=r()*W,ty=r()*H,tl=2+r()*5,vert=r()>0.5;g+='<rect x="'+P(tx)+'" y="'+P(ty)+'" width="'+P(vert?0.8:tl)+'" height="'+P(vert?tl:0.8)+'" fill="'+pick(m,r)+'" opacity="'+(0.18+r()*0.3).toFixed(2)+'"/>';}
    } else if(k==="wood"){
      for(var col2=0;col2<22;col2++){var gx=col2*10+r()*4;var d="M"+P(gx)+" 0 ";for(var yy=0;yy<=220;yy+=20){d+="Q"+P(gx+(r()-0.5)*7)+" "+P(yy+10)+" "+P(gx+(r()-0.5)*4)+" "+P(yy+20)+" ";}g+='<path d="'+d+'" fill="none" stroke="'+m[0]+'" stroke-width="'+(0.6+r()*1.6).toFixed(2)+'" opacity="'+(0.22+r()*0.3).toFixed(2)+'"/>';}
      for(i=0;i<3;i++){var kx=20+r()*180,ky=20+r()*180;g+='<ellipse cx="'+P(kx)+'" cy="'+P(ky)+'" rx="'+P(6+r()*5)+'" ry="'+P(3+r()*3)+'" fill="none" stroke="'+m[0]+'" stroke-width="2" opacity="0.5"/>';}
    } else if(k==="sparkle"){
      g+='<rect width="'+W+'" height="'+H+'" fill="'+c.base+'"/>';
      for(i=0;i<520;i++){var sx=r()*W,sy=r()*H,ss=0.5+r()*2.0,sr=Math.floor(r()*90);g+='<rect x="'+P(sx)+'" y="'+P(sy)+'" width="'+P(ss)+'" height="'+P(ss)+'" transform="rotate(45 '+P(sx)+' '+P(sy)+')" fill="'+pick(m,r)+'" opacity="'+(0.4+r()*0.6).toFixed(2)+'"/>';}
    }
    var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+g+'</svg>';
    return 'url("data:image/svg+xml,'+encodeURIComponent(svg)+'")';
  }

  // ---------- state ----------
  var idx=0, flipped=false, total=chips.length;
  var front=document.getElementById("front"),
      back=document.getElementById("back"),
      card=document.getElementById("card"),
      swivel=document.getElementById("swivel"),
      countEl=document.getElementById("count"),
      posEl=document.getElementById("pos"),
      endcap=document.getElementById("endcap"),
      pressed=document.getElementById("pressed");

  var KEY="csc1958_examined";
  function loadSet(){try{return new Set(JSON.parse(localStorage.getItem(KEY)||"[]"));}catch(e){return new Set();}}
  function saveSet(s){try{localStorage.setItem(KEY,JSON.stringify(Array.from(s)));}catch(e){}}
  var visited=loadSet();

  // ---------- tiny chrome click ----------
  var AC=null;
  function click(){
    try{
      if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
      var o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;
      o.type="square";o.frequency.setValueAtTime(1700,t);o.frequency.exponentialRampToValueAtTime(620,t+0.04);
      g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
      o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.07);
    }catch(e){}
  }

  function render(){
    var c=chips[idx];
    front.style.backgroundImage=build(c,idx+1);
    var tabClass = c.blank ? "nametab" : (c.isnew ? "nametab foil-new" : "nametab");
    var tabText = c.blank ? "NOT YET" : c.name;
    var html='<div class="glaze"></div>';
    if(c.isnew) html+='<div class="newrib">NEW FOR \u201958</div>';
    html+='<div class="'+tabClass+'">'+tabText+'</div>';
    html+='<div class="stamp">'+
            '<span><span class="k">No.</span> '+c.num+'</span>'+
            '<span><span class="k">repeat</span> '+c.rep+'</span>'+
            '<span><span class="k">sheen</span> '+c.sheen+'</span>'+
          '</div>';
    html+='<div class="turnhint">— TURN OVER FOR V.T.\u2019S NOTE —</div>';
    front.innerHTML=html;

    var pn = c.blank ? "(unnamed)" : c.name + " · " + c.num;
    back.innerHTML='<div class="label"><div class="pname">'+pn+'</div>'+
      '<div class="typed">'+c.note+'</div></div>'+
      '<div class="footline">Naming &amp; Numbering · Constellation Surfacing Co.</div>';

    // flip back to face on every nav
    flipped=false; card.classList.remove("flipped");

    // counter
    visited.add(idx); saveSet(visited);
    countEl.textContent=visited.size;

    posEl.textContent="No. "+(idx+1)+" of "+total+" on the post";

    // hidden end-cap message — only on the very last chip
    if(idx===total-1){
      pressed.textContent="END OF THE LINE — FOR NOW. Pressed faint here by V.T.: I have named four hundred and eleven countertops and I am not finished. See you in the spring line.";
      endcap.classList.add("lit");
    } else {
      endcap.classList.remove("lit");
      pressed.textContent="";
    }
  }

  function swing(dir){
    swivel.style.animation="none"; void swivel.offsetWidth;
    swivel.style.animation=(dir>0?"swingNext":"swingPrev")+" .5s cubic-bezier(.5,.05,.25,1)";
  }
  function go(dir){
    idx=(idx+dir+total)%total;
    swing(dir); click(); render();
  }
  function flip(){
    flipped=!flipped; card.classList.toggle("flipped",flipped); click();
  }

  card.addEventListener("click",function(e){
    // edge clicks handled by edge zones; face click flips
    flip();
  });
  document.getElementById("prev").addEventListener("click",function(e){e.stopPropagation();go(-1);});
  document.getElementById("next").addEventListener("click",function(e){e.stopPropagation();go(1);});
  document.getElementById("bprev").addEventListener("click",function(){go(-1);});
  document.getElementById("bnext").addEventListener("click",function(){go(1);});
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowRight"){go(1);e.preventDefault();}
    else if(e.key==="ArrowLeft"){go(-1);e.preventDefault();}
    else if(e.key===" "||e.key==="Enter"){flip();e.preventDefault();}
  });

  render();
  console.log("%cConstellation Surfacing Co.","color:#43bdb0;font-weight:bold");
  console.log("Naming & Numbering desk, 2nd floor, north windows. Verla named every chip on this post herself — yes, including the blank one. Ask her in the spring.");
})();
</script>
