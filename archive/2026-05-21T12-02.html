<title>Pollen Hours — a quiet drift of seed and chlorophyll</title>
<meta name="description" content="A continuous meditation on wind-carried pollen and seed, settling through afternoon light.">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #f5f1e8;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    color: #6b8fa3;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #f5f1e8;
  }
  .title-card {
    position: fixed;
    top: 1.4rem;
    left: 1.6rem;
    z-index: 2;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(107, 143, 163, 0.55);
    pointer-events: none;
    user-select: none;
    line-height: 1.6;
  }
  .title-card .accent {
    color: rgba(159, 184, 160, 0.85);
    font-style: italic;
    text-transform: none;
    letter-spacing: 0.04em;

  }
  footer {
    position: fixed;

  footer a {

  footer a:hover {

  }
  .seed-mark {
    position: fixed;
    bottom: 1.1rem;
    left: 1.4rem;
    z-index: 2;

    font-variant-numeric: tabular-nums;
    user-select: none;
  }
  @media (max-width: 600px) {
    .title-card { top: 1rem; left: 1rem; font-size: 0.66rem; }
    .title-card .accent { font-size: 0.64rem; max-width: 14rem; }
    footer { bottom: 0.8rem; right: 1rem; font-size: 0.62rem; }
    .seed-mark { bottom: 0.8rem; left: 1rem; font-size: 0.58rem; letter-spacing: 0.18em; }

  @media (prefers-reduced-motion: reduce) {

<body>

<canvas id="drift" aria-label="A continuous animation of pale sage pollen and seed particles drifting through warm afternoon air."></canvas>

<div class="title-card" aria-hidden="true">
  Pollen Hours
  <span class="accent">the wind is busy right now, carrying everything forward</span>
</div>

<div class="seed-mark" id="seedmark" aria-hidden="true"></div>

<footer>
  <a href="/archive">other quiet rooms</a>
</footer>

<!--
  what the eye misses, the air remembers.
  every grain has somewhere it is going.
  the second layer arrives at ~45s. stay a moment.
-->

<script>
(() => {
  'use strict';

  // ----- daily seed (mandatory element) -----
  // Each calendar day, the particle field is identical across viewings.
  // Tomorrow brings a fresh seed, fresh choreography.
  const today = new Date();
  const dayKey = today.getFullYear() + '-' +
                 String(today.getMonth() + 1).padStart(2, '0') + '-' +
                 String(today.getDate()).padStart(2, '0');
  const STORAGE_KEY = 'pollen_hours_seed_' + dayKey;

  let seedValue;
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      seedValue = parseInt(stored, 10);
    } else {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < dayKey.length; i++) {
        h ^= dayKey.charCodeAt(i);
        h = Math.imul(h, 16777619) >>> 0;
      }
      seedValue = h >>> 0;
      localStorage.setItem(STORAGE_KEY, String(seedValue));
    }
  } catch (e) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < dayKey.length; i++) {
      h ^= dayKey.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    seedValue = h >>> 0;
  }

  // tiny hidden mark — the day's signature
  const mark = document.getElementById('seedmark');
  if (mark) {
    mark.textContent = '· ' + dayKey + ' · ' + (seedValue % 9973).toString(36);
  }

  // mulberry32 PRNG — fast, deterministic
  function makeRng(seed) {
    let s = seed >>> 0;
    return function () {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const rng = makeRng(seedValue);

  // ----- canvas setup -----
  const canvas = document.getElementById('drift');
  const ctx = canvas.getContext('2d', { alpha: false });
  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    rebuildField();
  });

  // ----- noise (simple value noise built on the seeded rng) -----
  const NOISE_W = 64;
  const NOISE_H = 64;
  const noiseGrid = new Float32Array(NOISE_W * NOISE_H);
  for (let i = 0; i < noiseGrid.length; i++) {
    noiseGrid[i] = rng() * 2 - 1;
  }
  function smoothstep(t) { return t * t * (3 - 2 * t); }
  function sampleNoise(x, y) {
    // x,y normalized 0..1
    const fx = ((x % 1) + 1) % 1 * NOISE_W;
    const fy = ((y % 1) + 1) % 1 * NOISE_H;
    const xi = Math.floor(fx);
    const yi = Math.floor(fy);
    const xf = fx - xi;
    const yf = fy - yi;
    const x0 = xi % NOISE_W;
    const x1 = (xi + 1) % NOISE_W;
    const y0 = yi % NOISE_H;
    const y1 = (yi + 1) % NOISE_H;
    const a = noiseGrid[y0 * NOISE_W + x0];
    const b = noiseGrid[y0 * NOISE_W + x1];
    const c = noiseGrid[y1 * NOISE_W + x0];
    const d = noiseGrid[y1 * NOISE_W + x1];
    const ux = smoothstep(xf);
    const uy = smoothstep(yf);
    const ab = a + (b - a) * ux;
    const cd = c + (d - c) * ux;
    return ab + (cd - ab) * uy;
  }

  // ----- particle field -----
  // Layer A — the primary sage drift, present from t=0
  // Layer B — the warmer upper drift, fades in around t ≈ 45s
  // Layer C — pale gold accent grains, rare and small

  let layerA = [];
  let layerB = [];
  let layerC = [];

  function spawnA() {
    return {
      x: rng() * W,
      y: rng() * H,
      r: 1.2 + rng() * 2.6,
      vx: 0.18 + rng() * 0.42,
      vy: -0.05 + rng() * 0.18,
      phase: rng() * Math.PI * 2,
      wobble: 0.6 + rng() * 1.4,
      alpha: 0.35 + rng() * 0.20,
      spin: (rng() - 0.5) * 0.012,
      rot: rng() * Math.PI * 2,
      kind: rng() < 0.18 ? 'tuft' : 'grain'
    };
  }

  function spawnB() {
    return {
      x: rng() * W,
      y: rng() * H * 0.55, // upper-biased
      r: 1.0 + rng() * 2.2,
      vx: 0.32 + rng() * 0.48, // slightly faster
      vy: 0.02 + rng() * 0.14,
      phase: rng() * Math.PI * 2,
      wobble: 0.4 + rng() * 1.2,
      alpha: 0.18 + rng() * 0.18,
      spin: (rng() - 0.5) * 0.018,
      rot: rng() * Math.PI * 2,
      kind: rng() < 0.22 ? 'tuft' : 'grain'
    };
  }

  function spawnC() {
    return {
      x: rng() * W,
      y: rng() * H,
      r: 0.7 + rng() * 1.4,
      vx: 0.10 + rng() * 0.30,
      vy: -0.02 + rng() * 0.12,
      phase: rng() * Math.PI * 2,
      wobble: 0.8 + rng() * 1.6,
      alpha: 0.16 + rng() * 0.14,
      spin: (rng() - 0.5) * 0.008,
      rot: rng() * Math.PI * 2
    };
  }

  function rebuildField() {
    const area = W * H;
    const densityA = 0.00042;
    const densityB = 0.00026;
    const densityC = 0.00014;
    const countA = Math.max(120, Math.min(900, Math.floor(area * densityA)));
    const countB = Math.max(80,  Math.min(600, Math.floor(area * densityB)));
    const countC = Math.max(40,  Math.min(280, Math.floor(area * densityC)));
    layerA = new Array(countA);
    layerB = new Array(countB);
    layerC = new Array(countC);
    for (let i = 0; i < countA; i++) layerA[i] = spawnA();
    for (let i = 0; i < countB; i++) layerB[i] = spawnB();
    for (let i = 0; i < countC; i++) layerC[i] = spawnC();
  }
  rebuildField();

  // ----- color helpers -----
  function sageColor(alpha) {
    return 'rgba(159, 184, 160, ' + alpha.toFixed(3) + ')';
  }
  function upperColor(alpha) {
    // marginally warmer than sage — pulled slightly toward gold
    return 'rgba(180, 188, 148, ' + alpha.toFixed(3) + ')';
  }
  function goldColor(alpha) {
    return 'rgba(212, 196, 168, ' + alpha.toFixed(3) + ')';
  }
  function deepBlueColor(alpha) {
    return 'rgba(107, 143, 163, ' + alpha.toFixed(3) + ')';
  }

  // ----- drawing -----
  function drawGrain(p, color) {
    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawTuft(p, color, accent) {
    // little dandelion-y radial whisp
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.5;
    const arms = 6;
    for (let i = 0; i < arms; i++) {
      const a = (i / arms) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * p.r * 2.6, Math.sin(a) * p.r * 2.6);
      ctx.stroke();
    }
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.arc(0, 0, p.r * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ----- animation -----
  const startTime = performance.now();
  const CYCLE_MS = 5 * 60 * 1000;       // 5-minute non-looping cycle (params drift inside)
  const LAYER_B_FADE_START = 42000;      // ~45s — within margin
  const LAYER_B_FADE_DURATION = 18000;   // gradual emergence

  let lastFrame = startTime;

  function step(now) {
    const elapsed = now - startTime;
    const dt = Math.min(48, now - lastFrame);
    lastFrame = now;

    // soft "afternoon light" repaint, never quite clearing — preserves micro-trails
    ctx.fillStyle = 'rgba(245, 241, 232, 0.18)';
    ctx.fillRect(0, 0, W, H);

    // wind currents evolve slowly across the cycle so the flow is continuous, not loopy
    const cycleT = (elapsed % CYCLE_MS) / CYCLE_MS;
    const windPhase = cycleT * Math.PI * 2;
    const windBase = 0.18 + 0.08 * Math.sin(windPhase * 0.7);
    const updraft = 0.04 * Math.sin(windPhase * 0.41 + 1.2);

    // ----- layer C (gold accent) — drawn beneath -----
    for (let i = 0; i < layerC.length; i++) {
      const p = layerC[i];
      const nx = sampleNoise(p.x / 900 + cycleT * 0.18, p.y / 900);
      const ny = sampleNoise(p.x / 900 + 11.3, p.y / 900 - cycleT * 0.12);
      p.x += (p.vx + windBase * 0.6 + nx * 0.35) * (dt / 16);
      p.y += (p.vy + ny * 0.45 + updraft) * (dt / 16);
      p.phase += 0.012 * (dt / 16);
      const wobX = Math.sin(p.phase) * p.wobble * 0.4;
      const wobY = Math.cos(p.phase * 0.7) * p.wobble * 0.3;
      const dx = wobX;
      const dy = wobY;
      drawGrain(
        { x: p.x + dx, y: p.y + dy, r: p.r },
        goldColor(p.alpha)
      );
      if (p.x > W + 30) { p.x = -20; p.y = rng() * H; }
      if (p.x < -30) { p.x = W + 20; }
      if (p.y > H + 30) { p.y = -20; p.x = rng() * W; }
      if (p.y < -30) { p.y = H + 20; }
    }

    // ----- layer A (primary sage) -----
    for (let i = 0; i < layerA.length; i++) {
      const p = layerA[i];
      const nx = sampleNoise(p.x / 800 + cycleT * 0.22, p.y / 800 + 3.1);
      const ny = sampleNoise(p.x / 800 - 5.2, p.y / 800 + cycleT * 0.18);
      p.x += (p.vx + windBase + nx * 0.55) * (dt / 16);
      p.y += (p.vy + ny * 0.55 + updraft * 0.7) * (dt / 16);
      p.rot += p.spin * (dt / 16);
      p.phase += 0.018 * (dt / 16);
      const wobX = Math.sin(p.phase) * p.wobble * 0.55;
      const wobY = Math.cos(p.phase * 0.6) * p.wobble * 0.45;

      if (p.kind === 'tuft') {
        drawTuft(
          { x: p.x + wobX, y: p.y + wobY, r: p.r, rot: p.rot },
          sageColor(p.alpha * 0.55),
          sageColor(p.alpha)
        );
      } else {
        drawGrain(
          { x: p.x + wobX, y: p.y + wobY, r: p.r },
          sageColor(p.alpha)
        );
      }

      if (p.x > W + 40) { p.x = -30; p.y = rng() * H; }
      if (p.x < -40) { p.x = W + 30; }
      if (p.y > H + 40) { p.y = -30; p.x = rng() * W; }
      if (p.y < -40) { p.y = H + 30; }
    }

    // ----- layer B (warmer upper drift — fades in around 45s) -----
    let bFade = 0;
    if (elapsed > LAYER_B_FADE_START) {
      bFade = Math.min(1, (elapsed - LAYER_B_FADE_START) / LAYER_B_FADE_DURATION);
      // gentle ease
      bFade = bFade * bFade * (3 - 2 * bFade);
    }
    if (bFade > 0.005) {
      for (let i = 0; i < layerB.length; i++) {
        const p = layerB[i];
        const nx = sampleNoise(p.x / 700 + cycleT * 0.28 + 9.7, p.y / 700);
        const ny = sampleNoise(p.x / 700 - 2.1, p.y / 700 + cycleT * 0.21 + 4.4);
        p.x += (p.vx + windBase * 1.18 + nx * 0.48) * (dt / 16);
        p.y += (p.vy + ny * 0.42 + updraft * 0.45) * (dt / 16);
        p.rot += p.spin * (dt / 16);
        p.phase += 0.022 * (dt / 16);
        const wobX = Math.sin(p.phase) * p.wobble * 0.5;
        const wobY = Math.cos(p.phase * 0.8) * p.wobble * 0.4;
        const a = p.alpha * bFade;

        if (p.kind === 'tuft') {
          drawTuft(
            { x: p.x + wobX, y: p.y + wobY, r: p.r, rot: p.rot },
            upperColor(a * 0.55),
            upperColor(a)
          );
        } else {
          drawGrain(
            { x: p.x + wobX, y: p.y + wobY, r: p.r },
            upperColor(a)
          );
        }

        if (p.x > W + 40) { p.x = -30; p.y = rng() * (H * 0.6); }
        if (p.x < -40) { p.x = W + 30; }
        if (p.y > H + 40) { p.y = -30; p.x = rng() * W; }
        if (p.y < -40) { p.y = H + 30; }
      }
    }

    // ----- the deep blue accent layer: an occasional, very subtle whisper -----
    // a small handful of slow indigo motes, sparse, to give depth
    if ((elapsed | 0) % 7 === 0) {
      const motes = 3;
      for (let i = 0; i < motes; i++) {
        const x = (sampleNoise(i * 0.31 + cycleT, cycleT * 0.7 + i) + 1) * 0.5 * W;
        const y = (sampleNoise(i * 0.71, cycleT + i * 0.13) + 1) * 0.5 * H;
        const r = 0.6 + (sampleNoise(i, cycleT) + 1) * 0.6;
        ctx.fillStyle = deepBlueColor(0.05);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);

  // console whisper — for the curious
  // (no spec leakage; just a kind word to inspect-element travelers)
  try {
    console.log('%c the air is busy. ', 'color:#9fb8a0; font-style:italic; font-family:Georgia,serif; font-size:13px;');
    console.log('%c every grain has somewhere it is going. ', 'color:#6b8fa3; font-style:italic; font-family:Georgia,serif; font-size:12px;');
  } catch (e) { /* ignore */ }
})();
</script>
