<!--
  west window, 414 south cottonwood street, beaver city, nebraska.
  tuesday, november 27, 1934. 4:47 p.m. through 5:34 p.m. central standard time.
  the kitchen barometer reads 30.18 and steady; wind from the south-southwest;
  the smoke from the mcconaha chimney lays down nearly level across the section.
  cordelia is at the windowsill. mae is reading in the front room.
  pollux is asleep on the rug. the kettle is off the stove and not yet on again.

  the page is the sky. the page is the sky. the page is the sky.
-->

<div id="footer"><a href="/archive">other evenings</a></div>

<script>
'use strict';

/* ------------------------------------------------------------------
   a 47-minute deterministic cycle. t = 0 at 4:47 p.m., t = 1 at 5:34 p.m.
   peak coral at the historical midpoint, 5:14 p.m., t = 27/47 ≈ 0.5745.
   ------------------------------------------------------------------ */

const CYCLE_MS = 47 * 60 * 1000;
const PEAK_T   = 27 / 47;

const canvas = document.getElementById('sky');
const ctx    = canvas.getContext('2d', { alpha: false });

let W = 0, H = 0, DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

function resize() {
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildSilhouettes();
}
window.addEventListener('resize', resize);

/* ------------------------------------------------------------------
   small deterministic prng for the cottonwood-line and tree shapes.
   same trees every visit; same fence; same windmill.
   ------------------------------------------------------------------ */
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ------------------------------------------------------------------
   keyframes for the sky.
   four moments. interpolated band-by-band with smooth easing.
   the band offsets are fractions of viewport height measured from the bottom.
   ------------------------------------------------------------------ */

// each band: { y: fraction-from-bottom, color: [r,g,b] }
// the array is ordered low-to-high.
const KEYS = [
  // 4:47 p.m. — late afternoon warm, the coral not yet built
  { time: 0.00, bands: [
    { y: 0.00, c: [212, 149,  56] }, // ochre-amber horizon
    { y: 0.08, c: [200, 122,  42] }, // honey
    { y: 0.18, c: [196, 130,  84] }, // warm dust
    { y: 0.30, c: [178, 122, 110] }, // dim coral underbase
    { y: 0.42, c: [148, 110, 124] }, // mauve
    { y: 0.55, c: [122, 100, 138] }, // warm violet
    { y: 0.68, c: [ 96,  88, 130] }, // grayed violet
    { y: 0.80, c: [ 64,  62, 108] }, // dusk indigo
    { y: 0.90, c: [ 42,  42,  78] }, // deeper indigo
    { y: 0.97, c: [ 28,  28,  54] },
    { y: 1.00, c: [ 24,  24,  40] }  // near-black zenith
  ]},
  // 5:00 p.m. — horizon saturation building
  { time: 0.276, bands: [
    { y: 0.00, c: [220, 145,  52] },
    { y: 0.09, c: [210, 118,  46] },
    { y: 0.20, c: [220, 130,  98] },
    { y: 0.32, c: [220, 122, 112] },
    { y: 0.44, c: [176, 108, 118] },
    { y: 0.56, c: [128,  96, 138] },
    { y: 0.68, c: [ 98,  86, 128] },
    { y: 0.80, c: [ 62,  60, 104] },
    { y: 0.90, c: [ 40,  40,  74] },
    { y: 0.97, c: [ 26,  26,  50] },
    { y: 1.00, c: [ 22,  22,  38] }
  ]},
  // 5:14 p.m. — peak coral, the swatch midpoint
  { time: PEAK_T, bands: [
    { y: 0.00, c: [212, 138,  46] },
    { y: 0.10, c: [202, 112,  44] },
    { y: 0.22, c: [232, 130, 106] }, // narrow coral band peak
    { y: 0.34, c: [220, 110, 116] },
    { y: 0.46, c: [184, 106, 120] },
    { y: 0.58, c: [124,  92, 138] },
    { y: 0.70, c: [ 94,  82, 122] },
    { y: 0.81, c: [ 56,  56,  98] },
    { y: 0.90, c: [ 36,  36,  70] },
    { y: 0.97, c: [ 22,  22,  46] },
    { y: 1.00, c: [ 18,  18,  34] }
  ]},
  // 5:34 p.m. — deep twilight
  { time: 1.00, bands: [
    { y: 0.00, c: [134,  78,  44] }, // horizon ember
    { y: 0.10, c: [118,  62,  58] },
    { y: 0.22, c: [120,  72,  86] },
    { y: 0.34, c: [110,  76, 108] },
    { y: 0.46, c: [ 90,  72, 118] },
    { y: 0.58, c: [ 74,  66, 116] },
    { y: 0.70, c: [ 56,  54, 100] },
    { y: 0.81, c: [ 38,  40,  80] },
    { y: 0.90, c: [ 26,  28,  58] },
    { y: 0.97, c: [ 18,  20,  42] },
    { y: 1.00, c: [ 14,  14,  30] }
  ]}
];

/* cubic-bezier-ish ease: smoothstep with a small skew toward dwell-at-peak. */
function easeBand(u) {
  // u in [0,1] across whatever segment we are in
  return u * u * (3 - 2 * u);
}

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(a, b, t) {
  return [
    Math.round(lerp(a[0], b[0], t)),
    Math.round(lerp(a[1], b[1], t)),
    Math.round(lerp(a[2], b[2], t))
  ];
}

// at given cycle-time t in [0,1], return the interpolated bands array.
function bandsAt(t) {
  // find the keyframe segment
  let k0 = KEYS[0], k1 = KEYS[1];
  for (let i = 0; i < KEYS.length - 1; i++) {
    if (t >= KEYS[i].time && t <= KEYS[i + 1].time) {
      k0 = KEYS[i]; k1 = KEYS[i + 1];
      break;
    }
  }
  const span = k1.time - k0.time || 1;
  const u = easeBand((t - k0.time) / span);
  const out = [];
  for (let b = 0; b < k0.bands.length; b++) {
    out.push({
      y: lerp(k0.bands[b].y, k1.bands[b].y, u),
      c: lerpColor(k0.bands[b].c, k1.bands[b].c, u)
    });
  }
  return out;
}

// given normalized altitude (0 = horizon, 1 = zenith) and current bands,
// return an [r,g,b] color sampled from the gradient.
function colorAtAltitude(alt, bands) {
  // bands ordered low-to-high
  for (let i = 0; i < bands.length - 1; i++) {
    if (alt >= bands[i].y && alt <= bands[i + 1].y) {
      const span = bands[i + 1].y - bands[i].y || 1;
      const u = (alt - bands[i].y) / span;
      return lerpColor(bands[i].c, bands[i + 1].c, u);
    }
  }
  if (alt < bands[0].y) return bands[0].c.slice();
  return bands[bands.length - 1].c.slice();
}

/* ------------------------------------------------------------------
   sky-gradient render — paint via a vertical canvas gradient.
   ------------------------------------------------------------------ */
function paintSky(bands) {
  const grad = ctx.createLinearGradient(0, H, 0, 0); // bottom-to-top
  for (let i = 0; i < bands.length; i++) {
    const b = bands[i];
    const stop = Math.max(0, Math.min(1, b.y));
    grad.addColorStop(stop, `rgb(${b.c[0]},${b.c[1]},${b.c[2]})`);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

/* ------------------------------------------------------------------
   dust particles.
   exactly 280. each catches the local color at its altitude and time.
   each drifts slowly on its own velocity. each sways. each gleams.
   one specific particle holds the light longer at t = 0.5745.
   ------------------------------------------------------------------ */

const PARTICLE_COUNT = 280;
let particles = [];
let specialIndex = 0; // the mote that held the light longer

function initParticles() {
  const rng = mulberry32(0x1934C0D1);
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: rng() * 1,                 // normalized 0..1 horizontal
      y: 0.05 + rng() * 0.92,       // altitude 0..1 (0 = bottom)
      r: 0.6 + rng() * 1.6,         // pixel radius
      vx: (rng() * 0.5 - 0.2),      // -0.2..+0.3 px/sec (we randomize sign-bias)
      swayAmp: 1 + rng() * 1.5,     // ±1..±2.5 px
      swayPeriod: 30 + rng() * 30,  // 30..60 s
      swayPhase: rng() * Math.PI * 2,
      gleamPeriod: 12 + rng() * 6,  // 12..18 s
      gleamPhase: rng() * (12 + rng() * 6),
      baseAlpha: 0.30 + rng() * 0.45
    });
  }
  // pick the special mote: one in the coral band (altitude near 0.30-0.34)
  // deterministically chosen, of course.
  let candidates = [];
  for (let i = 0; i < particles.length; i++) {
    if (particles[i].y > 0.30 && particles[i].y < 0.36) candidates.push(i);
  }
  specialIndex = candidates.length ? candidates[Math.floor(candidates.length / 2)] : 0;
}

function paintParticles(bands, t, nowSec, cursor) {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];

    // cursor nudge: amplify horizontal velocity within 180px radius
    let vx = p.vx;
    if (cursor.active) {
      const px = p.x * W;
      const py = (1 - p.y) * H;
      const dx = px - cursor.x;
      const dy = py - cursor.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 180) {
        const k = 1.0 + 0.6 * (1 - d / 180); // 1.0 .. 1.6
        vx *= k;
      }
    }

    // advance horizontal position (vx is px/sec; convert to fraction of W)
    p.x += (vx / W) * dtSec;
    if (p.x > 1) p.x -= 1;
    if (p.x < 0) p.x += 1;

    // sway
    const sway = Math.sin(nowSec / p.swayPeriod * Math.PI * 2 + p.swayPhase) * p.swayAmp;

    // pixel coords (altitude 0 = bottom of viewport)
    const px = p.x * W;
    const py = (1 - p.y) * H + sway;

    // base color from local band
    const col = colorAtAltitude(p.y, bands);

    // lift the particle's color toward warm-pearl based on altitude
    let warmth;
    if (p.y < 0.15)      warmth = [245, 216, 154]; // warm amber
    else if (p.y < 0.30) warmth = [245, 200, 168];
    else if (p.y < 0.40) warmth = [245, 184, 164]; // pink-edged for coral band
    else if (p.y < 0.62) warmth = [200, 184, 196]; // dusty pearl
    else                 warmth = [138, 138, 164]; // cool dim pearl

    // mix particle color: base + warmth tint
    const r = Math.round(col[0] * 0.35 + warmth[0] * 0.65);
    const g = Math.round(col[1] * 0.35 + warmth[1] * 0.65);
    const b = Math.round(col[2] * 0.35 + warmth[2] * 0.65);

    // base alpha by altitude
    let alpha = p.baseAlpha;
    if (p.y > 0.62) alpha *= 0.7;
    if (p.y > 0.85) alpha *= 0.6;

    // gleam — brief brightness boost every 12-18s
    const phase = ((nowSec + p.gleamPhase) % p.gleamPeriod) / p.gleamPeriod;
    let gleamAlpha = 0;
    let gleamColor = null;
    let gleamRadiusBoost = 0;
    if (phase < 0.06) {
      // standard 0.7s gleam at ~0.6 alpha
      const g0 = 1 - Math.abs(phase - 0.03) / 0.03;
      gleamAlpha = Math.max(0, g0) * 0.6;
      gleamColor = [255, 244, 200];
      gleamRadiusBoost = 1.5;
    }

    // the wildcard: one specific mote, once per cycle, at t ≈ 0.5745
    if (i === specialIndex) {
      // a 2.4-second window centered on peak-t
      const peakCenterMs = PEAK_T * CYCLE_MS;
      const cycleMs = (nowSec * 1000) % CYCLE_MS;
      const distMs = Math.abs(cycleMs - peakCenterMs);
      if (distMs < 1200) {
        const w = 1 - distMs / 1200;
        gleamAlpha = Math.max(gleamAlpha, w * 0.85);
        gleamColor = [255, 236, 188];
        gleamRadiusBoost = 2.6 * w + 1.4;
      }
    }

    // draw the particle as a soft radial fill
    const radius = p.r + gleamRadiusBoost;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, radius * 3.2);
    if (gleamAlpha > 0 && gleamColor) {
      grad.addColorStop(0, `rgba(${gleamColor[0]},${gleamColor[1]},${gleamColor[2]},${(alpha + gleamAlpha).toFixed(3)})`);
      grad.addColorStop(0.35, `rgba(${r},${g},${b},${(alpha * 0.6).toFixed(3)})`);
    } else {
      grad.addColorStop(0, `rgba(${r},${g},${b},${alpha.toFixed(3)})`);
    }
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, radius * 3.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ------------------------------------------------------------------
   silhouettes — cottonwoods, fence, windmill, hand-at-windowsill.
   precomputed; the same tree-line every visit.
   ------------------------------------------------------------------ */

let trees = [];
let windmill = null;
let fencePosts = [];

function buildSilhouettes() {
  const rng = mulberry32(0xC077O0D5);
  trees = [];
  fencePosts = [];

  // approximately 14 cottonwoods across the lower 12%
  const N = 14;
  const groundY = H * (1 - 0.04); // ground line near 4% from bottom
  for (let i = 0; i < N; i++) {
    const x = (i + 0.3 + rng() * 0.4) * (W / N);
    const trunkH = H * (0.07 + rng() * 0.05);
    const crownH = H * (0.04 + rng() * 0.04);
    const crownW = trunkH * (0.6 + rng() * 0.4);
    const branches = generateBranches(rng, trunkH + crownH, crownW);
    trees.push({ x, groundY, trunkH, crownH, crownW, branches });
    // a fence post between trees
    if (i < N - 1) {
      fencePosts.push({
        x: x + (W / N) * 0.45 + rng() * 8,
        y: groundY,
        h: H * 0.012
      });
    }
  }

  // windmill at the far right
  const wx = W * 0.88;
  const wy = H * (1 - 0.05);
  windmill = {
    x: wx,
    baseY: wy,
    towerH: H * 0.13,
    towerBase: H * 0.014,
    towerTop: H * 0.005,
    wheelR: H * 0.018
  };
}

function generateBranches(rng, totalH, crownW) {
  // returns a list of line segments [x1,y1,x2,y2] in local coords
  // centered on x=0, with base at y=0 going up (negative y)
  const segs = [];
  // central trunk
  segs.push([0, 0, 0, -totalH]);
  // a few main branches near the top half
  const branchCount = 5 + Math.floor(rng() * 4);
  for (let i = 0; i < branchCount; i++) {
    const y0 = -totalH * (0.35 + rng() * 0.55);
    const angle = (rng() < 0.5 ? -1 : 1) * (0.4 + rng() * 0.9);
    const len = crownW * (0.5 + rng() * 0.9);
    const x1 = 0, y1 = y0;
    const x2 = Math.sin(angle) * len;
    const y2 = y0 - Math.cos(angle) * len * 0.8;
    segs.push([x1, y1, x2, y2]);
    // secondary twigs
    const twigCount = 2 + Math.floor(rng() * 3);
    for (let j = 0; j < twigCount; j++) {
      const tT = 0.5 + rng() * 0.45;
      const tx = lerp(x1, x2, tT);
      const ty = lerp(y1, y2, tT);
      const tang = angle + (rng() - 0.5) * 1.3;
      const tlen = len * (0.2 + rng() * 0.35);
      segs.push([tx, ty, tx + Math.sin(tang) * tlen, ty - Math.cos(tang) * tlen * 0.7]);
    }
  }
  return segs;
}

function paintSilhouettes(bands, t) {
  // halo color: a warm rim along the upper-right of each tree
  // halo tracks the horizon-band color
  const horizon = colorAtAltitude(0.05, bands);
  const peakCoral = colorAtAltitude(0.22, bands);

  // halo color shifts: amber early, coral at peak, dim violet late
  let haloR, haloG, haloB, haloA;
  if (t < PEAK_T) {
    // warm to coral
    const u = t / PEAK_T;
    haloR = lerp(180, peakCoral[0], u);
    haloG = lerp(120, peakCoral[1], u);
    haloB = lerp( 60, peakCoral[2], u);
    haloA = 0.30 + 0.10 * u;
  } else {
    const u = (t - PEAK_T) / (1 - PEAK_T);
    haloR = lerp(peakCoral[0], 80,  u);
    haloG = lerp(peakCoral[1], 70,  u);
    haloB = lerp(peakCoral[2], 110, u);
    haloA = 0.40 - 0.25 * u;
  }

  // halo pass (drawn under the silhouettes)
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const tree of trees) {
    ctx.save();
    ctx.translate(tree.x + 1.5, tree.groundY - 1.5); // halo offset to upper-right
    ctx.strokeStyle = `rgba(${haloR|0},${haloG|0},${haloB|0},${haloA.toFixed(3)})`;
    ctx.lineWidth = 2.2;
    for (const s of tree.branches) {
      ctx.beginPath();
      ctx.moveTo(s[0], s[1]);
      ctx.lineTo(s[2], s[3]);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();

  // trees — deep near-black
  ctx.save();
  ctx.strokeStyle = 'rgba(26,20,16,1)';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const tree of trees) {
    ctx.save();
    ctx.translate(tree.x, tree.groundY);
    // trunk + branches with tapered widths (trunk thicker)
    for (let i = 0; i < tree.branches.length; i++) {
      const s = tree.branches[i];
      ctx.lineWidth = i === 0 ? 2.6 : (i < 6 ? 1.4 : 0.9);
      ctx.beginPath();
      ctx.moveTo(s[0], s[1]);
      ctx.lineTo(s[2], s[3]);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();

  // ground line — a faint warm-edge ridge
  ctx.save();
  const groundY = H * (1 - 0.04);
  const ridgeGrad = ctx.createLinearGradient(0, groundY - 4, 0, groundY + 8);
  ridgeGrad.addColorStop(0, `rgba(${haloR|0},${haloG|0},${haloB|0},${(haloA * 0.6).toFixed(3)})`);
  ridgeGrad.addColorStop(1, 'rgba(10,6,8,1)');
  ctx.fillStyle = ridgeGrad;
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.restore();

  // fence posts
  ctx.save();
  ctx.strokeStyle = 'rgba(10,6,8,1)';
  ctx.lineWidth = 1;
  for (const p of fencePosts) {
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x, p.y - p.h);
    ctx.stroke();
  }
  // two strands of wire between successive posts
  ctx.lineWidth = 0.6;
  for (let i = 0; i < fencePosts.length - 1; i++) {
    const a = fencePosts[i], b = fencePosts[i + 1];
    for (const off of [0.35, 0.7]) {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y - a.h * off);
      ctx.lineTo(b.x, b.y - b.h * off);
      ctx.stroke();
    }
  }
  ctx.restore();

  // windmill at far right
  if (windmill) {
    const w = windmill;
    ctx.save();
    ctx.strokeStyle = 'rgba(26,20,16,1)';
    ctx.fillStyle = 'rgba(26,20,16,1)';
    ctx.lineWidth = 1;
    // truss tower
    const topY = w.baseY - w.towerH;
    // outline
    ctx.beginPath();
    ctx.moveTo(w.x - w.towerBase / 2, w.baseY);
    ctx.lineTo(w.x - w.towerTop / 2, topY);
    ctx.lineTo(w.x + w.towerTop / 2, topY);
    ctx.lineTo(w.x + w.towerBase / 2, w.baseY);
    ctx.closePath();
    ctx.stroke();
    // cross bracing — 4 X's
    const steps = 5;
    for (let i = 0; i < steps; i++) {
      const t0 = i / steps, t1 = (i + 1) / steps;
      const ly0 = lerp(w.baseY, topY, t0);
      const ly1 = lerp(w.baseY, topY, t1);
      const lw0 = lerp(w.towerBase, w.towerTop, t0) / 2;
      const lw1 = lerp(w.towerBase, w.towerTop, t1) / 2;
      // horizontal cross-tie
      ctx.beginPath();
      ctx.moveTo(w.x - lw1, ly1);
      ctx.lineTo(w.x + lw1, ly1);
      ctx.stroke();
      // X
      ctx.beginPath();
      ctx.moveTo(w.x - lw0, ly0);
      ctx.lineTo(w.x + lw1, ly1);
      ctx.moveTo(w.x + lw0, ly0);
      ctx.lineTo(w.x - lw1, ly1);
      ctx.stroke();
    }
    // wheel hub
    ctx.beginPath();
    ctx.arc(w.x, topY - w.wheelR * 0.4, w.wheelR * 0.18, 0, Math.PI * 2);
    ctx.fill();
    // wheel rim — multi-blade suggestion (16 short spokes)
    const hubX = w.x, hubY = topY - w.wheelR * 0.4;
    for (let s = 0; s < 16; s++) {
      const a = (s / 16) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(hubX, hubY);
      ctx.lineTo(hubX + Math.cos(a) * w.wheelR, hubY + Math.sin(a) * w.wheelR);
      ctx.stroke();
    }
    // rim circle
    ctx.beginPath();
    ctx.arc(hubX, hubY, w.wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // tail vane
    ctx.beginPath();
    ctx.moveTo(hubX, hubY);
    ctx.lineTo(hubX + w.wheelR * 1.6, hubY + w.wheelR * 0.4);
    ctx.lineTo(hubX + w.wheelR * 1.6, hubY - w.wheelR * 0.1);
    ctx.lineTo(hubX, hubY);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

/* hand-and-brush in the lower-left, very faint, gently trembling. */
function paintHand(nowSec) {
  // a soft warm-shadow brown at 0.18 opacity
  // the suggestion of a hand at the windowsill, holding a brush above a mixing-tray
  // tremble: 4-second sinusoidal, ~0.6 px
  const tremble = Math.sin(nowSec * Math.PI * 2 / 4) * 0.6;

  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = 'rgba(58,36,24,1)';
  ctx.strokeStyle = 'rgba(58,36,24,1)';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // anchor at lower-left corner
  const ox = 0;
  const oy = H;

  // mixing tray — a low oval just at the corner
  ctx.beginPath();
  ctx.ellipse(ox + 48, oy - 12, 56, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // a windowsill suggestion — a thin horizontal slab along the bottom
  ctx.fillRect(0, oy - 4, Math.min(W * 0.42, 220), 4);

  // hand — a soft rounded blob suggesting the back of a hand and fingers
  ctx.beginPath();
  ctx.moveTo(ox + 20, oy - 28);
  ctx.quadraticCurveTo(ox + 38, oy - 56, ox + 78, oy - 50);
  ctx.quadraticCurveTo(ox + 110, oy - 44, ox + 124, oy - 36);
  ctx.quadraticCurveTo(ox + 132, oy - 22, ox + 110, oy - 18);
  ctx.quadraticCurveTo(ox + 70, oy - 14, ox + 30, oy - 18);
  ctx.quadraticCurveTo(ox + 14, oy - 22, ox + 20, oy - 28);
  ctx.fill();

  // brush ferrule — a thin tapered shape rising up and to the right from the fingers
  ctx.save();
  ctx.translate(ox + 118 + tremble * 0.3, oy - 40 + tremble);
  ctx.rotate(-Math.PI * 0.18);
  // handle
  ctx.fillRect(0, -1.6, 38, 3.2);
  // ferrule
  ctx.fillRect(38, -2.4, 8, 4.8);
  // bristles (tapered to a point)
  ctx.beginPath();
  ctx.moveTo(46, -2.2);
  ctx.lineTo(64, -0.3);
  ctx.lineTo(64,  0.3);
  ctx.lineTo(46,  2.2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

/* ------------------------------------------------------------------
   main loop
   ------------------------------------------------------------------ */

const startMs = performance.now();
let lastFrameMs = startMs;
let dtSec = 1 / 60;

const cursor = { x: -9999, y: -9999, active: false };
window.addEventListener('mousemove', (e) => {
  cursor.x = e.clientX; cursor.y = e.clientY; cursor.active = true;
});
window.addEventListener('mouseleave', () => { cursor.active = false; });
window.addEventListener('touchmove', (e) => {
  if (e.touches.length) {
    cursor.x = e.touches[0].clientX;
    cursor.y = e.touches[0].clientY;
    cursor.active = true;
  }
}, { passive: true });
window.addEventListener('touchend', () => { cursor.active = false; });

function frame(nowMs) {
  dtSec = Math.min(0.1, (nowMs - lastFrameMs) / 1000);
  lastFrameMs = nowMs;

  const elapsed = (nowMs - startMs);
  const t = (elapsed % CYCLE_MS) / CYCLE_MS;
  const nowSec = elapsed / 1000;

  const bands = bandsAt(t);

  paintSky(bands);
  paintSilhouettes(bands, t);
  paintParticles(bands, t, nowSec, cursor);
  paintHand(nowSec);

  requestAnimationFrame(frame);
}

// console — a small private notation, for someone who looks.
//
// "one mote at 5:14 held the light longer than the others —
//  perhaps a fragment of Beaver Creek loess raised especially high
//  by Tuesday's wind — I have mixed the swatch to match its color
//  as best I can, the coral is a difficult one because it is warmer
//  than the cadmium and cooler than the alizarin and I have used
//  both with a touch of yellow ochre to thin it."
//                                                  — C.V., Nov. 27, 1934
console.log("%cone mote at 5:14 held the light longer than the others.",
  "color:#e8826a;font:italic 12px Georgia,serif");

resize();
initParticles();
requestAnimationFrame(frame);
</script>
