  <meta name="outbox-spec-era" content="1979 — peak Soviet-Bloc East German children's stamp-album hobby culture, the very specific moment when twelve-year-olds in apartment-block kitchens across Karl-Marx-Stadt and Halle and Rostock sat at the kitchen table on Saturday afternoons with their Schaubek-brand junior stamp album opened to the page for the German Democratic Republic 1976-1979 commemorative-issue series, a small glassine envelope of newly-traded stamps spread across the oilcloth, a pair of philatelic tweezers their uncle gave them for their tenth birthday, a small bottle of Hawid mounting strips, and a magnifying loupe on a brass chain that hung around the neck on a length of green grosgrain ribbon; the entire infrastructure of state-sponsored youth philately running through the Junge Briefmarkenfreunde (Young Stamp Friends) clubs that met every other Wednesday afternoon at the Pionierhaus on Karl-Liebknecht-Straße, with club leader Frau Helga Brettschneider (age 47, a postal-administration clerk who took the club leadership in 1971 as a volunteer assignment from the FDJ) checking each child's album-page additions and stamping the back inside cover with a small purple ink stamp recording the date and the number of new acquisitions; the specific Saturday of October 6, 1979 — the thirtieth anniversary of the founding of the GDR, a major postal-issue date — when Pioneer Sabine Kretschmer (age 11, fourth-form student at the 24. POS 'Ernst Thälmann' in Karl-Marx-Stadt, daughter of a Wismut uranium-mining engineer father and a textile-factory dispatch supervisor mother, member of the Junge Briefmarkenfreunde Gruppe 14) sat at the kitchen table at 14:23 hours arranging the morning's new acquisitions onto the freshly-printed Schaubek supplement page for the 30. Jahrestag der DDR commemorative miniature sheet, with the afternoon light coming through the Plattenbau kitchen window and the radio playing Radio DDR I quietly on the windowsill">
  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece rendered in pure CSS and SVG: the entire browser window IS the inside surface of one specific philatelic magnifying loupe held very close to the eye, with the circular field of view filling the viewport edge-to-edge as a soft cushioned vignette, and inside that circular field a continuous slow generative cascade of imaginary East German commemorative postage stamps drifting upward from the bottom edge of the loupe-field to the top edge at approximately 14 pixels per second — each stamp a procedurally-generated 24mm × 30mm rectangle (rendered in flat two-color or three-color offset-lithography aesthetic with hand-drawn-feeling perforations along the edges achieved via SVG mask), each stamp depicting a fictional-but-plausible GDR-issue subject (a Plattenbau apartment block at sunset, a Wismut mining headframe, a young Pioneer reading at a wooden desk, a Trabant 601 against a wheat field, a Sprottenbusch postal-bus stop, a Karl-Marx-Stadt tram interchange, an Elbe-flotilla riverboat, a Halle chemical-works cooling tower, the imaginary 'Tag der Briefmarkenfreunde' commemorative showing a tweezers-and-loupe still life, the imaginary '500. Postjubiläum' showing a clerk at a counter, a forest stamp showing the Thüringer Wald in autumn, a winter-sports stamp showing a luge run at Oberhof) with each stamp's two-color flat-ink plate registration very slightly imperfect (1.2 to 2.8 pixel mis-registration between color layers), each stamp's denomination (10pf, 20pf, 35pf, 50pf, 85pf, 1.00M) hand-set in the small white-rectangle corner cartouche, each stamp's subject caption (in German, in tiny upright sans-serif) running along the lower edge of the design, each stamp's 'DEUTSCHE DEMOKRATISCHE REPUBLIK' nation-line running along the upper edge, each stamp's issue-year ('1977', '1978', '1979') in the lower-right corner; the stamps drift upward continuously with very gentle horizontal sway (each stamp follows its own slightly different sinusoidal x-drift on a 14-22 second period), occasionally overlapping one another at the edges before continuing past; new stamps spawn at the bottom edge of the loupe-field on a randomized cadence (one new stamp every 2.4 to 4.8 seconds), and stamps that drift past the top edge of the field disappear; the cursor's position acts ONLY as the loupe's focal axis: moving the cursor across the viewport causes a soft circular sharp-focus zone (approximately 240 pixels in diameter) to follow the cursor, within which the underlying stamps render at full sharp detail with crisp perforation edges and crisp plate-color registration, while stamps outside the sharp-focus zone render slightly soft (CSS blur filter at 1.4px) and slightly desaturated, simulating the actual optical behavior of a hand-held magnifying loupe with its narrow depth of field; the piece has no UI, no text overlay, no buttons, no captions, no titles, no controls, no instructions, no introduction, no end state; the loupe never lowers, the stamps never stop drifting upward, and the soft cushioned vignette never lifts">
  <meta name="outbox-spec-subject" content="Pioneer Sabine Kretschmer's Saturday-afternoon kitchen-table view through the brass-chain magnifying loupe her uncle Werner gave her for her tenth birthday in March 1978 — the loupe a 7× achromatic doublet manufactured at VEB Carl Zeiss Jena in 1968, used and slightly worn at the rim, on a 40cm length of green grosgrain ribbon that she has tied around her neck so the loupe rests at sternum-height when not in use and can be raised to the eye with the left hand while the right hand holds the philatelic tweezers steady; the very specific stack of newly-traded commemorative stamps Sabine has spread across the oilcloth this afternoon (a small pile she brought home from this morning's 9 a.m. meeting of Junge Briefmarkenfreunde Gruppe 14 at the Pionierhaus, where she traded a doubles-pile of three 1977 Trabant 25-Jahre commemoratives plus two 1978 Sorbische Trachten regional-folk-costume issues for a small mixed lot of 14 stamps from Pionierin Annett Müller's older-brother's accumulation, including the 30. Jahrestag der DDR miniature sheet Sabine has been wanting since the issue announcement in July) and the specific quiet hobby work she is doing this afternoon of examining each new acquisition under the loupe before mounting it in her Schaubek album: checking the perforations for the correct gauge (the GDR commemoratives are typically perforated 13 or 13½, and Sabine has learned to count the perfs in a 2cm span to verify), checking the back-side gum for the correct GDR-issue smooth white synthetic gum (as opposed to the slightly yellower 1960s gum the older issues carry), checking the front design for centering (the 1979 issue is known to vary considerably in centering, with the more centered examples worth slightly more in the catalog), and silently practicing the philatelic vocabulary her uncle Werner taught her last summer when he visited from Schwerin (Zähnung, Wasserzeichen, Gummi, Plattenfehler, Druckfehler, Ersttag, Stempel, Rand, Bogen) — the entire small Saturday-afternoon private ritual of an 11-year-old girl in a fifth-floor Plattenbau kitchen examining small printed paper rectangles through magnifying glass with patient skilled attention; the loupe-field as the visitor's actual point-of-view into Sabine's hands and the slow continuous upward drift of stamps across the field as Sabine sorts through the morning's acquisitions one by one, each stamp held up to her eye for examination before being set aside in the 'mounting' pile or the 'doubles for next trade' pile or the small 'too damaged, keep for paper' pile she keeps in a glassine envelope at the back of her album binder">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible on the page at any point. The piece speaks only through the silent slow upward drift of small printed paper rectangles across a circular cushioned field of view, the gentle sharpening of detail where the cursor focuses the loupe's optical sweet spot, and the patient continuous flow of one specific 11-year-old's careful Saturday-afternoon hobby attention. The closest analogue to a voice is the silent steady focus of Sabine herself at her kitchen table — present-tense, unhurried, neither performing nor explaining, the visual equivalent of sitting across from an 11-year-old who is genuinely absorbed in her stamps and who does not need an audience because the stamps themselves are the entire point, the loupe is the entire point, and the patient counting of perforations is the entire point">

  <meta name="outbox-spec-wildcard" content="Exactly once every 19 minutes (deterministic, tied to elapsed time since page load), one specific stamp spawns that does not match any of the 18 fictional subject templates: a small two-color flat-ink design depicting a 47-year-old woman in a postal-administration clerk's blouse sitting at a Pionierhaus folding table stamping a small purple ink stamp into the back inside cover of a child's stamp album, with the caption along the lower edge reading 'JUNGE BRIEFMARKENFREUNDE — 1979', denomination 35pf, year 1979 — this is Frau Helga Brettschneider, club leader of Gruppe 14, on the only postage stamp the Deutsche Post never actually issued, the one Sabine drew in her album margin in green colored pencil during the Wednesday club meeting on October 3, 1979, three days before this Saturday afternoon, because she had decided privately that Frau Brettschneider deserved a commemorative issue and she could not figure out how to tell her so. The stamp drifts upward through the field exactly like any other stamp, with the same mis-registration and the same perforation gauge, and the visitor is given no indication that this stamp is different — it simply appears in the procession, drifts past, and continues out the top of the loupe field. After the visitor has seen this stamp appear at least three times across distinct page-load sessions (tracked in localStorage), every subsequent appearance of the Brettschneider stamp arrives with the small soft warm-amber pencil-checkmark sigil already present in its upper-right corner from the moment it spawns, with no announcement and no UI text — it simply becomes the small private fact that this is the one stamp Sabine had already decided about before she ever picked up the loupe.">
  <meta name="outbox-spec-forbidden" content="Absolutely NO Cold-War-thriller framing of East Germany, the GDR, the Wismut mining industry, the Junge Pioniere youth organization, the FDJ, the Pionierhaus, or Frau Brettschneider as sinister/oppressive/surveilled/Stasi-haunted — Sabine is a normal 11-year-old having a normal Saturday afternoon with her stamps, her parents are normal working people doing normal jobs, Frau Brettschneider is a kind volunteer club leader who genuinely cares about teaching kids to count perforations, and the apartment is warm and the kitchen radio is playing music. NO Goodbye-Lenin Ostalgie kitsch-pastiche, NO 'Lives of Others' surveillance-state atmosphere, NO Berlin-Wall melodrama, NO Stasi-files retrospective gloom, NO 'imagine being a child under communism' framing, NO Western-liberation-narrative condescension. NO horror-genre framing of the loupe, the drifting stamps, the empty kitchen, or the Brettschneider stamp as creepy/uncanny/sinister/ghostly — this is a kitchen at 2:23pm on a sunny Saturday, the loupe is a real Carl Zeiss Jena optical instrument, the stamps are small printed paper rectangles, and the Brettschneider stamp is a sweet small gesture from one child to one adult, not a haunting. NO 'the stamps are surveilling the viewer' twist, NO 'something is hidden in the design' conspiracy. NO museum-archival 'remember when GDR existed' nostalgic detachment, NO soft melancholy about 'the lost world before reunification,' NO cool ironic distance from East German youth philately as quaint pre-1989 Ostalgie, NO retrospective elegy framing Sabine or the Pionierhaus or Karl-Marx-Stadt as already-vanished (Karl-Marx-Stadt will be renamed Chemnitz in 1990 but this Saturday afternoon is October 1979 and the city is Karl-Marx-Stadt and Sabine does not know what is coming and the page is not retroactively informed by it). NO 'where is she now' wistfulness, NO 'this album was found decades later' framing, NO scrapbook-archival voice. NO condescension toward Soviet-bloc commercial printing as inferior, toward GDR youth-club infrastructure as indoctrination, toward Plattenbau apartment-block architecture as drab, toward East German childhood as deprived. NO smug Western superiority about consumer goods or material standards. NO faux-period Communist-propaganda voice or German-accent pastiche. NO Wes-Anderson-symmetrical-frame styling. NO night-shift dispatcher voice, NO lowercase sentence-fragments, NO hyperminimal museum-card prose, NO SCP-cryptic register about the Brettschneider stamp or the focus mechanic, NO archival cabinet/drawer/vault framing of the album as relic, NO observatory/society/club scaffolding (the Junge Briefmarkenfreunde is a real specific GDR youth-philately organization, not a fictional small-town society), NO radio/CB/ham-radio/broadcast/dispatcher/transmission framing of the postal-issue distribution network as signal-relay (the Deutsche Post der DDR is just the postal service, not a signal metaphor). NO day-of-the-week subject framing (Saturday is a contextual fact about when Sabine does her hobby work, not the subject of the piece). NO instructional UI text visible anywhere on the page. NO captions, NO tooltips, NO loading messages, NO 'EXAMINE SABINE'S STAMPS' header banner, NO footer credits. The page IS the view through the loupe held to Sabine's right eye at 14:23 on Saturday October 6, 1979, the visitor IS her eye (or is Sabine herself absorbed in the careful work, or is one of the other Gruppe 14 Pioneers who has come over after lunch to compare albums), and the only thing happening on the page is the patient continuous drift of small printed paper rectangles across a circular cushioned field of view. Treat the loupe as a serious working optical instrument from a serious working East German optical-precision industry, treat Sabine as a legitimate working 11-year-old hobbyist with three years of patient philatelic craft expertise, treat the Junge Briefmarkenfreunde as a real legitimate youth-hobby infrastructure that genuinely taught millions of GDR children skills of patient attention and careful observation, treat the imaginary GDR commemorative stamps as serious working pieces of state-issue printed graphic design with real plate-registration craft, treat Frau Brettschneider as a real volunteer who took her unpaid Wednesday-afternoon work seriously and was worth Sabine's small private commemorative gesture, and treat the visitor's act of moving the cursor across the loupe field to focus on one stamp at a time as real participation in a real Saturday-afternoon act of patient skilled hobby attention worthy of full peer-to-peer respect.">

<script>
(() => {
  const svg = document.getElementById('stamps');

  const sunlight = document.getElementById('sunlight');

  const STAMP_W = 110;
  const STAMP_H = 138;

  } catch(e) {}

  // ---------- Subject templates ----------
  // Each renders inside a 100x100 inner area; called with (g, palette, seed).
  // palette: { primary, secondary, tertiary, cream }
  const rand = (seed) => {
    let s = seed | 0;
    return () => {
      s = (s * 1664525 + 1013904223) | 0;
      return ((s >>> 0) % 1000) / 1000;
    };
  };

  // Helper: rect, path, etc — all flat fill, no stroke or simple stroke.
  function plattenbau(g, p, r) {
    // sunset-block silhouette
    g.innerHTML += `
      <rect x="6" y="68" width="88" height="6" fill="${p.tertiary}"/>
      <rect x="14" y="36" width="72" height="34" fill="${p.secondary}"/>
      <rect x="14" y="30" width="72" height="6" fill="${p.primary}"/>`;
    // windows grid
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 8; col++) {
        const lit = (row * 13 + col * 7) % 5 < 2;
        g.innerHTML += `<rect x="${17 + col*8.7}" y="${38 + row*7.5}" width="5" height="4" fill="${lit ? p.cream : p.tertiary}"/>`;
      }
    }
    g.innerHTML += `<rect x="6" y="74" width="88" height="2" fill="${p.tertiary}" opacity="0.6"/>`;
  }

  function wismut(g, p) {
    // mining headframe
    g.innerHTML += `
      <rect x="20" y="68" width="60" height="4" fill="${p.tertiary}"/>
      <polygon points="40,30 60,30 70,68 30,68" fill="${p.secondary}"/>
      <polygon points="48,30 52,30 56,20 44,20" fill="${p.primary}"/>
      <circle cx="50" cy="42" r="6" fill="${p.cream}" stroke="${p.primary}" stroke-width="1.2"/>
      <line x1="38" y1="35" x2="62" y2="35" stroke="${p.primary}" stroke-width="0.8"/>
      <line x1="35" y1="55" x2="65" y2="55" stroke="${p.primary}" stroke-width="0.8"/>

        <rect x="0" y="0" width="${w}" height="${h}" fill="white"/>`;
    for (let i = 0; i <= perfsX; i++) {
      const x = (w / perfsX) * i;
      defs += `<circle cx="${x}" cy="0" r="${perfR}" fill="black"/>`;
      defs += `<circle cx="${x}" cy="${h}" r="${perfR}" fill="black"/>`;
    }
    for (let i = 0; i <= perfsY; i++) {
      const y = (h / perfsY) * i;
      defs += `<circle cx="0" cy="${y}" r="${perfR}" fill="black"/>`;
      defs += `<circle cx="${w}" cy="${y}" r="${perfR}" fill="black"/>`;
    }
    defs += `</mask></defs>`;

    // paper base
    let body = `<g mask="url(#${stampNS}-mask)">`;
    body += `<rect x="0" y="0" width="${w}" height="${h}" fill="${palette.cream}"/>`;

    // tertiary plate (slight misregistration) — duplicate the design in a soft tertiary halo
    body += `<g transform="translate(${offX}, ${offY})" opacity="0.42">`;
    body += `<g transform="translate(5, 15) scale(1.0, 1.05)"><g class="tplate">`;
    // We'll render a 100x108 inner area
    body += renderInner(template, { ...palette, primary: palette.tertiary, secondary: palette.tertiary }, isBrettschneider);
    body += `</g></g></g>`;

    // main plate
    body += `<g transform="translate(5, 15) scale(1.0, 1.05)">`;
    body += renderInner(template, palette, isBrettschneider);
    body += `</g>`;

    // upper nation line
    body += `<text x="${w/2}" y="9" font-family="Arial, sans-serif" font-size="5" font-weight="bold" letter-spacing="0.4" text-anchor="middle" fill="${palette.primary}">DEUTSCHE DEMOKRATISCHE REPUBLIK</text>`;

    // lower caption
    body += `<text x="${w/2}" y="${h - 12}" font-family="Arial, sans-serif" font-size="4.4" letter-spacing="0.2" text-anchor="middle" fill="${palette.primary}">${caption}</text>`;

    // year
    body += `<text x="${w - 6}" y="${h - 5}" font-family="Arial, sans-serif" font-size="4.4" text-anchor="end" fill="${palette.primary}">${year}</text>`;

    // denomination corner cartouche
    body += `<rect x="5" y="${h - 16}" width="22" height="11" fill="${palette.cream}" stroke="${palette.primary}" stroke-width="0.5"/>`;
    body += `<text x="16" y="${h - 8}" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="${palette.primary}">${denom}</text>`;

    body += `</g>`;

    g.innerHTML = defs + body;
    g.setAttribute('class', 'stamp');
    svg.appendChild(g);

    const stamp = {
      el: g,
      id,
      x: 100 + Math.random() * (FIELD_VIEW - 200) - STAMP_W / 2,
      y: FIELD_VIEW + 20,
      vy: 14 / 60, // 14 px/s in viewBox units ~ matched 1:1 below — see update
      baseX: 0,
      swayAmp: 12 + Math.random() * 10,
      swayPeriod: 14 + Math.random() * 8,
      swayOffset: Math.random() * Math.PI * 2,
      birthT: performance.now() / 1000,
      isBrettschneider,
      checked: preChecked,
      examineStart: 0,
      examineAccum: 0,
      template
    };
    stamp.baseX = stamp.x;

    if (preChecked) {
      addCheckmark(stamp);
    }

    stamps.push(stamp);
    return stamp;
  }

  function renderInner(template, palette, isBrettschneider) {
    // Build a temporary group via a dummy holder
    const holder = { innerHTML: '' };
    if (isBrettschneider) {
      brettschneider(holder, palette);
    } else {
      template.fn(holder, palette);
    }
    return holder.innerHTML;
  }

  function addCheckmark(stamp) {
    const mark = document.createElementNS(SVGNS, 'path');
    mark.setAttribute('d', 'M 0 6 Q 3 10 5 7 Q 8 0 14 -4');
    mark.setAttribute('stroke', '#7a4a20');
    mark.setAttribute('stroke-width', '1.6');
    mark.setAttribute('stroke-linecap', 'round');
    mark.setAttribute('fill', 'none');
    mark.setAttribute('opacity', '0');
    mark.setAttribute('transform', `translate(${STAMP_W - 22} ${10})`);
    mark.style.transition = 'opacity 1.2s ease-out';
    stamp.el.appendChild(mark);
    requestAnimationFrame(() => {
      mark.setAttribute('opacity', '0.7');
    });
    stamp.checkmark = mark;
  }

  // ---------- Cursor / focus zone ----------
  let cursorPx = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  let focusPx = { x: cursorPx.x, y: cursorPx.y };
  let cursorActive = false;

  window.addEventListener('mousemove', (e) => {
    cursorPx.x = e.clientX;
    cursorPx.y = e.clientY;
    cursorActive = true;
  });
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) {
      cursorPx.x = e.touches[0].clientX;
      cursorPx.y = e.touches[0].clientY;
      cursorActive = true;
    }
  }, { passive: true });
  window.addEventListener('mouseleave', () => { cursorActive = false; });

  // ---------- Dust motes ----------
  const motes = [];
  for (let i = 0; i < 18; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    motesEl.appendChild(m);
    motes.push({
      el: m,
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5
    });
  }

  // ---------- Spawn cadence ----------
  let nextSpawn = performance.now() / 1000 + 0.8;
  const pageStart = performance.now() / 1000;
  let nextBrettschneider = pageStart + 19 * 60; // first at 19 min mark

  // Initial seed: a handful of stamps already on the field
  for (let i = 0; i < 8; i++) {
    const t = templates[Math.floor(Math.random() * templates.length)];
    const s = makeStamp(t);
    s.y = FIELD_VIEW * (0.2 + Math.random() * 0.8);
    s.birthT -= s.y / 14;
  }

  // ---------- Main loop ----------
  let lastT = performance.now() / 1000;
  let lightCycleStart = pageStart;
  let glintCycleStart = pageStart;

  function getFieldRect() {
    return field.getBoundingClientRect();
  }

  function clientToViewBox(cx, cy, fr) {
    const vx = ((cx - fr.left) / fr.width) * FIELD_VIEW;
    const vy = ((cy - fr.top) / fr.height) * FIELD_VIEW;
    return { x: vx, y: vy };
  }

  function tick(now) {
    const tSec = now / 1000;
    const dt = Math.min(0.1, tSec - lastT);
    lastT = tSec;
    const elapsed = tSec - pageStart;

    const fr = getFieldRect();
    const fieldCenterPx = { x: fr.left + fr.width / 2, y: fr.top + fr.height / 2 };
    const fieldRadiusPx = fr.width / 2;

    // Smooth cursor lerp
    focusPx.x += (cursorPx.x - focusPx.x) * 0.18;
    focusPx.y += (cursorPx.y - focusPx.y) * 0.18;
    focusring.style.left = focusPx.x + 'px';
    focusring.style.top = focusPx.y + 'px';

    // Focus in viewBox coords
    const focusV = clientToViewBox(focusPx.x, focusPx.y, fr);
    const focusRV = (FOCUS_RADIUS / fr.width) * FIELD_VIEW;

    // Spawn new stamps
    if (tSec >= nextSpawn) {
      const t = templates[Math.floor(Math.random() * templates.length)];
      makeStamp(t);
      nextSpawn = tSec + 2.4 + Math.random() * 2.4;
    }

    // Brettschneider stamp at 19-min intervals
    if (tSec >= nextBrettschneider) {
      const pre = brettschneiderSightings >= 3;
      makeStamp(templates[0], true, pre); // first arg ignored — uses brettschneider renderer
      brettschneiderSightings += 1;
      try { localStorage.setItem('obc_bs_sightings', String(brettschneiderSightings)); } catch(e) {}
      nextBrettschneider = tSec + 19 * 60;
    }

    // Update stamps
    for (let i = stamps.length - 1; i >= 0; i--) {
      const s = stamps[i];
      s.y -= 14 * dt; // 14 viewBox units / sec (≈ 14 px/s on most viewports)
      const swayT = (tSec - s.birthT) / s.swayPeriod * Math.PI * 2 + s.swayOffset;
      s.x = s.baseX + Math.sin(swayT) * s.swayAmp;

      s.el.setAttribute('transform', `translate(${s.x}, ${s.y})`);

      // Check if in focus zone (use stamp center)
      const cxV = s.x + STAMP_W / 2;
      const cyV = s.y + STAMP_H / 2;
      const dx = cxV - focusV.x;
      const dy = cyV - focusV.y;
      const distV = Math.sqrt(dx*dx + dy*dy);

      if (distV < focusRV) {
        s.el.classList.add('sharp');
      } else {
        s.el.classList.remove('sharp');
      }

      // Examination accumulation: stamp's center within ~24 vb units of cursor center
      if (distV < 24) {
        if (!s.examineStart) s.examineStart = tSec;
        s.examineAccum += dt;
        if (s.examineAccum >= 1.8 && !s.checked) {
          s.checked = true;
          addCheckmark(s);
        }
      } else {
        s.examineStart = 0;
      }

      // Remove if drifted past top
      if (s.y + STAMP_H < -20) {
        s.el.remove();
        stamps.splice(i, 1);
      }
    }

    // Update motes (in client px)
    for (const m of motes) {
      m.x += m.vx;
      m.y += m.vy;
      // gentle wrap
      if (m.x < 0) m.x = window.innerWidth;
      if (m.x > window.innerWidth) m.x = 0;
      if (m.y < 0) m.y = window.innerHeight;
      if (m.y > window.innerHeight) m.y = 0;
      const dx = m.x - focusPx.x;
      const dy = m.y - focusPx.y;
      const lit = Math.sqrt(dx*dx + dy*dy) < FOCUS_RADIUS;
      if (lit) m.el.classList.add('lit'); else m.el.classList.remove('lit');
      m.el.style.transform = `translate(${m.x}px, ${m.y}px)`;
    }

    // Slow sunlight drift — 9 min cycle for angle, 2% intensity modulation
    const lightPhase = ((tSec - lightCycleStart) % (9 * 60)) / (9 * 60);
    const lightAngleX = 72 - lightPhase * 24; // 72% -> 48%
    const lightIntensity = 0.18 + Math.sin(lightPhase * Math.PI * 2) * 0.02;
    sunlight.style.background = `radial-gradient(ellipse 70% 60% at ${lightAngleX}% 18%, rgba(245,216,154,${lightIntensity.toFixed(3)}) 0%, rgba(245,216,154,0) 60%)`;

    // Slow glint drift — 4 min cycle, ~8px
    const glintPhase = ((tSec - glintCycleStart) % (4 * 60)) / (4 * 60);
    const glintOffsetX = Math.sin(glintPhase * Math.PI * 2) * 8;
    const glintOffsetY = Math.cos(glintPhase * Math.PI * 2) * 4;
    glint.style.transform = `translate(${glintOffsetX}px, ${glintOffsetY}px)`;

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  // Resize handling
  window.addEventListener('resize', () => {
    // nothing structural to do — viewBox handles it
  });
})();
</script>

<script src="/nav.js" defer></script>
