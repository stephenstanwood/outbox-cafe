  <meta name="outbox-spec-format" content="A single full-viewport silent generative piece. The entire browser window IS a top-down view of a 14-inch-diameter circular walnut-rimmed harmonograph sand-table scaled enormously to fill the viewport edge-to-edge. The sand bed inside the rim begins smooth and pale-cream at cycle-start. A small brass stylus suspended above the sand from a two-pendulum gimbal (the pendulums hang below the table, out of view) begins tracing — a single continuous dark groove appearing in the sand as the stylus moves. The stylus's motion is governed by two coupled damped sinusoidal pendulums driving X and Y position via summed damped sinusoids (frequency ratio selected per cycle from a curated bag of simple-rational ratios like 2:3, 3:4, 4:5, 5:7 plus near-rational ratios for precessing patterns; damping coefficients around 0.03-0.05 per second; phases and amplitudes randomized per cycle). Over approximately 4 minutes the line emerges into the sand, looping and precessing through Lissajous-with-decay geometry — broad early loops giving way to tighter precessing curves giving way to a fine inner-radius spiral as the pendulums damp. At full decay the stylus comes to rest at the geometric center. A 4-second held pause. Then the table vibrates gently (subtle horizontal shimmer animation across 0.8 seconds with a soft sand-shifting whisper via Web Audio API) and the dark groove fades back into the smooth cream sand across 6 seconds as if the sand has settled flat. Then the pendulums get a fresh release with different initial amplitudes, different phases, and a different frequency ratio, and the cycle begins again, producing a fresh pattern. The piece runs forever, each cycle different. No two cycles produce exactly the same drawing. No UI, no chrome, no narration, no header, no captions, no buttons — just the table, the sand, the stylus, the emerging line.">

<!--
  two pendulums hang under the table, out of view.
  the stylus does what the math says it will do.
-->

<script>
(() => {
  const tableCanvas = document.getElementById('table');
  const motesCanvas = document.getElementById('motes');
  const tctx = tableCanvas.getContext('2d');
  const mctx = motesCanvas.getContext('2d');

  let W, H, R, CX, CY, DPR;

  // sand state — separate offscreen buffer so we can fade independently
  let sandCanvas, sctx;
  let grooveCanvas, gctx;

  // cycle state
  let cycleIndex = 0;
  let cycleStartTime = 0;
  let phase = 'drawing'; // drawing | pause | vibrate | smoothing
  let phaseStart = 0;
  let lastT = 0;
  let params = null;
  let mouse = { x: -9999, y: -9999, active: false };

  // dust motes
  let motes = [];
  const MOTE_COUNT = 28;

  // audio
  let audioCtx = null;
  let scrapeNode = null;
  let scrapeGain = null;
  let scrapeFilter = null;
  let lastVelocity = 0;
  let smoothNode = null;
  let smoothGain = null;

  function setup() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;

    tableCanvas.width = W * DPR;
    tableCanvas.height = H * DPR;
    tableCanvas.style.width = W + 'px';
    tableCanvas.style.height = H + 'px';
    tctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    motesCanvas.width = W * DPR;
    motesCanvas.height = H * DPR;
    motesCanvas.style.width = W + 'px';
    motesCanvas.style.height = H + 'px';
    mctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    // table fills as much as fits, with a small breathing margin
    R = Math.min(W, H) * 0.48;
    CX = W / 2;
    CY = H / 2;

    // sand layer
    sandCanvas = document.createElement('canvas');
    sandCanvas.width = W * DPR;
    sandCanvas.height = H * DPR;
    sctx = sandCanvas.getContext('2d');
    sctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    paintSand(sctx, 1);

    grooveCanvas = document.createElement('canvas');
    grooveCanvas.width = W * DPR;
    grooveCanvas.height = H * DPR;
    gctx = grooveCanvas.getContext('2d');
    gctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    gctx.clearRect(0, 0, W, H);

    // motes
    motes = [];
    for (let i = 0; i < MOTE_COUNT; i++) {
      motes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() * 0.3 + 0.1),
        r: Math.random() * 1.2 + 0.4,
        a: Math.random() * 0.25 + 0.10
      });
    }
  }

  // deterministic per-cycle PRNG
  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const RATIO_BAG = [
    [2, 3], [3, 4], [4, 5], [5, 7], [7, 9],
    [3, 5], [4, 7], [5, 8], [2, 5], [3, 7]
  ];

  function rollCycle(index) {
    const seed = ((index + 1) * 2654435761) >>> 0;
    const rnd = mulberry32(seed);

    const ratio = RATIO_BAG[Math.floor(rnd() * RATIO_BAG.length)];
    const base = 0.4 + rnd() * 0.6;          // 0.4 - 1.0 Hz
    const detune = (rnd() - 0.5) * 0.02;     // small offset → slow precession
    const f1 = base * ratio[0] / ratio[1];
    const f2 = base * (1 + detune);

    // two-axis harmonograph: X and Y each get two damped sinusoids
    const Rscale = R * 0.92;
    const A1x = Rscale * (0.35 + rnd() * 0.45);
    const A2x = Rscale * (0.20 + rnd() * 0.35);
    const A1y = Rscale * (0.35 + rnd() * 0.45);
    const A2y = Rscale * (0.20 + rnd() * 0.35);

    const p1x = rnd() * Math.PI * 2;
    const p2x = rnd() * Math.PI * 2;
    const p1y = rnd() * Math.PI * 2;
    const p2y = rnd() * Math.PI * 2;

    const fx1 = base;
    const fx2 = base * ratio[1] / ratio[0] + (rnd() - 0.5) * 0.015;
    const fy1 = f1;
    const fy2 = f2;

    const d1 = 0.020 + rnd() * 0.040;        // damping
    const d2 = 0.020 + rnd() * 0.040;
    const d3 = 0.020 + rnd() * 0.040;
    const d4 = 0.020 + rnd() * 0.040;

    return {
      ratio,
      fx1, fx2, fy1, fy2,
      A1x, A2x, A1y, A2y,
      p1x, p2x, p1y, p2y,
      d1, d2, d3, d4,
      energyInit: A1x + A2x + A1y + A2y
    };
  }

  function stylusAt(t, p) {
    const x = p.A1x * Math.sin(2 * Math.PI * p.fx1 * t + p.p1x) * Math.exp(-p.d1 * t)
            + p.A2x * Math.sin(2 * Math.PI * p.fx2 * t + p.p2x) * Math.exp(-p.d2 * t);
    const y = p.A1y * Math.sin(2 * Math.PI * p.fy1 * t + p.p1y) * Math.exp(-p.d3 * t)
            + p.A2y * Math.sin(2 * Math.PI * p.fy2 * t + p.p2y) * Math.exp(-p.d4 * t);
    return { x: CX + x, y: CY + y };
  }

  function currentEnergy(t, p) {
    return (p.A1x * Math.exp(-p.d1 * t) + p.A2x * Math.exp(-p.d2 * t)
          + p.A1y * Math.exp(-p.d3 * t) + p.A2y * Math.exp(-p.d4 * t));
  }

  // sand bed — pale cream with fine grain
  function paintSand(ctx, opacity) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.clip();

    // base wash
    const grad = ctx.createRadialGradient(CX - R*0.2, CY - R*0.25, R*0.1, CX, CY, R*1.05);
    grad.addColorStop(0, 'rgba(240, 220, 170, 1)');
    grad.addColorStop(0.6, 'rgba(232, 216, 168, 1)');
    grad.addColorStop(1, 'rgba(208, 188, 142, 1)');
    ctx.fillStyle = grad;
    ctx.globalAlpha = opacity;
    ctx.fillRect(CX - R, CY - R, R * 2, R * 2);

    // fine grain stipple
    const grainCount = Math.floor(R * R * 0.018);
    for (let i = 0; i < grainCount; i++) {
      const a = Math.random() * Math.PI * 2;
      const rr = Math.sqrt(Math.random()) * R;
      const x = CX + Math.cos(a) * rr;
      const y = CY + Math.sin(a) * rr;
      const v = Math.random();
      if (v < 0.5) {
        ctx.fillStyle = 'rgba(216, 192, 152, ' + (0.18 + Math.random() * 0.20) + ')';
      } else if (v < 0.85) {
        ctx.fillStyle = 'rgba(196, 172, 130, ' + (0.10 + Math.random() * 0.15) + ')';
      } else {
        ctx.fillStyle = 'rgba(252, 236, 198, ' + (0.10 + Math.random() * 0.18) + ')';
      }
      ctx.fillRect(x, y, 1, 1);
    }

    // soft uneven highlight (overhead lamp on sand)
    const lamp = ctx.createRadialGradient(CX - R*0.35, CY - R*0.4, R*0.05, CX - R*0.35, CY - R*0.4, R*1.2);
    lamp.addColorStop(0, 'rgba(255, 248, 220, 0.16)');
    lamp.addColorStop(0.5, 'rgba(255, 240, 200, 0.05)');
    lamp.addColorStop(1, 'rgba(255, 240, 200, 0)');
    ctx.fillStyle = lamp;
    ctx.fillRect(CX - R, CY - R, R * 2, R * 2);

    ctx.restore();
  }

  // walnut rim
  function paintRim(ctx) {
    const rimW = Math.max(18, R * 0.06);
    ctx.save();

    // outer dim surround already painted by body bg; draw rim
    ctx.beginPath();
    ctx.arc(CX, CY, R + rimW, 0, Math.PI * 2);
    ctx.arc(CX, CY, R, 0, Math.PI * 2, true);
    const rg = ctx.createRadialGradient(CX, CY, R, CX, CY, R + rimW);
    rg.addColorStop(0, '#6a4422');
    rg.addColorStop(0.4, '#5a3818');
    rg.addColorStop(0.75, '#4a2c12');
    rg.addColorStop(1, '#2a180a');
    ctx.fillStyle = rg;
    ctx.fill('evenodd');

    // wood grain striations
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R + rimW, 0, Math.PI * 2);
    ctx.arc(CX, CY, R, 0, Math.PI * 2, true);
    ctx.clip('evenodd');
    ctx.strokeStyle = 'rgba(58, 32, 16, 0.4)';
    ctx.lineWidth = 0.6;
    const grainCount = 140;
    for (let i = 0; i < grainCount; i++) {
      const a = (i / grainCount) * Math.PI * 2 + Math.random() * 0.02;
      const wobble = (Math.random() - 0.5) * 0.04;
      ctx.beginPath();
      ctx.moveTo(CX + Math.cos(a) * R, CY + Math.sin(a) * R);
      ctx.lineTo(CX + Math.cos(a + wobble) * (R + rimW), CY + Math.sin(a + wobble) * (R + rimW));
      ctx.stroke();
    }
    ctx.restore();

    // beveled inner highlight along upper rim
    ctx.beginPath();
    ctx.arc(CX, CY, R + 1.5, Math.PI * 1.15, Math.PI * 1.85);
    ctx.strokeStyle = 'rgba(138, 90, 48, 0.45)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // inner shadow rim
    ctx.beginPath();
    ctx.arc(CX, CY, R - 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.restore();
  }

  // draw groove segment between two points
  let lastStylusPos = null;
  let pathStartedThisCycle = false;

  function drawGrooveSegment(x1, y1, x2, y2, velocity) {
    // perturbation from cursor air
    let dx = x2 - mouse.x;
    let dy = y2 - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let nx = x2, ny = y2;
    if (mouse.active && dist < 60) {
      const strength = (1 - dist / 60) * 1.4;
      const ang = Math.atan2(dy, dx);
      nx = x2 + Math.cos(ang) * strength;
      ny = y2 + Math.sin(ang) * strength;
    }

    // pressure depth modulation by velocity (slow stylus = deeper)
    const speed = Math.min(1, velocity / 250);
    const depth = 1 - speed * 0.4;

    // warm halo (displaced sand)
    gctx.save();
    gctx.beginPath();
    gctx.arc(CX, CY, R - 1, 0, Math.PI * 2);
    gctx.clip();

    gctx.strokeStyle = 'rgba(90, 60, 32, ' + (0.18 * depth) + ')';
    gctx.lineWidth = 2.6;
    gctx.lineCap = 'round';
    gctx.beginPath();
    gctx.moveTo(x1, y1);
    gctx.lineTo(nx, ny);
    gctx.stroke();

    // groove core
    gctx.strokeStyle = 'rgba(58, 40, 24, ' + (0.78 * depth) + ')';
    gctx.lineWidth = 1.1;
    gctx.beginPath();
    gctx.moveTo(x1, y1);
    gctx.lineTo(nx, ny);
    gctx.stroke();

    // micro shadow inside groove (slight per-segment darkness variation)
    if (Math.random() < 0.4) {
      gctx.strokeStyle = 'rgba(28, 18, 10, ' + (0.25 * depth) + ')';
      gctx.lineWidth = 0.5;
      gctx.beginPath();
      gctx.moveTo(x1, y1);
      gctx.lineTo(nx, ny);
      gctx.stroke();
    }
    gctx.restore();
    return { nx, ny };
  }

  function drawStylus(x, y) {
    tctx.save();
    // tiny brass dot with specular
    tctx.beginPath();
    tctx.arc(x, y, 3.4, 0, Math.PI * 2);
    const sg = tctx.createRadialGradient(x - 1, y - 1.2, 0.5, x, y, 3.4);
    sg.addColorStop(0, 'rgba(240, 216, 120, 0.95)');
    sg.addColorStop(0.4, 'rgba(200, 149, 56, 1)');
    sg.addColorStop(1, 'rgba(110, 78, 28, 1)');
    tctx.fillStyle = sg;
    tctx.fill();

    // micro highlight
    tctx.beginPath();
    tctx.arc(x - 1, y - 1.3, 0.9, 0, Math.PI * 2);
    tctx.fillStyle = 'rgba(255, 248, 200, 0.9)';
    tctx.fill();

    // soft cast shadow
    tctx.beginPath();
    tctx.ellipse(x + 1.5, y + 2.5, 4, 1.4, 0, 0, Math.PI * 2);
    tctx.fillStyle = 'rgba(40, 24, 10, 0.25)';
    tctx.fill();
    tctx.restore();
  }

  function ensureAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // pink noise buffer
      const bufferSize = 2 * audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + white * 0.0555179;
        b1 = 0.99332 * b1 + white * 0.0750759;
        b2 = 0.96900 * b2 + white * 0.1538520;
        b3 = 0.86650 * b3 + white * 0.3104856;
        b4 = 0.55000 * b4 + white * 0.5329522;
        b5 = -0.7616 * b5 - white * 0.0168980;
        data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.08;
        b6 = white * 0.115926;
      }

      // scrape — looping pink noise through bandpass, env-modulated by velocity
      scrapeNode = audioCtx.createBufferSource();
      scrapeNode.buffer = buffer;
      scrapeNode.loop = true;
      scrapeFilter = audioCtx.createBiquadFilter();
      scrapeFilter.type = 'bandpass';
      scrapeFilter.frequency.value = 1800;
      scrapeFilter.Q.value = 0.9;
      scrapeGain = audioCtx.createGain();
      scrapeGain.gain.value = 0;
      scrapeNode.connect(scrapeFilter).connect(scrapeGain).connect(audioCtx.destination);
      scrapeNode.start();

      // smoothing whisper — separate
      smoothNode = audioCtx.createBufferSource();
      smoothNode.buffer = buffer;
      smoothNode.loop = true;
      const sf = audioCtx.createBiquadFilter();
      sf.type = 'lowpass';
      sf.frequency.value = 900;
      sf.Q.value = 0.5;
      smoothGain = audioCtx.createGain();
      smoothGain.gain.value = 0;
      smoothNode.connect(sf).connect(smoothGain).connect(audioCtx.destination);
      smoothNode.start();
    } catch (e) {
      audioCtx = null;
    }
  }

  function setScrapeAmplitude(v) {
    if (!audioCtx || !scrapeGain) return;
    const target = Math.min(0.06, 0.005 + v / 4000);
    scrapeGain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.05);
    // filter frequency tracks velocity slightly
    const f = 900 + Math.min(2400, v * 6);
    scrapeFilter.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.08);
  }

  function pulseSmoothing(durationSec) {
    if (!audioCtx || !smoothGain) return;
    const now = audioCtx.currentTime;
    smoothGain.gain.cancelScheduledValues(now);
    smoothGain.gain.setValueAtTime(0, now);
    smoothGain.gain.linearRampToValueAtTime(0.045, now + 0.15);
    smoothGain.gain.linearRampToValueAtTime(0.025, now + durationSec * 0.5);
    smoothGain.gain.linearRampToValueAtTime(0.0, now + durationSec);
  }

  function startCycle() {
    cycleStartTime = performance.now() / 1000;
    params = rollCycle(cycleIndex);
    lastStylusPos = null;
    pathStartedThisCycle = false;
    phase = 'drawing';
    phaseStart = cycleStartTime;
    gctx.clearRect(0, 0, W, H);
    grooveAlpha = 1;
  }

  let grooveAlpha = 1;
  let vibrateOffset = 0;

  function tick(now) {
    const tSec = now / 1000;
    const dt = Math.min(0.05, tSec - lastT);
    lastT = tSec;

    // ----- update phase -----
    if (phase === 'drawing') {
      const cycleT = tSec - cycleStartTime;
      const energy = currentEnergy(cycleT, params);
      const energyFrac = energy / params.energyInit;

      // sub-stepping for smooth high-curvature trace
      const steps = 6;
      const subDt = dt / steps;
      let velAccum = 0;
      for (let s = 0; s < steps; s++) {
        const t = cycleT - dt + subDt * (s + 1);
        const pos = stylusAt(t, params);
        if (lastStylusPos) {
          const ddx = pos.x - lastStylusPos.x;
          const ddy = pos.y - lastStylusPos.y;
          const segDist = Math.sqrt(ddx*ddx + ddy*ddy);
          const v = segDist / subDt;
          velAccum = v;
          const drawn = drawGrooveSegment(lastStylusPos.x, lastStylusPos.y, pos.x, pos.y, v);
          lastStylusPos = { x: drawn.nx, y: drawn.ny };
        } else {
          lastStylusPos = pos;
        }
      }
      lastVelocity = velAccum;
      setScrapeAmplitude(lastVelocity);

      // end cycle when energy decays sufficiently OR safety cap of 4.5 minutes
      if (energyFrac < 0.005 || cycleT > 270) {
        phase = 'pause';
        phaseStart = tSec;
        setScrapeAmplitude(0);
      }
    } else if (phase === 'pause') {
      setScrapeAmplitude(0);
      if (tSec - phaseStart > 4) {
        phase = 'vibrate';
        phaseStart = tSec;
        pulseSmoothing(0.8 + 6);
      }
    } else if (phase === 'vibrate') {
      const e = tSec - phaseStart;
      vibrateOffset = Math.sin(e * 80) * Math.max(0, 1 - e / 0.8) * 1.6;
      if (e > 0.8) {
        phase = 'smoothing';
        phaseStart = tSec;
        vibrateOffset = 0;
      }
    } else if (phase === 'smoothing') {
      const e = tSec - phaseStart;
      grooveAlpha = Math.max(0, 1 - e / 6);
      if (e > 6) {
        cycleIndex++;
        startCycle();
      }
    }

    render();
    requestAnimationFrame(tick);
  }

  function render() {
    // dim surround
    tctx.fillStyle = '#0a0806';
    tctx.fillRect(0, 0, W, H);

    // composite sand bed
    tctx.save();
    if (vibrateOffset) {
      tctx.translate(vibrateOffset, 0);
    }
    tctx.drawImage(sandCanvas, 0, 0, W, H);

    // groove layer with fading alpha
    tctx.globalAlpha = grooveAlpha;
    tctx.drawImage(grooveCanvas, 0, 0, W, H);
    tctx.globalAlpha = 1;
    tctx.restore();

    // rim sits above everything (groove cannot cross into rim because of clip)
    paintRim(tctx);

    // stylus on top — only while drawing or paused
    if ((phase === 'drawing' || phase === 'pause') && lastStylusPos) {
      drawStylus(lastStylusPos.x + vibrateOffset, lastStylusPos.y);
    }

    // motes
    mctx.clearRect(0, 0, W, H);
    for (const m of motes) {
      m.x += m.vx;
      m.y += m.vy;
      if (m.y > H + 4) { m.y = -4; m.x = Math.random() * W; }
      if (m.x < -4) m.x = W + 4;
      if (m.x > W + 4) m.x = -4;
      mctx.beginPath();
      mctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      mctx.fillStyle = 'rgba(245, 216, 148, ' + m.a + ')';
      mctx.fill();
    }
  }

  // events
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  window.addEventListener('mouseleave', () => { mouse.active = false; });
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.active = true;
    }
  }, { passive: true });
  window.addEventListener('touchend', () => { mouse.active = false; });

  // resize: re-init, but keep cycleIndex so the sequence continues
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      setup();
      startCycle();
    }, 200);
  });

  // first interaction enables audio
  function unlock() {
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  window.addEventListener('pointerdown', unlock, { once: true });
  window.addEventListener('keydown', unlock, { once: true });

  // boot
  setup();
  startCycle();
  lastT = performance.now() / 1000;
  requestAnimationFrame(tick);
})();
</script>
