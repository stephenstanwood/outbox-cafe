  <meta name="outbox-spec-subject" content="A single fictional 1953 oil-company road map of the central Appalachian foothills (a stretch of imagined country covering parts of southern Ohio, eastern Kentucky, and western West Virginia, with hand-lettered towns named Pawpaw Junction, Sweetwater, Coulter's Crossing, Mt. Holly Gap, and Iron Lick) experiencing one full unobserved meteorological day from pre-dawn calm through late-morning fronts, midafternoon convective storms, an evening clearing, and overnight ground fog settling into the river valleys — the quiet truth that weather happens across maps whether anyone is reading them or not, that cartography is a stage where atmospheric pressure systems perform their continuous work over printed paper, that this folded map sitting on a kitchen table in 1953 IS at this very moment being rained on inside its own depicted geography">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible to the visitor at any point. The piece speaks only through cartographic and meteorological visual language. The closest analogue to a voice is the silent steady patience of the map itself: a printed surface holding still while weather passes over it, indifferent to being watched, present-tense and continuous, the visual equivalent of overhearing rain on someone else's roof in another county">

  <meta name="outbox-spec-wildcard" content="Exactly one tiny detail somewhere on the map — a single town's name, a specific highway shield number, or a small italicized river label — corresponds to a real obscure midcentury cartographic Easter egg: a 'paper town' style fictional placeholder that mapmakers historically inserted to catch copyright infringement, and during the overnight fog phase of the animation cycle, the ground fog deliberately never quite covers this one specific feature — it remains visible above the silver fog as a quiet acknowledgment to the anonymous cartographers at General Drafting Co. who inserted such phantoms into their maps as small private signatures. The visitor is given no indication this is happening and no reward for noticing">
  <meta name="outbox-spec-forbidden" content="Absolutely NO text, captions, labels-explaining-the-piece, title overlays, instructional UI, tooltip hints, loading messages, footer credits, or any narrating voice anywhere on the page visible to the visitor — the piece must be entirely silent and entirely visual. NO museum-archival 'remember when gas stations gave away free maps' nostalgic framing, NO soft melancholy about 'the lost art of folded paper cartography,' NO cool ironic distance from midcentury commercial printing as quaint Americana, NO retrospective elegy for analog navigation. NO weather-app interface conventions (no temperature readouts, no radar legends, no time stamps, no compass UI, no precipitation percentages). NO voice, NO narrator, NO tone of any kind made textual. The map exists, the weather passes over it, and the visitor watches in silence — that is the entire piece">

<!--
  Sectional Map No. 14-J, Sweetwater Quadrangle.
  Prepared from compilation surveys of the central foothills.
  Compass declination, 1953: 3° 14' W.
  One of these towns was never there.
-->
<div class="stage">
<svg class="map" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft feathered edge for the cold front wash -->
    <filter id="feather" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="stipple" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.49  0 0 0 0 0.47  0 0 0 0 0.59  0 0 0 1.2 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="paperbleed">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Hachure pattern for ridges -->
    <pattern id="hachure" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#6b4a2a" stroke-width="0.6" opacity="0.55"/>
    </pattern>
    <pattern id="hachure2" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(-25)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#6b4a2a" stroke-width="0.5" opacity="0.45"/>
    </pattern>
    <pattern id="hachure3" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(70)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#6b4a2a" stroke-width="0.55" opacity="0.5"/>
    </pattern>

    <!-- State-forest stipple -->
    <pattern id="forest" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.9" fill="#2d5a2e" opacity="0.4"/>
      <circle cx="7" cy="6" r="0.7" fill="#2d5a2e" opacity="0.35"/>
      <circle cx="4" cy="8" r="0.6" fill="#2d5a2e" opacity="0.3"/>
    </pattern>

    <!-- Storm cell stipple -->
    <radialGradient id="storm1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7d7896" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#7d7896" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7d7896" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a850" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#e8a850" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e8a850" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunset" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#e8a850" stop-opacity="0.42"/>
      <stop offset="35%" stop-color="#d97a3a" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#b53a2a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b53a2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4cdd0" stop-opacity="0"/>
      <stop offset="40%" stop-color="#c4cdd0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c4cdd0" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- ===== STATIC MAP LAYER ===== -->
  <g id="static-map">
    <!-- County boundaries (dashed) -->
    <g stroke="#6b4a2a" stroke-width="1.1" fill="none" stroke-dasharray="2 4 8 4" opacity="0.55">
      <path d="M 0,340 C 220,310 380,360 540,330 C 720,300 880,380 1100,355 C 1300,335 1480,365 1600,355"/>
      <path d="M 0,680 C 200,690 360,640 560,665 C 740,685 920,650 1120,680 C 1320,705 1500,680 1600,690"/>
      <path d="M 720,0 C 700,150 760,260 740,400 C 720,540 780,640 760,800 C 740,920 800,980 790,1000"/>
    </g>

    <!-- State forest (green stipple area) -->
    <path d="M 80,80 C 240,60 360,140 420,200 C 460,260 380,320 320,340 C 220,360 130,300 70,260 C 30,200 40,120 80,80 Z"
          fill="url(#forest)" opacity="0.9"/>
    <text x="190" y="200" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#2d5a2e" opacity="0.75" letter-spacing="2">PINE RUN STATE FOREST</text>

    <path d="M 1180,540 C 1300,520 1420,580 1480,640 C 1520,700 1460,760 1380,780 C 1280,790 1200,740 1170,680 C 1140,620 1140,560 1180,540 Z"
          fill="url(#forest)" opacity="0.85"/>
    <text x="1230" y="660" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#2d5a2e" opacity="0.7" letter-spacing="2">HEMLOCK HOLLOW</text>
    <text x="1230" y="675" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#2d5a2e" opacity="0.65" letter-spacing="2">STATE FOREST</text>

    <!-- Ridge hachure regions -->
    <path d="M 260,440 C 360,420 480,460 580,440 C 680,420 760,460 820,490 L 800,540 C 720,520 640,540 540,520 C 440,500 340,520 260,500 Z"
          fill="url(#hachure)" opacity="0.85"/>
    <text x="500" y="495" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6b4a2a" opacity="0.75" letter-spacing="3">SWEETWATER RIDGE</text>

    <path d="M 880,180 C 980,160 1100,200 1200,180 C 1300,170 1380,200 1440,230 L 1420,280 C 1340,260 1240,280 1140,260 C 1040,240 960,260 880,240 Z"
          fill="url(#hachure2)" opacity="0.8"/>
    <text x="1080" y="240" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6b4a2a" opacity="0.75" letter-spacing="3">IRON LICK MOUNTAINS</text>

    <path d="M 540,780 C 640,760 760,800 860,780 C 960,770 1040,800 1100,830 L 1080,880 C 1000,860 900,880 800,860 C 700,840 620,860 540,840 Z"
          fill="url(#hachure3)" opacity="0.78"/>
    <text x="760" y="840" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6b4a2a" opacity="0.75" letter-spacing="3">MT. HOLLY GAP</text>

    <!-- Rivers (forest green) -->
    <g stroke="#2d5a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Sweetwater River -->
      <path d="M -20,250 C 120,260 240,310 360,330 C 480,350 600,400 720,440 C 840,480 940,520 1060,570 C 1180,620 1300,660 1420,690 C 1500,710 1580,720 1620,725"
            stroke-width="2.4" opacity="0.85"/>
      <!-- tributary -->
      <path d="M 320,140 C 340,200 350,260 380,330" stroke-width="1.4" opacity="0.7"/>
      <path d="M 600,200 C 620,260 640,340 700,420" stroke-width="1.2" opacity="0.65"/>
      <path d="M 880,500 C 900,540 920,560 940,580" stroke-width="1.1" opacity="0.6"/>

      <!-- Coulter Fork -->
      <path d="M 1620,150 C 1500,170 1380,220 1280,290 C 1180,360 1080,420 980,500 C 880,580 780,640 700,720 C 620,790 540,860 460,920 C 380,970 280,990 -20,995"
            stroke-width="2.2" opacity="0.85"/>
      <path d="M 1380,290 C 1400,340 1420,380 1440,430" stroke-width="1.3" opacity="0.7"/>
      <path d="M 980,500 C 960,540 940,580 920,620" stroke-width="1.2" opacity="0.65"/>
      <path d="M 700,720 C 740,760 780,790 820,820" stroke-width="1.1" opacity="0.6"/>
    </g>

    <text x="420" y="320" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#2d5a2e" opacity="0.85" letter-spacing="2" transform="rotate(8 420 320)">Sweetwater River</text>
    <text x="1120" y="412" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#2d5a2e" opacity="0.85" letter-spacing="2" transform="rotate(-18 1120 412)">Coulter Fork</text>

    <!-- Highways (brick red) -->
    <g stroke="#b53a2a" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- US 50 -->
      <path d="M -20,520 C 200,510 400,540 600,520 C 800,500 1000,540 1200,520 C 1400,500 1560,530 1620,525" stroke-width="3.2" opacity="0.92"/>
      <!-- US 23 -->
      <path d="M 380,-20 C 400,140 420,260 440,400 C 460,540 500,680 540,820 C 580,940 600,990 610,1020" stroke-width="3" opacity="0.92"/>
      <!-- State 7 -->
      <path d="M -20,160 C 160,200 320,260 480,300 C 640,340 800,360 960,380 C 1120,400 1280,420 1440,460 C 1540,480 1600,500 1620,510" stroke-width="2.2" opacity="0.88"/>
      <!-- State 119 -->
      <path d="M 1180,-20 C 1160,120 1140,260 1100,420 C 1060,580 1020,720 960,860 C 920,960 880,1000 870,1020" stroke-width="2.2" opacity="0.88"/>
      <!-- State 52 -->
      <path d="M -20,820 C 160,800 320,830 480,810 C 640,790 800,810 960,840 C 1120,870 1280,860 1440,880 C 1540,890 1600,895 1620,898" stroke-width="2" opacity="0.85" stroke-dasharray="0"/>
    </g>

    <!-- Highway shields -->
    <g font-family="Georgia, serif" font-weight="bold" font-size="11" text-anchor="middle">
      <!-- US 50 shield -->
      <g transform="translate(220,520)">
        <path d="M -16,-10 C -16,-14 -14,-16 -10,-16 L 10,-16 C 14,-16 16,-14 16,-10 L 16,4 C 16,10 8,16 0,18 C -8,16 -16,10 -16,4 Z" fill="#f1e4c4" stroke="#6b4a2a" stroke-width="1.2"/>
        <text y="5" fill="#6b4a2a">50</text>
      </g>
      <g transform="translate(1300,518)">
        <path d="M -16,-10 C -16,-14 -14,-16 -10,-16 L 10,-16 C 14,-16 16,-14 16,-10 L 16,4 C 16,10 8,16 0,18 C -8,16 -16,10 -16,4 Z" fill="#f1e4c4" stroke="#6b4a2a" stroke-width="1.2"/>
        <text y="5" fill="#6b4a2a">50</text>
      </g>
      <!-- US 23 shield -->
      <g transform="translate(470,470)">
        <path d="M -16,-10 C -16,-14 -14,-16 -10,-16 L 10,-16 C 14,-16 16,-14 16,-10 L 16,4 C 16,10 8,16 0,18 C -8,16 -16,10 -16,4 Z" fill="#f1e4c4" stroke="#6b4a2a" stroke-width="1.2"/>
        <text y="5" fill="#6b4a2a">23</text>
      </g>
      <!-- State 7 (circle) -->
      <g transform="translate(820,365)">
        <circle r="13" fill="#f1e4c4" stroke="#6b4a2a" stroke-width="1.2"/>
        <text y="4" fill="#6b4a2a">7</text>
      </g>
      <!-- State 119 (circle) -->
      <g transform="translate(1145,300)">
        <circle r="13" fill="#f1e4c4" stroke="#6b4a2a" stroke-width="1.2"/>
        <text y="4" fill="#6b4a2a">119</text>
      </g>
      <!-- State 52 (circle) -->
      <g transform="translate(680,815)">
        <circle r="13" fill="#f1e4c4" stroke="#6b4a2a" stroke-width="1.2"/>
        <text y="4" fill="#6b4a2a">52</text>
      </g>
    </g>

    <!-- Towns: filled circles + serif labels -->
    <g font-family="Georgia, 'Times New Roman', serif" fill="#6b4a2a">
      <!-- Pawpaw Junction -->
      <circle cx="210" cy="525" r="4.5" fill="#6b4a2a"/>
      <circle cx="210" cy="525" r="2" fill="#f1e4c4"/>
      <text x="222" y="520" font-size="14" font-weight="600">Pawpaw Junction</text>

      <!-- Sweetwater -->
      <circle cx="610" cy="520" r="5" fill="#6b4a2a"/>
      <circle cx="610" cy="520" r="2.2" fill="#f1e4c4"/>
      <text x="622" y="515" font-size="15" font-weight="600">Sweetwater</text>

      <!-- Coulter's Crossing -->
      <circle cx="980" cy="500" r="4.5" fill="#6b4a2a"/>
      <circle cx="980" cy="500" r="2" fill="#f1e4c4"/>
      <text x="992" y="495" font-size="14" font-weight="600">Coulter's Crossing</text>

      <!-- Mt. Holly Gap -->
      <circle cx="760" cy="815" r="4.5" fill="#6b4a2a"/>
      <circle cx="760" cy="815" r="2" fill="#f1e4c4"/>
      <text x="772" y="810" font-size="14" font-weight="600">Mt. Holly Gap</text>

      <!-- Iron Lick -->
      <circle cx="1245" cy="305" r="4.5" fill="#6b4a2a"/>
      <circle cx="1245" cy="305" r="2" fill="#f1e4c4"/>
      <text x="1257" y="300" font-size="14" font-weight="600">Iron Lick</text>

      <!-- Small subordinate hamlets, plain dots -->
      <circle cx="430" cy="395" r="2.6" fill="#6b4a2a"/>
      <text x="438" y="392" font-size="10">Beech Mill</text>

      <circle cx="850" cy="690" r="2.6" fill="#6b4a2a"/>
      <text x="858" y="687" font-size="10">Hadley</text>

      <circle cx="1430" cy="455" r="2.6" fill="#6b4a2a"/>
      <text x="1438" y="452" font-size="10">Tyner Fork</text>

      <circle cx="320" cy="775" r="2.6" fill="#6b4a2a"/>
      <text x="328" y="772" font-size="10">Burnside</text>

      <!-- THE PAPER TOWN -->
      <!-- 'Agloe' homage: a wholly fictional hamlet inserted as a copyright trap -->
      <circle cx="1095" cy="635" r="2.6" fill="#6b4a2a" id="papertown-dot"/>
      <text x="1103" y="632" font-size="10" id="papertown-label" font-style="italic">Algoe</text>
    </g>

    <!-- Compass rose, lower-right -->
    <g transform="translate(1490,890)" font-family="Georgia, serif">
      <circle r="46" fill="none" stroke="#6b4a2a" stroke-width="0.8" opacity="0.6"/>
      <circle r="32" fill="none" stroke="#6b4a2a" stroke-width="0.5" opacity="0.5"/>
      <g fill="#6b4a2a" opacity="0.85">
        <polygon points="0,-44 5,0 0,-6 -5,0"/>
        <polygon points="0,44 5,0 0,6 -5,0" opacity="0.5"/>
        <polygon points="-44,0 0,-5 -6,0 0,5" opacity="0.5"/>
        <polygon points="44,0 0,-5 6,0 0,5" opacity="0.5"/>
      </g>
      <text y="-50" font-size="11" text-anchor="middle" fill="#6b4a2a" font-weight="bold">N</text>
      <text y="58" font-size="9" text-anchor="middle" fill="#6b4a2a">S</text>
      <text x="-54" y="3" font-size="9" text-anchor="middle" fill="#6b4a2a">W</text>
      <text x="54" y="3" font-size="9" text-anchor="middle" fill="#6b4a2a">E</text>
    </g>

    <!-- tiny map title block, lower-left, very fine print (cartographic, not narrating the piece) -->
    <g transform="translate(40,950)" font-family="Georgia, serif" fill="#6b4a2a" opacity="0.55">
      <text font-size="10" font-style="italic">Sweetwater Quadrangle — Sectional 14-J</text>
      <text y="12" font-size="8">Scale 1:250,000 · Compiled 1953</text>
    </g>
  </g>

  <!-- ===== WEATHER LAYER (animated) ===== -->
  <g id="weather">
    <!-- High-pressure amber ridge -->
    <g id="ridge" opacity="0">
      <ellipse cx="0" cy="500" rx="380" ry="280" fill="url(#amber)" filter="url(#softer)"/>
      <g stroke="#e8a850" fill="none" stroke-width="0.8" opacity="0.32">
        <ellipse cx="0" cy="500" rx="320" ry="230"/>
        <ellipse cx="0" cy="500" rx="260" ry="180"/>
        <ellipse cx="0" cy="500" rx="200" ry="130"/>
      </g>
    </g>

    <!-- Cold front wash with triangular frontal symbols -->
    <g id="coldfront" opacity="0">
      <g filter="url(#feather)">
        <path d="M -200,-100 L 200,-100 L 600,1200 L 200,1200 Z" fill="#6a9cc9" opacity="0.45"/>
      </g>
      <!-- frontal line -->
      <line id="frontline" x1="0" y1="-50" x2="400" y2="1100" stroke="#3a5d85" stroke-width="1.6" opacity="0.7"/>
      <!-- triangles along the leading edge -->
      <g id="triangles" fill="#3a5d85" opacity="0.85">
        <polygon points="0,40 -10,30 -10,50"/>
        <polygon points="40,170 30,158 28,180"/>
        <polygon points="80,300 68,288 66,312"/>
        <polygon points="120,430 106,418 104,444"/>
        <polygon points="160,560 144,548 142,574"/>
        <polygon points="200,690 182,678 180,706"/>
        <polygon points="240,820 220,808 218,836"/>
        <polygon points="280,950 258,938 256,968"/>
      </g>
    </g>

    <!-- Storm cells -->
    <g id="storm-a" opacity="0">
      <ellipse cx="0" cy="0" rx="120" ry="90" fill="url(#storm1)"/>
      <ellipse cx="0" cy="0" rx="80" ry="60" fill="#7d7896" opacity="0.18" filter="url(#stipple)"/>
      <g class="rain-a"></g>
    </g>
    <g id="storm-b" opacity="0">
      <ellipse cx="0" cy="0" rx="100" ry="75" fill="url(#storm1)"/>
      <ellipse cx="0" cy="0" rx="65" ry="50" fill="#7d7896" opacity="0.18" filter="url(#stipple)"/>
      <g class="rain-b"></g>
    </g>
    <g id="storm-c" opacity="0">
      <ellipse cx="0" cy="0" rx="110" ry="80" fill="url(#storm1)"/>
      <ellipse cx="0" cy="0" rx="72" ry="55" fill="#7d7896" opacity="0.18" filter="url(#stipple)"/>
      <g class="rain-c"></g>
    </g>

    <!-- Sunset wash across western third -->
    <rect id="sunset-wash" x="-50" y="-50" width="650" height="1100" fill="url(#sunset)" opacity="0"/>

    <!-- Ground fog: gathers in river valleys -->
    <g id="fog-layer" opacity="0">
      <!-- Fog ribbons follow the river paths, broad and soft -->
      <path d="M -20,250 C 120,260 240,310 360,330 C 480,350 600,400 720,440 C 840,480 940,520 1060,570 C 1180,620 1300,660 1420,690 C 1500,710 1580,720 1620,725"
            stroke="#c4cdd0" stroke-width="62" fill="none" opacity="0.55" filter="url(#softer)" stroke-linecap="round"/>
      <path d="M 1620,150 C 1500,170 1380,220 1280,290 C 1180,360 1080,420 980,500 C 880,580 780,640 700,720 C 620,790 540,860 460,920 C 380,970 280,990 -20,995"
            stroke="#c4cdd0" stroke-width="58" fill="none" opacity="0.55" filter="url(#softer)" stroke-linecap="round"/>
      <!-- broad low-elevation bloom -->
      <ellipse cx="800" cy="600" rx="900" ry="220" fill="#c4cdd0" opacity="0.18" filter="url(#softer)"/>
    </g>

    <!-- night blue overlay -->
    <rect id="night" x="0" y="0" width="1600" height="1000" fill="#2a3a52" opacity="0"/>
  </g>

  <!-- Paper-town protection layer: re-drawn ABOVE fog so it stays visible during fog phase -->
  <g id="papertown-overlay" opacity="0">
    <circle cx="1095" cy="635" r="2.6" fill="#6b4a2a"/>
    <text x="1103" y="632" font-size="10" font-style="italic" fill="#6b4a2a" font-family="Georgia, serif">Algoe</text>
  </g>
</svg>
</div>

<footer>
  <a href="/archive">other folios in the drawer</a>
</footer>

<script>
(() => {
  const svgNS = "http://www.w3.org/2000/svg";
  const CYCLE = 90000; // ms per full day

  // --- Generate raindrops inside each storm cell ---
  function fillRain(groupClass, count, radiusX, radiusY) {
    const g = document.querySelector('.' + groupClass);
    for (let i = 0; i < count; i++) {
      const x = (Math.random() * 2 - 1) * radiusX * 0.85;
      const y0 = (Math.random() * 2 - 1) * radiusY * 0.85;
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', x);
      line.setAttribute('y1', y0);
      line.setAttribute('x2', x - 3);
      line.setAttribute('y2', y0 + 9);
      line.setAttribute('stroke', '#3a5d85');
      line.setAttribute('stroke-width', '0.7');
      line.setAttribute('opacity', '0.55');
      line.dataset.baseY = y0;
      line.dataset.phase = Math.random() * Math.PI * 2;
      line.dataset.speed = 0.8 + Math.random() * 1.2;
      g.appendChild(line);
    }
  }
  fillRain('rain-a', 70, 120, 90);
  fillRain('rain-b', 55, 100, 75);
  fillRain('rain-c', 65, 110, 80);

  // --- Element refs ---
  const ridge      = document.getElementById('ridge');
  const coldfront  = document.getElementById('coldfront');
  const stormA     = document.getElementById('storm-a');
  const stormB     = document.getElementById('storm-b');
  const stormC     = document.getElementById('storm-c');
  const sunset     = document.getElementById('sunset-wash');
  const fog        = document.getElementById('fog-layer');
  const night      = document.getElementById('night');
  const papertown  = document.getElementById('papertown-overlay');

  // Per-cycle randomized parameters
  let cycleSeed = null;

  function randomizeCycle() {
    cycleSeed = {
      ridgeY: 350 + Math.random() * 350,
      frontStartT: 0.18 + Math.random() * 0.06,
      frontDuration: 0.38,
      stormA: pickStorm(),
      stormB: pickStorm(),
      stormC: pickStorm(),
      sunsetT: 0.66 + Math.random() * 0.03,
    };
  }
  function pickStorm() {
    // Random position over land, scaled to 1600x1000 viewBox
    return {
      x: 200 + Math.random() * 1200,
      y: 200 + Math.random() * 600,
      startT: 0.30 + Math.random() * 0.32,
      duration: 0.16 + Math.random() * 0.06,
      scale: 0.7 + Math.random() * 0.6,
    };
  }
  randomizeCycle();

  // Smoothstep
  const ss = (a, b, t) => {
    const x = Math.max(0, Math.min(1, (t - a) / (b - a)));
    return x * x * (3 - 2 * x);
  };
  // Hump (0 at edges, 1 in middle)
  const hump = (a, b, t) => {
    if (t < a || t > b) return 0;
    const x = (t - a) / (b - a);
    return Math.sin(x * Math.PI);
  };

  function setOpacity(el, v) { el.setAttribute('opacity', v.toFixed(3)); }

  function placeStorm(el, params, intensity) {
    if (intensity <= 0.001) {
      setOpacity(el, 0);
      return;
    }
    const s = params.scale * (0.6 + 0.5 * intensity);
    el.setAttribute('transform',
      `translate(${params.x},${params.y}) scale(${s})`);
    setOpacity(el, intensity * 0.95);
  }

  let startTime = performance.now();
  let lastCycle = 0;

  function frame(now) {
    const elapsed = now - startTime;
    const cycleIndex = Math.floor(elapsed / CYCLE);
    if (cycleIndex !== lastCycle) {
      lastCycle = cycleIndex;
      randomizeCycle();
    }
    const t = (elapsed % CYCLE) / CYCLE; // 0..1 over one day

    // === RIDGE: drifts westward across the day, peaks midday ===
    // x goes from 1800 to -200 across the day
    const ridgeX = 1800 - 2000 * t;
    const ridgeIntensity =
      ss(0.05, 0.25, t) * (1 - ss(0.6, 0.85, t));
    ridge.setAttribute('transform', `translate(${ridgeX},${cycleSeed.ridgeY - 500})`);
    setOpacity(ridge, ridgeIntensity * 0.9);

    // === COLD FRONT: enters upper-left ~0.18, exits lower-right ~0.56 ===
    const fS = cycleSeed.frontStartT;
    const fE = fS + cycleSeed.frontDuration;
    let frontIntensity = 0;
    if (t > fS - 0.04 && t < fE + 0.04) {
      const ft = (t - fS) / (fE - fS); // -ish 0..1
      const clamped = Math.max(0, Math.min(1, ft));
      // x translation: from -800 to +1400
      const fx = -800 + 2200 * clamped;
      // y translation: gentle diagonal
      const fy = -200 + 400 * clamped;
      coldfront.setAttribute('transform', `translate(${fx},${fy})`);
      // fade in then out at edges
      frontIntensity =
        ss(fS - 0.02, fS + 0.06, t) * (1 - ss(fE - 0.06, fE + 0.02, t));
    }
    setOpacity(coldfront, frontIntensity);

    // === STORM CELLS: bloom independently in afternoon ===
    [[stormA, cycleSeed.stormA], [stormB, cycleSeed.stormB], [stormC, cycleSeed.stormC]]
      .forEach(([el, p]) => {
        const intensity = hump(p.startT, p.startT + p.duration, t);
        placeStorm(el, p, intensity);
      });

    // Animate raindrops within active cells
    animateRain(now, '.rain-a', 90);
    animateRain(now, '.rain-b', 75);
    animateRain(now, '.rain-c', 80);

    // === SUNSET WASH: brief amber-red tint over western third around 0.65–0.72 ===
    const sunsetI = hump(cycleSeed.sunsetT, cycleSeed.sunsetT + 0.08, t);
    setOpacity(sunset, sunsetI * 0.95);

    // === GROUND FOG: accumulates overnight in river valleys ===
    // Fog rises from ~0.78, peaks around 0.92, thins by 0.04 of next cycle
    let fogI = 0;
    if (t > 0.78) {
      fogI = ss(0.78, 0.92, t) * (1 - ss(0.96, 1.0, t));
    } else if (t < 0.06) {
      fogI = (1 - ss(0.0, 0.06, t)) * 0.45;
    }
    setOpacity(fog, fogI * 0.95);

    // === NIGHT TINT: deepens after sunset, lifts before dawn ===
    let nightI = 0;
    if (t > 0.7 && t < 0.98) {
      nightI = ss(0.70, 0.82, t) * (1 - ss(0.92, 0.98, t));
    } else if (t < 0.05) {
      nightI = (1 - ss(0.0, 0.05, t)) * 0.6;
    }
    setOpacity(night, nightI * 0.22);

    // === PAPER TOWN: remains visible above the fog ===
    // It tracks fog opacity so it only "lifts above" when fog is present
    setOpacity(papertown, Math.min(1, fogI * 1.15));

    requestAnimationFrame(frame);
  }

  function animateRain(now, selector, radiusY) {
    const g = document.querySelector(selector);
    if (!g.parentNode || parseFloat(g.parentNode.getAttribute('opacity')) < 0.02) return;
    const lines = g.children;
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const baseY = parseFloat(line.dataset.baseY);
      const speed = parseFloat(line.dataset.speed);
      const phase = parseFloat(line.dataset.phase);
      const cycle = ((now * 0.06 * speed + phase * 30) % (radiusY * 1.8));
      const y = baseY - radiusY + cycle;
      const x1 = parseFloat(line.getAttribute('x1'));
      line.setAttribute('y1', y);
      line.setAttribute('y2', y + 9);
    }
  }

  requestAnimationFrame(frame);

  // A quiet acknowledgment, in the console only, for the curious.
  // (No reward, no fanfare — just present.)
  // The General Drafting Co. cartographers used to insert phantom hamlets
  // into their maps as private signatures. One is on this sheet.
})();
</script>

<script src="/nav.js" defer></script>
