  <meta name="outbox-spec-era" content="1987 — peak American suburban basement workshop ham-radio-wife's-jewelry-bench era, the very specific Tuesday-evening moment when middle-aged women across the upper Midwest who had taken up small home-jewelry-making as a hobby (because their husbands had taken over the basement workshop with their ham radios or model trains or wood-turning lathes and the wives needed a corner of their own) kept a small folding TV-tray pulled up beside the basement freezer with a single Schauer brand bench-top jeweler's pin-vise and a set of needle-files and a tin of Hagstoz solder paste and a small box of findings from the Rio Grande catalog, and the very specific Tuesday evening of November 10, 1987 at the home of Mrs. Annette Rzepczynski of 4814 Sawmill Drive in Brookfield Wisconsin (age 47, registered nurse three nights a week at Waukesha Memorial second-shift med-surg, married 23 years to Walt Rzepczynski who has been a ham radio operator since 1962 callsign WA9KTV and who has occupied the entire basement workshop with his Heathkit gear and his QSL-card wall for the same 23 years, mother of two grown daughters Lisa 22 just married and moved to Madison and Renee 19 sophomore at UW-La Crosse, took up wire-wrap pendant-making in October 1985 from a Bead & Button magazine article her sister-in-law Maureen sent her), Annette at her folding TV-tray between 7:14pm and 9:48pm working on a single specific copper-wire-wrapped lapis lazuli oval pendant intended as a Christmas gift for Renee who said in her last phone call that she had been feeling homesick">

udio pliers-clinking sound. Clicking the pliers picks them up so the cursor becomes the pliers-tip for the next click; clicking again sets them down. Clicking the notebook diagram zooms it within the circle for 4 seconds. The whole circular boundary feathers softly at its edge into the matte-black surround as a real loupe's field-stop does. Outside the circle: pure flat black, nothing else, no UI, no chrome, no title, no controls. The entire web page is this 4-inch-diameter view through a jeweler's loupe at one specific Tuesday-evening corner of a TV-tray in a Brookfield basement in November 1987.">
  <meta name="outbox-spec-subject" content="The single specific copper-wire-wrap lapis lazuli oval pendant Mrs. Annette Rzepczynski is making at her folding TV-tray in the basement corner beside the chest freezer between 7:14pm and 9:48pm on Tuesday November 10 1987 as a Christmas gift for her younger daughter Renee — the 14×10mm lapis lazuli oval cabochon Annette ordered from the Rio Grande Albuquerque catalog in late September (item #340-218, $4.85, Grade B with visible pyrite specks Annette specifically chose because Renee told her in a July phone call from her dorm at UW-La Crosse that she liked the lapis with the gold flecks in it better than the smooth dark blue), the 22-gauge dead-soft copper wire from the same catalog ($3.40 for a 25-foot coil that Annette has been working through since October), the specific wire-wrap pattern Annette is executing (a modified Preston Reuther 'briolette cage' technique she learned from the November 1986 Bead & Button magazine article that her sister-in-law Maureen Rzepczynski clipped and mailed her with a sticky-note reading 'this is the one I was telling you about — try this one for Renee — M.'), the two months of practice Annette put in across October making seven test-wraps on cheaper agate cabochons before she felt ready to try the real lapis, her seven-week working knowledge of the bench (which pliers to pick up when, how many head-pins per pendant, where on the burgundy terrycloth she rests the pliers between bends so they don't roll), the small private fact that Annette has decided across these seven weeks that this Christmas gift is going to be the small specific quiet sign she sends Renee that she heard her in the July phone call when Renee said she was homesick — Annette will not say this directly when she mails the pendant, she will just send it in a small cream gift-box with a typed card reading 'For Renee — Christmas 1987 — Love, Mom,' and the lapis with the pyrite specks will say what Annette wants to say">
  <meta name="outbox-spec-tone" content="Warm, focused, peer-to-peer working amateur-jeweler voice belonging to Mrs. Annette Rzepczynski herself, communicated entirely through her hands and her bench and the visible state of her work — she does not narrate, there are no hover-revealed annotations, there is no text anywhere on the page. The tone is the silent careful attentiveness of a 47-year-old second-shift med-surg nurse who has decided that a folding TV-tray in the corner beside the chest freezer is her workshop and that a single Christmas-gift lapis pendant for her younger daughter is real legitimate skilled-craft work worth doing at 8:22pm on a Tuesday evening between the dishes and bed — present-tense, unhurried, matter-of-fact peer-level focus on the specific bend currently being executed, the patient seven-week skilled-jewelry expertise she has built since October, the quiet pride of seven completed test-wraps and now the real one. Absolutely no irony about basement-corner-jewelry-craft as quaint mid-Eighties Bead-and-Button-magazine hobby, no condescension toward suburban-housewife wire-wrap-pendant-making as kitsch, no Mad-Men-pastiche period kitsch, no Stranger-Things-1987-aesthetic mood-boarding, no feminist-grievance reading of the basement-corner-TV-tray arrangement as oppression (Annette likes the corner, she chose the TV-tray after looking at three different bench options at Hobby Lobby, the husband-occupies-workshop arrangement is one she does not mind because she works second-shift three nights a week and the basement is quiet when she comes home and Walt is asleep), no Walt-as-domineering-husband framing (Walt is a normal Brookfield ham-radio hobbyist who respects Annette's wire-wrap work and asked her in October to make him a paracord lanyard for his Yaesu hand-held which she did, and the marriage is normal), no Renee-as-troubled-college-kid framing (Renee is a normal UW-La Crosse sophomore studying speech pathology who said she was homesick once in July and is otherwise doing fine), no Lisa-as-the-favorite-daughter framing (Lisa just got married and is in Madison and is doing fine, Renee is getting the pendant this year because Renee is the one who is homesick this year, and last year Lisa got Annette's first-completed pendant which was a moonstone wire-wrap and Lisa still wears it). Treat copper-wire-wrap jewelry-making as serious working skilled hobby-craft, treat the Rio Grande catalog and Bead & Button magazine and Hagstoz solder paste as legitimate working amateur-jewelry infrastructure, treat Annette as a legitimate working amateur jeweler with seven weeks of patient skilled bench-practice, and treat the visitor's careful loupe-watching of one specific in-progress Christmas pendant as real participation in a real Tuesday-evening act of patient skilled-craft attention worthy of full peer-to-peer respect.">

  <meta name="outbox-spec-wildcard" content="Exactly once per visitor's cumulative-time-at-the-loupe-in-localStorage reaching 11 minutes (deterministic, persisted across visits), at a moment the visitor cannot predict and that is not announced anywhere, a small specific event happens silently inside the circle: at the lower-right edge of the viewport, just barely intruding into the circular field-stop, a small folded square of cream stationery paper appears resting against the spoon-rest — a note from Renee that Annette has not yet opened. The note is addressed in Renee's careful 19-year-old ballpoint cursive 'Mom — open after Christmas' and dated in the corner 'Dec 2 1987 — La Crosse — for whenever you finish the pendant.' The note becomes clickable. Clicking it unfolds the paper over 2.4 seconds with a soft paper-unfolding animation revealing Renee's full message rendered in her own careful ballpoint cursive (different hand from anyone else's possible writing — slightly rightward slant, tight loops on the lowercase 'g' descenders, small heart over the 'i' in her own name at the bottom) reading: 'Mom — I know about the pendant. Aunt Maureen called me Sunday to tell me you were finishing it for me and she said I should let you give it to me like a surprise but I wanted you to know that I know and that I know what the lapis with the pyrite means and that I have been okay since the July phone call, more okay than okay actually, I have made friends in my Phonetics 230 class and one of them is named Jenna and she is from Eau Claire and we go to the pancake breakfast at the Trinity Lutheran fellowship hall every Sunday morning, and I am writing this so you do not have to wonder if I am still homesick when you are wrapping the wire at the TV-tray. I am not still homesick. I am writing this anyway because I want you to know that I know you remembered the lapis with the pyrite and that meant everything to me when Aunt Maureen told me. I am putting this note in the mail to Aunt Maureen on Wednesday and she will give it to you when you go over to her house for the Christmas card exchange on Saturday December 19 and you can open it after you wrap the pendant or after Christmas or whenever you want. Love, Renee — UW-La Crosse sophomore, Speech Pathology, Halpern Hall Room 314.' This unlock is not announced anywhere, no UI text refers to it, no counter celebrates it, no instruction explains it — it simply becomes the small private fact that appears beside the spoon-rest after the visitor has spent 11 cumulative minutes at the loupe across one or more visits, and finding it is the small private reward for staying.">

nski as a legitimate working amateur jeweler with seven weeks of patient skilled bench-practice and a real running mother-daughter Christmas-gift correspondence, treat the in-progress lapis pendant as a real specific Christmas gift being made carefully for a real specific reason, and treat the visitor's quiet act of leaning into the loupe and watching one wire-bend at a time as real participation in a real Tuesday-evening act of patient skilled-craft attention worthy of full peer-to-peer respect.">

<script>
(() => {
  // ---------- state ----------
  const KEY_BENDS = 'oc_loupe_bends_v1';
  const KEY_TOTAL = 'oc_loupe_total_bends_v1';
  const KEY_PLIERS = 'oc_loupe_pliers_v1';
  const KEY_TIME = 'oc_loupe_time_ms_v1';
  const KEY_NOTE_SEEN = 'oc_loupe_note_seen_v1';

  const TOTAL_BENDS = 11;
  const WILDCARD_MS = 11 * 60 * 1000;

  let bends = clampInt(load(KEY_BENDS, 0), 0, TOTAL_BENDS);
  let totalBends = Math.max(0, parseInt(load(KEY_TOTAL, 0)) || 0);
  let pliersHeld = load(KEY_PLIERS, 'false') === 'true';
  let cumMs = Math.max(0, parseInt(load(KEY_TIME, 0)) || 0);
  let noteUnlocked = cumMs >= WILDCARD_MS;
  let noteSeen = load(KEY_NOTE_SEEN, 'false') === 'true';
  let noteOpen = false;
  let notebookZoomed = false;

  function load(k, d) { try { return localStorage.getItem(k) ?? d; } catch(e) { return d; } }
  function save(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
  function clampInt(n, lo, hi) { n = parseInt(n)||0; return Math.max(lo, Math.min(hi, n)); }

  // ---------- DOM refs ----------
  const svg = document.getElementById('svg');
  const stage = document.getElementById('stage');
  const inProgress = document.getElementById('inProgress');
  const inProgressHi = document.getElementById('inProgressHi');
  const bail = document.getElementById('bail');
  const pliers = document.getElementById('pliers');
  const notebook = document.getElementById('notebook');
  const notebookContent = document.getElementById('notebookContent');
  const lampWarm = document.getElementById('lampWarm');
  const reneeNote = document.getElementById('reneeNote');
  const noteFolded = document.getElementById('noteFolded');
  const noteUnfolded = document.getElementById('noteUnfolded');
  const practiceWraps = document.getElementById('practiceWraps');
  const hematiteBeads = document.getElementById('hematiteBeads');
  const dustMotesG = document.getElementById('dustMotes');
  const pendantGroup = document.getElementById('pendantGroup');

  // ---------- wire-bend paths (12 deterministic states) ----------
  // index 0 = "halfway through first bend" up to 11 = complete
  const wirePaths = [
    "M 54 -110 C 78 -60, 78 0, 64 30",
    "M 54 -110 C 82 -50, 84 10, 60 44",
    "M 54 -110 C 86 -40, 88 22, 50 58",
    "M 54 -110 C 88 -28, 86 36, 28 70",
    "M 54 -110 C 88 -16, 76 52, 0 82",
    "M 54 -110 C 84 0, 56 76, -34 88",
    "M 54 -110 C 78 18, 22 92, -68 80",
    "M 54 -110 C 64 38, -22 96, -96 60",
    "M 54 -110 C 44 56, -68 84, -118 22",
    "M 54 -110 C 20 70, -100 60, -124 -22",
    "M 54 -110 C -10 72, -120 18, -110 -56",
    "M 54 -110 C -36 60, -116 -26, -78 -100 Q -36 -130, 0 -118"
  ];

  function renderInProgress() {
    const i = Math.min(bends, TOTAL_BENDS);
    inProgress.setAttribute('d', wirePaths[i]);
    inProgressHi.setAttribute('d', wirePaths[i]);
    if (bends >= TOTAL_BENDS) {
      bail.setAttribute('opacity', '1');
      inProgress.style.cursor = 'default';
    } else {
      bail.setAttribute('opacity', '0');
      inProgress.style.cursor = 'pointer';
    }
  }

  // ---------- hematite beads in jar (deterministic) ----------
  function renderHematite() {
    const seed = 17;
    let s = seed;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    const beads = [];
    const positions = [];
    // pack roughly in the jar's interior (-50..50, -30..70)
    for (let i = 0; i < 38; i++) {
      let x, y, ok = false, tries = 0;
      while (!ok && tries < 40) {
        x = -50 + rnd() * 100;
        y = -30 + rnd() * 100;
        ok = positions.every(p => Math.hypot(p.x - x, p.y - y) > 6.5);
        // also keep inside jar oval
        const inside = (x*x)/(56*56) + ((y-20)*(y-20))/(55*55) <= 1;
        ok = ok && inside;
        tries++;
      }
      if (ok) positions.push({x, y});
    }
    positions.sort((a,b)=>a.y-b.y);
    positions.forEach(p => {
      beads.push(`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="url(#hematiteBead)" stroke="#1f2228" stroke-width="0.3"/>`);
    });
    hematiteBeads.innerHTML = beads.join('');
  }

  // ---------- practice pendants accumulator in gift-box ----------
  function renderPracticeWraps() {
    const count = Math.min(7, Math.floor(totalBends / TOTAL_BENDS));
    const slots = [
      {x: -42, y: -12, c: '#3b5fa8'},
      {x: -16, y: -16, c: '#2c7f6a'},
      {x:  10, y: -10, c: '#7a3c5e'},
      {x:  36, y: -14, c: '#5e6e2c'},
      {x:  62, y: -8,  c: '#3b5fa8'},
      {x: -28, y: 14, c: '#a06028'},
      {x:   4, y: 18, c: '#444a6e'}
    ];
    let html = '';
    for (let i = 0; i < count; i++) {
      const s = slots[i];
      html += `<g transform="translate(${s.x},${s.y})">
        <ellipse cx="0" cy="0" rx="11" ry="8" fill="${s.c}" stroke="#0c1d4a" stroke-width="0.6"/>
        <ellipse cx="-3" cy="-2" rx="3" ry="2" fill="#8aa4d4" opacity="0.6"/>
        <ellipse cx="0" cy="0" rx="13" ry="10" fill="none" stroke="url(#copper)" stroke-width="1.2"/>
        <ellipse cx="0" cy="-11" rx="2.4" ry="3" fill="none" stroke="url(#copper)" stroke-width="1.1"/>
      </g>`;
    }
    practiceWraps.innerHTML = html;
  }

  // ---------- dust motes ----------
  const motes = [];
  function initMotes() {
    let s = 991;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    for (let i = 0; i < 26; i++) {
      motes.push({
        x: rnd() * 1000,
        y: rnd() * 1000,
        vx: (rnd() - 0.5) * 0.18,
        vy: -0.08 - rnd() * 0.18,
        r: 0.7 + rnd() * 1.3,
        op: 0.18 + rnd() * 0.22,
        phase: rnd() * Math.PI * 2
      });
    }
    let html = '';
    motes.forEach((m, i) => {
      html += `<circle id="mote${i}" cx="${m.x.toFixed(1)}" cy="${m.y.toFixed(1)}" r="${m.r.toFixed(2)}" fill="#f5d894" opacity="${m.op.toFixed(2)}"/>`;
    });
    dustMotesG.innerHTML = html;
  }

  // ---------- animation loop ----------
  let lastT = performance.now();
  let lastSaveT = lastT;
  function tick(t) {
    const dt = Math.min(80, t - lastT);
    lastT = t;

    // dust motes
    motes.forEach((m, i) => {
      m.x += m.vx * (dt / 16);
      m.y += m.vy * (dt / 16);
      m.phase += dt * 0.001;
      if (m.y < -10) { m.y = 1010; m.x = (m.x + 73) % 1000; }
      if (m.x < -10) m.x = 1010;
      if (m.x > 1010) m.x = -10;
      const el = document.getElementById('mote' + i);
      if (el) {
        el.setAttribute('cx', m.x.toFixed(1));
        el.setAttribute('cy', m.y.toFixed(1));
        const flick = 0.85 + 0.15 * Math.sin(m.phase * 3);
        el.setAttribute('opacity', (m.op * flick).toFixed(2));
      }
    });

    // lamp filament ripple (0.4 Hz, ±0.02)
    const baseOp = 0.55;
    const ripple = Math.sin(t * 0.0025) * 0.02;
    lampWarm.setAttribute('opacity', (baseOp + ripple).toFixed(3));

    // time accumulator (save every 5s)
    cumMs += dt;
    if (t - lastSaveT > 5000) {
      save(KEY_TIME, Math.floor(cumMs));
      lastSaveT = t;
    }

    // wildcard unlock
    if (!noteUnlocked && cumMs >= WILDCARD_MS) {
      noteUnlocked = true;
      revealNote();
    }

    requestAnimationFrame(tick);
  }

  // ---------- loupe focus (cursor depth-of-field) ----------
  let cursorX = 500, cursorY = 500;
  function onMove(e) {
    const rect = svg.getBoundingClientRect();
    const px = (e.clientX ?? (e.touches && e.touches[0] && e.touches[0].clientX)) - rect.left;
    const py = (e.clientY ?? (e.touches && e.touches[0] && e.touches[0].clientY)) - rect.top;
    cursorX = (px / rect.width) * 1000;
    cursorY = (py / rect.height) * 1000;

    // subtle pendant focus: slight scale based on cursor distance to center
    const dx = (cursorX - 500) / 500;
    const dy = (cursorY - 500) / 500;
    pendantGroup.setAttribute('transform',
      `translate(${500 + dx * 4},${510 + dy * 4})`);

    // pliers cursor overlay if held
    if (pliersHeld) {
      pliers.setAttribute('transform',
        `translate(${cursorX}, ${cursorY}) rotate(-28) scale(0.55)`);
    }
  }
  svg.addEventListener('mousemove', onMove);
  svg.addEventListener('touchmove', onMove, {passive: true});

  // ---------- audio: pliers click ----------
  let audioCtx = null;
  function plierClick(stronger) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(stronger ? 2050 : 1800, now);
      o.frequency.exponentialRampToValueAtTime(900, now + 0.18);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(stronger ? 0.16 : 0.10, now + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.26);
      o.connect(g).connect(ctx.destination);
      o.start(now);
      o.stop(now + 0.28);
      // soft secondary thud
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(380, now + 0.02);
      g2.gain.setValueAtTime(0.0001, now + 0.02);
      g2.gain.exponentialRampToValueAtTime(0.05, now + 0.03);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      o2.connect(g2).connect(ctx.destination);
      o2.start(now + 0.02);
      o2.stop(now + 0.18);
    } catch(e) {}
  }

  // ---------- bend interaction ----------
  function advanceBend() {
    if (bends >= TOTAL_BENDS) return;
    bends += 1;
    totalBends += 1;
    save(KEY_BENDS, bends);
    save(KEY_TOTAL, totalBends);

    // animate the wire bending
    const from = inProgress.getAttribute('d');
    const targetIdx = Math.min(bends, TOTAL_BENDS);
    const to = wirePaths[targetIdx];
    animatePath(inProgress, from, to, 600);
    animatePath(inProgressHi, from, to, 600);

    plierClick(pliersHeld);

    if (bends >= TOTAL_BENDS) {
      // completion: settle bail + warm satisfaction pulse
      setTimeout(() => {
        bail.setAttribute('opacity', '1');
        bail.style.transition = 'opacity 0.9s ease';
        // satisfaction pulse on lamp
        lampWarm.style.transition = 'opacity 1.4s ease';
        const cur = parseFloat(lampWarm.getAttribute('opacity')) || 0.55;
        lampWarm.setAttribute('opacity', (cur + 0.18).toFixed(2));
        setTimeout(() => {
          lampWarm.setAttribute('opacity', '0.55');
        }, 1400);
        // after 4s start a fresh pendant (Annette has started the next one)
        setTimeout(() => {
          bends = 0;
          save(KEY_BENDS, 0);
          bail.setAttribute('opacity', '0');
          inProgress.setAttribute('d', wirePaths[0]);
          inProgressHi.setAttribute('d', wirePaths[0]);
          inProgress.style.cursor = 'pointer';
          renderPracticeWraps();
        }, 4000);
      }, 600);
    }
  }

  function animatePath(el, from, to, dur) {
    // parse both d strings into matching number arrays and lerp
    const a = parsePath(from);
    const b = parsePath(to);
    if (!a || !b || a.cmds !== b.cmds || a.nums.length !== b.nums.length) {
      el.setAttribute('d', to);
      return;
    }
    const start = performance.now();
    function step(t) {
      const p = Math.min(1, (t - start) / dur);
      const eased = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2)/2;
      const nums = a.nums.map((n, i) => n + (b.nums[i] - n) * eased);
      el.setAttribute('d', rebuildPath(a.tokens, nums));
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function parsePath(d) {
    const tokens = d.match(/[A-Za-z]|-?[\d.]+/g);
    if (!tokens) return null;
    const cmds = tokens.filter(t => /[A-Za-z]/.test(t)).join('');
    const nums = tokens.filter(t => !/[A-Za-z]/.test(t)).map(Number);
    return { tokens, cmds, nums };
  }
  function rebuildPath(tokens, nums) {
    let i = 0;
    return tokens.map(t => /[A-Za-z]/.test(t) ? t : nums[i++].toFixed(2)).join(' ');
  }

  // ---------- pliers pick up ----------
  pliers.addEventListener('click', (e) => {
    e.stopPropagation();
    pliersHeld = !pliersHeld;
    save(KEY_PLIERS, pliersHeld);
    if (pliersHeld) {
      pliers.setAttribute('transform', `translate(${cursorX}, ${cursorY}) rotate(-28) scale(0.55)`);
    } else {
      pliers.setAttribute('transform', 'translate(160,820) rotate(-28)');
    }
    plierClick(false);
  });

  inProgress.addEventListener('click', (e) => {
    e.stopPropagation();
    advanceBend();
  });

  // ---------- notebook zoom ----------
  let notebookTimer = null;
  notebook.style.cursor = 'pointer';
  notebook.addEventListener('click', (e) => {
    e.stopPropagation();
    if (notebookZoomed) return;
    notebookZoomed = true;
    notebookContent.style.transition = 'transform 0.5s ease';
    notebookContent.style.transformOrigin = '0 0';
    notebookContent.style.transform = 'scale(2.6) translate(-200px,-110px)';
    if (notebookTimer) clearTimeout(notebookTimer);
    notebookTimer = setTimeout(() => {
      notebookContent.style.transform = 'scale(1) translate(0,0)';
      setTimeout(() => { notebookZoomed = false; }, 500);
    }, 4200);
  });

  // ---------- wildcard reveal ----------
  function revealNote() {
    reneeNote.style.transition = 'opacity 2.2s ease';
    reneeNote.style.opacity = '1';
    reneeNote.style.pointerEvents = 'auto';
    noteFolded.style.cursor = 'pointer';
  }
  if (noteUnlocked) revealNote();

  noteFolded.addEventListener('click', (e) => {
    e.stopPropagation();
    if (noteOpen) return;
    noteOpen = true;
    save(KEY_NOTE_SEEN, 'true');
    // unfold animation: hide folded, show unfolded with scale-up
    noteFolded.style.transition = 'opacity 0.6s ease';
    noteFolded.style.opacity = '0';
    noteUnfolded.style.transformOrigin = '0 0';
    noteUnfolded.style.transform = 'scale(0.2)';
    noteUnfolded.style.opacity = '0';
    noteUnfolded.style.transition = 'opacity 1.4s ease, transform 2.4s cubic-bezier(0.2,0.7,0.3,1)';
    // reposition the note group to be readable
    reneeNote.setAttribute('transform', 'translate(500,500)');
    setTimeout(() => {
      noteUnfolded.style.transform = 'scale(1)';
      noteUnfolded.style.opacity = '1';
      noteUnfolded.style.pointerEvents = 'auto';
    }, 50);
  });

  // click anywhere outside to fold note back to corner
  document.addEventListener('click', (e) => {
    if (noteOpen && !reneeNote.contains(e.target)) {
      noteOpen = false;
      noteUnfolded.style.opacity = '0';
      noteUnfolded.style.transform = 'scale(0.2)';
      noteUnfolded.style.pointerEvents = 'none';
      setTimeout(() => {
        reneeNote.setAttribute('transform', 'translate(820, 760)');
        noteFolded.style.opacity = '1';
      }, 800);
    }
  });

  // ---------- init ----------
  renderInProgress();
  renderHematite();
  renderPracticeWraps();
  initMotes();
  if (pliersHeld) {
    pliers.setAttribute('transform', `translate(${cursorX}, ${cursorY}) rotate(-28) scale(0.55)`);
  }
  requestAnimationFrame((t) => { lastT = t; lastSaveT = t; tick(t); });

  // hidden notes for the curious:
  // 8:22 PM, Tuesday Nov 10 1987 — Brookfield, WI
  // 14×10mm lapis cabochon, Rio Grande #340-218 — 22ga dead-soft copper
  // modified Preston Reuther briolette cage, Bead & Button Nov '86
  // sign above the door: if the door is open, you are welcome inside
  console.log('%c   8:22 PM, Tuesday   ', 'background:#5e1c1e;color:#f5d894;padding:4px 10px;font-family:Georgia;font-style:italic;');
})();
</script>
