  <meta name="outbox-spec-era" content="1968 — peak handcrafted Italian glass-marble manufacturing era in the lakeside town of Empoli in Tuscany, the specific moment when small family-run vetreria workshops produced solid lampworked glass marbles for the global toy and collector trade by spinning molten gathers of soda-lime glass on punty rods over open kerosene torches, layering ribbons of colored cane (cobalt blue, sulphur yellow, manganese violet, copper-aventurine gold-flecked brown) into the clear core while the marble was still liquid, then dropping the finished marble into a bed of warm vermiculite to anneal slowly overnight; a generations-deep craft tradition where master glassblowers like Sergio Vannucci of Vetreria Vannucci e Figli could pull a single twisted ribbon-core latticino marble in under ninety seconds of continuous spinning labor, each marble carrying the subtle thumbprint asymmetries of the maker's pontil-snap and the day's particular flame temperature, shipped in straw-packed wooden crates by rail down to the port of Livorno and from there to toy shops in London, Buenos Aires, and Cleveland where children would buy a single beautiful one for the equivalent of an hour's allowance and carry it loose in a pocket for years">
  <meta name="outbox-spec-format" content="A full-viewport silent generative piece: a slow-spinning interior view of a single hand-pulled latticino glass marble seen as if the visitor's eye is pressed directly against its surface — the entire browser window is filled by the marble's internal optics, with twisted ribbons of cobalt, sulphur, manganese violet, and copper-aventurine slowly rotating around the central axis at roughly 4 degrees per second, refracting and bending as light passes through the glass body. The visitor's cursor position acts as a virtual light source: as the cursor moves across the viewport, the highlights, caustic patterns, and ribbon refractions shift in real time as if the marble is being slowly tilted toward different angles of an unseen window light. No UI, no controls, no text, no buttons, no captions, no instructions, no title — only the marble, the slow turn, the moving light. The internal ribbons drift very slightly over long timescales as if the glass itself is still cooling and settling decades after being made">
  <meta name="outbox-spec-subject" content="A single solid lampworked latticino glass marble pulled by master glassblower Sergio Vannucci at Vetreria Vannucci e Figli in Empoli, Tuscany, on the afternoon of Thursday, October 17, 1968 — the 437th marble of his working day, a 19-millimeter sphere with a six-ribbon twist core in cobalt and sulphur with two narrow accent ribbons of manganese violet and a single thread of copper-aventurine catching the light gold; one of fourteen hundred marbles produced in the workshop that week, packed in straw in crate No. 22 bound for the port of Livorno on Saturday morning, shipped to a wholesale toy importer in Liverpool, and ultimately sold for sevenpence at a tobacconist's counter in the town of Crewe in spring 1969 to a boy named Geoffrey Holroyd who carried it in his trouser pocket through three school terms before losing it in long grass behind the cricket pavilion in July 1970 — where it has remained, half-buried in soil, slowly being turned by frost-heave and earthworm activity, for fifty-eight years; the marble itself as a small unbroken witness to its own continuous existence, still optically perfect, still slowly turning">
  <meta name="outbox-spec-tone" content="No tone — there is no narrator, no voice, no text visible on the page at any point. The piece speaks only through the slow optical turning of glass. The closest analogue to a voice is the silent steady patience of the marble itself: a small solid object that has been quietly perfect since 1968, present-tense and continuous, indifferent to being observed, the visual equivalent of holding a found marble up to a window without saying anything about it">

  <meta name="outbox-spec-palette" content="Deep velvet-black field (#0a0808) surrounding the marble suggesting the dark soil it has rested in for decades + clear soda-lime glass body rendered as soft translucent gray-white refractions (#e8ecf0 at varying opacities) + deep cobalt ribbon (#1a3a8c) + warm sulphur-yellow ribbon (#e8c84a) + rich manganese violet accent ribbon (#7a3a8c) + copper-aventurine gold-fleck thread (#c8893a) with tiny embedded sparkle points (#fff4c8 at 0.9 opacity) + warm caustic highlight where cursor-light strikes the surface (#fff8e8 at 0.7 opacity, soft circular falloff) + cool refracted shadow on the opposite side of the marble (#2a3a4a at 0.4 opacity) — evoking the specific luminescence of hand-pulled latticino glass held up to afternoon light, the subtle warmth of copper-aventurine catching a gleam, and the deep quiet of soil-darkness around a small luminous object">
  <meta name="outbox-spec-wildcard" content="Exactly once every 11 minutes (deterministic, tied to elapsed time since page load), one of the twinkle sparkles along the copper-aventurine thread briefly brightens to a markedly warmer and longer-duration flash than the others — a small slow gleam lasting approximately 4 seconds, the kind of catch-the-light moment that would have happened when sunlight first struck the marble in Geoffrey Holroyd's trouser pocket as he walked home from school past the cricket pavilion in summer 1970. The visitor is given no indication this is happening, no acknowledgment, no reward for noticing — just the quiet fact that one of the sparkles on this marble remembers a particular afternoon">

<title>A Marble Still Turning in the Long Grass</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:#0a0808;overflow:hidden;cursor:default;}
  body{display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  svg#marble{display:block;width:min(85vw,85vh);height:min(85vw,85vh);overflow:visible;}
  /* the foot-link, invisible until hovered near the page edge */
  footer{position:fixed;left:0;right:0;bottom:0;text-align:center;padding:14px 0;
         font-family:Georgia,serif;font-size:11px;letter-spacing:0.12em;
         color:#1a1614;opacity:0;transition:opacity 1.6s ease;pointer-events:none;z-index:50;}
  footer a{color:#3a2a20;text-decoration:none;border-bottom:1px solid #2a1e18;padding-bottom:1px;pointer-events:auto;}
  footer a:hover{color:#c8893a;border-color:#c8893a;}
  body:hover footer{opacity:0.42;}
  @media (hover:none){body footer{opacity:0.28;}}
  /* a single distant glint of soil-grain texture, very subtle */
  #stage::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 55%, rgba(28,22,18,0) 38%, rgba(0,0,0,0.55) 95%);}
</style>

<body>
<div id="stage" aria-hidden="true">
  <!-- the marble. soda-lime, latticino core, six twisted ribbons, copper-aventurine thread -->
  <svg id="marble" viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- the glass body itself: edge darkening + faint subsurface warmth -->
      <radialGradient id="glassBody" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#e8ecf0" stop-opacity="0.06"/>
        <stop offset="55%"  stop-color="#cfd6dc" stop-opacity="0.10"/>
        <stop offset="82%"  stop-color="#5a6068" stop-opacity="0.35"/>
        <stop offset="96%"  stop-color="#0e0c0a" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
      </radialGradient>

      <!-- moving caustic where the cursor-light hits -->
      <radialGradient id="highlight" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#fff8e8" stop-opacity="0.85"/>
        <stop offset="35%" stop-color="#fff2d0" stop-opacity="0.30"/>
        <stop offset="70%" stop-color="#fff2d0" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="#fff2d0" stop-opacity="0"/>
      </radialGradient>

      <!-- corresponding cool refracted shadow -->
      <radialGradient id="cool" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#2a3a4a" stop-opacity="0.55"/>
        <stop offset="60%" stop-color="#1a2230" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#1a2230" stop-opacity="0"/>
      </radialGradient>

      <!-- the soft rim sheen that always sits on the glass -->
      <radialGradient id="rimSheen" cx="38%" cy="34%" r="62%">
        <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.16"/>
        <stop offset="45%" stop-color="#ffffff" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>

      <!-- circular mask so everything stays inside the marble -->
      <clipPath id="marbleClip"><circle cx="0" cy="0" r="92"/></clipPath>

      <!-- glow filter for the slow once-every-11-minutes gleam -->
      <filter id="warmFlare" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur stdDeviation="3.2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- glass body -->
    <circle cx="0" cy="0" r="92" fill="url(#glassBody)"/>

    <!-- ribbons live here, clipped to the marble's circumference -->
    <g id="ribbonGroup" clip-path="url(#marbleClip)"></g>

    <!-- the moving cool side -->
    <circle id="coolSide" cx="0" cy="0" r="92" fill="url(#cool)" clip-path="url(#marbleClip)"/>

    <!-- the moving caustic highlight -->
    <circle id="hotSide" cx="0" cy="0" r="92" fill="url(#highlight)" clip-path="url(#marbleClip)"/>

    <!-- copper-aventurine sparkles, clipped -->
    <g id="sparkleGroup" clip-path="url(#marbleClip)"></g>

    <!-- the always-on rim sheen, sits on top of the glass -->
    <circle cx="0" cy="0" r="92" fill="url(#rimSheen)" pointer-events="none"/>

    <!-- thin glass-edge highlight kiss along the rim -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.6"/>
  </svg>
</div>

<footer><a href="/archive">other things resting in soil</a></footer>

<!--
  Empoli, Tuscany. October 17, 1968. 437th of the day.
  cobalt · sulphur · manganese violet · copper-aventurine
  shipped in straw, crate No. 22, to Livorno on Saturday morning.
  sold for sevenpence in Crewe, spring 1969.
  lost in long grass behind the cricket pavilion, July 1970.
  still here.
-->
<script>
(() => {
  const svgNS = "http://www.w3.org/2000/svg";
  const ribbonGroup  = document.getElementById("ribbonGroup");
  const sparkleGroup = document.getElementById("sparkleGroup");
  const hotSide      = document.getElementById("hotSide");
  const coolSide     = document.getElementById("coolSide");

  // ----- build six twisted ribbons + one aventurine thread ---------------------
  const ribbons = [
    { color: "#1a3a8c", width: 7.2, phase: 0.00, wobble: 0.12, kind: "ribbon" }, // cobalt
    { color: "#e8c84a", width: 6.6, phase: 1.05, wobble: 0.10, kind: "ribbon" }, // sulphur
    { color: "#1a3a8c", width: 6.0, phase: 2.09, wobble: 0.14, kind: "ribbon" }, // cobalt
    { color: "#e8c84a", width: 5.6, phase: 3.14, wobble: 0.09, kind: "ribbon" }, // sulphur
    { color: "#7a3a8c", width: 3.4, phase: 0.52, wobble: 0.18, kind: "accent" }, // manganese violet
    { color: "#7a3a8c", width: 3.0, phase: 3.66, wobble: 0.15, kind: "accent" }, // manganese violet
    { color: "#c8893a", width: 2.0, phase: 1.57, wobble: 0.22, kind: "thread" }  // copper-aventurine
  ];

  // each ribbon is a <path>; we'll rewrite the `d` attribute every frame
  const ribbonEls = ribbons.map(r => {
    const p = document.createElementNS(svgNS, "path");
    p.setAttribute("fill", "none");
    p.setAttribute("stroke", r.color);
    p.setAttribute("stroke-width", r.width);
    p.setAttribute("stroke-linecap", "round");
    p.setAttribute("opacity", r.kind === "thread" ? 0.92 : 0.78);
    ribbonGroup.appendChild(p);
    return p;
  });

  // ----- sparkle points along the copper-aventurine thread --------------------
  const SPARKLE_COUNT = 14;
  const sparkles = [];
  for (let i = 0; i < SPARKLE_COUNT; i++) {
    const c = document.createElementNS(svgNS, "circle");
    c.setAttribute("r", 0.9);
    c.setAttribute("fill", "#fff4c8");
    c.setAttribute("opacity", 0);
    sparkleGroup.appendChild(c);
    sparkles.push({
      el: c,
      // parameter along the ribbon: 0..1
      t: (i / SPARKLE_COUNT) + (Math.random() * 0.04 - 0.02),
      cycle: 0.5 + Math.random() * 1.5,           // twinkle period in seconds
      offset: Math.random() * 6.28,
      jitter: 0.95 + Math.random() * 0.1
    });
  }

  // a marked sparkle that occasionally remembers a particular afternoon
  let warmFlareSparkleIdx = Math.floor(Math.random() * SPARKLE_COUNT);

  // ----- math for the ribbons --------------------------------------------------
  // ribbon path: a helical wrap projected to 2D. The "axis" of the marble's twist
  // is the y-axis. As y goes from -R to +R, the ribbon traces around in x using
  // cos(theta), with theta increasing along y so the ribbon spirals.
  const R       = 90;       // ribbon excursion (slightly inside the glass rim of 92)
  const STEPS   = 64;       // path resolution
  const TWISTS  = 1.45;     // how many full turns from pole to pole
  const POLE_FALLOFF = 0.96; // ribbons narrow toward the poles

  function buildRibbonPath(r, rotation, t, settleDrift) {
    let d = "";
    const phase = r.phase + rotation + settleDrift;
    for (let i = 0; i <= STEPS; i++) {
      const u  = i / STEPS;                  // 0..1
      const y  = (u * 2 - 1) * R;            // -R..+R
      // the ribbon stays well inside the rim near the equator and tucks in near poles:
      const polar = Math.sqrt(Math.max(0, 1 - (y / R) * (y / R))); // 0 at pole, 1 equator
      const radius = R * polar * POLE_FALLOFF;
      const theta = (u - 0.5) * Math.PI * 2 * TWISTS + phase;
      // a small per-ribbon wobble so it looks hand-pulled
      const wob = Math.sin(u * 6.0 + phase * 0.6 + t * 0.00018) * r.wobble * 4.0;
      const x   = Math.cos(theta) * (radius + wob);
      d += (i === 0 ? "M" : "L") + x.toFixed(2) + "," + y.toFixed(2) + " ";
    }
    return d;
  }

  // returns the (x,y) point on a ribbon at parameter u in [0,1]
  function ribbonPointAt(r, rotation, settleDrift, u, t) {
    const phase = r.phase + rotation + settleDrift;
    const y  = (u * 2 - 1) * R;
    const polar = Math.sqrt(Math.max(0, 1 - (y / R) * (y / R)));
    const radius = R * polar * POLE_FALLOFF;
    const theta = (u - 0.5) * Math.PI * 2 * TWISTS + phase;
    const wob = Math.sin(u * 6.0 + phase * 0.6 + t * 0.00018) * r.wobble * 4.0;
    const x   = Math.cos(theta) * (radius + wob);
    // facing front (toward viewer) when sin(theta) > 0
    const front = Math.sin(theta);
    return { x, y, front };
  }

  // ----- cursor-light tracking -------------------------------------------------
  // cursor at upper-left -> highlight at lower-right. Highlight smoothly chases.
  let cursorX = 0.35, cursorY = 0.35; // normalized 0..1 across viewport
  let lightX  = 0.65, lightY  = 0.65; // smoothed target on marble (inverse of cursor)
  const stage = document.getElementById("stage");

  window.addEventListener("pointermove", e => {
    cursorX = e.clientX / window.innerWidth;
    cursorY = e.clientY / window.innerHeight;
  }, { passive: true });

  // touch: let a finger drag the light too
  window.addEventListener("touchmove", e => {
    if (e.touches && e.touches[0]) {
      cursorX = e.touches[0].clientX / window.innerWidth;
      cursorY = e.touches[0].clientY / window.innerHeight;
    }
  }, { passive: true });

  // ----- the loop --------------------------------------------------------------
  const start = performance.now();

  // ribbons saturate when in the highlight, desaturate when in cool shadow.
  // we store base colors and blend toward white/dim depending on position.
  const ribbonBaseOpacity = ribbons.map(r => r.kind === "thread" ? 0.92 : 0.78);

  function loop(now) {
    const elapsed = (now - start) / 1000; // seconds
    // 4 degrees per second -> radians
    const rotation = elapsed * (4 * Math.PI / 180);
    // very slow settle: one full slow drift per 3 minutes, small amplitude
    const settleDrift = Math.sin((elapsed / 180) * Math.PI * 2) * 0.04;

    // ease the light position
    const targetX = 1 - cursorX;
    const targetY = 1 - cursorY;
    lightX += (targetX - lightX) * 0.045;
    lightY += (targetY - lightY) * 0.045;

    // convert normalized light coords to marble-local SVG coords
    // marble viewBox is -100..100, but light should stay inside the visible disk
    const lx = (lightX - 0.5) * 140; // a bit damped so the highlight doesn't escape the rim
    const ly = (lightY - 0.5) * 140;

    // update highlight + shadow positions via radialGradient cx/cy on the circles
    // we move the gradient origin by using `transform` on the fill circles' clip
    // — but simpler: set the gradient `cx`/`cy` directly.
    const hot = document.getElementById("highlight");
    const cool = document.getElementById("cool");
    // Translate cx/cy from -100..100 space into 0..100% gradient space
    const hx = ((lx + 100) / 200) * 100;
    const hy = ((ly + 100) / 200) * 100;
    const cx = ((-lx + 100) / 200) * 100;
    const cy = ((-ly + 100) / 200) * 100;
    hot.setAttribute("cx", hx + "%");
    hot.setAttribute("cy", hy + "%");
    hot.setAttribute("r", "42%");
    cool.setAttribute("cx", cx + "%");
    cool.setAttribute("cy", cy + "%");
    cool.setAttribute("r", "55%");

    // rebuild ribbons
    ribbons.forEach((r, i) => {
      const d = buildRibbonPath(r, rotation, now, settleDrift);
      ribbonEls[i].setAttribute("d", d);

      // sample midpoint of ribbon to decide how lit/dim it is overall
      // (cheap proxy — proper per-segment shading would be much more work)
      const mid = ribbonPointAt(r, rotation, settleDrift, 0.5, now);
      const distHot  = Math.hypot(mid.x - lx, mid.y - ly);
      const distCool = Math.hypot(mid.x + lx, mid.y + ly);
      // closer to hot = brighter; closer to cool = dimmer
      const hotInfluence  = Math.max(0, 1 - distHot  / 130);
      const coolInfluence = Math.max(0, 1 - distCool / 130);
      const base = ribbonBaseOpacity[i];
      const op = Math.min(1, base + hotInfluence * 0.20 - coolInfluence * 0.22);
      ribbonEls[i].setAttribute("opacity", op.toFixed(3));
    });

    // sparkles ride along the thread (last ribbon)
    const threadIdx = ribbons.length - 1;
    const thread = ribbons[threadIdx];
    sparkles.forEach((s, i) => {
      const pt = ribbonPointAt(thread, rotation, settleDrift, s.t, now);
      s.el.setAttribute("cx", pt.x.toFixed(2));
      s.el.setAttribute("cy", pt.y.toFixed(2));

      // baseline twinkle
      const phase = elapsed * (2 * Math.PI / s.cycle) + s.offset;
      let amp = (Math.sin(phase) * 0.5 + 0.5);   // 0..1
      amp = Math.pow(amp, 3.0);                  // sharpen so they pop briefly

      // sparkles on the back side of the marble are dimmer
      const frontFactor = Math.max(0, pt.front) * 0.85 + 0.15;
      let alpha = amp * s.jitter * frontFactor;
      let radius = 0.7 + amp * 1.1;
      let fill = "#fff4c8";

      // — wildcard: once every 11 minutes a single sparkle gets a slow warm gleam
      // anchor it to elapsed time, deterministic. The flash lasts ~4 seconds.
      const T = 11 * 60; // 660s
      const cycleT = elapsed % T;
      const flashWindow = 4.0; // seconds
      if (i === warmFlareSparkleIdx && cycleT < flashWindow) {
        const u = cycleT / flashWindow;            // 0..1
        // smooth bell, peaks near the middle
        const bell = Math.sin(u * Math.PI);
        alpha = Math.max(alpha, bell * 0.95 * frontFactor);
        radius = 0.7 + bell * 3.2;
        // warmer than the others
        const r = Math.round(255);
        const g = Math.round(232 + (255 - 232) * (1 - bell));
        const b = Math.round(168 + (200 - 168) * (1 - bell));
        fill = `rgb(${r},${g},${b})`;
        s.el.setAttribute("filter", "url(#warmFlare)");
      } else if (i === warmFlareSparkleIdx && cycleT >= flashWindow) {
        s.el.removeAttribute("filter");
      }

      // if just after the flash window, pick the next sparkle for next cycle
      // (tiny variation so it isn't always the same one)
      if (i === warmFlareSparkleIdx
          && cycleT >= flashWindow
          && cycleT < flashWindow + 0.05) {
        warmFlareSparkleIdx = (warmFlareSparkleIdx + 5) % SPARKLE_COUNT;
      }

      s.el.setAttribute("opacity", alpha.toFixed(3));
      s.el.setAttribute("r", radius.toFixed(2));
      s.el.setAttribute("fill", fill);
    });

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

  // quiet whisper in the console for anyone who looks
  // (not visible on the page — fine print for the curious)
  console.log("%cVetreria Vannucci e Figli — Empoli, October 17, 1968.",
              "color:#c8893a;font-style:italic;font-family:Georgia,serif;");
  console.log("%c437th of the day. crate No. 22. lost in long grass behind the cricket pavilion, July 1970.",
              "color:#7a6a58;font-style:italic;font-family:Georgia,serif;");
})();
</script>
